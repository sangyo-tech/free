<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>確認テスト | 産業技術アカデミー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:transparent}
#R{font-family:'Noto Sans JP',system-ui,sans-serif;color:#f1f5f9;line-height:1.7;max-width:800px;margin:0 auto;padding:24px 16px}
#R *{box-sizing:border-box;margin:0;padding:0}
#R button{font-family:inherit;cursor:pointer}

/* Tabs */
.tt{display:flex;gap:0;margin-bottom:32px;background:#0f172a;border-radius:14px;padding:5px;border:1px solid #1e293b}
.tb{flex:1;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:700;border:none;background:transparent;color:#64748b;transition:all .3s;letter-spacing:.02em;text-align:center}
.tb:hover:not(.on){color:#94a3b8;background:rgba(255,255,255,.03)}
.tb.on{color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.tb.t-video.on{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;box-shadow:0 4px 16px rgba(34,197,94,.3)}
.tb.t-course.on{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 4px 16px rgba(245,158,11,.3)}

/* Start */
.S{border-radius:14px;padding:32px 24px;text-align:center}
.S.s-video{background:linear-gradient(135deg,rgba(34,197,94,.05),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.S.s-course{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(245,158,11,.08));border:1px solid rgba(245,158,11,.2)}
.S h3{font-size:18px;font-weight:700;margin-bottom:8px;color:#f1f5f9}
.S p{color:#94a3b8;font-size:14px;margin-bottom:20px;line-height:1.8}
.sp{display:flex;justify-content:center;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.sv{font-size:22px;font-weight:700}
.s-video .sv{color:#22c55e}
.s-course .sv{color:#f59e0b}
.sl{font-size:11px;color:#64748b}

/* Buttons */
.B{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:12px;font-size:16px;font-weight:700;border:none;transition:all .3s;position:relative;overflow:hidden}
.B::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);opacity:0;transition:opacity .3s}
.B:hover{transform:translateY(-3px)}.B:hover::after{opacity:1}
.B:active{transform:translateY(-1px)}
.B.bg{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000;box-shadow:0 6px 24px rgba(34,197,94,.3)}
.B.bo{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;box-shadow:0 6px 24px rgba(245,158,11,.3)}

/* Quiz */
.Q{display:none}
.pg{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.pgb{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.pgf{height:100%;border-radius:3px;transition:width .3s}
.pgf.c-video{background:#22c55e}.pgf.c-course{background:#f59e0b}
.pgc{font-size:13px;color:#64748b;white-space:nowrap}
.qm{font-size:12px;color:#06b6d4;margin-bottom:8px;font-weight:500}
.qt{font-size:16px;font-weight:600;margin-bottom:18px;line-height:1.6;color:#f1f5f9}
.hb{font-size:12px;color:#d4a017;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);border-radius:6px;padding:4px 12px;margin-bottom:14px;display:inline-block}
.hi{display:none;font-size:13px;color:#94a3b8;background:rgba(212,160,23,.05);border-left:3px solid #d4a017;padding:10px 14px;border-radius:6px;margin-bottom:14px}
.os{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.o{background:#111827;border:2px solid #1e293b;border-radius:10px;padding:13px 16px;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;text-align:left;color:#f1f5f9}
.o:hover:not(.lk){border-color:#334155;background:#1a2332}
.ol{width:26px;height:26px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#94a3b8}
.o.ok{border-color:#22c55e;background:rgba(34,197,94,.08)}.o.ok .ol{background:#22c55e;color:#fff}
.o.ng{border-color:#ef4444;background:rgba(239,68,68,.08)}.o.ng .ol{background:#ef4444;color:#fff}
.ex{display:none;background:rgba(59,130,246,.06);border-left:3px solid #3b82f6;border-radius:6px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#94a3b8;line-height:1.7}
.nx{display:none;border:none;border-radius:8px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.nx:hover{transform:translateY(-2px)}
.nx.c-video{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000}
.nx.c-course{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}

/* Result */
.Rs{display:none}
.rc{border-radius:14px;padding:32px 24px;text-align:center;margin-bottom:24px}
.rc.ps{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.rc.fl{background:linear-gradient(135deg,rgba(239,68,68,.04),rgba(239,68,68,.08));border:1px solid rgba(239,68,68,.2)}
.rk{font-size:52px;font-weight:700;margin-bottom:6px}
.rs{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.rd{font-size:14px;color:#94a3b8;margin-bottom:14px}
.rpm{font-size:15px;font-weight:600;color:#22c55e;margin-bottom:14px}
.rfm{font-size:15px;font-weight:600;color:#ef4444;margin-bottom:14px}
.rvt{font-size:16px;font-weight:700;margin-bottom:14px;color:#f59e0b}
.rvi{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:16px 18px;margin-bottom:10px;text-align:left}
.rvq{font-size:13px;font-weight:600;margin-bottom:6px;color:#f1f5f9}
.rvy{font-size:12px;color:#ef4444;margin-bottom:3px}
.rvc{font-size:12px;color:#22c55e;margin-bottom:6px}
.rve{font-size:12px;color:#94a3b8;line-height:1.6}

/* Module selector (all mode) */
.ms{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.mc{background:linear-gradient(135deg,#111827 0%,#0f172a 100%);border:1px solid #1e293b;border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:16px;text-align:left;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(34,197,94,.06) 0%,rgba(34,197,94,.02) 100%);opacity:0;transition:opacity .3s}
.mc:hover{border-color:#22c55e;transform:translateX(6px);box-shadow:0 4px 20px rgba(34,197,94,.12)}
.mc:hover::before{opacity:1}
.mc:active{transform:translateX(3px) scale(.99)}
.mn{width:36px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#22c55e;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;background:none;border:none;box-shadow:none;margin-right:4px;text-shadow:0 0 12px rgba(34,197,94,.25)}
.mc:hover .mn{color:#4ade80;text-shadow:0 0 20px rgba(34,197,94,.5);transform:scale(1.12)}
.mdiv{width:1px;height:32px;background:linear-gradient(180deg,transparent,#334155 30%,#334155 70%,transparent);flex-shrink:0;margin:0 4px;transition:background .3s}
.mc:hover .mdiv{background:linear-gradient(180deg,transparent,#22c55e 30%,#22c55e 70%,transparent)}
.mt{font-size:14px;color:#e2e8f0;font-weight:600;line-height:1.5;position:relative;z-index:1}
.mt2{font-size:11px;color:#64748b;font-weight:400;margin-top:2px}
.mc:hover .mt{color:#fff}
.mc:hover .mt2{color:#94a3b8}
.marr{margin-left:auto;color:#334155;font-size:16px;transition:all .3s;position:relative;z-index:1}
.mc:hover .marr{color:#22c55e;transform:translateX(3px)}
.mhd{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mhd::before{content:'';display:inline-block;width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,#22c55e,#4ade80)}
.msd{font-size:13px;color:#94a3b8;margin-bottom:20px;padding-left:12px}
.mbk{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #1e293b;background:#111827;color:#94a3b8;cursor:pointer;margin-bottom:16px;transition:all .25s}
.mbk:hover{background:#1e293b;color:#f1f5f9;border-color:#334155;transform:translateX(-3px)}
.mcnt{display:inline-flex;align-items:center;justify-content:center;background:rgba(34,197,94,.1);color:#22c55e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px}

@media(max-width:600px){.qt{font-size:14px}.o{padding:11px 13px;font-size:13px}.S{padding:24px 16px}}
</style>
</head>
<body>
<div id="R">
  <div class="tt" id="tabs"></div>
  <div id="panelSelect" style="display:none">
    <div class="mhd">動画別 確認テスト<span class="mcnt">全39回</span></div>
    <div class="msd">テストしたいモジュールを選んでください</div>
    <div class="ms" id="modList"></div>
  </div>
  <div id="panelVideo" style="display:none">
    <div class="S s-video" id="startVideo">
      <h3 id="svTitle"></h3>
      <p>この動画の内容から出題されます。</p>
      <div class="sp">
        <div><div class="sv" id="svCount">10</div><div class="sl">問題数</div></div>
        <div><div class="sv">解説付き</div><div class="sl">正誤判定</div></div>
      </div>
      <button class="B bg" onclick="go('video')">テストを始める →</button>
    </div>
    <div class="Q" id="qVideo"></div>
    <div class="Rs" id="rVideo"></div>
  </div>
  <div id="panelCourse" style="display:none">
    <div class="S s-course" id="startCourse">
      <h3>品質管理 初級コース 確認テスト</h3>
      <p>39モジュールの内容からランダムに39問出題されます。</p>
      <div class="sp">
        <div><div class="sv">39</div><div class="sl">問題数</div></div>
        <div><div class="sv">80%</div><div class="sl">合格ライン</div></div>
      </div>
      <button class="B bo" onclick="go('course')">コーステストを始める →</button>
    </div>
    <div class="Q" id="qCourse"></div>
    <div class="Rs" id="rCourse"></div>
  </div>
</div>
<script>

コストはむしろ増大します。"},{"m":3,"q":"お客様が真に求めている水準を不必要に上回り、企業にムダなコストを発生させている状態を何と呼びますか？","o":["不足品質","過剰品質（Excessive Quality）","当たり前品質","狙いの品質"],"h":"「良すぎる」ことが経営の足を引っ張っている状態です。","c":1,"e":"品質管理の目標は「経済的な形」でのものづくりです。必要以上の品質追求は「ムダ」と見なされます。"},{"m":3,"q":"過剰品質の具体例として、製造現場で発生する「ムダ」に該当するものはどれですか？","o":["機能に影響しない微細な外観キズをすべて廃棄する","安全基準をギリギリでクリアする","説明書を入れ忘れる","材料を安く仕入れる"],"h":"「お客様が重視していない点」にこだわりすぎて、使えるものを捨てていないか考えましょう。","c":0,"e":"過度に厳しい基準で良品を不良として排除することは、廃棄ロスや再検査費用という経済的な損失を生みます。"},{"m":3,"q":"過剰品質を追求し続けることが、製造現場の作業者に与える悪影響は何ですか？","o":["作業が楽になる","技術的な「ムリ」が強じられ、負担が増加する","休日が増える","やる気が無限に湧いてくる"],"h":"達成が極めて困難な高い基準を求められ続ける状況を想像してください。","c":1,"e":"過度な品質目標は、現場に「ムリ」を強いることになり、生産性の低下やミスの誘発を招く恐れがあります。"},{"m":3,"q":"私たちが目指すべき「真の品質管理の目的」として、最も適切なものはどれですか？","o":["世界で一番高い品質を、コストを度外視して作ること","お客様が安心して購入できる信頼感を、経済的な水準で確保すること","検査員を全員解雇して、コストを最小にすること","お客様の苦情をすべて無視すること"],"h":"QCDS（品質・コスト・納期・安全）のバランスが重要です。","c":1,"e":"経済性と信頼性の両立こそが、持続可能なものづくりの本質です。"},{"m":3,"q":"品質管理において、主観や新しいネーミングに惑わされず、客観的な事実に基づいて考える姿勢を何と呼びますか？","o":["経験主義","科学主義（データに基づく判断）","楽観主義","精神主義"],"h":"「常にデータに基づき」という一節を思い出してください。","c":1,"e":"事実（データ）に基づいて現状を把握することが、過剰・不足の偏りを防ぐ土台となります。"},{"m":3,"q":"設計段階でお客様の要求を適切に定義した品質を「設計品質（狙い）」と呼ぶのに対し、それを現場で実現した度合いを何と呼びますか？","o":["設計品質","製造品質（できばえ）","要求品質","当たり前品質"],"h":"図面という「狙い」に対して、実際にどう「出来上がった」かという品質です。","c":1,"e":"狙った通りの品質（製造品質）を高い適合度で実現することが、現場の使命です。"},{"m":3,"q":"研修のまとめにおいて、過剰品質を避けるために重要だと述べられているバランスはどれですか？","o":["社長の給料と従業員の給料のバランス","お客様の要求とコストのバランス","国内販売と海外輸出のバランス","勤務時間と休憩時間のバランス"],"h":"「経済的な形」で「要求を満たす」ことの折り合いをつけることです。","c":1,"e":"お客様が認める価値（要求）と、それを生むための支出（コスト）のバランスこそが、品質マネジメントの本質的な検討事項です。"},{"m":4,"q":"TQM（Total Quality Management）の定義として、最も適切なものはどれですか？","o":["検査部門の人数を最大化する活動","品質を中核に、組織の全員参加で長期的な成功を目指す経営の方法","不良品を自動で排除するITシステムの導入","社長一人で品質方針を決定する管理手法"],"h":"「品質」「全員参加」「経営」というキーワードに注目してください。","c":1,"e":"TQMは単なる現場の活動ではなく、全社員が参画して顧客満足と社会の利益を目指す経営そのものです。"},{"m":4,"q":"TQMとISO 9001の関係性について、正しい説明はどれですか？","o":["両者は全く無関係である","ISO 9001はTQMという広い経営哲学の中の一部システムである","ISO 9001を取得すればTQMは不要になる","TQMはISO 9001よりも守備範囲が狭い"],"h":"TQMという「健康哲学」を実現するための「計画書」がISO 9001であるという例えを思い出してください。","c":1,"e":"TQMは社会の利益や構成員の満足まで含む広範な概念であり、ISO 9001はその中で製品の適合性に特化した枠組みを提供します。"},{"m":4,"q":"TQMにおいて、トップ経営陣が定めた目標を各部門や個人に展開し、PDCAを回すトップダウンの活動を何と呼びますか？","o":["在庫管理","方針管理","労務管理","外注管理"],"h":"「目標ありき」から出発し、挑戦的な目標を達成するための武器です。","c":1,"e":"方針管理は、経営戦略を現場のアクションにまで落とし込み、組織一丸となって高い目標を達成するための仕組みです。"},{"m":4,"q":"方針管理において設定されるべき「目標」の性質として、適切なものはどれですか？","o":["誰でも簡単に達成できる低い目標","現状のやり方の延長で達成できる目標","新しいアイデアが必要な「挑戦目標」","具体的な数字のない曖昧な目標"],"h":"「必達」を目指すために、ムダとり以上に創造性が求められる目標です。","c":2,"e":"方針管理では、現状打破が必要な高い目標を設定し、それを達成するための施策を全社で実行します。"},{"m":4,"q":"現場の第一線で働く人々が、自主的に継続的な改善を行うボトムアップの活動を何と呼びますか？","o":["QCサークル活動","役員連絡会","中長期計画策定","採用面接"],"h":"「全員参加」の土台となり、現場の足腰を強くする活動です。","c":0,"e":"QCサークルは、現場の要員が自ら学び、問題を解決することで、職場の活性化と自己実現を図ります。"},{"m":4,"q":"TQMを実施することで得られる「無形効果」に含まれるものはどれですか？","o":["不良率の具体的な数値低下","原価の5%低減","コミュニケーションの改善や個人のやる気向上","新工場の建設"],"h":"数字には表れにくいが、組織の体質を強くする心理的・組織的な変化です。","c":2,"e":"相互啓発や意思疎通の円滑化など、人間性を尊重した明るい職場づくりもTQMの重要な成果です。"},{"m":4,"q":"TQMという「管理技術」を導入する際、最も優先すべき「企業の本質」は何ですか？","o":["資料の作成能力","会議の回数","固有技術（専門知識や技術開発力）","印鑑の押し方"],"h":"管理技術がどんなに優れていても、この本質を越えることはできません。","c":2,"e":"TQMはあくまで手段であり、その企業にしかない「固有技術」を強化するために活用されるべきです。"},{"m":4,"q":"ホンダの事例において、技術研究所が一時的にTQMから離脱した理由は何ですか？","o":["予算がなくなったから","管理のパターン化が、自由なチャレンジや創造性を阻害する恐れがあったから","社員が全員退職したから","ISOの審査に落ちたから"],"h":"「達成度評価」を気にしすぎると、目標がどう変化しがちか考えてください。","c":1,"e":"評価を恐れて目標が「達成可能な無難なもの」になることを防ぎ、未知への挑戦を優先するための経営判断でした。"},{"m":4,"q":"TQMが全社的に機能するために必要な「車の両輪」の組み合わせはどれですか？","o":["「広告」と「宣伝」","「方針管理（トップダウン）」と「QCサークル（ボトムアップ）」","「国内販売」と「海外輸出」","「採用」と「教育」"],"h":"戦略を伝える動きと、現場を強くする動きの連動です。","c":1,"e":"経営の方向性を示す「方針管理」と、現場の実行力を支える「QCサークル」が揃って初めてTQMは機能します。"},{"m":4,"q":"研修のまとめにおいて、TQMは何に例えられていましたか？","o":["企業の「体質改善プログラム」","一回限りの「外科手術」","一時的な「栄養剤の投与」","単なる「看板の掛け替え」"],"h":"常に調整し、「生きたシステム」として使い続ける継続的な活動の比喩です。","c":0,"e":"TQMは一時的な流行ではなく、継続的な改善を通じて企業の健康（競争力）を維持・向上させるプログラムです。"},{"m":5,"q":"製品をどれだけ精密に作っても生じてしまう、寸法や重量などの品質特性の微細な差を何と呼びますか？","o":["標準化","ばらつき（変動）","適合","公差"],"h":"目標値（中心）からの「ゆらぎ」を指す言葉です。","c":1,"e":"製造工程には必ず「ばらつき」が存在します。この幅を許容範囲（規格）内に小さく収めることが品質管理の目的です。"},{"m":5,"q":"データの「全体の姿」や「中心位置」「ばらつきの大きさ」を視覚的に把握するのに有効な手法は何ですか？","o":["チェックシート","パレート図","ヒストグラム","散布図"],"h":"柱状のグラフで、データの分布状況を確認する道具です。","c":2,"e":"ヒストグラムを用いることで、現在の工程が規格に対して余裕があるのか、ばらつきが大きすぎないかを一目で判断できます。"},{"m":5,"q":"製造工程でばらつきが発生する主な原因とされる「4M」に含まれない要素はどれですか？","o":["Man（人）","Money（資金）","Machine（機械）","Material（材料）"],"h":"生産の3要素に「Method（方法）」を加えたものが4Mです。","c":1,"e":"品質のばらつきを分析する際は、人、設備、材料、方法の4つの切り口で原因を探るのが基本です。"},{"m":5,"q":"作業者の熟練度の差や集中力の欠如によって生じる「Man（人）」のばらつきを抑える対策として、適切なものはどれですか？","o":["機械の回転数を上げる","教育・訓練の実施や作業の標準化","材料の仕入れ先を増やす","検査を廃止する"],"h":"「誰がやっても同じ結果が出る」状態を作るための活動です。","c":1,"e":"教育訓練によって技能の差を埋め、標準作業を徹底させることで、人による品質の変動を最小限にします。"},{"m":5,"q":"設備の摩耗や設定値の変動など「Machine（機械）」に起因するばらつきを防ぐための「予防措置」は何ですか？","o":["事後修理","清掃・注油・点検などのメンテナンス","機械の買い替え","作業員の増員"],"h":"故障してから直すのではなく、常にベストな状態を維持する活動です。","c":1,"e":"日常的な点検や清掃といった「予防保全」が、機械起因の不適合発生を未然に防ぎます。"},{"m":5,"q":"「Material（材料）」のばらつきによる歩留まり低下を防ぐための管理視点はどれですか？","o":["材料の価格交渉","受入検査の実施と材料ロットの管理","倉庫の面積拡大","材料の廃棄を禁止する"],"h":"「中身が違うものが混じっていないか」を確認するステップです。","c":1,"e":"ロットごとの成分差や不純物をチェックし、基準外の材料を工程に入れないことが品質安定に直結します。"},{"m":5,"q":"5番目のMとして「Measurement（測定/計測）」が追加される理由は何ですか？","o":["測定器が安価だから","測定精度がばらつくと、良品を不良と誤判定するリスクがあるから","測定時間を増やすため","計算を複雑にするため"],"h":"「ものさし」自体が狂っていた場合の影響を考えてください。","c":1,"e":"測定のばらつきは、正しい判断を狂わせ、無駄な廃棄や不良の流出を招くため、4Mと同様に重要視されます。"},{"m":5,"q":"「環境（Environment）」要因のうち、機械の寸法変化や樹脂の粘度変動に直接影響を与える物理的条件はどれですか？","o":["照明の明るさ","騒音レベル","温度・湿度","工場の壁の色"],"h":"季節や天候によって変化し、材料の性質を変えてしまう要因です。","c":2,"e":"温湿度の変化は、材料の収縮率や機械の熱変位に影響を与え、目に見えないばらつきの原因となります。"},{"m":5,"q":"照明不足や騒音が原因で発生する、作業者の集中力低下によるミスを何と呼びますか？","o":["設計上の欠陥","ヒューマンエラー（ポカミス）","設備故障","不可抗力"],"h":"環境が人の感覚を鈍らせることで起きる「うっかりミス」のことです。","c":1,"e":"劣悪な作業環境は作業者にストレスを与え、ポカミスの発生率を高めるため、環境整備も品質管理の一部です。"},{"m":5,"q":"樹脂成形部品の例で、季節による室温上昇が品質に影響した場合、管理者が取るべき行動として最も適切なものはどれですか？","o":["作業員に「もっと集中しろ」と指示する","室温の変化を監視し、異常検知時のアラートや空調管理を徹底する","成形機の速度を2倍にする","何もしない"],"h":"精神論ではなく、事実（データ）に基づいた仕組みで解決する方法です。","c":1,"e":"環境変化をデータで捉え、それに対応する仕組み（アラートや設備調整）を構築することが、安定した品質を生む土台となります。"},{"m":6,"q":"「品質を上げるとコストが上がり、生産性が落ちる」という考え方は、現代の品質マネジメントではどう捉えられていますか？","o":["一部の高級品には当てはまる","間違い（錯覚）であり、不良低減こそが生産性向上の唯一の方法である","製造業では正しい","短期的には正しい"],"h":"不良が発生した際に生じる「手直し」や「廃棄」という膨大なムダを想像してください。","c":1,"e":"不良品を作る時間や材料はすべてムダです。これらを排除することが最も直接的なコストダウンと効率化に繋がります。"},{"m":6,"q":"不良品が発生した際に生じるムダの中で、顧客に渡ってしまった場合に最も大きな損失となるものはどれですか？","o":["材料のムダ","一時保管のムダ","流出時の信用のムダ","手戻りのムダ"],"h":"クレーム対応や信頼回復には、社内の作り直しとは比較にならないコストがかかります。","c":2,"e":"社会的な信用の失墜やリコール費用などは、企業の存続を揺るがすほどの重大な損失（ムダ）となります。"},{"m":6,"q":"「品質は工程でつくり込まれるもの」という原則において、検査の役割と限界について正しい説明はどれですか？","o":["検査を厳重にすれば不良品そのものが減る","検査は不適合品を取り除くだけであり、不良を作らない活動ではない","検査員を増やすことが生産性を上げる近道である","最新の検査機があれば是正処置は不要になる"],"h":"「悪いものを流さない」ことと「悪いものをつくらない」ことの違いを考えましょう。","c":1,"e":"検査はフィルターに過ぎません。不良そのものを減らすには、発生源である「工程」の改善が不可欠です。"},{"m":6,"q":"不良の再発を防止するために、表面的な修正ではなく、真の原因を突き止める手法は何ですか？","o":["作業者への厳重な注意","「なぜなぜ問答」の徹底","不良品を隠す対策","マニュアルのページ数を増やす"],"h":"「なぜ」を繰り返して要因を掘り下げ、仕組みの欠陥を見つける手法です。","c":1,"e":"精神論での注意ではなく、「なぜミスが起きたのか」という仕組みの不備にまで踏み込むことが重要です。"},{"m":6,"q":"ヒューマンエラーが発生しにくい仕組みを導入し、不良品ができないようにすることを何と呼びますか？","o":["ポカヨケ（ミスよけ）","ラインストップ","多能工化","自働化の解除"],"h":"作業者の注意不足があっても、物理的にミスが起きないようにする仕掛けです。","c":0,"e":"ポカヨケのようなエラーに耐えられるシステムを設計し直すことが、生産性を恒久的に改善する鍵です。"},{"m":6,"q":"ジャスト・イン・タイム（JIT）において、在庫を削減することの真のねらいは何ですか？","o":["倉庫の清掃を楽にする","問題（不良や故障）を顕在化させ、改善意識を定着させる","納期をわざと遅らせる","原材料を安く買う"],"h":"在庫という「隠れみの」をなくした時に何が見えてくるかを考えてください。","c":1,"e":"余裕をなくすことで潜在的なムダを表面化させ、現場全体で問題を解決するサイクルを強制的に回します。"},{"m":6,"q":"在庫が豊富にある状態で、機械故障や不良が発生した時に起こりがちな「良くない反応」はどれですか？","o":["すぐにラインを止める","「在庫があるから大丈夫」と根本解決を先送りする","在庫をすべて廃棄する","納期を早める"],"h":"余裕（クッション）があることで、危機感が薄れてしまう弊害に注目してください。","c":1,"e":"在庫は問題点を隠し、改善活動の芽を摘んでしまうため、長期的には生産性を停滞させます。"},{"m":6,"q":"たまご焼きの「焦げ付き不良」の事例において、最初に行われた品質管理の基本動作は何ですか？","o":["焼き釜の買い替え","データ分析（層別）による問題の顕在化","作業員の解雇","レシピの変更"],"h":"「いつ、どのような条件で」起きているかを細かく分析するステップです。","c":1,"e":"事実（データ）に基づいて、特定の時期や条件で多発していることを突き止めるのが解決の第一歩です。"},{"m":6,"q":"焦げ付き不良の是正処置として導入された「自働化（ポカヨケ）」の内容は何ですか？","o":["タイマーを持たせた","時間や温度を自動制御する仕組みにした","焦げを削る機械を入れた","ライン速度を半分にした"],"h":"作業者の「手作業」や「感覚」に依存していた部分をどう変えたか。","c":1,"e":"人のばらつきに左右されない仕組みにすることで、手順のムラを物理的に排除し、品質を安定させました。"},{"m":6,"q":"不良低減活動が生産性向上に繋がる「最も直接的な理由」は何ですか？","o":["給料を下げられるから","不良というムダを排除し、資源を付加価値を生む活動に振り向け直せるから","休憩時間を増やせるから","工場を小さくできるから"],"h":"手直しや廃棄に使っていたエネルギーを、本来の生産に集中できるメリットを考えましょう。","c":1,"e":"不良低減はムダの除去そのものであり、工数と資源を正しく活用するための最も強力な戦略です。"},{"m":7,"q":"業務を「誰でも再現可能な状態」にし、品質のばらつきをなくす活動を何と呼びますか？","o":["個別化","標準化","多様化","複雑化"],"h":"「特定の誰か」しかできない状態を解消し、組織の共通ルールを作ることです。","c":1,"e":"標準化はPDCAサイクルを維持するための土台であり、仕事の質を一定に保つための不可欠なインフラです。"},{"m":7,"q":"一度解決した問題が二度と起きないように、標準を定めて管理することを何と呼びますか？","o":["手直し","応急処置","歯止め","目隠し"],"h":"坂道を登った車が後ろに下がらないように「車止め」を置くイメージです。","c":2,"e":"不適合が発生した際、原因を突き止めて手順書（標準）に反映させることで、再発を防ぐ「歯止め」がかかります。"},{"m":7,"q":"標準化において、個人の頭の中にある「暗黙知」を、誰もが利用できる「形式知」に変えるために必要なプロセスは何ですか？","o":["可視化と明文化","口頭での伝承","個人の記憶力の強化","作業速度の倍増"],"h":"図解したり、文章に書き起こしたりする作業を指します。","c":0,"e":"フロー図での「可視化」や手順書の「明文化」によって、経験の浅い人でも正しい判断と行動ができるようになります。"},{"m":7,"q":"標準が現場で機能しているかを検証する「3つのチェックポイント」に含まれないものはどれですか？","o":["標準があったか（有無）","標準は適切であったか（妥当性）","標準に従って仕事をしたか（遵守）","標準を作った人は誰か（氏名）"],"h":"「ルールがあるか」「ルールは正しいか」「ルールを守ったか」の3点です。","c":3,"e":"重要なのは「誰が作ったか」ではなく、その標準が合理的で、かつ実際に守られているかどうかです。"},{"m":7,"q":"再現性の高い手順書を作成するために、必ず明記すべき「3要素」は何ですか？","o":["日付・天候・気分","目的・結果・行動（手順）","予算・売上・利益","氏名・年齢・住所"],"h":"「なぜやるか」「どうなれば成功か」「具体的にどう動くか」を示します。","c":1,"e":"この3要素が揃うことで、作業の迷いがなくなり、誰がやっても同じ結果（再現性）が得られます。"},{"m":7,"q":"具体例1の「データ集計の不備」において、ピボットテーブルで正しい集計ができなかった根本原因は何ですか？","o":["パソコンの性能不足","商品名や担当者名の表記が不統一（表記の揺らぎ）だったこと","ソフトの使い方が難しすぎた","データ量が多すぎた"],"h":"「カフェオレ」と「カフェ・オ・レ」が混在している状態を思い出してください。","c":1,"e":"データの品質を保つためには、入力ルールを標準化し、表記を統一することが分析の前提条件となります。"},{"m":7,"q":"具体例2の「計測機器の期限切れ」が発生した際、組織が最初に行うべき重要な評価は何ですか？","o":["新しい機器のカタログ請求","それまでにその機器で測定した結果の妥当性の評価","担当者への罰金","ラベルの貼り替え"],"h":"「狂ったものさしで測られた過去の製品」に問題がないか確認する必要があります。","c":1,"e":"機器の不適合は重大なPL（製造物責任）リスクに直結するため、過去の測定値への影響を調査し、記録に残す義務があります。"},{"m":7,"q":"具体例3の「外部委託（アウトソース）」において、品質を確保するために委託先と共有すべきものは何ですか？","o":["自社の社外秘データすべて","具体的な合否判定基準を明文化した手順書（標準）","経営陣の経歴","他社の失敗事例"],"h":"「いつもと同じ」という曖昧な指示を避けるためのツールです。","c":1,"e":"委託先に対しても具体的な「標準」を共有し、管理指標（KPI）を定めることで、初めて品質のコントロールが可能になります。"},{"m":7,"q":"ヒューマンエラーを防ぐために、人の注意だけに頼らず、ミスを誘発しない仕組みを組み込むことを何と呼びますか？","o":["精神論","ポカヨケ","残業","監視"],"h":"「ついうっかり」を物理的・システム的に防ぐ仕掛けのことです。","c":1,"e":"標準化の中にポカヨケを組み込むことで、経験や集中力に左右されない強固な製造ラインが構築されます。"},{"m":7,"q":"本研修のまとめにおいて、標準化は何に例えられていましたか？","o":["一度作ったら変えてはいけない「石碑」","改良し続け、誰もが再現できる「料理のレシピ」","その場しのぎの「メモ書き」","鍵のかかった「金庫」"],"h":"暗黙知を形式知に変え、常に更新し続ける比喩です。","c":1,"e":"レシピ（標準）を公開し、さらに美味しくするために更新（継続的改善）し続ける姿勢こそが、標準化の本質です。"},{"m":8,"q":"品質管理（QC）における「問題」の定義として、最も適切なものはどれですか？","o":["上司に怒られること","「あるべき姿（目標・標準）」と「現実の姿（実態）」とのギャップ","作業時間が予定より短くなること","機械が新しくなること"],"h":"理想と現実の間に生じている「差」に注目してください。","c":1,"e":"目標や標準に対して、現実が追いついていない状態を「問題」と捉え、その差を埋めることが問題解決の本質です。"},{"m":8,"q":"現状把握において、データを担当者別、機械別、時間帯別などの観点で分け、ばらつきや違いを明確にする手法を何と呼びますか？","o":["統合","層別（そうべつ）","暗記","省略"],"h":"「一まとめ」にするのではなく、「小分け」にして比較する手法です。","c":1,"e":"データを層別することで、どこに問題が集中しているのか、あるいは何が原因で違いが出ているのかを特定しやすくなります。"},{"m":8,"q":"データ分析だけでなく、実際に「現場」へ行き、「現物」を確認し、「現実」を把握する行動指針を何と呼びますか？","o":["三権分立","三現主義","三位一体","三日坊主"],"h":"机上の議論ではなく、生きた事実を自分の目で確かめる姿勢です。","c":1,"e":"データは事実の「断片」に過ぎません。三現主義を徹底することで、データに表れない真実を掴むことができます。"},{"m":8,"q":"原因を洗い出す際、Man（人）、Machine（設備）、Material（材料）、Method（方法）の4つの切り口で考えるフレームワークは何ですか？","o":["3C","4P","4M","5S"],"h":"製造現場における「生産の4要素」の頭文字です。","c":2,"e":"4Mの視点を持つことで、漏れなくダブりなく要因を整理し、特性要因図などを作成する助けとなります。"},{"m":8,"q":"表面的な現象への対策（モグラ叩き）を避け、根本的な原因にさかのぼって除去する再発防止策を何と呼びますか？","o":["応急処置","修正","是正処置","暫定処置"],"h":"「起きたことへの対処」ではなく、「二度と起こさないための処置」です。","c":2,"e":"真の原因（真因）を取り除く「是正処置」を行わない限り、問題は必ず形を変えて再発します。"},{"m":8,"q":"問題が発見された際、真っ先に行うべき「不適合品の影響拡大や顧客への流出を防ぐための処置」は何ですか？","o":["応急処置（封じ込め）","設備投資の計画","標準作業書の改訂","長期休暇の取得"],"h":"まずは被害を食い止める「止血」のような作業です。","c":0,"e":"根本原因の追究には時間がかかるため、まずは応急処置によって問題をその場で封じ込めることが最優先です。"},{"m":8,"q":"作業者の不注意などの「ヒューマンエラー」が発生しにくい仕組みを、物理的・システム的に導入することを何と呼びますか？","o":["精神論","ポカヨケ","残業","監視"],"h":"「注意しろ」と言う代わりに、ミスができないような「仕掛け」を作ることです。","c":1,"e":"ポカヨケは「製造中の品質監視」の仕組みであり、人の意識に頼らずに品質を工程で作り込む有効な手段です。"},{"m":8,"q":"たまご焼きの「焦げ付き不良」の事例において、「年末に不良が増える」という事実から導き出された真の原因は何でしたか？","o":["冬の寒さで卵が凍ったこと","繁忙期による作業量の増加と、それに伴う撹拌手順のばらつき（ムラ）","新倉くんのやる気がなくなったこと","砂糖の量を間違えたこと"],"h":"「なぜ」を繰り返して、作業のやり方がどう変わったかに注目してください。","c":1,"e":"忙しさによって作業の「ムラ」が生じたことが真因であり、これを解決するために自動制御（自働化）が導入されました。"},{"m":8,"q":"問題解決を通じて得られた教訓（レッスンズラーンド）は、組織内でどのように扱うべきですか？","o":["失敗は恥ずかしいので隠しておく","担当者だけの秘密にする","公にして教訓を共有化し、次に成功するための糧とする","すぐに忘れる"],"h":"組織全体の「リスクマネジメント」の有効性を高めるための財産と捉えます。","c":2,"e":"失敗事例の共有は、他の部署や将来のプロジェクトにおける同様のミスを防ぐための強力な武器になります。"},{"m":8,"q":"本研修のまとめにおいて、問題解決の「三原則」に含まれないものはどれですか？","o":["事実に基礎を置く","真の原因を根絶する","システムとして定着させる","経験と勘を最優先する"],"h":"科学的・論理的なプロセスとしてふさわしくないものを選んでください。","c":3,"e":"個人の経験や勘は大切ですが、問題解決においてはデータと事実に基づく客観的なプロセスが不可欠です。"},{"m":9,"q":"品質マネジメントや業務改善において、5W1Hを単なる情報整理ツール以上のものとして捉えたとき、どのような役割を持つと述べられていますか？","o":["単なるメモ書きの代わり","仕事の目的（Why）を明確にし、ルール（How）を定める思考のフレームワーク","上司への言い訳を作る道具","漢字の読み方を調べる辞書"],"h":"「生きた文書」を作るために不可欠な、論理的な組み立て方のことです。","c":1,"e":"5W1Hは、業務の「意義」と「手段」を体系的に結びつけ、組織として成果を出すための思考の土台となります。"},{"m":9,"q":"活動やプロジェクトを開始する際、最も優先して問いかけるべき要素はどれですか？","o":["Who（誰がやるか）","When（いつやるか）","Why（なぜやるか/目的）","Where（どこでやるか）"],"h":"「その目的は何？目的から言って適切か？」という問いがすべての出発点です。","c":2,"e":"目的（Why）が不明確なままでは、その後の手順（How）が本当に適切であるかどうかの判断ができません。"},{"m":9,"q":"作業手順書に「どのように（How）」だけでなく「なぜ（Why）」を記載することのメリットは何ですか？","o":["文字数が増えて立派に見える","作業者にその手順の必要性（根拠）が伝わり、納得感を持って実行できる","インクの消費量を確認できる","作成者の苦労をアピールできる"],"h":"洗浄作業の例で「どこまでやるか」の目標レベルを左右するのは何かを考えましょう。","c":1,"e":"理由（Why）がわかれば、作業者は手順の重要性を理解し、状況に応じた適切な判断や丁寧な作業が可能になります。"},{"m":9,"q":"業務を標準化し、誰が行っても同じ結果を生み出すことを何と呼びますか？","o":["偶然性","再現性","特異性","複雑性"],"h":"品質の「ばらつき」をなくし、安定した状態を確立することを指します。","c":1,"e":"5W1Hを用いて手順を明文化することで、担当者が変わっても同じ品質を維持できる「再現性」が確保されます。"},{"m":9,"q":"内部監査において、被監査者からより多くの具体的な情報を引き出すために有効な質問形式はどれですか？","o":["「はい/いいえ」で答えられる完結形質問","5W1Hを用いた発展形質問","沈黙を守る","世間話だけで終わらせる"],"h":"「誰が？」「なぜ？」と掘り下げることで、実態が見えてきます。","c":1,"e":"発展形質問（オープンクエスチョン）を行うことで、表面的な回答の裏にある「実際に行われていること」を検証できます。"},{"m":9,"q":"戦略策定や具体的な計画書において、5W1Hに「数量（How many）」や「金額（How much）」などを加えた拡張形を何と呼びますか？","o":["3S","4M","6W4H（または5W2H）","PDCA"],"h":"数値や期間（How long）を明示し、実行の確率を高めるためのフレームワークです。","c":2,"e":"ビジネスでは数値目標が不可欠です。6W4Hを用いることで、計画は「やりたいこと」から「やり抜く計画」へと具体化されます。"},{"m":9,"q":"食品安全の「原材料受入れルール」において、キャベツや白菜といった対象物を特定する要素はどれですか？","o":["Who","Where","What","When"],"h":"「何を」扱うかを明確にする項目です。","c":2,"e":"対象（What）が明確でないと、管理すべき基準が曖昧になり、重大な事故（異物混入など）を防ぐことができません。"},{"m":9,"q":"SWOT分析で出た「ネット通販強化」という戦略を具体化する際、「いつまでに売上を○%にする」という記述はどの要素に該当しますか？","o":["Who","When / How long","Where","Why"],"h":"期限やスケジュール、達成すべき期間を定める項目です。","c":1,"e":"期限（When）と期間（How long）を数値で示すことで、戦略の優先順位や進捗管理が可能になります。"},{"m":9,"q":"戦略を「やり抜く計画書」に昇華させるために、5W2Hの記述において重要だと述べられているものは何ですか？","o":["抽象的な表現","美しいイラスト","具体的な名称、数値、行動（固有名詞）","専門用語の多用"],"h":"「誰が見ても具体的に何をすべきかイメージできること」が大切です。","c":2,"e":"具体的な固有名詞や数値を入れることで、曖昧さが排除され、組織全体が同じ方向を向いて行動できるようになります。"},{"m":9,"q":"本研修のまとめにおいて、目的が明確化されることで、単なる「作業」は何に変わると述べられていますか？","o":["「苦業」","「目標達成への貢献」","「ただの記録」","「終わりのない旅」"],"h":"Why（なぜ）を理解することで、仕事の意義が変化します。","c":1,"e":"目的を理解して働くことは、自分の行動が組織の目標にどう役立っているかを自覚することであり、仕事の質を高める原動力になります。"},{"m":10,"q":"製造業のフローにおいて、企画・設計・開発といった「川の上流」にあたる工程で品質を保証する考え方を何と呼びますか？","o":["下流管理","源流管理","在庫管理","事後管理"],"h":"不具合の原因を「根っこ（源）」から断つというイメージです。","c":1,"e":"源流段階で品質を作り込むことができれば、後の製造や販売工程でのトラブルを劇的に減らすことができます。"},{"m":10,"q":"製品が完成した後の「検査」にはない、源流管理ならではのメリットは何ですか？","o":["不良品を捨てるのが楽になる","トラブルが起こる前に問題に対処でき、時間やコストの面で有利になる","検査員の人数を増やせる","図面を書かなくて済む"],"h":"「起きてから直す」のと「起きないようにする」のでは、どちらが効率的かを考えましょう。","c":1,"e":"後工程で不具合が見つかると手直しや回収に膨大なコストがかかりますが、源流での対策（フロントローディング）は最小限のコストで済みます。"},{"m":10,"q":"設計段階において、図面や設計書に対して他部署から意見や指摘をもらい、不具合を未然に見つけ出す活動を何と呼びますか？","o":["DR（デザインレビュー：設計審査）","PL（製造物責任）","KPI（重要業績評価指標）","BCP（事業継続計画）"],"h":"「設計（デザイン）を審査（レビュー）する」活動のことです。","c":0,"e":"DRは、製造や品質保証など多様な視点を入れることで、設計者一人の視点では気づけないリスクを抽出する重要な場です。"},{"m":10,"q":"DR（設計審査）において、設計者が目指すべき「最も理想的な状態」とはどのようなものですか？","o":["たくさんの指摘をもらって図面を何度も直すこと","DR自体を開催しないこと","指摘を受ける必要がないほど、最初から不具合のない図面を作成すること","他部署の意見をすべて無視すること"],"h":"「手直し」というムダを発生させないための理想を考えてください。","c":2,"e":"DRでの指摘は貴重ですが、最初から高い完成度で設計を行うことが、開発期間の短縮と品質向上に繋がります。"},{"m":10,"q":"まだ起こっていない故障やトラブルを予測し、その影響度や発生頻度を客観的に評価するリスクマネジメント手法は何ですか？","o":["PDCA","FMEA（故障モード影響解析）","5S活動","3現主義"],"h":"「故障モード（不具合の形態）」が「影響」を及ぼすのを「解析」する手法です。","c":1,"e":"FMEAを用いることで、どの部品や機能に高いリスクが潜んでいるかを数値化し、優先的に対策を打つことができます。"},{"m":10,"q":"FMEAにおいて、対策を打つべき「優先順位」を決めるために評価される要素に含まれないものはどれですか？","o":["不具合の影響の大きさ（重大性）","発生する頻度（発生確率）","検出のしやすさ","設計者の勤続年数"],"h":"「危険か」「起きやすいか」「見つけられるか」の3点が基本です。","c":3,"e":"客観的なリスク評価（RPN：リスク優先数）によって、限られた資源をどこに投入すべきかを判断します。"},{"m":10,"q":"トヨタ自動車などで活用されている、特に「変化点（変更点）」に着目して潜在リスクを想像する手法は何ですか？","o":["DRBFM","ISO 9001","TQM","QCサークル"],"h":"「Design Review Based on Failure Mode」の略称です。","c":0,"e":"「いつもと違う部分」こそが不具合の温床になりやすいため、変化点に絞って議論を深めるDRBFMは非常に有効です。"},{"m":10,"q":"未然防止の精度を高めるために、活用すべき「過去の情報」として適切なものはどれですか？","o":["昨日の昼食のメニュー","過去のプロジェクトでの指摘事項や市場クレームの記録（ログ）","競合他社の株価","流行のニュース"],"h":"「同じミスを繰り返さない」ために必要な情報は何かを考えましょう。","c":1,"e":"過去の失敗（教訓）をデータベース化し、設計段階でチェックリストとして活用することが、源流管理の質を高めます。"},{"m":10,"q":"収集した過去の不具合情報を、関係者間で「知っているだけでなく、理解している状態」にすることを何と呼びますか？","o":["共有化","周知化","個別化","秘密化"],"h":"単に資料を配るだけでなく、全員が腹落ちして意識を持つ状態です。","c":1,"e":"周知化を徹底することで、チーム全体がリスクに対して敏感になり、設計段階での「ポカミス」を防ぐことができます。"},{"m":10,"q":"本研修のまとめとして、源流段階で不具合を潰す活動を「川の流れ」以外に例えると何と言えますか？","o":["泥縄式の対応","フロントローディング（前倒しでの課題解決）","成り行き任せの運営","事後処理のスピードアップ"],"h":"開発の早い段階に負荷をかけて、後の苦労を減らす考え方です。","c":1,"e":"フロントローディングを実践することで、量産開始後のトラブルを最小限に抑え、スムーズな製品立ち上げが可能になります。"},{"m":11,"q":"FMEA（故障モード影響解析）を一言で表すと、どのような手法ですか？","o":["起きてしまった事故の犯人探しをする手法","まだ起きていない潜在的な失敗を予測し、リスクを数値化して改善を促す手法","検査員の人数を最適化するための計算手法","過去の売上データを分析して将来の利益を予測する手法"],"h":"「故障（Failure）」が起きる前に「解析（Analysis）」するという名前に注目してください。","c":1,"e":"FMEAの本質は、不具合が出る前に「どこにリスクが潜んでいるか」を科学的に特定し、先手を打つことにあります。"},{"m":11,"q":"製品の設計段階を対象とし、設計上の不備が原因で起こる故障を予測するFMEAの種類は何ですか？","o":["工程FMEA（PFMEA）","設計FMEA（DFMEA）","設備FMEA","販売FMEA"],"h":"「Design（設計）」の頭文字をとった略称です。","c":1,"e":"DFMEAは、製造方法（工程）でカバーする前の「図面や仕様」そのものの弱点を洗い出すために行います。"},{"m":11,"q":"FMEAを効果的かつ客観的に進めるために推奨されるチーム編成（CFT）のあり方はどれですか？","o":["設計担当者一人で黙々と作成する","設計、製造、品質、営業など関連部門が集まった部門横断的チームで行う","外部のコンサルタントに丸投げする","社長がすべての数値を決定する"],"h":"一人の主観に頼らず、多角的な視点（アプローチ）でリスクを見つけることが重要です。","c":1,"e":"部門横断的チーム（CFT）で実施することで、設計の視点だけでなく「作りやすさ」や「市場での壊れやすさ」などの知見を結集できます。"},{"m":11,"q":"FMEAを実施すべき「最も適切なタイミング」はいつですか？","o":["製品が完成し、出荷された後","量産開始後、最初の不具合が出た時","設計・開発の初期段階（量産開始前）","ISOの審査が来る直前"],"h":"「予防（未然防止）」を目的とする活動であることを思い出してください。","c":2,"e":"量産が始まってからでは手直しコストが膨大になります。必ず「作る前（設計・開発の初期）」に完了させるのが鉄則です。"},{"m":11,"q":"リスクの大きさを測る「RPN（リスク優先数）」を算出するために掛け合わせる3つの要素はどれですか？","o":["価格、重さ、長さ","影響度（S）、発生度（O）、検出度（D）","気温、湿度、気圧","人数、時間、予算"],"h":"「どれほど酷いか」「どれほど起きるか」「見つけられるか」の3点です。","c":1,"e":"Severity（厳しさ）、Occurrence（頻度）、Detection（検出性）の3軸で評価し、その積（掛け算）でリスクを定量化します。"},{"m":11,"q":"RPNの値にかかわらず、「安全や法規制に関わる致命的な欠陥」を示すため最優先で改善すべき評価項目は何ですか？","o":["発生度（O）が5の項目","影響度（S）が9または10の項目","検出度（D）が1の項目","RPNが50以下の項目"],"h":"たとえ「めったに起きない」としても、「起きたら命に関わる」事象をどう扱うべきか考えてください。","c":1,"e":"Sが9〜10の項目は、リコールや法的違反に直結するため、他の数値が低くても放置してはいけない最優先事項です。"},{"m":11,"q":"FMEAの対策を検討する際、最も理想的な改善の方向性はどれですか？","o":["検査（D）を強化して、100%見つけるようにする","ポカヨケなどを導入し、故障の原因そのものの発生度（O）を下げる","不具合が起きても気づかないようにする","報告書の書式を綺麗にする"],"h":"「検出（見つける）」よりも「予防（起こさない）」に焦点を当てることが、FMEAの根本的な考え方です。","c":1,"e":"検査の強化はコストを上げますが、発生原因を絶つ（Oを下げる）対策は、不良そのものをなくし、生産性を最大化します。"},{"m":11,"q":"作業者がうっかりミスをしても不適合を発生させない、あるいは造らないための物理的・システム的な仕組みを何と呼びますか？","o":["精神注入","ポカヨケ（エラー防止法）","全数検査","口頭注意"],"h":"FMEAの推奨処置として、ヒューマンエラー対策の切り札となる言葉です。","c":1,"e":"ポカヨケは発生度（O）を極限まで下げるための最も有効な「予防管理」の手法です。"},{"m":11,"q":"FMEAを「一度作って終わり」にせず、トラブルや変更のたびに改訂し続ける状態を指す言葉は何ですか？","o":["死んだ文書","生きた文書（リビングドキュメント）","歴史的資料","門外不出の秘伝書"],"h":"組織の知識を常に最新に保ち、活用し続ける姿勢を指します。","c":1,"e":"現場で起きた是正処置の結果をFMEAにフィードバックし続けることで、組織の「リスク予知能力」が向上します。"},{"m":11,"q":"FMEAで分析した結果（重要な管理項目）は、次にどの文書に反映させる必要がありますか？","o":["社員名簿","コントロールプラン（CP）や作業指示書","去年の決算書","食堂のメニュー表"],"h":"分析結果を「実際の現場の管理ルール」に繋げなければ意味がありません。","c":1,"e":"FMEAで見つけたリスクを、現場の点検項目や手順（コントロールプラン）に落とし込むことで、初めて実務としての品質保証が完結します。"},{"m":12,"q":"設計審査（DR）の定義として、最も適切なものはどれですか？","o":["完成した製品を顧客と一緒に検査するプロセス","設計が要求事項や目標を満たしているか、関係部門で体系的に評価・承認する公式なプロセス","設計者が一人で図面のミスを修正する作業","製造コストを計算して利益を確定させるだけの会議"],"h":"「関係部門が集まって」「次の段階へ進む是非を決定する」という点に注目してください。","c":1,"e":"DRは、設計の成熟度を多角的な視点で確認し、組織として「GO」を出すためのマイルストーン（節目）です。"},{"m":12,"q":"新製品の品質やコストの大部分（85%以上）は、どの段階で決まると言われていますか？","o":["原材料の購入段階","製造工程の段階","開発・設計段階（源流）","販売・アフターサービスの段階"],"h":"「源流管理」がなぜ重要視されるのか、その理由を考えてください。","c":2,"e":"設計段階で製品の構造や材料が決まるため、この段階でのミスや過剰な仕様は、後の工程で取り返すのが非常に困難です。"},{"m":12,"q":"DR（設計審査）とFMEA（故障モード影響解析）の関係について、正しい説明はどれですか？","o":["FMEAを行えばDRは不要である","DRは、FMEAなどのリスク分析結果を確認し、設計を承認する公式な場である","DRはリスクを探るツールであり、FMEAは意思決定の場である","両者は全く無関係な活動である"],"h":"FMEAは「分析ツール」、DRは「評価・承認の場」という役割の違いがあります。","c":1,"e":"FMEAで抽出されたリスクに対して、設計が適切に対策されているかをDRで最終確認します。"},{"m":12,"q":"DRにおいて、ハサミが「紙を切ることができる」といった、顧客が特に言葉にしなくても期待している要素を確認することを何と呼びますか？","o":["明示された要求事項の確認","暗黙のうちに了解されている要求事項の確認","法規制の確認","社内基準の確認"],"h":"「当たり前品質」に近い概念で、製品として最低限備わっているべき機能のことです。","c":1,"e":"カタログに載っていないような「当然の機能や安全性」まで満たしているかを確認することもDRの重要な役割です。"},{"m":12,"q":"設計された製品が、現在の工場の設備や技術で安定して作れるかどうかを評価することを何と呼びますか？","o":["顧客満足度の調査","製造・プロセス実現可能性の検討","市場占有率の予測","財務諸表の分析"],"h":"「図面の公差が今の機械（Machine）で守れるか」といった現場視点の検討です。","c":1,"e":"設計が素晴らしくても、現場で作れなければ不適合品（不良）の山を築くことになります。"},{"m":12,"q":"DRに参加すべき「多機能チーム」の構成メンバーとして、適切な組み合わせはどれですか？","o":["設計部門の担当者のみ","設計、製造、品質保証、購買、営業などの各部門の代表者","社長と経理担当者のみ","外部のコンサルタントのみ"],"h":"特定の部門では見過ごされがちなリスクを、多様な視点で発見する必要があります。","c":1,"e":"製造の作りやすさ、購買の調達しやすさ、営業の顧客ニーズなど、多角的な視点が「未然防止」の精度を高めます。"},{"m":12,"q":"DRは、問題解決の基本であるPDCAサイクルのどのフェーズにおける「最終チェック」として機能しますか？","o":["P（計画）","D（実行）","C（評価）","A（処置）"],"h":"設計は「何を作るか」を決める計画段階の活動です。","c":0,"e":"DRで承認を得ることで、設計という「計画（P）」が完了し、製造や試作という「実行（D）」へのゴーサインが出されます。"},{"m":12,"q":"具体例の「樹脂筐体設計」において、DFMEAで「影響度（S）が8以上（重大）」と評価された項目に対し、DRで確認すべきことは何ですか？","o":["その部品を廃棄すること","設計側の対策（材料変更など）が適切で、リスク（RPN）が許容レベルに下がっているか","検査員の数を2倍に増やすこと","顧客に妥協してもらうこと"],"h":"重大なリスクに対し、設計段階で「先手」を打てているかを確認します。","c":1,"e":"特に重大な影響（S=9, 10など）がある項目は、優先的に設計で解決されているかを厳しく審査します。"},{"m":12,"q":"設計ミスが製造や購買などの「後工程」に迷惑をかけないよう、初期段階で全部門の知見を導入することを何と呼びますか？","o":["部門間インターフェースの管理","事後処理","個別最適","短期決戦"],"h":"部門間のコミュニケーションを繋ぎ、連携を強化する活動です。","c":0,"e":"部門の壁を越えて情報を共有し、設計を固めることで、量産開始後の「手直し」という最大のムダを防ぎます。"},{"m":12,"q":"本研修のまとめとして、DR（設計審査）が品質保証において果たす役割を一言で表すと何ですか？","o":["図面の誤字脱字チェック","品質保証の要（かなめ）となる源流管理活動","単なる形式的な会議","製造後の不良品選別"],"h":"経営全体に関わる視点から設計を評価する、極めて重要な活動です。","c":1,"e":"DRは、企業の持続的成功のために、リスクを予見し、品質とコストを上流でコントロールする核心的な活動です。"},{"m":13,"q":"不具合の原因を製造工程の「後」に回さず、企画・設計といった上流工程で特定・改善する考え方を何と呼びますか？","o":["事後管理","源流管理","在庫管理","対面管理"],"h":"川の流れに例えて、不具合の「源（みなもと）」を管理するイメージです。","c":1,"e":"リコールなどの重大欠陥の多くは設計段階に起因するため、源流での品質保証が最も効率的で重要です。"},{"m":13,"q":"FMEA（故障モード影響解析）の根本的な狙いは何ですか？","o":["不良品を検査で見つけること","起きた事故の責任追及をすること","潜在的な故障を予測し、発生そのものを予防すること","製造コストを半分にすること"],"h":"「検出（見つける）」よりも「予防（起こさない）」に焦点を当てた活動です。","c":2,"e":"FMEAは、まだ起きていない失敗を机上で予測し、先手を打ってリスクを低減させる科学的な手法です。"},{"m":13,"q":"製品の機能や部品構成の弱点に起因する故障を、設計段階で予防するために行うFMEAは何ですか？","o":["工程FMEA（PFMEA）","設計FMEA（DFMEA）","設備FMEA","販売FMEA"],"h":"「Design（設計）」の頭文字をとった略称です。","c":1,"e":"DFMEAは、製品そのものの設計に潜むリスクを洗い出し、図面や仕様の段階で対策を講じるために行われます。"},{"m":13,"q":"リスクの優先順位を決める数値「RPN（リスク優先数）」を算出するための正しい式はどれですか？","o":["影響度(S) ＋ 発生度(O) ＋ 検出度(D)","影響度(S) × 発生度(O) × 検出度(D)","影響度(S) ÷ 発生度(O)","発生度(O) － 検出度(D)"],"h":"3つの要素を「掛け合わせる」ことで、リスクを定量化します。","c":1,"e":"Severity（酷さ）、Occurrence（頻度）、Detection（見つけにくさ）の積が高いものほど、対策の緊急度が高くなります。"},{"m":13,"q":"RPNの数値にかかわらず、最優先で改善処置を検討しなければならない項目はどれですか？","o":["検出度(D)が1の項目","影響度(S)が9または10の項目","発生度(O)が2の項目","RPNが50以下の項目"],"h":"安全や法規制に関わる「重大な影響」がある項目を思い出してください。","c":1,"e":"たとえ発生頻度が低くても、万が一起きた時に命に関わるような重大な影響（S=9, 10）があるものは、最優先対策対象です。"},{"m":13,"q":"FMEAの対策として最も理想的なのは、検査を強化することよりも何をすることですか？","o":["検出度(D)を上げること","発生度(O)を下げること（ポカヨケの導入など）","影響度(S)を無視すること","報告書を長く書くこと"],"h":"「見つける」仕組みより「作らせない」仕組みの方が優れています。","c":1,"e":"ポカヨケなどを導入し、ミスが起きない仕組み（Oの低減）を作ることが、源流管理における究極の予防策です。"},{"m":13,"q":"設計のアウトプットが要求事項を満たしているか、多部門の専門家が集まって評価・承認する「関所」を何と呼びますか？","o":["DR（デザインレビュー：設計審査）","PL（製造物責任）","QC（品質管理）","5S（整理整頓）"],"h":"設計者一人の判断ではなく、組織的にチェックする「公式な場」です。","c":0,"e":"DRは、製造や営業など多様な視点を入れることで、後工程に設計の「しわ寄せ」が行かないように管理する門番の役割を果たします。"},{"m":13,"q":"DR（設計審査）に参加すべき「部門横断的チーム（CFT）」にふさわしいメンバーは誰ですか？","o":["設計担当者のみ","設計、製造、品質、購買、営業などの関連部門の代表者","外部のアルバイトスタッフ","近所の住民"],"h":"多角的な視点から問題点を発見できるメンバー構成が必要です。","c":1,"e":"様々な部署の知見（作りやすさ、売りやすさ、壊れにくさ等）をぶつけ合うことで、未然防止の精度が高まります。"},{"m":13,"q":"FMEAを一度作って終わりにせず、不具合や変更のたびに更新し続ける状態を何と呼びますか？","o":["歴史的文書","生きた文書（リビングドキュメント）","門外不出の秘伝書","過去の遺物"],"h":"常に最新のリスクを反映し、活用され続ける状態を指します。","c":1,"e":"FMEAは常に最新の状態に保つことで、継続的改善の土台となり、次の設計への「教訓」として機能します。"},{"m":13,"q":"本研修のまとめとして、FMEAとDRの連携によって実現される「理想の状態」はどれですか？","o":["不良品を完璧に検査で取り除ける状態","不具合を未然に防ぎ、品質を工程（源流）で作り込んでいる状態","クレーム対応のスピードが世界一早い状態","マニュアルの数が業界一多い状態"],"h":"「後工程での手直し」をゼロに近づけるための活動のゴールを考えてください。","c":1,"e":"科学的な予測（FMEA）と組織的な審議（DR）を回すことで、源流段階で品質を確立することが、企業の競争力を支えます。"},{"m":14,"q":"5S活動の入り口である「整理（Seiri）」の正しい定義はどれですか？","o":["道具をきれいに並べること","必要なものと不要なものを分け、不要なものを処分すること","床をピカピカに磨くこと","棚にラベルを貼ること"],"h":"「捨てる・取り除く」という決断が含まれる活動です。","c":1,"e":"整理とは、単なる片付けではなく、現場から「不要なもの」を物理的に排除し、スペースと効率を確保することです。"},{"m":14,"q":"「整頓（Seiton）」の目的として、最も適切なものはどれですか？","o":["見た目を美しくして来客に備える","必要なものを、必要なときにすぐに取り出せる状態にすること","不要なものを箱に詰めて隠すこと","新しい備品をたくさん購入すること"],"h":"「探すロス」をゼロにするための活動です。","c":1,"e":"整頓のゴールは、誰でも迷わずにモノを取り出し、元の場所に戻せる仕組みを作ることです。"},{"m":14,"q":"2Sを徹底することで削減できる「3つのロス」に含まれないものはどれですか？","o":["歩くロス","探すロス","購買ロス","話すロス"],"h":"モノが乱れていることで発生する「物理的なムダ」を思い出してください。","c":3,"e":"2Sは、移動のムダ（歩く）、時間のムダ（探す）、二重発注のムダ（購買）を直接的に解決します。"},{"m":14,"q":"整理活動の第一歩として、対象エリアから一旦すべてのモノを外に出す考え方を何と呼びますか？","o":["更地化（リセット）","大掃除","引越し","一時保管"],"h":"その場所を一度「空っぽ」にしてから、本当に必要なものだけを選別する手法です。","c":0,"e":"更地化することで、普段風景に溶け込んで気づかなかった「不要なもの」を客観的に浮き彫りにできます。"},{"m":14,"q":"整頓において、モノの置き場所を決める際の最も重要な基準は何ですか？","o":["モノの大きさ","モノの価格","使用頻度（使う回数）","作成者の好み"],"h":"「よく使うものほど近くに置く」という効率性の原則です。","c":2,"e":"使用頻度に応じてランク付け（A〜E）を行い、身体に近い場所から配置を決めることで動線が短縮されます。"},{"m":14,"q":"毎日使う「Bランク」のモノの置き場所として、適切なルール例はどれですか？","o":["身体に付ける","準備台の上","作業エリア外の倉庫","別の工場の棚"],"h":"毎時間使うわけではないが、毎日確実に使うものの配置場所です。","c":1,"e":"Aランクは手元、Bランクは準備台、Cランクは近くの棚、というように段階的に距離を離していきます。"},{"m":14,"q":"置き方を決定する際の基本原則として、誤っているものはどれですか？","o":["使う順番に並べる","使う頻度に応じて並べる","混同しやすいものはできるだけ近くに置く","混同しやすいものは離す"],"h":"「間違えて取ってしまう（ポカミス）」を防ぐためのルールを考えてください。","c":2,"e":"似たような道具や材料は、取り間違いを防ぐためにあえて距離を離して配置するのが鉄則です。"},{"m":14,"q":"職場内の「見える化」を推進するために、推奨されているアクションはどれですか？","o":["キャビネットの扉をすべて閉める","扉やフタを撤去し、中身が見えるようにする","中身が見えない黒い箱に入れる","高いところに積み上げる"],"h":"「開けないとわからない」という手間と隠蔽をなくすための工夫です。","c":1,"e":"扉やフタを外すことで、在庫量や乱れが一目でわかるようになり、管理の精度が劇的に向上します。"},{"m":14,"q":"モノの定位置に「品名」や「数量（何個置くか）」を明記することを何と呼びますか？","o":["表示","暗記","装飾","隠蔽"],"h":"目に見える「情報」として、誰もがわかるようにする管理ポイントです。","c":0,"e":"表示（ラベリングや白線引き）を徹底することで、モノの「あるべき姿」が明確になり、異常（欠品や乱れ）にすぐ気づけます。"},{"m":14,"q":"本研修のまとめとして、2S活動の最終的な目標は何ですか？","o":["掃除を趣味にすること","生産性が高く、ヒューマンエラーのない「職場のあるべき姿」を実現すること","古い道具をすべて新品に買い替えること","床を滑りやすくすること"],"h":"安全、品質、能率を支える「土台」としての役割を思い出してください。","c":1,"e":"2Sは単なる清掃ではなく、ムダを徹底的に削ぎ落とし、ミスが起きない環境を設計する「経営活動」の一部です。"},{"m":15,"q":"標準作業を定める真の目的として、最も適切なものはどれですか？","o":["作業員を厳しく監視するため","誰がやっても同じ結果が出る状態（再現性）を確保するため","書類の数を増やして審査に備えるため","ベテランのノウハウを隠すため"],"h":"「人によってやり方が違う」という状態（ばらつき）をなくすための活動です。","c":1,"e":"標準作業は、品質の「ばらつき」を抑え、誰でも同じ品質を作り込めるようにするための「業務の設計図」です。"},{"m":15,"q":"良いマニュアルに含まれるべき、単なる手順（How）を超えた「行動の基準やルール」のことを何と呼びますか？","o":["娯楽性","法則性","偶然性","複雑性"],"h":"「こうすれば必ず成功する」という仕事の原則が示されている状態です。","c":1,"e":"法則性が明確なマニュアルは、作業者が迷わずに正しい結果を出すためのガイドとして機能します。"},{"m":15,"q":"標準化の過程で業務を分解・体系化することにより、排除できる「3つの負の要素」は何ですか？","o":["金・銀・銅","ムリ・ムダ・ムラ","朝・昼・晩","過去・現在・未来"],"h":"生産性を妨げ、付加価値を生まない要素の総称です。","c":1,"e":"標準化によって業務の不合理な部分（ムリ・ムダ・ムラ）が可視化され、効率化の糸口が見つかります。"},{"m":15,"q":"ISO規格などのQMSにおいて、業務を遂行するために必要な知識、技能、能力のことを何と呼びますか？","o":["力量（スキル）","余力","権力","視力"],"h":"標準作業を実行するために「その人に備わっているべき力」のことです。","c":0,"e":"教育訓練の目的は、各業務に必要な「力量」を定義し、それを確実に身につけさせることにあります。"},{"m":15,"q":"教育訓練プロセスにおいて、訓練の実施後に必ず行わなければならないステップは何ですか？","o":["打ち上げの開催","有効性の評価（力量が身についたかの確認）","マニュアルの廃棄","担当者の交代"],"h":"「教えっぱなし」にせず、本当に効果があったかを確認する必要があります。","c":1,"e":"訓練によって必要な力量が確保されたかを評価し、記録に残すことがQMSの重要な要求事項です。"},{"m":15,"q":"作業者が標準を守れず不良を出した場合、作業者の不注意以外に検討すべき要因は何ですか？","o":["当日の天気","監督者の指導不足や教育訓練の不備","工場の外壁の色","休憩時間の長さ"],"h":"「正しい手順を正しく教えたか」という管理側の責任に注目してください。","c":1,"e":"不適合の影には、教 何ですか？","o":["平均値を高くすること","標準偏差を小さくする（ばらつきを減らす）こと","範囲を大きくすること","データを取らないこと"],"h":"的の中心を狙うだけでなく、そこに弾を集中させる努力のことです。","c":1,"e":"平均を目標に合わせ、かつ標準偏差を極小化することが、品質マネジメントの究極のゴールです。\n\nお疲れ様でした！平均という「点」だけでなく、標準偏差という「広がり」を意識することで、あなたの品質管理スキルは一段上のレベルに到達します。"},{"m":21,"q":"QC七つ道具を活用する最大の目的は何ですか？","o":["綺麗なグラフを作って報告書を飾るため","数値データや事象を「視覚化（見える化）」し、事実に基づく判断を行うため","計算の難しさをアピールするため","検査員の作業時間を増やすため"],"h":"データは数字の羅列では何も語りません。一目で状況を理解するための工夫です。","c":1,"e":"バラバラな数値を視覚的な図表にまとめることで、推測や思い込みを排除した客観的な判断が可能になります。"},{"m":21,"q":"多くの項目の中から、どの問題が特に大きな影響を持っているかを把握し、改善の優先順位を決めるのに適した道具はどれですか？","o":["散布図","パレート図","特性要因図","チェックシート"],"h":"「件数の多い順」に並べ、累積比率を重ねるグラフです。","c":1,"e":"パレート図は「重要な少数の項目」を特定するのに最適で、QCストーリーの「テーマ選定」や「現状把握」で威力を発揮します。"},{"m":21,"q":"結果（特性）に対して、どのような原因（要因）が関係しているかを魚の骨のような形で構造化する図は何ですか？","o":["管理図","ヒストグラム","特性要因図","散布図"],"h":"「なぜなぜ問答」の結果を整理し、真の原因を探るための地図となります。","c":2,"e":"特性要因図は、4M（人、設備、材料、方法）などの視点で要因を整理し、問題の構造を明らかにする唯一の非数値データツールです。"},{"m":21,"q":"データ全体の分布（ばらつき方、中心の位置、型）を把握し、プロセスが規格に対して余裕があるかを確認する道具はどれですか？","o":["ヒストグラム","パレート図","散布図","チェックシート"],"h":"柱状のグラフで、データの「山の形」を見るものです。","c":0,"e":"ヒストグラムは、平均値だけでなく「ばらつきの広がり」を視覚化し、工程能力の判断材料を提供します。"},{"m":21,"q":"「温度を上げると強度が上がるか？」といった、二つのデータの間の相関関係（因果関係）を調べるのに適した道具はどれですか？","o":["管理図","散布図","パレート図","ヒストグラム"],"h":"横軸と縦軸にデータを取り、点を打っていくグラフです。","c":1,"e":"散布図は、要因と結果のペアデータをプロットすることで、両者に「関係があるかないか」を視覚的に証明します。"},{"m":21,"q":"時間の経過に伴うデータの変化を読み取り、工程が安定しているか（異常がないか）を判断するための道具は何ですか？","o":["特性要因図","管理図","チェックシート","パレート図"],"h":"折れ線グラフに、管理限界線（UCL/LCL）を加えたものです。","c":1,"e":"管理図は、時系列の変化から「いつもと違う異常」をいち早く発見し、工程を維持・管理するために使われます。"},{"m":21,"q":"データを「機械別」「作業者別」「材料ロット別」などのグループに分けて分析する、QC手法の基本となる考え方を何と呼びますか？","o":["統合","分別","層別（そうべつ）","格付け"],"h":"混ぜこぜのデータから、真犯人が潜むグループを特定する手法です。","c":2,"e":"層別はすべてのQCツールの土台です。層別を行うことで、特定の機械や担当者に起因する「ばらつき」が浮き彫りになります。"},{"m":21,"q":"QCストーリーの「手順4：要因の解析」において、要因の洗い出しと整理に最もよく使われる道具はどれですか？","o":["パレート図","特性要因図","グラフ","チェックシート"],"h":"頭の中にある「原因の候補」を漏れなく書き出すための道具です。","c":1,"e":"特性要因図で要因の全体像を整理した上で、他の道具（層別ヒストグラムや散布図など）で事実を確認するのが定石です。"},{"m":21,"q":"自動焼き上げ機の事例において、「平均値は良いが、時間の経過とともに重量が上がっている」という傾向を掴むのに最適な道具は何ですか？","o":["ヒストグラム","管理図（または折れ線グラフ）","パレート図","散布図"],"h":"「時間経過による変化」を追跡するためのツールです。","c":1,"e":"ヒストグラムは全体の姿は見えますが、時間の順序は消えてしまいます。推移を見るには管理図やグラフが必須です。"},{"m":21,"q":"QC手法を選択する際に、最も重要だと述べられている「基本姿勢」は何ですか？","o":["難しい計算式をたくさん使うこと","目的（何の意思決定をするためか）を明確にすること","流行りのソフトウェアを使うこと","データをできるだけ大量に取ること"],"h":"「羅針盤」を使いこなすには、まず「目的地」が必要です。","c":1,"e":"目的が不明確なまま道具を使っても、誤った判断を招きます。常に「この分析で何を決めたいのか」を意識することが大切です。"},{"m":22,"q":"不良件数や損失金額などを大きい順に並べ、累積比率を折れ線で加えた図を何と呼びますか？","o":["ヒストグラム","パレート図","散布図","管理図"],"h":"「どの項目が全体の大部分を占めているか」を特定するための図です。","c":1,"e":"パレート図は、項目別の重要度を可視化し、改善の優先順位を決めるために使用されます。"},{"m":22,"q":"パレート図を活用して、限られた資源を最も効果の高い重要な項目に集中させる考え方を何と呼びますか？","o":["全数志向","重点志向","分散志向","放置志向"],"h":"「少数の重要な要因」を狙い撃ちにする姿勢のことです。","c":1,"e":"すべての問題に平等に対応するのではなく、影響の大きい「急所」に絞って対策を打つことが、改善の近道です。"},{"m":22,"q":"パレート図の棒グラフがすべて同じような高さ（どんぐりの背比べ）になった場合、何を見直すべきですか？","o":["グラフの色","紙のサイズ","データの層別（分類の仕方）","休憩時間の長さ"],"h":"原因の分け方が大まかすぎたり、適切でなかったりすると、特徴が現れません。","c":2,"e":"分類項目を「作業者別」や「時間帯別」などに変えて再分析することで、真の重要項目が見えてくることがあります。"},{"m":22,"q":"寸法や重量などの数値データのばらつきを、柱状のグラフで表したものを何と呼びますか？","o":["パレート図","チェックシート","ヒストグラム","特性要因図"],"h":"データの分布の形（山の形）を確認するためのツールです。","c":2,"e":"ヒストグラムは、データの「中心の位置」と「散らばり具合」を視覚的に把握するのに適しています。"},{"m":22,"q":"ヒストグラムを作成する際、最大値から最小値を引いて算出する値を何と呼びますか？","o":["平均","範囲（R）","合計","階級"],"h":"データが端から端までどれくらい広がっているかを示す数値です。","c":1,"e":"範囲（R）を把握することで、ヒストグラムの横軸の目盛りや階級の幅を決める基準となります。"},{"m":22,"q":"理想的な品質状態にある工程のヒストグラムは、どのような形になるのが一般的ですか？","o":["左右対称の山型","山が二つある形","絶壁のような形","平坦な形"],"h":"中心にデータが集まり、裾野がなだらかに広がる形です。","c":0,"e":"左右対称の山型は、工程が安定しており、ランダムな要因によるばらつきのみが発生している状態を示します。"},{"m":22,"q":"ヒストグラムの山が二つに分かれていた（二山型）場合、どのような原因が推測されますか？","o":["絶好調である","異なる二つの条件（機械や材料など）のデータが混ざっている","測定ミス","データが足りない"],"h":"「層別」が必要なサインです。","c":1,"e":"異なる特性を持つデータが混在している可能性があるため、機械別やロット別に分けて再確認する必要があります。"},{"m":22,"q":"事例1の不良分析で、上位2項目で全体の75%を占めていた場合、まず取るべき行動はどれですか？","o":["すべての項目を同時に改善する","下位の「その他」から手を付ける","上位2項目に集中して対策を打つ","データを捨てる"],"h":"「重点志向」の考え方に基づきます。","c":2,"e":"上位の重要項目を解決するだけで全体の4分の3が改善されるため、ここに資源を集中させるのが最も効率的です。"},{"m":22,"q":"事例2のシャフト製造で、ヒストグラムの裾野が規格の上限を突き抜けていた場合、どのような判断になりますか？","o":["品質は完璧である","平均を合わせるだけでなく、ばらつき（幅）そのものを小さくする改善が必要","規格を広げればよい","検査をやめる"],"h":"平均値が良くても、幅が広すぎると不良品が出てしまいます。","c":1,"e":"ばらつきが規格幅を超えているため、工程そのものの安定性を高める根本的な改善が求められます。"},{"m":22,"q":"パレート図とヒストグラムを組み合わせて使うことで、どのような改善サイクルが可能になりますか？","o":["パレート図で「どこが悪いか（重点）」を決め、ヒストグラムで「どう悪いか（ばらつき）」を診断する","どちらか一方が良ければ他方は見なくてよい","グラフを並べて眺めるだけで満足する","計算間違いを探す"],"h":"「優先順位」と「現状診断」の組み合わせです。","c":0,"e":"まず優先すべき課題を絞り込み、次にその課題のデータの広がりを詳しく見ることで、効率的かつ正確な改善が可能になります。"},{"m":23,"q":"特性要因図の別名として、その形状から一般的に何と呼ばれていますか？","o":["樹形図","魚の骨（フィッシュボーン）図","クモの巣図","ピラミッド図"],"h":"背骨から大きな骨、小さな骨が枝分かれしている姿に似ています。","c":1,"e":"右端の「特性」を頭に見立て、そこから原因が骨のように伸びるため、フィッシュボーン図と呼ばれます。"},{"m":23,"q":"特性要因図を作成する最大の目的は何ですか？","o":["綺麗な図を描いて満足するため","原因を網羅的に洗い出し、重要な要因（急所）を見つけ出すため","作業者のミスを特定して叱るため","報告書の枚数を増やすため"],"h":"漏れなく原因を探り、その後の「解析」の優先順位を決めるための道具です。","c":1,"e":"頭の中にある原因の候補を書き出し、整理することで、真の原因（真因）にたどり着くための仮説を立てます。"},{"m":23,"q":"特性要因図において、解決したい「問題（結果や現象）」を記入する場所はどこですか？","o":["魚の尻尾（左端）","魚の頭（右端）","大骨の先端","図の真ん中"],"h":"すべての原因が向かっていく「ゴール」のような位置づけです。","c":1,"e":"図の右端に具体的な「特性」を書き、そこに向かって太い背骨（背骨線）を引くのが基本です。"},{"m":23,"q":"製造現場において、大骨（要因系）を分類する際によく使われる「4M」に含まれないものはどれですか？","o":["Man（人）","Machine（機械）","Money（お金）","Material（材料）"],"h":"「人、機械、材料、方法」の4つが基本です。","c":2,"e":"「お金」ではなく、Method（方法・手順）を加えた4つが、品質のばらつきを生む主な要因系です。"},{"m":23,"q":"事務やサービス分野で「4M」以外に追加されることがある要因系（大骨）はどれですか？","o":["Measurement（測定・検査）","Music（音楽）","Meal（食事）","Movie（動画）"],"h":"データの正確さや管理の状態を問う項目です。","c":0,"e":"Measurement（測定）のほか、Environment（環境）やManagement（管理）などが大骨として使われることがあります。"},{"m":23,"q":"原因を深く掘り下げていく際、どのような問いかけを繰り返すことが推奨されますか？","o":["「誰がやったのか？」","「いつ終わるのか？」","「なぜそれが起こるのか？」","「いくらかかるのか？」"],"h":"表面的な現象の奥にある「真の原因」を探るための問いかけです。","c":2,"e":"「なぜ？」を繰り返すことで、中骨から小骨、さらに孫骨へと、原因を系統的に深掘りしていきます。"},{"m":23,"q":"具体的な原因を出し合う「ブレーンストーミング」において、守るべき重要なルールはどれですか？","o":["他人の意見を批判しない","役職が高い人の意見だけを書く","完璧な正解だけを言う","意見の数を制限する"],"h":"自由な発想で、多くの意見を出し合うことが大切です。","c":0,"e":"批判をせず、自由奔放に意見を出し合うことで、一人では気づかなかった要因を網羅することができます。"},{"m":23,"q":"図が完成した後、重要と思われる要因に印（チェックマーク）をつける作業は何と呼ばれますか？","o":["飾り付け","重み付け","穴埋め","削除"],"h":"「これが真の原因に違いない」という仮説を立てる作業です。","c":1,"e":"網羅した要因の中から、特に影響が大きいと推測されるものに焦点を絞り、その後の検証の優先順位を決めます。"},{"m":23,"q":"骨に記入する言葉として、より望ましい表現はどれですか？","o":["「ミス」","「ない」","「作業手順があいまい」","「大きい」"],"h":"単語だけでなく、状況が具体的にわかる説明を加えるのがコツです。","c":2,"e":"「ミス」や「ない」だけでは具体性に欠けるため、何がどうなっているのかを言葉で表現することで、共通認識が深まります。"},{"m":23,"q":"本研修のまとめとして、特性要因図が「話し合いの道具」と呼ばれる理由は何ですか？","o":["絵を描くのが楽しいから","全員で知恵を出し合い、問題の構造を共有して真因究明の準備を整えるから","会議を長引かせるため","誰が一番詳しいかを競うため"],"h":"チームで同じ「魚の骨」を見ることで、認識のズレをなくします。","c":1,"e":"個人の思い込みを排除し、組織的に原因を捉えるためのコミュニケーションツールとしての役割が非常に大きいです。\n\nお疲れ様でした！特性要因図は、複雑に絡み合った原因を整理し、解決への道を照らす「知恵の地図」です。ぜひ職場の仲間と一緒に描いてみてください。"},{"m":24,"q":"管理図を活用する最大の目的は何ですか？","o":["不良品を最後に箱詰めするため","工程が安定した状態にあるか（異常の有無）を判断するため","グラフをカラフルにして見栄えを良くするため","検査員の給与を計算するため"],"h":"「問題が起きる前」に工程の異変を察知するためのツールです。","c":1,"e":"管理図は工程の「健康診断」のようなもので、プロセスが予測可能な安定状態にあるかを監視するために使われます。"},{"m":24,"q":"管理図において、避けられない自然な範囲内で発生している「ばらつき」の原因を何と呼びますか？","o":["異常原因","偶然原因","人為的原因","故障原因"],"h":"工程が通常通り機能していても、わずかに発生してしまう「自然なゆらぎ」のことです。","c":1,"e":"偶然原因によるばらつきは、現在の工程能力では避けられないものであり、この範囲内であれば工程は「安定」とみなされます。"},{"m":24,"q":"機械の故障や材料の変更、作業ミスなど、工程を不安定にする特定の要因を何と呼びますか？","o":["偶然原因","異常原因","期待原因","幸運原因"],"h":"これを取り除くことで、工程を再び安定した状態に戻す必要があります。","c":1,"e":"異常原因が混入すると、データの動きが管理限界を越えたり、不自然な動き（トレンド）を示したりします。"},{"m":24,"q":"管理図に引かれる3本の線のうち、統計的に設定された「上の境界線」を何と呼びますか？","o":["中心線（CL）","管理下限線（LCL）","管理上限線（UCL）","規格上限線（USL）"],"h":"Upper Control Limit の略称で呼ばれることが多い線です。","c":2,"e":"UCL（管理上限線）とLCL（管理下限線）の間にデータが収まっており、かつ並び方に癖がない状態を「安定」と判断します。"},{"m":24,"q":"管理図において「異常」と判断すべきなのは、どのような時ですか？","o":["点が管理限界線を逸脱した時","点の並び方に不自然な傾向（連続する上昇など）がある時","1と2の両方","平均値が目標と同じ時"],"h":"線からはみ出さなくても、動きに「癖」が出たら要注意です。","c":2,"e":"管理図の強みは、限界線越えだけでなく、データが示す「兆候（トレンド）」を読み取れる点にあります。"},{"m":24,"q":"データ点が連続して上昇し続けている状態を何と呼びますか？","o":["シフト","周期","上昇傾向（トレンド）","安定"],"h":"徐々に平均がずれていっている、非常に危険なサインです。","c":2,"e":"上昇・下降のトレンドは、工具の摩耗や温度変化など、徐々に進行する異常原因を示唆していることが多いです。"},{"m":24,"q":"解説の「製品の硬度」の事例において、平均値だけを監視していた管理職が陥ったミスは何ですか？","o":["データの計算間違い","時間の経過に伴う「推移（トレンド）」を見逃したこと","検査員の名前を忘れたこと","規格値を厳しくしすぎたこと"],"h":"「その瞬間の平均」は良くても、未来に向かう「動き」を見ていませんでした。","c":1,"e":"平均値（点）だけでは、工程が少しずつ悪化しているという「流れ（線）」に気づくことができません。"},{"m":24,"q":"管理図が「現場の警告灯」の役割を果たした結果、可能になる処置はどれですか？","o":["不良品が大量に出た後の全数検査","不良品が出る前の「未然防止（予防保全）」","顧客への謝罪会見","製造ラインの完全廃止"],"h":"「警告」が出た段階で動くことで、最悪の事態を防ぎます。","c":1,"e":"異常の兆候を捉えてすぐに対策（部品交換など）を打つことで、不良品の発生を未然に防ぐことができます。"},{"m":24,"q":"品質管理の基本原則「品質は工程でつくり込むもの」を実践するために、管理図はどう役立ちますか？","o":["検査を自動化してくれる","製造プロセスを常に安定させ、予測可能な状態に保つための基盤となる","不良品を自動的に修理してくれる","作業者の名前を記録する"],"h":"「つくり方（プロセス）」が正常であることを証明し続けるためのツールです。","c":1,"e":"工程が安定していれば、そこから生まれる製品も安定します。管理図はそのプロセスの安定性を科学的に保証します。"},{"m":24,"q":"本研修のまとめとして、管理図を「工程の脈拍」に例えた場合、異常を検知した直後に行うべき正しい行動はどれですか？","o":["異常を無視してそのまま生産を続ける","迅速に原因究明（要因解析）を行い、必要な処置（アクション）をとる","データの数値を書き換える","誰のせいか犯人探しをする"],"h":"事実に基づいて、再発防止のために動くことが「管理」の本質です。","c":1,"e":"異常という「サイン」に気づくだけでなく、それに対して速やかに対策を打つことで初めて、管理図は価値を持ちます。"},{"m":25,"q":"品質管理における「検査」の最大の目的は何ですか？","o":["製品の品質をさらに向上させること","不適合品を後工程や顧客へ流出させないように取り除くこと","作業者の作業スピードを測定すること","新しい製品のデザインを考えること"],"h":"検査は「品質を上げる」活動ではなく、「悪いものを止める」活動です。","c":1,"e":"検査は仕様や基準に合わないものを選別し、顧客に届かないようにする「防波堤」の役割を担います。"},{"m":25,"q":"品質管理の原則として、品質はどこで「つくり込まれるもの」とされていますか？","o":["検査工程","製造工程","配送工程","営業活動"],"h":"検査で不良をはじく前に、まず「良いものを作る」段階が重要です。","c":1,"e":"「品質は工程でつくり込む」のが鉄則です。検査に頼りすぎるのではなく、製造プロセスそのものを安定させることが本質的な改善です。"},{"m":25,"q":"検査対象の一つひとつについて、適合か不適合かを判定するタイプを何と呼びますか？","o":["ロット判定","個別判定","総合判定","暫定判定"],"h":"「この1個はOKかNGか」を個別に見ていく方法です。","c":1,"e":"個々の品物を検査し、そのもの自体の合否を決めるのが個別判定です。"},{"m":25,"q":"製品のまとまりからサンプルを抜き取り、その結果で「まとまり全体」の合否を決める判定タイプは何ですか？","o":["個別判定","ロット判定","抜き打ち判定","最終判定"],"h":"一部を調べて「この箱（グループ）全部を合格にする」という判断方法です。","c":1,"e":"ロット（母集団）から抜き取った標本の結果に基づいて、集団全体の合否を決定します。"},{"m":25,"q":"すべての品物を一つずつ全部調べる「全数検査（個別検査）」が必要とされるのは、どのような場面ですか？","o":["工程が非常に安定していて信頼できる時","新規部品の導入時など、工程が不安定で信用できない時期","検査コストを最小限に抑えたい時","製品を壊さないと検査できない時"],"h":"「絶対に1個も流出させたくない」という警戒が必要な時期です。","c":1,"e":"信頼性がまだ低い段階や、不適合の流出が致命的な影響を与える場合には、全数検査でリスクを封じ込めます。"},{"m":25,"q":"製品を破壊しないと品質が確認できない「破壊検査」において、全数検査は可能ですか？","o":["可能である","不可能である","どちらとも言えない","特例として認められる"],"h":"全部壊して検査したら、売るものがなくなってしまいます。","c":1,"e":"強度試験や食品の味見など、製品を壊したり消費したりする検査では、統計的な「抜き取り検査」が必須となります。"},{"m":25,"q":"抜き取り検査を行う際、一部のサンプルが「全体を代表している」と言えるようにするために、最も重要な抜き取り方はどれですか？","o":["きれいなものだけ選ぶ","ランダムサンプリング（無作為抽出）","最後に作ったものだけ選ぶ","重いものだけ選ぶ"],"h":"特定の傾向に偏らず、公平に抜き出す必要があります。","c":1,"e":"ランダムに抜き取ることで、標本が母集団の性質を正しく反映し、統計的な推論が可能になります。"},{"m":25,"q":"過去の品質実績から、不適合が生じていないと判断して検査を行わない特別なやり方を何と呼びますか？","o":["全数検査","抜き取り検査","無試験検査","簡易検査"],"h":"「検査しなくても大丈夫」という高い信頼関係に基づいた方法です。","c":2,"e":"工程が極めて安定し、不適合の発生リスクが無視できるほど低い場合に適用される、最も合理化された形です。"},{"m":25,"q":"ベアリングの検査例において、新規の仕入先から納入されたばかりの時期に適切な検査方式はどれですか？","o":["全数検査","抜き取り検査","無試験検査","検査の中止"],"h":"まだ「信用できない」段階での対応を考えてください。","c":0,"e":"相手の工程能力が未知数なうちは、全数検査で品質を担保し、実績を積み上げる必要があります。"},{"m":25,"q":"品質管理部門が最終的に目指すべき「検査のあり方」として、最も適切なものはどれですか？","o":["検査員の人数を無限に増やすこと","工程の安定度を高め、検査を合理的に緩和していくこと","検査をすべて廃止してコストをゼロにすること","抜き取り検査を全数検査に切り替え続けること"],"h":"「工程で品質を作り込む」ことができれば、検査はどう変わるべきでしょうか。","c":1,"e":"理想は、工程が安定することで検査を減らし（全数→抜き取り→無試験）、最小限のコストで品質を保証することです。"},{"m":26,"q":"検査業務の本来の目的として、最も適切なものはどれですか？","o":["製品のデザインを新しくすること","不適合品が後工程や顧客に渡らないように保証すること","製造スピードを限界まで上げること","故障した機械を修理すること"],"h":"「悪いものを流さない」ための防波堤としての役割を思い出してください。","c":1,"e":"検査は、品質基準と比較して適合・不適合を判定し、顧客の信頼を守るための最終的な活動です。"},{"m":26,"q":"品質マネジメントシステム（QMS）において、測定・検査機器を管理するために作成が必須となる書類は何ですか？","o":["社員名簿","計測機器管理台帳","昨日の日報","整理整頓チェックシート"],"h":"管理すべきすべての機器を登録し、校正状態を記録するためのマスターリストです。","c":1,"e":"台帳に登録し、定めた間隔で校正や検証を行うことで、検査結果の正しさを担保します。"},{"m":26,"q":"計測機器の校正状態を現場で一目で識別するために、機器本体に行うべき処置は何ですか？","o":["好きな色で塗装する","有効期限を表示したラベルを貼付する","名前を大きく書く","鍵をかけて保管する"],"h":"「その機器がいま使ってよい状態か」を誰もが確認できるようにします。","c":1,"e":"有効期限ラベルを貼ることで、期限切れの機器による誤った検査を未然に防ぎます。"},{"m":26,"q":"もし計測機器が不適合（精度狂いなど）だと判明した場合、組織が最初に行うべき遡及調査は何ですか？","o":["機器をすぐに廃棄する","それまでにその機器で測定した結果の妥当性を評価する","担当者を交代させる","検査を中止して帰宅する"],"h":"「狂ったものさしで測られた過去の製品」に問題がないか確認する必要があります。","c":1,"e":"不適合判明時には、過去の測定結果に遡って影響を評価し、必要であれば製品の回収などの処置をとらなければなりません。"},{"m":26,"q":"人の五感（視覚や触覚など）を用いて品質を判定する検査を何と呼びますか？","o":["自動検査","官能検査（目視検査など）","破壊検査","化学分析"],"h":"数値で測りきれない外観やテクスチャを評価する検査です。","c":1,"e":"官能検査は、検査員の主観による「ばらつき」が生じやすいため、特別な管理が必要となります。"},{"m":26,"q":"官能検査の判断基準を客観化し、再現性を高めるために有効なツールはどれですか？","o":["厚いマニュアル本","写真見本やマスターパーツ","検査員の記憶力","昨日の新聞"],"h":"「良い」「悪い」の境界線を、誰が見てもわかるように視覚化したものです。","c":1,"e":"限度見本（写真や現物）を用いることで、グレーゾーンの判断基準を統一し、人によるばらつきを抑えます。"},{"m":26,"q":"顧客が指定した「外観品目」を評価する際、環境面で準備が求められる資源は何ですか？","o":["評価用照明","快適な椅子","最新のパソコン","加湿器"],"h":"色や光沢を正しく判別するために、光の条件を整える必要があります。","c":0,"e":"適切な照明環境とマスターパーツを整えることは、外観品質を保証するための必須要件です。"},{"m":26,"q":"官能検査を行う要員に求められる「力量」の証明として、適切なものはどれですか？","o":["勤続年数が長いこと","適切に訓練され、資格が与えられていること","視力が非常に良いこと","声が大きいこと"],"h":"単なる経験だけでなく、組織として能力を認め、登録されていることが重要です。","c":1,"e":"検査員の力量不足は品質事故に直結するため、訓練と資格認定の仕組みが不可欠です。"},{"m":26,"q":"一点を注視せず、全体を眺めるように見ることで検査の能率を上げる、官能検査の技術を何と呼びますか？","o":["集中視検査","周辺視目視検査法","拡大鏡検査","遠近法検査"],"h":"人間の目の特性を活かした、新規の効率的な検査手法として紹介されました。","c":1,"e":"周辺視を活用することで、広範囲の異常を素早く捉え、能率と精度の両立を図ります。"},{"m":26,"q":"本研修のまとめとして、官能検査の精度を高めるための「二つの柱」は何ですか？","o":["「スピード」と「コスト」","「客観化（基準の明確化）」と「力量（教育訓練）」","「根性」と「努力」","「最新設備」と「広いスペース」"],"h":"基準を明確にし、できる人を育てる、という「車の両輪」の考え方です。","c":1,"e":"判断の拠り所となる「基準」を客観的に定め、それを正しく扱える「人」を育てることこそが、官能検査の極意です。"},{"m":27,"q":"「文書（ドキュメント）」の最大の目的は何ですか？","o":["過去の失敗を自慢するため","誰がいつやっても同じ結果が出る「再現性」を確保するため","難しい専門用語を並べて権威を示すため","紙の消費量を増やすため"],"h":"仕事の「ばらつき（ムラ）」をなくし、品質を一定に保つための役割を考えてください。","c":1,"e":"文書は業務のルールブックであり、誰が担当しても同じ品質のアウトプットが出せる状態を作るために存在します。"},{"m":27,"q":"ISO 9001:2015規格において、文書化に関する要求事項はどう変化しましたか？","o":["「品質マニュアル」の作成が絶対に必須となった","文書化は一切不要になった","組織が必要だと判断した情報を、組織自らの責任で文書化するようになった","すべての作業を動画で残さなければならなくなった"],"h":"「何が必要か」を組織自身が判断する能力が問われるようになりました。","c":2,"e":"特定の形式を強制するのではなく、組織のQMSの有効性のために「必要な情報は何か」を自ら定義することが求められています。"},{"m":27,"q":"「文書」と「記録（レコード）」の決定的な違いは何ですか？","o":["文書は「やり方（ルール）」、記録は「やった結果（証拠）」","文書は「鉛筆書き」、記録は「ボールペン書き」","文書は「社外用」、記録は「社内用」","両者に違いはない"],"h":"「これからどうするか」を示すものと、「過去にどうしたか」を示すものの違いです。","c":0,"e":"文書は未来の行動を縛るルールであり、記録は過去の事実を証明する証拠です。"},{"m":27,"q":"食品安全（FSMS）などの分野で、問題発生時に原因を遡って調査できる仕組みを何と呼びますか？","o":["リサイクル","トレーサビリティ","サンプリング","フィルタリング"],"h":"原料、加工、出荷などの「記録」を数珠つなぎにして追いかけることです。","c":1,"e":"正確な記録が残っていることで、万が一の際に対象ロットを特定し、被害を最小限に抑えることができます。"},{"m":27,"q":"教育訓練の結果、作業者が必要な能力を身につけたことを示す記録を何と呼びますか？","o":["履歴書","力量（スキル）の有効性評価の記録","出勤簿","給与明細"],"h":"単に「教えた」だけでなく、「できるようになった」ことを証明する情報です。","c":1,"e":"QMSにおいて、その業務を遂行する能力（力量）があることを証拠として残すことは非常に重要です。"},{"m":27,"q":"製造工程や設備、材料などに大きな変更を行う際、品質リスクを防ぐために行うべき活動は何ですか？","o":["変更管理","在庫管理","経理管理","秘密管理"],"h":"「変化」が望ましくない影響を及ぼさないよう、事前にレビューし管理することです。","c":0,"e":"変更は不適合の最大の引き金となります。計画的かつ体系的に変更を進めることが規格でも要求されています。"},{"m":27,"q":"現場で古い手順書（旧版）が使われ続けてしまうことを防ぐための管理を何と呼びますか？","o":["掃除","最新版管理（版管理）","施錠管理","著作権管理"],"h":"常に「最新で正しい状態」の情報を現場に届けるための仕組みです。","c":1,"e":"改訂されたら古い文書を回収し、最新版のみが使用される状態を維持しなければなりません。"},{"m":27,"q":"FMEA（故障モード影響解析）などのコアツールが「生きた文書」であるべき理由は何ですか？","o":["毎日色を塗り替えるから","市場不良などの新しい情報を常に反映させ、更新し続ける必要があるから","捨てると罰金があるから","社長が毎日読むから"],"h":"一度作って終わりではなく、常に最新の知見にアップデートされるべきものです。","c":1,"e":"「生きた文書」として運用することで、過去の失敗を次の設計や工程に確実に活かすことができます。"},{"m":27,"q":"「計測機器管理台帳」において、校正周期を1年から6ヶ月に変更した場合、最初に行うべきことは何ですか？","o":["機器を買い替える","規定（文書）を改訂し、新しい周期を反映させる","以前の記録をすべて捨てる","担当者を解雇する"],"h":"まず「ルール（文書）」を最新の状態に更新し、組織全体に周知する必要があります。","c":1,"e":"ルールの変更（改訂）を行い、その版を更新した上で、新しいルールに基づいた運用と記録の作成に移行します。"},{"m":27,"q":"本研修のまとめとして、文書・記録・最新版管理を「組織の免疫システム」に例えた場合、最新版管理の役割は何ですか？","o":["過去の失敗をすべて忘れること","環境変化に合わせて古い記憶を安全に更新し、組織を守ること","ウイルスを増殖させること","変化を一切拒否すること"],"h":"新しい脅威や状況に合わせて、自分たちのルールを正しく書き換える機能のことです。","c":1,"e":"変化を体系的に管理し、常に正しい情報で行動することが、組織の品質と信頼を守る「免疫」となります。\n\nお疲れ様でした！「書かれた通りにやる、やった通りに書く、そしてそれを最新に保つ」。このシンプルな積み重ねが、強い組織を作る土台になります。"},{"m":28,"q":"「同じ条件のもとで生産・加工された製品のまとまり」を指す言葉は何ですか？","o":["ユニット","ロット（Lot）","ケース","サンプル"],"h":"「同じ原材料」「同じ製造日」など、共通の背景を持つ集団のことです。","c":1,"e":"ロット単位で管理することで、問題が発生した際に「どの範囲まで影響があるか」を特定できるようになります。"},{"m":28,"q":"ロット管理を行う最大の目的は何ですか？","o":["在庫を山積みにするため","問題発生時に原因の範囲を特定し、効果的な回収や撤去を行うため","ラベルのデザインをかっこよくするため","倉庫の掃除を楽にするため"],"h":"「どこからどこまでが危ないか」を即座に判断するための仕組みです。","c":1,"e":"ロット管理ができていないと、1個の不良のために全製品を回収しなければならなくなるリスクが生じます。"},{"m":28,"q":"ロットを細かく（小さく）することのメリットは何ですか？","o":["管理コストが安くなる","万が一の際の回収範囲を絞り込める","記録の数が減る","輸送が簡単になる"],"h":"「被害の範囲」という視点で考えてください。","c":1,"e":"ロットを小さくすれば事故時の損害（回収費用など）を抑えられますが、一方で管理の手間（コスト）は増えるため、バランスが重要です。"},{"m":28,"q":"製品の履歴（原料、加工、出荷など）を、あらゆる段階で追跡・確認できる仕組みを何と呼びますか？","o":["トレーサビリティ","リサイクル","モニタリング","シミュレーション"],"h":"「追跡可能性」を意味する言葉です。","c":0,"e":"トレーサビリティがあることで、市場に出た後でも「いつ、どの材料で作られたか」を遡って調べることができます。"},{"m":28,"q":"トレーサビリティを実現するために、最も不可欠なものは何ですか？","o":["高価な製造機械","適切な記録と文書管理","広い休憩室","多くの営業担当者"],"h":"「過去の事実」を証明するための証拠が必要です。","c":1,"e":"記録がなければ追跡は不可能です。検索性や保管期間に配慮した記録管理がシステムの土台となります。"},{"m":28,"q":"内部監査において、市場のクレームから遡って製造や原料の記録を検証する手法を何と呼びますか？","o":["前方追跡監査","後方追跡監査（後方追跡形監査）","並行監査","抜き打ち監査"],"h":"「結果（市場）」から「原因（源流）」へと逆走するイメージです。","c":1,"e":"後方追跡監査は、トレーサビリティが実務で正しく機能しているかを確かめるのに非常に有効な手法です。"},{"m":28,"q":"自動車産業において、安全上の不具合があった際に行われる無償の回収・修理制度を何と呼びますか？","o":["キャンペーン","リコール","リース","オークション"],"h":"法的・社会的に極めて重い責任を伴う活動です。","c":1,"e":"リコールを迅速かつ正確に行うためには、どの車両にどのロットの部品が使われたかという正確な情報が欠かせません。"},{"m":28,"q":"食品メーカーの「トレーサビリティ演習」において、起点として選ばれる「一つ（標本）」は通常どこから選ばれますか？","o":["開発中の試作品","出荷した最終製品ロット","捨てたゴミ箱の中","社員の昼食"],"h":"「お客様の手に渡ったもの」から遡れるかを確認します。","c":1,"e":"実際に出荷された製品を一つ選び、その原料まで辿れるか試すことで、システムの有効性を評価します。"},{"m":28,"q":"製造工程や製品の「変更」に関する記録が、トレーサビリティにおいて重要なのはなぜですか？","o":["紙の無駄をなくすため","不具合発生時に、変更が原因かどうかの特定や影響範囲の限定に役立つから","変更が多いほど良い製品だから","記録を増やすことが目的だから"],"h":"「いつもと違うこと」が起きたタイミングは、不具合のヒントになります。","c":1,"e":"変更点は不具合の引き金になりやすいため、その記録とロットを紐付けておくことが早期解決の鍵となります。"},{"m":28,"q":"本研修のまとめとして、トレーサビリティとロット管理の関係を例えた場合、「ロット」は何にあたりますか？","o":["製品が歩んできた道筋の地図","道筋の途中で立ち止まった場所の目印","目的地","乗り物"],"h":"「道筋（トレーサビリティ）」の中にある「区切り」のことです。","c":1,"e":"道筋（地図）がトレーサビリティであり、その中での区切り（目印）がロットです。両方が揃って初めて、迷わず原因に辿り着けます。"},{"m":29,"q":"KPI（重要業績評価指標）をISO規格などの品質管理において活用する最大の目的は何ですか？","o":["従業員の給与を減らす口実にするため","プロセスの有効性を評価し、継続的な改善（PDCA）につなげるため","グラフをきれいに描いて壁に貼るため","過去の失敗を隠すため"],"h":"「チェック（C）」して「処置（A）」に繋げるサイクルを思い出してください。","c":1,"e":"KPIは、組織の目標達成度を測定し、事実に基づいた改善活動（アクション）を駆動させるための核心的なツールです。"},{"m":29,"q":"製造プロセスにおいて、手直しや再作業をせずに「一回で合格した割合」を示すKPIを何と呼びますか？","o":["不良率","直行率","納期遵守率","稼働率"],"h":"プロセスの「効率性」と「ムダの少なさ」を測る指標です。","c":1,"e":"直行率が高いほど、再作業の手間やコストがかかっていない、スムーズなプロセスであることを意味します。"},{"m":29,"q":"平均値が目標をクリアしていても、製品の「ばらつき」が規格からはみ出していないかを判断するために用いられる指標は何ですか？","o":["顧客満足度","工程能力指数（Cpk）","欠勤率","売上高"],"h":"「標準偏差」などを考慮し、工程の安定性を数値化したものです。","c":1,"e":"Cpkを監視することで、平均値だけでは見逃してしまう「ばらつきによる不良発生リスク」を予測できます。"},{"m":29,"q":"「納期遵守率80%」という全体数値から、問題の所在（どの工場か、どの製品かなど）を特定するために行う活動を何と呼びますか？","o":["統合","放置","層別（そうべつ）","隠蔽"],"h":"大きな数字の塊を、特定の切り口で「小分け」にして比較する手法です。","c":2,"e":"層別を行うことで、全体の中に隠れていた「特定の悪い箇所」を浮き彫りにし、具体的な対策を打てるようになります。"},{"m":29,"q":"層別分析において、B製品の納期遅延の原因が「Y工場」に偏っていることが分かった場合、次に行うべき正しい行動はどれですか？","o":["全工場の作業者に注意を促す","Y工場で何が起きたのか、三現主義（現場・現物・現実）に基づいて調査する","納期目標の数値を下げる","分析をここで終了する"],"h":"「事実」に基づいて、真の原因（真犯人）を特定するステップです。","c":1,"e":"問題の所在が絞り込めたら、現場で何が起きているかの事実を確認し、根本原因を突き止める必要があります。"},{"m":29,"q":"KPIの分析において、平均値（狙い）は合っているのに標準偏差（ばらつき）が大きい場合、どのようなリスクがありますか？","o":["リスクは全くない","たまたま規格を外れる不良品が発生するリスク","製品が勝手に良くなるリスク","検査が不要になるリスク"],"h":"「中心」は合っていても、裾野が広がっている状態を想像してください。","c":1,"e":"ばらつきが大きいと、平均的には合格していても、個々の製品が規格の壁を突き破って不良になる確率が高まります。"},{"m":29,"q":"KPI（納期遵守率など）を「期間別」に層別するメリットは何ですか？","o":["カレンダーを覚えるため","異常が発生した特定のタイミング（特定日や特定週）を特定し、原因調査をしやすくするため","休日を増やすため","グラフを長くするため"],"h":"「いつ」起きたかが分かれば、その時の「変化点」が見えてきます。","c":1,"e":"特定の期間にだけ数値が悪化していれば、その時期に導入された新設備や、担当者の交代などの「変化」が原因である可能性が高まります。"},{"m":29,"q":"解説の中で、KPIを車のパーツに例えた場合、どのような表現が使われていましたか？","o":["タイヤ","ハンドル","ダッシュボードの警告灯","バックミラー"],"h":"潜在的な問題を早期に「可視化」してくれる役割を指します。","c":2,"e":"警告灯が点灯した際、それが何を意味するのかを「分析（層別）」することが、安全な運営（業務）には欠かせません。"},{"m":29,"q":"KPIの解析結果に基づき、期待する成果が得られていない場合にQMS（品質マネジメントシステム）が求めていることは何ですか？","o":["目標を諦めること","数値を改ざんすること","要因分析を行い、仕組みや教育などを継続的に改善すること","担当者を叱責すること"],"h":"PDCAサイクルの「Action（改善）」にあたる行動です。","c":2,"e":"データが示す「事実」から学び、再発防止のために手順や教育をアップデートし続けることが、QMSの本質です。"},{"m":29,"q":"本研修のまとめとして、改善活動を成功させるために最も重要な考え方はどれですか？","o":["経験と勘（KKD）だけに頼る","データの総数だけを見て一喜一憂する","KPIを層別し、ばらつきの裏にある「事実」に基づいて意思決定する","難しい計算式を丸暗記する"],"h":"「羅針盤」を正しく読み解くための姿勢についてです。","c":2,"e":"多角的な分析（層別）によって問題の「急所」を見つけ出し、根拠を持って対策を打つことが、改善の精度を劇的に高めます。"},{"m":30,"q":"QC七つ道具を使う最大の目的は何ですか？","o":["複雑な計算式を暗記するため","データの持っている情報を視覚化（見える化）し、事実に基づく意思決定を行うため","報告書のページ数を増やすため","パソコンの操作に慣れるため"],"h":"「数字の羅列」を「意味のある情報」に変えるための役割を考えてください。","c":1,"e":"データに語らせ、推測や思い込みを排除して科学的に問題解決を進めることが本質です。"},{"m":30,"q":"Excelでパレート図を作成し、「どの問題から着手すべきか」を判断する考え方を何と呼びますか？","o":["全体志向","重点志向","楽観志向","放置志向"],"h":"影響の大きい「少数の重要項目」に狙いを定める姿勢のことです。","c":1,"e":"重要度の高い順に並んだ棒グラフと累積比率を見ることで、限られたリソースをどこに投入すべきかが明確になります。"},{"m":30,"q":"Excelでヒストグラムを作成した際、データの「分布の山」が規格の上限や下限に近づいている場合、どのようなリスクが高いと言えますか？","o":["リスクは全くない","ばらつき（標準偏差）が大きく、不良品が発生するリスク","製品が勝手に軽くなるリスク","利益が倍増するリスク"],"h":"「中心」だけでなく「広がり」が規格の壁に迫っている状態を想像してください。","c":1,"e":"ヒストグラムは平均値だけでなく、ばらつきの全体像を視覚化し、工程の危うさを警告してくれます。"},{"m":30,"q":"管理図において、データがまだ管理限界線を越えていなくても、連続して上昇・下降している状態を何と呼びますか？","o":["安定","正常","異常な傾向（トレンド）","偶然のゆらぎ"],"h":"「いつもと違う動き」を早期に発見するためのサインです。","c":2,"e":"この「兆候」を捉えることで、不良が大量発生する前に「先手」を打つ（予防処置）ことが可能になります。"},{"m":30,"q":"集団全体を「機械別」「作業者別」などのグループに分け、その差を見出すQC手法の基本要素は何ですか？","o":["統合","削除","層別（そうべつ）","隠蔽"],"h":"混ぜこぜのデータから、真犯人が潜むグループを特定する手法です。","c":2,"e":"層別を行うことで、全体の平均に隠れて見えなかった「特定の機械の異常」などが浮き彫りになります。"},{"m":30,"q":"Excelの機能の中で、データの「層別分析」を非常に強力に支援するツールはどれですか？","o":["スペルチェック","ピボットテーブル","ワードアート","背景色の設定"],"h":"ドラッグ＆ドロップで項目を入れ替え、多角的な集計ができる機能です。","c":1,"e":"ピボットテーブルを使えば、担当者別や月別などの切り口（層別）での集計が瞬時に行え、原因の所在を特定しやすくなります。"},{"m":30,"q":"Excelで管理図などを作成する際、平均、範囲、標準偏差などの統計量を算出するために便利な機能は何ですか？","o":["Excel関数","フォントサイズの変更","セルの結合","印刷プレビュー"],"h":"複雑な計算を自動で行ってくれる、Excelの核となる機能です。","c":0,"e":"STDEV.P（標準偏差）などの関数を使うことで、計算ミスを防ぎ、データの「読み取り」に集中できます。"},{"m":30,"q":"毎日・毎週行うような定型的なデータ抽出や集計作業を自動化するために適したExcelの機能は何ですか？","o":["コピペ","マクロ（VBA）","上書き保存","ウィンドウの整列"],"h":"一連の操作を記録し、ボタン一つで実行できるようにする機能です。","c":1,"e":"マクロを活用することで作業の手間を大幅に削減し、より付加価値の高い「分析」や「改善」に時間を使えるようになります。"},{"m":30,"q":"自動焼き上げ機の事例において、管理図の「上昇傾向」という警告に基づき、次に行うべき行動は何ですか？","o":["不良が出るまで待つ","真の原因究明（部品の摩耗チェックなど）を迅速に行う","データを削除する","機械を新品に買い替える"],"h":"「異常の兆候」をキャッチした後のアクションを考えてください。","c":1,"e":"警告を無視せず、三現主義に基づいて「なぜ傾向が出ているのか」を調査することが再発防止の鍵です。"},{"m":30,"q":"本研修のまとめとして、ExcelをQC活動に使うメリットを例えた表現はどれですか？","o":["古い地図で歩くこと","高性能なカーナビを使って運転すること","信号機のない道を走ること","徒歩で世界一周すること"],"h":"「目的地（改善）」へ迷わず、迅速にたどり着くためのサポートツールとしての例えです。","c":1,"e":"Excelは、どこに問題（危険）があるかを正確に示し、私たちの意思決定を助けてくれる強力なナビゲーターの役割を果たします。"},{"m":31,"q":"品質管理において、計測機器を厳格に管理する最大の目的は何ですか？","o":["機器を新品のようにピカピカに保つため","測定結果の信頼性（妥当性）を保証し、正しい合否判定を行うため","検査員の作業時間を記録するため","機器の購入費用を安く抑えるため"],"h":"「事実に基づいた意思決定」の根拠となるデータの正しさを守るためです。","c":1,"e":"計測機器が不正確だと、合格品を不合格にしたり、逆に不良品を合格として出荷したりするリスクが生じます。"},{"m":31,"q":"品質に影響を与える計測機器を組織として把握し、漏れなく管理するために作成するリストを何と呼びますか？","o":["従業員名簿","計測機器管理台帳","備品購入履歴","廃棄物一覧表"],"h":"管理すべき全ての機器を登録し、校正状態を追跡するためのマスターリストです。","c":1,"e":"台帳に登録することで、どの機器がどこで使われ、いつ校正が必要かを体系的に管理できるようになります。"},{"m":31,"q":"計測機器が標準（基準）に適合しているかを確認し、精度を調整・証明する作業を何と呼びますか？","o":["清掃","校正（キャリブレーション）または検証","塗装","梱包"],"h":"「ものさし」が正しい長さを指しているか、基準器と比較する作業です。","c":1,"e":"定期的な校正によって、機器の誤差が許容範囲内にあることを公的に証明します。"},{"m":31,"q":"計測機器の「校正状態」を現場で誰もが識別できるようにするために、機器本体に行うべき処置は何ですか？","o":["担当者の名前を彫る","有効期限を表示したラベルなどを貼付する","鍵付きの箱に入れる","目立つ色を塗る"],"h":"「その機器がいま使ってよい有効な状態か」を瞬時に判断できるようにします。","c":1,"e":"ラベル等で有効期限を明示することで、期限切れの機器を誤って使用するミスを防ぎます。"},{"m":31,"q":"計測機器の「不適合」に該当する状況として、適切なものはどれですか？","o":["校正の有効期限が過ぎている","測定値の誤差が許容範囲（公差）を超えている","1と2の両方","機器の表面に少し傷がある"],"h":"測定結果の「正しさ」や「管理状態」が損なわれている状態を指します。","c":2,"e":"期限切れも精度不良も、どちらも「測定結果が信頼できない」不適合な状態です。"},{"m":31,"q":"使用中の計測機器が不適合（精度狂いなど）だと判明した場合、最初に行うべき極めて重要な処置は何ですか？","o":["機器を即座に捨てる","それまでにその機器で測定した過去の結果の妥当性を評価する","誰のせいか犯人探しをする","予備の機器を買いに行く"],"h":"「狂った機器で測られた過去の製品」が大丈夫だったかを確認する必要があります。","c":1,"e":"不適合が分かった時点だけでなく、過去に遡って品質に問題がなかったかを検証する「遡及（そきゅう）処置」が義務付けられています。"},{"m":31,"q":"マイクロメーターが校正期限を3ヶ月過ぎていた場合、製造部門が取るべき責任ある行動はどれですか？","o":["こっそり校正に出して何事もなかったことにする","過去3ヶ月分の測定データを検証し、影響を受けた製品を再検査・隔離する","「たぶん大丈夫」と口頭で報告する","次回から気をつけるというメモを残す"],"h":"品質保証の「事実」が揺らいでいる期間の製品をどう扱うか、という問題です。","c":1,"e":"期限切れの機器で測られた製品は「未検査」と同じ扱いです。遡って安全性を証明しなければなりません。"},{"m":31,"q":"計測機器が不適合だった際の「遡及調査」の結果は、どのように扱うべきですか？","o":["記録を残し、妥当性を評価した証拠とする","メモ書き程度で済ませる","良い結果が出た時だけ記録する","誰にも見せないようにする"],"h":"QMSでは、不適合への対応についても客観的な証拠が求められます。","c":0,"e":"「調査した結果、製品に影響はなかった」あるいは「不適合品を回収した」という一連の記録が、組織の信頼を支えます。"},{"m":31,"q":"計測機器の管理を「羅針盤の精度維持」に例えた場合、羅針盤が狂っていることに気づかないとどのようなリスクがありますか？","o":["船が速くなりすぎる","航路（工程）が目標（規格）から外れていても気づくことができない","燃料が節約できる","魚がたくさん釣れる"],"h":"「正しい方向に進んでいるか」を判断する基準がなくなってしまう状態です。","c":1,"e":"基準が狂っていると、自分たちは正しい（合格）と思っている間に、不適合品の山を築いてしまう恐れがあります。"},{"m":31,"q":"本研修のまとめとして、計測機器管理において最も守るべき「鉄則」は何ですか？","o":["壊れるまで使い続ける","測定結果の妥当性を確保するため、定められた校正と識別を徹底し、異常時は過去に遡って処置する","安い計測機器をたくさん買う","自分の感覚を信じて、機器の数値は参考に留める"],"h":"「事実」を支えるための組織的なルールの根幹です。","c":1,"e":"定期的な校正と、異常時の遡及対応。この二つが揃って初めて、計測データは品質保証の証拠としての価値を持ちます。"},{"m":32,"q":"トヨタ生産方式（TPS）の真髄として、徹底的に排除すべき「3つの要素」は何ですか？","o":["過去・現在・未来","ムダ・ムラ・ムリ","速度・感度・鮮度","予算・人員・時間"],"h":"「付加価値を生まないもの」「ばらつき」「過度な負荷」を指します。","c":1,"e":"これら3つを排除し続けることで、プロセスの効率を高め、品質の安定（欠陥の予防）を実現します。"},{"m":32,"q":"TPSの創設者・大野耐一氏が説いた、改善活動の土台となる「哲学」は何ですか？","o":["今のやり方を維持すること","今のつくり方の否定","過去の成功体験の模倣","現場に行かない管理"],"h":"「今の方法はまずい方法だ」と常に問いかけ、より良い方法を模索する姿勢です。","c":1,"e":"現状を最高だと思った瞬間に改善は止まります。「今のやり方はまだ悪い」と否定することから新しいアイデアが生まれます。"},{"m":32,"q":"必要なものを、必要なときに、必要な量だけ生産・供給する仕組みを何と呼びますか？","o":["ジャスト・イン・ケース（万が一に備えて）","ジャスト・イン・タイム（JIT）","ファースト・イン・ファースト・アウト（先入れ先出し）","ラスト・ワン・マイル"],"h":"多量在庫を持たず、最小限の条件で操業を目指す考え方です。","c":1,"e":"JITは、ムダな在庫や資源の大量消費を抑え、顧客の要求に同期して生産する仕組みです。"},{"m":32,"q":"JITを実現するための道具で、使った分だけ補充する「後補充」の原則に基づく管理板を何と呼びますか？","o":["スコアボード","かんばん（Kanban）","掲示板","ブラックボード"],"h":"生産ラインと供給ラインの作業指示を同期させるためのカードです。","c":1,"e":"かんばんは単なる道具であり、JITという大きなシステムを機能させるための一部として機能します。"},{"m":32,"q":"TPSにおいて、JITを導入する「真のねらい」は何ですか？","o":["倉庫を空にして掃除をしやすくすること","問題の顕在化と改善意識の定着","従業員を忙しくさせること","記録書類を減らすこと"],"h":"効率化そのものよりも、組織として「異常に気づく力」を高めることに重点があります。","c":1,"e":"余裕をなくすことで問題（ムダ）を表面化させ、それを解決し続けることで企業体質を強化します。"},{"m":32,"q":"作業者が不良品を後工程に流さないように、ミスを物理的に防ぐ仕組みを何と呼びますか？","o":["あんどん","ポカヨケ（エラー・プルーフ）","根回し","忖度"],"h":"「うっかりミス（ポカ）」を「避ける」ための仕組みです。","c":1,"e":"品質を工程で作り込み、人の注意だけに頼らずに不良をゼロにするための工夫です。"},{"m":32,"q":"TPSにおいて、過剰在庫が「悪」とされる最大の理由は何ですか？","o":["場所をとるから","帳簿上の計算が面倒だから","故障や不良などの「問題点」を覆い隠し、改善の機会を奪うから","従業員のやる気を削ぐから"],"h":"在庫という「城壁」があると、中の問題が見えなくなってしまいます。","c":2,"e":"在庫に余裕があると、トラブルが起きても「予備があるから大丈夫」と問題を先送りしてしまい、根本解決に至らなくなります。"},{"m":32,"q":"異常が発生した際、稼働状況をひと目で周囲に知らせる管理システムを何と呼びますか？","o":["サイレン","あんどん","信号機","スピーカー"],"h":"日本の伝統的な照明器具から名付けられた、「目で見る管理」の代表例です。","c":1,"e":"あんどんによって異常が可視化され、監督者が即座に助けに入ったり、ラインを止めたりする判断が可能になります。"},{"m":32,"q":"高い挑戦目標を達成するために、単なる「ムダとり」以上に重要だとされていることは何ですか？","o":["働く時間を長くすること","過去の手順を厳守すること","新しいアイデアを打ち出すこと","人数を増やすこと"],"h":"従来のやり方の延長線上では届かない壁を破るための要素です。","c":2,"e":"改善は「知恵」を出す活動です。今までの延長ではない斬新な発想が、飛躍的な向上をもたらします。"},{"m":32,"q":"本研修のまとめとして、TPSにおける改善活動を「航海」に例えた場合、正しい姿勢はどれですか？","o":["浸水を防ぐために、海水をどんどん注ぎ足して船を安定させる","在庫（海水）を減らして隠れた汚染源（問題）を露呈させ、解決することで船体（体質）を強くする","嵐が来ないことを祈りながら何もしない","船底の穴を見ないようにする"],"h":"「あえて厳しい状況」を作ることで、真の弱点を見つけ出すという考え方です。","c":1,"e":"あえて「城壁」を低くし、隠れた問題を白日の下にさらして一つずつ潰していくことこそが、TPSの進化のプロセスです。"},{"m":33,"q":"カンバン方式の基礎となる、「必要なものを、必要な時に、必要な量だけ」供給する思想を何と呼びますか？","o":["ジャスト・イン・ケース","ジャスト・イン・タイム（JIT）","プレ・オーダー","アフター・サービス"],"h":"「ちょうど間に合う」という意味を持つ、TPSの2大柱の一つです。","c":1,"e":"JITは無駄な在庫を持たず、効率的な生産を目指す思想であり、カンバンはその具体的な運用ツールです。"},{"m":33,"q":"前工程が計画通りに押し出すのではなく、後工程が使った分だけを前工程に要求する仕組みを何と呼びますか？","o":["プッシュ方式","プル方式（後工程引き）","ストップ方式","スルー方式"],"h":"「後ろから引っ張る」イメージです。コンビニの棚補充と同じ発想です。","c":1,"e":"後工程が必要な分だけを引き取ることで、前工程での「作りすぎのムダ」を根源から断ち切ります。"},{"m":33,"q":"部材置き場から部品を引き出す際の指示書として機能するカンバンを何と呼びますか？","o":["生産指示かんばん","引き取りかんばん","廃棄連絡票","入荷案内書"],"h":"「持っていく」ための許可証の役割を果たします。","c":1,"e":"引き取りかんばんは、後工程が前工程に対して「これだけの部品をください」と伝える出庫指示の役割を持ちます。"},{"m":33,"q":"引き取られた分だけを補充するために、機械やラインに対して製造を命じるカンバンを何と呼びますか？","o":["生産指示かんばん","出勤簿","検査成績書","掃除チェックリスト"],"h":"前工程に対して「減った分を作れ」と命令する役割です。","c":0,"e":"生産指示かんばんに基づいてのみ製造を行うことで、現場に「勝手な作り溜め」が発生することを防ぎます。"},{"m":33,"q":"カンバン（カード）と共にモノを運ぶ際に使われる、発注者が定めた納入用容器を何と呼びますか？","o":["ダンボール","通い箱（かよいばこ）","木箱","宝箱"],"h":"発注者と納入者の間を何度も往復する、再利用可能な箱です。","c":1,"e":"通い箱とカンバンをセットで運用することで、モノと情報の動きを一致させ、「目で見る管理」を実現します。"},{"m":33,"q":"カンバン方式によって在庫を「必要最小限」に抑える最大の「戦略的な狙い」は何ですか？","o":["倉庫の電気代を浮かすため","隠れていたムダや問題を強制的に顕在化（見える化）させるため","従業員の歩く距離を短くするため","伝言ゲームを楽しむため"],"h":"在庫という「城壁」を低くすると、中にある岩（問題）が水面上に現れます。","c":1,"e":"在庫に余裕がない状態では、少しの故障や不良もライン停止に直結します。この「切迫感」が、迅速な改善活動を促すのです。"},{"m":33,"q":"過剰在庫がある状態で、機械故障などのトラブルが起きた際に陥りやすい「悪い習慣」は何ですか？","o":["すぐに根本原因を追究する","「予備があるから大丈夫」と問題を先送りしてしまう","機械を新品に買い替える","全員で万歳三唱する"],"h":"「城壁」が問題を隠してしまうことの弊害を考えてください。","c":1,"e":"過剰在庫は改善の芽を摘み取ります。問題が起きても表面化しないため、真の原因が放置され、組織が弱体化します。"},{"m":33,"q":"カンバン方式が正常に機能するために、現場の作業者が守るべき鉄則は何ですか？","o":["カンバンがなくても手が空いたら作る","消費された分（カンバンが外れた分）だけを引き取り、補充する","難しい計算を毎日行う","在庫をできるだけ隠し持つ"],"h":"「プル方式」のルールを徹底することがシステムの命です。","c":1,"e":"「カンバンなき生産・運搬は禁止」というルールを守ることで、全体の同期化が保たれます。"},{"m":33,"q":"部品供給ラインの事例において、機械が故障して部品供給が止まった際、TPSではこれをどう捉えますか？","o":["運が悪かったと諦める","「ムダが潜んでいる」という警告と捉え、再発防止のチャンスとする","担当者を厳しく叱る","故障を隠して手作業でしのぐ"],"h":"ラインが止まることは、改善が必要な箇所を教えてくれる「合図」です。","c":1,"e":"「止まる」ことは悪いことではなく、プロセスの弱点を見つけ、より強固な仕組みを作るためのスタート地点です。"},{"m":33,"q":"本研修のまとめとして、カンバン方式を「糸電話」に例えた場合、「糸」が張り詰めている状態（低在庫）で異音が起きた時のメリットは何ですか？","o":["音が小さくて聞こえない","異常な振動（問題）がすぐに全体に伝わり、解決せざるを得なくなる","糸が切れても誰も気づかない","楽しくお喋りができる"],"h":"情報の伝達スピードと、異常への反応感度の高さを指しています。","c":1,"e":"余裕を削ぎ落とした「張り詰めた状態」こそが、小さな異常も見逃さない高感度な組織（リーンな組織）を作ります。"},{"m":34,"q":"「なぜなぜ問答」を行う究極の目的は何ですか？","o":["誰がミスをしたのか犯人を特定するため","目の前の問題をとりあえず片付けるため","問題の根本原因（真因）を突き止め、再発防止策（是正処置）につなげるため","会議の時間を長くするため"],"h":"「二度と同じ不適合を起こさない仕組み」を作るための活動です。","c":2,"e":"表面的な「修正」で終わらせず、奥に潜む仕組みの欠陥を直すことで、組織の信頼を維持します。"},{"m":34,"q":"「なぜなぜ問答」において、一般的に真の原因（真因）にたどり着くために推奨される「なぜ」の回数は最低何回ですか？","o":["1回","2回","3〜5回","10回以上"],"h":"1〜2回では直接的な原因（不注意など）で止まりがちです。","c":2,"e":"「なぜ」を繰り返すことで、個人の行動の裏にある「組織のルール」や「管理体制」の問題が見えてきます。"},{"m":34,"q":"作業者の不注意で不良が出た際、すぐに「作業者を厳重注意した」という対策で終えることを何と呼びますか？","o":["是正処置","予防処置","修正処置（応急処置）","恒久対策"],"h":"その場しのぎの対応であり、別の人が同じ状況になれば再発する可能性があります。","c":2,"e":"個人の注意力に頼る対策は「修正」に過ぎません。仕組みを変える「是正」とは区別する必要があります。"},{"m":34,"q":"「なぜなぜ問答」を進める上で、判断の根拠として最も重視すべきものは何ですか？","o":["担当者の勘","過去の慣習","客観的な事実（データ）","誰かの予測"],"h":"感情論や曖昧な予測を排除することが、QC（品質管理）の基本原則です。","c":2,"e":"「三現主義（現場・現物・現実）」に基づいた事実を確認しなければ、間違った原因にたどり着いてしまいます。"},{"m":34,"q":"具体例1の「キズ不良」において、真の原因（真因）は何だと判断されましたか？","o":["作業員のやる気不足","ヤスリが古かった","作業標準書における具体的な判断基準の欠如（標準化の不備）","工場の照明が暗かった"],"h":"「どこまで削るか」が誰でもわかるようになっていたかを考えてください。","c":2,"e":"「曖昧な基準」こそが真因であり、写真見本などで標準化することが正しい是正処置となります。"},{"m":34,"q":"具体例2の「計測機器の校正切れ」において、是正処置として適切な考え方はどれですか？","o":["担当者に毎日リマインドメールを送る","期限が切れた機器をすぐに校正に出す","期限管理を個人に依存させず、多重チェックや自動アラートなどのシステムを構築する","カレンダーに大きく印をつける"],"h":"「うっかり忘れ」が起きても、システムがそれをカバーできるかどうかが鍵です。","c":2,"e":"属人化（個人への依存）を排除し、仕組み（システム）でミスを防ぐのがQMSの本来の姿です。"},{"m":34,"q":"具体例3の「納期遅延」の深掘りにおいて、最終的にたどり着いた真因は何でしたか？","o":["部品の摩耗","運送業者の遅刻","コスト優先で予防保全を軽視した経営的な判断や体制の欠如","天候不良"],"h":"一見「機械の故障」に見えますが、なぜその故障を防げなかったのかを考えます。","c":2,"e":"物理的な故障の背後には、保全計画を実行させない「組織の判断」という重い真因が隠れていることがあります。"},{"m":34,"q":"「なぜなぜ問答」における「ヒューマンエラー（人のミス）」の捉え方として、正しいものはどれですか？","o":["ミスをした本人が一番悪い","組織の仕組みや管理体制の問題が、個人の行動として現れた「結果」である","人間だから仕方がないと諦める","注意すればなくなるものである"],"h":"「人」を責めるのではなく、「仕組み」を責める考え方です。","c":1,"e":"エラーを「結果」と捉えることで、その背後にある「真の原因」を冷静に分析できるようになります。"},{"m":34,"q":"研修のまとめにおいて、「なぜなぜ問答」は何に例えられていましたか？","o":["壊れたものを直す大工さん","組織の「仕組みの病巣」を明らかにする診断ツール（予防医療）","過去を振り返る日記","責任者を探す裁判官"],"h":"症状が出る前に根源を治療する、というニュアンスです。","c":1,"e":"些細なサインから構造的な問題を特定し、組織を健康な状態（強靭な体質）に保つ役割を指しています。"},{"m":34,"q":"是正処置を行った後に、QMS（品質マネジメントシステム）として確認すべき最も重要なことは何ですか？","o":["報告書の枚数","対策にかかった費用","実施した処置が本当に有効であったか（再発していないか）の検証","誰が対策を考えたか"],"h":"「やりっぱなし」ではなく、効果を確認するPDCAのステップです。","c":2,"e":"対策後に一定期間観察し、問題が再発していないことを確認して初めて、是正活動は完了します。"},{"m":35,"q":"受入検査（入荷検査）の定義として、最も適切なものはどれですか？","o":["完成した製品を顧客に届ける直前のチェック","購入先や外注先から納入された品物を受け入れてよいか判定する活動","製造途中の仕掛品の寸法を測る活動","倉庫の在庫数を数える活動"],"h":"外部から入ってくるものを「関所」で止めるイメージです。","c":1,"e":"受入検査は、外部から調達した原材料や部品が、自社の要求仕様を満たしているかを確認する最初のステップです。"},{"m":35,"q":"受入検査の「究極の目的」は何ですか？","o":["不適合品が後工程や顧客に渡らないように保証すること","サプライヤーを厳しく叱ること","検査員の残業代を増やすこと","伝票の枚数を確認すること"],"h":"「悪いものを流さない」という品質管理の基本原則に基づきます。","c":0,"e":"不適合品を早い段階で取り除くことで、無駄な加工コストの発生や、最終的な品質事故を未然に防ぎます。"},{"m":35,"q":"解説の中で、「受入検査で不適合が見つかること」は協力会社側のどのような状態を示していると述べられていますか？","o":["協力会社が非常に忙しい状態"     var d=document.createElement('div');d.className='mc';
    d.innerHTML='<span class="mn">'+(i+1)+'</span><span class="mdiv"></span><div><span class="mt">'+t+'</span><div class="mt2">'+qc[i]+'問</div></div><span class="marr">→</span>';
    d.onclick=function(){pickMod(i)};
    ml.appendChild(d);
  });
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelCourse').style.display='none';
}else if(showVideo&&showCourse){
  tabs.innerHTML='<button class="tb t-video on" onclick="switchTab(\'video\')">\ud83d\udcfa この動画の確認テスト</button><button class="tb t-course" onclick="switchTab(\'course\')">\ud83d\udccb コース全体テスト</button>';
}else{tabs.style.display='none'}

// Init (non-all mode)
if(!allMode&&showVideo){
  document.getElementById('svTitle').textContent=QD.titles[modIdx]+' 確認テスト';
  var mc=QD.questions.filter(function(q){return q.m===modIdx}).length;
  document.getElementById('svCount').textContent=mc;
  document.getElementById('panelVideo').style.display='block';
}
if(!allMode&&showCourse){
  document.getElementById('panelCourse').style.display=showVideo?'none':'block';
}
if(!allMode&&!showVideo&&showCourse)document.getElementById('panelCourse').style.display='block';

// All-mode: pick a module
window.pickMod=function(idx){
  modIdx=idx;
  document.getElementById('panelSelect').style.display='none';
  document.getElementById('svTitle').textContent=QD.titles[idx]+' 確認テスト';
  var mc=QD.questions.filter(function(q){return q.m===idx}).length;
  document.getElementById('svCount').textContent=mc;
  document.getElementById('panelVideo').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

function switchTab(t){
  document.querySelectorAll('.tb').forEach(function(b){
    var isMatch=(t==='select'&&b.classList.contains('t-video'))||b.classList.contains('t-'+t);
    b.classList.toggle('on',isMatch);
  });
  var ps=document.getElementById('panelSelect');
  if(t==='select'){
    if(ps)ps.style.display='block';
    document.getElementById('panelVideo').style.display='none';
  }else if(t==='video'){
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='block';
  }else{
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='none';
  }
  document.getElementById('panelCourse').style.display=t==='course'?'block':'none';
}

// Quiz engine
var quizzes={video:{qs:[],ci:0,sc:0,ans:[]},course:{qs:[],ci:0,sc:0,ans:[]}};

window.go=function(m){
  mode=m;var qz=quizzes[m];qz.ci=0;qz.sc=0;qz.ans=[];
  if(m==='video'){
    qz.qs=QD.questions.filter(function(q){return q.m===modIdx});
    for(var i=qz.qs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=qz.qs[i];qz.qs[i]=qz.qs[j];qz.qs[j]=t}
  }else{
    var pool=[].concat(QD.questions),sel=[];
    var totalPool=pool.length,targetQ=Math.min(39,totalPool);
    for(var mm=0;mm<39;mm++){var mq=pool.filter(function(q){return q.m===mm});if(mq.length>0)sel.push(mq[Math.floor(Math.random()*mq.length)])}
    var rem=pool.filter(function(q){return sel.indexOf(q)<0});
    var extrasNeeded=targetQ-sel.length;
    for(var i=0;i<extrasNeeded;i++){var p=rem.splice(Math.floor(Math.random()*rem.length),1)[0];if(p)sel.push(p)}
    for(var i=sel.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sel[i];sel[i]=sel[j];sel[j]=t}
    qz.qs=sel;
  }
  g('start'+(m==='video'?'Video':'Course')).style.display='none';
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.style.display='block';
  showQ(m);qEl.scrollIntoView({behavior:'smooth'});
};

function g(id){return document.getElementById(id)}

function showQ(m){
  var qz=quizzes[m],q=qz.qs[qz.ci],total=qz.qs.length;
  var cls=m==='video'?'c-video':'c-course';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.innerHTML='<div class="pg"><div class="pgb"><div class="pgf '+cls+'" style="width:'+((qz.ci/total)*100)+'%"></div></div><div class="pgc">'+(qz.ci+1)+' / '+total+'</div></div>'
    +'<div class="qm">\ud83d\udcd8 '+QD.titles[q.m]+'</div>'
    +'<div class="qt">'+q.q+'</div>'
    +(q.h?'<button class="hb" onclick="tH(\''+m+'\')">\ud83d\udca1 ヒントを見る</button><div class="hi" id="hi_'+m+'">'+q.h+'</div>':'')
    +'<div class="os" id="os_'+m+'"></div>'
    +'<div class="ex" id="ex_'+m+'"></div>'
    +'<button class="nx '+cls+'" id="nx_'+m+'" onclick="nxt(\''+m+'\')">'+(qz.ci<total-1?'次の問題へ →':'結果を見る →')+'</button>';
  var os=g('os_'+m);
  q.o.forEach(function(opt,i){
    var d=document.createElement('div');d.className='o';
    d.innerHTML='<span class="ol">'+L[i]+'</span><span>'+opt+'</span>';
    d.onclick=function(){sel(m,i)};os.appendChild(d);
  });
}

window.sel=function(m,idx){
  var qz=quizzes[m],q=qz.qs[qz.ci];
  var opts=g('os_'+m).querySelectorAll('.o');
  if(opts[0].classList.contains('lk'))return;
  opts.forEach(function(o){o.classList.add('lk')});
  var ok=idx===q.c;if(ok)qz.sc++;
  qz.ans.push({q:q,sel:idx,ok:ok});
  opts[q.c].classList.add('ok');
  if(!ok)opts[idx].classList.add('ng');
  var e=g('ex_'+m);e.textContent=(ok?'\u2705 正解！ ':'\u274c 不正解… ')+q.e;e.style.display='block';
  g('nx_'+m).style.display='inline-block';
};

window.tH=function(m){var h=g('hi_'+m);h.style.display=h.style.display==='none'?'block':'none'};

window.nxt=function(m){
  var qz=quizzes[m];qz.ci++;
  if(qz.ci<qz.qs.length){showQ(m);g('q'+(m==='video'?'Video':'Course')).scrollIntoView({behavior:'smooth'})}
  else showResult(m);
};

function showResult(m){
  var qz=quizzes[m];
  g('q'+(m==='video'?'Video':'Course')).style.display='none';
  var rEl=g('r'+(m==='video'?'Video':'Course'));rEl.style.display='block';
  var pct=Math.round(qz.sc/qz.qs.length*100),pass=m==='video'?pct>=70:pct>=80;
  var rank,rc;
  if(pct>=95){rank='S';rc='#d4a017'}else if(pct>=85){rank='A';rc='#22c55e'}else if(pct>=75){rank='B';rc='#3b82f6'}else if(pct>=60){rank='C';rc='#f59e0b'}else{rank='D';rc='#ef4444'}
  var wrongs=qz.ans.filter(function(a){return!a.ok});
  var h='<div class="rc '+(pass?'ps':'fl')+'">'
    +'<div class="rk" style="color:'+rc+'">'+rank+'</div>'
    +'<div class="rs">'+pct+'%</div>'
    +'<div class="rd">'+qz.qs.length+'問中 '+qz.sc+'問正解</div>'
    +(pass?'<div class="rpm">\ud83c\udf89 '+(m==='video'?'よくできました！':'合格おめでとうございます！')+'</div>':'<div class="rfm">'+(m==='video'?'もう一度動画を見て再挑戦してみましょう。':'合格基準（80%）に届きませんでした。動画を復習して再挑戦してみましょう。')+'</div>')
    +'<button class="B '+(m==='video'?'bg':'bo')+'" onclick="retry(\''+m+'\')" style="margin-top:10px">もう一度受ける</button></div>';
  if(wrongs.length>0){
    h+='<div class="rvt">間違えた問題の復習</div>';
    wrongs.forEach(function(w){
      h+='<div class="rvi"><div class="qm" style="margin-bottom:4px">\ud83d\udcd8 '+QD.titles[w.q.m]+'</div>'
        +'<div class="rvq">'+w.q.q+'</div>'
        +'<div class="rvy">\u2717 あなたの回答：'+L[w.sel]+'. '+w.q.o[w.sel]+'</div>'
        +'<div class="rvc">\u25cb 正解：'+L[w.q.c]+'. '+w.q.o[w.q.c]+'</div>'
        +'<div class="rve">\ud83d\udca1 '+w.q.e+'</div></div>';
    });
  }else{h+='<div style="text-align:center;color:#22c55e;font-weight:700;font-size:16px;padding:16px">\ud83c\udf8a 全問正解です！</div>'}
  rEl.innerHTML=h;
  rEl.scrollIntoView({behavior:'smooth'});
}

window.retry=function(m){
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  g('start'+(m==='video'?'Video':'Course')).style.display='block';
};

window.backToList=function(){
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

// In all mode, add back button to video start panel
if(allMode){
  var sv=document.getElementById('startVideo');
  var bk=document.createElement('button');
  bk.className='mbk';bk.innerHTML='\u2190 モジュール一覧に戻る';
  bk.onclick=backToList;
  sv.insertBefore(bk,sv.firstChild);
}

// Auto-height: tell parent iframe to resize (no scrollbar)
function reportHeight(){
  var h=document.getElementById('R').scrollHeight+48;
  window.parent.postMessage({qh:h},'*');
}
var ro=new ResizeObserver(reportHeight);
ro.observe(document.getElementById('R'));
setTimeout(reportHeight,300);
</script>
