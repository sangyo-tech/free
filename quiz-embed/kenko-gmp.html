<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>確認テスト | 産業技術アカデミー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:transparent}
#R{font-family:'Noto Sans JP',system-ui,sans-serif;color:#f1f5f9;line-height:1.7;max-width:800px;margin:0 auto;padding:24px 16px}
#R *{box-sizing:border-box;margin:0;padding:0}
#R button{font-family:inherit;cursor:pointer}

/* Tabs */
.tt{display:flex;gap:0;margin-bottom:32px;background:#0f172a;border-radius:14px;padding:5px;border:1px solid #1e293b}
.tb{flex:1;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:700;border:none;background:transparent;color:#64748b;transition:all .3s;letter-spacing:.02em;text-align:center}
.tb:hover:not(.on){color:#94a3b8;background:rgba(255,255,255,.03)}
.tb.on{color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.tb.t-video.on{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;box-shadow:0 4px 16px rgba(34,197,94,.3)}
.tb.t-course.on{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 4px 16px rgba(245,158,11,.3)}

/* Start */
.S{border-radius:14px;padding:32px 24px;text-align:center}
.S.s-video{background:linear-gradient(135deg,rgba(34,197,94,.05),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.S.s-course{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(245,158,11,.08));border:1px solid rgba(245,158,11,.2)}
.S h3{font-size:18px;font-weight:700;margin-bottom:8px;color:#f1f5f9}
.S p{color:#94a3b8;font-size:14px;margin-bottom:20px;line-height:1.8}
.sp{display:flex;justify-content:center;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.sv{font-size:22px;font-weight:700}
.s-video .sv{color:#22c55e}
.s-course .sv{color:#f59e0b}
.sl{font-size:11px;color:#64748b}

/* Buttons */
.B{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:12px;font-size:16px;font-weight:700;border:none;transition:all .3s;position:relative;overflow:hidden}
.B::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);opacity:0;transition:opacity .3s}
.B:hover{transform:translateY(-3px)}.B:hover::after{opacity:1}
.B:active{transform:translateY(-1px)}
.B.bg{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000;box-shadow:0 6px 24px rgba(34,197,94,.3)}
.B.bo{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;box-shadow:0 6px 24px rgba(245,158,11,.3)}

/* Quiz */
.Q{display:none}
.pg{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.pgb{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.pgf{height:100%;border-radius:3px;transition:width .3s}
.pgf.c-video{background:#22c55e}.pgf.c-course{background:#f59e0b}
.pgc{font-size:13px;color:#64748b;white-space:nowrap}
.qm{font-size:12px;color:#06b6d4;margin-bottom:8px;font-weight:500}
.qt{font-size:16px;font-weight:600;margin-bottom:18px;line-height:1.6;color:#f1f5f9}
.hb{font-size:12px;color:#d4a017;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);border-radius:6px;padding:4px 12px;margin-bottom:14px;display:inline-block}
.hi{display:none;font-size:13px;color:#94a3b8;background:rgba(212,160,23,.05);border-left:3px solid #d4a017;padding:10px 14px;border-radius:6px;margin-bottom:14px}
.os{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.o{background:#111827;border:2px solid #1e293b;border-radius:10px;padding:13px 16px;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;text-align:left;color:#f1f5f9}
.o:hover:not(.lk){border-color:#334155;background:#1a2332}
.ol{width:26px;height:26px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#94a3b8}
.o.ok{border-color:#22c55e;background:rgba(34,197,94,.08)}.o.ok .ol{background:#22c55e;color:#fff}
.o.ng{border-color:#ef4444;background:rgba(239,68,68,.08)}.o.ng .ol{background:#ef4444;color:#fff}
.ex{display:none;background:rgba(59,130,246,.06);border-left:3px solid #3b82f6;border-radius:6px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#94a3b8;line-height:1.7}
.nx{display:none;border:none;border-radius:8px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.nx:hover{transform:translateY(-2px)}
.nx.c-video{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000}
.nx.c-course{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}

/* Result */
.Rs{display:none}
.rc{border-radius:14px;padding:32px 24px;text-align:center;margin-bottom:24px}
.rc.ps{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.rc.fl{background:linear-gradient(135deg,rgba(239,68,68,.04),rgba(239,68,68,.08));border:1px solid rgba(239,68,68,.2)}
.rk{font-size:52px;font-weight:700;margin-bottom:6px}
.rs{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.rd{font-size:14px;color:#94a3b8;margin-bottom:14px}
.rpm{font-size:15px;font-weight:600;color:#22c55e;margin-bottom:14px}
.rfm{font-size:15px;font-weight:600;color:#ef4444;margin-bottom:14px}
.rvt{font-size:16px;font-weight:700;margin-bottom:14px;color:#f59e0b}
.rvi{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:16px 18px;margin-bottom:10px;text-align:left}
.rvq{font-size:13px;font-weight:600;margin-bottom:6px;color:#f1f5f9}
.rvy{font-size:12px;color:#ef4444;margin-bottom:3px}
.rvc{font-size:12px;color:#22c55e;margin-bottom:6px}
.rve{font-size:12px;color:#94a3b8;line-height:1.6}

/* Module selector (all mode) */
.ms{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.mc{background:linear-gradient(135deg,#111827 0%,#0f172a 100%);border:1px solid #1e293b;border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:16px;text-align:left;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(34,197,94,.06) 0%,rgba(34,197,94,.02) 100%);opacity:0;transition:opacity .3s}
.mc:hover{border-color:#22c55e;transform:translateX(6px);box-shadow:0 4px 20px rgba(34,197,94,.12)}
.mc:hover::before{opacity:1}
.mc:active{transform:translateX(3px) scale(.99)}
.mn{width:36px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#22c55e;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;background:none;border:none;box-shadow:none;margin-right:4px;text-shadow:0 0 12px rgba(34,197,94,.25)}
.mc:hover .mn{color:#4ade80;text-shadow:0 0 20px rgba(34,197,94,.5);transform:scale(1.12)}
.mdiv{width:1px;height:32px;background:linear-gradient(180deg,transparent,#334155 30%,#334155 70%,transparent);flex-shrink:0;margin:0 4px;transition:background .3s}
.mc:hover .mdiv{background:linear-gradient(180deg,transparent,#22c55e 30%,#22c55e 70%,transparent)}
.mt{font-size:14px;color:#e2e8f0;font-weight:600;line-height:1.5;position:relative;z-index:1}
.mt2{font-size:11px;color:#64748b;font-weight:400;margin-top:2px}
.mc:hover .mt{color:#fff}
.mc:hover .mt2{color:#94a3b8}
.marr{margin-left:auto;color:#334155;font-size:16px;transition:all .3s;position:relative;z-index:1}
.mc:hover .marr{color:#22c55e;transform:translateX(3px)}
.mhd{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mhd::before{content:'';display:inline-block;width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,#22c55e,#4ade80)}
.msd{font-size:13px;color:#94a3b8;margin-bottom:20px;padding-left:12px}
.mbk{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #1e293b;background:#111827;color:#94a3b8;cursor:pointer;margin-bottom:16px;transition:all .25s}
.mbk:hover{background:#1e293b;color:#f1f5f9;border-color:#334155;transform:translateX(-3px)}
.mcnt{display:inline-flex;align-items:center;justify-content:center;background:rgba(34,197,94,.1);color:#22c55e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px}

@media(max-width:600px){.qt{font-size:14px}.o{padding:11px 13px;font-size:13px}.S{padding:24px 16px}}
</style>
</head>
<body>
<div id="R">
  <div class="tt" id="tabs"></div>
  <div id="panelSelect" style="display:none">
    <div class="mhd">動画別 確認テスト<span class="mcnt">全23回</span></div>
    <div class="msd">テストしたいモジュールを選んでください</div>
    <div class="ms" id="modList"></div>
  </div>
  <div id="panelVideo" style="display:none">
    <div class="S s-video" id="startVideo">
      <h3 id="svTitle"></h3>
      <p>この動画の内容から出題されます。</p>
      <div class="sp">
        <div><div class="sv" id="svCount">10</div><div class="sl">問題数</div></div>
        <div><div class="sv">解説付き</div><div class="sl">正誤判定</div></div>
      </div>
      <button class="B bg" onclick="go('video')">テストを始める →</button>
    </div>
    <div class="Q" id="qVideo"></div>
    <div class="Rs" id="rVideo"></div>
  </div>
  <div id="panelCourse" style="display:none">
    <div class="S s-course" id="startCourse">
      <h3>健康食品GMP コース 確認テスト</h3>
      <p>23モジュールの内容からランダムに23問出題されます。</p>
      <div class="sp">
        <div><div class="sv">23</div><div class="sl">問題数</div></div>
        <div><div class="sv">80%</div><div class="sl">合格ライン</div></div>
      </div>
      <button class="B bo" onclick="go('course')">コーステストを始める →</button>
    </div>
    <div class="Q" id="qCourse"></div>
    <div class="Rs" id="rCourse"></div>
  </div>
</div>
<script>
const QUIZ_DATA = {"titles":["第1回：【効率化の鍵】最小限の労力で認証を取得するためのロードマップ","第2回：GMPの法的義務化と最新の規制動向（指定成分・機能性表示食品への適用）","第3回：消費者庁・厚生労働省の指針解説（311通知と2025年版ガイドラインの要点）","第4回：GMP組織体制の構築と責任者の要件（三役の任務と「資質」の評価）","第5回：【2025年版新設】「品質確認」機能の役割と製造部門からの独立性の確保","第6回：GMP文書体系の整備と5大基準書の策定実務（作成事例の活用）","第7回：記録の信頼性を担保するALCOA+の原則と適正な文書管理手順（SOP）","第8回：製品標準書の作成実務（必須12項目と賞味期限設定の科学的根拠）","第9回：微生物等関連原材料への特別対応（同等性・同質性評価とプロファイル分析）","第10回：原材料・資材の受入試験と合格・不適合品の識別・保管管理実務","第11回：製造指図書・記録書の運用と重要工程におけるダブルチェックの徹底","第12回：製造現場の衛生管理（作業服装・手洗い・清掃・防虫防鼠・用水管理）","第13回：構造設備（GMPハード）の要件と交叉汚染を防止する動線設計","第14回：品質管理基準に基づく試験検査実務と参考品（2倍量以上）の保管ルール","第15回：バリデーション（妥当性確認）の実施計画と変更管理のクラス分類","第16回：逸脱管理の手順と品質情報（苦情・不適合品）の原因究明・再発防止策","第17回：健康被害情報の収集・届出実務（消費者庁への迅速な報告と連携体制）","第18回：【審査対策】「自己点検表」を活用した模擬内部監査と改善報告のコツ","第19回：GMP認定申請手続きの実際（書類調査・実地調査（プラントツアー）対策）","第20回：GMPマークの適切な活用法と表示ルール（認定工場マークと製品マーク）","第21回：中小企業向け前編：GMP導入の第一歩「組織づくりとルールの文書化」","第22回：中小企業向け後編：実践！「現場の環境整備と認定取得への道」","第23回：2025年版ガイドラインで新設された「品質確認」の業務"],"questions":[{"m":0,"q":"GMP認定申請を行うために最低限必要とされる、基準に沿った製造・管理の「運用実績」はどのくらいの期間ですか？","o":["1週間","1ヶ月","3ヶ月程度","1年"],"h":"「形を作った」だけでなく、実際にその通りに運用した証拠（記録）が求められます。","c":2,"e":"適切な手順書に基づき、実際に製造・品質管理を行った記録が3ヶ月分程度蓄積されていることが、申請の前提条件となります。"},{"m":0,"q":"管理文書（5大基準書など）を作成する際、最も効率的でミスが少ない方法はどれですか？","o":["インターネットで古い情報を探して写す","認定協会（日健栄協等）が提供する「管理文書の作成事例（雛形）」をベースにする","自分の記憶だけでゼロから書き起こす","他社の機密文書を盗用する"],"h":"「合格ライン」を網羅した公式のテンプレートを使うのが最短ルートです。","c":1,"e":"公式の作成事例は、審査をクリアするために必要な項目が全て盛り込まれています。これを自社の実態に合わせて調整（カスタマイズ）するのが最も賢いやり方です。"},{"m":0,"q":"審査員がチェックするポイントを事前に把握し、自社で改善箇所を特定するために活用すべき資料は何ですか？","o":["昨日の新聞","自己点検表（項目解説）や事前チェックリスト","会社のパンフレット","社長の訓話"],"h":"いわば「試験の出題範囲と採点基準」が書かれた虎の巻です。","c":1,"e":"自己点検表を読み込むことで、「どこが重要工程と見なされるか」「どのレベルの管理が求められているか」という審査員の視点を持つことができます。"},{"m":0,"q":"具体例①のA社が陥った、自力での準備による「最大の無駄」は何でしたか？","o":["コンサル料を払いすぎたこと","最新のガイドライン（2025年版等）の変更点を見落とし、大量の修正が発生したこと","事務所が狭かったこと","挨拶が足りなかったこと"],"h":"「独りよがり」な準備は、後で大きな「手戻り（やり直し）」を生みます。","c":1,"e":"GMPの基準は更新されます。最新のルール（品質確認組織の設置など）を把握せずに進めると、せっかく作った書類が無効になるリスクがあります。"},{"m":0,"q":"大規模な手直しという「致命的なタイムロス」を防ぐために、申請前に必ず活用すべきサービスは何ですか？","o":["認定協会の「事前相談・コンサルティング」","広告代理店のキャンペーン","占い師の助言","銀行の融資相談"],"h":"書類を出す前に「プロの目」で合格可能性を判定してもらう作業です。","c":0,"e":"事前相談を受けることで、設備改修が必要か、あるいは手順書の修正だけで済むかといった、実務上の「落としどころ」を早期に把握できます。"},{"m":0,"q":"具体例②のB社が、全工程でのダブルチェックという過剰管理を回避できた理由は何ですか？","o":["現場がボイコットしたから","「自己点検表」を読み込み、管理すべき「重要工程」の境界線を見極めたから","社長が諦めたから","運が良かったから"],"h":"「すべてを完璧に」ではなく、「基準が求めている核心」を理解しました。","c":1,"e":"GMPは全ての作業を複雑にすることではありません。リスクの高い「重要工程」にリソースを集中させることが、効率的な運用に繋がります。"},{"m":0,"q":"この研修の中で、GMP認定取得は何に例えられていましたか？","o":["豪華なフルコースの献立","「初めて挑む登山のルート選び」","終わりなき旅","秘密の暗号解読"],"h":"ガイド（協会）を雇い、地図（作成事例）を使い、頂上（認定）を目指すイメージです。","c":1,"e":"自力で道なき道を切り拓くのではなく、整備されたルート（既存ツール）を通ることが、遭難（不合格）を防ぐ唯一の正解です。"},{"m":0,"q":"2025年版のガイドライン等で新たに重視されている、組織体制上の重要な要素は何ですか？","o":["社員の制服のデザイン","「品質確認」組織の設置や原材料の同等性評価","食堂のメニュー","駐車場の広さ"],"h":"製造とは独立した視点で品質をチェックする機能が求められています。","c":1,"e":"最新の改正では、より厳格な組織の独立性や、科学的なエビデンス（同等性評価など）が求められるようになっています。"},{"m":0,"q":"最小限の労力で認証を勝ち取るための「アクションプラン」に含まれないものはどれですか？","o":["ツールの再発明をしない（作成事例を使う）","3ヶ月の運用実績を最優先で固める","審査員の視点を自己点検表から把握する","認定が取れるまで現場には内緒にしておく"],"h":"現場の協力（運用）がなければ、記録は作れません。","c":3,"e":"GMPは組織全体で取り組むものです。現場を巻き込み、無理のない「型」を一緒に作ることが、最短距離での取得を可能にします。"},{"m":0,"q":"本研修のまとめとして、最も伝えたかったメッセージは何ですか？","o":["根性で頑張ればなんとかなる","外部の力（協会・ツール）を賢く使い、「最短・最小労力」でゴールを射抜く","認定取得はコストがかかるだけの負担である","完璧な書類ができるまで申請してはいけない"],"h":"「手戻り」をなくし、プロのガイドに従って効率的に進める姿勢です。","c":1,"e":"実務負担を抑えつつ、確実に認定を勝ち取るためには、戦略的な「ツールの活用」と「事前相談」が最大の武器となります。"},{"m":1,"q":"2024年4月より、食品衛生基準行政の管轄は厚生労働省からどこに移管されましたか？","o":["経済産業省","農林水産省","消費者庁","文部科学省"],"h":"「食品表示」や「機能性表示食品」の届出先と同じ行政機関です。","c":2,"e":"管轄が消費者庁へ移管されたことで、健康被害報告や広告表示、そしてGMPの遵守状況に対する監視体制がより一体的かつ厳格に運用されるようになりました。"},{"m":1,"q":"最新のGMPガイドライン（2025年版）の根拠となっている、消費者庁からの通知番号は何ですか？","o":["110番","311通知","911通知","119通知"],"h":"従来の厚生労働省時代の指針に代わる、最新の「GMPの教科書」となる通知です。","c":1,"e":"「消食基第311号（311通知）」により、最新のGMP要件が示されました。今後の審査や立入検査はこの基準に基づいて行われます。"},{"m":1,"q":"「指定成分等含有食品（コレウス・フォルスコリー等）」において、GMPの遵守はどのような位置づけですか？","o":["余裕があればやる","業界の自主ルール","法律に基づく「義務」","完全に自由"],"h":"健康被害の防止のため、法律（食品衛生法）で厳格に定められています。","c":2,"e":"指定成分等含有食品は、既に法的にGMP遵守が義務化されています。これを守らない製造や販売は法令違反となります。"},{"m":1,"q":"2024年9月より、天然抽出物等を原料とする錠剤・カプセル剤の「機能性表示食品」についても、GMP遵守がどのような扱いになりましたか？","o":["廃止された","実質的に義務化（届出の要件化）された","5年後から検討される","任意継続となった"],"h":"紅麹事案を受け、安全性を担保するための「必須条件」となりました。","c":1,"e":"機能性表示食品制度の改正により、錠剤・カプセル剤等の形態については、GMPに基づいた製造管理が届出の維持に不可欠な要件（実質的義務）となりました。"},{"m":1,"q":"一般食品のHACCPと、健康食品GMPの決定的な違いは何ですか？","o":["GMPの方が簡単である","GMPは食中毒防止に加え、成分の「均質性」や「表示通りの品質」を全工程で保証する","HACCPは掃除だけすれば良い","違いはない"],"h":"サプリメントは成分が凝縮されているため、「一粒あたりの含有量」がバラつくことが健康被害に直結します。","c":1,"e":"HACCPが「安全（食べても死なない）」を主眼とするのに対し、GMPは「安全＋品質（表示通りの成分が均一に入っている）」を高度なレベルで保証する基準です。"},{"m":1,"q":"具体例①の紅麹事案を受けて新設された、微生物の発酵等を用いた原材料に関する新しいルールは何ですか？","o":["味見を増やす","「微生物等関連原材料」の同等性・同質性の科学的な評価","掃除の回数を2倍にする","サプライヤーに任せきりにする"],"h":"単なる規格検査だけでなく、過去のロットと変化がないかプロファイル分析が求められます。","c":1,"e":"微生物由来の原料は、変異により未知の有害物質が出るリスクがあるため、TLCやHPLC等を用いて「いつもと同じ性質か」を科学的に証明する手順が必須となりました。"},{"m":1,"q":"具体例②の「プエラリア・ミリフィカ」の事例で、企業が怠った法的義務は何ですか？","o":["広告宣伝","健康被害情報の迅速な収集と行政への報告","従業員の福利厚生","値下げ交渉"],"h":"「体質の問題だろう」という独自の判断で情報を止めてしまったことが致命傷となりました。","c":1,"e":"指定成分等や機能性表示食品では、健康被害情報の収集と届出が義務付けられています。これを怠ると製品回収や業務停止などの厳しい行政処分に繋がります。"},{"m":1,"q":"GMPの記録管理において、「記録がない＝実施していない」とみなされる厳しい原則を何と呼びますか？","o":["自由主義","ALCOA+（アルコアプラス）の原則","秘密保持","現場主義"],"h":"記録の帰属性、判読性、同時性、原本性、正確性などを求める国際的な原則です。","c":1,"e":"GMPは「証拠の体系」です。どれほど丁寧に作業しても、正しい記録が残っていなければ、法的には「管理されていない」と判断されます。"},{"m":1,"q":"研修のまとめとして、現在のGMPをどのような資格に例えていましたか？","o":["修了証書","市場に出るための「運転免許」","記念メダル","参加賞"],"h":"持っていなければ、その業務（特定の健康食品の製造・販売）を行えないという意味です。","c":1,"e":"義務化された現代において、GMPは「持っていれば良いもの」ではなく、ビジネスを継続するための「必須の許可証」へと変化しました。"},{"m":1,"q":"法的義務としてのGMPを遵守することが、企業にとってどのようなメリットになると述べていましたか？","o":["コストが増えるだけ","「消費者の命と、自社のブランドを守るための最大の防衛策」","事務作業が楽しくなる","競合他社を攻撃できる"],"h":"「守り」を固めることが、万が一の際の致命傷を避けることに繋がります。","c":1,"e":"法的義務の遵守は、法令違反による倒産リスクを防ぐだけでなく、顧客に「確かな品質」という信頼を届ける、最も重要な投資です。"},{"m":2,"q":"2024年3月11日に発出され、従来の平成17年通知に代わって新たな健康食品GMPの法的根拠（指針）となった通知の通称は何ですか？","o":["110番通知","311通知","5S通知","8020通知"],"h":"発出された日付「3月11日」にちなんだ名称です。","c":1,"e":"「消食基第311号（311通知）」は、消費者庁への移管に伴い策定された最新のGMP指針であり、全ての認定取得企業はこの新指針への適合が求められます。"},{"m":2,"q":"2025年版ガイドラインにおいて、品質部門内に新設（または明確化）が義務付けられた、製造部門から完全に独立して「承認と確認」のみを行う機能は何ですか？","o":["営業推進係","品質確認（の組織または担当者）","設備修理班","広告審査部"],"h":"検査を行う「品質管理」とは別に、客観的に出荷可否を「判定」する役割です。","c":1,"e":"「品質確認」機能の独立は、現場の慣れや改ざんリスクを排除し、客観的なデータに基づいて製品標準書の承認や出荷判定を行うための重要な組織変更です。"},{"m":2,"q":"「品質確認責任者」と「試験検査担当者」の関係として、2025年版ガイドラインが求めている正しい姿はどれですか？","o":["同一人物が兼務してスピードを上げる","原則として分離し、検査結果を客観的に「確認・承認」できる体制にする","どちらか一方がいれば良い","外部のアルバイトに任せる"],"h":"具体例①のC社のように、兼務による「なあなあ」の判断を防ぐのが目的です。","c":1,"e":"「検査する人」と「その結果を認める人」を分けることで、ヒューマンエラーや不正を食い止める強力な防波堤（チェック機能）を構築します。"},{"m":2,"q":"紅麹事案を受けて追加された「微生物等関連原材料」への対応において、単なる成分量検査以外に求められるようになった分析手法は何ですか？","o":["味見テスト","全体プロファイル分析（TLCやHPLC等）","目視検査のみ","重量測定"],"h":"特定の有効成分だけでなく、その周りにある不純物も含めた「波形（スポット）」を比較します。","c":1,"e":"発酵由来の原料は、製造条件のわずかな変化で未知の物質が出るリスクがあるため、過去のロットと「波形」が一致しているか（同等性）を科学的に証明する必要があります。"},{"m":2,"q":"具体例②のD社がTLC分析で発見した「謎のスポット」は何を意味していましたか？","o":["原料がより美味しくなった証拠","有効成分の増加","サプライヤーの製造条件変更による「意図しない副生成物」の発生","汚れの付着"],"h":"有効成分の数値は合格でしたが、全体プロファイルに「変異」が現れていました。","c":2,"e":"プロファイル分析を行うことで、従来の特定成分検査では見逃していた「未知の変異」を察知し、健康被害リスクを未然に防ぐことができます。"},{"m":2,"q":"最新指針において、製品の品質に対する責任を負う「表示責任者（販売者）」と「製造業者」の間で締結が求められる文書は何ですか？","o":["秘密保持契約のみ","品質合意書（品質取決め書）","領収書","挨拶状"],"h":"不適合時の対応や情報の共有体制を明確に定めるための文書です。","c":1,"e":"委託先（製造業者）の管理責任は委託元（販売者）にもあります。品質合意書によって責任分界点を明確にし、共に品質を守る体制を構築します。"},{"m":2,"q":"2025年版ガイドラインにおいて、製品の「製品標準書」に記載すべき、安全性の根拠となるものは何ですか？","o":["誰かの噂話","科学的根拠（文献、試験結果、同等性評価データ等）","過去の売上実績","担当者の直感"],"h":"「なぜこの原材料で安全と言えるのか」を論理的に説明する資料が必要です。","c":1,"e":"設計段階での安全性の点検結果を科学的根拠に基づいて文書化することが、義務化された新時代のGMPにおける必須要件です。"},{"m":2,"q":"具体例①において、品質確認責任者が「客観的なデータがない限り、逸脱の承認はできない」と判断したことは、どのような結果を招きましたか？","o":["納期が遅れて会社が倒産した","規格外製品の流出を未然に防ぎ、会社の信頼を守った","全員から嫌われた","装置が壊れた"],"h":"「現場の慣れ」による安易な判断を、組織的な仕組みで食い止めました。","c":1,"e":"独立した確認機能が正しく作動することで、経営リスクを最小限に抑え、顧客に確かな品質を届けることができます。"},{"m":2,"q":"311通知や2025年版ガイドラインを遵守しなかった場合、企業にとってどのようなリスクがありますか？","o":["特にリスクはない","行政処分（回収命令や認定取消し）や社会的信頼の失墜","事務作業が減る","競合他社に喜ばれる"],"h":"消費者庁の監視体制が厳格化している現状を考えます。","c":1,"e":"最新の公的指針は「適合の必須条件」です。これを無視した運用は、法令違反や重大なリコール、ひいては企業存続の危機に直結します。"},{"m":2,"q":"本研修のまとめとして、最新のGMP指針を遵守する姿勢をどのように述べていましたか？","o":["推奨される努力目標である","「科学の目でお客様を守るための、避けては通れないスタンダード」","コストを最小化するための手段","形式的な事務作業"],"h":"主観を捨て、科学的データ（事実）に基づいて管理する姿勢を強調していました。","c":1,"e":"最新の規制動向を正しく理解し、組織体制と技術的対応をアップデートし続けることこそが、新時代の健康食品メーカーに求められる誠実さです。"},{"m":3,"q":"GMP運用において設置が義務付けられている「三役」の正しい組み合わせはどれですか？","o":["会長・社長・専務","総括製造販売責任者・製造管理責任者・品質管理責任者","営業部長・製造部長・総務部長","料理長・調理担当・味見担当"],"h":"製造所全体を統括する者と、作る責任者、検査する責任者の3名です。","c":1,"e":"製造所ごとに「総括責任者」を置き、その監督下に「製造管理責任者」と「品質管理責任者」を配置します。これがGMP組織の基本骨格です。"},{"m":3,"q":"製造管理責任者と品質管理責任者の関係として、客観性を保つために禁止されていることは何ですか？","o":["同じ食堂でご飯を食べること","同一人物による兼務","同じ会議に出席すること","仲良く談笑すること"],"h":"「作る人」と「チェックする人」が同じだと、甘えや不正が生じるリスクがあります。","c":1,"e":"製造と品質は相互に独立している必要があります。特に2025年版では、品質部門の中にさらに独立した「品質確認」機能を持つことが求められています。"},{"m":3,"q":"ガイドラインに記載されている製造・品質管理責任者の「実務経験5年以上」という記述の正しい解釈はどれですか？","o":["4年11ヶ月でも絶対に認められない法的義務である","あくまで「望ましい」という推奨規定であり、能力があれば5年未満でも任命可能である","5年経てば自動的に誰でもなれる","履歴書さえあれば中身は見られない"],"h":"この研修では「数字は能力の目安」と強調されていました。","c":1,"e":"5年は目安です。経営者がその人物の資質を「適切に実施しうる能力がある」と自ら確認し、不足分を教育等で補完すれば、年数に関わらず任命は可能です。"},{"m":3,"q":"責任者を任命する際、製造業者（経営者）に課せられている最も重要な義務は何ですか？","o":["給料を2倍にすること","「適切に実施しうる能力を有すると自ら確認する」こと","5年以上働いているかだけをチェックすること","外部のコンサルタントに丸投げすること"],"h":"「誰を信じて任せるか」という経営判断そのものが問われています。","c":1,"e":"経営者が「この人は適任だ」と判断した根拠（教育訓練記録や経歴書）を明確にし、責任を持って任命することがGMPの本質です。"},{"m":3,"q":"具体例①のJ社で、3年目のKさんを責任者に抜擢するために社長が整備した「客観的な裏付け」は何ですか？","o":["豪華な名刺","外部専門講習の受講や技術顧問によるサポート体制などの「教育訓練記録」","10年分の給与明細","社長の推薦状（口頭のみ）"],"h":"「年数の不足」を「組織的なバックアップ」で埋める証拠です。","c":1,"e":"経験が浅い場合でも、それを補うための教育計画や顧問による指導体制を文書化（見える化）することで、審査員に対して能力の担保を証明できます。"},{"m":3,"q":"医師や薬剤師の資格がない「総括責任者」を選任する場合、原則として必要とされる要件は何ですか？","o":["5年以上の実務従事経験","10年以上の営業経験","海外留学経験","運転免許証"],"h":"総括責任者の年数は、管理責任者の「推奨」よりもやや厳格に運用される傾向があります。","c":0,"e":"総括責任者には工場全体を監督する重い責任があるため、原則として5年の実務経験が求められます。ただし、その「実務」の内容は経営者の評価が重視されます。"},{"m":3,"q":"具体例②のL社で、製造部長Oさんの「5年の実務経験」を証明するために経営者が行った工夫は何ですか？","o":["経歴を改ざんした","作業手順書作成などの管理業務に従事していた期間を「実務経験」として詳細に整理し直した","5年経つまで待った","資格を捏造した"],"h":"単なる作業者ではなく、「管理に携わっていた事実」を掘り起こしました。","c":1,"e":"実務経験の中身を精査し、GMPの管理業務に資する活動（衛生管理や手順作成など）を行っていたことを経歴書で明確にすることが、要件クリアの鍵となります。"},{"m":3,"q":"2025年版ガイドラインで、品質部門の中に設置が求められる「製造から独立して承認・確認のみを行う責任者」を何と呼びますか？","o":["製造管理責任者","品質確認責任者","営業責任者","配送責任者"],"h":"検査結果を客観的に「承認」し、出荷可否を判断する最後の砦です。","c":1,"e":"「検査する人」と「承認する人」を分ける組織体制（品質確認機能の独立）が、最新のGMPでは強く求められています。"},{"m":3,"q":"審査員が責任者の評価において、経験年数以上に重視している「資質」とは何ですか？","o":["漢字が上手く書けること","異常時に経営者や現場に気兼ねせず、毅然と出荷を止められる「正義感や責任感」","声が大きく威圧的であること","パソコン操作が速いこと"],"h":"品質を守るために「NO」と言える勇気があるかどうかです。","c":1,"e":"GMP責任者に最も必要なのは、プレッシャーに負けずに不適合品の流出を止める「資質」です。これは年数だけでは測れない要素です。"},{"m":3,"q":"本研修のまとめとして、GMPの組織論を何に例えていましたか？","o":["豪華なフルコースの献立","「レストランのキッチン（料理長・調理担当・味見担当）」","終わりなき旅","秘密の暗号"],"h":"修行年数よりも、経営者が「誰を信じ、どう支えるか」が大切だという例えです。","c":1,"e":"キッチンの例えは、役割の分担と、経営者による人材の目利き・バックアップの重要性を直感的に表しています。"},{"m":4,"q":"2025年版ガイドラインで新たに導入された「品質確認」機能の組織的な位置づけとして、正しいものはどれですか？","o":["製造部門の中に置き、効率的に出荷を早める","品質部門の中に置き、製造部門から完全に独立させる","営業部門の中に置き、顧客の要望を優先させる","外部の清掃業者に委託する"],"h":"「作る人」の都合に左右されない、客観的な立場が必要です。","c":1,"e":"最新の指針（311通知）では、品質部門の中に、製造から独立して「承認と確認」のみを行う組織（または担当者）を置くことが義務化されました。"},{"m":4,"q":"品質確認責任者が担う、製品の設計図ともいえる最重要文書の承認業務は何ですか？","o":["会社案内","製品標準書","従業員の履歴書","飲み会の精算書"],"h":"その製品を「どう作るか、どう管理するか」のすべての基準が書かれた文書です。","c":1,"e":"製品標準書が最新のガイドラインや設計意図に適合しているかを、製造から独立した視点で確認・承認することが求められます。"},{"m":4,"q":"製品の出荷判定において、品質確認責任者が果たす役割として正しいものはどれですか？","o":["自分でトラックを運転して配送する","試験結果や製造記録を精査し、出荷してよい状態かを技術的・客観的に「確認」する","予算の範囲内かを確認する","誰にも相談せずに勝手に出荷する"],"h":"総括責任者が最終判断を下す前の、専門的な「お墨付き」を与える業務です。","c":1,"e":"「数値（試験結果）」だけでなく「プロセス（製造記録や逸脱の有無）」を含めて、製品の品質を総合的に保証（QA）する役割を担います。"},{"m":4,"q":"品質確認責任者の「独立性」に関するルールとして、認められていないものはどれですか？","o":["総括責任者が品質確認責任者を兼務すること","品質管理責任者（試験検査担当）が品質確認責任者を兼務すること","製造部門の責任者が品質確認責任者を兼務すること","外部の有識者を品質確認担当として選任すること"],"h":"「作る責任」と「承認する責任」が同じ人にあると、チェックが機能しません。","c":2,"e":"製造部門の責任者が品質確認を兼ねることは、独立性が損なわれるため禁止されています。一方、総括や品質管理との兼務は、客観性が保たれていれば可能です。"},{"m":4,"q":"具体例①において、品質確認責任者が「出荷にストップをかけた」根拠は何でしたか？","o":["担当者の顔色が悪いと思ったから","試験数値は合格だが、製造記録に「金型のメンテナンス（逸脱）」があり、信頼性に疑念が生じたから","納期に余裕があると思ったから","占い師に止められたから"],"h":"数値上の「点」だけでなく、工程という「線」で品質を捉えました。","c":1,"e":"「試験で受かれば良い」という考えを排し、製造過程で起きたトラブル（逸脱）が品質に及ぼす影響を科学的に評価するのが品質確認の本質です。"},{"m":4,"q":"製造手順の変更（例：混合時間の短縮など）を行う際、品質確認責任者が承認の判断基準とすべきものは何ですか？","o":["製造現場の「忙しさ」","科学的根拠（バリデーションデータ等）に基づく品質への影響評価","社長の直感","競合他社の噂"],"h":"「たぶん大丈夫」ではなく、「データで証明されているか」を確認します。","c":1,"e":"変更が品質に悪影響を及ぼさないことを、客観的なデータ（バリデーション）で確認してから承認を下す義務があります。"},{"m":4,"q":"製造中に起きたトラブル（逸脱）への対応において、品質確認責任者が行うべき業務はどれですか？","o":["トラブルを隠すように指示する","逸脱の評価と、それに対する措置（再試験や廃棄など）の妥当性を承認する","現場を厳しく叱る","自分で機械を修理する"],"h":"起きたことに対して、品質的な「ケリ」をつける役割です。","c":1,"e":"逸脱が起きた際、その製品が本当に安全か、再発防止策は十分かを第3者の視点で厳格にチェックします。"},{"m":4,"q":"品質確認責任者に求められる「資質」として、ガイドラインが重視している点は何ですか？","o":["誰よりも腕力が強いこと","GMP全般に知見を有し、客観的な判断ができる能力","営業トークが上手いこと","勤続20年以上であること（必須）"],"h":"制度の目的は「正しい判断」を下すことにあります。","c":1,"e":"形式的な年数よりも、最新の規制や科学的根拠を理解し、現場の圧力に屈せずに「NO」と言える専門性と誠実さが求められます。"},{"m":4,"q":"本研修のまとめとして、品質確認機能を何に例えていましたか？","o":["豪華なフルコースの献立","旅客機の「副操縦士（チェックに対する拒否権・承認権を持つ役割）」","終わりなき旅","秘密の暗号"],"h":"機長（製造・総括）の判断を、独立したチェックリストで検証するイメージです。","c":1,"e":"副操縦士の例えは、組織内に「独立したブレーキ役」を置くことの重要性と、その責任の重さを象徴しています。"},{"m":4,"q":"品質確認機能を正しく運用することで、企業が得られる最大のメリットは何ですか？","o":["書類の枚数が増える","不適合品の流出や大規模リコールのリスクを未然に防ぐ「防波堤」になる","会議の時間が長くなる","従業員の給料が自動的に上がる"],"h":"組織の自浄作用（チェック機能）を高めることに繋がります。","c":1,"e":"「作る側」から独立したチェック機能を持つことで、慣れや油断による品質トラブルを排除し、社会的信頼を強固に守ることができます。"},{"m":5,"q":"GMP文書体系において、品質方針や組織図、各責任者の任務などを定める最上位の文書は何ですか？","o":["製品標準書","GMP管理規則","製造管理基準書","従業員名簿"],"h":"組織全体の「憲法」にあたる、最も基本的なルールを記した文書です。","c":1,"e":"GMP管理規則は、製造所の管理体制や責任の所在を明確にする最上位文書であり、すべてのGMP活動の根拠となります。"},{"m":5,"q":"製品ごとに作成し、成分分量や製造手順、規格などを詳細に記載する「製品の設計図」にあたる文書は何ですか？","o":["5大基準書","製品標準書","出荷判定書","会社案内"],"h":"「この製品をどう作るか」のすべてが詰まった、審査で最も重視される書類の一つです。","c":1,"e":"製品標準書には、原材料の仕様から工程ごとの管理項目まで、製品固有の情報が網羅されていなければなりません。"},{"m":5,"q":"GMP運用の基盤となる「5大基準書」に含まれないものはどれですか？","o":["製品標準書","製造管理基準書","広告宣伝基準書","品質管理基準書"],"h":"「製品・製造・衛生・品質・設備」の5つの柱を思い出してください。","c":2,"e":"5大基準書は「製品標準書」「製造管理基準書」「製造衛生管理基準書」「品質管理基準書」「構造設備管理基準書」で構成されます。"},{"m":5,"q":"具体例①のD社が、自作の製品標準書で一蹴された主な理由は何ですか？","o":["字が汚かったから","最新のガイドラインで定められた「必須12項目」に漏れがあったから","紙のサイズが違ったから","内容が詳しすぎたから"],"h":"2025年版では「微生物等関連原材料の同等性評価」などの項目も必須となっています。","c":1,"e":"製品標準書には法的に定められた必須項目があります。自己流で作ると、これらを見落とし、大幅な手戻りが発生するリスクがあります。"},{"m":5,"q":"文書作成において、作業時間を最小限にしつつ合格ラインを確実にクリアするための「最強のショートカット」は何ですか？","o":["認定協会の「管理文書の作成事例（雛形）」をベースにする","昨年の日記を写す","他社の文書をそのままコピーする","審査員に内緒にする"],"h":"「型」に従い、自社固有の情報だけを埋める手法です。","c":0,"e":"作成事例は審査を通るための「正解」が示されたテンプレートです。これを活用し、自社の実態（設備名や数値）に書き換えるのが最も効率的です。"},{"m":5,"q":"具体例②のE社において、マニュアルが「形骸化」してしまった原因は何でしたか？","o":["ページ数が少なすぎた","ガイドラインの文章をそのままコピー＆ペーストしただけで、現場の実態や言葉に合っていなかった","専門用語が全くなかった","イラストが多すぎた"],"h":"「立派な文章」であっても、現場が理解できなければ意味がありません。","c":1,"e":"ガイドラインの転記は「守るべき基準」としては正解ですが、「作業手順」としては不十分です。現場の動線や使用器具に合わせた具体的な記述が求められます。"},{"m":5,"q":"現場のミスを減らし、記録の信頼性を高めるための「生きた文書」にする工夫として、適切なものはどれですか？","o":["難しい漢字をたくさん使う","実際の器具名を入れたり、図解を用いたりして「誰が読んでも実行できる」内容にする","修正テープで消せるようにする","英語だけで記載する"],"h":"「読む人（作業者）」の視点に立った、具体的な記述が大切です。","c":1,"e":"図解や写真、実際の現場の呼称を用いることで、誤解が減り、手順通りの確実な作業と正確な記録（ALCOA+）に繋がります。"},{"m":5,"q":"GMPにおける「記録」の重要性を表す、最も有名な原則は何ですか？","o":["「記録がなくても、心に刻めば良い」","「記録がなければ、それは行われなかったことにほかならない」","「記録は後でまとめて書けば良い」","「記録は社長だけが見れば良い」"],"h":"GMPは「証拠の体系」であることを示す言葉です。","c":1,"e":"どれほど完璧に作業しても、その証拠となる記録がなければ、法的には「管理されていない」とみなされます。文書は正しい記録を残すためのガイドです。"},{"m":5,"q":"2025年版の文書整備において、特に追加や強化が必要なポイントはどこですか？","o":["食堂のメニュー表","「品質確認」組織の任務や、原材料の科学的な安全性点検（同等性評価）の記載","駐車場の利用規定","社内旅行の計画書"],"h":"最新の規制動向である「組織の独立性」と「科学的根拠」に関わる部分です。","c":1,"e":"新設された「品質確認」機能の役割や、微生物由来原料のプロファイル分析等の手順を文書体系に組み込むことが必須となります。"},{"m":5,"q":"本研修のまとめとして、文書整備の本来の目的をどのように述べていましたか？","o":["認定のための事務作業である","「誰が担当しても、常に一定の品質の製品を作れる仕組み」を文字にすること","審査員を騙すための書類作り","紙の消費を増やすこと"],"h":"個人の能力に頼らず、組織として品質を保証するための「型」を作ることです。","c":1,"e":"文書化は、属人的な管理（KKD）を排し、標準（型）に基づいた安定した製造を実現するための、経営上の重要なインフラ整備です。"},{"m":6,"q":"GMPにおける記録の鉄則として、最も適切なものはどれですか？","o":["記録がなくても、ベテランが「大丈夫」と言えば合格である","記録がなければ、それは行われなかったことにほかならない","記録は1年経ったら捨てて良い","記録は社長だけが書けば良い"],"h":"「証拠」がなければ、どんなに良い製品を作っても品質は証明できません。","c":1,"e":"GMPは「証拠の体系」です。作業の実績を客観的な記録として残すこと（ALCOA+の遵守）が、品質保証の絶対条件となります。"},{"m":6,"q":"ALCOA+の原則において、作業と「同時」にその場で記録することを何と呼びますか？","o":["帰属性 (Attributable)","同時性 (Contemporaneous)","原本性 (Original)","耐久性 (Enduring)"],"h":"後でまとめて書いたり、清書したりすることはこの原則に反します。","c":1,"e":"同時性（Contemporaneous）は、記憶の曖昧さや意図的な書き換えを防ぐために極めて重要です。「現場で、その瞬間に」書くことが求められます。"},{"m":6,"q":"「誰が」その作業を行い、記録を書いたのかを特定できるようにすることを何と呼びますか？","o":["判読性 (Legible)","帰属性 (Attributable)","完全性 (Complete)","正確性 (Accurate)"],"h":"署名（サイン）や印鑑、電子ログなどがこれに当たります。","c":1,"e":"帰属性（Attributable）を明確にすることで、責任の所在をはっきりさせ、データの信頼性を担保します。"},{"m":6,"q":"具体例①のHさんのように、現場のメモを事務所で「清書」して正式な記録とすることは、なぜ不適切なのですか？","o":["字が綺麗すぎると怪しまれるから","ALCOA+の「同時性」と「原本性」を損なうから","紙の無駄遣いだから","事務所で書くのは禁止されているから"],"h":"「最初の記録（生データ）」こそが、最も信頼できる証拠です。","c":1,"e":"清書の過程で書き間違いや数値の調整が起きるリスクがあるため、GMPでは「現場での生の記録（原本）」をそのまま残すことが鉄則です。"},{"m":6,"q":"ALCOA+の「原本性 (Original)」を守るために、現場でメモを取る際に避けるべき道具はどれですか？","o":["油性ボールペン","シャープペンシルや消せるボールペン","万年筆","サインペン"],"h":"後から消したり、書き換えたりできる筆記具は、証拠能力が認められません。","c":1,"e":"記録は「不変」である必要があります。修正が必要な場合は、修正液を使わず、二重線と訂正印、修正理由を記すのが正しい手順です。"},{"m":6,"q":"具体例②のG社で、古い手順書（旧版）をそのまま使ってしまった原因は何ですか？","o":["新人が不真面目だったから","最新版の配布と旧版の回収を管理する「文書管理SOP」が機能していなかったから","アルコールが足りなかったから","手順書が英語だったから"],"h":"「ルールを変えた」だけで、「現場の紙を入れ替える仕組み」がありませんでした。","c":1,"e":"改訂時に古い文書を物理的に回収し、現場に最新版しかない状態を作る仕組み（配布・回収管理）が、組織的なミスを防ぐために不可欠です。"},{"m":6,"q":"GMPにおける製造記録等の「保存期間」として、正しいものはどれですか？","o":["作成日から1年間","作成日から3年間（または賞味期限＋1年間の長い方）","永久保存","1ヶ月間"],"h":"製品が出荷された後、万が一の苦情調査ができる期間まで保管します。","c":1,"e":"ガイドラインにより、記録は作成から3年間、あるいは賞味期限に余裕を持たせた期間の保管が義務付けられています。"},{"m":6,"q":"電子データ（コンピューターシステム）で記録を管理する場合、改ざん防止のために必要な「操作履歴」のことを何と呼びますか？","o":["タイムカード","監査証跡（オーディットトレイル）","バックアップ","パスワード"],"h":"「いつ、誰が、どの数値を入力・変更したか」を自動的に記録する機能です。","c":1,"e":"ALCOA+の「+」部分（データの完全性）において、監査証跡（Audit Trail）の確保は、電子記録の信頼性を守る鍵となります。"},{"m":6,"q":"本研修の例え話として、ALCOA+の記録を何に例えていましたか？","o":["豪華なフルコースのメニュー","登山者の「GPSログ（一歩一歩の足跡）」","終わりなき旅の地図","秘密の暗号"],"h":"「確かにそのルートを通った（正しく作った）」ことを第三者に信じてもらうための証拠です。","c":1,"e":"口頭の主張ではなく、リアルタイムで刻まれた「足跡（ログ）」こそが、品質という頂上に到達したことを証明します。"},{"m":6,"q":"明日から職場で「記録」を書く際に、最も意識すべきことは何ですか？","o":["綺麗に書くことだけを考える","ALCOA+を意識し、「未来の審査員やお客様への手紙」として正確に書く","暇な時にまとめて書く","上司に褒められるように書く"],"h":"数年後に誰が見ても、「正しく作られていた」と確信できる内容を目指します。","c":1,"e":"あなたの書く一行が、会社の信頼を守り、お客様の安全を保証する「最後の砦」であることを忘れないでください。"},{"m":7,"q":"製品標準書の作成単位として、正しいルールはどれですか？","o":["会社で1冊あれば良い","製品ごと、かつ製造所ごとに作成する","原材料ごとに作成する","営業所ごとに作成する"],"h":"同じ製品でも、工場（設備）が違えば製造手順や管理基準が変わるためです。","c":1,"e":"製品標準書は、特定の製造所における特定の製品の「設計図」です。製造場所が変われば、その設備に合わせた標準書を別途作成・承認する必要があります。"},{"m":7,"q":"最新の2025年版ガイドライン（311通知）において、製品標準書に網羅すべき必須項目は何項目ですか？","o":["5項目","10項目","12項目","100項目"],"h":"旧指針から「製品設計」や「微生物等関連原材料」などの項目が追加されました。","c":2,"e":"最新の指針では、安全性や科学的根拠をより重視する観点から、合計12の必須項目が定められています。"},{"m":7,"q":"製品標準書の「作成」および「改訂」の際に、最終的な承認を行うべき組織（担当者）はどこですか？","o":["営業部長","品質部門（品質確認責任者）","外注先の担当者","配送センター"],"h":"製造から独立した立場で、その設計がGMP基準に合致しているかを「判定」する人です。","c":1,"e":"製品標準書は、製造指図の根拠となる最上位文書であるため、製造部門から独立した「品質確認」機能による承認が不可欠です。"},{"m":7,"q":"2025年版で新設された「製品設計」の項目には、どのような内容を記載すべきですか？","o":["製品のキャッチコピー","予想される年間売上","安全性点検の結果に基づく、成分量や設計の妥当性の根拠","パッケージのデザイナー名"],"h":"「なぜこのレシピで安全と言えるのか」という科学的な説明が求められます。","c":2,"e":"原材料の食経験や有害物質の濃縮リスク評価など、設計段階で行った安全性点検の結論を記載することが義務化されました。"},{"m":7,"q":"具体例①のG社が指摘を受けた、微生物の培養や発酵を経て作られる原材料に関する追加項目は何ですか？","o":["原産地表示","微生物等関連原材料の同等性／同質性の規格・試験方法","菌のイラスト","培養担当者の氏名"],"h":"ロットごとに変異がないか、プロファイル分析等で確認する手順のことです。","c":1,"e":"発酵由来原料は未知の物質が出るリスクがあるため、過去のロットと「同質」であることを証明する試験方法を標準書に明記しなければなりません。"},{"m":7,"q":"製品標準書に記載する「標準的仕込み量」において、必ずセットで示さなければならないものは何ですか？","o":["原料の安さ","仕込み量の設定根拠（表示量を担保するデータ等）","作業者の好み","予備の原料の量"],"h":"「100mg配合」と表示するなら、製造ロスを考慮して「なぜその量を入れるのか」という裏付けが必要です。","c":1,"e":"表示されている成分量を賞味期限まで担保するために、製造工程での減少率などを考慮した科学的な仕込み根拠が求められます。"},{"m":7,"q":"具体例②のH社のように、賞味期限を「3年」と設定する場合にGMP上不可欠な証拠は何ですか？","o":["他社のカタログ","営業担当者の自信","安定性試験（加速試験や長期保存試験）の結果データ","社長の決断"],"h":"「願望」ではなく「科学的数値」で証明しなければなりません。","c":2,"e":"賞味期限の根拠として、40℃・75%RHなどの過酷条件で行う加速試験や、実際の保管条件での試験結果の概要を標準書に記載し、原本を保管する必要があります。"},{"m":7,"q":"製品標準書の必須項目「一日摂取目安量および使用上・取扱い上の注意」が、2025年版から追加された主な理由は何ですか？","o":["紙面を埋めるため","摂取方法による健康被害（過剰摂取など）を防ぎ、安全性を担保するため","飲み忘れを防ぐため","宣伝のため"],"h":"GMPは製造だけでなく、「正しく消費者に使われるための情報」も品質の一部と考えます。","c":1,"e":"過剰摂取が問題となった事例を背景に、製造側が「正しい使い方」を設計段階で明確に定義し、標準書に記載することが求められるようになりました。"},{"m":7,"q":"製品標準書の内容と、現場の「製造指図書」や「試験検査指図書」の関係として、正しいものはどれですか？","o":["現場の指図書は標準書と違っていても良い","現場の指図書は、必ず製品標準書の内容に基づいて作成されなければならない","標準書は参考程度で良い","どちらか一方があれば良い"],"h":"標準書は「憲法」、指図書はそれに基づく「法律（指示）」の関係です。","c":1,"e":"製品標準書はすべての実務の「マスター」です。現場の指図書は、必ず承認された標準書の内容を正確に反映したものでなければなりません。"},{"m":7,"q":"本研修のまとめとして、不適合とならないための製品標準書作成のポイントは何ですか？","o":["12項目を網羅し、すべての記載に「科学的根拠（データ）」の裏付けを持たせること","なるべく短く簡潔に書くこと","認定が取れるまで作成を後回しにすること","他社の標準書をそのままコピーすること"],"h":"「根拠なき記載は、お客様への裏切り」という言葉を思い出してください。","c":0,"e":"最新の12項目を漏れなく埋め、特に賞味期限や仕込み量などの重要項目に「試験データの所在」を明記することが、信頼される標準書の絶対条件です。"},{"m":8,"q":"2025年版GMPガイドラインにおいて、「微生物等関連原材料」に該当するものはどれですか？","o":["化学合成されたビタミン剤","天然の鉱石粉末","発酵食品由来の原料、培養された菌糸体、藻類など","プラスチック容器"],"h":"微生物の「培養」や「発酵」という生物的なプロセスを経て作られるものが対象です。","c":2,"e":"発酵エキス、酵母、乳酸菌、キノコ（菌糸体）、クロレラ（藻類）などは、製造条件のわずかな変化で成分バランスが変わりやすいため、特別な管理対象となります。"},{"m":8,"q":"微生物等関連原材料について、製品標準書の「必須12項目」のうち、特に追加で記載しなければならない内容は何ですか？","o":["原料の仕入れ価格","同等性／同質性の規格および試験検査方法","担当者の顔写真","工場の地図"],"h":"「過去のロットと同じ品質であること」をどう証明するか、という手順です。","c":1,"e":"最新の指針では、特定の有効成分だけでなく、製品全体のパターンが過去と「同等（同じ）」であることを確認する手順を標準書に明記することが義務化されました。"},{"m":8,"q":"混合物全体の組成を「指紋（フィンガープリント）」のように網羅的に分析する手法を何と呼びますか？","o":["抜き取り検査","プロファイル分析","官能検査","破壊検査"],"h":"有効成分という「点」ではなく、不純物を含めた全体の「面（パターン）」を見る手法です。","c":1,"e":"プロファイル分析を行うことで、主成分の量には現れない「未知の物質の混入」や「微量成分の消失」を視覚的に捉えることができます。"},{"m":8,"q":"プロファイル分析において、安価で迅速に実施でき、スポットの位置や色調で視覚的に比較できる手法は何ですか？","o":["TLC（薄層クロマトグラフィー）","pH測定","比重測定","滴定"],"h":"板の上に試料をスポットし、溶媒で展開して現れる「点」を比較する手法です。","c":0,"e":"TLCは、基準ロット（リファレンス）と新ロットを隣同士で展開して直接比較できるため、同等性評価の一次判断として非常に有効です。"},{"m":8,"q":"具体例①のK社において、主成分の数値は合格だったにもかかわらず、TLC分析で不合格（非同等）と判断された理由は何ですか？","o":["板が汚れていたから","基準ロットにあった「特定のスポット」が消えていたから","溶媒が足りなかったから","検査員の勘"],"h":"発酵時間の短縮により、数値には出ない「微量な随伴成分」のバランスが崩れていました。","c":1,"e":"プロファイル分析は「いつも通りの顔つきか」を確認します。一部のスポットが消えたり、新しいスポットが現れたりした場合は、製造工程に変異があった証拠です。"},{"m":8,"q":"より詳細に成分を分離し、多波長検出等を用いて網羅的に成分を検出する高度な分析手法は何ですか？","o":["HPLC（高速液体クロマトグラフィー）","顕微鏡観察","糖度計","温度計"],"h":"溶媒の組成を連続的に変化させる（グラジエント）ことで、多くの成分を分離できます。","c":0,"e":"HPLCによるプロファイル分析は、TLCよりも高い分離能を持ち、微細な変異を数値やピーク形状として客観的に評価できます。"},{"m":8,"q":"微生物等関連原材料の受入検査において、意図しない菌の混入や変異を「直接」確認するために有効な手段は何ですか？","o":["顕微鏡観察（および培養検査）","匂いを嗅ぐ","振ってみる","重さを量る"],"h":"具体例②のL社は、これにより「細長い菌（桿菌）」の混入を見抜きました。","c":0,"e":"顕微鏡で菌の形態（形や大きさ）を確認することは、製造環境の汚染や種菌の変異を早期に発見するための確実なステップです。"},{"m":8,"q":"もしプロファイル分析の結果が過去のロットと異なっていた場合、GMP上どのような判断を下すべきですか？","o":["気にせず出荷する","「逸脱」とみなし、原因が判明し安全が確認されるまで出荷を停止する","数値が合格なら良しとする","サプライヤーに文句を言うだけで終わらせる"],"h":"「非同等」は「異常（不適合）」のサインです。","c":1,"e":"プロファイルの変化は、未知の有害物質が発生している可能性を示唆します。原因究明とリスク評価（品質確認責任者による承認）ができるまで、製品を動かしてはいけません。"},{"m":8,"q":"本研修の例え話として、微生物等関連原材料の同等性評価を何に例えていましたか？","o":["豪華なフルコースの試食","「双子の顔認証（身長だけでなくパーツの配置を見る）」","終わりなき旅","秘密の暗号"],"h":"身長（数値）が同じでも、顔（パターン）が違えば別人であるという例えです。","c":1,"e":"「顔写真（クロマトグラム）」を撮って過去と照合する。この視覚的な一致こそが、生物由来原料における安全性の担保となります。"},{"m":8,"q":"微生物等関連原材料への対応において、今後、現場の担当者が持つべき最も重要な姿勢は何ですか？","o":["数値を信じる","「パターン（面）」で変化を捉え、わずかな違和感も逃さない科学的な目を持つ","スピードを優先する","事務作業としてこなす"],"h":"「いつもと違う」という気づきが、健康被害を未然に防ぐ鍵です。","c":1,"e":"微生物は生きており、常に変化するリスクがあります。科学的なデータ（プロファイル）を基に、毅然と品質をジャッジする姿勢が求められます。"},{"m":9,"q":"原材料を他社から自製造所に受け入れる「入荷」の際、最初に行うべきGMP上の必須業務は何ですか？","o":["すぐに製造ラインへ投入する","ロットごとに製品標準書の規格に適合しているか「試験検査」を行う","安いかどうかを確認する","倉庫の奥に隠す"],"h":"「正しいものが届いたか」を確認するまでは、使用してはいけません。","c":1,"e":"入荷した原材料は、試験検査を経て「合格」と判定されるまでは「試験待ち」または「試験中」として管理し、製造への使用を禁止しなければなりません。"},{"m":9,"q":"原材料のサンプリング（検体採取）を行う場所として、最も適切なのはどこですか？","o":["屋外の荷揚げ場","倉庫内の専用サンプリング室（清浄度区分1相当）","食堂のテーブル","配送トラックの中"],"h":"採取時に異物や微生物が混入しないよう、清潔な環境で行う必要があります。","c":1,"e":"外部からの汚染を防ぐため、管理された清浄な専用スペースで、教育を受けた担当者がサンプリングを行うのが原則です。"},{"m":9,"q":"原材料のドラム缶などに貼る、「試験前」「試験中」「合格」「不適合」といった状態を示す表示を何と呼びますか？","o":["ニックネーム","識別ラベル（ステータス表示）","広告ステッカー","値札"],"h":"一目でその原材料が「使って良いものか」を判別するための「信号機」のような役割です。","c":1,"e":"識別管理を徹底することで、試験前の原材料を誤って使用するといった「人為的な誤り（ヒューマンエラー）」を物理的に防ぐことができます。"},{"m":9,"q":"具体例①において、新入社員が「白い粉」を間違えて運び出そうとした際、踏みとどまることができた理由は何ですか？","o":["勘が働いたから","赤い文字で「試験中」と書かれたラベルが貼ってあったから","誰かに怒鳴られたから","重かったから"],"h":"「見た目」ではなく「表示（ステータス）」で判断する仕組みが機能しました。","c":1,"e":"見た目が同じ原材料でも、ラベルの色や文字で状態を可視化しておくことで、焦っている時でも誤りに気づくことができます。"},{"m":9,"q":"試験の結果「不適合（不合格）」と判定された原材料や資材の保管方法として、最も適切なものはどれですか？","o":["合格品の隣に置いておく","識別ラベルを貼り替えて使う","他のものと混同しないよう「専用の場所（不適合品置場）」に隔離し、施錠管理等を行う","こっそり捨てる"],"h":"間違えて手に取ることが不可能な状態にすることが理想です。","c":2,"e":"不適合品は物理的に隔離することが重要です。床のライン引きやパーティション、施錠されたエリアに置くことで、誤使用のリスクを最小限にします。"},{"m":9,"q":"「いつ、どこから、どれだけ入り、どこへ使われたか」をロットごとに記録し、後から遡れるようにする体制を何と呼びますか？","o":["記憶術","トレーサビリティ（追跡可能性）","秘密保持","在庫処分"],"h":"万が一の品質事故の際、影響範囲を特定するために不可欠な仕組みです。","c":1,"e":"受入から出荷までの「出納記録」を正確に残すことで、どの原材料がどの製品のどのロットに使用されたかを確実に特定できます。"},{"m":9,"q":"具体例②において、夜勤の作業員が不適合品の資材（アルミ袋）を使わずに済んだのは、現場にどのような工夫があったからですか？","o":["監視カメラがあったから","黄色のラインで囲った「不適合品専用エリア」と「使用禁止」の札があったから","鍵がかかっていなかったから","誰もいなかったから"],"h":"「ソフト（ルール）」だけでなく「ハード（物理的な区分）」の管理がなされていました。","c":1,"e":"「不適合品は専用エリアへ」という物理的な隔離ルールが、担当者の思い込みによるミスを未然に防ぐ「最後の砦」となります。"},{"m":9,"q":"原材料の在庫管理において、帳簿上の数量と「在庫の実態」が一致していることを確認する作業はなぜ重要ですか？","o":["掃除になるから","記録の正確性を担保し、紛失や誤使用がないことを証明するため","暇つぶしのため","運動になるから"],"h":"「記録がない＝実施していない」と同様、記録と現物が違うのは管理の不備です。","c":1,"e":"出納記録と現物の不一致は、どこかで「記録漏れ」や「無断使用」が起きているサインです。これはトレーサビリティの崩壊を意味します。"},{"m":9,"q":"本研修の例え話として、原材料の受入管理を何に例えていましたか？","o":["豪華なフルコースの献立","「国際空港の入国審査（カスタム）」","終わりなき旅","秘密の暗号"],"h":"不適合品を製造現場に入れるのは、テロリストを入国させるのと同じくらい危険だという例えです。","c":1,"e":"パスポート（規格書）を確認し、手荷物検査（受入試験）をクリアした人（合格品）だけが入国（製造）できるという例えは、ゲートキーパーの重要性を象徴しています。"},{"m":9,"q":"明日から倉庫や現場で「原材料」を扱う際、最も徹底すべきことは何ですか？","o":["ラベルを見ずに直感で選ぶ","必ず「識別ラベル（ステータス）」を確認し、合格品のみを正しく扱う","忙しい時はルールを無視する","面倒な記録は後回しにする"],"h":"強固な受入管理こそが、高品質な製品を生み出すための「土台」です。","c":1,"e":"一人ひとりが「表示」を信じ、ルール通りに区分管理を行うことが、会社のブランドとお客様の安全を守ることに直結します。"},{"m":10,"q":"製造を開始する前に、製造管理責任者がロットごとに発行しなければならない、作業の根拠となる文書は何ですか？","o":["自由帳","製造指図書","営業日報","休暇届"],"h":"「何を、どれだけ、どう作るか」という具体的な指示が書かれた書類です。","c":1,"e":"指図なき作業は厳禁です。必ず最新の製品標準書に基づき、責任者が承認した「製造指図書」に従って作業を開始しなければなりません。"},{"m":10,"q":"製造指図書に必ず明記すべき内容として、不適切なものはどれですか？","o":["ロット番号","原材料の正確な配合量","作業上の注意事項","今日の運勢"],"h":"品質を一定に保つために必要な「客観的な情報」が含まれている必要があります。","c":3,"e":"指図書には、仕込み量、工程ごとの条件、理論収量など、誰が作業しても同じ結果が得られるための具体的な数値や指示が必要です。"},{"m":10,"q":"秤量や混合、充填などの「重要工程」において、ヒューマンエラーを防ぐために必須とされるアクションは何ですか？","o":["一人だけで静かに作業する","複数の人員による「ダブルチェック」とその記録","勘で分量を決める","記録は後でまとめて書く"],"h":"「自分の思い込み」を他人の目で正すためのステップです。","c":1,"e":"重要工程では、作業者以外の者がその場で内容を確認し、相互にサインを行うことで、誤配合や取り違えを未然に防ぎます。"},{"m":10,"q":"具体例①のAさんのように、「後でまとめてチェックをもらう」という行為がGMP上認められない理由は何ですか？","o":["紙が汚れるから","ミスが起きる「その瞬間」に確認しなければ、ダブルチェックの機能（防止効果）を果たさないから","先輩が忙しいから","サインが面倒だから"],"h":"後からハンコを押すのは、単なる「事務手続き」であり「確認」ではありません。","c":1,"e":"ダブルチェックはリアルタイム（同時）で行うことに意味があります。投入してしまった後では、中身が正しいかどうかを物理的に確認できなくなるからです。"},{"m":10,"q":"各工程の終了時に、計算上の出来高（理論収量）と実際の出来高（実績）を比較することを何と呼びますか？","o":["収得量（収率）の管理","在庫整理","抜き取り検査","利益計算"],"h":"「100kg仕込んだのに、なぜか105kgできた」というような異常を察知するための指標です。","c":0,"e":"収率の異常は、他製品の混入（交叉汚染）や、材料の入れ忘れ、計量ミスなどの「現場で起きた何か」を知らせる重要なサインです。"},{"m":10,"q":"具体例②のP社で、収率が「102%」と理論値を超えていた原因は何でしたか？","o":["材料が勝手に増えた","前日の別製品の残存粉末が混入していた（洗浄不備）","湿気で重くなった","秤の故障"],"h":"「たくさんできたからラッキー」ではなく、「異物が入った」という危機的状況でした。","c":1,"e":"数字の不一致を「まあいいか」で見逃すと、重大なアレルゲン混入や、表示外成分の含有による製品回収（リコール）を招く恐れがあります。"},{"m":10,"q":"使用した原材料のロット番号や、担当した作業員をすべて記録に残すことで、後から原因を遡れるようにすることを何と呼びますか？","o":["記憶力","トレーサビリティ","秘密保持","証拠隠滅"],"h":"万が一の問題発生時に、影響範囲を特定するための「追跡可能性」です。","c":1,"e":"正確な製造記録があるからこそ、数年後であっても「あの時、どの材料を使ったか」を特定し、お客様に誠実な説明ができます。"},{"m":10,"q":"製造記録書への記入において、ALCOA+の原則に基づいた正しい書き方はどれですか？","o":["鉛筆で書き、間違えたら消しゴムで消す","作業の合間や終了直後に、ボールペンで消せないように記入する","誰が書いたかわからないようにする","1週間分をまとめて週末に書く"],"h":"「同時性」と「帰属性」がポイントです。","c":1,"e":"記録は作業と同時に行い、誰が書いたか明確にし、修正が必要な場合は二重線と訂正印を用いるのがGMPのルールです。"},{"m":10,"q":"本研修の例え話として、製造指図書と記録書を何に例えていましたか？","o":["豪華なフルコースの献立","飛行機の「フライトプランとフライトレコーダー」","終わりなき旅","秘密の暗号"],"h":"正確な計画に基づき、副操縦士（ダブルチェック）と共に飛び、すべてを記録に残すイメージです。","c":1,"e":"お客様の命（健康）を預かる仕事は、一便一便が真剣勝負です。正確な指図と記録こそが、安全な着陸（製品出荷）を保証します。"},{"m":10,"q":"明日から現場で作業する際、「品質保証の最後の砦」として最も徹底すべきことは何ですか？","o":["自分の腕を過信して一人で進める","「指図なき作業なし、記録なき作業なし」を徹底し、重要工程では必ずその場でダブルチェックを受ける","忙しい時は記録を省略する","ダブルチェックは後でまとめてお願いする"],"h":"一見遠回りに見えても、これが不良品をゼロにする「最短距離」です。","c":1,"e":"基本を愚直に守ること。それが、あなた自身と、会社、そして何よりお客様の健康を守る最も確実な方法です。"},{"m":11,"q":"GMPにおける衛生管理の目的として、最も適切なものはどれですか？","o":["従業員の見た目を良くすること","人為的な誤り以外の要因（微生物、塵埃、害虫等）による製品の汚染を防止すること","掃除を早く終わらせること","芳香剤で良い香りにすること"],"h":"「目に見えないリスク」から製品を守るための活動です。","c":1,"e":"衛生管理は、原材料や製品が外部環境（人、設備、空気、水）によって汚染されることを防ぎ、常に一定の品質を保つために行われます。"},{"m":11,"q":"清浄度区分（1～3区分）に応じた作業服装の管理において、入室前に必ず行うべき「毛髪除去」の代表的な手段は何ですか？","o":["手で払う","粘着ローラー（コロコロ）による処理","扇風機にあたる","帽子を脱ぐ"],"h":"具体例①のAさんが、急ぐあまり短時間で済ませてしまった作業です。","c":1,"e":"粘着ローラーによる毛髪・塵埃の除去は、製造区域への異物持ち込みを防ぐ「最初のフィルター」です。鏡の前で全身をくまなく、決められた回数行うことが鉄則です。"},{"m":11,"q":"手洗いの手順として、GMPで推奨される正しい方法はどれですか？","o":["水だけでさっと流す","ハンドソープを泡立て、指先や爪の間まで洗浄し、消毒液で仕上げる","作業着の袖で手を拭く","手袋をしていれば洗わなくて良い"],"h":"「流水」と「手指消毒」の組み合わせが基本です。","c":1,"e":"手指は最大の汚染源になり得ます。手順書（SOP）に従い、親指の付け根や手首までしっかりと洗浄・消毒することが義務付けられています。"},{"m":11,"q":"製品の切り替え時に、前ロットの成分や洗浄剤が残っていないことを科学的に確認する活動を何と呼びますか？","o":["拭き掃除","洗浄バリデーション","立ち会い検査","抜き打ちテスト"],"h":"「綺麗に見える」だけでなく、データで「残留がない」ことを証明する作業です。","c":1,"e":"特に異なる成分の製品を交互に作る場合、交叉汚染（コンタミネーション）を防ぐための洗浄バリデーションは、品質保証の極めて重要なプロセスです。"},{"m":11,"q":"具体例②のS社で、徹底的に掃除をしても微生物が検出され続けた「意外な原因」は何でしたか？","o":["作業員のサボり","搬入口のカーテンの破れ（虫の侵入）や、天井裏の配管の結露（カビの温床）","洗剤の使いすぎ","窓の開けっ放し"],"h":"日常の「表面的な清掃」では気づけない、建物の構造上の欠陥でした。","c":1,"e":"衛生管理は掃除（ソフト）だけでなく、建物のメンテナンス（ハード）との両輪です。隙間や結露といった「見えない汚染源」を排除することが重要です。"},{"m":11,"q":"防虫・防鼠（ぼうちゅう・ぼうそ）対策において、施設内に「侵入させない」ためのハード対策として適切なものはどれですか？","o":["窓を開けて換気する","排水溝の水封（トラップ）の維持や、開口部への前室・防虫カーテンの設置","食べ物を出しっぱなしにする","害虫を見つけたら追いかける"],"h":"虫やネズミの通り道を物理的に遮断する工夫です。","c":1,"e":"屋外と接する場所には必ず防護策を講じます。また、定期的なモニタリング（捕獲トラップの確認）を行い、侵入状況を客観的に把握（見える化）することも求められます。"},{"m":11,"q":"製造に使用する「水（製造用水）」の管理において、定期的に確認すべき最低限の基準は何ですか？","o":["美味しいこと","飲用適（水道法などの飲料水基準に適合していること）","冷たいこと","透明であること"],"h":"「安全に飲める水」であることが、製造用水の出発点です。","c":1,"e":"製造用水は製品の一部になるため、定期的な水質検査を行い、貯水槽などの清掃記録を保持しなければなりません。"},{"m":11,"q":"2025年版ガイドラインでも重視されている、衛生管理を徹底するための「組織的な文化」として大切なことは何ですか？","o":["経験年数が長い人の言うことだけ聞く","ルールを守っていない人がいたら、立場に関わらず指摘し合える雰囲気","事故が起きるまで黙っている","難しい言葉でマニュアルを書く"],"h":"「慣れ」や「慢心」を、チームの目（相互チェック）で防ぎます。","c":1,"e":"具体例①の改善策「鏡の前での相互チェック」のように、一人ひとりが監視役となり、ルールを遵守する文化が最強の防御となります。"},{"m":11,"q":"本研修の例え話として、製造現場の衛生管理を何に例えていましたか？","o":["豪華なフルコースのキッチン","「外科手術を行う手術室」","終わりなき旅","秘密の暗号"],"h":"最高の技術があっても、環境が汚れていれば「手術（製造）」は失敗するという例えです。","c":1,"e":"お客様の健康を守る製品を作る以上、製造現場は手術室と同じレベルの緊張感と清潔さが求められる、というプロ意識の象徴です。"},{"m":11,"q":"明日から現場で衛生管理に取り組む際、最も避けるべき「最大の敵」は何ですか？","o":["洗剤","「これくらい大丈夫だろう」という慣れや甘い認識","掃除道具","新しいルール"],"h":"具体例①のAさんの失敗の原因を思い出してください。","c":1,"e":"どれほど優れた設備やマニュアルがあっても、使う人間の「心の隙間」から汚染は始まります。基本を愚直に守り続けることが、最大の品質保証です。"},{"m":12,"q":"GMPにおける「構造設備（ハード）」を整備する主な目的は何ですか？","o":["工場を新しく見せて求人を増やすこと","人為的な誤り（ヒューマンエラー）以外の要因による「汚染や品質低下」を物理的に防止すること","機械の台数を増やすこと","電気代を節約すること"],"h":"「ルールを守らせる」前に、「ルールを破れない仕組み」を建物で作ることです。","c":1,"e":"構造設備は、空気の流れや人の動きを制御することで、微生物や塵埃、他製品の粉塵（交叉汚染）が製品に混入するのを防ぐ「物理的な砦」の役割を果たします。"},{"m":12,"q":"原材料や製品に直接接する「秤量室」や「充填室」などは、清浄度区分のどこに該当しますか？","o":["区分1（清潔）","区分2（準清潔）","区分3（一般）","区分外"],"h":"最も高いレベルの衛生管理が求められる、工場の「心臓部」にあたる場所です。","c":0,"e":"区分1は、製品が露出する最もデリケートなエリアです。ここへの入室には、厳格な更衣と手洗い、毛髪除去が必須となります。"},{"m":12,"q":"清浄度の異なる区域（例：一般区域と清潔区域）の間で、汚染された空気が直接流れ込むのを防ぐために設置する「緩衝用の小部屋」を何と呼びますか？","o":["会議室","前室（緩衝区域 / PR）","休憩室","給湯室"],"h":"扉を二重にし、同時に開かないようにすることで、空気の壁を作る場所です。","c":1,"e":"前室（エアーシャワー室を含む）を設けることで、外部の塵埃や微生物が直接清潔区域に侵入するのを防ぎます。"},{"m":12,"q":"具体例①のT社で起きた、秤量室を「通り抜け通路」として使ったことによる問題は何でしたか？","o":["足が疲れた","作業員の移動による風圧で粉塵が舞い上がり、他製品へ混入（交叉汚染）した","掃除が楽になった","挨拶が増えた"],"h":"「作業室を他の部屋への通路としてはならない」という基本ルールに反していました。","c":1,"e":"不要な人の出入りは、空気の乱れを生み、目に見えない粉塵を飛散させます。動線を物理的に分断することが、交叉汚染防止の鉄則です。"},{"m":12,"q":"清潔区域へ入るための「更衣室」の構造として、2025年版ガイドラインが求めている望ましい形はどれですか？","o":["出入り口が1つで、私服と作業着が混ざる構造","脱衣から手洗い、毛髪除去までが「一方通行」で交叉しない構造","どこでも着替えて良い自由な構造","鏡がない構造"],"h":"「入る人」と「出る人」がぶつからない設計が理想です。","c":1,"e":"一方通行（ワンウェイ）の動線にすることで、脱いだ私服に付着した塵埃が、これから着る清潔な作業着に付着するリスクを最小限に抑えられます。"},{"m":12,"q":"具体例②のU社のように、1つの部屋で複数の製品を同時に作る際、交叉汚染を防ぐために導入すべきハード対策は何ですか？","o":["カーテンで仕切る","物理的なパネルによる完全な「区画化（1室1台）」と空気の流れ（気圧）の制御","隣の作業員と話さないようにする","窓を開ける"],"h":"目に見えない粉塵は、カーテンの隙間からでも隣へ移動してしまいます。","c":1,"e":"特にアレルゲンを含む製品を扱う場合、物理的な壁で仕切り、気圧の差（陽圧・陰圧）を利用して粉塵を閉じ込める高度な設計が求められます。"},{"m":12,"q":"物の移動（原材料や資材の搬入）において、扉を開けずに小窓から受け渡しを行うための設備を何と呼びますか？","o":["郵便受け","パスボックス（PB）","換気扇","覗き窓"],"h":"「人」が入らずに「物」だけを清潔区域へ送るための箱型の設備です。","c":1,"e":"パスボックスを使用することで、人の移動（および扉の開閉）を最小限にしつつ、効率的に資材を供給できます。"},{"m":12,"q":"構造設備において、「トイレ」の配置に関するGMPのルールとして正しいものはどれですか？","o":["作業室の中に設置する","作業室から完全に隔離し、清潔区域の作業着のまま使用してはならない","どこに置いても良い","手洗いがなければどこでも良い"],"h":"トイレは最大の汚染源の一つであるため、物理的・衛生的な隔離が必須です。","c":1,"e":"トイレへ行く際は、一度清潔区域の作業着を脱ぐか、専用の上履きに履き替えるなどの厳格なルールと、それを可能にする設備配置が求められます。"},{"m":12,"q":"本研修のまとめとして、構造設備を点検する際の「3つの目」に含まれないものはどれですか？","o":["「仕切りの目」","「流れの目」","「緩衝の目」","「節約の目」"],"h":"物理的な隔離、動線のスムーズさ、空気の壁、をチェックします。","c":3,"e":"GMPハードにおいて優先すべきは「汚染の排除」です。コストを優先して仕切りや前室を省略することは、将来の回収リスクを高めることになります。"},{"m":12,"q":"本研修の例え話として、GMPの構造設備を何に例えていましたか？","o":["豪華なフルコースのレストラン","「最新のスマートフォンの防水構造」","終わりなき旅","秘密の迷宮"],"h":"意識に頼らず、「隙間（欠陥）」を物理的に塞ぐことで内部を守るイメージです。","c":1,"e":"防水パッキン（前室）や独立したブロック（区画）があるからこそ、外敵（汚染）から中身を守れる。この「構造による保証」がGMPハードの真髄です。"},{"m":13,"q":"GMPにおける「品質管理（QC）」の本来の役割として、最も適切なものはどれですか？","o":["出来上がった製品の見栄えを良くすること","原材料から製品出荷に至るまで、客観的なデータ（証拠）によって品質を証明すること","検査コストを最小限に抑えること","営業の代わりに製品を宣伝すること"],"h":"「事実（データ）」に基づいて、製品が設計通りであることを保証する活動です。","c":1,"e":"品質管理は、試験検査を通じて製品が規格に適合しているかを確認し、その記録を保持することで、顧客に対して安全性を客観的に証明する役割を担います。"},{"m":13,"q":"原材料や製品のロットを代表する「検体（サンプル）」を採取する際、原則として誰が実施すべきですか？","o":["運送会社のドライバー","教育訓練を受けた品質部門の担当者","通りかかった事務員","誰でも良い"],"h":"採取時の汚染防止や「代表性」の確保には、専門的な知識と技能が必要です。","c":1,"e":"サンプリングは試験結果の信頼性を左右する第一歩です。専用の場所（サンプリング室等）で、定められたSOPに従って正しく採取しなければなりません。"},{"m":13,"q":"万が一の品質トラブルに備えて、ロットごとに保管しておく「参考品（保存品）」の最低限必要な量はどれくらいですか？","o":["1粒だけ","所定の試験検査に必要な量の「2倍量以上」","段ボール1箱分","決まっていない"],"h":"「再試験」が必要になった際、1回分だけでは足りなくなる恐れがあるためです。","c":1,"e":"2倍量以上保管する理由は、1つを検証（破壊検査等）に使用しても、もう1つ「未開封の決定的な証拠」を予備として残しておくためです。"},{"m":13,"q":"参考品（保存品）を保管しておくべき「期間」の正しいルールはどれですか？","o":["製造から1ヶ月間","製品の消費期限（賞味期限）から起算して「1年間」","永久に保管","出荷した瞬間に捨てて良い"],"h":"お客様が製品を使い切った後でも、しばらくの間は調査ができるようにしておきます。","c":1,"e":"賞味期限ギリギリに購入した顧客からの問い合わせにも対応できるよう、期限終了後さらに1年間の保管がGMPガイドラインで求められています。"},{"m":13,"q":"具体例①のV社において、2倍量の参考品が役に立った最大の理由はなんですか？","o":["顧客にプレゼントできたから","未開封の状態で再試験・顕微鏡観察を行い、異物の正体が「安全な原材料の一部」だと科学的に証明できたから","倉庫が華やかになったから","転売できたから"],"h":"「手元の製品」だけでなく「工場の保管品」を調べることで、製造時の真実がわかります。","c":1,"e":"参考品があることで、クレーム品が「製造時に混入したもの」なのか「開封後に混入したもの」なのか、あるいは「元々の仕様（正常）」なのかを客観的に比較できます。"},{"m":13,"q":"試験検査に使用する「試薬」や「標準品」の管理において、絶対に守らなければならないことは何ですか？","o":["常に冷蔵庫の奥に隠す","使用期限を厳守し、ラベルに開封日等を明記して管理する","安いものから使う","期限が切れても色が同じなら使う"],"h":"具体例②のW社は、これが原因で「適合認定」の危機に陥りました。","c":1,"e":"期限切れの試薬で得られたデータは、法的に「無効」とみなされます。精密な機器があっても、使用する「道具（試薬）」が正しくなければ品質は証明できません。"},{"m":13,"q":"試験結果が規格外（不合格：OOS）となった際、品質管理責任者が取るべき正しい行動はどれですか？","o":["合格が出るまで何度も黙って再試験する","原因調査を行い、再試験の妥当性を評価した上で、記録を残して判定する","データを書き換える","記録を破棄する"],"h":"不備があった時こそ、ルールに基づいた「誠実なプロセス」が問われます。","c":1,"e":"異常値を安易に無視せず、なぜその数値が出たのか（機器の不調か、製品の異常か）を突き止めることが、真の品質管理です。"},{"m":13,"q":"試験に使用する分析機器（天秤やHPLC等）の信頼性を保つために定期的に行う作業を何と呼びますか？","o":["塗装","校正（キャリブレーション）","掃除","買い替え"],"h":"「ものさし」が狂っていないか、標準器を使って確認する作業です。","c":1,"e":"定期的な校正と点検の記録（バリデーションデータ）があることで、初めてその分析結果が「正しい数値」として公的に認められます。"},{"m":13,"q":"本研修の例え話として、参考品の保管を何に例えていましたか？","o":["豪華なフルコースの予備","「裁判における証拠品の保存」","終わりなき旅の荷物","秘密の暗号"],"h":"第三者（審査員や顧客）に対して、自社の潔白を証明するための決定的な材料という意味です。","c":1,"e":"未開封の参考品は、製造所における「真実の記録」です。これがあることで、不当な疑いや誤解から自社と製品を守ることができます。"},{"m":13,"q":"明日から試験室や現場で実務にあたる際、最も大切にすべき姿勢は何ですか？","o":["早く帰るために手を抜く","「不正確なデータは誤った管理を招く」と自覚し、ALCOA+に基づいた正確な記録を残す","上司に怒られないように数値を調整する","ルールは自分なりにアレンジする"],"h":"品質管理のデータは、会社の信頼を守る「最後の砦」です。","c":1,"e":"「測定できないものは管理できない」。正確なデータこそが、お客様の安全と会社の未来を支える唯一の基盤であることを忘れないでください。"},{"m":14,"q":"GMPにおける「バリデーション（妥当性確認）」の定義として、最も適切なものはどれですか？","o":["故障した機械を修理すること","設備や手順が「期待される結果を与えること」を検証し、文書化すること","従業員の出勤状況を確認すること","予算が計画通りに使われたかチェックすること"],"h":"「いつも通り」が「科学的に正しい」ことを証明し、記録に残す作業です。","c":1,"e":"バリデーションは、特定のプロセス（製造、洗浄、滅菌など）が、常に目的とする品質の製品を一貫して作り出せることを、データによって客観的に証明する活動です。"},{"m":14,"q":"バリデーションを実施しなければならないタイミングとして、不適切なものはどれですか？","o":["初めてその製品の製造を開始する場合","品質に影響を及ぼす大きな変更（設備の更新など）があった場合","毎日、朝礼が終わった直後","定期的に恒常性を確認する必要があると判断された場合"],"h":"「変化」があった時や「最初」の時、そして「定期的な健康診断」として行います。","c":2,"e":"バリデーションは日常のルーチン作業ではなく、新規立ち上げ時、変更時、および定期的な再検証（リバリデーション）のタイミングで、計画に基づいて実施します。"},{"m":14,"q":"バリデーションを実施する際、事前に作成し、品質部門の承認を得なければならない文書は何ですか？","o":["休暇届","バリデーション実施計画書","改善提案書","納品書"],"h":"「何を、どうやって、どの基準で検証するか」をあらかじめ決めておく書類です。","c":1,"e":"計画なき検証はバリデーションとは呼べません。目的、対象、評価基準（合格ライン）を明記した計画書に基づき、客観的に評価することが求められます。"},{"m":14,"q":"具体例①の「洗浄バリデーション」において、目視で綺麗に見えても試験（スワブ試験等）を行う目的は何ですか？","o":["掃除の時間を延ばすため","目に見えない微量な成分の残留（交叉汚染のリスク）を科学的に確認するため","検査員の腕力を鍛えるため","洗剤の種類を増やすため"],"h":"「綺麗」の定義を、主観ではなく「残留物がないというデータ」に置き換えます。","c":1,"e":"サプリメントは多品種を同じ機械で作ることが多いため、前ロットの成分が次ロットに混入するのを防ぐ洗浄バリデーションは、アレルギー対策等の観点からも極めて重要です。"},{"m":14,"q":"製造工程や設備に変更を加える際、その影響を評価し、承認を受ける一連の仕組みを何と呼びますか？","o":["経理管理","変更管理","在庫管理","労務管理"],"h":"「良かれと思った変更」が品質を壊さないようにするためのフィルターです。","c":1,"e":"どんなに小さな変更でも、独断で行わず、品質への影響を組織的に評価するプロセスを通すことが、GMPの鉄則です。"},{"m":14,"q":"変更管理において、変更の内容（重大、軽微など）に応じて管理レベルを分けることを何と言いますか？","o":["階級分け","クラス分類","整理整頓","優先順位"],"h":"リスクの大きさに合わせて、必要な検証（バリデーション等）の重さを変える合理的な考え方です。","c":1,"e":"全ての変更に同じ労力をかけるのではなく、品質に直結する「重大な変更」には厚い検証を、影響が少ないものには簡略化した手続きを適用します。"},{"m":14,"q":"具体例②の工場長が、混合機の羽根の形状変更を「軽微な変更」と独断した結果、どのような問題が起きましたか？","o":["混合速度が速くなりすぎて、成分が不均一（バラツキ）になった","掃除が楽になった","電気代が安くなった","誰も気づかなかった"],"h":"「機械の形が変わる」ことは、混合の原理が変わる「重大な変更」でした。","c":0,"e":"一見良さそうな変更でも、事前検証（バリデーション）なしに行うと、製品の均質性が失われ、規格外製品を大量に生むリスクがあります。"},{"m":14,"q":"変更管理において、最終的にその変更を「実施して良い」と承認を下すべきなのはどの機能ですか？","o":["営業部門","品質部門（品質確認機能）","配送センター","原材料メーカー"],"h":"製造現場の「作りやすさ」ではなく、製品の「品質・安全性」の観点からジャッジする部署です。","c":1,"e":"変更によるリスクを客観的に評価し、科学的なデータに基づいてゴーサインを出すのは、製造から独立した品質部門の役割です。"},{"m":14,"q":"本研修の例え話として、バリデーションと変更管理を何に例えていましたか？","o":["豪華なフルコースの献立","「新しいレシピでケーキを焼くこと（試作と確認）」","終わりなき旅","秘密の暗号"],"h":"初めての時（バリデーション）や、材料を変える時（変更管理）に、事前に中まで焼けているか確かめるイメージです。","c":1,"e":"「ぶっつけ本番」を避け、事前に検証して「成功する確信」を持ってから本番（量産）に挑む。この当たり前の慎重さを組織化したのがバリデーションです。"},{"m":14,"q":"全15回の研修を通じて、GMPを運用する上で最も大切だと感じた姿勢はどれですか？","o":["記録は後でまとめて書く","勘と経験を信じて、ルールは適当に守る","「科学的根拠（データ）」に基づき、ルール（標準）を愚直に守り、改善し続ける","審査の時だけ綺麗にする"],"h":"健康食品GMPの目的は「お客様の安全」と「製品の品質」を保証し続けることです。","c":2,"e":"GMPは、個人の能力に頼らず、組織的な仕組み（ハードとソフト）で品質を守るための知恵です。学んだ知識を「生きた記録」として現場に残し続けてください。"},{"m":15,"q":"GMPにおける「逸脱（Deviation）」の定義として、最も適切なものはどれですか？","o":["担当者が寝坊すること","あらかじめ定められた製造手順や規格から外れること","予定より早く仕事が終わること","機械が新品に交換されること"],"h":"「マニュアル（SOP）通りにいかなかったことすべて」を指します。","c":1,"e":"温度のわずかな外れ、原材料の取り違え、記録の書き損じなど、手順と異なる事態が起きた場合はすべて「逸脱」として管理し、品質への影響を評価しなければなりません。"},{"m":15,"q":"製造現場で「逸脱」が発生した際、作業者が取るべき最初のアクションは何ですか？","o":["バレないようにこっそり修正する","「大丈夫だろう」と自己判断して作業を続ける","直ちにその内容を記録し、責任者に報告する","誰かのせいにする"],"h":"具体例①のMさんの失敗（サイレント逸脱）を思い出してください。","c":2,"e":"小さな異変を隠すと、後の原因究明が不可能になります。不都合な事実ほど早く共有することが、大規模な品質事故を防ぐ唯一の道です。"},{"m":15,"q":"重大な逸脱が発生した場合、その評価結果と講じた措置について最終的に文書で報告を受けるべき責任者は誰ですか？","o":["営業本部長","総括責任者","採用担当者","警備員"],"h":"製造所全体を統括し、最終的な経営判断（回収の要否など）を下す立場の人です。","c":1,"e":"重大な品質リスクについては、総括責任者が状況を把握し、組織として適切な判断（出荷停止や行政報告など）を下す体制が義務付けられています。"},{"m":15,"q":"顧客からの苦情（品質情報）を得たとき、最初に行わなければならないことは何ですか？","o":["クレーマーとして無視する","直ちに原因を究明し、必要に応じて製造・品質管理の改善措置を講じる","営業担当者だけに任せておく","すぐに返金して記録を消す"],"h":"苦情は「現場の不備」を知らせてくれるアラートです。","c":1,"e":"品質情報は、自社のQMS（品質マネジメントシステム）が正しく機能しているかを確認するための貴重なデータです。原因を「仕組み」の観点から深掘りする必要があります。"},{"m":15,"q":"具体例②のO社において、苦情の真の原因は何でしたか？","o":["消費者の勘違い","原材料サプライヤーによる「サイレントチェンジ（無断の工程変更）」","運送中の温度上昇","包装紙の色の変化"],"h":"自社の受入試験では気づけない「原材料の変異」が起きていました。","c":1,"e":"サプライヤー管理（第15回参照）の不備が、市場に出てから「苦情」として顕在化した事例です。外部委託先との連携の重要性が再認識されます。"},{"m":15,"q":"逸脱や苦情の原因究明において、最も避けるべき「誤った結論」はどれですか？","o":["設備の老朽化が原因だった","手順書（SOP）の記載が曖昧だった","「作業者の注意不足」として個人の責任にして終わらせる","原材料の規格が不十分だった"],"h":"人を責めても、仕組みが変わらなければ同じミスは必ず繰り返されます。","c":2,"e":"「注意しろ」という精神論は再発防止策にはなりません。ダブルチェックの強化、設備の自動化、手順書の図解化など、「仕組み」で解決するのがGMPの考え方です。"},{"m":15,"q":"逸脱管理や品質情報の記録（原因、改善措置など）の保管期間はどれくらいですか？","o":["1ヶ月","1年","作成から3年間（または賞味期限＋1年間の長い方）","100年"],"h":"他のGMP記録（第7回参照）と同じ、法的に定められた期間です。","c":2,"e":"トラブルの記録は、将来の同様の事案を未然に防ぐための「教科書」になります。適切な期間、確実に保管しなければなりません。"},{"m":15,"q":"重大な品質問題が疑われる際、製品の「回収（リコール）」の要否を判断し、指示を出す権限を持つのは誰ですか？","o":["現場のリーダー","総括責任者","原材料メーカー","消費者"],"h":"法的・社会的な責任を負い、迅速な経営判断を下す役割の人です。","c":1,"e":"2025年版ガイドラインでは、総括責任者のリーダーシップがより重視されています。品質情報を集約し、迅速に判断を下す体制が問われます。"},{"m":15,"q":"本研修の例え話として、逸脱管理と品質情報の管理を何に例えていましたか？","o":["豪華なフルコースのメニュー","自動車の「ダッシュボードの警告灯」","終わりなき旅","秘密の暗号"],"h":"異常を知らせるランプがついたとき、電球を外す（隠す）のではなく、ボンネットを開けて修理するイメージです。","c":1,"e":"警告（逸脱や苦情）は、大きな事故を防ぐための「親切な合図」です。これに誠実に向き合うことで、組織の安全性が向上します。"},{"m":15,"q":"全16回の研修を締めくくるにあたり、GMPを実践する上で最も「強い組織」とはどのような組織ですか？","o":["失敗を一切報告しない組織","小さな異変（逸脱）や苦情を「宝」として共有し、仕組みを改善し続ける組織","社長がすべてを一人で決める組織","審査の時だけルールを守る組織"],"h":"「隠さない、放置しない、繰り返さない」を文化にしている組織です。","c":1,"e":"GMPは「完璧な人間」を求めるのではなく、「失敗から学び、二度と同じ過ちを犯さない仕組み」を求めるものです。これこそが品質保証の真髄です。"},{"m":16,"q":"2024年4月より、食品衛生基準行政の管轄が移管され、健康被害情報の報告先となった行政機関はどこですか？","o":["経済産業省","消費者庁","環境省","総務省"],"h":"機能性表示食品の届出や、食品表示法を所管している機関です。","c":1,"e":"厚生労働省から消費者庁へ管轄が移管されたことで、健康被害情報の収集と、それに基づく表示・規格の是正がよりスピーディーに行われる体制になりました。"},{"m":16,"q":"健康被害情報の届出において、直ちに報告が必要となる「重篤な事例」の定義として、正しいものはどれですか？","o":["味が美味しくないと言われた","死亡、入院（またはその指示）、医師による重篤判定など","パッケージが潰れていた","1回だけ下痢をした"],"h":"「命に関わる」あるいは「医療機関での治療を要する」レベルの事態を指します。","c":1,"e":"重篤な事例については、1件であっても発生を知った時点で速やかに行政（消費者庁・保健所）へ報告する義務があります。"},{"m":16,"q":"重篤ではない症状（下痢や発疹など）であっても、届出が「義務」となる基準は何ですか？","o":["1年間に100件起きた時","概ね30日以内に、同一製品で同一の症状が複数（2件以上）発生した時","社長が許可した時","テレビでニュースになった時"],"h":"具体例①のA社が「点ではなく線」で捉えるべきだとしたルールです。","c":1,"e":"個別の症状は軽くても、短期間（30日以内）に集中して発生している場合は、製造工程の異常や成分の変異が疑われるため、速やかな届出が必要です。"},{"m":16,"q":"消費者からの問い合わせを精査し、健康被害の兆候を常に監視する主たる「責務」を負っているのは誰ですか？","o":["製造工場の作業員","表示責任者（販売者等）","運送会社","原材料の輸入業者"],"h":"消費者と直接つながり、製品のラベルに名前が載っている組織です。","c":1,"e":"表示責任者は市場の窓口として、収集した情報を「単なる苦情」で終わらせず、健康被害の可能性を科学的に分析する一義的な責任があります。"},{"m":16,"q":"具体例①において、A社が下痢の訴えを「義務対象」と判断できた決め手は何でしたか？","o":["顧客が怒っていたから","「健康被害情報提供票」による整理番号管理で、2週間以内に3件の類似症例を見つけたから","ニュースで見たから","勘"],"h":"情報を「整理番号」で管理し、時系列と症状で分析しました。","c":1,"e":"「30日ルール」を運用するには、情報を個別に放置せず、データベース化して傾向を把握する体制が不可欠です。"},{"m":16,"q":"健康被害情報の届出や、それに伴う製品回収（リコール）の最終的な意思決定を下す責任者は誰ですか？","o":["品質管理課長","総括責任者","営業担当者","外部のコンサルタント"],"h":"製造・品質・販売の全情報を集約し、経営判断を行うGMP三役の一人です。","c":1,"e":"総括責任者は食品衛生法第58条に基づき、行政への迅速な報告と適切な措置（回収等）を管理監督する重い公的責任を負っています。"},{"m":16,"q":"健康被害情報を収集する際に活用すべき、標準的な報告様式の名称は何ですか？","o":["苦情受付メモ","健康食品との関連が疑われる健康被害情報提供票","返品依頼書","アンケートハガキ"],"h":"摂取状況、併用薬、医師の診断結果などを網羅的に記録する公的なフォーマットです。","c":1,"e":"この様式に沿って情報を集めることで、行政や専門家が「製品と症状の因果関係」を正しく評価できるようになります。"},{"m":16,"q":"具体例②のB工場が消費者庁から指摘された「連携不足」とは、どのような内容でしたか？","o":["挨拶が足りなかった","表示責任者と製造所の間で、情報の共有方法やSOP（標準作業手順書）が整備されていなかった","電話機が古かった","仲が悪かった"],"h":"情報の伝達が遅れ、行政への届出までに「空白の時間」が生じてしまいました。","c":1,"e":"製造委託の場合、販売者と製造所が別組織であるため、あらかじめ「24時間以内の相互連絡」などを契約やSOPで定めておくことが適合の必須条件です。"},{"m":16,"q":"健康被害情報の報告を迅速に行うことが、企業にとってどのようなメリットになると述べていましたか？","o":["恥ずかしい思いをせずに済む","被害の拡大を防ぎ、結果として自社のブランドと消費者の命を守る「責任ある企業の証」となる","宣伝になる","罰金が安くなる"],"h":"「情報を隠さないこと」が、最終的なダメージを最小限に抑えます。","c":1,"e":"透明性の高い対応は、万が一の事態において行政や消費者からの信頼を維持し、企業の社会的責任（CSR）を果たすことにつながります。"},{"m":16,"q":"明日から実務にあたる際、消費者からの「体調不良」の声に対して持つべき正しい姿勢はどれですか？","o":["「サプリによくある体質の問題」として聞き流す","「健康被害の兆候かもしれない」と緊張感を持ち、直ちに情報提供票を作成して組織内で共有する","クレーマーだと思って警戒する","記録に残さない"],"h":"「逸脱」と同様、悪い情報こそが「改善」と「事故防止」の鍵です。","c":1,"e":"「おや？」という小さな気づきを逃さない感受性と、それを迅速に報告する仕組みこそが、GMPにおける安全管理の真髄です。"},{"m":17,"q":"GMPにおける「自己点検（内部監査）」の本来の目的として、最も適切なものはどれですか？","o":["従業員のミスを見つけて罰すること","製造・品質管理の状況を自ら点検し、不備を早期に発見・改善すること","審査員に見せるためだけに書類を埋めること","掃除の手間を省くこと"],"h":"外部から指摘される前に、自分たちで「弱点」を見つけて直す活動です。","c":1,"e":"自己点検は、組織が定めたルール（SOP）が守られているか、設備に劣化がないかを定期的に確認し、継続的に品質を向上させるための「健康診断」です。"},{"m":17,"q":"自己点検を実施する際、客観性を確保するために推奨される「担当者の選定」ルールは何ですか？","o":["自分が毎日行っている業務を自分で点検する","原則として、自らが従事している業務以外の点検を担当する（第三者性）","新入社員だけに任せる","外部の業者に丸投げし、自社では何もしない"],"h":"「自分のミス」は自分では気づきにくい、という人間心理に基づいたルールです。","c":1,"e":"他部署の視点（クロス監査）を取り入れることで、慣れによる「見逃し」を防ぎ、より厳しい基準でチェックが可能になります。"},{"m":17,"q":"自己点検表を記入する際、審査対策として最も重要な「記載内容」は何ですか？","o":["「適合」というチェックマークのみ","判断の根拠となった「客観的な事実（確認したロット番号や設備の状態等）」","担当者の感想","綺麗な字で書くことだけ"],"h":"審査員は「なぜ適合と判断したのか」というエビデンス（証拠）を見ます。","c":1,"e":"単なるチェックだけでなく、「〇月〇日の製造記録5枚を確認し、空欄がないことを確かめた」といった具体的な事実を併記することで、点検の信頼性が飛躍的に高まります。"},{"m":17,"q":"自己点検の結果、改善が必要な事項が発見された場合、誰に対して「文書」で報告しなければなりませんか？","o":["同僚","総括責任者","近所の保健所","家族"],"h":"製造所全体を統括し、資源（予算や人員）の投入を判断できる責任者です。","c":1,"e":"自己点検の結果を総括責任者に報告し、そこからの指示（改善命令）を受けるという流れが、組織的なGMP運用の必須条件です。"},{"m":17,"q":"具体例①のC社において、「形だけの点検」から脱却するために追加した確認基準は何ですか？","o":["記録の有無だけを確認する","記録の「ALCOA+（同時性・正確性など）」が守られているかという具体的な内容確認","ペンの色を確認する","紙の厚さを測る"],"h":"「書いてあるか」ではなく「正しく書かれているか」に踏み込みました。","c":1,"e":"記録の信頼性（データインテグリティ）を点検項目に盛り込むことで、文書管理の形骸化を防ぎ、実質的な品質保証レベルを引き上げることができます。"},{"m":17,"q":"具体例②のD工場のように、ハード面（設備の劣化等）の不備を発見した際の正しい対応はどれですか？","o":["審査で見つからないように隠す","「不適合」として報告し、原因分析と計画的な「改善報告書（是正計画）」を作成する","予算がないので無視する","誰のせいか犯人探しをする"],"h":"「不備を放置したり隠したりすること」がGMP上の最大のリスクです。","c":1,"e":"自ら不備を認め、完了までの暫定処置を含めた「改善計画」を提示することは、管理能力が高い証拠として、むしろ審査員から高く評価されます。"},{"m":17,"q":"自己点検で見つかった不備に対して講じる「措置」として、適切なものはどれですか？","o":["壊れた箇所の修理","手順書の改訂","関係者への教育訓練","上記すべて"],"h":"「その場しのぎ」ではなく、再発させないための多角的な対策が必要です。","c":3,"e":"物理的な修正（修理）だけでなく、なぜ起きたかの原因究明に基づき、ルール（手順書）の見直しや人の意識向上（教育）をセットで行うのがGMPの基本です。"},{"m":17,"q":"自己点検の結果や改善措置の記録（報告書、写真、教育記録等）は、どのくらいの期間保管する必要がありますか？","o":["1ヶ月","1年","作成から3年間（または賞味期限＋1年間の長い方）","10年"],"h":"他のGMP重要記録（第7回参照）と同じ、法的に定められた期間です。","c":2,"e":"改善のプロセス自体が企業の「品質向上への努力」の証明です。次回の更新審査でも確認されるため、適切に保管しなければなりません。"},{"m":17,"q":"本研修の例え話として、自己点検を何に例えていましたか？","o":["豪華なフルコースのメニュー","スポーツチームの「練習試合後のビデオ分析」","終わりなき旅","秘密の暗号"],"h":"ミスをスロー再生で確認し、修正練習（改善）を繰り返すイメージです。","c":1,"e":"自分たちの動きを客観的に分析し、具体的な修正を行う。この地道な繰り返しが、本番の審査（試合）での合格を勝ち取る唯一の方法です。"},{"m":17,"q":"全18回の研修を終え、明日から現場で「自己点検」に向き合う際に持つべき最も大切なマインドセットはどれですか？","o":["「不適合」が見つからないように祈る","「不備を見つけることこそが成果である」と考え、積極的に弱点を探し改善に繋げる","自分の仕事だけ完璧なら良いと考える","ルールは最小限に守れば良い"],"h":"「粗探し」を歓迎する文化が、組織を強くします。","c":1,"e":"自己点検で問題が出るのは、組織が健全に機能している証拠です。隠蔽せず、事実を直視し、一歩ずつ改善を積み重ねることが、消費者の信頼に応える最善の道です。"},{"m":18,"q":"GMP適合認定を新規に申請する際、あらかじめ「GMP基準に沿った管理」を行ってきた実績として、最低限必要な期間はどれくらいですか？","o":["1週間","1ヶ月","3ヶ月程度","3年"],"h":"「書類を作った」だけでなく、実際にそのルールで運用した証拠（記録）が溜まっている必要があります。","c":2,"e":"申請の前提条件として、3ヶ月程度の運用実績が求められます。この期間の製造記録や衛生管理記録が、審査における「実態の証拠」となります。"},{"m":18,"q":"認定申請から最終的な認定（証書の授与）までには、通常どのくらいの期間を要しますか？","o":["1週間","1ヶ月","6ヶ月〜1年","5年"],"h":"書類調査、実地調査、そしてそれぞれの「指摘事項への改善」を挟むため、時間がかかります。","c":2,"e":"審査は慎重に行われます。不備が見つかり改善報告を行う期間も含めると、半年から1年を見込んで計画的に準備する必要があります。"},{"m":18,"q":"書類調査（ソフトGMPの審査）において、審査員が最も厳しくチェックするポイントは何ですか？","o":["書類の厚み（枚数）","文字の綺麗さ","「ガイドラインのコピペ」ではなく、自社の実務運用に見合った内容になっているか","バインダーの色"],"h":"具体例①のM社は、他社のマニュアルを写したために「実態との乖離」を指摘されました。","c":2,"e":"「自社にない設備」や「できないルール」が書かれた手順書は、運用されていないと見なされます。身の丈に合った、実行可能なルールであることが重要です。"},{"m":18,"q":"実地調査（プラントツアー）の際、2〜3名の調査員が現場で主に確認する「ハード面」の重要ポイントは何ですか？","o":["食堂のメニュー","清浄度区分、人・物の動線、識別表示（ステータスラベル）の状態","応接室の豪華さ","駐車場の広さ"],"h":"「交叉汚染（コンタミネーション）」や「取り違え」が起きない構造になっているかを見ます。","c":1,"e":"特に「動線の分離」は重要です。人と物がぶつかっていないか、清潔な区域に汚い物が入り込んでいないかが、這うような目線でチェックされます。"},{"m":18,"q":"具体例②のN工場において、プラントツアー中に指摘された「動線の罠」とはどのような内容でしたか？","o":["廊下が長すぎた","包装室へ向かう際、区分外の一般通路を数歩だけ踏んでいた","階段が急だった","窓がなかった"],"h":"「数歩だけ」であっても、清浄度の低い場所を通ることは汚染のリスクと見なされます。","c":1,"e":"「最短ルートだから」という理由で、清浄度の異なる区域を不用意に行き来することは、GMPの動線設計（第13回参照）において厳禁です。"},{"m":18,"q":"調査で不備（指摘事項）が見つかった際、提出を求められる報告書の名称は何ですか？","o":["反省文","改善報告書（様式第11号など）","始末書","請求書"],"h":"「いつ、誰が、何を、どう直すか」を論理的に説明する書類です。","c":1,"e":"指摘を受けたこと自体で不合格になるわけではありません。その指摘に対して「どう誠実かつ具体的に改善するか」を示すことが、合格への鍵となります。"},{"m":18,"q":"認定審査をスムーズに進めるために、申請前に自社で必ず実施しておくべき活動は何ですか？","o":["大掃除","自己点検（内部監査）と「事前チェックリスト」による整合性の確認","審査員への接待","広告の自粛"],"h":"ヒントはありません","c":0,"e":"2\n解説｜自ら不備を見つけ、先に直しておく（第18回参照）ことが、本番の調査での指摘を最小限にする最大の防策です。"},{"m":18,"q":"一度取得したGMP適合認定の「有効期間」は何年ですか？","o":["1年","3年","10年","無期限"],"h":"3年ごとに「更新審査」を受け、管理体制が維持されていることを証明し続けなければなりません。","c":1,"e":"認定は取って終わりではありません。3年ごとの更新があるからこそ、緊張感を持ってQMS（品質マネジメントシステム）を回し続ける動機になります。"},{"m":18,"q":"本研修の例え話として、GMP認定審査を何に例えていましたか？","o":["豪華なフルコースの試食","「レストランの格付け調査（ミシュランガイド）」","終わりなき旅","秘密の暗号"],"h":"メニュー（手順書）と厨房（現場）の整合性、店長（責任者）のこだわりが問われるという例えです。","c":1,"e":"現場での「正しい調理（製造）」が日常的に行われているか。そのありのままの姿を科学的・論理的に証明するのが認定審査の本質です。"},{"m":18,"q":"全19回の研修を終えて、あなたがこれから「GMP推進のリーダー」として現場に伝えるべき最も大切なメッセージは何ですか？","o":["審査の時だけしっかりやろう","難しい書類をたくさん作ろう","「決められたことを、決められた通りに行い、それを正しく記録する」という当たり前の積み重ねが、会社とお客様を守る","自分のやり方で自由に作ろう"],"h":"GMPは「人・物・設備・情報」のすべてを標準化し、信頼を築く活動です。","c":2,"e":"GMPは「特別な魔法」ではありません。日々の誠実な実務の積み重ねこそが、最高品質の証であり、認定という「星」を勝ち取る唯一の道です。"},{"m":19,"q":"GMP適合認定を受けた「製造施設（工場）」が、自社のホームページや名刺に使用できるマークの名称は何ですか？","o":["GMP製品マーク","GMP工場マーク（認定工場マーク）","エコマーク","門外不出マーク"],"h":"「この施設はGMP基準で管理されています」という場所に対する証明です。","c":1,"e":"認定工場マークは、あくまで「施設」の認定を示すものです。会社案内やパンフレット、名刺などで企業の姿勢をアピールするために使用されます。"},{"m":19,"q":"「GMP工場マーク」の使用において、絶対にやってはいけない禁止事項はどれですか？","o":["名刺に印刷する","ホームページに掲載する","製品のパッケージや容器に直接表示する","工場の玄関に掲示する"],"h":"具体例①の広報担当者Aさんが勘違いしたポイントです。","c":2,"e":"工場が認定されていても、それだけで製品にマークを貼ることはできません。製品への表示には、別途「製品マーク」の申請と承認が必要です。"},{"m":19,"q":"個別の「製品」のパッケージにGMPマークを表示したい場合、どのような手続きが必要ですか？","o":["認定工場で作っていれば勝手に貼って良い","製品ごとに表示承認申請を行い、日健栄協等の承認（承認番号の発行）を受ける","社長が許可すれば良い","役所に電話するだけで良い"],"h":"原材料の入荷から出荷まで、全ての工程が認定工場で行われていることを製品ごとに審査されます。","c":1,"e":"表示責任者（販売者）が主体となり、製品ごとに審査を受ける必要があります。承認されると、その製品固有の承認番号が付与されます。"},{"m":19,"q":"印刷物において、GMPマークの視認性を確保するために定められている「最小幅」はどれくらいですか？","o":["1mm","5mm","1","5mm"],"h":"小さすぎて読めない表示は、消費者を誤認させる恐れがあるため制限があります。","c":2,"e":"マークの権威と視認性を守るため、最小サイズが規定されています。これより小さく表示することはルール違反となります。"},{"m":19,"q":"GMPマークのデザインルールにおいて、原則として認められている「色」はどれですか？","o":["金色のグラデーション","虹色","黒または単色（100%）","好きな色で良い"],"h":"具体例②のY社が「豪華に見せよう」として失敗したポイントです。","c":2,"e":"マークのアイデンティティを保つため、色の変更や装飾は禁止されています。背景色に合わせて見やすい単色で表示するのが基本です。"},{"m":19,"q":"ロゴの独立性を保つために、マークの周囲に設けるべき「他の文字や図形を配置してはいけないエリア」を何と呼びますか？","o":["デッドスペース","保護エリア（アイソレーション）","立ち入り禁止区域","余白なし"],"h":"マークの文字「H（高さ）」を基準にした一定の隙間が必要です。","c":1,"e":"他のキャッチコピーやイラストと密着させると、マークの判読性が損なわれます。一定の余白を確保することがデザイン規約で定められています。"},{"m":19,"q":"認定を辞退したり、取り消されたりした場合のマークの扱いはどうなりますか？","o":["在庫がなくなるまで使って良い","直ちに使用を中止しなければならない","1年間の猶予がある","隠して使い続ける"],"h":"「認定されている」という事実がないのにマークを掲げることは、虚偽の表示になります。","c":1,"e":"認定の効力が失われた瞬間から、そのマークを使用する権利はなくなります。速やかに削除・廃棄の対応が必要です。"},{"m":19,"q":"具体例②において、デザイナーがマークの周囲にキャッチコピーを密着させたことが不備とされた理由は何ですか？","o":["字が多すぎたから","「保護エリア」の確保というルールを無視し、マークの独立性を損なったから","デザイナーのセンスが悪かったから","インクがもったいなかったから"],"h":"マークは独立したシンボルとして正しく見えなければなりません。","c":1,"e":"GMPマークは「企業のロゴの一部」ではなく、第三者機関による「公的な認定証」です。そのため、規定された余白ルールを厳守しなければなりません。"},{"m":19,"q":"本研修の例え話として、GMPマークの運用を何に例えていましたか？","o":["レストランのメニュー","「オリンピックの五輪マーク」","終わりなき旅","秘密の暗号"],"h":"開催都市（工場）と、そこで売られる土産物（製品）の区別についての例えです。","c":1,"e":"五輪マークの例えは、主催者の権威を守るための厳しいデザイン管理と、使用範囲（場所なのか物なのか）の区別の重要性を分かりやすく示しています。"},{"m":19,"q":"全20回の研修を終えて、今後GMPマークを自社製品に使用する際、最も大切にすべき考え方はどれですか？","o":["目立てば何でも良い","「品質のシンボル」としての重みを理解し、規約（マニュアル）を正しく遵守して活用する","申請が面倒なので後回しにする","自分の好きなようにデザインをアレンジする"],"h":"マークは業界全体の「信頼のブランド」です。","c":1,"e":"マークを表示することは、その品質に責任を持つという宣言です。正しい表示ルールを守ること自体が、貴社のコンプライアンス（法令遵守）姿勢の証明になります。"},{"m":20,"q":"サプリメントなどの製造において、GMP（適正製造規範）を導入する最大の目的は何ですか？","o":["従業員の作業を増やすこと","「人為的な誤り」「汚染・品質低下」を防ぎ、「一定の品質」を確保すること","広告のキャッチコピーを作ること","掃除を早く終わらせること"],"h":"GMPの三原則そのものが答えです。","c":1,"e":"サプリメントは見た目では品質が分かりにくいため、製造の「プロセス」そのものを標準化し、誰が作っても安全で高品質な製品ができる仕組みを作ることが目的です。"},{"m":20,"q":"GMP運用において、製造所に置かなければならない「三役」の正しい組み合わせはどれですか？","o":["会長・社長・専務","総括責任者・製造管理責任者・品質管理責任者","営業部長・工場長・経理課長","料理長・ホール係・洗い場担当"],"h":"全体を統括する人、作る人、検査する人の3名です。","c":1,"e":"この三役がそれぞれの役割を果たすことで、組織的なチェック機能（ガバナンス）が働きます。"},{"m":20,"q":"中小規模の製造所において認められている「兼務」のルールとして、正しいものはどれですか？","o":["製造管理責任者が品質管理責任者を兼ねる","総括責任者が品質管理責任者を兼ねる","全員がすべての役職を兼ねる","兼務は一切認められない"],"h":"「作る人」と「チェックする人」は分けなければなりませんが、経営者とチェック役は兼ねられます。","c":1,"e":"客観性を保つため、「製造（作る）」と「品質（検査）」の責任者は別人である必要がありますが、総括と品質の兼務はリソースの限られた中小企業でよく活用される手法です。"},{"m":20,"q":"責任者に選任される人物として、ガイドライン上で「望ましい」とされている実務経験の年数は何年ですか？","o":["1年","3年","5年以上","20年"],"h":"この研修では「数字は能力の目安」とありましたが、一般的な推奨ラインがあります。","c":2,"e":"5年以上が望ましいとされていますが、経営者が「適切に実施しうる能力がある」と判断し、教育訓練で補完すれば、年数に関わらず任命可能です。"},{"m":20,"q":"製品ごとに成分、製造手順、規格などを記載した、いわば「製品の設計図」にあたる文書を何と呼びますか？","o":["GMP管理規則","製品標準書","出勤簿","会社案内"],"h":"この文書がすべての製造指図の根拠となります。","c":1,"e":"製品標準書が正しく整備されていないと、現場での「正しい作り方」が定まらず、品質がバラつく原因になります。"},{"m":20,"q":"GMPの記録管理において、「記録がない＝実施していない」とみなされる厳しい原則の一部で、作業と同時に記録することを何と呼びますか？","o":["帰属性","正確性","同時性（Contemporaneous）","耐久性"],"h":"具体例②のF社が、後でまとめて書いていた習慣を改善したポイントです。","c":2,"e":"「同時性」を守ることで、記憶の曖昧さや意図的な書き換えを排除し、事実に基づいた信頼性の高い記録（ALCOA+）が担保されます。"},{"m":20,"q":"具体例①のE社において、社長が自ら「総括・品質管理責任者」に就任したことで起きた現場の変化は何ですか？","o":["給料が上がった","現場の意識が「社長に言われたから」から「ルールに従って確認する」に変わった","掃除が楽しくなった","休みが増えた"],"h":"「役割」を文書で定義し、責任の所在を明確にした効果です。","c":1,"e":"組織図と権限を明確にすることで、属人的な指示ではなく、システム（GMP）に基づいた自律的な品質管理が始まります。"},{"m":20,"q":"具体例②のF社において、天秤で材料を測った直後にその場で記録することを徹底した結果、どのようなメリットがありましたか？","o":["字が綺麗になった","ミスが隠れることがなくなり、異常をその場で発見できるようになった","ペンの消費が減った","作業時間が短縮された"],"h":"「記憶」に頼るリスクを排除した結果です。","c":1,"e":"リアルタイムの記録は、万が一の「逸脱」を早期に発見し、被害を最小限に抑えるための最強のツールになります。"},{"m":20,"q":"この研修のまとめとして、GMPの導入をどのような成長プロセスに例えていましたか？","o":["豪華なフルコース","「個人レストランが、セントラルキッチンに成長するプロセス」","終わりなき旅","秘密の暗号"],"h":"店主の目が行き届かなくても、同じ品質（味）を再現する仕組み作りの例えです。","c":1,"e":"秘伝のレシピを公開（文書化）し、味見役を決める（組織化）ことで、組織としての「信頼」を全国へ広げられるようになります。"},{"m":20,"q":"明日から職場で「GMP導入」に向けて取り組む際、最も大切にすべき姿勢はどれですか？","o":["難しい言葉をたくさん使う","完璧な書類ができるまで作業を始めない","「まずヒト（役割）を決め、手順を紙に書き、その場で記録する」という基本を徹底する","審査の時だけ取り繕う"],"h":"「最小限の労力」で「確実」に進めるための3つのポイントを思い出してください。","c":2,"e":"身の丈に合った「生きたルール」を作り、それを誠実に記録し続けること。これこそが、認定取得への最短にして唯一の王道です。"},{"m":21,"q":"GMPにおける「清浄度区分（ゾーニング）」において、原材料の秤量や製品の充填を行う、最も清潔さが求められる場所はどこに該当しますか？","o":["区分1（清潔）","区分2（準清潔）","区分3（一般）","区分外"],"h":"製品が露出する、工場の「心臓部」です。","c":0,"e":"区分1は、製品に直接触れる工程が行われるため、最も厳格な衛生管理と、他の区域からの物理的な隔離が必要です。"},{"m":21,"q":"異なる清浄度区分の間を移動する際、汚染された空気が直接入り込むのを防ぐために設置する「緩衝用の小部屋」を何と呼びますか？","o":["会議室","前室（PR）やパスボックス（PB）","休憩所","食堂"],"h":"扉1枚で直接つなげず、一度「溜まり」を作る場所です。","c":1,"e":"前室を設けることで、気圧差を利用したり、外気の侵入をブロックしたりして、清潔な区域の環境を保護します。"},{"m":21,"q":"GMPにおける「動線（どうせん）」の考え方として、不適切なものはどれですか？","o":["人と物の動きが交叉（交差）しないようにする","作業室を、他の部屋へ行くための「通路」として利用する","原材料の搬入ルートを明確に分ける","更衣室は「脱衣から着衣まで」の一方通行にする"],"h":"具体例①のG社が、廊下をテープで色分けして改善したポイントです。","c":1,"e":"作業室を通路にすると、不必要な人の出入りにより塵埃や微生物が持ち込まれるリスクが高まるため、GMPでは厳禁とされています。"},{"m":21,"q":"認定申請を行うために必要な、GMPに基づいた管理の「運用実績」はどのくらいの期間ですか？","o":["1週間","1ヶ月","3ヶ月程度","1年"],"h":"前編でも登場した、認定の前提条件となる期間です。","c":2,"e":"「ルールを決めた」だけでなく、実際にそのルールで運用し、記録（エビデンス）が3ヶ月分溜まっていることが、実態を証明するために必要です。"},{"m":21,"q":"具体例①のG社が、古い建物の構造的な欠陥（動線の未分離）を克服するために行った工夫は何ですか？","o":["建物をすべて壊して建て直した","床のライン（テープ）による視覚的な分離やパーティションによる区画化","審査員に内緒にした","24時間営業をやめた"],"h":"「ハードの不備をソフト（ルール）と視覚化で補う」手法です。","c":1,"e":"物理的な壁がなくても、床の色分けや明確なルール掲示によって「管理されている」と認められれば、認定取得は十分に可能です。"},{"m":21,"q":"更衣室の構造において、汚染を防ぐために理想とされる「一方通行（ワンウェイ）」の正しい流れはどれですか？","o":["着衣 → 脱衣 → 手洗い","入口 → 脱衣 → 着衣 → 手洗い・消毒 → 毛髪除去 → 入室","入口 → 入室 → 後で着替え","好きな順番で良い"],"h":"「脱いだ服の汚れ」を「これから着る服」に付けないための流れです。","c":1,"e":"一方通行にすることで、私服からの汚染を清潔な作業着に持ち込むリスクを最小限に抑えます。"},{"m":21,"q":"認定審査の実地調査（プラントツアー）で、調査員が最も重視しているポイントは何ですか？","o":["工場の外観が美しいこと","「決めたルール（手順書）」が「実際の現場（設備・行動）」でその通りに行われているかという整合性","従業員の挨拶の声の大きさ","事務所の椅子の座り心地"],"h":"「書類（ソフト）」と「現場（ハード）」が一致しているかを見ます。","c":1,"e":"立派なマニュアルがあっても、現場がその通りに動いていなければ、それは「偽りの管理」と見なされます。"},{"m":21,"q":"具体例②のH社のように、調査員から不備を指摘された際の「正しい姿勢」はどれですか？","o":["その場で必死に言い訳をする","指摘を真摯に受け止め、迅速に「改善報告書」を作成し、具体的な再発防止策を提示する","指摘した調査員を無視する","改善せずに放置する"],"h":"「不備が見つかった時に自らどう動ける組織か」が試されています。","c":1,"e":"「指摘は宝」です。不備を認め、すぐに仕組み（SOPの改訂など）でカバーするスピード感が、組織の自浄作用として高く評価されます。"},{"m":21,"q":"不備を改善したことを報告する際、言葉だけでなく何を用意すると審査員に納得感を与えられますか？","o":["証拠写真（改善前と後の比較写真）や改訂した手順書の写し","菓子折り","誓約書","誰かのサイン"],"h":"「本当に直した」ことを客観的に証明するための材料です。","c":0,"e":"写真は最強の証拠です。改善後の様子を可視化することで、審査会での承認がスムーズになります。"},{"m":21,"q":"本研修のまとめとして、認定取得の唯一の道は何であると述べていましたか？","o":["運に任せること","難しい専門用語を覚えること","日々の「正しい製造・管理」の積み重ねを、ありのままに証明すること","審査の時だけ取り繕うこと"],"h":"「格付け」を得るための王道は、日々の実務にあります。","c":2,"e":"GMP認定は「魔法の杖」ではなく、誠実なモノづくりの「卒業証書」のようなものです。日々の記録の一つひとつが、認定というゴールに繋がっています。"},{"m":22,"q":"2025年版ガイドライン（311通知）において、品質部門の中に新たに定義された機能は何ですか？","o":["営業推進","品質確認（承認・確認を行う組織）","設備メンテナンス","広告審査"],"h":"「製造部門から独立」して、客観的な判断を下す組織です。","c":1,"e":"従来の品質管理（試験検査など）に加え、その結果や製造記録を客観的に精査し、承認・確認を行う「品質確認」機能が新設されました。"},{"m":22,"q":"品質確認責任者の「5大業務」に含まれないものはどれですか？","o":["製品標準書を承認する","製品の出荷の可否を確認する","製造手順等の変更を承認する","原材料の安値を交渉し購入する"],"h":"品質の「番人」としての承認・確認業務が主です。","c":3,"e":"購買業務は製造管理や購買部門の仕事です。品質確認責任者は、標準書、出荷可否、変更管理、逸脱評価、品質情報措置の5項目に責任を持ちます。"},{"m":22,"q":"品質確認責任者の「独立性」を守るための兼務ルールとして、禁止されている組み合わせはどれですか？","o":["総括責任者が品質確認責任者を兼ねる","製造 var QD=QUIZ_DATA,L=['A','B','C','D'];
var P=new URLSearchParams(location.search);
var modIdx=P.has('m')?parseInt(P.get('m')):null;
var allMode=P.has('all');
var showVideo=allMode||modIdx!==null;
var showCourse=P.get('course')==='1'||modIdx===null||allMode;
var mode=null;

// Build tabs
var tabs=document.getElementById('tabs');
if(allMode){
  tabs.innerHTML='<button class="tb t-video on" onclick="switchTab(\'select\')">\ud83d\udcfa 動画別テスト</button><button class="tb t-course" onclick="switchTab(\'course\')">\ud83d\udccb コース全体テスト</button>';
  // Build module list
  var ml=document.getElementById('modList');
  var qc=[10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10];
  QD.titles.forEach(function(t,i){
    var d=document.createElement('div');d.className='mc';
    d.innerHTML='<span class="mn">'+(i+1)+'</span><span class="mdiv"></span><div><span class="mt">'+t+'</span><div class="mt2">'+qc[i]+'問</div></div><span class="marr">→</span>';
    d.onclick=function(){pickMod(i)};
    ml.appendChild(d);
  });
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelCourse').style.display='none';
}else if(showVideo&&showCourse){
  tabs.innerHTML='<button class="tb t-video on" onclick="switchTab(\'video\')">\ud83d\udcfa この動画の確認テスト</button><button class="tb t-course" onclick="switchTab(\'course\')">\ud83d\udccb コース全体テスト</button>';
}else{tabs.style.display='none'}

// Init (non-all mode)
if(!allMode&&showVideo){
  document.getElementById('svTitle').textContent=QD.titles[modIdx]+' 確認テスト';
  var mc=QD.questions.filter(function(q){return q.m===modIdx}).length;
  document.getElementById('svCount').textContent=mc;
  document.getElementById('panelVideo').style.display='block';
}
if(!allMode&&showCourse){
  document.getElementById('panelCourse').style.display=showVideo?'none':'block';
}
if(!allMode&&!showVideo&&showCourse)document.getElementById('panelCourse').style.display='block';

// All-mode: pick a module
window.pickMod=function(idx){
  modIdx=idx;
  document.getElementById('panelSelect').style.display='none';
  document.getElementById('svTitle').textContent=QD.titles[idx]+' 確認テスト';
  var mc=QD.questions.filter(function(q){return q.m===idx}).length;
  document.getElementById('svCount').textContent=mc;
  document.getElementById('panelVideo').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

function switchTab(t){
  document.querySelectorAll('.tb').forEach(function(b){
    var isMatch=(t==='select'&&b.classList.contains('t-video'))||b.classList.contains('t-'+t);
    b.classList.toggle('on',isMatch);
  });
  var ps=document.getElementById('panelSelect');
  if(t==='select'){
    if(ps)ps.style.display='block';
    document.getElementById('panelVideo').style.display='none';
  }else if(t==='video'){
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='block';
  }else{
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='none';
  }
  document.getElementById('panelCourse').style.display=t==='course'?'block':'none';
}

// Quiz engine
var quizzes={video:{qs:[],ci:0,sc:0,ans:[]},course:{qs:[],ci:0,sc:0,ans:[]}};

window.go=function(m){
  mode=m;var qz=quizzes[m];qz.ci=0;qz.sc=0;qz.ans=[];
  if(m==='video'){
    qz.qs=QD.questions.filter(function(q){return q.m===modIdx});
    for(var i=qz.qs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=qz.qs[i];qz.qs[i]=qz.qs[j];qz.qs[j]=t}
  }else{
    var pool=[].concat(QD.questions),sel=[];
    var totalPool=pool.length,targetQ=Math.min(23,totalPool);
    for(var mm=0;mm<23;mm++){var mq=pool.filter(function(q){return q.m===mm});if(mq.length>0)sel.push(mq[Math.floor(Math.random()*mq.length)])}
    var rem=pool.filter(function(q){return sel.indexOf(q)<0});
    var extrasNeeded=targetQ-sel.length;
    for(var i=0;i<extrasNeeded;i++){var p=rem.splice(Math.floor(Math.random()*rem.length),1)[0];if(p)sel.push(p)}
    for(var i=sel.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sel[i];sel[i]=sel[j];sel[j]=t}
    qz.qs=sel;
  }
  g('start'+(m==='video'?'Video':'Course')).style.display='none';
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.style.display='block';
  showQ(m);qEl.scrollIntoView({behavior:'smooth'});
};

function g(id){return document.getElementById(id)}

function showQ(m){
  var qz=quizzes[m],q=qz.qs[qz.ci],total=qz.qs.length;
  var cls=m==='video'?'c-video':'c-course';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.innerHTML='<div class="pg"><div class="pgb"><div class="pgf '+cls+'" style="width:'+((qz.ci/total)*100)+'%"></div></div><div class="pgc">'+(qz.ci+1)+' / '+total+'</div></div>'
    +'<div class="qm">\ud83d\udcd8 '+QD.titles[q.m]+'</div>'
    +'<div class="qt">'+q.q+'</div>'
    +(q.h?'<button class="hb" onclick="tH(\''+m+'\')">\ud83d\udca1 ヒントを見る</button><div class="hi" id="hi_'+m+'">'+q.h+'</div>':'')
    +'<div class="os" id="os_'+m+'"></div>'
    +'<div class="ex" id="ex_'+m+'"></div>'
    +'<button class="nx '+cls+'" id="nx_'+m+'" onclick="nxt(\''+m+'\')">'+(qz.ci<total-1?'次の問題へ →':'結果を見る →')+'</button>';
  var os=g('os_'+m);
  q.o.forEach(function(opt,i){
    var d=document.createElement('div');d.className='o';
    d.innerHTML='<span class="ol">'+L[i]+'</span><span>'+opt+'</span>';
    d.onclick=function(){sel(m,i)};os.appendChild(d);
  });
}

window.sel=function(m,idx){
  var qz=quizzes[m],q=qz.qs[qz.ci];
  var opts=g('os_'+m).querySelectorAll('.o');
  if(opts[0].classList.contains('lk'))return;
  opts.forEach(function(o){o.classList.add('lk')});
  var ok=idx===q.c;if(ok)qz.sc++;
  qz.ans.push({q:q,sel:idx,ok:ok});
  opts[q.c].classList.add('ok');
  if(!ok)opts[idx].classList.add('ng');
  var e=g('ex_'+m);e.textContent=(ok?'\u2705 正解！ ':'\u274c 不正解… ')+q.e;e.style.display='block';
  g('nx_'+m).style.display='inline-block';
};

window.tH=function(m){var h=g('hi_'+m);h.style.display=h.style.display==='none'?'block':'none'};

window.nxt=function(m){
  var qz=quizzes[m];qz.ci++;
  if(qz.ci<qz.qs.length){showQ(m);g('q'+(m==='video'?'Video':'Course')).scrollIntoView({behavior:'smooth'})}
  else showResult(m);
};

function showResult(m){
  var qz=quizzes[m];
  g('q'+(m==='video'?'Video':'Course')).style.display='none';
  var rEl=g('r'+(m==='video'?'Video':'Course'));rEl.style.display='block';
  var pct=Math.round(qz.sc/qz.qs.length*100),pass=m==='video'?pct>=70:pct>=80;
  var rank,rc;
  if(pct>=95){rank='S';rc='#d4a017'}else if(pct>=85){rank='A';rc='#22c55e'}else if(pct>=75){rank='B';rc='#3b82f6'}else if(pct>=60){rank='C';rc='#f59e0b'}else{rank='D';rc='#ef4444'}
  var wrongs=qz.ans.filter(function(a){return!a.ok});
  var h='<div class="rc '+(pass?'ps':'fl')+'">'
    +'<div class="rk" style="color:'+rc+'">'+rank+'</div>'
    +'<div class="rs">'+pct+'%</div>'
    +'<div class="rd">'+qz.qs.length+'問中 '+qz.sc+'問正解</div>'
    +(pass?'<div class="rpm">\ud83c\udf89 '+(m==='video'?'よくできました！':'合格おめでとうございます！')+'</div>':'<div class="rfm">'+(m==='video'?'もう一度動画を見て再挑戦してみましょう。':'合格基準（80%）に届きませんでした。動画を復習して再挑戦してみましょう。')+'</div>')
    +'<button class="B '+(m==='video'?'bg':'bo')+'" onclick="retry(\''+m+'\')" style="margin-top:10px">もう一度受ける</button></div>';
  if(wrongs.length>0){
    h+='<div class="rvt">間違えた問題の復習</div>';
    wrongs.forEach(function(w){
      h+='<div class="rvi"><div class="qm" style="margin-bottom:4px">\ud83d\udcd8 '+QD.titles[w.q.m]+'</div>'
        +'<div class="rvq">'+w.q.q+'</div>'
        +'<div class="rvy">\u2717 あなたの回答：'+L[w.sel]+'. '+w.q.o[w.sel]+'</div>'
        +'<div class="rvc">\u25cb 正解：'+L[w.q.c]+'. '+w.q.o[w.q.c]+'</div>'
        +'<div class="rve">\ud83d\udca1 '+w.q.e+'</div></div>';
    });
  }else{h+='<div style="text-align:center;color:#22c55e;font-weight:700;font-size:16px;padding:16px">\ud83c\udf8a 全問正解です！</div>'}
  rEl.innerHTML=h;
  rEl.scrollIntoView({behavior:'smooth'});
}

window.retry=function(m){
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  g('start'+(m==='video'?'Video':'Course')).style.display='block';
};

window.backToList=function(){
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

// In all mode, add back button to video start panel
if(allMode){
  var sv=document.getElementById('startVideo');
  var bk=document.createElement('button');
  bk.className='mbk';bk.innerHTML='\u2190 モジュール一覧に戻る';
  bk.onclick=backToList;
  sv.insertBefore(bk,sv.firstChild);
}

// Auto-height: tell parent iframe to resize (no scrollbar)
function reportHeight(){
  var h=document.getElementById('R').scrollHeight+48;
  window.parent.postMessage({qh:h},'*');
}
var ro=new ResizeObserver(reportHeight);
ro.observe(document.getElementById('R'));
setTimeout(reportHeight,300);
</script>
</body>
</html>
