m":2,"q":"本研修のまとめとして、複雑な接続詞を含んだ手順書を何に例えていましたか？","o":["豪華なフルコース","「壊れた道標（みちしるべ）」","黄金の鍵","秘密の地図"],"h":"読み手を迷わせ、ゴール（良品完成）に辿り着けなくさせる危険な存在です。","c":1,"e":"正確な「道標（手順書）」にするためには、接続詞というノイズを排し、1ステップずつ着実に進める「正確な地図」に書き換える必要があります。"},{"m":3,"q":"業務を「可視化（フロー図作成）」する最大の目的は何ですか？","o":["きれいな図を描いて報告書を飾ること","業務の実態を「見える化」し、問題点や滞留の原因を関係者全員で共有するため","特定の担当者に仕事を押し付けるため","過去のやり方を美化するため"],"h":"「どこで仕事が止まっているか」を客観的な事実として把握するための活動です。","c":1,"e":"業務の流れをフロー図に書き出すことで、頭の中にある「暗黙知」が「形式知」となり、どこにムダや停滞があるかを全員の目で確認できるようになります。"},{"m":3,"q":"プロセス全体の中で、処理能力が最も低く、全体の生産量を決定づけている箇所のことを何と呼びますか？","o":["センターライン","ボトルネック（制約条件）","デッドエンド","チェックポイント"],"h":"瓶（ボトル）の首が細いと、中身が出る速さがそこで決まってしまう例えです。","c":1,"e":"ボトルネック以外の工程をいくらスピードアップさせても、全体の出荷量は増えません。むしろ、ボトルネックの前に仕掛品（在庫）が溜まるだけの「部分最適」に陥ります。"},{"m":3,"q":"具体例①の製造現場において、熱処理工程（能力70個）の前後の工程（能力100個）をフル稼働させた結果、どのような問題が起きましたか？","o":["出荷量が100個に増えた","熱処理工程の前に仕掛品在庫が積み上がり、現場が混乱した","全員が暇になった","機械がすべて故障した"],"h":"「前が速すぎる」と、後ろが詰まってしまいます。","c":1,"e":"ボトルネックの能力を超えて前工程を動かすことは、過剰在庫という「ムダ」を生み、リードタイムを悪化させる原因になります。"},{"m":3,"q":"ライン全体のペースをボトルネックの能力に合わせる考え方を、TOC（制約理論）では何に例えていますか？","o":["ドラム","ピアノ","ギター","シンバル"],"h":"オーケストラや行進で、全員が歩調を合わせるための「太鼓」の役割です。","c":0,"e":"ドラム（Drum）は、システム全体の生産リズムを決定します。無理な「押し出し（プッシュ）」を止め、ボトルネックの速さに同期させることが全体最適の第一歩です。"},{"m":3,"q":"ボトルネック工程が不意のトラブルで止まらないよう、その直前に適量な在庫を置いて保護することを何と呼びますか？","o":["壁","バッファー","予備","倉庫"],"h":"衝撃を吸収する「緩衝材」という意味の言葉です。","c":1,"e":"バッファー（Buffer）を置くことで、前工程の些細な変動がボトルネックに直接影響するのを防ぎ、全体の稼働率を維持します。"},{"m":3,"q":"具体例②の事務部門において、欠品と過剰在庫が同時に起きていた「情報のボトルネック」は何でしたか？","o":["パソコンの故障","部門間での「情報の停滞」と、自分たちの都合による「情報の加工」","伝票の枚数が多すぎたこと","電話が繋がらなかったこと"],"h":"各部署がバラバラのデータ（Excel等）を持ち、情報の鮮度が落ちていました。","c":1,"e":"情報の目詰まりは、物理的な製造ラインの停滞と同じくらい、組織の意思決定を狂わせ、多大な損失（ムダ）を招きます。"},{"m":3,"q":"実際の売れ行き（後工程の需要）に基づいて必要な分だけを補充する仕組みを何と呼びますか？","o":["プッシュ方式","プル方式","投げ込み方式","予測方式"],"h":"後工程が「引っ張る（Pull）」イメージです。","c":1,"e":"プル方式を導入することで、過剰な予測（プッシュ）による在庫の積み上がりを防ぎ、需要変動に強いしなやかなプロセスを構築できます。"},{"m":3,"q":"部門ごとの個別管理を廃止し、受注から在庫まで全員が同じ事実をリアルタイムで見られるようにする統合システムは何ですか？","o":["SNS","ERP（統合業務システム）","電子メール","表計算ソフト"],"h":"「情報の同期化」を可能にする、経営基盤となるシステムです。","c":1,"e":"データの発生源を一元化（データベース共有）することで、情報の歪みをなくし、迅速かつ客観的な判断が可能になります。"},{"m":3,"q":"自分の部署だけでなく、組織全体が調和して動く「全体最適」を実現するために必要な視点はどれですか？","o":["自分の持ち場だけを速くすること","「後工程はお客様」という共通認識を持ち、前後の工程とのつながりを意識すること","悪い情報を隠すこと","責任を他部署になすりつけること"],"h":"部分的な効率向上は、時として全体を悪化させることがあります。","c":1,"e":"全体最適とは、組織という一つの生命体がスムーズに機能することを目指す考え方です。各部署が「流れ」の一部であることを自覚することが不可欠です。"},{"m":3,"q":"本研修のまとめとして、改善活動の出発点として提示された行動は何ですか？","o":["新しい機械を買う","業務フロー図を書き、事実に基づいて「どこが詰まっているか」を把握する","残業を増やす","会議の時間を長くする"],"h":"「見えないもの」は管理できません。まずは「見える化」することです。","c":1,"e":"標準（楽譜）を可視化することで初めて、どこに不協和音（ムダ・停滞）があるかが見え、効果的な改善（新しい旋律）が可能になります。"},{"m":4,"q":"ポカヨケ（Poka-Yoke）の根本的な考え方として、最も適切なものはどれですか？","o":["ミスをした作業者を厳しく指導すること","人間はミスをするものという前提に立ち、仕組みでミスを防ぐこと","2重、3重のチェック人員を配置すること","作業標準書を暗記させること"],"h":"「人の注意」に頼るのではなく、「システムの制約」に注目します。","c":1,"e":"ポカヨケは、ヒューマンエラーを根絶することはできないという事実を受け入れ、ミスが起き得ない、あるいは起きても即座に検知できる仕組みを導入する活動です。"},{"m":4,"q":"現場で不適合が発生した際、「もっと注意して作業しろ」という対策が不十分な理由は何ですか？","o":["指導が面倒だから","精神論では根本的な原因（仕組みの欠陥）が除去されず、必ず再発するから","作業者のやる気がなくなるから","手順書が長くなるから"],"h":"疲労や慣れがある以上、人間の注意力には必ず限界があります。","c":1,"e":"「なぜミスが起きたのか」を分析し、物理的に間違えようがない「ミスよけ」を設計・導入することこそが、真の再発防止（是正処置）です。"},{"m":4,"q":"具体例①のルミナス工業で、逆付けミスをゼロにした「治具の改善」を何と呼びますか？","o":["注意式ポカヨケ","規制式ポカヨケ（物理的拘束）","精神的ポカヨケ","放置式ポカヨケ"],"h":"逆向きには「物理的にはまらない」ようにピンを立てる工夫です。","c":1,"e":"規制式ポカヨケは、正しい向き・方法以外では作業が進行できないように物理的に拘束するため、最も信頼性の高いエラー防止策となります。"},{"m":4,"q":"ポカヨケを導入することで、作業者にとってどのような心理的メリットがありますか？","o":["楽をしてサボれるようになる","「間違っていたらセットできない」という安心感により、精神的負担が軽減される","考える力がなくなる","責任感がなくなる"],"h":"「間違えたらどうしよう」という不安から解放されます。","c":1,"e":"ポカヨケは作業者を責めるためのものではなく、作業者が安心して正しく働けるように守るための「盾」としての役割を果たします。"},{"m":4,"q":"具体例②のスピード・ロジ社で、目視確認の限界を補うために導入された「連動式ポカヨケ」は何ですか？","o":["品番を大声で読み上げる","ハンディスキャナーで照合しない限り出荷ラベルが印刷されない仕組み","監視カメラの増設","2人1組での作業"],"h":"「正しい製品であることをシステムが確認するまで次へ進めない」仕組みです。","c":1,"e":"バーコード等を用いたシステム的なインターロック（連動）は、事務作業における「見間違い」や「思い込み」を確実に排除します。"},{"m":4,"q":"事務現場での「取り違え」を誘発していた、棚の配置に関する問題は何でしたか？","o":["棚が古かった","似た製品が隣り合わせに置かれていた","照明が暗かった","通路が狭かった"],"h":"「間違えやすい環境」が現場に残っていました。","c":1,"e":"物理的なポカヨケだけでなく、配置ルール（保管基準）を見直して「間違えようのない環境」を整えることも、ポカヨケの重要な一環です。"},{"m":4,"q":"異常を検知した瞬間に警告音やランプで知らせるタイプのポカヨケを何と呼びますか？","o":["規制型","接触型","注意型（検知・警告型）","隠蔽型"],"h":"「ダメな時」にアンドン等で知らせる仕組みです。","c":2,"e":"物理的に止めることが難しい場合でも、異常を即座に「見える化・聞こえる化」することで、後工程への流出を防ぎます。"},{"m":4,"q":"ポカヨケ設計において、作業標準書に「やってはいけないこと（NG動作）」を明文化すべき理由は何ですか？","o":["ページ数を増やすため","失敗のパターンを具体的に示し、未経験者でもリスクを予見できるようにするため","犯人探しを簡単にするため","イラストを描く練習のため"],"h":"「正解」だけでなく「間違い」を教えることで、理解が深まります。","c":1,"e":"NG動作を写真やイラストで示すことで、作業者の「うっかり」や「独断」による危険な行動を未然に抑制できます。"},{"m":4,"q":"不具合が発生した際、その教訓をポカヨケとして反映させ、標準を更新し続けるサイクルを何と呼びますか？","o":["5S活動","SDCA（維持）からPDCA（改善）へのサイクル","飲み会の幹事","掃除の当番"],"h":"標準（S）を決め、実行（D）し、確認（C）し、処置（A）する流れです。","c":1,"e":"ポカヨケは一度作って終わりではありません。新たな失敗の芽を見つけるたびに、仕組みをアップデートし続けることが継続的改善の本質です。"},{"m":4,"q":"本研修のまとめとして、ポカヨケを何に例えていましたか？","o":["豪華なフルコース","作業者を守るための「盾」","終わりなき旅","秘密の暗号"],"h":"カメラの「二重写し防止」のように、意識せずとも正しく使える仕組みのイメージです。","c":1,"e":"ポカヨケは、意図しないエラーから品質と作業者の信頼を守るための、最も心強いインフラなのです。"},{"m":5,"q":"個人の経験や勘、コツといった、言葉にしにくい知識のことを何と呼びますか？","o":["形式知","暗黙知","公知","予知"],"h":"「背中を見て学べ」と言われるような、本人の頭の中にしかない知識です。","c":1,"e":"暗黙知は、経験を通じて得られる主観的な知識です。これを放置すると、その人がいなくなった時に組織の技術が失われる「空洞化」を招きます。"},{"m":5,"q":"マニュアルや図面、ビデオ標準書のように、誰もが客観的に共有できる知識を何と呼びますか？","o":["暗黙知","形式知","未知","専門知"],"h":"「誰でも同じように理解できる」形に変換された知識のことです。","c":1,"e":"暗黙知を形式知に変換（言語化・数値化）することで、組織全体の再現性が高まり、品質の安定と教育の加速が実現します。"},{"m":5,"q":"具体例①のフロンティア・メカニクス社で、ベテラン田中さんの「音を聴きながら締める」という作業を解析するために用いた手法は何ですか？","o":["精神論の唱和","ビデオ撮影による「作業要素ばらし」","勘に頼った模倣","装置の買い替え"],"h":"一瞬の動きを1秒単位で分解し、目に見えない「コツ」を視覚化しました。","c":1,"e":"ビデオを活用した要素分解は、ベテラン本人も無意識に行っている「急所」を見つけ出すのに極めて有効な手法です。"},{"m":5,"q":"田中さんの「締め付けの感触」を形式知化するために、具体的にどのような「数値」に置き換えましたか？","o":["締め付け時間（秒）","トルク値（Nm）","作業者の年齢","ボルトの重さ"],"h":"誰が使っても同じ力がかかる「トルクレンチ」を用いた数値管理です。","c":1,"e":"「いい塩梅で締める」を「5.5Nmで締める」と数値化することで、経験の浅い新人でもベテランと同じ結果を再現できるようになります。"},{"m":5,"q":"承継において、単なる「やり方（How）」だけでなく、「なぜ（Why）」を教えるべき最大の理由は何ですか？","o":["研修時間を長くするため","理由（根拠）を理解することで、本質的な理解が進み、応用や異常への対応が可能になるから","雑談を増やすため","テストの問題を作るため"],"h":"「なぜやるか」が分かれば、形式的な真似ではなく「納得」して動けるようになります。","c":1,"e":"「熱膨張を計算に入れている」といった理由を共有することで、手順の重要性が認識され、手抜きや誤った判断を防ぐことができます。"},{"m":5,"q":"具体例②のスマート・システムズ社で、佐藤さんの「魔法の営業」を体系化するために作成したツールは何ですか？","o":["営業日報","トークスクリプト（成功シナリオ）","顧客の電話番号リスト","飲み会のスケジュール表"],"h":"佐藤さんの無意識の「質問順序」や「回答パターン」を可視化したものです。","c":1,"e":"「勝ちパターン」をスクリプト（脚本）化することで、チーム全体の成約率を底上げし、属人化による不安定な経営を脱却できます。"},{"m":5,"q":"個人の「技能レベル」を可視化し、誰が何を習得したかを管理する図を何と呼びますか？","o":["組織図","星取表（スキルマップ）","会計帳簿","路線図"],"h":"「技術の空洞化」を防ぐために、誰がどの「型」を習得しているか一目で分かる表です。","c":1,"e":"スキルマップを用いることで、教育の進捗や、特定の人への業務集中（リスク）を客観的に把握し、計画的な人材育成が可能になります。"},{"m":5,"q":"ノウハウの承継プロセスにおいて、最も避けるべき「教え方」はどれですか？","o":["ビデオや写真で視覚的に伝える","「俺の背中を見て盗め（暗黙知のまま）」と突き放す","5W1Hに基づき言語化する","ロールプレイングで反復練習する"],"h":"これでは新人が育つのに時間がかかりすぎ、技術が途絶えるリスクがあります。","c":1,"e":"現代のスピード感ある経営においては、「背中を見て学ぶ」といった非効率な方法ではなく、論理的な手順（形式知）による早期育成が求められます。"},{"m":5,"q":"承継された「王道パターン」を組織に定着させるための「仕上げ」として有効な手段は何ですか？","o":["マニュアルを鍵付きの棚にしまう","ロールプレイングや実地訓練を通じて「体に覚え込ませる」","読書感想文を書かせる","忘年会の景品にする"],"h":"知識として「知っている」状態から、実務で「できる」状態へ引き上げます。","c":1,"e":"形式知化されたマニュアルを基に反復練習を行うことで、再び個人の「高いレベルの暗黙知（知的熟練）」へと昇華させるサイクルが理想です。"},{"m":5,"q":"本研修のまとめとして、ノウハウの承継を何に例えていましたか？","o":["豪華なフルコース","「未来への道標（地図）」","終わりなき旅","秘密の暗号"],"h":"過去の記録ではなく、これからの組織が迷わず進むためのガイドです。","c":1,"e":"ベテランの知恵を「組織の遺伝子」として組み込み、更新し続けることで、会社は時代に左右されない強さを手に入れることができます。"},{"m":6,"q":"マニュアルが「形骸化」し、現場で見られなくなる最大の原因は何ですか？","o":["ページ数が多すぎるから","マニュアルの内容が「今の現場の実態」と乖離しているから","印刷の色が薄いから","保管場所が遠いから"],"h":"「実作業と違う」「やりにくい」と感じると、人はマニュアルを見なくなります。","c":1,"e":"現場の改善や設備の変更に合わせてマニュアルを更新（手入れ）しないと、建前と現実の差が広がり、やがて誰にも見向きもされない「死んだ文書」になってしまいます。"},{"m":6,"q":"全員で内容を確認し、現状の作業とのズレや認識の違いをなくすための活動を何と呼びますか？","o":["抜き打ち検査","読み合わせ会","忘年会","採用面接"],"h":"管理職から新人までが集まり、一項目ずつ内容を議論する場のことです。","c":1,"e":"読み合わせ会を行うことで、「わかっているはず」という思い込みを排し、ベテランの知恵をマニュアルに反映させ、新人の疑問を解消することができます。"},{"m":6,"q":"J-テック社の事例で、不適合品が発生した際に判明した「マニュアルの状態」はどうでしたか？","o":["最新の機械に対応していた","古い手順のまま書庫で埃をかぶっていた","全員が暗記していた","毎日更新されていた"],"h":"担当者が探し回るほど、現場から忘れ去られていました。","c":1,"e":"マニュアルが現場に置かれず、内容も古いまま放置されている状態は、品質トラブルの温床となります。"},{"m":6,"q":"マニュアルの「読み合わせ会」において、現場の作業者から出た意見（無駄な手順や工夫など）はどう扱うべきですか？","o":["「決まりだから」と却下する","その場でメモし、即座にマニュアルの改訂案に反映させる","次回の会議まで放置する","担当者に口頭で伝えるだけで済ます"],"h":"現場の「気づき」こそが、マニュアルを最新の「王道パターン」に変える宝です。","c":1,"e":"現場の知恵を迅速にマニュアルへフィードバックすることで、作業者は「自分たちが作った最善のやり方」として主体的に守るようになります。"},{"m":6,"q":"ベジ・フーズ社の事例で、チェックリストが「合格」ばかりなのにトラブルが絶えなかった理由は何ですか？","o":["ペンの色が赤かったから","記入そのものが「作業」になり、確認という本来の目的が失われていたから","チェック項目が少なすぎたから","掃除道具が足りなかったから"],"h":"「書けばいい」という形骸化が起き、実態を見ていない状態でした。","c":1,"e":"「隅々まで綺麗にする」といった曖昧な基準は判断を狂わせます。形骸化を防ぐには、目的を再認識させ、具体的な判断基準を設ける必要があります。"},{"m":6,"q":"人による判断の「ムラ」をなくすために、マニュアルに「写真」を貼り、合格状態を明確にすることを何と呼びますか？","o":["記念撮影","限度見本（視覚的な標準）","監視カメラ","イメージアップ"],"h":"「綺麗」の定義を、誰が見ても同じに揃えるための工夫です。","c":1,"e":"言葉だけでは伝わらない基準を写真（限度見本）で示すことで、新人でもベテランと同じ高い精度で判定ができるようになります。"},{"m":6,"q":"標準を定め、実施し、確認し、処置（改訂）する、マニュアルを維持・管理するサイクルを何と呼びますか？","o":["3M活動","SDCAサイクル","5S活動","勤務表作成"],"h":"Standardization（標準化）から始まるサイクルです。","c":1,"e":"SDCAを回し続けることで、マニュアルは常に「生きた文書」となり、組織の品質レベルを底支えし続けます。"},{"m":6,"q":"新たなリスク（食中毒や故障予兆など）が判明した際、マニュアルはどうすべきですか？","o":["来年の改訂時期まで待つ","タイムリーに更新し、関係者に周知する","担当者の記憶に留める","秘密にする"],"h":"鮮度の高い情報は、即座に「標準」へ反映させることがリスク回避の鉄則です。","c":1,"e":"不具合や気づきを即座に反映させることで、マニュアルの信頼性が高まり、再発防止策が組織全体に定着します。"},{"m":6,"q":"本研修のまとめとして、マニュアルを更新し続けることの重要性を何に例えていましたか？","o":["「マニュアルのないところに改善はないが、古いマニュアルを守り続けることは退歩と同じ」","「マニュアルは一度作れば永遠に使える魔法の杖である」","「マニュアルは厚ければ厚いほど良い」","「マニュアルは秘密にしておくべきだ」"],"h":"改善とは、常に「今の最高」を更新し続ける活動です。","c":0,"e":"標準を固定したままにせず、常に磨き上げること（ブラッシュアップ）が、変化の激しい現代で生き残るための「現場力」に繋がります。"},{"m":6,"q":"マニュアルを「死なせない」ために、明日からすぐに行える「最初の一歩」は何ですか？","o":["豪華なバインダーを買いに行く","現場のマニュアルが「今のやり方」と合っているか一項目だけ確認してみる","マニュアルをシュレッダーにかける","徹夜で新しいマニュアルを書き上げる"],"h":"まずは「現状と標準のズレ」を見つけることから始まります。","c":1,"e":"小さなズレを一つ見つけ、それを正す習慣が、組織全体の「SDCAサイクル」を動かす大きな力となります。"},{"m":7,"q":"「守・破・離」の第一段階である「守（しゅ）」とは、どのような状態を指しますか？","o":["独自のスタイルを確立し、自由に行動する状態","師匠の教えや組織の「型（標準）」を忠実に守り、実行する状態","既存のルールを壊して、新しい工夫を凝らす状態","誰の指示も受けずに、自分の勘で作業する状態"],"h":"「王道パターン」を確実に再現し、基礎を固める段階のことです。","c":1,"e":"「守」は成長の土台です。組織が試行錯誤の末に導き出した最善のやり方（標準）を、迷わず正確に再現できる能力を指します。"},{"m":7,"q":"基本の「型」が身に付いていないのに独自のやり方をすることを、本研修では何と呼んでいますか？","o":["独創的進化","型崩れ（または手抜き）","早期の離脱","理想的な改善"],"h":"基礎がない状態での工夫は、品質低下や事故を招く危険な行為です。","c":1,"e":"「型」があるからこそ「型破り」が可能になります。型がないのは単なる「形無し（型崩れ）」であり、プロとしての信頼を損なう原因となります。"},{"m":7,"q":"「標準（型）のないところに改善はない」という原則において、改善（PDCA）の前に確立すべきサイクルは何ですか？","o":["5S活動","SDCAサイクル（標準・実行・確認・処置）","3M活動","忘年会の計画"],"h":"「今の最高」を維持し、管理するサイクルのことです。","c":1,"e":"SDCAによって現在の標準が守られている状態（安定）を作って初めて、それをさらに良くするPDCA（改善）が可能になります。"},{"m":7,"q":"具体例①のテック・マスター社で、新人がミスを連鎖させた根本的な原因は何でしたか？","o":["新人のやる気がなかったから","手順書に「適度に」「音を確認して」といった、読み手の感覚に頼る曖昧な記述しかなかったから","佐藤さんが意地悪をしたから","機械が古すぎたから"],"h":"「守」を徹底しようにも、守るべき明確な「型」が存在しませんでした。","c":1,"e":"主観的な表現は「型」になり得ません。誰が作業しても同じ結果になるよう、数値化や視覚化による標準化が不可欠です。"},{"m":7,"q":"「守」を確実に実現するために、具体例①で導入された「数値化」の具体例はどれですか？","o":["「力いっぱい締める」","「トルクレンチを使用し","0Nmで締める」","「適当な回数回す」"],"h":"客観的な計り（トルクレンチ）を用いた、誰でも再現できる指示です。","c":1,"e":"「いい塩梅」を数値に置き換えることで、経験の浅い新人でもベテランと同じ品質を再現できる「型」が完成します。"},{"m":7,"q":"具体例②の鈴木さんが、独自の会話術（破）に固執して失敗した原因は何ですか？","o":["料理が下手だったから","基本の「型（挨拶や配膳手順）」を軽視し、基礎が疎かになっていたから","お客様が厳しすぎたから","マニュアルが難しすぎたから"],"h":"「当たり前のこと」を疎かにしたため、ケアレスミス（し忘れ）を頻発させていました。","c":1,"e":"基礎的な「守」ができていない状態での応用は、注意力を分散させ、本来防げるはずの初歩的なミスを招きます。"},{"m":7,"q":"「守」を体得させるための教育手法として、具体例②で行われた「マニュアルの音読」と「理由の共有」を何と呼びますか？","o":["抜き打ちテスト","読み合わせ会","自己啓発","採用面接"],"h":"全員で目を通し、「なぜその動作が必要か」という根拠を納得させる場です。","c":1,"e":"読み合わせ会を通じて「型」の意味を理解させることで、形骸化を防ぎ、自発的に標準を守る意識が育まれます。"},{"m":7,"q":"接客の「基本動作」を体に覚え込ませるために、鈴木さんが反復して行った訓練は何ですか？","o":["読書感想文","ロールプレイング","登山研修","掃除の当番"],"h":"実際の場面を想定し、お辞儀や発声の「型」を繰り返し練習する手法です。","c":1,"e":"知識として「知っている」だけでなく、無意識でも「できる」レベルまで「型」を体に染み込ませることが「守」の極意です。"},{"m":7,"q":"本研修において、安全の「A・B・C」とは何を指していますか？","o":["安全・無事・チェック","アタリマエのことを・ボンヤリせずに・チャンとやる","明るく・元気に・朝ごはん","焦らず・慌てず・落ち着いて"],"h":"基本中の基本を、油断せずに確実に実行することの合言葉です。","c":1,"e":"「型を守る」とは、まさにこのABCを徹底することです。凡事徹底こそが、最大の事故防止と品質保証に繋がります。"},{"m":7,"q":"本研修のまとめとして、「守（型を守ること）」を何に例えていましたか？","o":["不自由な縛り","誰もが安全かつ確実に成果を出すための「最強の武器」","終わりなき旅の終わり","秘密の暗号"],"h":"不確実な現場で、自分と組織を守り、次なる成長（破・離）を支えるものです。","c":1,"e":"「守」を極めることは、プロフェッショナルへの最短距離であり、組織が安定して勝ち続けるための最強のインフラです。"},{"m":8,"q":"意思決定において避けるべき「KKD」とは、何の略称ですか？","o":["計画・記録・実行","勘・経験・度胸","効率・効果・改善","期待・希望・努力"],"h":"個人の主観や精神論に頼った、客観性を欠く判断基準のことです。","c":1,"e":"長年の経験（K）や勘（K）、度胸（D）は大切ですが、それだけに頼ると「思い込み」によるミスを招きます。これにデータ（Data）を加えて「KKDD」とすることが、現代の品質管理の基本です。"},{"m":8,"q":"ISO規格においても重視されている、データや情報の分析に基づいて判断を下す考え方を何と呼びますか？","o":["成果主義","客観的証拠（エビデンス）に基づく意思決定","多数決による決定","スピード優先の決定"],"h":"「実際に起きたこと（事実）」を記録し、それを分析して次のアクションを決めるプロセスです。","c":1,"e":"効果的な意思決定は、個人の主観ではなく、客観的に示された証拠（データや記録）の分析に基づいている必要があります。"},{"m":8,"q":"具体例①の新倉くんの報告「だいたい大丈夫」に欠けていた、最も重要な要素は何ですか？","o":["声の大きさ","丁寧な謝罪","判断の根拠となる客観的なデータ","上司への忖度"],"h":"「大丈夫」という結論を裏付ける「事実の記録」が必要でした。","c":2,"e":"「だいたい」という曖昧な言葉は人によって解釈が異なります。誰が見ても納得できる数値や図解（エビデンス）こそが、組織における共通言語となります。"},{"m":8,"q":"集めたデータのばらつき具合を、山の形で視覚化し「ひと目でわかる」ようにする統計手法は何ですか？","o":["組織図","ヒストグラム","連絡網","予定表"],"h":"データの塊がどこに集中し、どれくらい広がっているかを柱状の図で表すものです。","c":1,"e":"ヒストグラムを用いることで、平均値だけでは見えない「データの分布」や「規格外れの有無」を一瞬で把握できるようになります。"},{"m":8,"q":"具体例①で、異常の原因が1号機にあると特定するために行った、データをグループ別に分ける作業を何と呼びますか？","o":["削除","層別（そうべつ）","隠蔽","圧縮"],"h":"「全体」を「機械別」「人別」などの項目（レイヤー）で切り分ける手法です。","c":1,"e":"層別は問題解決の近道です。混ぜこぜのデータを分けることで、特定の要因（ここでは1号機）が問題を引き起こしている事実が浮き彫りになります。"},{"m":8,"q":"時間の経過とともにデータがどのように変化しているか（傾向）を監視し、異常を検知する図は何ですか？","o":["似顔絵","管理図","世界地図","カレンダー"],"h":"折れ線グラフに管理限界線を引き、プロセスが不安定になっていないかを確認します。","c":1,"e":"管理図は、プロセスの「不整脈」を見つけるためのツールです。徐々に数値が上がっていくなどの「傾向変化」を捉え、予防処置に繋げます。"},{"m":8,"q":"具体例②の佐藤課長が陥った「平均値の罠」とは、どのような現象ですか？","o":["計算が難しすぎること","平均値を見ることで、個別のデータの「ばらつき」や「異常」が隠れて見えなくなること","平均値が常に高い数値になること","全員が同じ数値になること"],"h":"「非常に良い」と「非常に悪い」を足して2で割ると「普通」に見えてしまいます。","c":1,"e":"平均値は全体の傾向を知るには便利ですが、層別せずに使うと、夜間シフトの不具合や新人のミスといった重要な事実を消し去ってしまいます。"},{"m":8,"q":"データの「ばらつきの大きさ」を客観的に示す統計指標を何と呼びますか？","o":["合計値","標準偏差（σ：シグマ）","最大値","ページ数"],"h":"平均値からどれくらいデータが散らばっているかを表す数値です。","c":1,"e":"標準偏差を活用することで、「平均は同じだが、AラインよりBラインの方が品質が不安定だ」といった、より高度な判断が可能になります。"},{"m":8,"q":"「事実は一つだが、分析の仕方で語る内容は変わる」という言葉が意味する、データを扱う際の注意点はどれですか？","o":["自分の都合の良いようにデータを改ざんする","5W1Hで条件を明確にし、多角的な視点（層別等）で分析する","難しい数学の公式を丸暗記する","データは取らなくてよい"],"h":"「誰が、いつ、どこで」という条件を分けないと、真実は見えてきません。","c":1,"e":"データは「実際に起きたこと」の断片です。正しい分析（ファクト・コントロール）を行って初めて、改善に繋がる価値ある情報へと変わります。"},{"m":8,"q":"本研修のまとめとして、曖昧な言葉を捨てて明日から実践すべき行動は何ですか？","o":["「たぶん」を連発する","「だいたい」を捨て、具体的な「数字と事実」で語る","勘だけで勝負する","報告を遅らせる"],"h":"客観的証拠を基に、迷いのない確かな意思決定を目指す姿勢です。","c":1,"e":"「数字と事実」は組織の信頼の基盤です。自分を疑い、事実を信じる姿勢こそが、プロフェッショナルな品質管理の第一歩です。"},{"m":9,"q":"3ムのうち、人や設備に対して能力以上の過度な負担をかける状態を何と呼びますか？","o":["ムダ","ムリ","ムラ","ムネ"],"h":"「深夜までの残業」や「機械の限界を超えた稼働」などがこれに当たります。","c":1,"e":"ムリは、安全性の低下やメンタルヘルスの悪化、設備の故障を招く、極めてリスクの高い状態です。"},{"m":9,"q":"付加価値を生まず、原価（コスト）だけを高めてしまう諸要素を何と呼びますか？","o":["ムリ","ムラ","ムダ","ムチ"],"h":"「作りすぎ」「手待ち」「運搬」「加工そのもののムダ」など、お客様がお金を払ってくれない動きのことです。","c":2,"e":"ムダを省くことは、そのまま利益の向上に直結します。現場を観察し、何が付加価値を生んでいるかを見極める目が重要です。"},{"m":9,"q":"人によって仕事量に偏りがあったり、日によって忙しさが激しく変動したりする状態を何と呼びますか？","o":["ムラ","ムリ","ムダ","ムラサキ"],"h":"「ある人は忙しいのに、ある人は暇」というバラツキの状態です。","c":0,"e":"ムラがあると、忙しいところには「ムリ」が発生し、暇なところには「ムダ（手待ち）」が発生します。改善の第一歩はムラをなくすことです。"},{"m":9,"q":"具体例①のJ製造所において、ベテランAさんだけに仕事が集中していた「ムラ」を解消するために用いた、負荷を可視化するグラフは何ですか？","o":["組織図","山積表（やまづみひょう）","営業グラフ","予定表"],"h":"誰がどれだけの仕事を持っているか、棒グラフのように積み上げて比較する図です。","c":1,"e":"山積表で負荷を「見える化」することで、特定の個人にかかっている「ムリ」を客観的な事実として全員で共有し、分担の相談ができるようになります。"},{"m":9,"q":"一人の作業者が複数の工程や機械を扱えるようになることを何と呼びますか？","o":["多能工化（たのうこうか）","単能工化","専門特化","分業化"],"h":"「Aさんしかできない」を無くし、チーム全員で助け合える状態を作ることです。","c":0,"e":"多能工化を進めることで、工程間の「ムラ」を柔軟に調整できるようになり、組織全体の生産性が安定します。"},{"m":9,"q":"具体例②のS商事で、月末に仕事が集中して「ムリ」が発生していた原因は何でしたか？","o":["パソコンが古かったから","業務の「ムラ（情報の入力タイミングのバラバラ）」があったから","担当者が少なすぎたから","事務所が狭かったから"],"h":"「月末一括」というやり方が、事務部門に過度な負担を強いていました。","c":1,"e":"仕事の入り口で「ムラ」を許容してしまうと、出口（事務処理）で深刻な「ムリ」と「ムダ（手直し）」が連鎖してしまいます。"},{"m":9,"q":"事務業務において、月単位ではなく「日単位」などで仕事を均等に割り振る考え方を何と呼びますか？","o":["まとめ作業","時間の目盛り（平準化）","締め切り厳守","順不同"],"h":"特定の日に仕事が溜まらないよう、流れをスムーズにする工夫です。","c":1,"e":"仕事に「時間の目盛り」を入れることで、進捗の遅れがすぐに分かるようになり、早めの対策（応受援）が可能になります。"},{"m":9,"q":"3ムを排除するための鉄則として、まず「どこから」手をつけるのが最も効果的だとされていますか？","o":["ムダ","ムリ","ムラ","全部同時"],"h":"バラツキを直せば、自ずと限界超えや手待ちの正体が見えてきます。","c":2,"e":"「ムラ（バラツキ）」を平らにならすことで、隠れていた「ムダ」が浮き彫りになり、過度な「ムリ」を自然に解消する道筋が見えてきます。"},{"m":9,"q":"改善によって3ムを排除した状態を維持するために、次に回すべきサイクルは何ですか？","o":["5Sサイクル","SDCAサイクル（標準・実行・確認・処置）","採用サイクル","決算サイクル"],"h":"「最高のやり方（標準）」を決め、それを維持管理するサイクルです。","c":1,"e":"標準（S）がないと、現場はすぐに元の「3ム」がある状態に戻ってしまいます。標準を守り、維持することが継続的改善の土台です。"},{"m":9,"q":"本研修のまとめとして、3ムの排除を何に例えていましたか？","o":["豪華なフルコースの献立","「組織の筋肉を鍛えるトレーニング」","終わりなき旅","秘密の暗号"],"h":"現場の「ムダ」という塵を取り除き、強くたくましく成長させるイメージです。","c":1,"e":"3ムの排除は一度きりのイベントではなく、日々継続することで組織の体質を根本から強くする、欠かせない習慣なのです。"},{"m":10,"q":"TQM（総合的品質管理）の定義として、最も適切なものはどれですか？","o":["検査部門だけが製品の不良をチェックすること","経営層から現場まで、全部門・全階層が参画して顧客満足を追求する経営手法","利益だけを最優先し、コスト削減を徹底すること","マニュアルを絶対的なものとして、一切の変更を許さないこと"],"h":"「総合的（Total）」という言葉通り、組織の総力を挙げる活動です。","c":1,"e":"TQMは、製品の質だけでなく「仕事の質」を向上させ、顧客満足を通じて組織の長期的な成功を目指す、全員参加型のマネジメント手法です。"},{"m":10,"q":"TQMにおいて、品質の良し悪しを最終的に決定するのは誰ですか？","o":["社長","設計担当者","顧客","競合他社"],"h":"品質とは「顧客の期待をどれだけ満たしているか」で決まるものです。","c":2,"e":"作り手が「良い」と思っても、顧客のニーズに合っていなければ品質が良いとは言えません。顧客要求事項を起点に考える「マーケット・イン」の思想が重要です。"},{"m":10,"q":"自分の仕事の結果を受け取る社内の次工程の人を、どのような意識で捉えるべきですか？","o":["邪魔な存在","監視役","「後工程はお客様」","単なる同僚"],"h":"社内のやり取りも、顧客へのバトンタッチの連続だと考えます。","c":2,"e":"「後工程はお客様」という意識を持つことで、部署間の壁が取り払われ、不適合の流出防止やスムーズな連携（全体最適）が実現します。"},{"m":10,"q":"具体例①において、営業と製造の対立を解消するために導入された「部門横断的チーム」を何と呼びますか？","o":["事務局","CFT（クロスファンクショナルチーム）または多機能チーム","監査対応班","親睦会"],"h":"異なる専門性を持つメンバーが集まり、共通の目標に向かうチームです。","c":1,"e":"CFTを活用することで、設計の初期段階から製造や営業の視点を取り入れる「フロントローディング」が可能になり、開発のスピードと質が向上します。"},{"m":10,"q":"具体例①で、営業が掴んだ「顧客の声」を設計の数値や特性に変換するために用いた手段は何ですか？","o":["多数決","要求品質展開（QFD等）","勘と度胸","秘密のメモ"],"h":"「使いやすい」といった曖昧な声を「重さ●kg以下」などの具体的な設計目標に変える活動です。","c":1,"e":"顧客の抽象的な期待を、技術的な特性へ論理的に展開することで、確実に「満足」を造り込むことができます。"},{"m":10,"q":"具体例②の飲食チェーンにおいて、マニュアルが「形骸化」していた原因は何でしたか？","o":["ページ数が少なかったから","現場にとって「上から押し付けられた制約」になり、自発的な気づきが失われていたから","料理の味が悪かったから","制服が古かったから"],"h":"「やらされ仕事」では、顧客の暗黙の期待（感動の品質）には応えられません。","c":1,"e":"マニュアルを「完成品」として押し付けるのではなく、現場の知恵を反映させて「更新し続ける」ことが、形骸化を防ぐ鍵となります。"},{"m":10,"q":"現場のスタッフを、単なる「作業者」ではなく、自ら考えて知恵を出す存在として捉える考え方を何と呼びますか？","o":["単純労働者","知的労働者（ナレッジワーカー）","臨時雇い","指示待ち人間"],"h":"ドラッカーなどが提唱した、知識を価値に変える人々のことです。","c":1,"e":"現場の一人ひとりをプロとして尊重し、QCサークルなどを通じて改善の権限を与えること（エンパワーメント）が、TQMの活力の源です。"},{"m":10,"q":"TQMを成功させるためのマネジメントの姿勢として、最も適切なものはどれですか？","o":["悪い情報は隠すように指示する","人間性を尊重し、自発的な改善行動を奨励・支援する","ミスをした人を厳しく罰する","すべてを社長一人で決定する"],"h":"「全員参加」を支えるのは、信頼と教育、そして称賛の文化です。","c":1,"e":"「人間性尊重」はTQMの基本理念の一つです。社員が自らの仕事に誇りを持ち、自発的に質を高めようとする環境を整えるのが経営者の役割です。"},{"m":10,"q":"内部監査やマネジメントレビューを通じて、システムの有効性を常にチェックし改善する循環を何と呼びますか？","o":["5S活動","PDCAサイクル","3M活動","採用活動"],"h":"Plan（計画）→Do（実行）→Check（評価）→Act（改善）の流れです。","c":1,"e":"TQMは「やりっぱなし」にせず、データに基づいて現状を正しく評価し、次なる改善に繋げる継続的なサイクルが不可欠です。"},{"m":10,"q":"本研修のまとめとして、TQMを何に例えていましたか？","o":["豪華なフルコース","指揮者のもとで全ての楽器が調和する「オーケストラ」","終わりなき旅","秘密の暗号"],"h":"全員が主役となり、それぞれの役割を完璧に果たすことで最高のメロディ（品質）を奏でるイメージです。","c":1,"e":"個々の能力（楽器）を最大限に活かしつつ、組織全体として一つの目標（ハーモニー）を創り出す。これこそが統合的品質経営の理想の姿です。"},{"m":11,"q":"5S活動の真の目的として、最も適切なものはどれですか？","o":["職場をきれいに掃除して来客に備えること","業務のムダを顕在化させ、ルールを守る「習慣（規律）」を通じて組織体質を強化すること","不要な備品を売ってお金に換えること","掃除を口実にして仕事を休むこと"],"h":"「掃除」は手段であり、目的は「仕事のやり方」や「人の意識」を変えることにあります。","c":1,"e":"5Sは改善の出発点です。モノや情報の停滞（ムダ）を取り除き、決めたルールを全員で守る「躾（習慣化）」を確立することで、品質や安全の基盤が作られます。"},{"m":11,"q":"5Sの「整理（Seiri）」の定義として、正しいものはどれですか？","o":["散らばっているモノをきれいに並べること","必要なモノと不要なモノを区別し、不要なモノを思い切って捨てること","汚れている場所をほうきで掃くこと","モノに名前を書いたラベルを貼ること"],"h":"「整頓」と混同されやすいですが、まずは「数を減らす」ことが先決です。","c":1,"e":"整理とは「捨てる」ことです。不要なモノが職場にあるだけで、移動の邪魔になったり、探しモノの時間を生んだりする「ムダ」が発生します。"},{"m":11,"q":"製造現場の事例で導入された、エリア内のモノを一旦すべて外に出してレイアウトを再設計する手法を何と呼びますか？","o":["大掃除","更地化（さらちか）","引越し","模様替え"],"h":"「あるべき姿」を描くために、一旦ゼロベースにする大胆なアプローチです。","c":1,"e":"更地化を行うことで、長年居座っていた「動かないモノ」の異常が浮き彫りになり、最適な動線（リードタイム短縮）を再構築しやすくなります。"},{"m":11,"q":"5Sの「整頓（Seiton）」において、誰でも迷わず作業できるようにするための3つの要素（3定）は何ですか？","o":["定時・定員・定職","定位置・定品・定量","定価・定食・定期","定説・定義・定数"],"h":"「どこに」「何を」「いくつ」置くかを決めるルールです。","c":1,"e":"3定を徹底し、さらに「形跡管理（置く場所を型取る）」などを行うことで、モノがない時に「異常（紛失や使用中）」が一目でわかるようになります。"},{"m":11,"q":"5Sの「清掃（Seisou）」を「点検」として捉える際、得られる最大のメリットは何ですか？","o":["手がきれいになる","設備の油漏れやネジの緩みなどの「微欠陥（異常）」を早期発見できる","掃除用具の使い方が上手くなる","運動不足が解消される"],"h":"「磨く」ことは、機械の健康状態を「診る」ことと同じです。","c":1,"e":"清掃を通じて設備に触れることで、普段気づかない異常を察知し、故障や事故を未然に防ぐ「予防保全」に繋がります。"},{"m":11,"q":"事務現場の事例において、半年以上使っていない書類を処分するために用いた手法は何ですか？","o":["秘密保持契約","赤札作戦","シュレッダー祭り","タイムカプセル"],"h":"不要と思われるモノに目印を貼り、一定期間後に強制的に判断を下す方法です。","c":1,"e":"赤札を貼ることで、持ち主の「いつか使うかも」という曖昧な執着を排し、客観的な基準（日付）で情報の整理を促進します。"},{"m":11,"q":"5Sの「清潔（Seiketsu）」の状態を維持するために不可欠な活動は何ですか？","o":["新しい服を買う","整理・整頓・清掃の3Sを徹底し、その「きれいな状態」を維持するためのルール（標準）を作ること","毎日洗車すること","芳香剤を置くこと"],"h":"一時的な掃除で終わらせず、常に「正常」を保つ仕組みのことです。","c":1,"e":"清潔とは、3Sが継続されている状態です。ゴミが出ない工夫（源流是正）や、汚れが目立つような色の床にするなど、維持しやすい工夫が含まれます。"},{"m":11,"q":"5Sの最終段階であり、決められたルールを全員が当たり前に守る状態を何と呼びますか？","o":["躾（しつけ・習慣化）","監視","強制","指導"],"h":"言われなくても、自発的に正しい行動ができるレベルのことです。","c":0,"e":"躾ができて初めて5Sは組織の文化となります。これができていないと、どんなに優れた手順書（標準）を作っても守られず、品質は安定しません。"},{"m":11,"q":"本研修において、安全の「A・B・C」とは何を指していますか？","o":["安全・無事・チェック","アタリマエのことを・ボンヤリせずに・チャンとやる","明るく・元気に・朝ごはん","焦らず・慌てず・落ち着いて"],"h":"基本中の基本を、油断せずに確実に実行することの合言葉です。","c":1,"e":"5Sはこの「当たり前」のレベルを上げることです。凡事徹底こそが、最大の不具合防止と組織強化に繋がります。"},{"m":11,"q":"本研修のまとめとして、改善（PDCA）を回す前に確立すべきサイクルは何ですか？","o":["採用サイクル","SDCAサイクル（標準・実行・確認・処置）","決算サイクル","宣伝サイクル"],"h":"「最高のやり方（標準）」を決め、それを維持管理するサイクルです。","c":1,"e":"5Sによって作られた「標準」を維持する（SDCA）ことができて初めて、そこを起点にした更なる向上（PDCA）が可能になります。"},{"m":12,"q":"三現主義の「三つの現」とは、具体的に何を指しますか？","o":["現状・現金・現在","現場・現物・現実","現象・現代・現役","現時点・現存・現有"],"h":"「場所」「もの」「おきていること」を自分の目で確かめることです。","c":1,"e":"トラブルが起きた「現場」へ行き、不具合の出た「現物」を手に取り、今まさに起きている「現実」を観察する。この3つを揃えることが、正しい判断の出発点です。"},{"m":12,"q":"意思決定において避けるべき「KKD」とは、何の略称ですか？","o":["計画・記録・実行","勘・経験・度胸","効率・効果・改善","期待・希望・努力"],"h":"客観的な事実に基づかない、個人の主観に頼った判断基準のことです。","c":1,"e":"経験（K）や勘（K）、度胸（D）は大切ですが、それだけに頼ると「思い込み」を招きます。これにデータ（Data）を加えた客観的な意思決定が求められます。"},{"m":12,"q":"具体例①の伊達巻ラインにおいて、新入社員の報告「だいたい大丈夫」が不適切だった理由は何ですか？","o":["声が小さかったから","予測や想像による主観的な判断であり、客観的な根拠がなかったから","挨拶がなかったから","報告が早すぎたから"],"h":"「大丈夫」という結論を裏付ける「事実」が示されていませんでした。","c":1,"e":"「だいたい」という曖昧な言葉は、人によって解釈が異なります。事実に基づく管理（ファクト・コントロール）には、具体的な数値や根拠が必要です。"},{"m":12,"q":"具体例①で、100個のデータをグラフ化し、山の形が2つあることを突き止めた統計手法は何ですか？","o":["組織図","ヒストグラム","連絡網","予定表"],"h":"データのばらつきを視覚化し、異常を一目で判別するための図です。","c":1,"e":"ヒストグラムを作ることで、平均値だけでは見えない「プロセスの異常」を視覚的に捉えることができます。"},{"m":12,"q":"ヒストグラムで異常が分かった後、三現主義に基づいて特定された「真の原因」は何でしたか？","o":["作業者のやる気不足","材料の配合ミス","搬送ロールの偏摩耗によるワークの傾き","室温の変化"],"h":"データは「異常がある」ことは教えてくれますが、「なぜか」は現場の観察でしか分かりません。","c":2,"e":"現場で稼働中の機械（現実）をつぶさに観察したからこそ、データには現れない物理的な不具合（ロールの摩耗）を発見できました。"},{"m":12,"q":"具体例②の塗装工程で、工長が「塗料メーカーが悪い」と思い込んでしまった原因は何ですか？","o":["メーカーが嫌いだったから","過去の成功体験（KKD）に固執し、今の現場の「現実」を見ていなかったから","メーカーが嘘をついたから","占いの結果が悪かったから"],"h":"「今まではこれで上手くいっていた」という過去の海図に頼りすぎていました。","c":1,"e":"環境（冬の寒さ）が変われば、過去のやり方が通用しないことがあります。思い込みを捨て、目の前の「現実」を疑うことが三現主義の要諦です。"},{"m":12,"q":"塗装ムラの真因であった「現実」とはどのような内容でしたか？","o":["塗料が古かった","塗装する直前の塗料の温度が、運搬中に急激に低下していた","作業者が手順を忘れていた","電気が止まっていた"],"h":"「調合時」の温度ではなく、「使う瞬間」の温度を無視していました。","c":1,"e":"机上の理屈（調合時のデータ）と、現場の現実（塗装時の温度）のギャップにこそ、不適合の正体が隠れていました。"},{"m":12,"q":"三現主義を実践することで、失敗を繰り返さないために最終的に行うべきことは何ですか？","o":["担当者を叱る","現場の現実に基づいた、新しい「作業標準（型）」を策定する","お守りを買う","飲み会を開く"],"h":"「悪いルール」を「良いルール」に書き換える作業です。","c":1,"e":"真因が分かったら、それを仕組み（標準）に落とし込みます。これが「源流是正」であり、再発防止の鉄則です。"},{"m":12,"q":"不適合の報告を聞いた際、三現主義を実践する人が真っ先に取るべき行動はどれですか？","o":["会議室で対策を練る","「まず、現場へ行く」","過去の報告書を読み漁る","誰のせいか犯人探しをする"],"h":"答えは常に、事件が起きている場所にあります。","c":1,"e":"情報が加工される前の「生の事実」に触れることが、最も迅速で正確な意思決定に繋がります。"},{"m":12,"q":"本研修のまとめとして、三現主義の実践を何に例えていましたか？","o":["豪華なフルコースの献立","古い海図を捨て、自らの目で「羅針盤（事実）」を確認する航海","終わりなき旅","秘密の暗号解読"],"h":"霧の中（不透明な状況）で正しい道標を見つけるイメージです。","c":1,"e":"三現主義は、複雑な問題の迷路から抜け出し、確実な成果へと導くための唯一の「羅針盤」なのです。"},{"m":13,"q":"「なぜなぜ分析」において、ヒューマンエラー（うっかりミスなど）をどのように捉えるべきですか？","o":["諸悪の根源であり、本人のやる気の問題である","改善をスタートさせるための「原因」そのものである","何らかの仕組みの欠陥によって引き起こされた「結果」にすぎない","厳しく罰して再発を防ぐべき対象である"],"h":"「注意しろ」という対策は、人が変わればまた同じミスを生みます。","c":2,"e":"エラーは氷山の一角です。その背後には、ミスを誘発する「環境」や「ルールの不備」が必ず隠れています。人を責めるのではなく、仕組みを疑うのが品質管理の鉄則です。"},{"m":13,"q":"原因究明の際、最も使ってはいけない「分析を停止させてしまう禁句」はどれですか？","o":["設備の老朽化","作業者の不注意（確認不足）","手順書の不備","潤滑油の汚れ"],"h":"これを理由にすると、具体的な「仕組みの改善」に辿り着けなくなります。","c":1,"e":"「不注意」を原因にすると、対策が「注意する」という精神論に逃げてしまいます。なぜ不注意が起きたのか、なぜ不注意があっても防げなかったのかを問わねばなりません。"},{"m":13,"q":"具体例①の機械故障において、ヒューズ交換で終わらせず「なぜ」を繰り返した結果、最終的に突き止めた真因は何でしたか？","o":["ヒューズの寿命","担当者の注油忘れ","設計段階で「濾過装置」が欠落していたこと","電気代の節約"],"h":"「注油に注意しろ」という対策では防げない、装置そのものの欠陥でした。","c":2,"e":"「油に金属粉が混じる」という物理的事象に対し、濾過装置という「仕組み」で対処することこそが、真の再発防止（是正処置）です。"},{"m":13,"q":"「なぜなぜ分析」を何回程度繰り返すことが、一般的に推奨されていますか？","o":["1回","2回","5回程度（具体的な対策が出るまで）","相手が泣くまで"],"h":"表面的な事象を突き抜け、組織のルールや設備の設計に辿り着くまでの回数です。","c":2,"e":"トヨタ生産方式でも有名な「5回のなぜ」です。回数自体よりも、具体的なアクション（装置改良やルール新設）が打てる深さまで掘り下げることが重要です。"},{"m":13,"q":"具体例②の事務現場で、新人とベテランが同じミスを犯したことから得られた教訓は何ですか？","o":["ベテランも新人も能力が低い","人に問題があるのではなく、ミスを犯しやすい「状況（保管方法やルール）」に問題がある","誰がやってもミスは防げない","運が悪かった"],"h":"複数の人が同じミスをする場合、そこには「ミスの落とし穴」が掘られています。","c":1,"e":"三現主義（現場・現物・現実）で観察し、似た製品が隣にある等の「物理的な誘因」を見つけることが、論理的な解決への第一歩です。"},{"m":13,"q":"具体例②で導入された、バーコードスキャンをしないと出荷できないようにする物理的な仕組みを何と呼びますか？","o":["抜き取り検査","ポカヨケ（フールプルーフ）","精神注入","監視カメラ"],"h":"「間違えたくても、間違えられない」ようにする工夫のことです。","c":1,"e":"ポカヨケを導入することで、作業者の「注意力」という不安定なリソースに頼らず、100%の品質保証をシステムで実現できます。"},{"m":13,"q":"「なぜなぜ分析」の結果、導き出された新しいルールや対策を、組織の共通財産として定着させるために行うべきことは何ですか？","o":["担当者のメモに残す","作業標準（マニュアル）を改訂し、周知する","朝礼で一度だけ話す","秘密にする"],"h":"「最高のやり方」を固定し、維持管理するサイクル（SDCA）が必要です。","c":1,"e":"分析で得た知恵を標準化することで、初めて組織の「体質」が強化されます。標準のないところに、継続的改善はありません。"},{"m":13,"q":"「なぜなぜ分析」を行う際、最も重視すべき姿勢（視点）はどれですか？","o":["誰が犯人かを見つける「犯人捜し」","現場・現物・現実に基づく「三現主義」","過去の報告書を写す「前例踏襲」","難しい言葉を使う「専門性」"],"h":"答えは会議室ではなく、常に「事件が起きている場所」にあります。","c":1,"e":"現物を前にして「なぜ」を問わなければ、想像上の原因（空論）に振り回され、的外れな対策を打つことになってしまいます。"},{"m":13,"q":"本研修において、不適合（トラブル）をどのように表現していましたか？","o":["隠すべき恥","仕組みを改善するための「宝物」","担当者の成績を下げる材料","避けて通れない災難"],"h":"不具合が起きるということは、システムの「弱点」を教えてくれているということです。","c":1,"e":"不適合をポジティブに捉え、真因を追求する材料にすることで、組織は失敗するたびに強くなることができます。"},{"m":13,"q":"「なぜなぜ分析」を成功させるためのファシリテーション（司会）として、不適切な行動はどれですか？","o":["「なぜ」が個人の誹謗中傷にならないよう配慮する","「なぜ」を論理的につなげる（逆から読んで「だから」で繋がるか確認する）","対策が「教育の徹底」だけで終わるのを許容する","現場の作業者の意見を尊重する"],"h":"「教育の徹底」は、仕組みの改善から逃げている証拠かもしれません。","c":2,"e":"「教育の徹底」は、往々にして「仕組みの不備」を放置することに繋がります。教育が必要なのは当然として、その上で「教育がなくてもミスしない仕組み」を考えるのがプロの仕事です。"},{"m":14,"q":"検出された不適合そのものを除去したり、不具合を直したりする「応急的な処置」を何と呼びますか？","o":["是正処置","修正（修正処置）","予防処置","放置"],"h":"目の前の火を消す「対症療法」のことです。","c":1,"e":"不適合な製品を直す、あるいは不良品を良品と交換するといった、その場での対応が「修正」に当たります。"},{"m":14,"q":"不適合の「原因」を特定して除去し、二度と同じトラブルが起きないようにする処置を何と呼びますか？","o":["修正","是正処置","返品","謝罪"],"h":"「なぜ起きたのか」を突き止め、仕組みを直す「原因療法」のことです。","c":1,"e":"是正処置の目的は「再発防止」です。不適合が起きた背景にあるルールや設備の欠陥を改善することを指します。"},{"m":14,"q":"具体例①の機械故障において、切れたヒューズを新しいものに交換した作業はどちらに該当しますか？","o":["修正（修正処置）","是正処置","どちらでもない","設備投資"],"h":"とりあえず動くようにした「応急処置」です。","c":0,"e":"ヒューズを替えるだけでは、過負荷の原因が残っているため、いずれまた同じ故障が起きてしまいます。"},{"m":14,"q":"具体例①で、最終的に「濾過装置を設置した」ことはどちらに該当しますか？","o":["修正","是正処置","単なる掃除","備品購入"],"h":"「なぜヒューズが切れたのか」という根本原因に対する恒久的な対策です。","c":1,"e":"金属粉を取り除く仕組み（濾過装置）を作ることで、ベアリングの摩耗を防ぎ、ヒューズ切れという現象を根底から断ち切っています。"},{"m":14,"q":"再発防止のために「なぜ」を5回繰り返すなどして、問題の奥底に隠れた原因を探る手法を何と呼びますか？","o":["犯人探し","なぜなぜ分析","多数決","精神注入"],"h":"表面的な事象を突き抜け、仕組みの不備に辿り着くための思考法です。","c":1,"e":"「なぜなぜ分析」を丁寧に行うことで、個人の不注意のせいにせず、論理的な是正処置を導き出すことができます。\n\n[Image showing the 5 Whys technique flowing from Symptom to Root Cause]"},{"m":14,"q":"具体例②のファミレスで、店長が店員に「次は注意しろ」と叱ったことは、有効な「是正処置」と言えますか？","o":["はい、厳しく言えばミスはなくなる","いいえ、個人の注意力（KKD）に頼る対策は、仕組みの改善ではないため再発のリスクが残る","はい、教育は是正処置の基本である","どちらとも言えない"],"h":"人が変わっても、同じミスが起きない「仕組み」になっているかを考えます。","c":1,"e":"精神論は是正処置ではありません。誰が担当しても間違えようのない「システムの変更」や「標準化」こそが是正処置です。"},{"m":14,"q":"具体例②で導入された「ハンディ端末での復唱必須化」は、どのような効果を狙ったものですか？","o":["作業をわざと遅らせる","個人の記憶力に頼らず、仕組み（システム）でミスを防止する","端末の故障を防ぐ","お客様を急がせる"],"h":"「うっかり」を物理的・論理的に防ぐ「ポカヨケ」の考え方です。","c":1,"e":"人間の不注意を前提とし、それを補完するルールを組み込むことで、確実な再発防止を実現しています。"},{"m":14,"q":"是正処置で決まった新しいルールを組織に定着させるために、最後に行うべきことは何ですか？","o":["誰にも教えない","作業標準書やマニュアルに反映し、周知・教育する","朝礼で一度だけ話す","担当者のメモに残す"],"h":"「最高のやり方（標準）」を固定し、維持管理するサイクル（SDCA）が必要です。","c":1,"e":"仕組みの改善結果をドキュメント化し、全員に共有して初めて、組織の知識（形式知）として蓄積されます。"},{"m":14,"q":"本研修のまとめとして、修正と是正の違いを何に例えていましたか？","o":["豪華なフルコース","「雨漏りの対処（水を拭くか、屋根を直すか）」","終わりなき旅","秘密の暗号"],"h":"床を拭くだけでは、また雨が降ったときに濡れてしまいます。","c":1,"e":"「屋根（仕組み）を直す」ことこそが是正処置の本質であり、組織を強くする鍵となります。"},{"m":14,"q":"不適合（トラブル）が発生した際、品質管理のプロフェッショナルとして持つべき視点はどれですか？","o":["隠してなかったことにする","不適合は、仕組みを改善するための「宝物（チャンス）」であると捉える","誰のせいか犯人探しを優先する","運が悪かったと諦める"],"h":"不具合は、システムの「弱点」を教えてくれている貴重なサインです。","c":1,"e":"不適合をきっかけに「なぜ」を深掘りすることで、組織の体質をより強固なものに変えていくことができます。"},{"m":15,"q":"品質管理（QC）において、意思決定を行う際に最も避けるべき「KKD」とは何の略ですか？","o":["計画・記録・実行","経験・勘・度胸","効率・期待・努力","過去・現在・未来"],"h":"客観的なデータに基づかない、主観的な判断基準のことです。","c":1,"e":"長年の経験や勘は大切ですが、それだけに頼ると「思い込み」によるミスを招きます。QC七つ道具を使い、客観的なデータ（事実）で語ることが鉄則です。"},{"m":15,"q":"100個のデータを集め、その「ばらつき」の姿を山の形で視覚化し、規格外れの有無を一目で判別する手法は何ですか？","o":["パレート図","ヒストグラム","組織図","連絡網"],"h":"データの塊がどこに集中し、どの程度広がっているかを見るための柱状グラフです。","c":1,"e":"ヒストグラム（柱状グラフ）を作成することで、平均値だけでは見えない「プロセスの実力」や「異常な山の形」を直感的に把握できます。"},{"m":15,"q":"具体例①の新倉くんが行った、データを「1号機」と「2号機」のようにグループ別に分けて分析する手法を何と呼びますか？","o":["削除","層別（そうべつ）","隠蔽","圧縮"],"h":"「全体」を「機械別」「人別」「材料別」などの項目（レイヤー）で切り分ける手法です。","c":1,"e":"層別は問題解決の近道です。混ぜこぜのデータを分けることで、特定の要因（ここでは1号機）が問題を引き起こしている事実が浮き彫りになります。"},{"m":15,"q":"時間の経過とともにデータがどのように変化しているか（傾向）を監視し、工程が安定しているか（統計的管理状態）を判断する図は何ですか？","o":["特性要因図","管理図","似顔絵","世界地図"],"h":"折れ線グラフに管理限界線を加え、プロセスの「不整脈」を見つけるためのツールです。","c":1,"e":"管理図を使うことで、徐々に数値が上がっていくなどの「異常な傾向」をいち早く察知し、不良が出る前に対策（予防処置）を打つことが可能になります。"},{"m":15,"q":"具体例②の事務部門で、多くのトラブルの中から「解決すべき少数の重要な項目」を特定するために用いた図は何ですか？","o":["円グラフ","パレート図","系統図","散布図"],"h":"「件数の多い順」に並べ、累積比率を重ねることで、どこを攻めれば効果が大きいかを示す図です。","c":1,"e":"パレート図は「重点指向」を実現するための道具です。全トラブルの80%を占める20%の原因を叩くことで、効率的に最大の成果を上げることができます。"},{"m":15,"q":"問題（結果）に対して、どのような要因（原因）が関係しているかを「魚の骨」のような図で整理する手法は何ですか？","o":["チェックシート","特性要因図","散布図","棒グラフ"],"h":"4M（人、機械、材料、方法）などの視点から、原因を深掘りする図です。","c":1,"e":"特性要因図（フィッシュボーン図）を使うことで、関係者の知恵を構造的に整理し、真の原因（真因）の仮説を立てることができます。\n\nShutterstock"},{"m":15,"q":"現場で起きている事象を漏れなく、かつ客観的に記録するために、最初に使用すべき道具は何ですか？","o":["パレート図","チェックシート","管理図","ヒストグラム"],"h":"「正」の字を書いたり、チェックを入れたりして事実を積み上げるための表です。","c":1,"e":"チェックシートはデータの収集源です。これが正確でないと、その後の分析（パレート図など）も全て誤ったものになってしまいます。"},{"m":15,"q":"本研修の「重点指向」という考え方において、正しい姿勢はどれですか？","o":["全ての問題を同時に、少しずつ解決する","結果への効果が大きい要因に高い優先順位をつけて、集中的に取り組む","難しそうな問題は後回しにする","自分の好きな問題から取り組む"],"h":"リソースは有限です。「安易なこと」ではなく「効果が高いこと」を選びます。","c":1,"e":"パレート図などで特定された「Aランク」の課題に集中することで、最短で組織のパフォーマンスを向上させることができます。"},{"m":15,"q":"改善活動が終わった後、良い状態を維持するために行うべき活動は何ですか？","o":["改善したことを忘れる","標準化（マニュアル改訂）を行い、SDCAサイクルを回す","次のトラブルが起きるまで何もしない","担当者の記憶に頼る"],"h":"「最高のやり方（型）」を固定し、維持管理するサイクルが必要です。","c":1,"e":"標準（S）を決め、それを維持するサイクルを確立して初めて、次の改善（PDCA）へのステップアップが可能になります。"},{"m":15,"q":"本研修のまとめとして、QC七つ道具を何に例えていましたか？","o":["豪華なフルコース","暗闇を照らす「懐中電灯」","終わりなき旅","秘密の暗号"],"h":"現場の「よくわからない問題」に光を当て、解決策を見えるようにするイメージです。","c":1,"e":"QC道具は、事実を可視化し、迷いを取り除くための「道具」です。これらを使いこなすことで、誰でも科学的な問題解決が可能になります。"},{"m":16,"q":"PDCAサイクルがうまく回らず、同じ失敗を繰り返してしまう「プラン・ドゥ、プラン・ドゥの悪循環」に陥る最大の原因は何ですか？","o":["計画（P）が細かすぎること","実行（D）する時間が足りないこと","評価（C）による原因分析と、それに基づく改善処置（A）が不十分だから","予算が足りないから"],"h":"「やりっぱなし」で終わってしまい、次に活かされていない状態を指します。","c":2,"e":"結果に対する「なぜ（Check）」と、仕組みを直す「処置（Act）」が欠落すると、サイクルは螺旋状に向上せず、同じ場所を堂々巡りすることになります。"},{"m":16,"q":"PDCAサイクルにおいて、一巡するごとに管理レベルが階段状に向上していく状態を何と呼びますか？","o":["ステップダウン","スパイラルアップ（螺旋状の向上）","現状維持","スローダウン"],"h":"前回の反省を次の計画に活かし、どんどん「型」が磨かれていくイメージです。","c":1,"e":"失敗を「仕組みの欠陥」として捉え、標準を書き換えることで、組織の実行力は回を追うごとに高まっていきます。"},{"m":16,"q":"具体例①の「焦げ付き不良」が発生した際、最も避けるべき「誤った原因分析」はどれですか？","o":["砂糖の溶解不足","作業者の「注意力が散漫だった（不注意）」","撹拌時間の不足","標準作業書の不備"],"h":"これを原因にすると、対策が「気をつける」という精神論に逃げてしまいます。","c":1,"e":"「不注意」は結果であって原因ではありません。なぜ不注意が起きる状況だったのか、なぜ不注意があっても防げなかったのかという「仕組み」を問う必要があります。"},{"m":16,"q":"具体例①で突き止めた真の原因（真因）は何でしたか？","o":["12月が寒かったから","砂糖の質が悪かったから","仕込み量が増えた場合の「最適な撹拌条件」が標準に定められていなかったから","休憩時間が短かったから"],"h":"「いつも通り」が通用しない変化（繁忙期）に対応できていませんでした。","c":2,"e":"条件が変わっても同じ結果を出すためには、その変化（4Mの変化）を想定した「標準」が必要です。"},{"m":16,"q":"PDCAの「Act（処置）」において、再発防止のために最も有効な行動はどれですか？","o":["担当者に反省文を書かせる","朝礼で厳しく注意する","標準作業書やルールを改訂（仕組みを更新）する","次回まで様子を見る"],"h":"「人」に頼るのではなく、「システム（型）」を書き換えます。","c":2,"e":"是正処置のゴールは、誰がやっても同じミスが起きない「仕組み」を作ることです。標準の更新こそが、組織の知識（形式知）を蓄積する行為です。"},{"m":16,"q":"具体例②のITプロジェクトで、進捗が「ほぼ完了」という曖昧な報告（主観）になってしまった原因は何ですか？","o":["担当者が嘘をついたから","「何がどの状態になれば完了か」という客観的な完了基準が曖昧だったから","パソコンの性能が低かったから","会議が長すぎたから"],"h":"「終わった」の定義が人によってバラバラ（暗黙知）な状態でした。","c":1,"e":"管理（Check）を機能させるには、誰が見ても進捗が判断できる「モノサシ（基準）」を計画（Plan）の段階で用意しておく必要があります。"},{"m":16,"q":"具体例②で導入された、計画と実績の「差異」を数値で測定し、原因を特定する分析を何と呼びますか？","o":["損得分析","バリアンス（差異）分析","感情分析","多数決分析"],"h":"「予定より10%遅れているのはなぜか？」を事実に基づいて掘り下げます。","c":1,"e":"客観的な数値での「差異」を直視することで、問題が小さいうちに「Act（処置）」を打つことが可能になります。"},{"m":16,"q":"PDCAを回す前提として、まず「決めた標準を維持し、定着させる」サイクルを何と呼びますか？","o":["SDCAサイクル","ABCDサイクル","3Mサイクル","5Sサイクル"],"h":"Standardization（標準化）から始まる、守りのサイクルです。","c":0,"e":"「標準（S）」のないところに「改善（P）」はありません。まずは決めたことをチャンとやる（SDCA）土台があってこそ、現状を打破するPDCAが活きます。"},{"m":16,"q":"研修のまとめとして、計画の未達や不適合をどのように捉えるべきだと述べていましたか？","o":["担当者を責めるための材料","運が悪かったという災難","「仕組みを良くするための宝物」","隠すべき恥"],"h":"不具合は、現在のプロセスの「弱点」を教えてくれている貴重なサインです。","c":2,"e":"失敗を「宝物」として歓迎し、なぜなぜ分析で「仕組みの改善」に繋げる文化こそが、強い現場を作ります。"},{"m":16,"q":"PDCAサイクルにおける「Check（評価）」を正しく行うための鉄則は何ですか？","o":["主観を捨て、事実やデータで語る","自分の勘を信じる","上司の顔色を伺う","良い数字だけを報告する"],"h":"「だいたい大丈夫」という言葉を捨て、客観的な証拠（エビデンス）に向き合います。","c":0,"e":"「三現主義（現場・現物・現実）」に基づいたデータこそが、正しい「Act（処置）」を導き出す唯一の羅針盤になります。"},{"m":17,"q":"PL法（製造物責任法）において、メーカーが損害賠償責任を負うことになる「直接の根拠」は何ですか？","o":["メーカーに明らかな「過失（不注意）」があったこと","製品に「欠陥」があったこと","製品が売れなかったこと","顧客が製品を嫌いになったこと"],"h":"民法と違い、メーカーの不注意を証明する必要はなく、製品そのものの不備に注目します。","c":1,"e":"PL法は「無過失責任」を採用しています。メーカーに落ち度がなくても、製品に「通常有すべき安全性」が欠けている（＝欠陥がある）と判断されれば、責任を免れません。"},{"m":17,"q":"PL法で定義される「3つの欠陥」の区分として、正しい組み合わせはどれですか？","o":["安い、遅い、悪い","設計上の欠陥、製造上の欠陥、指示・表示上の欠陥","見た目の欠陥、重さの欠陥、色の欠陥","過去の欠陥、現在の欠陥、未来の欠陥"],"h":"「作り方のミス」だけでなく、「考え方のミス」や「説明のミス」も含まれます。","c":1,"e":"製品の安全設計（設計）、工場のラインでのバラツキ（製造）、そして取扱説明書やラベルでの警告（指示・表示）の3点すべてが揃って初めて安全とみなされます。"},{"m":17,"q":"具体例①のトラック事故において、メーカーが当初主張した「ユーザーの整備不良」は、後にどのような事実によって否定されましたか？","o":["ユーザーが毎日掃除をしていたから","製品自体の「設計上の強度不足」と検証不足が判明したから","運転手の運転が上手だったから","トラックの色が赤かったから"],"h":"「使い手」ではなく「造り手」の設計思想そのものに問題がありました。","c":1,"e":"特定の1台だけでなく、その設計の製品すべてに共通するリスクがある場合、それは「設計上の欠陥」となり、大規模なリコールの対象となります。"},{"m":17,"q":"設計段階で潜在的な故障を予測し、リスクを定量的に評価して対策を講じる品質管理の手法を何と呼びますか？","o":["5S活動","FMEA（故障モード影響解析）","3M排除","整理整頓"],"h":"「もしここが壊れたらどうなるか？」を事前にシミュレーションする手法です。","c":1,"e":"FMEAを実施し、その記録（議事録）を残しておくことは、万が一の訴訟において「最善の安全設計を尽くした」という防御証拠（PLD）になります。"},{"m":17,"q":"新製品の量産前に、計算上の理論値だけでなく、実機で過酷な条件を与えて安全性を確かめるテストを何と呼びますか？","o":["お祝いテスト","いじわるテスト（妥当性確認）","試食テスト","最終検査"],"h":"ユーザーの誤使用や極限状態を想定し、あえて壊れるかどうかを試す試験です。","c":1,"e":"「通常予測される誤使用」に対しても安全であるかを確認することは、PL法対策（PLP）において極めて重要なステップです。"},{"m":17,"q":"具体例②のカセットボンベ事故において、裁判所が損害賠償を命じた直接の原因（欠陥の区分）は何ですか？","o":["製造上の欠陥","指示・表示上の欠陥（警告ラベルの誤記）","設計上の欠陥","飲食店の接客の欠陥"],"h":"製品の爆発そのものではなく、ラベルの「翻訳ミス」が致命傷となりました。","c":1,"e":"製品自体に物理的な故障がなくても、安全に使うための情報提供（警告）が間違っていれば、それは法的欠陥とみなされます。"},{"m":17,"q":"海外展開をする際、言葉が通じないユーザーにも危険を直感的に伝えるために、警告ラベルに用いるべき工夫はどれですか？","o":["長い文章で詳しく書く","ピクトグラフ（図記号）を活用する","小さな文字でびっしり書く","秘密にしておく"],"h":"「一目で危ないとわかる」デザインが、ユーザーの命と企業を守ります。","c":1,"e":"ピクトグラフは言語の壁を越えます。警告表示は「読ませる」のではなく「気づかせる」ことが目的です。"},{"m":17,"q":"万が一のPL訴訟において、メーカーが「通常有すべき安全性を備えていた」ことを証明するために、日頃から保存しておくべきものは何ですか？","o":["社員の集合写真","設計審査（DR）の記録、テストデータ、検査記録などの「客観的証拠」","昨年の年賀状","飲み会の領収書"],"h":"裁判で唯一通用するのは、感情ではなく「記録（エビデンス）」です。","c":1,"e":"これらの記録（PLD：防御対策）が適切に管理されていることが、企業の法的防御力を決定づけます。"},{"m":17,"q":"PL事故や重大な不具合が発覚した際、被害を最小限に食い止めるために最も重要な「組織のあり方」は何ですか？","o":["悪い情報を隠蔽する","悪い情報ほど早く経営陣に届く風通しの良さと、迅速なリコール判断","犯人を特定してクビにする","嵐が過ぎ去るのを待つ"],"h":"隠蔽は致命的なダメージを招きます。初動の速さが企業の生死を分けます。","c":1,"e":"欠陥の疑いがある場合、迅速に「封じ込め（リコール等）」を判断できるトップ主導の体制こそが、究極の防衛戦略です。"},{"m":17,"q":"本研修のまとめとして、PL対策をどのように位置づけていましたか？","o":["無駄な「コスト」","企業が永続するための「投資」","形式的な「事務作業」","運任せの「守り」"],"h":"安全を守ることは、顧客を守ることであると同時に、自社を守ることでもあります。","c":1,"e":"安全への投資を惜しむことは、将来の壊滅的な賠償リスクを背負うことと同じです。PLマインドを全社に浸透させることが不可欠です。"},{"m":18,"q":"ISO 31000において、「リスク」はどのように定義されていますか？","o":["避けるべき危険な事象","目標に対する「不確実性の影響」","過去に起きた失敗の記録","誰にも予測できない不運"],"h":"良い方向（機会）への振れも、悪い方向（脅威）への振れも含まれます。","c":1,"e":"リスクとは、組織の目標達成に影響を与える「不確実性」そのものを指します。これには、期待からマイナスに外れる「脅威」と、プラスに外れる「機会」の両面があります。"},{"m":18,"q":"リスクマネジメントの本来の目的として、最も適切なものはどれですか？","o":["すべてのリスクをゼロにすること","組織の目標達成を支援し、価値を創造・保護すること","責任の所在を明確にして誰かを罰すること","保険に入って安心すること"],"h":"「何もしないこと」のリスクも考慮し、合理的な判断を下すための活動です。","c":1,"e":"リスクマネジメントは、不確実性を適切に管理することで、組織が掲げる目標をより確実に達成し、持続的な成長を実現するために行われます。"},{"m":18,"q":"具体例①の製造メーカーが直面した「売りそこないのリスク」の根本原因は何でしたか？","o":["災害が起きた運の悪さ","コスト削減を優先し、単一サプライヤーへの依存（ボトルネック）というリスクを放置していたこと","従業員の作業ミス","製品の設計ミス"],"h":"平時の効率性（安さ）の裏に、有事の脆弱性が隠れていました。","c":1,"e":"効率性を追求するあまり、供給網の途絶という「不確実性」の影響を過小評価し、代替手段（リスク対応）を講じていなかったことが原因です。"},{"m":18,"q":"リスクを特定し、その性質を分析し、対応の優先順位を決めるための一連のプロセスを何と呼びますか？","o":["リスクアセスメント","リスク回避","リスクの放置","リスクの隠蔽"],"h":"「特定」「分析」「評価」の3ステップで構成される活動です。","c":0,"e":"リスクアセスメントを行うことで、どのリスクに重点的にリソース（人・モノ・金）を投入すべきか、客観的な根拠に基づいて判断できます。"},{"m":18,"q":"具体例①で行われた「災害保険への加入」は、リスク対応の分類においてどれに該当しますか？","o":["リスク回避（やめる）","リスク低減（改善する）","リスク共有（移転する）","リスク保有（何もしない）"],"h":"損失の経済的な影響を、保険会社などと分かち合う方法です。","c":2,"e":"保険やアウトソーシングなどは、リスクの影響を他者と分かち合う「リスク共有（移転）」の典型的な手法です。"},{"m":18,"q":"具体例②のIT企業において、経営陣が陥っていた「保守的な判断」の弊害は何ですか？","o":["投資をしすぎて倒産すること","「機会を追求しないこと」による、将来の収益喪失や市場での立ち遅れというリスク","社員の給料が上がること","事務作業が増えること"],"h":"「現状維持」は、変化の激しい市場では「後退」と同じリスクを孕んでいます。","c":1,"e":"リスクマネジメントは、損失を防ぐだけでなく、好ましい結果をもたらす「機会」を最適化し、チャンスを逃さないための道具でもあります。"},{"m":18,"q":"具体例②で導入された、少額のパイロット版から段階的に投資を判断する柔軟な戦略を何と呼びますか？","o":["どんぶり勘定","オプション思考（学習オプション）","全か無かの法則","運任せ"],"h":"「事実（結果）」を確認しながら、次のステップに進むかどうかを判断する手法です。","c":1,"e":"不確実性が高い場合、一度に全額を投じるのではなく、段階的に情報を得て判断を修正する手法が、リスクと便益のバランスを取る上で有効です。"},{"m":18,"q":"リスクマネジメントにおける「意思決定者（経営層）」の役割として、正しいものはどれですか？","o":["リスクアセスメントの結果を無視して独断で決める","リスクアセスメントから得られた合理的な情報に基づき、リスクを「引き受けるか、避けるか」の最終判断を下す","担当者にすべての責任を押し付ける","結論が出るまで会議を先延ばしにする"],"h":"リスクマネジメントは、経営者が迷いなく決断するための「判断材料」を提供します。","c":1,"e":"経営者が「どの程度のリスクなら許容できるか（リスク選好）」を定義し、事実に基づいた選択を行うことが、組織のレジリエンス（回復力）を高めます。"},{"m":18,"q":"リスクマネジメントにおいて、一度評価した内容を定期的に見直すべき理由は何ですか？","o":["書類の枚数を増やすため","市場環境や社会情勢などの「不確実性の状況」は常に変化し続けているから","暇つぶしのため","規則で決まっているから"],"h":"昨日の「安全」が、今日の「危険」に変わる可能性があるからです。","c":1,"e":"リスクは動的です。PDCAサイクルを回し、常に最新の外部・内部状況を反映させてリスクを再評価（モニタリング）し続けることが不可欠です。"},{"m":18,"q":"本研修のまとめとして、リスクマネジメントを何に例えていましたか？","o":["豪華なフルコース","変化の激しい現代を生き抜くための「知的な武装」","終わりなき旅","秘密の暗号"],"h":"不確実な事象を「恐れる対象」から「管理し活用する対象」に変えるイメージです。","c":1,"e":"リスクを正しく理解し、コントロール可能な範囲で引き受ける「知的な武装」を整えることで、組織は自信を持って新しい価値創造に挑むことができます。"},{"m":19,"q":"本研修のテーマである「安全なくして生産なし」が意味する、正しい考え方はどれですか？","o":["納期が厳しい時は、多少の危険には目をつぶって生産を優先する","安全対策はコストがかかるため、利益が出た時だけ実施する","安全こそが生産の土台であり、安全を積み重ねることが企業の存続に直結する","安全は安全担当者の責任であり、作業者は生産のことだけを考える"],"h":"安全と生産性は天秤にかけるものではありません。","c":2,"e":"安全を損なうことは、結果として生産停止や社会的信用の失墜を招き、経営そのものを危うくします。安全は「生産の絶対条件」です。"},{"m":19,"q":"重大な事故が発生する前には、必ず多くの「ヒヤリとしたり、ハッとしたりする出来事」が隠れているという法則を何と呼びますか？","o":["パレートの法則","ハインリッヒの法則","5Sの法則","ニュートンの法則"],"h":"「1：29：300」の比率で知られる、安全管理の基本法則です。","c":1,"e":"1件の重大事故の背後には300件のヒヤリハットが潜んでいます。この小さな予兆を潰すことが、大事故を防ぐ唯一の道です。"},{"m":19,"q":"具体例①において、ベテラン作業員が異音を感じながら報告しなかった「心理的な罠」は何ですか？","o":["装置の仕組みを知らなかった","「今は忙しいし、後で確認すれば大丈夫だろう」という根拠のない安心感（正常性バイアス）","報告書を書くのが面倒だった","機械が壊れるのを期待していた"],"h":"「いつも通り」という油断が、危険のサインを見逃させました。","c":1,"e":"「ハズ・ダロウ」という思い込みや、生産の遅れに対する焦りは、正常な判断を狂わせる最大の敵です。"},{"m":19,"q":"装置のカバーを開けると自動的に電源が切れ、物理的に手が触れられないようにする安全機能を何と呼びますか？","o":["インターネット","インターロック","タイムカード","リセットボタン"],"h":"「うっかり」や「無理な作業」をシステム側で拒否する仕組みです。","c":1,"e":"人の注意に頼るのではなく、機械の構造で安全を確保することを「本質安全化」と呼びます。"},{"m":19,"q":"異常が発生した際、机上で考えず「現場・現物・現実」を直視して原因を探る姿勢を何と呼びますか？","o":["三現主義（さんげんしゅぎ）","成果主義","楽観主義","合理主義"],"h":"答えは常に、事件が起きている場所にあります。","c":0,"e":"データや報告書だけでは分からない「真実」は、現場で現物を観察し、現実の挙動を確認することで初めて見えてきます。"},{"m":19,"q":"具体例②の物流センターで、5Sが形骸化していたことによって起きていた「悪影響」は何ですか？","o":["掃除用具の代金がかさむ","モノを探すムダや歩行ロスの発生、および転倒などの小災害の頻発","事務所が静かすぎる","休憩時間が長くなる"],"h":"乱れた職場は、物理的な危険だけでなく、作業者の集中力も削ぎます。","c":1,"e":"5Sの乱れは「管理の劣化」のサインです。整理整頓ができていない職場では、異常に気づくのが遅れ、事故やミスが多発します。"},{"m":19,"q":"作業者の腰から肩の高さの範囲など、無理な姿勢をとらずに効率よく動ける作業範囲を何と呼びますか？","o":["安全地帯","ストライクゾーン","フリーエリア","ゴールライン"],"h":"野球の用語を転用した、身体への負担が少ない領域のことです。","c":1,"e":"ストライクゾーンに工具や部品を配置することで、「ムリな姿勢」による疲労や怪我を防ぎ、作業スピードも向上します。"},{"m":19,"q":"「汚れが目立つ白い作業服」を導入した本来の目的は何ですか？","o":["見た目をきれいにするため","油漏れなどのわずかな設備異常に敏感になり、早期発見する感性を養うため","漂白剤の売上を伸ばすため","夜間に目立つようにするため"],"h":"「汚れ」を情報の欠陥（異常）として捉えるための工夫です。","c":1,"e":"清潔な環境を作ることは、異常を「見える化」することです。汚れに気づく感性を磨くことが、予防保全と安全に繋がります。"},{"m":19,"q":"本研修のまとめとして、安全管理を何に例えていましたか？","o":["豪華なフルコース","変化の激しい現代を生き抜くための「知的な武装」","生産活動を守る「大きなテント」","秘密の暗号"],"h":"全員で支え、穴が開いたらすぐに直さなければならないイメージです。","c":2,"e":"テント（安全）がしっかりしていなければ、中の活動（生産）は継続できません。全員でルールを守り、改善し続ける姿勢が不可欠です。"},{"m":19,"q":"明日から職場で実践すべき、最も基本的で重要なアクションは何ですか？","o":["難しい理論を暗記する","小さな違和感を見逃さず、声に出して報告・相談する","事故が起きるまで何もしない","自分の担当以外の場所には行かない"],"h":"「おや？」「おかしいな」という直感を大切にします。","c":1,"e":"安全な職場は、一人ひとりの「気づき」の共有から作られます。隠蔽せず、風通しを良くすることが最大の防御です。"},{"m":20,"q":"BCP（事業継続計画）の本来の目的として、最も適切なものはどれですか？","o":["事故を100%未然に防ぐこと","災害時に重要な業務を中断させない、あるいは目標時間内に復旧させること","従業員に休みを与えること","損害保険のパンフレットを配ること"],"h":"「リスクマネジメント（予防）」の次にある「危機管理（事後対応）」の計画です。","c":1,"e":"BCPは「何かが起きてしまった」ことを前提とし、その被害を最小限に抑え、顧客への供給責任を果たすための具体的な行動計画です。"},{"m":20,"q":"BCPを策定する際に、真っ先に明確にすべき「2つの重要ポイント」は何ですか？","o":["会社の歴史と社長の趣味","優先すべき重要業務の特定と、目標復旧時間（RTO）の設定","飲み会の場所と予算","昨年の売上と来年の予測"],"h":"「何を絶対に止めないか」「いつまでに直すか」を決めるのがBCPの骨子です。","c":1,"e":"リソースが限られる非常時には、すべての業務を同時に復旧させることはできません。重要な業務を絞り込み、復旧の期限（RTO）を定めることが不可欠です。"},{"m":20,"q":"具体例①の東日本大震災の教訓において、物資のミスマッチを防ぐために重要だとされた視点は何ですか？","o":["とにかく大量に送り続けること","供給側の都合ではなく、「需要側（被災者）」の属性やニーズを正確に掴むこと","広告をたくさん出すこと","運送会社を増やすこと"],"h":"「何をどれだけ送るか」を決めるのは、受け取り側の情報です。","c":1,"e":"情報の停滞は物流の停滞を招きます。避難所の人数や年齢構成などの「需要データ」と連動した配送システムこそが、真の事業継続を支えます。"},{"m":20,"q":"BCPにおいて、単にモノを蓄える（在庫）こと以上に重要視される「組織の能力」は何ですか？","o":["忍耐力","柔軟な対応力（復旧力）","記憶力","筋力"],"h":"情報のバックアップや代替ルートの確保など、状況に合わせて動ける力です。","c":1,"e":"在庫には限界がありますが、代替生産や拠点の分散といった「しなやかな仕組み」があれば、想定外の事態にも柔軟に対応できます。"},{"m":20,"q":"具体例②の工場火災において、電源復旧時に二次災害を防ぐために最初に行った「初動」は何ですか？","o":["装置の修理を始める","装置内の仕掛品（製品）を直ちに抽出し、識別管理を行う","消防署に電話するだけにする","全員で避難して何もしない"],"h":"停電から復旧した際の「再通電火災」や「製品の変質」を防ぐための処置です。","c":1,"e":"BCPにおける「初動」は、被害の拡大を防ぐために極めて重要です。現場の「現物」を安全に処置することが、その後のスムーズな復旧に繋がります。"},{"m":20,"q":"有事の際に、自社の被災した拠点の代わりに協力会社などで生産を開始する戦略を何と呼びますか？","o":["下請けへの丸投げ","代替生産（バーチャル・デュアル戦略など）","業務委託の解除","市場撤退"],"h":"「設計情報（レシピや金型）」をあらかじめ移動・共有しておくことで可能になります。","c":1,"e":"代替生産ルートを確保しておくことは、自社だけで設備を二重に持つ（デュアル）よりもコストを抑えつつ、高い継続性を確保できる戦略です。"},{"m":20,"q":"BCPを「形骸化」させないために、定期的に行うべき活動はどれですか？","o":["計画書の表紙をきれいにする","訓練（シミュレーション）を実施し、PDCAサイクルで計画を更新し続ける","金庫に厳重に保管する","忘年会の景品にする"],"h":"「作っただけ」の計画は、いざという時に全く役に立ちません。","c":1,"e":"環境や組織の変化に合わせて計画を磨き続ける「SDCA/PDCA」のプロセスそのものが、組織の危機管理能力を高めます。"},{"m":20,"q":"重大な災害が発生した際、経営陣の迅速な意思決定を助けるために現場が守るべき「報告の鉄則」は何ですか？","o":["良い情報だけを報告する","悪い情報ほど早く、正確に伝える","自分で解決できるまで隠す","1週間後にまとめて報告する"],"h":"情報の遅れは、判断の遅れ、ひいては組織の致命傷となります。","c":1,"e":"「悪い情報の即時共有」は、被害を最小限に食い止めるための「防衛のワクチン」です。"},{"m":20,"q":"本研修のまとめとして、BCPへの取り組みを何に例えていましたか？","o":["豪華なフルコース","未来の信頼を獲得するための「投資」","終わりなき旅","秘密の暗号"],"h":"安全や継続への備えは、顧客に「安心」という価値を届けるための活動です。","c":1,"e":"BCPは単なるコストではなく、企業のブランド価値を高め、永続的に生き残るための「攻めの守り」であると言えます。"},{"m":20,"q":"「備えあれば、憂いなし」。明日から職場で実践すべき「最初の一歩」は何ですか？","o":["巨大な倉庫を建てる","自部署の「絶対に止められない重要業務」は何かを考えてみる","誰かがやってくれるのを待つ","占いで吉凶を占う"],"h":"まずは、自分たちの仕事の「優先順位」を見直すことから始まります。","c":1,"e":"重要業務の特定はBCPの出発点です。日頃から「もし明日ここが止まったら？」と問いかける習慣が、強靭な組織を作ります。"},{"m":21,"q":"FMEA（故障モード影響解析）の本来の目的として、最も適切なものはどれですか？","o":["不具合が起きた後に、その原因を報告書にまとめること","設計や工程の段階で、潜在的な故障を予測し、未然に防ぐこと","検査員を増やして不良品を見逃さないようにすること","故障した製品を安く修理する方法を考えること"],"h":"「起きてから直す（是正）」ではなく、「起きる前に防ぐ（予防）」ための手法です。","c":1,"e":"FMEAは、製品が形になる前の設計段階や、ラインができる前の工程設計段階で、あらかじめ「何が起きそうか」を予測して対策を打つ「先手管理」の道具です。"},{"m":21,"q":"FMEAにおいて、リスクの大きさを客観的に評価するために算出する指数（RPN）の名称は何ですか？","o":["顧客満足指数","危険優先指数（リスク優先数）","生産効率指数","従業員幸福指数"],"h":"S（影響度）× O（発生度）× D（検出度）の掛け算で求められる数値です。","c":1,"e":"RPN（Risk Priority Number）を算出することで、数ある懸念事項の中から「どこを最優先で対策すべきか」という客観的な優先順位をつけることができます。"},{"m":21,"q":"RPNを構成する3要素のうち、故障が起きた際の影響の深刻さを表す「S」は何の略ですか？","o":["Speed（速度）","Severity（影響度・過酷度）","Safety（安全）","Standard（標準）"],"h":"「人命に関わるか」「法規制に触れるか」など、事の重大さを評価する指標です。","c":1,"e":"影響度（Severity）が高い項目（例：発火、脱輪）は、たとえ他の数値が低くても最優先で対策を検討しなければなりません。"},{"m":21,"q":"具体例①のトラックのハブ破損事例において、設計段階での「検証不足」を補うために有効な、過酷な条件で行うテストを何と呼びますか？","o":["お祝いテスト","いじわるテスト（妥当性確認）","試食テスト","動作確認テスト"],"h":"ユーザーの誤使用や極限状態を想定し、あえて壊れるかどうかを試す試験です。","c":1,"e":"コンピューター上の計算だけでなく、実機での「いじわるテスト」を行うことで、設計FMEA（DFMEA）で予測した故障モードが実際に起きないかを検証します。"},{"m":21,"q":"具体例②の電子基板の工程FMEA（PFMEA）において、逆付けの原因が「部品が左右対称であること」だと分かった場合、最も効果的な対策はどれですか？","o":["作業者に「もっと注意して」と教育する","検査員を2人に増やす","物理的に逆向きには入らない形状にする（ポカヨケ設計）","拡大鏡を導入する"],"h":"「人間はミスをする」という前提に立ち、物理的にミスを不可能にします。","c":2,"e":"ポカヨケを導入することで、発生度（O）を劇的に下げることができます。人の注意に頼る対策は、疲労や慣れによって必ず限界が来ます。"},{"m":21,"q":"FMEAを実施する際、設計者一人で行うのではなく、製造や品質保証などの多機能チームで行うべき理由は何ですか？","o":["一人だと寂しいから","多角的な視点を取り入れることで、リスクの見落とし（死角）を防ぐため","責任を全員で分散させるため","会議の時間を長くするため"],"h":"設計者が気づかない「造りにくさ」や「市場での壊れ方」を他部門が知っていることがあります。","c":1,"e":"部門横断的アプローチ（CFT）によって、設計・製造・品質・営業の知恵を結集することが、FMEAの精度を高める鍵となります。"},{"m":21,"q":"FMEAの運用において、RPN（危険優先指数）の数値が低ければ、影響度（S）が最高ランク（9〜10）であっても対策は不要ですか？","o":["はい、合計点が低ければ安全である","いいえ、重大事故に繋がる高いS値の項目は、RPNの値に関わらず優先的に対策すべきである","どちらでもよい","予算が余っていれば対策する"],"h":"「めったに起きないが、起きたら誰かが死ぬ」というリスクを放置してはいけません。","c":1,"e":"自動車産業などの規格では、S値が一定以上の場合は、RPNの合計値に関わらず特別な管理や対策を求めています。安全は数値遊びではありません。"},{"m":21,"q":"一度作成したFMEAのシートは、その後どのように扱うべきですか？","o":["承認されたら金庫に厳重に保管する","工程変更や不具合が発生するたびに更新する「生きた文書」として活用する","次の製品開発まで見ない","廃棄して新しく作り直す"],"h":"失敗の教訓や改善の結果を蓄積し続ける「組織の知識」の塊です。","c":1,"e":"FMEAを最新の状態に保つことで、過去の失敗を次の製品開発に確実に活かす「知の循環」が生まれます。"},{"m":21,"q":"FMEAにおける「検出度（D）」とは、どのような指標ですか？","o":["故障が起きる確率","故障が発生した際、または発生する前に、今の検査や仕組みで見つけ出せる確実性のこと","故障した部品の重さ","修理にかかる時間"],"h":"「ザルを細かくする」ことで、不良の流出を防ぐ能力のことです。","c":1,"e":"検出度を改善するには、自動検査機の導入やチェック項目の追加などが有効ですが、本質的には「発生度（O）」を下げる対策の方が上位とされます。"},{"m":21,"q":"本研修のまとめとして、FMEAを何に例えていましたか？","o":["豪華なフルコース","未来の失敗を現在で解決するための「タイムマシン」","終わりなき旅","秘密の暗号"],"h":"登山の事前シミュレーションのように、事前にリスクを潰しておくイメージです。","c":1,"e":"設計段階で将来の不具合を「既知の問題」として解決しておくことで、量産後のトラブルを激減させ、組織の信頼を守ることができます。"},{"m":22,"q":"組織における「方針（Policy）」の役割として、最も適切な説明はどれですか？","o":["社長が社員を厳しく監視するための道具","経営理念やビジョンを、その年度の具体的な目標と行動計画に変換した「羅針盤」","達成できなくても良い、単なる努力目標のスローガン","外部のコンサルタントに提出するための書類"],"h":"組織が向かうべき方向を示し、全員の力を結集させるためのガイドラインです。","c":1,"e":"方針管理は、組織のトップが示した戦略的な方向性を、各部門・各階層の具体的な目標へと連鎖（デプロイメント）させ、全社一丸となって達成を目指す活動です。"},{"m":22,"q":"社長が掲げた抽象的な「大目標」を、現場が実行できるように細かく分ける作業を何と呼びますか？","o":["目標の隠蔽","目標の分解・展開（ブレークダウン）","目標の丸投げ","目標の無視"],"h":"「生産性向上」という言葉を、「サイクルタイム短縮」などの具体的な活動に変えることです。","c":1,"e":"現場が「今日何をすべきか」を理解できるよう、大目標を具体的な手段（KPI）や計画（3W1H）にまで落とし込むことが方針管理の核心です。"},{"m":22,"q":"具体例①の機械加工メーカーにおいて、現場の否定的な声を「改善のチャンス」と捉えて方針を受け入れたのは誰ですか？","o":["社長","工場長","新入社員","外部の顧客"],"h":"経営層と現場をつなぎ、戦略を具体策へ落とし込むキーマンです。","c":1,"e":"管理職（ミドルマネジメント）の役割は、上からの目標を現場の納得感のある「挑戦」に変え、リソースを配分して実行を支援することにあります。"},{"m":22,"q":"具体例①で、進捗の遅れが「一目でわかる」ように通路に掲示したツールの名称は何ですか？","o":["社内報","生産管理板（見える化）","出勤簿","組織図"],"h":"計画と実績の差異（ギャップ）をリアルタイムで共有するための道具です。","c":1,"e":"「見える化」を行うことで、問題が小さいうちに「なぜ」を問い、迅速なリカバリー（Act）を打つことが可能になります。"},{"m":22,"q":"改善によって得られた新しい作業手順を、次回の未達を防ぐための「歯止め」として定着させる行為を何と呼びますか？","o":["自由化","標準化（標準作業書の改訂）","複雑化","隠蔽化"],"h":"「最高のやり方」を固定し、誰でも再現できるようにすることです。","c":1,"e":"「標準のないところに改善はない」と言われる通り、成功したプロセスを標準化（SDCA）して維持することが、組織の「スパイラルアップ」の条件です。"},{"m":22,"q":"具体例②の食品会社において、部門間の壁を壊して連携するために組織されたチームの名称は何ですか？","o":["事務局","CFT（部門横断的チーム / クロスファンクショナルチーム）","役員会","互助会"],"h":"営業、製造、物流などの専門家が集まり、共通の「顧客満足」を目指すチームです。","c":1,"e":"品質問題や顧客満足の向上は、一部門だけでは解決できません。CFTによる多角的な視点が、組織全体の「企業体質」を強化します。"},{"m":22,"q":"「注意しろ」という精神論ではなく、宛先間違いというミスを「仕組みの問題」として捉え直して行った対策はどれですか？","o":["担当者を叱責する","現場の知恵を盛り込んだ「画像付きの分かりやすいマニュアル」に刷新する","ミスをなかったことにする","2人1組で監視し合う"],"h":"人間はミスをするという前提に立ち、誰でも迷わない「ガイド」を作りました。","c":1,"e":"ヒューマンエラーは仕組みの欠陥の「結果」です。マニュアルの改善や視覚的な補助は、プロセスの脆弱性を補強する有効な「是正処置」となります。"},{"m":22,"q":"期末に、活動の結果やプロセスの有効性を経営陣が評価し、次年度の方針に反映させるプロセスをISO等では何と呼びますか？","o":["飲み会","マネジメントレビュー","採用面接","広告宣伝"],"h":"トップマネジメントが自らシステムの「健康診断」を行う場です。","c":1,"e":"マネジメントレビューを通じて、PDCAサイクルの「C（評価）」と「A（改善）」を組織全体で行うことが、持続的な成長（継続的改善）を保証します。"},{"m":22,"q":"方針管理を成功させるために、現場の改善活動（ボトムアップ）と何を融合させる必要がありますか？","o":["個人の趣味","トップダウンの方針展開","過去の失敗の隠蔽","給与の削減"],"h":"「社長の想い」と「現場の知恵」が同じ方向を向くことが重要です。","c":1,"e":"トップダウン（方向性）とボトムアップ（実行力）が噛み合うことで、戦略は単なる机上の空論から、利益を生む「現実の成果」へと変わります。"},{"m":22,"q":"本研修のまとめとして、方針管理と目標展開を何に例えていましたか？","o":["豪華なフルコースの献立","「大船団の航海」","終わりなき旅","秘密の暗号"],"h":"全員が旗艦（社長）の指し示す目的地を目指し、自分の帆を調整するイメージです。","c":1,"e":"全員が「自分の役割」と「共通の目的地」を結びつける。この「つながり」こそが、荒波（激しい市場環境）を乗り越える最強の団結力を生み出します。"},{"m":23,"q":"プロセスアプローチの基本的な考え方として、最も適切なものはどれですか？","o":["各部門が自分の仕事だけに集中し、他部署には干渉しないこと","組織内の活動を、相互に関連し合う一連の「流れ（システム）」として捉え、管理すること","最終製品の検査さえ厳しく行えば、途中の工程はどうでも良いとすること","責任の所在を明確にして、ミスをした部署を厳しく追及すること"],"h":"仕事を「点」ではなく「線」や「面」で捉える思考法です。","c":1,"e":"プロセスアプローチは、部門間の「接点」で起きる情報の停滞や誤解を防ぎ、インプットからアウトプットまでをスムーズにつなぐことで、組織全体のパフォーマンスを最大化させます。"},{"m":23,"q":"仕事を定義する際、「材料や情報（インプット）」を「成果物（アウトプット）」に変えるために必要なものを何と呼びますか？","o":["障害","資源（リソース）","偶然","廃棄物"],"h":"人、設備、資金、知識などがこれに当たります。","c":1,"e":"プロセスとは「インプットを資源（人・設備・環境など）によってアウトプットに変換する活動」です。この変換効率を高めることが改善の本質です。"},{"m":23,"q":"具体例①の機械メーカーで、部門間のつながりを視覚化するために用いられた「亀の形」をした分析図の名称は何ですか？","o":["カメ図","タートル図","スッポン図","ウサギ図"],"h":"「何を使って」「誰が」「どのような方法で」「何を確認するか」を整理するツールです。","c":1,"e":"タートル図（Turtle Diagram）を用いることで、各プロセスの要素（インプット、アウトプット、資源、手順、指標）が明確になり、部門間のインターフェース（接点）の不備が見えやすくなります。"},{"m":23,"q":"設計段階から製造や品質保証の担当者が参画し、同時並行で業務を進める手法を何と呼びますか？","o":["コンカレント・エンジニアリング","流れ作業","居残り残業","単独開発"],"h":"「後工程」の知恵を「前工程」に前倒しで取り入れる（フロントローディング）手法です。","c":0,"e":"プロセスを統合し、同時並行で進めることで、設計変更や手戻りを劇的に減らし、リードタイムを短縮することができます。"},{"m":23,"q":"具体例②の食品加工会社において、原材料から消費までの一連の連鎖を何と呼びますか？","o":["フードチェーン（供給連鎖）","グルメルート","食べ歩き","食料保管庫"],"h":"安全を一つのプロセスとして、農場から食卓までつなぐ考え方です。","c":0,"e":"フードチェーン全体を俯瞰することで、どこにリスク（ハザード）が潜んでいるかを特定し、プロセス全体で安全を保証する仕組みを構築できます。"},{"m":23,"q":"プロセスアプローチにおける「お客様」の定義として、正しいものはどれですか？","o":["製品を買ってくれる社外の人だけ","社外の顧客だけでなく、自分の仕事の結果を受け取る「後工程」の仲間もお客様である","社長と役員だけ","自分自身"],"h":"「後工程はお客様」という意識が、部門間の壁を壊す鍵となります。","c":1,"e":"次工程を「お客様」と見なすことで、不適合品の流出を防ぎ、相手が使いやすい（処理しやすい）アウトプットを提供しようとする動機が生まれます。"},{"m":23,"q":"個別の改善（点）を、プロセス全体の進化（線）へと繋げるために必要なサイクルは何ですか？","o":["5Sサイクル","PDCAサイクル","採用サイクル","決算サイクル"],"h":"計画し、実行し、評価し、改善処置をとる継続的な流れです。","c":1,"e":"プロセスの各段階でPDCAを回すだけでなく、それらを同期させることで、システム全体の有効性を継続的に高めることができます。"},{"m":23,"q":"プロセスのパフォーマンスを客観的なデータで評価するために設定する指標を何と呼びますか？","o":["ニックネーム","KPI（重要業績評価指標）","パスワード","合言葉"],"h":"「だいたい」という主観を捨て、事実で管理するための数値目標です。","c":1,"e":"適切なKPIを設定し、事実に基づいた管理（ファクト・コントロール）を行うことで、どこのプロセスにボトルネックがあるかを特定しやすくなります。"},{"m":23,"q":"本研修のまとめとして、プロセスアプローチを何に例えていましたか？","o":["豪華なフルコース","組織という「バトン」を繋ぐリレー","終わりなき旅","秘密の暗号"],"h":"個々の走者が速くても、受け渡し（連携）に失敗すれば勝てないという例えです。","c":1,"e":"部門間のスムーズなバトンパスこそが、プロセスアプローチの成功を象徴しています。"},{"m":23,"q":"プロセスアプローチを意識しない組織の状態を例えた比喩（メタファー）はどれですか？","o":["荒れ狂う海","ダムでせき止められ、淀みが生じた川","どこまでも続く砂漠","険しい山"],"h":"情報の滞留（ムダ）が発生している状態を指します。","c":1,"e":"プロセスの淀み（停滞）を取り除き、顧客満足という海へ向かって「淀みなく流れる大河」のような組織を目指すのが本研修のゴールです。"},{"m":24,"q":"リーダーシップの本質的な役割として、最も適切なものはどれですか？","o":["メンバーを厳しく監視し、サボらせないようにすること","組織の目的と方向性を一致させ、メンバーが自発的に目標達成に参画できる環境を創ること","すべての判断をリーダー一人が行い、スピードを上げること","嫌われないように、メンバーの機嫌を取り続けること"],"h":"「役職」ではなく、組織を活性化させる「機能」としての側面を考えます。","c":1,"e":"リーダーの役割は、個々の力を結集させ、メンバー自身が「自分の価値と可能性」に気づけるように支援することにあります。"},{"m":24,"q":"日々の誠実な対応や約束の履行によって、相手の心の中に蓄積されていく目に見えない貯えを何と呼びますか？","o":["普通預金","信頼口座","忍耐ポイント","勤怠スコア"],"h":"一度の裏切りで大きく引き出され、小さな誠実さでコツコツ貯まるものです。","c":1,"e":"信頼口座の残高が高い状態（相互信頼）では、多少のコミュニケーション不足があっても意図が正しく伝わり、スムーズに業務が進みます。"},{"m":24,"q":"周囲や相手を変えようとする前に、まず自分のあり方や行動を変えることで影響を広げる考え方を何と言いますか？","o":["アウトサイド・イン","インサイド・アウト","トップダウン","ボトムアップ"],"h":"「あいつが悪い」と外に原因を求めるのではなく、自分に何ができるかを問う姿勢です。","c":1,"e":"自分自身の「パラダイム（ものの見方）」を変え、行動で模範を示すことが、結果として周囲を動かす最も確実な道です。"},{"m":24,"q":"具体例①のリーダーAさんが陥っていた、部下を「自分の思い通りにコントロールしよう」とするものの見方のことを何と呼びますか？","o":["パラダイム","テクニック","スキル","趣味"],"h":"私たちが世界を見る時の「レンズ」のようなものです。","c":0,"e":"「部下は言わないと動かない」というパラダイム（固定観念）を持っていると、無意識に支配的な行動をとり、部下の主体性を奪ってしまいます。"},{"m":24,"q":"Aさんが信頼回復のために実践した「まず理解に徹する」ための具体的な行動はどれですか？","o":["自分の意見を先に述べる","自分の意見を挟まず、部下の話を最後まで「聴く」","命令書を詳しく書く","飲み会を強制する"],"h":"相手が「理解された」と感じるまで、真摯に耳を傾けることです。","c":1,"e":"「聴く」ことは信頼口座への最大の預け入れです。相手を理解しようとする姿勢が、閉ざされていた部下の心を開くきっかけになります。"},{"m":24,"q":"手段を細かく指示するのではなく、達成すべき「結果」に責任を持たせて、やり方は本人に任せることを何と呼びますか？","o":["丸投げ","エンパワーメント（権限委譲）","放置","命令"],"h":"部下を信じて「任せる」ことで、その潜在能力を引き出す手法です。","c":1,"e":"「どうやるか」まで指示されると人は「作業員」になりますが、「何を達成するか」を任されると「考える人（主役）」になります。"},{"m":24,"q":"エンパワーメントを行う際、手段は任せつつも共有しておくべき「守るべき最低限のルール」を何と呼びますか？","o":["法律","ガイドライン（または標準）","秘密","罰則"],"h":"自由勝手にさせるのではなく、外してはいけない「枠組み」を示すことです。","c":1,"e":"ガイドラインを明確にすることで、部下は迷いなく創意工夫を発揮でき、リーダーは大きなリスクを回避できます。"},{"m":24,"q":"部下が行ったプロセスや結果について、自ら説明し責任を持つことを何と呼びますか？","o":["言い訳","アカウンタビリティ（説明責任）","謝罪","報告"],"h":"「任されたこと」に対して、どのような工夫をしたかを報告する義務のことです。","c":1,"e":"定期的な報告の場（アカウンタビリティ）を設けることで、リーダーは状況を把握でき、部下は正当な評価を得る機会となります。"},{"m":24,"q":"具体例②のBさんが、仕事を任せることで確保できた時間は、本来どのような活動に充てるべきですか？","o":["趣味のゴルフ","「将来の計画」や「人づくり」といった、重要だが緊急ではない活動","さらなる残業","他人の仕事の監視"],"h":"リーダーにしかできない、組織の未来を創るための活動です。","c":1,"e":"現場のオペレーション（実行）を部下に任せることで、リーダーは「戦略」や「育成」という付加価値の高い業務に注力できるようになります。"},{"m":24,"q":"本研修のまとめとして、リーダーシップの定義をどのように述べていましたか？","o":["人を力で従わせること","人々に「その人の価値と可能性」を伝え、自分自身で見えるようにすること","誰よりも仕事が速いこと","給料をたくさんもらうこと"],"h":"相手が自分自身を信じ、自律的に動けるように導くイメージです。","c":1,"e":"リーダーの真の成功は、自分がいなくても回る組織、つまり「自律したフォロワー」をどれだけ育てたかで測られます。"},{"m":25,"q":"多能工化の定義として、最も適切なものはどれですか？","o":["1人の作業者が、一生同じ1つの工程だけを極めること","1人の作業者が、複数の異なる工程や作業を遂行できる能力を持つこと","1つの機械に多くの作業員を配置して監視すること","難しい作業をすべてロボットに任せること"],"h":"「1人1工程」という固定的な役割分担から脱却する考え方です。","c":1,"e":"多能工化によって、作業者は前後の工程をカバーできるようになり、ライン全体のバランス調整や、欠員時のバックアップが可能になります。"},{"m":25,"q":"生産量の変動（増減）に合わせて、投入する作業人数を弾力的に変えられるラインの状態を何と呼びますか？","o":["多忙化","少人化（しょうじんか）","省力化","無人化"],"h":"「忙しい時は5人、暇な時は2人」というように、ムダな工数を発生させない仕組みです。","c":1,"e":"単に人を減らす「省人化」とは異なり、需要に応じて「何人でも生産できる」柔軟な体制を指します。これを実現するには、1人が複数工程を持てる多能工化が必須です。"},{"m":25,"q":"具体例①において、多能工による「1個流し」を実現するために採用された設備の配置形状は何ですか？","o":["I字型（一直線）","U字型","O字型（円形）","S字型"],"h":"入り口と出口が近く、1人の作業者が効率よく複数の機械を回れる形状です。","c":1,"e":"U字ラインにすることで、作業者の歩行距離が短縮され、投入と取り出しを同じ場所で行えるため、少人化や多工程持ちが容易になります。"},{"m":25,"q":"具体例②のように、特定のベテラン（Aさん）しか作業ができない状態を何と呼びますか？","o":["専門化","属人化（ぞくじんか）","効率化","標準化"],"h":"「あの人がいないと仕事が回らない」という、組織としての大きなリスクを指す言葉です。","c":1,"e":"属人化した職場では、ベテランの不在が即座に納期遅延や品質低下に直結します。多能工化はこの属人化を排除し、組織の「知的財産」を共有するために行われます。"},{"m":25,"q":"ベテランの頭の中にある言葉にしにくい技術やコツのことを、知識の種類で何と呼びますか？","o":["形式知","暗黙知（あんもくち）","既知","予知"],"h":"「カン」や「コツ」など、マニュアル化されていない個人の経験知のことです。","c":1,"e":"暗黙知をビデオ撮影やマニュアルによって「形式知（誰もが共有できる知識）」に変換することが、多能工育成の第一歩です。"},{"m":25,"q":"従業員一人ひとりの技能レベルを一覧表にし、育成状況を「見える化」するツールの名称は何ですか？","o":["組織図","スキルマップ（星取表）","営業グラフ","勤務表"],"h":"4段階の円グラフ（マニュアルでできる、1人でできる等）で評価することが多い表です。","c":1,"e":"スキルマップを活用することで、組織の「技能の空白地帯（リスク）」が明確になり、計画的なローテーションや教育が可能になります。"},{"m":25,"q":"具体例②で若手を指導する際に行われた、ベテランの動作を視覚化した教育資料を何と呼びますか？","o":["写真集","ビデオ標準（動画マニュアル）","報告書","日記"],"h":"文字だけでは伝わらない微妙な「手の動き」や「タイミング」を伝える道具です。","c":1,"e":"ビデオ標準は、ベテランの高度な技術を効率よく若手へ承継するための強力な武器になります。"},{"m":25,"q":"正しい仕事の教え方（TWI-JI）のステップとして、最も適切な順序はどれですか？","o":["やらせてみて、怒鳴って、覚えさせる","言って聞かせ、やってみせ、させてみて、確認する","マニュアルを渡して、放置する","自分で考えさせて、失敗させる"],"h":"「やってみせ、言って聞かせて、させてみる」という、山本五十六の言葉でも有名な教え方の基本です。","c":1,"e":"正しいステップで教育することで、作業の「急所」や「理由」が正しく伝わり、安全で確実な多能工が育ちます。"},{"m":25,"q":"多能工化が進んだ職場で生まれる、突発的な欠勤やトラブルに対してお互いに助け合う体制を何と呼びますか？","o":["自己責任","応受援（おうじゅえん）体制","監視体制","放置体制"],"h":"「手が空いた人が、困っている人を助ける」という柔軟なチームワークのことです。","c":1,"e":"多能工化によって全員が複数の工程を知っているからこそ、ボトルネックが発生した際にすぐに支援に回れる強靭なチームが作られます。"},{"m":25,"q":"本研修のまとめとして、多能工化を作業者（従業員）の視点からどう位置づけていましたか？","o":["忙しくなるだけの迷惑なこと","「自分の価値を高めるチャンス」","責任を逃れるための手段","給料を下げるための仕組み"],"h":"複数のスキルを持つことは、市場価値や組織内での信頼を高めることに繋がります。","c":1,"e":"多能工化は会社に利益をもたらすだけでなく、働く人にとっても「どこでも通用する技能」を身に付け、仕事の幅を広げる自己成長の機会となります。"},{"m":26,"q":"私たちが現場で得る「測定値」の構成要素として、正しいものはどれですか？","o":["製品の真の値のみ","製品の真の値 ＋ 測定システムの誤差","測定者のやる気","測定器の価格"],"h":"どんなに精密な測定器でも、わずかな「バラツキ（誤差）」は必ず含まれます。","c":1,"e":"測定値には、製品そのものの変動だけでなく、器具の摩耗や測定者の癖による「測定システムの変動」が混じっています。これを見極めるのがMSAの目的です。"},{"m":26,"q":"MSAにおいて、一人の測定者が同じ器具を使って、同じ製品を何度も測った際のバラツキを何と呼びますか？","o":["再現性（AV）","繰返し性（EV）","直線性","安定性"],"h":"「装置そのもの」が持つバラツキに注目した指標です。","c":1,"e":"繰返し性（Repeatability）は、同一条件で測定した時の「器具の精密さ」を表します。"},{"m":26,"q":"異なる測定者が同じ器具を使って、同じ製品を測った際の「平均値の差（バラツキ）」を何と呼びますか？","o":["繰返し性（EV）","再現性（AV）","偏り","感度"],"h":"「人による違い」がどれくらいあるかを確認する指標です。","c":1,"e":"再現性（Reproducibility）は、測定者ごとの測定方法や力の入れ方の違いなど、「人」に起因する変動を表します。"},{"m":26,"q":"具体例①の「ゲージR&R」解析において、測定システムが「優良（合格）」と判定される一般的な基準（%GRR）はどれですか？","o":["10%以下","30%以上","50%ちょうど","100%"],"h":"全変動に対して、測定誤差が占める割合が十分に低い必要があります。","c":0,"e":"一般的に%GRRが10%以下なら「優良」、10〜30%なら「条件付きで許容」、30%を超えると「不適合（改善が必要）」と判定されます。"},{"m":26,"q":"良品を「不良品」だと誤って判定し、無駄なコストを発生させてしまうリスクを何と呼びますか？","o":["第二種の誤り（消費者リスク）","第一種の誤り（生産者リスク）","第三種の誤り","測定不能"],"h":"「過剰廃棄」を招く、作り手側にとっての損失です。","c":1,"e":"測定システムの精度が低いと、規格限界付近の良品を「不合格」にしてしまうミスが起きます。これを「生産者リスク」とも呼びます。"},{"m":26,"q":"逆に、不良品を「良品」として合格させ、顧客へ流出させてしまう重大なミスを何と呼びますか？","o":["第一種の誤り","第二種の誤り（消費者リスク）","測定の安定性","測定の直線性"],"h":"顧客に迷惑をかけ、信頼を失墜させる「見逃し」のリスクです。","c":1,"e":"不適合品を「合格」と判定してしまうのが第二種の誤りです。MSAはこのリスクを最小限にするために実施されます。"},{"m":26,"q":"具体例②の目視検査（官能検査）のような「合格・不合格」の判定精度を評価する手法は何ですか？","o":["ゲージR&R法","クロスタブ法（分割表法）","ヒストグラム法","特性要因図"],"h":"「○か×か」という計数値データの判定一致率を数値化する手法です。","c":1,"e":"クロスタブ法（カッパ統計量などを含む）を用いることで、人による「見逃し率」や「過剰廃棄率」を客観的に評価できます。"},{"m":26,"q":"目視検査の精度を上げ、人によるバラツキ（再現性）を抑えるために、現場に整備すべきものは何ですか？","o":["豪華な椅子","限度見本（合格・不合格の境界を示すサンプル）","監視カメラ","難しい専門書"],"h":"誰が見ても「これが基準だ」と分かる視覚的な「ものさし」です。","c":1,"e":"限度見本（視覚的標準）を置くことで、検査員の主観による迷いを排除し、安定した判定が可能になります。"},{"m":26,"q":"測定値が「真の値」からどれくらいズレているか（正確さ）を示す指標を何と呼びますか？","o":["幅の変動","位置の変動（偏り：バイアス）","感度","解像度"],"h":"「ものさし」の目盛りそのものがズレていないかを確認する項目です。","c":1,"e":"「偏り（バイアス）」は、標準器（マスター）に対して測定平均値がどの程度離れているかを示します。"},{"m":26,"q":"本研修のまとめとして、測定と管理の関係についてどのように述べていましたか？","o":["測定器が高価であれば、管理は不要である","不正確な測定は、誤った管理（無駄な調整やトラブル）を招く","測定は時間がかかるので、省略したほうが良い","データは加工して報告すべきである"],"h":"「事実管理」を正しく行うためには、まずデータの信頼性が大前提です。","c":1,"e":"MSAは、私たちが信じているデータが「本当に信じられるものか」を疑い、確かな意思決定を支えるための重要な「保険」なのです。"},{"m":27,"q":"業務を外部に委託（アウトソース）した場合、その製品やサービスの品質に対する「最終的な責任」はどこにありますか？","o":["全て委託先のサプライヤーにある","契約書を書いた弁護士にある","委託した側の組織（自社）にある","誰の責任でもない"],"h":"顧客から見れば、窓口である「あなたの会社」の商品として購入しています。","c":2,"e":"業務を外部に任せても、品質マネジメントシステム（QMS）上の責任を放棄することはできません。顧客要求に適合させる最終責任は、常に自社が負います。"},{"m":27,"q":"研修の中で紹介された、「サプライチェーンの質」を例えた重要な言葉は何ですか？","o":["「質より量である」","「サプライチェーンの質は、その最も弱い環（鎖）の強さで決まる」","「外注先は安ければ良い」","「管理は厳しいほど良い」"],"h":"一箇所でも不備（弱い鎖）があれば、全体の信頼が崩れてしまうという意味です。","c":1,"e":"自社の技術が高くても、一つの部品メーカーや物流業者の質が低ければ、最終的な製品の信頼性はそこで決まってしまいます。全体を底上げする視点が不可欠です。"},{"m":27,"q":"具体例①の健康食品メーカーが陥っていた、契約だけで管理を相手に一任してしまう不適切な状態を何と呼びますか？","o":["全権委任","丸投げ","信頼関係","効率化"],"h":"プロセスの内容を確認せず、結果（モノ）だけを受け取ろうとする姿勢です。","c":1,"e":"「丸投げ」はリスクの放置と同じです。委託先のプロセスが自社の基準を満たしているか、監視・制御する仕組みを持たなければなりません。"},{"m":27,"q":"サプライヤーを選定する際、価格だけでなく品質管理体制などを客観的に評価するために、自社が相手先に対して行う監査を何と呼びますか？","o":["自己監査","二者監査（セカンドパーティ監査）","三者監査","内部監査"],"h":"利害関係のある二者間（買い手と売り手）で行われる監査のことです。","c":1,"e":"二者監査を実施することで、サプライヤーの「実力」を現場（三現主義）で確認し、リスクを事前に把握することが可能になります。"},{"m":27,"q":"具体例①で導入された、製造工程図や重要な管理ポイント（CCP）をサプライヤーと共有するための書類は何ですか？","o":["領収書","外注先管理条件書（または仕様書）","挨拶状","秘密保持契約のみ"],"h":"「何を、どう作ってほしいか」という具体的なルールを明文化したものです。","c":1,"e":"要求事項を曖昧にせず、具体的な数値や手順を共有することが、不適合を未然に防ぐ「源流管理」の第一歩です。"},{"m":27,"q":"具体例②の物流委託において、問題特定のために導入された「納入品質」や「納期実績」などの指標を何と呼びますか？","o":["KPI（重要業績評価指標）","パスワード","アンケート","ニックネーム"],"h":"「だいたい」ではなく、事実（数値）でパフォーマンスを監視するための道具です。","c":0,"e":"KPIを設定し、事実に基づく管理（ファクト・コントロール）を行うことで、委託先と共に具体的な改善策（Act）を講じることができます。"},{"m":27,"q":"サプライヤーとの関係において、一方的な指示や指導だけでなく、共に成長を目指す姿勢を何と呼びますか？","o":["主従関係","共存共栄（Win-Win）","競争関係","放置"],"h":"相手が利益を出し、技術を高めることが、巡り巡って自社の利益に繋がります。","c":1,"e":"サプライヤーを叩いてコストを下げるのではなく、改善を支援して「原価」を下げる協力体制を築くことが、長期的な競争力を生みます。"},{"m":27,"q":"物流現場などで、実際に作業記録や温度管理の状態を直接確認しに行くことを重視する考え方はどれですか？","o":["三現主義（現場・現物・現実）","成果主義","楽観主義","秘密主義"],"h":"報告書（紙）の上だけではなく、自分の目で事実を確かめることです。","c":0,"e":"「現実」のプロセスを見ることで、データには現れない「ヒヤリハット」や改善のヒントを発見できます。"},{"m":27,"q":"本研修のまとめとして、サプライヤー管理を何に例えていましたか？","o":["豪華なフルコース","オーケストラの指揮","終わりなき旅","秘密の暗号"],"h":"指揮者（自社）が全体の調和を整え、演奏者（サプライヤー）の力を引き出すイメージです。","c":1,"e":"各サプライヤーが持つ個別の力を、自社の要求（楽譜）に沿って調和させ、一つの素晴らしい価値（演奏）を創り出すのが管理の真髄です。"},{"m":27,"q":"明日からサプライヤー（外部委託先）に対して、まず実践すべき行動は何ですか？","o":["厳しい罰則を突きつける","「ありがとう」という感謝と共に、プロセスの課題や情報を共有する対話を始める","連絡を絶つ","全てを相手のせいにする"],"h":"信頼関係は、日々のコミュニケーションの積み重ね（信頼口座）から生まれます。","c":1,"e":"サプライヤーは「運命共同体」です。良好な人間関係をベースに、事実に基づいた情報交換を行うことが、品質保証の最短距離です。"},{"m":28,"q":"スマート工場（スマートファクトリー）化の最大の目的として、最も適切なものはどれですか？","o":["人間を全員クビにして、無人化すること","伝統的な職人技をすべて否定すること","IoTやAI等を活用し、工場のパフォーマンス（QCD）向上と新たな価値を創出すること","豪華なコンピューターを並べて見栄えを良くすること"],"h":"技術導入そのものが目的ではなく、それを使って「経営成果」を出すことがゴールです。","c":2,"e":"スマート工場は、不確実な市場環境（賃金上昇や技術革新）に対応し、データに基づいた迅速な意思決定で競争力を高めるために構築されます。"},{"m":28,"q":"スマート工場における「次世代の見える化」の3ステップ（循環システム）として、正しい順序はどれですか？","o":["Think（分析）→ Sense（収集）→ Act（指示）","Act（指示）→ Think（分析）→ Sense（収集）","Sense（データ収集）→ Think（分析）→ Act（現場への指示・実行）","Sense（収集）→ Act（指示）→ Think（分析）"],"h":"まずはセンサーなどで「感じ（Sense）」、次に脳で「考え（Think）」、最後に体で「動く（Act）」イメージです。","c":2,"e":"IoTで現場の事実を掴み（Sense）、AIが最適解を導き出し（Think）、それを現場の設備や人にフィードバックする（Act）ことで、データが価値に変わります。"},{"m":28,"q":"具体例①の日立製作所大みか事業所が直面していた、各部署は改善されているのに工場全体では成果が出ない状態を何と呼びますか？","o":["全体最適","個別最適の罠","順風満帆","少数精鋭"],"h":"部門ごとのシステムが乱立し、つながりが断たれている状態です。","c":1,"e":"スマート工場化において最も警戒すべきは個別最適です。プロセス全体を一つの「流れ」として捉え、全体最適を目指すことが不可欠です。"},{"m":28,"q":"工場内で「人とモノの動き」をリアルタイムで把握するために、具体例①で活用された無線技術は何ですか？","o":["AMラジオ","RFID（ICタグ）","トランシーバー","赤外線通信"],"h":"タグをかざしたり、ゲートを通ったりすることで、非接触で情報を読み取る技術です。","c":1,"e":"RFIDを活用することで、これまでブラックボックスだった熟練工の動線や、仕掛品の滞留時間を「客観的な数値」として収集できるようになります。"},{"m":28,"q":"PC上の定型的な事務作業（データ入力や転記など）をソフトウェアのロボットが代行する仕組みを何と呼びますか？","o":["ABC","RPA（ロボティック・プロセス・オートメーション）","DNA","BBQ"],"h":"ホワイトカラーの業務を効率化する「デジタル・レイバー（仮想知的労働者）」です。","c":1,"e":"RPAを導入することで、人間は「単純な入力作業」から解放され、AIの分析結果に基づいた「高度な判断（意思決定）」に集中できるようになります。"},{"m":28,"q":"設備が壊れてから直す「事後保全」に対し、AIを用いて故障の兆候を事前に察知し、壊れる前に対処することを何と呼びますか？","o":["予知保全（または予兆管理）","放置保全","永久保全","瞬間修理"],"h":"「前兆パターン」を学習し、未来の故障を予測する手法です。","c":0,"e":"予知保全が実現すると、突発的なライン停止（ダウンタイム）が激減し、生産計画の確実性が飛躍的に高まります。"},{"m":28,"q":"AIが設備の異常を検知した際、自動的にアラートを送り、部品の発注まで代行する「AI×RPA」の連携は何を目指したものですか？","o":["担当者を怠けさせること","「検知からアクションまで」の自動化によるスピード向上と人的ミスの排除","電気代の削減","サーバーの容量確認"],"h":"AIの「判断」を、RPAが「実行（Act）」に移す連携プレーです。","c":1,"e":"AI単体では「気づく」だけですが、RPAとつなげることで「実務処理」までを自動化でき、現場の管理負荷を大幅に低減できます。"},{"m":28,"q":"スマート工場化を成功させるための進め方として、最も推奨されるのはどれですか？","o":["最初から全社規模の巨大なシステムを導入する","現場の意見を無視して進める","特定の工程や課題で「小さく始めて成功体験を積む（PoC）」","流行が終わるまで待つ"],"h":"「スモールスタート」で効果を確認しながら、適用範囲を広げていく手法です。","c":2,"e":"いきなり大規模な投資をするのではなく、身近な課題で「データによる改善」を実感することが、組織全体のデジタル化を加速させます。"},{"m":28,"q":"研修のまとめとして、スマート工場化と現場の「勘と経験」の関係についてどのように述べていましたか？","o":["現場の勘と経験は古いので、すべて捨てるべきである","勘と経験をデジタル技術で増幅し、組織の資産（知恵）に変える活動である","デジタルがあれば人間は何も考えなくて良い","勘と経験だけで十分である"],"h":"ヒントはありません","c":0,"e":"個人の頭の中にあった「暗黙知」をデジタル化し、AIの力で強化することで、組織としての「モノづくり力」が永続的な資産になります。"},{"m":28,"q":"スマート工場の実現において、人間が最終的に担うべき役割は何ですか？","o":["データの入力作業","設備の監視","高付加価値な「意思決定」や「人づくり（教育）」","ロボットの代わりをする"],"h":"単純作業は機械に任せ、人間にしかできないクリエイティブな領域に集中します。","c":2,"e":"AIやRPAは強力なツールですが、最終的な戦略の決定や、人を育て、組織の文化を創るのは人間の役割です。"}]};
var QD=QUIZ_DATA,L=['A','B','C','D'];
var P=new URLSearchParams(location.search);
var modIdx=P.has('m')?parseInt(P.get('m')):null;
var allMode=P.has('all');
var showVideo=allMode||modIdx!==null;
var showCourse=allMode||P.has('course');
var mode=null;

// Build tabs
var tabs=document.getElementById('tabs');
if(allMode){
  tabs.innerHTML='<button class="tb t-video on" onclick="switchTab(\'select\')">\ud83d\udcfa 動画別テスト</button><button class="tb t-course" onclick="switchTab(\'course\')">\ud83d\udccb コース全体テスト</button>';
  // Build module list
  var ml=document.getElementById('modList');
  var cats=["具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編", "具体例編"];
  QD.titles.forEach(function(t,i){
    var d=document.createElement('div');d.className='mc';
    d.innerHTML='<span class="mn">'+(i+1)+'</span><span class="mdiv"></span><div><span class="mt">'+t+'</span><div class="mt2">'+cats[i]+'\uff5c10問</div></div><span class="marr">→</span>';
    d.onclick=function(){pickMod(i)};
    ml.appendChild(d);
  });
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelCourse').style.display='none';
}else if(showVideo&&showCourse){
  tabs.innerHTML='<button class="tb t-video on" onclick="switchTab(\'video\')">\ud83d\udcfa この動画の確認テスト</button><button class="tb t-course" onclick="switchTab(\'course\')">\ud83d\udccb コース全体テスト</button>';
}else{tabs.style.display='none'}

// Init (non-all mode)
if(!allMode&&showVideo){
  document.getElementById('svTitle').textContent=QD.titles[modIdx]+' 確認テスト';
  document.getElementById('panelVideo').style.display='block';
}
if(!allMode&&showCourse){
  document.getElementById('panelCourse').style.display=showVideo?'none':'block';
}
if(!allMode&&!showVideo&&showCourse)document.getElementById('panelCourse').style.display='block';

// All-mode: pick a module
window.pickMod=function(idx){
  modIdx=idx;
  document.getElementById('panelSelect').style.display='none';
  document.getElementById('svTitle').textContent=QD.titles[idx]+' 確認テスト';
  document.getElementById('panelVideo').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

function switchTab(t){
  document.querySelectorAll('.tb').forEach(function(b){
    var isMatch=(t==='select'&&b.classList.contains('t-video'))||b.classList.contains('t-'+t);
    b.classList.toggle('on',isMatch);
  });
  var ps=document.getElementById('panelSelect');
  if(t==='select'){
    if(ps)ps.style.display='block';
    document.getElementById('panelVideo').style.display='none';
  }else if(t==='video'){
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='block';
  }else{
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='none';
  }
  document.getElementById('panelCourse').style.display=t==='course'?'block':'none';
}

// Quiz engine
var quizzes={video:{qs:[],ci:0,sc:0,ans:[]},course:{qs:[],ci:0,sc:0,ans:[]}};

window.go=function(m){
  mode=m;var qz=quizzes[m];qz.ci=0;qz.sc=0;qz.ans=[];
  if(m==='video'){
    qz.qs=QD.questions.filter(function(q){return q.m===modIdx});
    for(var i=qz.qs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=qz.qs[i];qz.qs[i]=qz.qs[j];qz.qs[j]=t}
  }else{
    var pool=[].concat(QD.questions),sel=[];
    for(var mm=0;mm<29;mm++){var mq=pool.filter(function(q){return q.m===mm});sel.push(mq[Math.floor(Math.random()*mq.length)])}
    var rem=pool.filter(function(q){return sel.indexOf(q)<0});
    for(var i=0;i<0;i++){var p=rem.splice(Math.floor(Math.random()*rem.length),1)[0];if(p)sel.push(p)}
    for(var i=sel.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sel[i];sel[i]=sel[j];sel[j]=t}
    qz.qs=sel;
  }
  g('start'+(m==='video'?'Video':'Course')).style.display='none';
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.style.display='block';
  showQ(m);qEl.scrollIntoView({behavior:'smooth'});
};

function g(id){return document.getElementById(id)}

function showQ(m){
  var qz=quizzes[m],q=qz.qs[qz.ci],total=qz.qs.length;
  var cls=m==='video'?'c-video':'c-course';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.innerHTML='<div class="pg"><div class="pgb"><div class="pgf '+cls+'" style="width:'+((qz.ci/total)*100)+'%"></div></div><div class="pgc">'+(qz.ci+1)+' / '+total+'</div></div>'
    +'<div class="qm">\ud83d\udcd8 '+QD.titles[q.m]+'</div>'
    +'<div class="qt">'+q.q+'</div>'
    +(q.h?'<button class="hb" onclick="tH(\''+m+'\')">\ud83d\udca1 ヒントを見る</button><div class="hi" id="hi_'+m+'">'+q.h+'</div>':'')
    +'<div class="os" id="os_'+m+'"></div>'
    +'<div class="ex" id="ex_'+m+'"></div>'
    +'<button class="nx '+cls+'" id="nx_'+m+'" onclick="nxt(\''+m+'\')">'+(qz.ci<total-1?'次の問題へ →':'結果を見る →')+'</button>';
  var os=g('os_'+m);
  q.o.forEach(function(opt,i){
    var d=document.createElement('div');d.className='o';
    d.innerHTML='<span class="ol">'+L[i]+'</span><span>'+opt+'</span>';
    d.onclick=function(){sel(m,i)};os.appendChild(d);
  });
}

window.sel=function(m,idx){
  var qz=quizzes[m],q=qz.qs[qz.ci];
  var opts=g('os_'+m).querySelectorAll('.o');
  if(opts[0].classList.contains('lk'))return;
  opts.forEach(function(o){o.classList.add('lk')});
  var ok=idx===q.c;if(ok)qz.sc++;
  qz.ans.push({q:q,sel:idx,ok:ok});
  opts[q.c].classList.add('ok');
  if(!ok)opts[idx].classList.add('ng');
  var e=g('ex_'+m);e.textContent=(ok?'\u2705 正解！ ':'\u274c 不正解… ')+q.e;e.style.display='block';
  g('nx_'+m).style.display='inline-block';
};

window.tH=function(m){var h=g('hi_'+m);h.style.display=h.style.display==='none'?'block':'none'};

window.nxt=function(m){
  var qz=quizzes[m];qz.ci++;
  if(qz.ci<qz.qs.length){showQ(m);g('q'+(m==='video'?'Video':'Course')).scrollIntoView({behavior:'smooth'})}
  else showResult(m);
};

function showResult(m){
  var qz=quizzes[m];
  g('q'+(m==='video'?'Video':'Course')).style.display='none';
  var rEl=g('r'+(m==='video'?'Video':'Course'));rEl.style.display='block';
  var pct=Math.round(qz.sc/qz.qs.length*100),pass=m==='video'?pct>=70:pct>=80;
  var rank,rc;
  if(pct>=95){rank='S';rc='#d4a017'}else if(pct>=85){rank='A';rc='#22c55e'}else if(pct>=75){rank='B';rc='#3b82f6'}else if(pct>=60){rank='C';rc='#f59e0b'}else{rank='D';rc='#ef4444'}
  var wrongs=qz.ans.filter(function(a){return!a.ok});
  var h='<div class="rc '+(pass?'ps':'fl')+'">'
    +'<div class="rk" style="color:'+rc+'">'+rank+'</div>'
    +'<div class="rs">'+pct+'%</div>'
    +'<div class="rd">'+qz.qs.length+'問中 '+qz.sc+'問正解</div>'
    +(pass?'<div class="rpm">\ud83c\udf89 '+(m==='video'?'よくできました！':'合格おめでとうございます！')+'</div>':'<div class="rfm">'+(m==='video'?'もう一度動画を見て再挑戦してみましょう。':'合格基準（80%）に届きませんでした。動画を復習して再挑戦してみましょう。')+'</div>')
    +'<button class="B '+(m==='video'?'bg':'bo')+'" onclick="retry(\''+m+'\')" style="margin-top:10px">もう一度受ける</button></div>';
  if(wrongs.length>0){
    h+='<div class="rvt">間違えた問題の復習</div>';
    wrongs.forEach(function(w){
      h+='<div class="rvi"><div class="qm" style="margin-bottom:4px">\ud83d\udcd8 '+QD.titles[w.q.m]+'</div>'
        +'<div class="rvq">'+w.q.q+'</div>'
        +'<div class="rvy">\u2717 あなたの回答：'+L[w.sel]+'. '+w.q.o[w.sel]+'</div>'
        +'<div class="rvc">\u25cb 正解：'+L[w.q.c]+'. '+w.q.o[w.q.c]+'</div>'
        +'<div class="rve">\ud83d\udca1 '+w.q.e+'</div></div>';
    });
  }else{h+='<div style="text-align:center;color:#22c55e;font-weight:700;font-size:16px;padding:16px">\ud83c\udf8a 全問正解です！</div>'}
  rEl.innerHTML=h;
  rEl.scrollIntoView({behavior:'smooth'});
}

window.retry=function(m){
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  g('start'+(m==='video'?'Video':'Course')).style.display='block';
};

window.backToList=function(){
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

// In all mode, add back button to video start panel
if(allMode){
  var sv=document.getElementById('startVideo');
  var bk=document.createElement('button');
  bk.className='mbk';bk.innerHTML='\u2190 モジュール一覧に戻る';
  bk.onclick=backToList;
  sv.insertBefore(bk,sv.firstChild);
}

// Auto-height: tell parent iframe to resize (no scrollbar)
function reportHeight(){
  var h=document.getElementById('R').scrollHeight+48;
  window.parent.postMessage({qh:h},'*');
}
var ro=new ResizeObserver(reportHeight);
ro.observe(document.getElementById('R'));
setTimeout(reportHeight,300);
</script>
</body>
