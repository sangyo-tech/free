<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>確認テスト | 産業技術アカデミー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:transparent}
#R{font-family:'Noto Sans JP',system-ui,sans-serif;color:#f1f5f9;line-height:1.7;max-width:800px;margin:0 auto;padding:24px 16px}
#R *{box-sizing:border-box;margin:0;padding:0}
#R button{font-family:inherit;cursor:pointer}

/* Tabs */
.tt{display:flex;gap:0;margin-bottom:32px;background:#0f172a;border-radius:14px;padding:5px;border:1px solid #1e293b}
.tb{flex:1;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:700;border:none;background:transparent;color:#64748b;transition:all .3s;letter-spacing:.02em;text-align:center}
.tb:hover:not(.on){color:#94a3b8;background:rgba(255,255,255,.03)}
.tb.on{color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.tb.t-video.on{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;box-shadow:0 4px 16px rgba(34,197,94,.3)}
.tb.t-course.on{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 4px 16px rgba(245,158,11,.3)}

/* Start */
.S{border-radius:14px;padding:32px 24px;text-align:center}
.S.s-video{background:linear-gradient(135deg,rgba(34,197,94,.05),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.S.s-course{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(245,158,11,.08));border:1px solid rgba(245,158,11,.2)}
.S h3{font-size:18px;font-weight:700;margin-bottom:8px;color:#f1f5f9}
.S p{color:#94a3b8;font-size:14px;margin-bottom:20px;line-height:1.8}
.sp{display:flex;justify-content:center;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.sv{font-size:22px;font-weight:700}
.s-video .sv{color:#22c55e}
.s-course .sv{color:#f59e0b}
.sl{font-size:11px;color:#64748b}

/* Buttons */
.B{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:12px;font-size:16px;font-weight:700;border:none;transition:all .3s;position:relative;overflow:hidden}
.B::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);opacity:0;transition:opacity .3s}
.B:hover{transform:translateY(-3px)}.B:hover::after{opacity:1}
.B:active{transform:translateY(-1px)}
.B.bg{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000;box-shadow:0 6px 24px rgba(34,197,94,.3)}
.B.bo{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;box-shadow:0 6px 24px rgba(245,158,11,.3)}

/* Quiz */
.Q{display:none}
.pg{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.pgb{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.pgf{height:100%;border-radius:3px;transition:width .3s}
.pgf.c-video{background:#22c55e}.pgf.c-course{background:#f59e0b}
.pgc{font-size:13px;color:#64748b;white-space:nowrap}
.qm{font-size:12px;color:#06b6d4;margin-bottom:8px;font-weight:500}
.qt{font-size:16px;font-weight:600;margin-bottom:18px;line-height:1.6;color:#f1f5f9}
.hb{font-size:12px;color:#d4a017;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);border-radius:6px;padding:4px 12px;margin-bottom:14px;display:inline-block}
.hi{display:none;font-size:13px;color:#94a3b8;background:rgba(212,160,23,.05);border-left:3px solid #d4a017;padding:10px 14px;border-radius:6px;margin-bottom:14px}
.os{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.o{background:#111827;border:2px solid #1e293b;border-radius:10px;padding:13px 16px;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;text-align:left;color:#f1f5f9}
.o:hover:not(.lk){border-color:#334155;background:#1a2332}
.ol{width:26px;height:26px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#94a3b8}
.o.ok{border-color:#22c55e;background:rgba(34,197,94,.08)}.o.ok .ol{background:#22c55e;color:#fff}
.o.ng{border-color:#ef4444;background:rgba(239,68,68,.08)}.o.ng .ol{background:#ef4444;color:#fff}
.ex{display:none;background:rgba(59,130,246,.06);border-left:3px solid #3b82f6;border-radius:6px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#94a3b8;line-height:1.7}
.nx{display:none;border:none;border-radius:8px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.nx:hover{transform:translateY(-2px)}
.nx.c-video{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000}
.nx.c-course{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}

/* Result */
.Rs{display:none}
.rc{border-radius:14px;padding:32px 24px;text-align:center;margin-bottom:24px}
.rc.ps{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.rc.fl{background:linear-gradient(135deg,rgba(239,68,68,.04),rgba(239,68,68,.08));border:1px solid rgba(239,68,68,.2)}
.rk{font-size:52px;font-weight:700;margin-bottom:6px}
.rs{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.rd{font-size:14px;color:#94a3b8;margin-bottom:14px}
.rpm{font-size:15px;font-weight:600;color:#22c55e;margin-bottom:14px}
.rfm{font-size:15px;font-weight:600;color:#ef4444;margin-bottom:14px}
.rvt{font-size:16px;font-weight:700;margin-bottom:14px;color:#f59e0b}
.rvi{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:16px 18px;margin-bottom:10px;text-align:left}
.rvq{font-size:13px;font-weight:600;margin-bottom:6px;color:#f1f5f9}
.rvy{font-size:12px;color:#ef4444;margin-bottom:3px}
.rvc{font-size:12px;color:#22c55e;margin-bottom:6px}
.rve{font-size:12px;color:#94a3b8;line-height:1.6}

/* Module selector (all mode) */
.ms{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.mc{background:linear-gradient(135deg,#111827 0%,#0f172a 100%);border:1px solid #1e293b;border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:16px;text-align:left;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(34,197,94,.06) 0%,rgba(34,197,94,.02) 100%);opacity:0;transition:opacity .3s}
.mc:hover{border-color:#22c55e;transform:translateX(6px);box-shadow:0 4px 20px rgba(34,197,94,.12)}
.mc:hover::before{opacity:1}
.mc:active{transform:translateX(3px) scale(.99)}
.mn{width:36px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#22c55e;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;background:none;border:none;box-shadow:none;margin-right:4px;text-shadow:0 0 12px rgba(34,197,94,.25)}
.mc:hover .mn{color:#4ade80;text-shadow:0 0 20px rgba(34,197,94,.5);transform:scale(1.12)}
.mdiv{width:1px;height:32px;background:linear-gradient(180deg,transparent,#334155 30%,#334155 70%,transparent);flex-shrink:0;margin:0 4px;transition:background .3s}
.mc:hover .mdiv{background:linear-gradient(180deg,transparent,#22c55e 30%,#22c55e 70%,transparent)}
.mt{font-size:14px;color:#e2e8f0;font-weight:600;line-height:1.5;position:relative;z-index:1}
.mt2{font-size:11px;color:#64748b;font-weight:400;margin-top:2px}
.mc:hover .mt{color:#fff}
.mc:hover .mt2{color:#94a3b8}
.marr{margin-left:auto;color:#334155;font-size:16px;transition:all .3s;position:relative;z-index:1}
.mc:hover .marr{color:#22c55e;transform:translateX(3px)}
.mhd{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mhd::before{content:'';display:inline-block;width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,#22c55e,#4ade80)}
.msd{font-size:13px;color:#94a3b8;margin-bottom:20px;padding-left:12px}
.mbk{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #1e293b;background:#111827;color:#94a3b8;cursor:pointer;margin-bottom:16px;transition:all .25s}
.mbk:hover{background:#1e293b;color:#f1f5f9;border-color:#334155;transform:translateX(-3px)}
.mcnt{display:inline-flex;align-items:center;justify-content:center;background:rgba(34,197,94,.1);color:#22c55e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px}

@media(max-width:600px){.qt{font-size:14px}.o{padding:11px 13px;font-size:13px}.S{padding:24px 16px}}
</style>
</head>
<body>
<div id="R">
  <div class="tt" id="tabs"></div>
  <div id="panelSelect" style="display:none">
    <div class="mhd">動画別 確認テスト<span class="mcnt">全30回</span></div>
    <div class="msd">テストしたいモジュールを選んでください</div>
    <div class="ms" id="modList"></div>
  </div>
  <div id="panelVideo" style="display:none">
    <div class="S s-video" id="startVideo">
      <h3 id="svTitle"></h3>
      <p>この動画の内容から出題されます。</p>
      <div class="sp">
        <div><div class="sv" id="svCount">10</div><div class="sl">問題数</div></div>
        <div><div class="sv">解説付き</div><div class="sl">正誤判定</div></div>
      </div>
      <button class="B bg" onclick="go('video')">テストを始める →</button>
    </div>
    <div class="Q" id="qVideo"></div>
    <div class="Rs" id="rVideo"></div>
  </div>
  <div id="panelCourse" style="display:none">
    <div class="S s-course" id="startCourse">
      <h3>品質管理 実践コース 確認テスト</h3>
      <p>30モジュールの内容からランダムに30問出題されます。</p>
      <div class="sp">
        <div><div class="sv">30</div><div class="sl">問題数</div></div>
        <div><div class="sv">80%</div><div class="sl">合格ライン</div></div>
      </div>
      <button class="B bo" onclick="go('course')">コーステストを始める →</button>
    </div>
    <div class="Q" id="qCourse"></div>
    <div class="Rs" id="rCourse"></div>
  </div>
</div>
<script>
const QUIZ_DATA = {"titles":["バリデーションの実施方法と注意点","ライン異常発生時の初動対応と判断","不良の発生防止と検証","不良流出防止の封じ込めと再開判断","重大クレーム発生時の全社対応","顧客監査・工場見学対応","SCAR（是正要求書）の発行とフォロー","APQP/PPAPによる量産移管の品質保証","SPCの異常判定規則と実務での使い方","ビッグデータ・IoT時代の品質管理のヒント","工場レイアウト改善プロジェクト実践","ポカヨケ設計の型と事例展開","安全×品質リスクの統合管理","内部監査の実務：インタビューと指摘","LPA（レイヤードプロセス監査）の運用","品質方針展開と部署目標への落とし込み","コスト・オブ・クオリティ（COPQ）棚卸し実践","FMEAの進化とリスクマネジメント実践","eQMS運用ルールと電子記録の信頼性","データ品質ルールと異常アラート設計","アンドン・カンバン・ボードによる見える化","品質会議・レビューのファシリテーション","海外拠点・サプライヤとの品質連携","品質人材育成とOJT設計","経営層への品質レポーティング","総合ケーススタディ：クレーム発生から是正・再発防止まで","中小企業での管理図運用：サンプリング頻度と異常対応ルール","マネジメントレビューの深化：有効性と効率性の評価**","改善能力の育成：集中改善会による意識改革と右脳活用","部門横断的アプローチ（CFT/MDA）の活用：製品実現の推進"],"questions":[{"m":0,"q":"バリデーションの計画段階において、ユーザーの要求仕様（URS）や規制要件（GMP等）に設備設計が適合しているかを確認するステップは何ですか？","o":["IQ（据付時適格性評価）","OQ（稼動性能適格性評価）","DQ（設計時適格性評価）","PQ（性能適格性評価）"],"h":"「Design（設計）」の適合性を問う、最も源流のステップです。","c":2,"e":"DQで設計の妥当性を確認しないまま設備を導入すると、後から「清掃しにくい」「能力が足りない」といった致命的な欠陥が発覚するリスクがあります。"},{"m":0,"q":"設備が設計図通りに正しく製作・組立・据付けされているかを確認するステップは何ですか？","o":["DQ","IQ","OQ","PV"],"h":"「Installation（据付）」が正しく行われたかを検証します。","c":1,"e":"IQでは、配管のサイズ、機器の型番、材質などが仕様書と一致しているかを、現場で一つひとつ照合し記録します。"},{"m":0,"q":"実際の原料ではなく、水などの代替品を用いて、設備が設計通りの性能（温度制御、回転数等）を発揮できるかを確認するステップは何ですか？","o":["IQ","OQ","PV","DQ"],"h":"「Operational（稼動）」、つまり「正しく動くか」をテストする段階です。","c":1,"e":"OQでは、実生産に入る前に、設備の機能的な限界（最大・最小負荷など）を確認します。この開始前には計器の校正（キャリブレーション）が完了している必要があります。"},{"m":0,"q":"バリデーションの最終段階（PV）において、実生産規模で期待通りの品質が達成されることを保証するために、原則として必要とされる連続製造数は何ロットですか？","o":["1ロット","3ロット","10ロット","100ロット"],"h":"「たまたま1回うまくいった」のではなく、再現性があることを示すための一般的な基準です。","c":1,"e":"連続した3ロットで合格することで、プロセスの恒常性と安定性を科学的に証明します。"},{"m":0,"q":"一度バリデーションを完了したプロセスにおいて、原材料の変更（Material変更）を行う場合、規格が求めている対応はどれですか？","o":["何もしなくてよい","変更実施「前」に、その影響を考慮して妥当性確認（再バリデーション等）を行う","変更から1年後に確認する","担当者の勘で判断する"],"h":"4M変更は不具合の主要因です。「未然防止」の観点で考えてください。","c":1,"e":"変更が品質に与える潜在的な影響を評価し、事前に妥当性を再確認（バリデーション）することが、QMSの厳格な要求事項です。"},{"m":0,"q":"設備や環境の経時的な劣化を確認するために、一定期間ごとに行うバリデーションを何と呼びますか？","o":["予測的バリデーション","定期的な再バリデーション（再バリデーション）","応急バリデーション","遡及的バリデーション"],"h":"「一度やれば終わり」ではなく、メンテナンスの一環として行われます。","c":1,"e":"経年変化による精度のズレや環境の変化を捉えるため、定期的な評価が必要です。"},{"m":0,"q":"プロセスバリデーション（PV）の最中に、規定の条件から外れる「逸脱（失敗）」が発生した場合、どのように対処すべきですか？","o":["データを書き換えて合格にする","1ロットだけやり直す","原因を究明し、対策を講じた上で再度連続3ロットを実施する","失敗したことは秘密にする"],"h":"「再現性」の証明が途切れたことの重大さを考えてください。","c":2,"e":"PVの失敗はプロセスの不安定さを意味します。原因を除去した上で、再度「3連続合格」を示すのがバリデーションの鉄則です。"},{"m":0,"q":"バリデーション中に使用した測定機器が、後から「校正不適合（精度異常）」だったと判明した場合の義務は何ですか？","o":["機器を捨てる","それまでに測定した結果の「妥当性の評価」を行い、記録に残す","誰にも言わない","次回から気をつける"],"h":"「そのテストデータ自体が信じられるか」を検証し直さなければなりません。","c":1,"e":"計測器の不備はバリデーション全体の信頼性を揺るがすため、過去の全データの影響を評価し、文書化する必要があります。"},{"m":0,"q":"GMP査察官などが製品品質を判断する際、最も重視する「客観的証拠」は何ですか？","o":["担当者の熱意ある説明","整備されたバリデーション文書（計画書、要領書、記録書など）","設備の見た目の新しさ","会社の売上高"],"h":"「記録のないものは、実施していないものとみなす」という格言があります。","c":1,"e":"バリデーションは「文書化された証拠」がすべてです。サプライヤーが作成した文書も含め、欠陥のない記録維持が求められます。"},{"m":0,"q":"本研修のまとめとして、バリデーションを「高層ビルの建設」に例えた場合、PVは何に相当しますか？","o":["設計図の作成（DQ）","資材の搬入（IQ）","クレーンが動くかの確認（OQ）","実生産規模での「基礎の安全性証明」"],"h":"実際の負荷がかかる条件下で、安定して安全を保てるかを確認する最終段階です。","c":3,"e":"個別の機能確認（OQ）を超え、実際の運用条件下で「期待通りの結果を出し続ける能力」を証明するのがPVの役割です。"},{"m":1,"q":"ライン異常が発生した際、最も優先して実施すべき「品質管理の基本」は何ですか？","o":["納期遅れを挽回するための増産","「悪いものはつくらない、悪いものは流さない」ための封じ込め","誰がミスをしたかの特定と責任追及","設備が完全に壊れるまで稼働させること"],"h":"まずは被害の拡大を食い止める「初期消火」が必要です。","c":1,"e":"初動の最優先事項は不適合品の流出防止です。ラインを停止・隔離し、次工程や顧客に不適合品を届けない「封じ込め」が絶対の鉄則です。"},{"m":1,"q":"異常が発覚した際、すでに生産された製品に遡って問題がないかを確認するプロセスを何と呼びますか？","o":["暫定処置","遡及処置（そきゅうしょち）","予防処置","現状維持"],"h":"時計の針を戻すように、過去のロットを検証する動きです。","c":1,"e":"異常の原因が「いつから」発生していたかを特定し、その期間の製品すべてに対して妥当性を再評価することを遡及処置といいます。"},{"m":1,"q":"データや報告書だけでは捉えきれない現実を把握するために、重視すべき行動指針は何ですか？","o":["三現主義（現場・現物・現実）","三権分立","三日天下","三審制"],"h":"「机上の空論」を排し、自分の目で事実を確かめる姿勢です。","c":0,"e":"現場で、現物を見て、現実を把握することで、数値データだけでは見えてこない不具合の予兆や真の原因を掴むことができます。"},{"m":1,"q":"要因解析において、問題を「人・設備・材料・方法」の切り口で整理するフレームワークを何と呼びますか？","o":["3C分析","4M分析","SWOT分析","5S活動"],"h":"Man, Machine, Material, Methodの頭文字です。","c":1,"e":"異常の要因を4Mで層別することで、原因が作業者の力量なのか、設備の劣化なのか、材料のバラツキなのかを論 ":["特性要因図","ポカヨケ（エラープルーフ）","ヒストグラム","パレート図"],"h":"「うっかり（ポカ）」を「避ける（ヨケ）」ための設計工夫です。","c":1,"e":"人の注意力を過信せず、治具の形状やセンサーのインターロックなど、仕組みによって不良の発生を強制的に防ぐ手法です。"},{"m":2,"q":"製造工程の変更（4M変更）を行う際、実施「前」に要求される「妥当性確認（バリデーション）」の目的は何ですか？","o":["変更した日付を記録するため","製品が意図された用途の要求事項を満たし得ることを科学的に証明するため","現場の作業を中断させるため","予算を使い切るため"],"h":"変更によって「実は耐久性が落ちていた」といった見えない不具合が起きないか、事前に保証することです。","c":1,"e":"4M変更は不具合の主要因です。変更後に安定して良品が作れることを事前に実証するのがバリデーションの役割です。"},{"m":2,"q":"計測機器の管理において、機器が「正しい値を指しているか」を定期的に確認し、国家標準などと紐付ける活動を何と呼びますか？","o":["清掃","校正（キャリブレーション）","廃棄","塗装"],"h":"「その物差しは本当に1mmを1mmと測れているか」を保証する活動です。","c":1,"e":"定期的な校正により計測のトレーサビリティを確保しなければ、検査データそのものの信頼性が失われてしまいます。"},{"m":2,"q":"使用中の計測機器が「校正外れ（不適合）」であると判明した際、組織がすぐに行うべき処置は何ですか？","o":["機器を新品に買い替える","その機器でそれまでに測定した結果の「妥当性の評価」と記録","機器を隠す","担当者を叱る"],"h":"「狂った物差しで測った過去の製品」は本当に大丈夫だったか、遡って検証する必要があります。","c":1,"e":"不適合な計測器で見逃された不良品が市場に出ていないか、過去のロットを遡って調査（遡及処置）することがQMS上の厳格な義務です。"},{"m":2,"q":"計測機器が不適合だった場合、その機器および「影響を受けた製品すべて」に対して適切な処置をとる責任者は誰ですか？","o":["営業担当者","製造責任者","清掃作業員","事務員"],"h":"現場の製品品質に直接的な権限と責任を持つ人物です。","c":1,"e":"製造責任者は、不適合なデータに基づいた製造・検査のリスクを評価し、保留や再検査などの処置を決定しなければなりません。"},{"m":2,"q":"大量のデータを「製造者別」「設備別」などの切り口で分けて、不良の傾向を特定する分析手法を何と呼びますか？","o":["合計","層別（そうべつ）","平均","削除"],"h":"「全体」ではなく「特定の箇所」に問題がないか切り分けることです。","c":1,"e":"層別を行うことで、「1号機だけで不良が出ている」といった事実が浮き彫りになり、真の原因究明への近道となります。"},{"m":2,"q":"不適合の原因を取り除き、二度と同じ問題が発生しないようにする恒久的な対策を何と呼びますか？","o":["応急処置","是正処置","暫定処置","表面処理"],"h":"「火を消す」のが応急処置なら、「火の元を断つ」のがこの処置です。","c":1,"e":"是正処置は再発防止が目的です。仕組みや標準を書き換えることで、プロセスの体質そのものを改善します。"},{"m":2,"q":"本研修のまとめとして、不良の発生防止と検証を「工場の健康状態」に例えた場合、バリデーション（妥当性確認）は何に相当しますか？","o":["日々の手洗い","手術（4M変更）前に行う「安全の予行演習」","薬を飲むこと","病院の予約"],"h":"大きな変化を加える前に、その後の健康が保証されるか事前に証明するイメージです。","c":1,"e":"4M変更という手術の影響を事前に科学的に保証することで、重大な品質事故という「合併症」を未然に防ぐのです。"},{"m":3,"q":"ライン異常が発生した際、是正処置（再発防止）を検討する「以前」に行うべき最優先のステップは何ですか？","o":["真の原因究明","不適合製品の「識別」と「隔離」（封じ込め）","作業者の再教育","ラインの即時再開"],"h":"まずは「悪いものをこれ以上流さない」ための応急処置が必要です。","c":1,"e":"異常発生時の第一歩は、不適合品が誤って使用・出荷されないように物理的に分ける「封じ込め」です。これは是正処置の前段階の「応急処置」として極めて重要です。"},{"m":3,"q":"不良品を後工程へ流出させないために、製造工程間に設けられた検査ポイントなどを何と例えていますか？","o":["休憩所","関所","案内所","待機所"],"h":"「ここから先は合格品しか通さない」という厳しい門番のような場所です。","c":1,"e":"工程間の「関所」で確実に不良を止める仕組みが、顧客への流出を防ぐ最後の砦となります。"},{"m":3,"q":"異常が発覚した際、それ以前に製造された製品に遡って影響範囲を特定し、妥当性を評価する処置を何と呼びますか？","o":["暫定処置","遡及処置（そきゅうしょち）","予防処置","廃棄処置"],"h":"「過去の製品は本当に大丈夫だったか？」と時間を戻して検証することです。","c":1,"e":"特に計測機器の不適合などが判明した際、その機器を使っていた過去の全ロットに対して品質リスクを評価し、記録に残す必要があります。"},{"m":3,"q":"「データは事実の断片にすぎない」という前提に立ち、現物がある現場で観察・検討を行う考え方はどれですか？","o":["三現主義（現場・現物・現実）","成果主義","完璧主義","精神主義"],"h":"紙の上やパソコン画面の中だけでは見えない「現実」を重視します。","c":0,"e":"三現主義に基づき、実際に何が起きているのかを直接確認することで、憶測を排した科学的な原因究明が可能になります。"},{"m":3,"q":"原因究明において、データを人ごと、機械ごと、ロットごとなどに分けて分析する手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","隠蔽"],"h":"「どこで」「誰が」の差を明確にすることで、真犯人（真因）を絞り込みます。","c":1,"e":"層別を行うことで、例えば「特定の1台の機械だけで異常が出ている」といった事実を素早く特定できます。"},{"m":3,"q":"エクセルのピボットテーブルで、特定の階層（上位階層）のみを表示して全体像を素早く把握するために便利な操作は何ですか？","o":["データの削除","フィールドの折りたたみ","書式の変更","ファイルの圧縮"],"h":"下位の細かいデータを隠して、大きな集計単位に切り替える操作です。","c":1,"e":"折りたたみ機能を使うことで、膨大なデータから全体の傾向（どの工程で不良が多いか等）を瞬時に把握できます。"},{"m":3,"q":"ライン再開を判断するための「論理的な要件」として、最も適切なものはどれですか？","o":["納期が迫っていること","作業者が「次は気を付ける」と約束すること","真の原因が特定され、是正処置や代替手順が確立されていること","上司が「動かせ」と命令すること"],"h":"「なぜ起きたか」がわかり、「次は起きない」根拠が必要です。","c":2,"e":"感情や憶測ではなく、原因の除去と再発防止の仕組み（または暫定対策）が評価・承認されて初めて、再開のGOサインが出せます。"},{"m":3,"q":"事例の「マイクロメーターの校正期限切れ」において、不適合な機器で測定された過去のロットに対して行うべき「規格上の要求」は何ですか？","o":["機器を新品に交換するだけでよい","測定結果の「妥当性を評価」し、記録する","担当者を厳重注意する","過去のデータは全て消去する"],"h":"「その物差しで測った判定は正しかったのか？」を検証しなければなりません。","c":1,"e":"不適合な測定機器が使用されていた場合、それまでの測定結果が有効であったかを評価し、影響を受けた製品への処置を記録することが必須です。"},{"m":3,"q":"「なぜミスが発生するのか？」と問い続け、仕組みの欠陥を突き止める手法を何と呼びますか？","o":["なぜなぜ問答（なぜなぜ分析）","責任転嫁","多数決","指差し確認"],"h":"表面的なミスの裏にある「真の原因」に辿り着くための手法です。","c":0,"e":"「不注意」で終わらせず、なぜ不注意が起きる環境だったのか、なぜ防げなかったのかと深掘りすることが是正処置には不可欠です。"},{"m":3,"q":"本研修のまとめとして、不良流出防止の危機対応を何に例えていましたか？","o":["豪華なディナーの準備","船舶の浸水時の危機対応","終わりなき旅","秘密の暗号解読"],"h":"浸水を食い止め、影響範囲を特定し、補強して再航行するイメージです。","c":1,"e":"不良流出（浸水）を止め、影響（遡及）を特定し、抜本対策（是正）を講じてから航行（再開）する。この一連の動きが管理者の責務です。"},{"m":4,"q":"重大クレームが発生した際、是正処置（再発防止）を検討する「以前」に、最優先で実施すべきことは何ですか？","o":["担当者の処分を決定する","問題の封じ込め（識別・隔離）と応急処置","過去の成功事例をアピールする","予算の見直しを行う"],"h":"火事と同じです。原因調査の前に、まずは「火を広げない」ことが鉄則です。","c":1,"e":"不適合品がこれ以上、後工程や顧客に流出しないよう、物理的に隔離・識別する「封じ込め」が初動の絶対条件です。"},{"m":4,"q":"すでに市場に流通している製品に対し、不具合の影響を遡って調査・処置することを何と呼びますか？","o":["暫定処置","遡及処置（そきゅうしょち）","予防処置","廃棄処置"],"h":"「今」見つかった問題が、過去のどの範囲まで及んでいるかを特定する動きです。","c":1,"e":"異常が発覚した瞬間、その影響を受けた可能性がある全ロットを特定し、妥当性を評価して適切な処置（回収等）を行う必要があります。"},{"m":4,"q":"重大クレーム対応において、トップマネジメント（経営層）に求められる最も重要な役割は何ですか？","o":["現場の作業を代行すること","責任を部下に押し付けること","QMSの統合と、迅速・透明なコミュニケーションへのコミットメント","報告書を細かく添削すること"],"h":"全社的なリソースを動かし、対外的な信頼を回復させるのは誰の仕事かを考えてください。","c":2,"e":"重大事態では部門間の壁を壊し、全社一丸となって対応する体制（対策本部等）を構築するリーダーシップが不可欠です。"},{"m":4,"q":"原因究明において、データという「断片」だけでなく、現場で現物を見て現実を把握する姿勢を何と呼びますか？","o":["三現主義","成果主義","完璧主義","形式主義"],"h":"「現場・現物・現実」の3つの「現」を重視する考え方です。","c":0,"e":"書類上のデータだけでは真実は見えません。現場に足を運び、現物を観察することで初めて、数値の裏にある真の原因に辿り着けます。"},{"m":4,"q":"大量のデータを「人ごと」「機械ごと」「ロットごと」などに切り分けて分析する手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"「どこに異常が集中しているか」をあぶり出すための仕分け作業です。","c":1,"e":"層別を行うことで、例えば「特定の材料ロットの時だけ異常が起きている」といった特定の要因を迅速に特定できます。"},{"m":4,"q":"不適合の原因が「測定機器の精度異常（校正外れ）」であった場合、組織が義務付けられている活動は何ですか？","o":["機器を修理するだけでよい","その機器でそれまでに測定した結果の「妥当性を評価」し、記録する","データを書き換える","機器を隠す"],"h":"「狂った物差しで測った過去の合格判定」は本当に信じられるかを検証します。","c":1,"e":"計測器の不備は、過去の全データの信頼性を揺るがします。影響を受けた製品すべての品質を再評価し、記録に残すことがQMSの厳格な要求です。"},{"m":4,"q":"問題が起きた場所ではなく、その原因が生まれた「仕事の手順の源流」に遡って対策することを何と呼びますか？","o":["事後管理","源流管理","表面管理","予測管理"],"h":"「川下」でゴミを拾うのではなく、「川上」をきれいに保つイメージです。","c":1,"e":"製造工程で起きた不良も、実は「設計」や「準備段階」に原因があることが多いものです。源流で対策を打つことが、最も確実な再発防止になります。"},{"m":4,"q":"是正処置において、作業者の「不注意」が原因だった場合、中級実務者がとるべき正しい態度はどれですか？","o":["「次は気をつけろ」と精神論で終わらせる","人がミスをしても、製品が不良にならない「仕組み（システム）」を構築する","担当者を交代させる","罰則を強化する"],"h":"「人は必ず間違える」という前提に立ち、エラーに強い仕組みを考えます。","c":1,"e":"個人の意識に頼る対策は再発します。ポカヨケの導入やプロセスの自動化など、システム的な改善を行うことが是正処置の本質です。"},{"m":4,"q":"自工程で確立した再発防止策を、類似の工程や他の製品にも適用することを何と呼びますか？","o":["垂直展開","水平展開","現場復帰","情報隠蔽"],"h":"「隣のラインでも同じことが起きないか？」と横に広げて確認することです。","c":1,"e":"重大クレームの教訓を1箇所に留めず、全社的な標準や教育に反映させることで、組織全体の品質レベルが向上します。"},{"m":4,"q":"本研修のまとめとして、重大クレームへの全社対応を何に例えていましたか？","o":["豪華なパーティーの企画","「企業の緊急手術とDNA修復」","終わりなき旅","秘密の暗号解読"],"h":"病巣を隔離し、過去の感染経路を断ち、遺伝情報（QMS）を書き換えるイメージです。","c":1,"e":"不適合（病巣）を隔離し、遡及（感染経路）を特定し、QMSという遺伝情報を修正することで、二度と同じ不具合を生まない強靭な体質を作るのです。"},{"m":5,"q":"顧客監査や認証審査において、規格や手順への「適合性」以外に、最も厳しく検証される要素は何ですか？","o":["案内担当者のマナー","システムが意図した結果を出し、維持されているかという「有効性」","会社案内パンフレットの最新性","休憩室の充実度"],"h":"「ルールがあるか」だけでなく、「そのルールが実際に役に立っているか」が問われます。","c":1,"e":"QMSが単なる形式ではなく、品質（Q）・コスト（C）・納期（D）の改善に寄与し、継続的に機能しているかという「有効性」を示すことが監査の核心です。"},{"m":5,"q":"監査員に対し、QMSが経営戦略と結びついていることを証明するために提示すべき定量的なデータは何ですか？","o":["社員の平均年齢","Q（品質）・C（コスト）・D（納期）に関するパフォーマンス指標","昨年度の忘年会の参加率","事務所の備品リスト"],"h":"欠陥の予防やムダの低減など、事業目標に直結する数字を準備します。","c":1,"e":"QMSのパフォーマンスが向上していることをデータで示すことで、システムが事業において重要な役割を果たしていることを客観的に証明できます。"},{"m":5,"q":"大量の不適合データやクレームデータを、監査員がひと目で理解できるようにまとめる際に有効な手法は何ですか？","o":["全データを時系列に並べる","ピボットテーブルなどによる「層別」と可視化","データの合計値だけを伝える","報告書を分厚く製本する"],"h":"「どこに異常が集中しているか」を瞬時に見せることが「攻め」のデータ武装です。","c":1,"e":"層別を行うことで、真の原因究明や是正処置の有効性が論理的に説明しやすくなり、監査員の納得感を高めることができます。"},{"m":5,"q":"4M変更（人、設備、材料、方法）などの重要な変更に対し、監査員が必ずチェックするエビデンス（証拠）は何ですか？","o":["変更後の打ち上げの記録","実施前のレビューおよび「妥当性確認（バリデーション）」の記録","変更を決めた人の印鑑","変更にかかった費用"],"h":"「変わったこと」によるリスクを事前にどう評価したかが問われます。","c":1,"e":"変更は不具合の主要因です。実施前に影響を評価し、安全を科学的に実証した記録がない限り、監査員の信頼は得られません。"},{"m":5,"q":"現場監査（ウォークスルー）において、監査員が「現場・現物・現実」を直接確認する姿勢を何と呼びますか？","o":["三現主義","三審制","三権分立","成果主義"],"h":"書類上のデータという「断片」ではなく、目の前の事実を直視する考え方です。","c":0,"e":"現場で手順通りに作業されているか、現物の識別が正しいかなど、三現主義に基づいてプロセスの実態を検証するのが現場監査です。"},{"m":5,"q":"現場で「校正期限切れの計測器」が発見された場合、被監査側が即座に示すべき「論理的な対応」は何ですか？","o":["その場ですぐに隠す","その機器で測定した過去の結果の「妥当性の評価」と遡及調査の記録","担当者をその場で厳重注意する","予備の機器があることを強調する"],"h":"「狂ったかもしれない物差しで測った過去の製品」のリスクをどう評価したかが重要です。","c":1,"e":"不適合な機器の使用が判明した際、即座に影響範囲を特定（遡及処置）し、品質への影響を評価する仕組みが動いていることを示す必要があります。"},{"m":5,"q":"プロセスアプローチ型監査において、プロセスのつなぎ目がスムーズであるかを確認することを何と呼びますか？","o":["パッケージ","リンケージ（連携）","メッセージ","バゲージ"],"h":"前工程のアウトプットが、次工程のインプットとして有効に機能しているかという視点です。","c":1,"e":"各プロセスが独立しているのではなく、組織全体としてバトンが正しく繋がっているかを検証するのがプロセスアプローチの基本です。"},{"m":5,"q":"食品安全（FSMS）監査において、CCP（重要管理点）の管理基準（CL）を外れた際の処置として必須なものは何ですか？","o":["記録を書き換えること","逸脱期間に製造された製品の特定と、適切な取扱い（廃棄、やり直し等）","担当者を交代させること","装置の電源を落とすこと"],"h":"「安全でない可能性がある製品」をどう処置したかのエビデンスが求められます。","c":1,"e":"逸脱時の措置（原因究明、製品処置、再発防止）が計画通りに実施され、記録に残っていることがFSMSの有効性の証明になります。"},{"m":5,"q":"監査で検出された不適合（指摘事項）に対する、プロフェッショナルな受け止め方はどれですか？","o":["全力で反論し、指摘を撤回させる","「改善のための宝」と認識し、「なぜなぜ分析」から全社的な仕組み改善に繋げる","担当者を交代させて終わらせる","最小限の修正だけ行う"],"h":"監査は「受動的な防御」ではなく「能動的な実証と改善」の機会です。","c":1,"e":"不適合を真摯に受け止め、類似の工程にも水平展開する姿勢を示すことが、組織の品質文化の高さを証明します。"},{"m":5,"q":"本研修のまとめとして、顧客監査・工場見学対応を何に例えていましたか？","o":["豪華なパーティーの主催","「設計図（QMS文書）と現場の出来栄え（パフォーマンス）の照合検査」","終わりなき旅","秘密の暗号解読"],"h":"マニュアルという理論と、現場という実践が一致していることを証明する場です。","c":1,"e":"QMSという設計図通りに、強靭なプロセスが構築され、成果を出していることを、データと現場の能力で証明する総合的なパフォーマンスの場なのです。"},{"m":6,"q":"是正処置要求書（SCAR/CAR）を発行する最大の目的は何ですか？","o":["目の前の不良品を手直しさせるため","不適合の根本原因を除去し、将来にわたる再発を防止するため","担当者を厳重に注意するため","報告書の枚数を増やすため"],"h":"「修正」と「是正」の違いを思い出してください。","c":1,"e":"目の前の製品を直すのは「修正」です。SCAR/CARは、問題の「芽」を根本から摘み取り、二度と同じ不適合を起こさない「仕組み」を作るための要求書です。"},{"m":6,"q":"不適合が発生した際、被害の拡大を一時的に防ぐために行う「全数検査」や「ライン停止」などの処置を何と呼びますか？","o":["是正処置","暫定処置（応急処置）","恒久対策","水平展開"],"h":"「今」起きている流出を止めるための、とりあえずの処置です。","c":1,"e":"暫定処置は火事の「消火活動」にあたります。これだけでは原因が残っているため、後に必ず「是正処置」が必要です。"},{"m":6,"q":"SCARを発行する際、不適合の内容をどのように記載するのが最も適切ですか？","o":["「作業者が不注意だった」と簡潔に書く","「いつ、どこで、誰が、どの手順を、どう守らなかったか」という客観的事実を具体的に書く","「とにかく何とかしろ」と感情的に書く","担当者の名前だけを書く"],"h":"事実が具体的であればあるほど、相手は正しい原因分析ができます。","c":1,"e":"「3名のうち1名がダブルチェックを行っていなかった」というような具体的な証拠（エビデンス）を示すことで、初めて精度の高い「なぜなぜ分析」が可能になります。"},{"m":6,"q":"真の原因にたどり着くために、現象に対して繰り返し問いを立てる手法を何と呼びますか？","o":["多数決分析","なぜなぜ分析","損得分析","責任追及分析"],"h":"5回繰り返すことで本質が見えると言われる手法です。","c":1,"e":"表面的なミス（発生原因）だけでなく、なぜそのミスを防げなかったのか（流出原因・仕組みの欠陥）まで深掘りすることが不可欠です。"},{"m":6,"q":"大量の不適合データを「機械別」や「材料別」に切り分けて、傾向を特定する分析手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","隠蔽"],"h":"4M（人、設備、材料、方法）の観点からデータを分類することです。","c":1,"e":"層別を行うことで、「1号機だけで不良が出ている」といった事実が浮き彫りになり、真の原因究明への近道となります。"},{"m":6,"q":"不適合の原因が「計測機器の校正外れ」だった場合、SCARのクローズ（完了）前に必ず確認しなければならない活動は何ですか？","o":["機器の色を塗り替えたか","過去にその機器で測定した全結果の「妥当性評価（遡及処置）」が行われたか","機器を新品に買い替えたか","担当者が謝罪したか"],"h":"「狂った物差しで測った過去の製品」は本当に大丈夫だったか、という検証です。","c":1,"e":"計測器の不備は、過去の判定すべての信頼性を揺るがします。影響を受けた全製品の安全性を再評価し、記録に残すことがQMS上の厳格な要求です。"},{"m":6,"q":"対策が完了した後、それが本当に再発防止策として機能しているかを客観的証拠で確かめる活動を何と呼びますか？","o":["放置","フォローアップ（有効性の検証）","予算申請","記念撮影"],"h":"「やりっぱなし」にせず、効果をチェックすることです。","c":1,"e":"是正処置が「計画通り実施されたか」だけでなく、その結果「実際に不良がゼロになったか」という証拠（データ）を確認するまでがフォローアップです。"},{"m":6,"q":"特定された是正処置を、類似の部品や類似の工程にも適用し、組織全体の予防に繋げる活動を何と呼びますか？","o":["垂直展開","水平展開（横展開）","現場復帰","秘密保持"],"h":"「隣のラインでも同じことが起きないか？」と横に広げるイメージです。","c":1,"e":"水平展開を行うことで、一つの失敗を組織全体の「予防活動」へと昇華させ、将来の別の不適合を未然に防ぐことができます。"},{"m":6,"q":"問題が顕在化した場所だけでなく、その原因が生まれた「仕事の手順の源流」まで遡って改善する考え方を何と呼びますか？","o":["事後管理","源流管理","表面管理","予測管理"],"h":"「川下」でゴミを拾うのではなく、「川上」をきれいに保つイメージです。","c":1,"e":"製造工程のミスも、実は設計や準備段階に原因があることが多いものです。源流段階の仕組みを直すことが、最も確実な改善です。"},{"m":6,"q":"本研修のまとめとして、是正処置要求書のプロセスを「病気」に例えた場合、水平展開は何に相当しますか？","o":["痛み止めを飲む","手術をする","他の臓器（類似プロセス）にも予防策を施す","病院を予約する"],"h":"一つの病巣を治すだけでなく、体全体が健康であるように配慮するイメージです。","c":2,"e":"手術（是正処置）を成功させるだけでなく、体質全体（QMS）を強化し、どこにも病気が出ない状態にするのが水平展開の真髄です。"},{"m":7,"q":"自動車産業のQMS（IATF 16949等）において、品質活動のエネルギーの多く（約4分の3）を注ぐべきとされるのはどのプロセスですか？","o":["出荷後のクレーム処理","最終製品の全数検査","新製品の企画から量産開始までの先行開発活動（APQP）","倉庫の在庫管理"],"h":"「起きてから直す」のではなく「起きないように計画する」段階が最も重要です。","c":2,"e":"APQP（先行製品品質計画）の段階でエラーを予防し、ばらつきを低減させることが、量産後の安定した品質とコスト削減に直結します。"},{"m":7,"q":"APQPを推進する際、設計・製造・品質・購買などの多部門から構成されるチームを何と呼びますか？","o":["仲良しクラブ","部門横断的チーム（CFT/MDT）","監査対応チーム","臨時作業班"],"h":"部門の壁を越えて、専門知識を同期化させるための組織体です。","c":1,"e":"Cross Functional Team（CFT）によるアプローチを行うことで、設計段階から製造性や品質リスクを多角的に検討し、迅速な意思決定が可能になります。"},{"m":7,"q":"製品や工程の潜在的な故障モードを予測し、リスクを低減させるためにAPQPの初期段階で実施する手法は何ですか？","o":["財務分析","FMEA（故障モード影響解析）","在庫回転率調査","従業員満足度調査"],"h":"「何が起きそうか」を事前に洗い出し、対策を打つためのコアツールです。","c":1,"e":"設計（DFMEA）や工程（PFMEA）でのリスク分析結果をコントロールプランに反映させることで、重大な不具合の未然防止を図ります。"},{"m":7,"q":"製品の製造工程や管理方法を定めた、量産移管後も更新され続ける「生きた文書」を何と呼びますか？","o":["会社案内","コントロールプラン（CP）","納品書","組織図"],"h":"品質保証のための「製造の設計図」であり、変更や是正処置のたびにメンテナンスされます。","c":1,"e":"コントロールプランは、FMEAの結果や顧客要求を反映した管理の要です。量産中も常に最新の状態に維持されなければなりません。"},{"m":7,"q":"PPAP（生産部品承認プロセス）の主な目的は何ですか？","o":["試作品を1個だけ提出すること","顧客の要求を満たす製品を、所定の生産能率で製造する能力があることを証明するため","担当者の顔を売るため","価格交渉を有利に進めるため"],"h":"「量産と同じ条件で、ちゃんと作り続けられるか」を顧客に承認してもらうステップです。","c":1,"e":"設計通りであることだけでなく、実際の量産スピード（生産能率）において品質が維持できることを科学的に証明する活動です。"},{"m":7,"q":"PPAPで提出するサンプルを採取すべき「実質的生産（Significant Production Run）」の条件として、不適切なものはどれですか？","o":["量産用治工具・設備を使用する","量産環境（作業員含む）で製造する","試作専用の臨時ラインで製造する","通常1〜8時間の操業で連続300個以上製造する"],"h":"「量産そのもの」の条件でなければ、妥当性の確認にはなりません。","c":2,"e":"暫定工程や試作ラインでのサンプルは認められません。正規の量産工程が検証された後の「実力」を示す必要があります。"},{"m":7,"q":"量産立ち上げ時の初期の工程能力を示す指標で、PPAP時に顧客から証明を求められるものはどれですか？","o":["利益率","工程性能指数（Ppk）","欠勤率","表面粗さ"],"h":"初期段階（短期）のばらつきの実力を示す統計的な指標です。","c":1,"e":"初期の工程調査ではPpkを検証し、顧客要求（例：Ppk ≧ 1.67）を満たしていることを客観的データで証明しなければなりません。"},{"m":7,"q":"量産開始後、Cpk（工程能力指数）が顧客要求値（例：1.33）を下回った場合に組織がとるべき対応はどれですか？","o":["数値を書き換える","顧客に通知し、是正処置または100%検査などの暫定対策を実施する","放置する","検査をやめる"],"h":"「工程の実力が足りない」状態は、不良流出のリスクが高まっているサインです。","c":1,"e":"規定の能力が維持できない場合は、即座に顧客へ報告し、管理を強化（全数検査等）しながら是正処置を講じる義務があります。"},{"m":7,"q":"PPAP承認後に治具や工法を変更（4M変更）する場合、自動車業界で厳格に守らなければならないルールは何ですか？","o":["変更が終わってから報告する","実施前に影響を評価し、妥当性確認（バリデーション）を行い、必要に応じて顧客の再承認を得る","社内だけで決めて進める","安ければ自由に変えてよい"],"h":"「一度決めた飛行計画（承認工程）」を変える際は、事前の再証明が必要です。","c":1,"e":"どんなに小さな変更でも、品質への影響を事前に評価し、顧客の合意（再PPAP等）を得るのが変更管理の鉄則です。"},{"m":7,"q":"本研修のまとめとして、APQP/PPAPのプロセスを何に例えていましたか？","o":["豪華なディナーの準備","「高性能なロケットの開発と打ち上げ承認」","終わりなき旅","秘密の暗号解読"],"h":"リスク解析（FMEA）、模擬打ち上げ（実質的生産）、飛行計画（CP）の厳守という流れです。","c":1,"e":"綿密な計画と科学的な性能証明、そして一度決めたルールの厳守。この一連の流れが、自動車という命を預かる製品の品質を支えています。"},{"m":8,"q":"SPC（統計的工程管理）の本来の目的として、最も適切なものはどれですか？","o":["不良品を検査で100%見つけ出すこと","製造工程のばらつきを統計的に管理し、欠陥を予防すること","グラフをきれいに描いて掲示すること","作業者のスピードを監視すること"],"h":"「起きた不良を捨てる」のではなく、「不良が起きない状態を保つ」ための手法です。","c":1,"e":"SPCは、工程の「ばらつき」を監視し、異常の兆候を早期に発見することで、不適合品の発生を未然に防ぐ予防活動です。"},{"m":8,"q":"工程に常に存在し、予測が可能で、管理限界内に収まっている変動要因を何と呼びますか？","o":["特別要因","共通要因","異常要因","外部要因"],"h":"現在のプロセスの「実力」そのものに備わっている、避けられないわずかな変動です。","c":1,"e":"共通要因のみで変動している状態を「統計的に安定した状態（管理状態）」と呼び、この状態であれば将来の品質予測が可能になります。"},{"m":8,"q":"機械の故障、材料の変化、作業ミスなど、突発的に工程に影響を与える変動要因を何と呼びますか？","o":["共通要因","特別要因","内部要因","恒常要因"],"h":"「いつもと違う何か」が起きたときに発生する、予測不能な原因です。","c":1,"e":"特別要因が存在する工程は「不安定」であり、管理図はこの特別要因を検知するために使用されます。"},{"m":8,"q":"管理図で異常（管理限界外など）が検出された際、まず最初に実施すべき「封じ込め（応急処置）」は何ですか？","o":["装置の買い替え","不適合製品（疑わしい製品）の隔離と全数検査","作業者の配置換え","データの書き直し"],"h":"被害を広げないための「止血」が必要です。","c":1,"e":"コントロールプラン（CP）に基づき、異常発生期間の製品が次工程や顧客へ流出しないよう、物理的に隔離・管理することが最優先です。"},{"m":8,"q":"工程が「安定した状態」にあるにもかかわらず、ばらつきを減らそうとして機械を頻繁に微調整し、逆にばらつきを大きくしてしまう行為を何と呼びますか？","o":["最適化","過剰調整（オーバーコントロール）","予防保全","設備改善"],"h":"良かれと思って手を出すことが、統計的には「余計な変動」を加えることになります。","c":1,"e":"安定した工程への不要な介入は、かえって品質を不安定にします。作業者には、調整すべき時とすべきでない時の区別を教育する必要があります。"},{"m":8,"q":"SPCを有効に機能させるための「データの扱い」に関する鉄則はどれですか？","o":["見栄えを良くするために数値を修正する","異常値は削除して平均を計算する","同じ条件（定点・定時）で採取し、事実は絶対に修正しない","忙しい時は適当な数値を書き込む"],"h":"「事実」を曲げた瞬間に、統計的な管理は成立しなくなります。","c":2,"e":"管理図はプロセスの「心電図」です。改ざんや修正は真の異常を見逃す原因となり、企業の信頼を致命的に損ないます。"},{"m":8,"q":"自動車産業の規格（TS規格等）において、SPCの手法や異常判定基準を記述しておくべき重要な文書は何ですか？","o":["会社案内","コントロールプラン（CP）","納品書","福利厚生規定"],"h":"製造工程の管理方法をすべて網羅した「管理の設計図」です。","c":1,"e":"コントロールプランには、どの特性をどの管理図で監視し、異常時にどう対応するか（対応処置計画）を明記する義務があります。"},{"m":8,"q":"異常が発生した際、不適合の原因を深掘りし、発生原因と流出原因の両方を特定するために有効な手法は何ですか？","o":["多数決","なぜなぜ分析","精神論による反省","責任転嫁"],"h":"「なぜ起きたか」だけでなく「なぜ流れたか」まで、仕組みの欠陥を追及します。","c":1,"e":"是正処置計画書を作成する際は、なぜなぜ分析を用いて根本原因を叩き、恒久的な再発防止策を立てる必要があります。"},{"m":8,"q":"事例にある「管理図のデータ改ざん」が発覚した際、最初に行うべき遡及処置（そきゅうしょち）の範囲はどう判断しますか？","o":["今日の分だけ","その作業者が担当し、改ざんが行われていた期間の全ロット","全製品一律","処置は不要"],"h":"「正しいデータがない期間」の製品は、すべて不適合の疑いがあります。","c":1,"e":"管理が機能していなかった期間の製品はすべて品質が不明なため、全数再検査や隔離などの厳格な処置が必要です。"},{"m":8,"q":"本研修のまとめとして、SPC管理図を何に例えていましたか？","o":["豪華なフルコース","製造プロセスの「心電図（ECG）」","終わりなき旅","秘密の暗号"],"h":"健康状態（安定性）を監視し、不整脈（異常）を即座に捉えるイメージです。","c":1,"e":"波形の乱れ（管理外れ）からプロセスの異常を読み取り、手遅れになる前に適切な治療（是正処置）を施すためのツールです。"},{"m":9,"q":"IoT（モノのインターネット）を工場に導入する最大の目的は何ですか？","o":["インターネットで遊ぶため","センサー等を通じて現場のデータをリアルタイムに収集し、異常の早期発見や予防に役立てるため","紙の書類を増やすため","ロボットに名前をつけるため"],"h":"「今、現場で何が起きているか」を瞬時にデジタル化して把握することです。","c":1,"e":"IoTによって設備や製品の状態を常時監視することで、不良が発生してから気づくのではなく、発生の兆候を捉えることが可能になります。"},{"m":9,"q":"データの処理量や速度が従来のシステムの限界を超えるような巨大なデータ群を何と呼びますか？","o":["スモールデータ","ビッグデータ","アナログデータ","サンプルデータ"],"h":"IoTの普及により、1秒間に数千、数万と生成される膨大な情報の塊です。","c":1,"e":"ビッグデータは、その量（Volume）、速度（Velocity）、多様性（Variety）が特徴であり、これらを分析することで、人間では気づけない相関関係や予兆を見出すことができます。"},{"m":9,"q":"通信の遅延（レイテンシ）を許容できない高速なラインなどで、クラウドではなく現場に近い場所にサーバーを置いて処理する構成を何と呼びますか？","o":["センターコンピューティング","エッジコンピューティング","リモートコンピューティング","バックアップコンピューティング"],"h":"「エッジ（端）」、つまりデータの発生源のすぐそばで処理を行う仕組みです。","c":1,"e":"リアルタイムな応答（ライン停止判断など）が求められる場面では、現場に近いエッジ側でAI判定を行うことで、通信遅延のリスクを回避します。"},{"m":9,"q":"膨大なデータを「A機械とB機械」のように切り分けて分析し、問題の所在を明確にする統計的手法は何ですか？","o":["統合","層別（そうべつ）","削除","隠蔽"],"h":"ピボットテーブルなどを使って、特定の要因（レイヤー）ごとにデータを仕分けることです。","c":1,"e":"ビッグデータであっても基本は同じです。層別を行うことで、どの機械やどの材料ロットに問題が集中しているかを「見える化」できます。"},{"m":9,"q":"AI（人工知能）が最も威力を発揮する品質管理の領域はどれですか？","o":["初めて発生した全く新しい不具合の察知","膨大なデータからの異常パターンの抽出や、目視検査の自動化・高精度化","従業員の悩み相談","飲み会の幹事"],"h":"人間が長時間集中して行うのが難しい「大量の監視」や「微細な判別」が得意です。","c":1,"e":"AIは過去のデータを学習することで、人間が見逃すような僅かな傾向変化（予兆）を検知したり、検査のばらつきを排除したりするのに適しています。"},{"m":9,"q":"設備の振動や温度データを分析し、故障が起きる前に前兆を察知してメンテナンスを行う手法を何と呼びますか？","o":["事後保全","予知保全（予兆保全）","定期保全","放置"],"h":"「壊れてから直す」のではなく「壊れそうだから直す」という攻めの保全です。","c":1,"e":"AIとIoTを組み合わせることで、突発的な故障（特別要因）による生産停止を防ぎ、コストと品質リスクを低減します。"},{"m":9,"q":"PC上の定型的な操作を自動化し、異なるシステム間でのデータ連携や集計を代行する技術は何ですか？","o":["AI","RPA（ロボティック・プロセス・オートメーション）","IoT","SNS"],"h":"ホワイトカラー業務の自動化に使われる「ソフトウェアのロボット」です。","c":1,"e":"RPAを活用することで、IoTデータの抽出やSCAR（是正処置要求書）の自動作成・送信など、事務的なプロセスを迅速かつ正確に行えます。"},{"m":9,"q":"自社の製造プロセスを外部委託（アウトソーシング）した場合、顧客要求事項に対する責任はどうなりますか？","o":["委託先の責任になるので自社は関係ない","組織（自社）の責任が免除されることはない","契約書があれば責任はなくなる","検査を省略してよい"],"h":"ISO/TS規格（IATF等）の厳格なルールを思い出してください。","c":1,"e":"外注先の品質不備であっても、最終的な顧客に対する責任は組織（自社）にあります。だからこそ、サプライチェーン全体でのデータ共有と管理が重要です。"},{"m":9,"q":"IoTシステムが異常の「予兆」を検知した際、迅速にQMS（品質マネジメントシステム）のサイクルを回すための連携先は何ですか？","o":["翌月の会議","是正処置（SCAR）の発行や、不適合品の隔離（封じ込め）","社内報の作成","営業担当者の出張"],"h":"「わかった」だけで終わらせず、具体的な「処置」に繋げなければなりません。","c":1,"e":"検知されたデータは即座にアクション（封じ込めや是正処置）に紐付けられ、再発防止のプロセスへと流れる仕組みが不可欠です。"},{"m":9,"q":"本研修のまとめとして、最新の品質管理を何に例えていましたか？","o":["豪華なフルコース","「製造ライン全体に配置されたインテリジェントな警備システム」","終わりなき旅","秘密の暗号"],"h":"センサー（IoT）が監視し、AI（分析官）が予兆を検知して、自動でシステムを止めるイメージです。","c":1,"e":"犯罪（不良）が起きてから動くのではなく、予兆の段階で封じ込め、仕組みそのものを修復する。これがデジタル時代の品質管理の姿です。"},{"m":10,"q":"工場レイアウト改善の真の目的として、最も適切なものはどれですか？","o":["広いスペースを作って休憩所を増やすこと","見栄えを良くして来客にアピールすること","「欠陥の予防、ばらつきやムダの低減」を実現し、生産プロセスを最適化すること","古い機械をすべて新しくすること"],"h":"QMS（品質マネジメントシステム）の到達目標と結びついた、経営的な成果を重視します。","c":2,"e":"レイアウト変更は、単なる模様替えではなく、3ム（ムダ・ムラ・ムリ）を排除し、品質・コスト・納期（QCD）を改善するための戦略的活動です。"},{"m":10,"q":"食品工場の事例において、一見理想的に見える「抗菌パネルの全面貼り」などが「過剰品質」や「ムダ」になり得るのはなぜですか？","o":["パネルが重すぎるから","目的意識に欠け、製造工程の分析なしに導入すると、生産性の低下や将来の変更の障害になるから","色が派手すぎるから","掃除がしにくいから"],"h":"「良かれと思って」の投資が、費用対効果を生んでいない状態を指します。","c":1,"e":"部分的な理想を追求するのではなく、動線や作業性を考慮した「製造工程全体の分析」に基づいた投資でなければ、それは経営上のムダとなります。"},{"m":10,"q":"衛生管理が求められるレイアウト設計において、ゾーニングの意味をなくしてしまうため「避けるべき」構造はどれですか？","o":["窓を大きくすること","汚染区域から衛生区域へ排水溝を連結させること","LED照明を採用すること","床を緑色に塗ること"],"h":"「汚れたもの」が「きれいな場所」へ流れ込むルートを遮断しなければなりません。","c":1,"e":"排水や気流（陰陽圧）の動線設計ミスは、物理的な仕切りがあっても交叉汚染のリスクを招くため、設計段階での厳格な管理が必要です。"},{"m":10,"q":"トヨタ生産方式の思想において、仕掛品在庫をあえて「削減」することの最大のメリットは何ですか？","o":["倉庫の掃除が楽になる","作業時間の中にある「隠れていたムダや問題点」が顕在化し、改善が進むから","担当者が暇になる","帳簿上の計算が簡単になる"],"h":"在庫は、機械故障や不良といった「工場の病気」を隠す城壁の役割を果たしてしまいます。","c":1,"e":"在庫を減らすと、工程間のアンバランス（ムラ）や不具合がすぐに表面化するため、現場が真剣に改善に取り組まざるを得ない状況（フロー思考）が生まれます。"},{"m":10,"q":"レイアウト上の「ムラ」を特定するために、データを人・機械・ロット別などに切り分けて分析する手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"ピボットテーブルなどを使って、要因ごとにデータを仕分けることです。","c":1,"e":"層別を行うことで、特定の製品や特定の時間帯にだけ発生している「滞留（ムダ）」の真の原因をあぶり出すことができます。"},{"m":10,"q":"後工程が「必要な時に、必要な分だけ」前工程から引き取る生産方式を何と呼びますか？","o":["プッシュ方式","プル方式","放置方式","無制限方式"],"h":"スーパーマーケットの棚のように、売れた分だけを補充する仕組みです。","c":1,"e":"プル方式を導入することで、過剰在庫を防ぎ、需要変動に強いしなやかなレイアウト（フロー）が構築できます。"},{"m":10,"q":"プル方式において、後工程が製品を引き取りに行く、工程間に設計された「店」のような置き場を何と呼びますか？","o":["コンビニ","ストア","デポ","ステーション"],"h":"前工程が「作りすぎ」ないためのブレーキの役割も果たします。","c":1,"e":"ストアを適切に配置することで、工程間の仕掛品を最小限に抑えつつ、スムーズな製品の流れ（同期化）を実現します。"},{"m":10,"q":"すべての工程の生産スピードが一定になり、工程間に仕掛品が増えない状態にすることを何と呼びますか？","o":["同期化","二極化","多角化","自由化"],"h":"「足の遅い人」に全員が歩調を合わせることで、列が乱れないようにするイメージです。","c":0,"e":"工程のスピードが同期化されると、リードタイムが短縮され、生産計画の立案も極めてシンプルになります。"},{"m":10,"q":"レイアウト変更において、現場のムダ取りだけでなく、設計やプロセス計画の段階にさかのぼって改善する考え方を何と呼びますか？","o":["事後管理","源流管理","表面管理","予測管理"],"h":"「川下」でゴミを拾うのではなく、「川上」をきれいに保つイメージです。","c":1,"e":"現場のムダの多くは、実は設計ミスや準備不足に起因します。源流を直さなければ、レイアウトを変えてもまた別のムダが発生します。"},{"m":10,"q":"本研修のまとめとして、工場レイアウトの改善を何に例えていましたか？","o":["豪華な家具の配置換え","「企業の血流改善」","終わりなき旅","秘密の暗号解読"],"h":"脂肪（在庫）を燃焼させ、血栓（滞留）をなくし、効率の良いルート（動線）を作るイメージです。","c":1,"e":"レイアウトはモノづくりの思想そのものです。滞りのない「流れ」を作ることで、企業の体質を根底から強化する活動なのです。"},{"m":11,"q":"ポカヨケ（Poka-Yoke）の根本的な思想として、最も適切なものはどれですか？","o":["不良品が出たら、熟練工が手直しすること","作業者の注意力を極限まで高める訓練をすること","人間はミスを犯すという前提に立ち、仕組みでミスを防ぐこと","検査員の人数を増やして、流出を食い止めること"],"h":"「人の意識」に頼るのではなく、「物理的な仕組み」に頼る考え方です。","c":2,"e":"ポカヨケは、ヒューマンエラーを完全に排除することはできないという前提に立ち、ミスが起き得ない、あるいは起きても即座に検知できる仕組みを工程に組み込む活動です。"},{"m":11,"q":"不適合が発生した際、再発防止策として「作業者の不注意」を原因とし、精神論で終わらせてはいけない理由は何ですか？","o":["作業者が可哀想だから","根本的な原因（仕組みの欠陥）が除去されず、必ず再発するから","手順書を書くのが面倒だから","誰が悪いか決めるのが難しいから"],"h":"「気をつけろ」と言われて、二度とミスをしない人間はいません。","c":1,"e":"「なぜミスが発生するのか」を深掘りし、ミスを許容しない「ミスよけ（ポカヨケ）」を設計・導入することこそが、QMSにおける真の是正処置です。"},{"m":11,"q":"治工具の形状を工夫し、部品の向きが逆だとセットできないようにするなど、ミスの発生そのものを防ぐ型を何と呼びますか？","o":["発生防止型（予防）","検出・警告型（検知）","修正型（手直し）","放置型（許容）"],"h":"「物理的に間違えようがない」状態を作る、最も理想的なポカヨケです。","c":0,"e":"発生防止型は、正しい作業以外を受け付けない物理的・機構的な制約を設けることで、不良の発生を源流で断ち切ります。"},{"m":11,"q":"センサーが部品の欠品を検知し、ラインを自動停止（アンドン点灯など）させて流出を防ぐ型を何と呼びますか？","o":["発生防止型","検出・警告型（検知）","隠蔽型","予測型"],"h":"「ミスが起きたこと」を瞬時に知らせ、後工程に流さないための関所の役割です。","c":1,"e":"異常が発生した際、コントロールプラン（CP）に基づき直ちに停止・隔離を行う仕組みです。これにより、被害を最小限に食い止めます。"},{"m":11,"q":"人間が深く考えず、感覚的に正誤を判断できるようにするために有効な「色彩の工夫」の例として、適切な組み合わせはどれですか？","o":["良品：赤、不良品：青","良品：青、保留品：黄、不良品：赤","すべて白で統一する","色は関係ない"],"h":"信号機と同じように、直感的に「進んで良いか、止まるべきか」を伝えます。","c":1,"e":"色彩管理は、読む・考えるという判断のばらつきを排除し、誰でもひと目で状態を識別できる強力な視覚的ポカヨケとなります。"},{"m":11,"q":"事例にある「トルクレンチの締め忘れ防止」において、データロガーとIDチップを連動させるメリットは何ですか？","o":["作業スピードを競わせるため","作業者の記録の手間を省き、かつ物理的にチェックを飛ばせない仕組みにするため","トルクレンチを重くするため","電池の消耗を確認するため"],"h":"「やるべき作業」と「その記録」を自動的にセットにして、漏れをなくします。","c":1,"e":"作業とデータの紐付けを自動化することで、人間の記憶や記録ミスに依存しない、極めて信頼性の高いポカヨケが実現します。"},{"m":11,"q":"ダブルチェックが必要な工程で、前の作業が完了（例：青キャップ装着）するまで次の設備が動かないようにする制御を何と呼びますか？","o":["オーバーロック","インターロック","デッドロック","グリッドロック"],"h":"条件が揃わない限り、物理的に「ロック」がかかる仕組みのことです。","c":1,"e":"インターロックは、手順の飛び越しを物理的に不可能にするため、重要保安部品（SC）などの管理において非常に有効です。"},{"m":11,"q":"導入したポカヨケ（再発防止策）を恒久化するために、必ず更新・反映すべきQMSの文書はどれですか？","o":["社内報","QC工程表、作業手順書、教育プログラム","昨年の予算書","会社案内"],"h":"「新しいルール」を組織の標準として定着させるための書類です。","c":1,"e":"仕組みを作っただけで終わらせず、標準文書に落とし込み、教育を通じて周知徹底することで、初めて「組織の力」としての再発防止になります。"},{"m":11,"q":"IoTやAIを活用した高度なポカヨケにおいて、故障の予兆を検知したシステムがとるべき行動はどれですか？","o":["壊れるまで使い続ける","自律的に生産を自動停止（ラインストップ）し、流出を未然に防ぐ","翌月の会議で報告する","データを消去する"],"h":"「不整脈」を見つけたら、心停止（重大故障）が起きる前に処置するイメージです。","c":1,"e":"AIが微細な傾向変化を検知した瞬間にラインを止めることで、特別要因による大量不良の発生を未然に防ぐことができます。"},{"m":11,"q":"本研修のまとめとして、ポカヨケ設計を何に例えていましたか？","o":["豪華なフルコースの準備","「製造プロセスにおける『転ばぬ先の杖』の設置」","終わりなき旅","秘密の暗号"],"h":"つまずく（ミスをする）前に進路を塞ぐ、あるいは倒れそうな時に支えるイメージです。","c":1,"e":"人間は必ずミスをするという前提に立ち、知恵と工夫で「重大な怪我（不良流出）」を未然に防ぐ。これがポカヨケ設計の本質です。"},{"m":12,"q":"内部監査において、机上の文書確認だけでなく、自らの目で現場・現物を確認する姿勢を何と呼びますか？","o":["三現主義","成果主義","完璧主義","形式主義"],"h":"「現場」「現物」「現実」の3つの「現」を重視する考え方です。","c":0,"e":"監査員は、被監査部門が用意した書類やサンプルだけで判断せず、実際の現場でプロセスが意図通りに機能しているかを直接検証しなければなりません。"},{"m":12,"q":"特定の製品サンプルから、使用された原料、検査記録、出荷先などを芋づる式に遡って確認する演習を何と呼びますか？","o":["抜き打ち検査","トレーサビリティのシミュレーション","在庫棚卸","5S活動"],"h":"「情報のつながり」を追跡し、必要な記録に素早く辿り着けるかを確認します。","c":1,"e":"この演習を行うことで、万が一の不具合発生時に、影響範囲を迅速に特定できる仕組み（検索性や保管状態）が有効であるかを検証できます。"},{"m":12,"q":"インタビュー（質問）の際、監査員がとるべき最も適切な姿勢はどれですか？","o":["相手を問い詰めるような威圧的な態度","「見せて欲しい」「教えて欲しい」という表現で、客観的な証拠を求める姿勢","自分の憶測（〜のはずだ）で判断を下す姿勢","専門用語を多用して難しく質問する姿勢"],"h":"監査は「犯人探し」ではなく、事実に基づいた「適合性の検証」です。","c":1,"e":"肯定的な見方で接し、具体的な証拠（データや記録）を提示してもらうことで、主観を排した事実に基づく意思決定が可能になります。"},{"m":12,"q":"重大な品質問題が発生した際、夜勤などで管理者が不在でも、現場の判断で「生産を中断する権限」は誰に与えられているべきですか？","o":["社長のみ","事務員","製品品質に責任を持つ実務要員（作業者やリーダー）","外部のコンサルタント"],"h":"品質問題を即座に是正し、流出を防ぐためには「現場でのタイムリーな判断」が不可欠です。","c":2,"e":"重大なリスクを封じ込めるため、現場の責任者に生産中断権限が与えられているかを確認することは、内部監査の重要なチェックポイントです。"},{"m":12,"q":"不適合報告書（指摘事項）を作成する際、必ず含めるべき「三つの要件」は何ですか？","o":["担当者の名前、日付、天気","要求事項（基準）、不適合の状態、監査証拠（客観的事実）","自分の感想、反省文、署名","会社のロゴ、図面番号、予算"],"h":"「何に照らして」「どうダメで」「その根拠は何か」を明確にします。","c":1,"e":"この三要素が揃うことで、被監査部門は「何が問題の本質か」を正確に理解し、的確な原因分析を行うことができます。"},{"m":12,"q":"「作業手順を守っていなかった」という指摘に対し、より質の高い（具体的な）記述はどれですか？","o":["「作業者が不注意だった」","「手順書が読みにくかった」","「〇〇工程で検証した3名中1名が、規定のダブルチェックを行っていなかった」","「全体的に規律が緩んでいた」"],"h":"「誰が、どこで、何を、どのように」を具体化します。","c":2,"e":"具体性が高いほど、原因が「個人の資質」なのか「手順の難易度」なのかといった深掘りが可能になり、是正処置の質が向上します。"},{"m":12,"q":"計測機器の「校正期限切れ」が発覚した際、不適合の表明と合わせて監査員が促すべき「厳格な対応」は何ですか？","o":["機器をすぐに捨てること","過去にその機器で測定された結果の「妥当性の評価（遡及処置）」と記録","次回から忘れないようにメモを貼ること","安い計測器に買い替えること"],"h":"「狂った物差しで測った過去の製品」のリスクを評価しなければなりません。","c":1,"e":"不適合な機器の使用は、過去の全ての合格判定を疑うべき事態です。影響を受けた全製品の安全性を再評価することが、QMS上の必須要求です。"},{"m":12,"q":"是正処置の回答が「作業者を指導した」だけであった場合、監査員がとるべきフォローアップの態度はどれですか？","o":["指導したなら安心だと判断し、クローズする","「なぜミスが発生したのか」を深掘りし、仕組みの改善（ポカヨケ等）を促す","諦めて指摘を取り下げる","自分で指導案を作成してあげる"],"h":"精神論での解決は再発を招きます。ヒューマンエラーを防ぐ「仕組み」に注目します。","c":1,"e":"「なぜミスが起きても流出したのか」を問い続け、個人の力量に頼らない恒久的な再発防止策（是正処置）の妥当性を評価するのが監査員の役割です。"},{"m":12,"q":"検出された不適合を、類似の部品や他の工程にも発生しないよう展開することを何と呼びますか？","o":["垂直展開","水平展開","現場復帰","秘密保持"],"h":"一つの教訓を「横」に広げて、組織全体の予防活動に繋げることです。","c":1,"e":"水平展開を行うことで、個別の指摘事項が組織全体のプロセス改善へと繋がり、QMSの有効性が飛躍的に高まります。"},{"m":12,"q":"本研修のまとめとして、内部監査を何に例えていましたか？","o":["豪華なフルコースのメニュー","「企業の精密な健康診断」","終わりなき旅の地図","秘密の暗号解読"],"h":"病気（欠陥）を見つけ、真の原因（仕組みのムラ）を究明し、治療（是正）するイメージです。","c":1,"e":"単なる「数値のチェック」ではなく、組織の体質そのものを改善し、最高のパフォーマンスを維持するための戦略的な活動なのです。"},{"m":13,"q":"内部監査において、書類上の確認だけでなく、実際の場所で現物を確認し事実を把握する考え方を何と呼びますか？","o":["三現主義","成果主義","完璧主義","形式主義"],"h":"「現場」「現物」「現実」の3つの「現」を重視する、品質管理の基本姿勢です。","c":0,"e":"監査員は机上の文書だけで判断せず、現場へ足を運び、現物を観察し、現実を把握することで、システムの有効性を客観的に検証する必要があります。"},{"m":13,"q":"特定の製品から、使用原料や製造トラブルの影響などを芋づる式に遡って確認する演習を何と呼びますか？","o":["在庫棚卸","トレーサビリティのシミュレーション","抜き打ち検査","5S活動"],"h":"「情報のつながり」を追跡し、必要な記録に素早くたどり着けるかを確認します。","c":1,"e":"この演習を行うことで、万が一の不具合発生時に影響範囲を迅速に特定できる仕組み（検索性や保管状態）が機能しているかを実務的に検証できます。"},{"m":13,"q":"インタビュー（質問）の際、監査員が客観的な証拠を求めるために用いるべき最も適切な表現はどれですか？","o":["「〜のはずですよね？」","「〜だろうと思いますか？」","「見せてください／教えてください」","「誰が悪いのですか？」"],"h":"憶測ではなく、事実（エビデンス）を求める姿勢が重要です。","c":2,"e":"「見せてほしい」「教えてほしい」という肯定的な表現で、実際の記録や行動といった客観的な証拠を提示してもらうことが、事実に基づく監査の鉄則です。"},{"m":13,"q":"内部監査において、製品品質に責任を持つ要員が「品質問題を是正するために生産を止める」ことを何と呼びますか？","o":["生産中断権限","業務妨害","職務放棄","責任転嫁"],"h":"重大なリスクを封じ込めるため、現場の判断で実行されるべき重要な権限です。","c":0,"e":"夜勤など管理者が不在でも、不適合品の流出を防ぐためにタイムリーに生産を止める権限が適切に与えられているかを検証することは、リスク管理上不可欠です。"},{"m":13,"q":"不適合報告書（指摘事項）を作成する際、必ず構成に含めるべき「三要件」は何ですか？","o":["担当者、日付、天気","要求事項、不適合の状態、監査証拠（客観的事実）","自分の感想、反省文、署名","図面番号、予算、会議室名"],"h":"「何に照らして」「どうダメで」「その根拠は何か」を明確にします。","c":1,"e":"この3つが揃うことで、被監査部門は「何が問題の本質か」を正確に理解し、的確な原因分析（なぜなぜ分析）を行うことができます。"},{"m":13,"q":"「作業手順を守っていなかった」という指摘に対し、是正処置に繋がる「質の高い指摘」の記述はどれですか？","o":["「作業者が不注意だった」","「手順書が読みにくかった」","「〇〇工程の3名中1名が、規定のダブルチェック手順を実施していなかった」","「全体的に規律が乱れていた」"],"h":"「誰が、どこで、何を、どのように」を具体化します。","c":2,"e":"具体性が高いほど、原因が「個人の資質」なのか「手順の難易度」なのかといった深掘りが可能になり、仕組みの改善（ポカヨケ等）に繋がりやすくなります。"},{"m":13,"q":"計測機器の「校正期限切れ」が発覚した際、監査員が最も厳格に確認すべき「遡及処置」の内容は何ですか？","o":["機器をすぐに捨てること","過去にその機器で測定された結果の「妥当性の評価」と記録","次回から忘れないようにメモを貼ること","安い計測器に買い替えること"],"h":"「狂ったかもしれない物差しで測った過去の製品」は本当に大丈夫だったか、という検証です。","c":1,"e":"不適合な機器の使用は過去の判定を全て疑うべき事態です。影響を受けた全製品の安全性を再評価することが、QMS上の必須要求となります。"},{"m":13,"q":"是正処置の回答が「作業者を指導した」だけであった場合、監査員がとるべきフォローアップの態度はどれですか？","o":["指導したなら安心だと判断し、クローズする","「なぜミスが発生したのか」を深掘りし、仕組みの改善を促す","諦めて指摘を取り下げる","自分で新しい手順書を書いてあげる"],"h":"精神論での解決は再発を招きます。ヒューマンエラーを防ぐ「仕組み」に注目します。","c":1,"e":"「なぜミスが起きても流出したのか」を問い続け、個人の力量に頼らない恒久的な再発防止策（ポカヨケや手順改訂）の妥当性を評価するのが監査員の役割です。"},{"m":13,"q":"検出された不適合を、類似の部品や他の工程にも発生しないよう展開することを何と呼びますか？","o":["垂直展開","水平展開","現場復帰","秘密保持"],"h":"一つの教訓を「横」に広げて、組織全体の予防活動に繋げることです。","c":1,"e":"水平展開を行うことで、個別の指摘事項が組織全体のプロセス改善へと繋がり、品質マネジメントシステム全体の有効性が飛躍的に高まります。"},{"m":13,"q":"本研修のまとめにおいて、内部監査を何に例えていましたか？","o":["豪華なフルコース","「企業の精密な健康診断」","終わりなき旅","秘密の暗号"],"h":"病気を見つけ、真の原因（仕組みのムラ）を究明し、治療（是正）するイメージです。","c":1,"e":"単なる数値チェックではなく、組織の体質そのものを改善し、最高のパフォーマンス（健康状態）を維持するための戦略的な活動です。"},{"m":14,"q":"LPA（レイヤードプロセス監査）の最大の特徴は何ですか？","o":["年に一度だけ外部機関が行うこと","組織の各階層（現場から経営層まで）が、異なる頻度でプロセスを監査すること","難しい統計学を駆使すること","帳簿上の数字だけをチェックすること"],"h":"「Layered（層になった）」という言葉の意味を考えてください。","c":1,"e":"現場リーダーは毎日、経営層は月次といったように、役割に応じた頻度と視点で重複的に（レイヤー状に）監査を行うことで、プロセスの確実な維持を図ります。"},{"m":14,"q":"現場の日常業務において、標準化された手順を維持するためのサイクルを何と呼びますか？","o":["PDCAサイクル","SDCA（標準化・実行・確認・処置）サイクル","3M活動","5S活動"],"h":"「改善」の前に、まずは「標準（Standard）」を守り、維持することが基本です。","c":1,"e":"LPAは、このSDCAサイクルや食品安全のPRP（前提条件プログラム）が、現場で形骸化せずに実行されているかを検証する役割を担います。"},{"m":14,"q":"LPAにおいて、最下層（現場リーダー等）が担当すべき監査の頻度と内容はどれですか？","o":["3年に一度、全社の経営方針をチェックする","毎日または週に数回、自部門のクリティカルな作業手順が守られているかを確認する","気が向いた時に行う","決算期に一度だけ行う"],"h":"「最も現場に近い層」が、最も高い頻度で詳細をチェックします。","c":1,"e":"現場リーダーは、作業手順書やPRPなどの日常的な遵守状況を最も高い頻度で確認し、その場で修正・指導を行う役割があります。"},{"m":14,"q":"LPAのチェック項目を選定する際、最も優先すべき「高リスク領域」はどれですか？","o":["休憩室の清掃状況","FMEAで特定された特殊特性（SC）やハザード分析に基づく重要管理点（CCP）","事務用品の在庫数","駐車場の白線の引き直し"],"h":"不適合が発生した際の影響度（Severity）が極めて高い項目に絞り込みます。","c":1,"e":"闇雲に全てを点検するのではなく、品質や安全の根幹に関わるクリティカルな項目に焦点を当てることで、監査の有効性を高めます。"},{"m":14,"q":"過去の顧客クレームや重大な不適合に対する「是正処置」として導入されたポカヨケ等は、LPAでどのように扱うべきですか？","o":["導入済みなので確認不要とする","今も正しく維持・機能しているかを重点的にチェックする","忘れても良い","別の担当者に任せる"],"h":"「一度決めた対策」が守られなくなることが、再発の最大の原因です。","c":1,"e":"是正処置の有効性が継続しているかを確認することは、LPAにおける重要な「欠陥の予防」活動です。"},{"m":14,"q":"LPAを実施する際の基本姿勢である「三現主義」とは何ですか？","o":["現金・現物・現実","現場・現物・現実","現状・原因・現職","現場・現代・現役"],"h":"書類のチェックだけでなく、自らの目で「事実」を確かめることです。","c":1,"e":"現場へ行き、現物を確認し、現実を把握することで、書類上の記録と実際の作業の乖離を見抜くことができます。"},{"m":14,"q":"LPAのインタビューにおいて、手順の「有効性」まで踏み込むための適切な問いかけはどれですか？","o":["「手順書はありますか？」","「なぜその作業が必要なのですか？」という背景や目的の確認","「今日は忙しいですか？」","「はい、か、いいえで答えてください」"],"h":"単なる「Yes/No」ではなく、作業の意味を理解して実行しているかを問います。","c":1,"e":"作業の目的を理解しているかを確認することで、意図しないエラーや手抜きの防止、および力量の評価に繋がります。"},{"m":14,"q":"LPAで不適合（手順の不備など）が発見された際、管理者がとるべき正しい対応はどれですか？","o":["その場で見逃す","単なる作業者のミスとして片付けず、「なぜなぜ分析」で根本原因を追求し、仕組みを改善する","担当者を厳しく叱るだけで終わらせる","記録を合格に書き換える"],"h":"「なぜミスが起きたのか（プロセスの欠陥）」を修正することがQMSの目的です。","c":1,"e":"不適合を「改善の宝」と捉え、手順書の不備や教育訓練の不足など、恒久的な是正処置（再発防止）へと繋げる必要があります。"},{"m":14,"q":"食品製造業の事例において、落下細菌検査の結果が悪かった場合、製造部長レベルがLPAで行うべき高度な判断は何ですか？","o":["掃除をやり直させる","PRP（清掃手順や頻度）そのものが有効かどうか、妥当性を再評価する","検査を中止する","フィルターを外す"],"h":"「決めた通りにやったのに結果が悪い」なら、その「決めた事」自体を疑います。","c":1,"e":"手順（D）が守られているのに結果（C）が悪い場合、手順の設定（P）に問題があると考え、システムの妥当性を検証することが管理層の役割です。"},{"m":14,"q":"本研修のまとめとして、LPAを何に例えていましたか？","o":["豪華なフルコース","「企業の健康状態を計る日常的なバイタルチェック」","終わりなき旅","秘密の暗号"],"h":"毎日、体温や血圧を測るように、現場のクリティカルな動きをチェックする習慣です。","c":1,"e":"重大な病気（不良流出や事故）になる前に、日々の微細な変化を各層で捉え、組織の健康（品質と安全）を維持するための活動です。"},{"m":15,"q":"品質方針を設定し、組織内に展開して達成度をレビューする最終的な責任者は誰ですか？","o":["品質保証部長","外部のコンサルタント","経営者（トップマネジメント）","現場のリーダー"],"h":"QMSにおいて、組織の方向付けと資源投入の決定権を持つ人物です。","c":2,"e":"品質方針は経営戦略そのものです。経営者がリーダーシップを発揮し、顧客重視の方針を組織全体に浸透させる責任を負います。"},{"m":15,"q":"品質方針における「品質第一」の考え方に含まれる要素として、適切なものはどれですか？","o":["製品の見た目だけを良くすること","安全作業、整理・整頓、納期遵守など、仕事の質全体","検査員を増やすこと","利益を最優先し、品質は二の次にすること"],"h":"「良いモノ」を作るためには、その背景にある「良い仕事（プロセス）」が不可欠です。","c":1,"e":"真の品質第一とは、製品スペックだけでなく、安全や5S、工期などの「プロセス品質」をすべて含んだ概念です。"},{"m":15,"q":"限られた経営資源（人・物・金）を有効に使うために、目標展開において優先順位を決める基準となる「3つの要素」は何ですか？","o":["好き嫌い、新しさ、派手さ","重要性、緊急度、貢献性","担当者の年齢、勤続年数、性別","昨日の天気、明日の予定、今日の気分"],"h":"「何が組織にとって最も価値があるか」を客観的に判断する基準です。","c":1,"e":"すべての課題を同時には解決できません。重要度や緊急度が高いもの、そして目標達成への貢献度が大きいものから順に着手するのが戦略的な方針展開です。"},{"m":15,"q":"方針を具体的な部署目標に落とし込む際、誰が・何を・いつまでに・どのように行うかを明確にすることを何と呼びますか？","o":["精神論","5W1H（行動主体での捉え方）","質疑応答","自己紹介"],"h":"具体的であればあるほど、現場は迷わずに動くことができます。","c":1,"e":"抽象的なスローガンを具体的な「アクション（行動）」に変換するためには、5W1Hの視点で具体化することが必須です。"},{"m":15,"q":"部署目標の達成度を測るための「主要業績評価指標」をアルファベット3文字で何と呼びますか？","o":["QMS","ISO","KPI","5S"],"h":"不良率や納期達成率など、プロセスの成果を数値で表す指標です。","c":2,"e":"Key Performance Indicator（KPI）を設定することで、目標に対して現在どの位置にいるのかを客観的に監視・測定できるようになります。"},{"m":15,"q":"インプット、プロセス、アウトプットの視点から、業務に必要な資源や手順を整理する分析ツールを何と呼びますか？","o":["ウサギツール","タートルツール（タートル図）","パンダツール","カメレオンツール"],"h":"「プロセスモデル」とも呼ばれ、カメのような形をした図で分析します。","c":1,"e":"タートルツールを用いることで、目標達成のために「どのような手順（方法）が必要か」「どのような力量（人）が必要か」を漏れなく抽出できます。"},{"m":15,"q":"クレームデータを分析する際、特定の製品群や特定の時間帯（夜勤など）に分けて原因を絞り込む手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"「全体」を「意味のあるグループ」に仕分ける統計的手法です。","c":1,"e":"層別を行うことで、「夜勤の特定工程にミスが集中している」といった真の原因が見え、的確な対策（目標設定）が可能になります。"},{"m":15,"q":"エクセルのピボットテーブルにおいて、下位の項目を隠して「上位の階層のみ」を表示させ、全体像を素早く把握する操作は何ですか？","o":["データの削除","フィールドの折りたたみ","書式の変更","ファイルの圧縮"],"h":"細かいデータをまとめて、大きな傾向（トレンド）を見るための機能です。","c":1,"e":"折りたたみ機能を使うことで、膨大なデータから「どの部署が目標未達か」などの全体状況を一瞬で把握できます。"},{"m":15,"q":"製造部門への目標展開事例において、取り付けミスを物理的に防ぐために導入する仕組みを何と呼びますか？","o":["抜き取り検査","ポカヨケ","残業","整理・整頓"],"h":"「不注意」を責めるのではなく、ミスが起きないように「装置や治具」で工夫することです。","c":1,"e":"方針展開の最終形は、作業者の力量に頼らずとも目標（不良ゼロ）が達成できる「仕組み（ポカヨケ）」を現場に実装することです。"},{"m":15,"q":"本研修のまとめとして、品質方針の展開を何に例えていましたか？","o":["豪華なフルコースの献立","「オーケストラの指揮」","終わりなき旅","秘密の暗号"],"h":"経営者が曲（方針）を示し、各部署（奏者）が調和して音（目標）を奏でるイメージです。","c":1,"e":"全員が同じ楽譜（方針）を理解し、自分の役割を果たすことで、初めて顧客満足という素晴らしいハーモニーが生まれるのです。"},{"m":16,"q":"COPQ（不良品質コスト）を算出する本来の目的は何ですか？","o":["担当者を叱るための証拠にする","経理部の仕事を増やす","品質問題による経済的損失を数値化し、共通の言語で「ムダ」を認識・改善するため","検査員の給料を下げる"],"h":"「いくら損をしているか」を可視化することで、全員の改善意欲を高めます。","c":2,"e":"品質問題を金額に換算することで、経営層から現場までが問題の大きさを共有し、優先順位を持って改善に取り組むことが可能になります。"},{"m":16,"q":"COPQ（品質不良コスト）は、QMSのどのプロセスにおいて重要な「インプット項目」となりますか？","o":["始業点検","マネジメントレビュー","新入社員教育","忘年会の計画"],"h":"経営者が組織の品質パフォーマンスを評価し、方針を決定する場です。","c":1,"e":"経営者が品質目標の達成状況やトレンドを把握し、資源投入の判断を下すために、COPQは欠かせない経営指標となります。"},{"m":16,"q":"COPQに含まれる「失敗コスト」を、トヨタ生産方式などの思想では何と呼びますか？","o":["付加価値","ムダ","投資","利益"],"h":"原価だけを高め、顧客にとっては何の価値も生み出さない要素です。","c":1,"e":"不良品の廃棄や手直し、クレーム対応などは、典型的な「ムダ」であり、これらを排除することが利益率の向上に直結します。"},{"m":16,"q":"大量のコストデータを「製品別」「工程別」「不良種別」などに切り分けて分析する手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","隠蔽"],"h":"「どこで」「何が」起きているかをあぶり出すための仕分け作業です。","c":1,"e":"層別を行うことで、全体のコストを押し上げている「真の要因」を特定し、効率的な対策を立てることができます。"},{"m":16,"q":"層別分析の結果をコストの大きい順に並べ、全体への影響度を確認するために作成する図は何ですか？","o":["組織図","パレート図","系統図","散布図"],"h":"「上位数項目で全体の8割の損失を占める」といった傾向を掴むのに適しています。","c":1,"e":"パレート分析を行うことで、効果の大きい要因から優先的に対策を打つ「重点指向」の管理が可能になります。"},{"m":16,"q":"エクセルのピボットテーブルにおいて、下位の項目を隠して「上位の階層のみ」を表示させる操作は何ですか？","o":["データの削除","フィールドの折りたたみ","書式の変更","ファイルの圧縮"],"h":"膨大なデータの中から、コストの大きな「塊（クラスター）」を素早く探す機能です。","c":1,"e":"折りたたみ機能を活用することで、細かい枝葉に惑わされず、どの工場やどの製品群が最大のリスクかという全体像を瞬時に把握できます。"},{"m":16,"q":"高額な品質不良コストが発生している場合、開発のどのプロセスが不十分であった可能性が高いですか？","o":["発売後の宣伝","リスク分析（FMEA）や先行製品品質計画（APQP）","事務用品の購入","社内イベントの企画"],"h":"「設計段階（源流）」でエラーを予防できていなかったことを意味します。","c":1,"e":"COPQが高いということは、源流でのリスク予測（FMEA）が甘かった証拠です。この結果を設計段階へフィードバックすることが重要です。"},{"m":16,"q":"不適合の原因として「作業者を指導した」という回答（修正処置）で終わらせてはいけない理由は何ですか？","o":["指導が面倒だから","根本的な仕組みの欠陥が残っており、再発するリスクが高いから","作業者が可哀想だから","記録が短くなるから"],"h":"「なぜミスが起きたのか（プロセスの欠陥）」を修正しなければなりません。","c":1,"e":"「なぜなぜ分析」を用いて、人がミスをしても不良にならない「仕組み（ポカヨケ等）」を導入することこそが、是正処置の本質です。"},{"m":16,"q":"事例の「特殊特性（SC）」管理において、作業者の勘による調整でばらつきが増える現象を何と呼びますか？","o":["最適化","過剰調整（ムダ）","予防保全","精密管理"],"h":"良かれと思って手を出すことが、逆にプロセスを不安定にします。","c":1,"e":"統計的に安定している工程に余計な介入をすることは、コストとばらつきを増やすだけの「ムダ」となります。"},{"m":16,"q":"本研修のまとめとして、COPQの棚卸しを何に例えていましたか？","o":["豪華なフルコース","「企業会計の隠された“健康診断書”」","終わりなき旅","秘密の暗号"],"h":"表面的な利益の裏にある「慢性的な出血（損失）」を見つけ出すイメージです。","c":1,"e":"隠れた損失を可視化し、止血（改善）を行うことで、企業の体質を劇的に強化するための、科学的な診断活動なのです。"},{"m":17,"q":"FMEA（故障モード影響解析）の本来の目的として、最も適切なものはどれですか？","o":["不良品が発生した後に、その原因を記録すること","潜在的な故障を予測し、発生する前に予防または減少させること","責任の所在を明確にすること","検査員の人数を計算すること"],"h":"「起きてから直す」のではなく「起きる前に防ぐ」という源流管理の考え方です。","c":1,"e":"FMEAは、設計や工程設計の初期段階でリスクを洗い出し、エラーの発生を未然に防ぐ「予防」のためのツールです。"},{"m":17,"q":"製品そのものの設計における潜在的な故障を解析するFMEAを何と呼びますか？","o":["PFMEA","DFMEA（設計FMEA）","SFMEA","EFMEA"],"h":"Design（設計）の頭文字をとった名称です。","c":1,"e":"DFMEAは、製品の機能や構造に潜む故障モードを分析します。これに対し、製造工程を分析するものはPFMEA（プロセスFMEA）と呼ばれます。"},{"m":17,"q":"FMEAを実施する際、設計や製造だけでなく、品質、購買、営業などの関連部門が集まって組織されるチームを何と呼びますか？","o":["事務局","部門横断的チーム（CFT/MDT）","監査対応班"," ,{"m":19,"q":"事例にある「イエローアラート（傾向変化の検知）」が発動した際、推奨される活動はどれですか？","o":["故障するまで放置する","予防処置（先手のメンテナンス等）の検討・実施","全製品の廃棄","システムの電源を切る"],"h":"「まだ不良は出ていないが、このままだと危ない」という段階でのアクションです。","c":1,"e":"イエローアラートは「予防」のチャンスです。重大な不適合（レッドアラート）に至る前に、原因を調査し是正することで、ダウンタイムや損失を最小限に抑えます。"},{"m":19,"q":"異常（レッドアラート）が発生した際、コントロールプランに基づき最優先で実施すべきことは何ですか？","o":["翌月の品質会議での報告","不適合製品の隔離（封じ込め）とラインの生産中断","装置のスピードを上げる","データの削除"],"h":"被害を最小限に食い止め、不適合品を絶対に流出させないための「緊急手術」です。","c":1,"e":"アラートは「通知」で終わらせず、不適合品の隔離や生産停止といった物理的な「封じ込め」アクションと直結していなければなりません。"},{"m":19,"q":"本研修のまとめとして、異常アラート設計を何に例えていましたか？","o":["豪華なフルコースの献立","「製造現場のリアルタイム診断システム」","終わりなき旅の地図","秘密の暗号解読"],"h":"信頼できるデータ（検査結果）に基づき、AI（医師）が異常を察知して、即座に「緊急手術（処置）」を指示するイメージです。","c":1,"e":"改ざんのない正確なデータに基づき、プロセスの不整脈（異常）を瞬時に捉えて自動で封じ込める。これがデジタル時代の品質管理の理想形です。"},{"m":20,"q":"カンバン方式の本来の役割である「後工程引き」とはどのような仕組みですか？","o":["前工程が計画通りにどんどん製品を押し込む方式","後工程が使った分だけ、前工程から引き取る方式","在庫を山積みにして欠品を防ぐ方式","勘と経験で生産量を決める方式"],"h":"スーパーマーケットの棚のように、売れた分（使った分）だけを補充する考え方です。","c":1,"e":"後工程が必要な時に、必要な分だけを引き取ることで、過剰在庫という「ムダ」を徹底的に排除し、生産の同期化を図ります。"},{"m":20,"q":"トヨタ生産方式において、過剰在庫が「悪」とされる最大の理由は何ですか？","o":["倉庫の場所をとるから","帳簿上の計算が面倒だから","機械故障や不良などの「現場の問題点」を隠す城壁になってしまうから","製品が埃をかぶるから"],"h":"在庫という「水」が多すぎると、底にある「岩（問題点）」が見えなくなってしまいます。","c":2,"e":"在庫を極限まで減らすことで、工程間のアンバランスや品質不良がすぐに表面化し、現場が真剣に改善（PDCA）に取り組まざるを得ない状況を作ります。"},{"m":20,"q":"アンドンが点灯したり警告音を発したりすることは、品質マネジメントシステム（QMS）におけるどのような権限の行使を意味しますか？","o":["休憩をとる権限","予算を使う権限","異常時に「生産を中断する権限」","担当者を交代させる権限"],"h":"「悪いものを流さない」ために、現場の判断でラインを止める非常に重要な権利です。","c":2,"e":"不適合の疑いがある際に直ちにラインを停止し、隔離・封じ込めを行うことは、重大な品質事故を未然に防ぐための必須の行動です。"},{"m":20,"q":"アンドンの「赤色」が示す一般的な状態と、それに対する現場の鉄則は何ですか？","o":["順調なので放置する","ライン停止（異常発生）であり、不適合品を絶対に後工程へ流さない","休憩時間の合図","掃除の開始"],"h":"「読む・考える」をさせない色彩基準であり、直感的な判断を促します。","c":1,"e":"赤色は「異常・停止」を意味します。コントロールプラン（CP）に基づき、直ちに応急処置（隔離・封じ込め）を開始しなければなりません。"},{"m":20,"q":"IoTやAIと統合された現代のアンドンにおいて、不具合が起きる前に「特別要因の予兆」を検知して出す警告を何と呼びますか？","o":["ラストアラート","予兆検知アラート（イエローアラート等）","完了通知","起動信号"],"h":"「まだ不良は出ていないが、このままだと危ない」という段階で出す警報です。","c":1,"e":"FMEAで特定された高リスク領域のデータをAIが監視し、傾向変化（ばらつき）を検知した段階でアラートを出すことで、予防処置が可能になります。"},{"m":20,"q":"管理ボード（掲示板）において、収集されたデータを製品別、設備別、作業者別などに切り分けて分析する手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"「全体」を「意味のあるグループ」に仕分けることで、真の原因をあぶり出します。","c":1,"e":"層別分析を行うことで、どの要因がばらつきを引き起こしているかを客観的に特定し、効果的な是正処置へと繋げることができます。"},{"m":20,"q":"大量のデータを階層的に配置し、集計表の内容を上位階層のみに切り替えて全体像を素早く把握するのに役立つエクセルの機能は何ですか？","o":["グラフ作成","ピボットテーブル（折りたたみ機能）","スペルチェック","セルの結合"],"h":"「ひと目でわかるようにまとめる」ための、デジタル時代の強力な分析ツールです。","c":1,"e":"ピボットテーブルを活用することで、膨大なアラートログや不良データから、優先的に対処すべき「コストの塊」を瞬時に見つけ出せます。"},{"m":20,"q":"管理ボードに掲示する是正処置において、「作業者を指導した」という回答（修正処置）だけで終わらせてはいけないのはなぜですか？","o":["指導は効果がないから","ミスを発生させる根本的な原因（仕組みの欠陥）が除去されていないから","書類が短すぎるから","誰が指導したか分からないから"],"h":"「なぜミスが起きても流出したのか」を問い続け、ポカヨケなどの仕組みに変える必要があります。","c":1,"e":"「なぜなぜ分析」の結果をボードで共有し、個人の力量に頼らない恒久的な再発防止策（是正処置）を確立することがQMSの目的です。"},{"m":20,"q":"自工程で確立した再発防止策（ポカヨケ等）を、類似の工程や他の部門にも広めて未然防止を図る活動を何と呼びますか？","o":["垂直展開","水平展開（横展開）","現場復帰","秘密保持"],"h":"一つの教訓を「組織全体の宝」として横に広げるイメージです。","c":1,"e":"管理ボードを用いて水平展開の進捗をフォローアップすることで、同様のトラブルを全社レベルで予防することができます。"},{"m":20,"q":"本研修のまとめとして、見える化（アンドン・カンバン・ボード）を何に例えていましたか？","o":["豪華なフルコースのメニュー","「製造プロセスを流れる血液の健康状態を可視化するシステム」","終わりなき旅","秘密の暗号"],"h":"血流（モノの流れ）の滞りや、大出血（異常）を検知し、診断（分析）するイメージです。","c":1,"e":"カンバンで流れを整え、アンドンで止血し、ボードで体質改善を促す。この統合運用が組織の強靭な品質文化を支えるのです。"},{"m":21,"q":"マネジメントレビュー（品質会議）において、経営層がシステムの有効性を判断するために不可欠な、トップマネジメントの本来の役割は何ですか？","o":["各部門の報告を黙って聞くこと","品質方針を設定し、その達成度をレビューして継続的改善を指揮すること","議事録の誤字脱字をチェックすること","現場の作業を代行すること"],"h":"「経営の羅針盤」として、組織の方向性（P）と結果（C/A）を繋ぐ役割です。","c":1,"e":"経営層が品質を経営課題として捉え、データに基づき資源投入や方針の修正を決定することこそが、QMS（品質マネジメントシステム）のエンジンとなります。"},{"m":21,"q":"会議において、リスクマネジメントが果たすべき最も重要な役割は何ですか？","o":["誰がミスをしたか特定すること","意思決定者が最適な判断を下せるよう、事実に基づいた客観的な材料（選択肢）を提供すること","予算を削減すること","会議時間を短縮すること"],"h":"「なんとなく」ではなく、FMEAやクレーム分析などの「根拠」を持って経営判断を支えます。","c":1,"e":"将来被るかもしれない影響を予測し、複数の選択肢を示すことで、経営層はリスクを回避するための適切な投資や指示が可能になります。"},{"m":21,"q":"品質問題が経営に与える影響を「お金」の単位で可視化し、レビューの重要なインプットとなる指標は何ですか？","o":["残業代の総額","品質不良コスト（COPQ）","消耗品費","接待交際費"],"h":"不良や手直し、クレーム対応など、付加価値を生まない「ムダ」を数値化したものです。","c":1,"e":"COPQのトレンドを示すことで、品質改善がどれほどコスト削減や利益貢献に繋がるかを経営層に直感的に理解させることができます。"},{"m":21,"q":"報告されるデータを「人ごと」「設備ごと」「ロットごと」などに切り分け、バラツキの原因を特定する手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"「全体」を「意味のあるグループ」に仕分ける統計的手法です。","c":1,"e":"平均値だけでは真の原因は見えません。層別を行うことで、どの要因が問題を引き起こしているかを明確にし、重点的に手を打つべき箇所を特定できます。"},{"m":21,"q":"大量のデータを階層的にまとめ、上位の階層（全体像）から詳細へと素早く切り替えて分析するのに役立つツールの機能は何ですか？","o":["グラフのコピー","ピボットテーブル（折りたたみ・展開機能）","文字の装飾","セルの結合"],"h":"詳細に入る前に、まず「大きな塊（トレンド）」を掴むために有効なデジタルツールです。","c":1,"e":"ピボットテーブルを駆使することで、会議の限られた時間内で、効果が大きい要因に高い優先順位をつける「重点指向」の議論が可能になります。"},{"m":21,"q":"不適合の報告に対し、「作業者を指導した」という回答（修正処置）で終わらせてはいけない理由は何ですか？","o":["指導が面倒だから","根本的な原因（仕組みの欠陥）が除去されておらず、再発するリスクが高いから","報告書が短くなるから","誰を指導したか分からないから"],"h":"「なぜミスが起きたのか（プロセスの弱点）」を改善しなければなりません。","c":1,"e":"「なぜなぜ分析」を行い、個人の力量に頼らない恒久的な再発防止策（ポカヨケ、手順改訂など）を導き出すことこそが是正処置の本質です。"},{"m":21,"q":"重大な不適合が報告された際、ファシリテーターが「是正処置の前に」必ず確認すべき緊急のステップは何ですか？","o":["次回の会議日程","応急処置（封じ込め・遡及処置）が適切にとられ、不適合品が識別・管理されているか","担当者の反省文","装置の売却"],"h":"「火元を絶つ」前に、まずは「延焼（不良流出）」を食い止める必要があります。","c":1,"e":"不適合品が誤って出荷・加工されないよう物理的に隔離し、過去の影響ロットを特定（遡及処置）しているかを確認することが最優先です。"},{"m":21,"q":"会議の議事録において、決定事項だけでなく「決定に至る過程（主要な意見や懸案事項）」を記録すべき最大の理由は何ですか？","o":["ページ数を増やすため","後でその決定が正しかったかどうかの妥当性を検証するための重要な記録になるから","欠席者への嫌がらせのため","タイピングの練習のため"],"h":"「なぜその結論になったか」という経緯は、将来の改善や監査での証拠となります。","c":1,"e":"議論のプロセスを残すことで、意思決定の背景が明確になり、後に状況が変わった際の再評価や、知識の共有に役立ちます。"},{"m":21,"q":"現場から「事実（悪いニュース）」が上がってこなくなる「情報のダム」を防ぐために、管理者が作らなければならない雰囲気はどのようなものですか？","o":["厳しい罰則がある雰囲気","客観的な証拠（事実）に基づいて、誰でもが何でも言える雰囲気","常に沈黙を守る雰囲気","上司の顔色を伺う雰囲気"],"h":"心理的安全性を確保し、問題が小さいうちに共有される環境を整えます。","c":1,"e":"事実に基づいたコミュニケーションを推奨することで、隠蔽を防ぎ、組織全体でリスクを早期に発見・解決できるようになります。"},{"m":21,"q":"本研修のまとめとして、品質会議のファシリテーションを何に例えていましたか？","o":["豪華なディナーのホスト","「外科医のチームリーダー」","終わりなき旅のガイド","秘密の暗号の解読者"],"h":"データを分析して病巣（リスク）を特定し、緊急手術（封じ込め）と根本治療（是正）を指揮するイメージです。","c":1,"e":"単に「痛みを止める（修正）」だけでなく、組織という生命体の健康を維持するために、真の原因を切り取る（是正）決断を導き出すのがファシリテーターの責務です。"},{"m":22,"q":"サプライヤー（協力会社）への外注の本質的な意味として、最も適切なものはどれですか？","o":["単なる「加工」の依頼","「品質保証」そのものの依頼","責任を押し付けるための依頼","コスト削減だけを目的とした依頼"],"h":"相手を「加工屋」ではなく、自社の品質を支える「パートナー」として位置づけます。","c":1,"e":"サプライヤーは自社の製造プロセスの一部です。納入時に不適合が出るのは、サプライヤー側での品質保証プロセスが機能していないことを意味します。"},{"m":22,"q":"サプライヤーの品質意識を劇的に向上させ、納入時の無検査（受入検査撤廃）を実現するために有効な施策は何ですか？","o":["検査員をサプライヤーに派遣する","「受入検査を行わない」と通知し、不適合発生時の損害賠償契約を取り交わす","検査を二重に行う","抜き取り数を増やす"],"h":"「後でチェックしてもらえる」という甘えをなくし、源流での保証を促します。","c":1,"e":"受入検査をしない＝サプライヤーが100%保証するという強い責任感を持たせることで、結果としてサプライチェーン全体の品質レベルが向上します。"},{"m":22,"q":"新製品開発において、サプライヤー側でも本社と同様に、設計・製造・品質等の多部門が集まって活動することを何と呼びますか？","o":["事務局","部門横断的チーム（CFT）","監査対応班","臨時作業部会"],"h":"サプライヤー内部でも、部門の壁を越えたリスク抽出が必要です。","c":1,"e":"サプライヤーのAPQP活動においても、CFTによる多角的な検討を行うことで、量産移行後の品質トラブルを未然に防ぎます。"},{"m":22,"q":"製品の安全性や法規制適合性に直結する「特殊特性（SC）」をサプライヤーに管理させる際、必須となる対応はどれですか？","o":["担当者の名前を掲示させる","コントロールプラン（CP）や図面、作業指示書に特定のシンボルで識別表示させる","電話で口頭指示する","秘密にする"],"h":"誰が見ても「これは重要な特性だ」と一目でわかるようにしなければなりません。","c":1,"e":"SC項目は、サプライヤーの現場作業者にまで重要性が伝わるよう、すべての関連文書に識別マークを明示し、厳格な監視方法を共有することが義務付けられています。"},{"m":22,"q":"サプライヤーが製造工程や材料を変更（4M変更）しようとする際、守るべき厳格なルールは何ですか？","o":["変更が終わってから事後報告する","実施前にリスク評価を含む妥当性確認を行い、本社の承認を得る","安くなるなら自由に報告なしで変えてよい","担当者レベルの合意で進める"],"h":"勝手な変更（サイレントチェンジ）は、重大なリコールリスクを招きます。","c":1,"e":"供給者による変更も、FMEAや品質に影響を与えるため、コントロールプランの更新と顧客（本社）への通知・承認プロセスを厳格に運用しなければなりません。"},{"m":22,"q":"グローバルなサプライヤーのパフォーマンスを継続的に監視するための指標（KPI）として、不適切なものはどれですか？","o":["引き渡された製品の品質","納期遵守状況（超過運賃の実績など）","サプライヤーの社内イベント回数","顧客（市場）からのクレーム・返品状況"],"h":"Q（品質）、D（納期）という実務的な成果に注目します。","c":2,"e":"品質実績、納期実績、市場クレーム、および重大な問題に対する顧客通知の有無が、サプライヤー評価の主要なインプットとなります。"},{"m":22,"q":"新興国の海外拠点など、品質管理レベルに課題がある拠点に対して日本本社がとるべき姿勢はどれですか？","o":["放置して結果だけを待つ","自立できるまで、内部監査チームによる直接支援や教育訓練のコストを投じる","厳しい言葉で叱責する","すべてを日本で検品する"],"h":"「管理の仕組み」を現地に根付かせるための投資と考えます。","c":1,"e":"文化や背景の異なる海外拠点では、システムの「有効性」を現場・現物で検証し、根気強く教育・支援を続けることが、グローバル品質の安定に繋がります。"},{"m":22,"q":"事例にある「計測機器の校正期限切れ」が海外拠点で発見された際、直ちに行わせるべき「遡及処置」は何ですか？","o":["機器を新品に買い替える","その機器で測定した過去の結果の「妥当性の評価」と記録","担当者に始末書を書かせる","データを消去する"],"h":"「狂ったかもしれない物差しで測った過去の製品」の影響を調査します。","c":1,"e":"SC特性を測定する機器の不備は致命的です。影響を受けた全製品の安全性を再評価し、必要であれば隔離や回収を判断しなければなりません。"},{"m":22,"q":"海外拠点で発生した重大な不適合に対する是正処置を、他の拠点やサプライヤーにも広める活動を何と呼びますか？","o":["垂直展開","水平展開（横展開）","現場復帰","秘密保持"],"h":"一つの拠点の失敗を「艦隊全体の教訓」として横に広げるイメージです。","c":1,"e":"ある拠点で起きたことは他でも起きる可能性があります。恒久的な対策（ポカヨケ等）をグローバルに水平展開することで、組織全体の未然防止能力を高めます。"},{"m":22,"q":"本研修のまとめとして、グローバルな品質連携を何に例えていましたか？","o":["豪華なクルーズ客船の旅","「複数の船団を一つの艦隊（本社QMS）として統率する活動」","終わりなき旅","秘密の暗号"],"h":"それぞれの船（拠点）が貨物（品質）を守り、司令塔（本社）と同期して航行するイメージです。","c":1,"e":"全拠点が同じルールで動き、異常があれば全船で共有・対策する。この「同期」こそが、グローバル市場という荒波を乗り越えるための唯一の手段です。"},{"m":23,"q":"品質人材育成において、組織が保有する固有の技術や技能（力量）を維持・伝承できない場合に生じる最大のリスクは何ですか？","o":["事務所の備品が減る","業務の質が低下し、不良品や製品欠陥を作る原因になる","休憩時間が長くなる","会社案内が古くなる"],"h":"「知恵と技術」が途絶えると、プロセスの適合性が維持できなくなります。","c":1,"e":"組織的な知識（固有技術）は品質の源泉です。力量不足は意図しないエラーや標準からの逸脱を招き、最終的な製品品質に致命的な悪影響を及ぼします。"},{"m":23,"q":"OJTを行う際の基本となる、業務の最低水準を段階的・階層的に明記した文書を何と呼びますか？","o":["出勤簿","業務マニュアル（適正化された業務手順書）","決算書","組織図"],"h":"指導のバラツキを抑え、誰もが同じ基準で学べるようにするための「教科書」です。","c":1,"e":"マニュアルで標準を明確にすることで、指導者の主観に頼らない教育が可能になります。力量レベル（1〜4など）と連動させて活用することが推奨されます。"},{"m":23,"q":"自動車産業などの厳格な品質基準において、必ずOJT訓練を実施しなければならないタイミングはいつですか？","o":["10年に一度","製品品質に影響する「新規の業務」または「変更された業務」が発生したとき","社員旅行の前","暇な時"],"h":"「初めて」や「変更」の瞬間は、最も品質問題が発生しやすいリスクポイントです。","c":1,"e":"新製品の立ち上げや4M変更時には、不適合のリスクが急増します。このタイミングでの教育を義務化することで、流出を未然に防ぐ「予防処置」となります。"},{"m":23,"q":"現代の品質管理において、OJTの対象に含めるべき要員は誰ですか？","o":["正社員のみ","管理職のみ","正規従業員、契約社員、派遣社員を含むすべての実務担当者","外部の顧客"],"h":"誰が作業しても「品質への影響」は同じです。雇用形態で区別してはいけません。","c":2,"e":"アウトソーシングや派遣活用が進む中、現場で実務を担うすべての要員に同等の教育を施し、記録を残すことがQMS上の厳格な要求事項です。"},{"m":23,"q":"計画的なOJTを運営するために明確にすべき「5W1H」の要素として、適切なものはどれですか？","o":["誰が、誰に、いつ、どのように、何のために、何を行うか","どこで、誰と、いくらで、なぜ、楽しく、遊ぶか","何を、誰が、いつ、どこで、隠すか","いつ、どこで、誰が、転んだか"],"h":"指導の責任と内容を具体化し、実行の漏れをなくすための計画要素です。","c":0,"e":"5W1Hに基づき「指導責任者」や「習得目標」を明確にすることで、場当たり的ではない体系的な教育システムが構築されます。"},{"m":23,"q":"OJT実施後に行う「有効性評価」として、最も実戦的で適切な方法はどれですか？","o":["感想文を書かせる","一人で作業ができるようになったかを「実地」で確認する","笑顔で挨拶できるか見る","出席簿に印を付ける"],"h":"「知っている」ことと「できる」ことは別です。成果を現場で確認します。","c":1,"e":"教育は「やりっぱなし」にせず、実務でのパフォーマンスを確認して初めて「力量がついた」と判断します。これがQMSにおける教育の有効性評価です。"},{"m":23,"q":"品質人材が持つべき「顧客意識」について、正しい考え方はどれですか？","o":["直接の購入者だけが顧客である","自分の次の工程（後工程）も「お客様」であると考える","顧客の要望は無視してよい","検査員だけが顧客を意識すればよい"],"h":"「悪いものを流さない」という意識を、ラインの全員が持つための合言葉です。","c":1,"e":"「後工程はお客様」という意識をOJTで徹底することで、工程内での不適合品の識別・隔離が確実になり、最終顧客への流出を最小限に抑えられます。"},{"m":23,"q":"設計部門のOJTにおいて、指導者（上司）に求められる「監視」のスタイルは何に例えられていましたか？","o":["地下潜行するモグラ","低空飛行で監視するヘリコプター","遠くで見守る星","獲物を狙う鷹"],"h":"作業に埋没せず、ミスが起きそうな「その瞬間」を捉えて指導するスタイルです。","c":1,"e":"部下の行動を俯瞰し、適切なタイミングで「介入・指導」を行うことが、設計ミスを未然に防ぎつつ力量を高める高度なOJTです。"},{"m":23,"q":"食品工場のCCP（重要管理点）モニタリングのOJTにおいて、実務とともに徹底して教えるべきことは何ですか？","o":["休憩時間の長さ","基準を逸脱した際の「適切な措置（権限）」と手順","掃除道具の種類","昨日の生産実績"],"h":"「異常に気づく」だけでなく、その後に「どう動くか」が安全の要です。","c":1,"e":"基準を外れた際に、自分の判断で製品を保留したりラインを止めたりする権限と手順を教え込むことが、食品安全（FSMS）の現場を守る鍵となります。"},{"m":23,"q":"本研修のまとめとして、OJTを何に例えていましたか？","o":["豪華なフルコース","「技術と知恵の滝行」","終わりなき旅","秘密の暗号"],"h":"現場の厳しい現実（滝）に打たれながら、指導者のもとで習熟するイメージです。","c":1,"e":"実地経験を通じて「知的熟練」を積み、変化に対応できる本物の品質能力を身につける。これこそが、企業の競争力を支える人材育成の姿です。"},{"m":24,"q":"経営層への品質レポート（マネジメントレビューのインプット）において、品質問題を「経営の言語（お金）」で表すために最も重要な指標は何ですか？","o":["残業時間の合計","品質失敗コスト（COPQ）","事務用品の購入費","従業員の満足度スコア"],"h":"不良や手直し、クレーム対応など、付加価値を生まない「ムダ」を定量化した指標です。","c":1,"e":"COPQを示すことで、品質不備がどれほど利益を圧迫しているかを経営層に直感的に理解させ、改善投資の必要性を説得する強力な材料となります。"},{"m":24,"q":"品質レポートに含めるべき「トレンド情報」として、適切な組み合わせはどれですか？","o":["今日の天気と明日の予定","品質実績、納期実績、返品実績などの推移","担当者の氏名と年齢","過去の表彰状の数"],"h":"単発の数値ではなく、組織のパフォーマンスが向上しているか、悪化しているかの「傾向」を示します。","c":1,"e":"トレンド（傾向）を示すことで、現在のQMSが有効に機能しているか、あるいは新たなリスクが顕在化しつつあるかを経営層が判断できるようになります。"},{"m":24,"q":"レポート作成において、不適合が発生した場合に顧客や法規制に致命的な影響を与える「高リスク領域」を何と呼びますか？","o":["一般特性","特殊特性（SC）や重要管理点（CCP）","共通特性","隠れた特性"],"h":"FMEAなどで特定され、安全や機能に直結する極めて重要な管理項目です。","c":1,"e":"経営層には、すべての不良を等しく報告するのではなく、特にSCやCCPといった事業継続を揺るがすリスクに焦点を当てて報告する必要があります。"},{"m":24,"q":"膨大なデータを「製品別」「工程別」「不良種別」などに切り分け、問題の所在を明確にする統計的手法は何ですか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"「全体」を「意味のあるグループ」に仕分けることで、真の原因をあぶり出します。","c":1,"e":"層別を行うことで、例えば「特定のラインの夜勤帯にコストが集中している」といった事実を可視化でき、的確な経営判断を促せます。"},{"m":24,"q":"エクセルのピボットテーブルにおいて、下位の項目を隠して「全体の状況を素早く把握する」ために便利な操作は何ですか？","o":["データの消去","フィールドの折りたたみ（階層表示）","フォントの変更","セルの結合"],"h":"詳細な枝葉を見る前に、まずは「コストの塊（クラスター）」を特定するための機能です。","c":1,"e":"折りたたみ機能を活用することで、経営層に対し、どの工場やどの製品群に最大のリスクがあるかという全体像を一瞬で提示できます。"},{"m":24,"q":"分析の結果、効果が大きい要因に高い優先順位をつけて取り組む考え方を何と呼びますか？","o":["重点指向","全員野球","安全第一","現状維持"],"h":"「安易にできること」からではなく、「結果（利益・リスク回避）への寄与度」で選ぶ姿勢です。","c":0,"e":"経営資源（人・物・金）は有限です。最も効果が高い（またはリスクが深刻な）課題にリソースを集中させるよう促すのがレポーティングの要諦です。"},{"m":24,"q":"内部監査の結果をレポーティングする際、避けるべき「曖昧な表現」はどれですか？","o":["「〇名中〇名が手順を守っていなかった」という具体的数値","「工程で作業者が手順を守っていなかった」という抽象的表現","「ダブルチェックが未実施だった」という事実","「〇〇の基準を満たしていない」という根拠"],"h":"経営層が「リスクの大きさ」を正しく予測できる情報でなければなりません。","c":1,"e":"具体的な事実（何名が、どの手順を等）を記述することで、それが「個人のうっかり」なのか「仕組みの欠陥（遡及処置の必要性）」なのかを経営層が判断できるようになります。"},{"m":24,"q":"事例にある「COPQ削減に向けた提案」において、経営層に示すべき「意思決定の材料」として最も重要なものは何ですか？","o":["担当者の反省文","複数の選択肢（投資案）と、それぞれに伴うリスクとリターンの予測","過去の成功体験の自慢","装置のパンフレット"],"h":"「A案ならリスクはこう消える、B案ならこう残る」という比較検討の材料です。","c":1,"e":"経営層はリスクとコストのバランスで判断します。科学的なデータに基づき、将来の損得（リスク回避の見込み）を予測した選択肢を示すことが求められます。"},{"m":24,"q":"不適合の原因に対し、「作業者を指導した」という回答（修正処置）で終わらせてはいけない理由は何ですか？","o":["指導は効果がないから","根本的な仕組みの欠陥が除去されておらず、再発して損失を出し続けるから","報告書が短くなるから","誰を指導したか分からないから"],"h":"「なぜミスが起きても流出したのか」を問い続け、ポカヨケなどの恒久的な改善に繋げる必要があります。","c":1,"e":"経営層に対しては、単なる「お詫び」ではなく、二度と起きない「仕組みの改善（是正処置）」への投資や承認を求めるのが正しいレポーティングです。"},{"m":24,"q":"本研修のまとめとして、経営層への品質レポートを何に例えていましたか？","o":["豪華なフルコースの献立","「企業の総合病院におけるトップカンファレンスへの資料」","終わりなき旅","秘密の暗号"],"h":"検査データに基づき、深刻な病巣（リスク）を特定し、最適な治療法（是正）を決定するイメージです。","c":1,"e":"客観的なデータという「診断結果」を基に、企業の健全性と競争力を守るための「手術（改善アクション）」を経営層に決断させる、生命線に関わる活動です。"},{"m":25,"q":"市場クレームや重大な不適合が発生した際、是正処置（再発防止）を検討する「以前」に、最優先で実施すべきことは何ですか？","o":["担当者の責任追及","応急処置（暫定処置・遡及処置）による問題の封じ込め","次年度の品質目標の見直し","装置の売却"],"h":"「火元を絶つ」前に、まずは「被害の拡大（不良流出）」を食い止める必要があります。","c":1,"e":"不適合品が誤って使用・出荷されないよう物理的に隔離し、ロット情報から影響範囲を特定（トレーサビリティの活用）することが初動の鉄則です。"},{"m":25,"q":"不適合の原因が「測定機器の精度異常（校正外れ）」であった場合、組織が義務付けられている厳格な対応は何ですか？","o":["機器を修理するだけでよい","その機器でそれまでに測定した結果の「妥当性の評価（遡及処置）」と記録","担当者を厳重注意する","データを消去する"],"h":"「狂ったかもしれない物差しで測った過去の製品」は本当に合格だったのかを検証します。","c":1,"e":"計測器の不備は過去の全データの信頼性を揺るがします。影響を受けた製品すべての品質を再評価し、記録に残すことがQMS上の厳格な要求です。"},{"m":25,"q":"原因究明において、報告書などの「紙面上のデータ」だけでなく、現場へ行き現物を直接確認する姿勢を何と呼びますか？","o":["三現主義","成果主義","完璧主義","形式主義"],"h":"「現場」「現物」「現実」の3つの「現」を重視する考え方です。","c":0,"e":"データは事実の断片にすぎません。現場で現物を見ながら議論することで、数値の裏に隠れた真の原因（作業のバラツキ等）を掴むことができます。"},{"m":25,"q":"大量のクレームデータを「人ごと」「設備ごと」「ロットごと」などに切り分け、問題がどこに集中しているかを特定する手法は何ですか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"ピボットテーブルなどを用いて、要因ごとにデータを仕分ける統計的手法です。","c":1,"e":"層別を行うことで、「夜勤の特定の設備」といったピンポイントな原因箇所をあぶり出し、改善の優先順位（重点指向）を決定できます。"},{"m":25,"q":"不適合の原因として「作業者が手順を守っていなかった」という報告に対し、ファシリテーターが更なる深掘りのために投げかけるべき問いは何ですか？","o":["「次は誰が担当しますか？」","「なぜミスが発生するのか？（なぜなぜ分析）」","「いつから休憩ですか？」","「指導は終わりましたか？」"],"h":"「個人の不注意」で終わらせず、ミスを誘発する「仕組みの欠陥」を突き止めます。","c":1,"e":"なぜミスが起きたのか、なぜ防げなかったのかを問い続け、仕組みそのものを改善（是正処置）へと導く必要があります。"},{"m":25,"q":"是正処置において、人の注意に頼らず、仕組みでエラーの発生を物理的・機構的に予防する手法を何と呼びますか？","o":["抜き取り検査","ポカヨケ（エラー防止）","残業","整理・整頓"],"h":"「うっかり」しても不良にならない、あるいは工程が止まる仕組みのことです。","c":1,"e":"ポカヨケを源流段階（工程設計）で組み込むことが、再発防止を徹底するための最も有効な手段となります。"},{"m":25,"q":"是正処置として採用された恒久対策を反映させ、常に最新の状態に維持すべき「生きた文書」はどれですか？","o":["会社案内","FMEA（故障モード影響解析）およびコントロールプラン（CP）","昨年の予算書","従業員名簿"],"h":"リスク分析の結果と、実際の製造現場での管理方法を紐付けた最重要文書です。","c":1,"e":"不具合から得た教訓をFMEAやCPにフィードバックし、管理レベルを更新し続けることで、組織の品質保証システムは進化します。"},{"m":25,"q":"自工程で確立した再発防止策を、類似の製品や他の工程にも広めて未然防止を図る活動を何と呼びますか？","o":["垂直展開","水平展開（横展開）","現場復帰","秘密保持"],"h":"一つの教訓を「組織全体の宝」として横に広げ、予防処置として機能させるイメージです。","c":1,"e":"ある箇所で起きたことは他でも起きる可能性があります。水平展開を徹底することで、同様のリスクを全社レベルで事前に封じ込めることができます。"},{"m":25,"q":"是正処置の完了から数ヶ月後、対策が適切に維持されているかを現場・現物で確認する活動は何ですか？","o":["忘年会","内部監査（有効性の検証）","装置の売却","求人活動"],"h":"「やりっぱなし」にせず、実際の成果（不良ゼロ）が継続しているかをチェックします。","c":1,"e":"内部監査を通じて、是正処置の効果が持続しているか、ポカヨケが形骸化していないかを検証することが、QMSの健全性を担保します。"},{"m":25,"q":"本研修のまとめとして、クレーム対応プロセスを何に例えていましたか？","o":["豪華なフルコースの献立","「製造業における感染症対策チーム」","終わりなき旅","秘密の暗号"],"h":"隔離（封じ込め）、疫学調査（真因特定）、ワクチン開発（ポカヨケ）、予防接種（水平展開）のイメージです。","c":1,"e":"個別の問題を「止血」するだけでなく、組織の体質そのものを「強化」し、将来のリスクを回避する。これが真の品質管理の姿です。"},{"m":26,"q":"リソースに限りのある中小企業において、管理図で監視する対象を「重点的に絞り込む」際の基準として、最も適切なものはどれですか？","o":["測定が簡単な項目","毎日数値が変わらない項目","FMEAで特定された「特殊特性（SC）」や市場クレームに直結する工程","全工程を一律に同じ頻度で"],"h":"万が一不適合が出た際、顧客や安全に致命的な影響を与える項目を優先します。","c":2,"e":"安全性や法規制、機能に直結するSC特性は、ばらつきが「重大な損失（COPQ）」に直結するため、最優先で監視・管理する必要があります。"},{"m":26,"q":"サンプリング頻度を決定する際、考慮すべき「バランス」は何と何のバランスですか？","o":["担当者の好みと上司の指示","品質リスクの低減効果と、サンプリング・測定にかかるコスト（リソース）","グラフの見た目と紙の大きさ","昨日の実績と今日の目標"],"h":"測定やプロットは付加価値を生まない「ムダ」の一面もあるため、効率性が求められます。","c":1,"e":"リスクが高い工程は頻度を上げ、安定している工程は間隔を空けるなど、PDCAサイクルを通じて最適な（最小コストで最大効果が得られる）頻度を見つけることが重要です。"},{"m":26,"q":"管理図に「異常（管理限界外の点など）」が現れた際、それが示している状態を何と呼びますか？","o":["統計的に安定した状態","特別要因（異常原因）が存在する不安定な状態","共通要因のみの正常な状態","理想的な状態"],"h":"「いつもと違う何か」が起き、プロセスの結果が予測できなくなっているサインです。","c":1,"e":"管理図は、共通要因（通常のばらつき）と特別要因（異常なばらつき）を識別するためのツールです。異常点は、直ちに対策が必要な「特別要因」の出現を意味します。"},{"m":26,"q":"異常の原因を特定するために、データを「人・設備・材料・方法」などの項目（4M）ごとに切り分けて分析する手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"「全体」を「意味のあるグループ」に仕分けることで、真の原因をあぶり出します。","c":1,"e":"層別を行うことで、「特定の設備でだけ異常が起きている」といった事実が浮き彫りになり、真の原因究明への近道となります。"},{"m":26,"q":"エクセルのピボットテーブルにおいて、下位の項目を隠して「上位の階層のみ」を表示させ、全体像を素早く把握する操作は何ですか？","o":["データの消去","フィールドの折りたたみ","書式の変更","ファイルの圧縮"],"h":"膨大なデータの中から、優先的に対処すべき問題の「塊」を特定するのに便利です。","c":1,"e":"折りたたみ機能を活用することで、詳細に惑わされず、どの要因（人や設備など）が最もばらつきに寄与しているかを瞬時に判断できます。"},{"m":26,"q":"管理図で異常が検知された際、現場の要員に求められる「最も重要な権限」は何ですか？","o":["予算を承認する権限","品質問題を是正するために「生産を中断する権限」","担当者を交代させる権限","装置を売却する権限"],"h":"「悪いものを流さない」ために、その場でラインを止める決断が必要です。","c":1,"e":"夜勤などで管理者が不在でも、不適合品の流出を防ぐために生産を止める権限が実務者に与えられていることが、QMS（品質マネジメントシステム）の有効性を担保します。"},{"m":26,"q":"生産中断後、不適合の疑いがある製品を後工程へ流さないために実施する最初のステップを何と呼びますか？","o":["是正処置","封じ込め（応急処置・隔離）","水平展開","根本原因究明"],"h":"まずは「これ以上被害を広げない」ための物理的な処置です。","c":1,"e":"不適合品（またはその疑いがあるもの）を識別・隔離し、誤って出荷や加工がされないように管理することが最優先です。"},{"m":26,"q":"原因究明において、「手順書が守られていなかった」という結果に対し、さらに「なぜミスが発生するのか？」と問い続ける手法は何ですか？","o":["多数決","なぜなぜ分析","精神論による反省","責任転嫁"],"h":"「個人の不注意」で終わらせず、仕組みの欠陥を突き止めるための手法です。","c":1,"e":"なぜなぜ分析を徹底することで、人がミスをしても不良にならない「仕組み（ポカヨケ等）」の導入に繋げることができます。"},{"m":26,"q":"事例にある「バイト（刃具）交換直後の寸法ズレ」に対する、最も望ましい「恒久対策（是正処置）」はどれですか？","o":["作業者に「もっと注意して調整しろ」と指導する","バイト交換後の調整を自動化し、ミスを防ぐ「ポカヨケ」を導入する","検査回数を2倍に増やす","装置のスピードを落とす"],"h":"「人の注意」に頼るのではなく、「物理的な仕組み」で再発を防ぎます。","c":1,"e":"仕組みそのものを改善し、標準作業書やコントロールプランに反映させることで、誰が作業しても同じ品質が保てる「源流是正」が実現します。"},{"m":26,"q":"本研修のまとめとして、管理図運用を何に例えていましたか？","o":["豪華なフルコースの献立","「製造ラインの脈拍と体温を測る計器」","終わりなき旅","秘密の暗号解読"],"h":"高リスクな患者（SC特性）の脈拍を監視し、異常（熱）が出たら即座に診断・治療するイメージです。","c":1,"e":"管理図はプロセスの「健康診断ツール」です。異常という「熱」が出た原因をデータで科学的に突き止め、体質改善を図るための活動なのです。"},{"m":27,"q":"マネジメントレビューにおいて、経営層が評価すべき「有効性」とはどのような状態を指しますか？","o":["従業員の満足度が高い状態","品質方針や品質目標が意図した通りに達成されている状態","帳簿上の利益が出ている状態","検査員の人数が足りている状態"],"h":"「決めたゴール（目標）に辿り着けているか」という達成度のことです。","c":1,"e":"QMSの有効性は、設定した品質目標の達成状況やパフォーマンスの改善トレンドによって判断されます。"},{"m":27,"q":"製造プロセスだけでなく、教育・訓練や内部監査などの「支援プロセス」について評価すべき項目は何ですか？","o":["適合性のみ","効率性（リソースが適切に活用されているか）","担当者の勤続年数","研修会場の広さ"],"h":"目標を達成するために、どれほどのコストや時間がかかったか、という視点です。","c":1,"e":"IATF 16949等では、プロセスの効率性をレビューすることが明確に求められています。支援プロセスが非効率であれば、組織全体の競争力を削ぐことになります。"},{"m":27,"q":"組織の品質水準を把握し、経営者が改善の優先順位を判断するための重要なインプット指標は何ですか？","o":["事務用品の購入費","品質失敗コスト（COPQ）","昨日の生産数","接待交際費"],"h":"不良や手直しなど、付加価値を生まない「ムダ」を金額で表したものです。","c":1,"e":"COPQ（Cost of Poor Quality）は、品質問題が経営に与える経済的損失を可視化するため、マネジメントレビューの必須項目とされています。"},{"m":27,"q":"自動車産業などの高度なQMSにおいて、顕在化した不具合以外にレビューに含めるべき内容は何ですか？","o":["潜在的な市場不具合のリスクと、安全・環境への影響分析","競合他社の社内規定","全社員の趣味のリスト","事務所のレイアウト図"],"h":"「まだ起きていないが、起きる可能性がある」リスクに目を向けます。","c":0,"e":"リスクに基づく考え方を適用し、潜在的な不具合がビジネスや社会に与える影響を事前に予測・評価することが経営層には求められます。"},{"m":27,"q":"膨大なデータを「設備ごと」や「時間帯ごと」に切り分け、バラツキの真因を特定する手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"「全体」を「意味のあるグループ」に仕分ける統計的手法です。","c":1,"e":"層別を行うことで、「夜間シフトの特定工程に問題が集中している」といった事実が浮き彫りになり、的確な指示（アウトプット）が可能になります。"},{"m":27,"q":"大量のデータを階層的にまとめ、上位の全体像から詳細へと素早く切り替えて分析するのに役立つデジタルツールの機能は何ですか？","o":["グラフのコピー","ピボットテーブル（折りたたみ・展開機能）","文字の太字化","ファイルの暗号化"],"h":"詳細な枝葉に惑わされず、まず「大きな傾向（トレンド）」を掴むための機能です。","c":1,"e":"ピボットテーブルを駆使することで、経営層に対し、どのプロセスが非効率かという全体像を一瞬で
