<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>確認テスト | 産業技術アカデミー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:transparent}
#R{font-family:'Noto Sans JP',system-ui,sans-serif;color:#f1f5f9;line-height:1.7;max-width:800px;margin:0 auto;padding:24px 16px}
#R *{box-sizing:border-box;margin:0;padding:0}
#R button{font-family:inherit;cursor:pointer}

/* Tabs */
.tt{display:flex;gap:0;margin-bottom:32px;background:#0f172a;border-radius:14px;padding:5px;border:1px solid #1e293b}
.tb{flex:1;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:700;border:none;background:transparent;color:#64748b;transition:all .3s;letter-spacing:.02em;text-align:center}
.tb:hover:not(.on){color:#94a3b8;background:rgba(255,255,255,.03)}
.tb.on{color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.tb.t-video.on{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;box-shadow:0 4px 16px rgba(34,197,94,.3)}
.tb.t-course.on{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 4px 16px rgba(245,158,11,.3)}

/* Start */
.S{border-radius:14px;padding:32px 24px;text-align:center}
.S.s-video{background:linear-gradient(135deg,rgba(34,197,94,.05),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.S.s-course{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(245,158,11,.08));border:1px solid rgba(245,158,11,.2)}
.S h3{font-size:18px;font-weight:700;margin-bottom:8px;color:#f1f5f9}
.S p{color:#94a3b8;font-size:14px;margin-bottom:20px;line-height:1.8}
.sp{display:flex;justify-content:center;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.sv{font-size:22px;font-weight:700}
.s-video .sv{color:#22c55e}
.s-course .sv{color:#f59e0b}
.sl{font-size:11px;color:#64748b}

/* Buttons */
.B{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:12px;font-size:16px;font-weight:700;border:none;transition:all .3s;position:relative;overflow:hidden}
.B::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);opacity:0;transition:opacity .3s}
.B:hover{transform:translateY(-3px)}.B:hover::after{opacity:1}
.B:active{transform:translateY(-1px)}
.B.bg{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000;box-shadow:0 6px 24px rgba(34,197,94,.3)}
.B.bo{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;box-shadow:0 6px 24px rgba(245,158,11,.3)}

/* Quiz */
.Q{display:none}
.pg{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.pgb{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.pgf{height:100%;border-radius:3px;transition:width .3s}
.pgf.c-video{background:#22c55e}.pgf.c-course{background:#f59e0b}
.pgc{font-size:13px;color:#64748b;white-space:nowrap}
.qm{font-size:12px;color:#06b6d4;margin-bottom:8px;font-weight:500}
.qt{font-size:16px;font-weight:600;margin-bottom:18px;line-height:1.6;color:#f1f5f9}
.hb{font-size:12px;color:#d4a017;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);border-radius:6px;padding:4px 12px;margin-bottom:14px;display:inline-block}
.hi{display:none;font-size:13px;color:#94a3b8;background:rgba(212,160,23,.05);border-left:3px solid #d4a017;padding:10px 14px;border-radius:6px;margin-bottom:14px}
.os{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.o{background:#111827;border:2px solid #1e293b;border-radius:10px;padding:13px 16px;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;text-align:left;color:#f1f5f9}
.o:hover:not(.lk){border-color:#334155;background:#1a2332}
.ol{width:26px;height:26px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#94a3b8}
.o.ok{border-color:#22c55e;background:rgba(34,197,94,.08)}.o.ok .ol{background:#22c55e;color:#fff}
.o.ng{border-color:#ef4444;background:rgba(239,68,68,.08)}.o.ng .ol{background:#ef4444;color:#fff}
.ex{display:none;background:rgba(59,130,246,.06);border-left:3px solid #3b82f6;border-radius:6px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#94a3b8;line-height:1.7}
.nx{display:none;border:none;border-radius:8px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.nx:hover{transform:translateY(-2px)}
.nx.c-video{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000}
.nx.c-course{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}

/* Result */
.Rs{display:none}
.rc{border-radius:14px;padding:32px 24px;text-align:center;margin-bottom:24px}
.rc.ps{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.rc.fl{background:linear-gradient(135deg,rgba(239,68,68,.04),rgba(239,68,68,.08));border:1px solid rgba(239,68,68,.2)}
.rk{font-size:52px;font-weight:700;margin-bottom:6px}
.rs{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.rd{font-size:14px;color:#94a3b8;margin-bottom:14px}
.rpm{font-size:15px;font-weight:600;color:#22c55e;margin-bottom:14px}
.rfm{font-size:15px;font-weight:600;color:#ef4444;margin-bottom:14px}
.rvt{font-size:16px;font-weight:700;margin-bottom:14px;color:#f59e0b}
.rvi{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:16px 18px;margin-bottom:10px;text-align:left}
.rvq{font-size:13px;font-weight:600;margin-bottom:6px;color:#f1f5f9}
.rvy{font-size:12px;color:#ef4444;margin-bottom:3px}
.rvc{font-size:12px;color:#22c55e;margin-bottom:6px}
.rve{font-size:12px;color:#94a3b8;line-height:1.6}

/* Module selector (all mode) */
.ms{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.mc{background:linear-gradient(135deg,#111827 0%,#0f172a 100%);border:1px solid #1e293b;border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:16px;text-align:left;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(34,197,94,.06) 0%,rgba(34,197,94,.02) 100%);opacity:0;transition:opacity .3s}
.mc:hover{border-color:#22c55e;transform:translateX(6px);box-shadow:0 4px 20px rgba(34,197,94,.12)}
.mc:hover::before{opacity:1}
.mc:active{transform:translateX(3px) scale(.99)}
.mn{width:36px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#22c55e;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;background:none;border:none;box-shadow:none;margin-right:4px;text-shadow:0 0 12px rgba(34,197,94,.25)}
.mc:hover .mn{color:#4ade80;text-shadow:0 0 20px rgba(34,197,94,.5);transform:scale(1.12)}
.mdiv{width:1px;height:32px;background:linear-gradient(180deg,transparent,#334155 30%,#334155 70%,transparent);flex-shrink:0;margin:0 4px;transition:background .3s}
.mc:hover .mdiv{background:linear-gradient(180deg,transparent,#22c55e 30%,#22c55e 70%,transparent)}
.mt{font-size:14px;color:#e2e8f0;font-weight:600;line-height:1.5;position:relative;z-index:1}
.mt2{font-size:11px;color:#64748b;font-weight:400;margin-top:2px}
.mc:hover .mt{color:#fff}
.mc:hover .mt2{color:#94a3b8}
.marr{margin-left:auto;color:#334155;font-size:16px;transition:all .3s;position:relative;z-index:1}
.mc:hover .marr{color:#22c55e;transform:translateX(3px)}
.mhd{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mhd::before{content:'';display:inline-block;width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,#22c55e,#4ade80)}
.msd{font-size:13px;color:#94a3b8;margin-bottom:20px;padding-left:12px}
.mbk{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #1e293b;background:#111827;color:#94a3b8;cursor:pointer;margin-bottom:16px;transition:all .25s}
.mbk:hover{background:#1e293b;color:#f1f5f9;border-color:#334155;transform:translateX(-3px)}
.mcnt{display:inline-flex;align-items:center;justify-content:center;background:rgba(34,197,94,.1);color:#22c55e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px}

@media(max-width:600px){.qt{font-size:14px}.o{padding:11px 13px;font-size:13px}.S{padding:24px 16px}}
</style>
</head>
<body>
<div id="R">
  <div class="tt" id="tabs"></div>
  <div id="panelSelect" style="display:none">
    <div class="mhd">動画別 確認テスト<span class="mcnt">全37回</span></div>
    <div class="msd">テストしたいモジュールを選んでください（各10問）</div>
    <div class="ms" id="modList"></div>
  </div>
  <div id="panelVideo" style="display:none">
    <div class="S s-video" id="startVideo">
      <h3 id="svTitle"></h3>
      <p>この動画の内容から出題されます。</p>
      <div class="sp">
        <div><div class="sv">10</div><div class="sl">問題数</div></div>
        <div><div class="sv">解説付き</div><div class="sl">正誤判定</div></div>
      </div>
      <button class="B bg" onclick="go('video')">テストを始める →</button>
    </div>
    <div class="Q" id="qVideo"></div>
    <div class="Rs" id="rVideo"></div>
  </div>
  <div id="panelCourse" style="display:none">
    <div class="S s-course" id="startCourse">
      <h3>品質管理 中級コース 確認テスト</h3>
      <p>37モジュールの内容からランダムに37問出題されます。</p>
      <div class="sp">
        <div><div class="sv">37</div><div class="sl">問題数</div></div>
        <div><div class="sv">80%</div><div class="sl">合格ライン</div></div>
      </div>
      <button class="B bo" onclick="go('course')">コーステストを始める →</button>
    </div>
    <div class="Q" id="qCourse"></div>
    <div class="Rs" id="rCourse"></div>
  </div>
</div>
<script>
const QUIZ_DATA = {"titles":["管理図の種類と使い分け（Xbar-R、p等）","工程能力指数（Cp・Cpk）の計算","測定システム解析（GageR&R）基礎","抜き取り検査の設計とAQLの考え方","実務で使う設計FMEA・工程FMEA","設計審査（DR）の進め方とチェックリスト","4M変更・ECN・MOCの管理","QMS変更時の未然防止策：予期せぬ問題発生を防ぐための予防処置","サプライヤ監査と是正要求の基本","クレーム原因解析と再発防止","苦情報告書（8D/A3）の書き方","是正処置の真因特定：「なぜなぜ問答」の適切な回数","品質KPI設計と日常管理ボード","方針管理と日常管理のつなぎ方","eQMSと現場データ活用入門","初期流動管理と変化点管理の実務","ポカヨケの考え方と事例研究","標準作業・タクトタイム・レイアウト改善","品質文書体系と版管理ルール設計","トレーサビリティ設計と情報項目","品質関連法規・規格の概要（PL、RoHS等）","リスクアセスメントと品質リスク","品質コストの分類：予防・評価・失敗コストの指標化","ヒューマンエラーを防ぐ仕組み：フールプルーフとフェールセーフの設計","下請け側から見た品質経営","品質人材育成とビデオ標準活用","A3報告書で伝える問題解決","品質データ分析実践：ピボットテーブル活用","校正とトレーサビリティ：測定値の信頼性を確保する","抜き取り検査の考え方と小さく始める適用方法","計測機器の不適合：校正外れ時の遡及処置と妥当性の評価","計量値管理図の種類：Xbar-R・Xbar-s・個別値管理図","計数値管理図の種類：p・np・c・u管理図","バリデーションとは何か","予防保全入門：設備トラブルを品質不良の前に止める","QMSと経営戦略：品質目標を戦略的方向性と一致させる","内部監査の監査プログラム：プロセス・領域の重要性による計画策定"],"questions":[{"m":0,"q":"管理図を選定する際の第一歩として、まず判断すべきデータの性質は何ですか？","o":["データの合計値と最大値","計量値（連続量）か計数値（不連続数）か","データの入力担当者の氏名","グラフの色"],"h":"「長さや重さ」か「合格・不合格の数」か、というデータの根本的な違いです。","c":1,"e":"計測されるデータの種類によって、平均・ばらつきを見るべきか、不良率を見るべきかが決まるため、この判断が選定の起点となります。"},{"m":0,"q":"長さ、重さ、時間などのように、連続した量で測定されるデータを何と呼びますか？","o":["計数値","計量値","概数","順位"],"h":"目盛りのある器具で測るような、小数点がつくタイプのデータです。","c":1,"e":"計量値データは情報量が多く、工程の平均（中心）とばらつき（広がり）を詳細に分析するのに適しています。"},{"m":0,"q":"サンプルサイズ（n）が1〜8程度の場合に、平均値の変化とばらつき（範囲）の変化を同時に監視する最も一般的な管理図は何ですか？","o":["p管理図","Xbar-R管理図","c管理図","np管理図"],"h":"「平均値（Xバー）」と「範囲（R）」をセットで使う管理図です。","c":1,"e":"現場で最も広く使われる計量値管理図であり、平均（ねらい）のズレと、ばらつき（ムラ）の広がりを同時にチェックできます。"},{"m":0,"q":"メッキ液の濃度や室内の温度など、サンプルが1個しか取れない（n=1）場合に適用される管理図は何ですか？","o":["Xbar-s管理図","X-MR管理図","u管理図","p管理図"],"h":"「個々の値（X）」と、隣り合うデータの差である「移動範囲（MR）」を使います。","c":1,"e":"サブグループに分けられない連続的なプロセスなどで、個別の測定値とその推移を監視するために用いられます。"},{"m":0,"q":"不適合品の「個数」ではなく「率（不良率）」を管理する場合で、ロットサイズ（n）が毎回変動する際に適した管理図はどれですか？","o":["np管理図","p管理図","c管理図","Xbar-R管理図"],"h":"「パーセント（p）」で管理する図です。","c":1,"e":"分母（ロットサイズ）が変わっても、不良率として計算することで、一貫した管理限界で監視が可能になります。"},{"m":0,"q":"サンプルサイズ（単位の大きさ）が一定の時に、製品1個あたりの「欠陥（欠点）の数」を管理するのに適した図はどれですか？","o":["p管理図","u管理図","c管理図","np管理図"],"h":"「カウント（c）」の頭文字をとった管理図です。","c":2,"e":"1台の車や1枚のパネルに含まれる「キズの数」などを管理する際に、サンプルサイズが一定であればc管理図を用います。"},{"m":0,"q":"計量値管理図において、データが中心線（CL）の下側に連続して7点以上並んだ場合、どのような判断になりますか？","o":["工程が非常に良くなっている","工程の平均値が下方にずれるという「異常な兆候」が発生している","グラフの書き間違いである","何もする必要はない"],"h":"「ねらい（平均）」が設定から外れてしまっている状態です。","c":1,"e":"計量値では中心からの偏りは「異常原因」の混入を意味し、規格外不良が出る前に是正処置をとる必要があります。"},{"m":0,"q":"計数値の「p管理図（不良率）」において、データが中心線（CL）の下側に連続して並んだ場合、計量値管理図の異常判断とどう異なりますか？","o":["どちらも「悪いこと」なので是正が必要","不良率の低下は「望ましい変化（改善）」であり、その原因を分析して標準化すべき","無視してよい","データを削除すべき"],"h":"不良率が下がることは、品質が向上していることを意味します。","c":1,"e":"計数値（不良率）の低下は改善の成功を意味するため、なぜ良くなったのかを突き止めて、良い状態を維持する活動に繋げます。"},{"m":0,"q":"サンプルサイズ（n）が9以上の大きなデータ群において、範囲（R）よりも精度の高い「標準偏差（s）」を用いてばらつきを管理する図は何ですか？","o":["Xbar-R管理図","Xbar-s管理図","np管理図","u管理図"],"h":"「標準偏差（sigma/s）」の頭文字が名前に入っています。","c":1,"e":"データ数が多い場合、範囲（R）よりも標準偏差（s）を使う方が、データのばらつきの情報をより正確に反映できます。"},{"m":0,"q":"本研修のまとめとして、管理図を正しく使い分ける重要性を何に例えていますか？","o":["料理の味付けを変えること","車のダッシュボードの警告灯を正しく理解すること","道路の信号を守ること","天気予報を見ること"],"h":"異常のサインが「危険（修理）」なのか「良好（給油）」なのかを見極める例えです。","c":1,"e":"データの種類（計量か計数か）を理解し、そのサインが「是正」を求めているのか「標準化（改善の定着）」を求めているのかを判断することが管理の本質です。"},{"m":1,"q":"工程能力指数（Cp・Cpk）を算出するための絶対的な「前提条件」は何ですか？","o":["毎日欠かさず検査すること","管理図により工程が「統計的に安定している」ことが証明されていること","最新の測定機器を購入すること","作業者の人数を増やすこと"],"h":"「異常原因」が混じっている不安定な状態では、将来の能力を予測できません。","c":1,"e":"工程が安定（予測可能）な状態であって初めて、その数値は工程の「真の実力」としての意味を持ちます。"},{"m":1,"q":"工程能力指数（Cp/Cpk）の基本的な考え方は、何と何を比較することですか？","o":["売上とコスト","製品規格の許容幅と、工程が生み出すばらつきの幅（6σ）","昼勤のデータと夜勤のデータ","昨年の実績と今年の実績"],"h":"「決められた枠（規格）」の中に、「今のばらつき」がどれくらい余裕を持って収まるかを見ます。","c":1,"e":"規格幅に対して工程のばらつきが十分に小さければ、指数は高くなり、不良の出にくい優秀な工程と判断されます。"},{"m":1,"q":"工程の平均値（中心）のズレを考慮せず、単純に「ばらつきの幅」だけを規格幅と比較する指標は何ですか？","o":["Cpk","Cp","Ppk","σ（シグマ）"],"h":"工程が持っている「潜在的な能力（余裕度）」を見るための指標です。","c":1,"e":"Cpは分布の幅だけを見るため、たとえ平均が規格ギリギリに寄っていても、ばらつきが小さければ高い値が出てしまいます。"},{"m":1,"q":"Cpの計算式において、分母となる「工程のばらつきの幅」は一般的にどのように表されますか？","o":["1σ","3σ","6σ","10σ"],"h":"標準偏差（σ）の何倍の幅を「工程全体の変動範囲」とみなすか、という統計的な約束事です。","c":2,"e":"正規分布において、±3σ（計6σ）の範囲には全データの約99.7%が含まれるため、これを工程幅の基準とします。"},{"m":1,"q":"ばらつきの幅に加えて、平均値の「偏り（かたより）」を考慮して算出される、実務で最も重視される指標は何ですか？","o":["Cp","Cpk","平均値","範囲（R）"],"h":"規格の中心からずれている場合、そのリスクを厳しく評価する方の指標です。","c":1,"e":"Cpkは上限・下限それぞれの規格までの距離を計算し、小さい方（余裕がない方）を採用するため、現実的な実力がわかります。"},{"m":1,"q":"一般的に、量産工程において「工程能力が十分にある」と判断されるCpkの基準値はいくつ以上ですか？","o":["0.67以上","1.00以上","1.33以上","2.00以上"],"h":"1.00だと規格ピッタリで余裕がありません。そこからさらに一段上の信頼性が求められます。","c":2,"e":"1.33以上であれば、多少の変動があっても不良が出る確率は極めて低く、安定した工程であると評価されます。"},{"m":1,"q":"工程が安定しているかどうかわからない場合（新規製品や工程変更直後など）に、一時的な実力を調査するために使われる指標は何ですか？","o":["Cpk","Ppk（工程性能指数）","故障率","直行率"],"h":"「能力」ではなく、その時の「性能（パフォーマンス）」を評価する言葉です。","c":1,"e":"まだ管理図で安定が確認できていない初期段階では、CpkではなくPpkを用いて工程の現状を調査します。"},{"m":1,"q":"解説の「ケースB（平均が下限側にずれた例）」で、Cpは優秀（3.33）なのにCpkが低下（1.33）したのはなぜですか？","o":["計算を間違えたから","標準偏差（ばらつき）が大きくなったから","平均値が下限規格に近づき、片側の余裕がなくなったから","規格幅が狭くなったから"],"h":"「ばらつきの幅」は変わっていませんが、「位置」がずれたことに注目してください。","c":2,"e":"どれだけばらつきが小さくても、中心が規格の端に寄れば、不適合が出るリスクが高まるためCpkは低下します。"},{"m":1,"q":"Cpkが非常に高い（例：1.67以上）と安定的に判定される工程において、検討可能な「効率化」の施策はどれですか？","o":["検査をすべて廃止する","検査頻度の削減や、抜き取り検査への移行を検討する","規格をわざと厳しくする","機械のメンテナンスをやめる"],"h":"「実力が十分にある」のであれば、過剰なチェックを減らす合理的な判断が可能です。","c":1,"e":"高いCpkは不良が出ないことの科学的な証明になるため、コスト削減のために検査の厳しさを緩める根拠になります。"},{"m":1,"q":"本研修のまとめとして、Cpkを「ダーツ」に例えた場合、どのような状態を指しますか？","o":["矢がバラバラに飛んでいる状態","矢が狭い範囲にまとまっていて（Cp高）、かつ的の中心に近い（偏り小）状態","矢が一本も的に当たっていない状態","矢を投げるスピードが速い状態"],"h":"「再現性」と「正確性」の両方を兼ね備えた状態です。","c":1,"e":"ばらつきが小さく、かつ狙い通りに作れていること。この両方を兼ね備えているのが、Cpkの高い優秀な工程です。"},{"m":2,"q":"測定システム解析（MSA）を実施する最大の目的は何ですか？","o":["測定のスピードを極限まで上げるため","計測システムが測定結果にもたらす「ばらつき（誤差）」を評価し、信頼性を保証するため","測定機器の購入価格を計算するため","グラフを複雑にして専門性をアピールするため"],"h":"「測定データそのもの」が信じられるかどうかを、統計的に裏付ける活動です。","c":1,"e":"計測の誤差が製品の真のばらつきを隠してしまわないよう、システムが測定に適しているかを事前に評価します。"},{"m":2,"q":"測定結果の「全変動（TV）」を構成する、主要な二つの要素は何ですか？","o":["昼のデータと夜のデータ","製品そのもののばらつき（PV）と、測定システムの変動（GRR）","測定者の年齢と経験年数","定規の長さと重さ"],"h":"「品物がもともと持っている違い」と「測り方のミスによる違い」の足し算です。","c":1,"e":"私たちが本当に知りたいのは「PV（製品変動）」ですが、現実には必ず「GRR（測定誤差）」が混じってしまいます。"},{"m":2,"q":"同一の測定者が、同一の機器で、同一の箇所を繰り返し測定した時に生じるばらつきを何と呼びますか？","o":["再現性","繰り返し性（EV：装置変動）","直線性","安定性"],"h":"「同じ人が何度も測る」という条件での、装置そのものに起因するブレのことです。","c":1,"e":"繰り返し性は、測定装置自体の性能や剛性に依存するため「装置変動」とも呼ばれます。"},{"m":2,"q":"異なる測定者が、同一の機器で、同一の箇所を測定した時に生じる平均値のばらつきを何と呼びますか？","o":["繰り返し性","再現性（AV：測定者変動）","偏り","感受性"],"h":"「人による違い」を評価する指標で、評価者間変動とも呼ばれます。","c":1,"e":"再現性が大きい場合、測り方の手順や目盛りの読み取り方に、人それぞれの「癖」があることを示唆します。"},{"m":2,"q":"Gage R&Rの判定基準において、測定システムが「優良（合格）」とみなされる％GRRの範囲はどれですか？","o":["10%未満","10%〜30%","30%〜50%","80%以上"],"h":"全変動のうち、測定誤差が占める割合が非常に小さい状態を指します。","c":0,"e":"10%未満であれば測定システムは十分に信頼できますが、30%を超えると不合格となり是正が必要です。"},{"m":2,"q":"％GRRが判定基準を超えた際、改善の方向性を決めるために比較すべき二つの指標は何ですか？","o":["価格と納期","繰り返し性（EV）と再現性（AV）","最大値と最小値","湿度と温度"],"h":"「装置が悪いのか、人が悪いのか」を切り分けるための比較です。","c":1,"e":"EVとAVのどちらが支配的か（大きいか）を見ることで、対策のターゲットが明確になります。"},{"m":2,"q":"「再現性（AV）」が「繰り返し性（EV）」よりも明らかに大きい場合、どのような対策が最も有効ですか？","o":["測定装置を最新の高級品に買い替える","作業者の訓練強化や、測定手順の標準化を行う","測定する部屋を広くする","測定回数を半分に減らす"],"h":"「人によるばらつき」が原因なので、ソフト面（教育・ルール）の改善が必要です。","c":1,"e":"測定者間のばらつきを抑えるためには、手順の再教育や、誰でも同じように測れる治具の導入が効果的です。"},{"m":2,"q":"「繰り返し性（EV）」が「再現性（AV）」よりも明らかに大きい場合、どのような原因が考えられますか？","o":["作業者のやる気不足","測定装置のメンテナンス不足や剛性不足","作業者の視力が良すぎる","測定場所の照明が明るすぎる"],"h":"「装置そのもの」がブレている時に数値が大きくなる指標です。","c":1,"e":"装置自体のガタつきや設計上の問題が疑われるため、ハード面のメンテナンスや改良が必要になります。"},{"m":2,"q":"精密金属加工部品の事例で、％GRRが15%でAVが支配的だった場合、取るべき適切なアクションはどれですか？","o":["マイクロメーターを修理に出す","測定手順書を再教育し、読み取りのばらつきを低減する","規格値を2倍に広げる","測定を中止する"],"h":"「再現性（AV）」が高いということは、測る人による差を埋める教育が優先です。","c":1,"e":"装置そのものの修理（EV対策）よりも、教育（AV対策）の方が効率的に％GRRを改善できる可能性が高いです。"},{"m":2,"q":"本研修のまとめとして、Gage R&Rを「天体観測」に例えた場合、どのような表現が使われていましたか？","o":["新しい星を見つけること","望遠鏡の「ピント合わせ」","宇宙船を打ち上げること","星座の名前を覚えること"],"h":"「観測する道具（測定器）」のブレをなくし、真の姿を見るための準備のことです。","c":1,"e":"ピント（測定システム）が合って初めて、星（工程の実力）を正しく観測し、正確な判断を下すことができるようになります。"},{"m":3,"q":"抜き取り検査（Acceptance Sampling）の定義として正しいものはどれですか？","o":["ロット内のすべての製品を一つずつ検査すること","ロットからランダムに一定数のサンプルを抜き取り、その結果でロット全体の合否を判定すること","外観だけを見て直感で合格させること","不良品が見つかるまで検査を続けること"],"h":"「一部」を調べて「全体」を推定する手法です。","c":1,"e":"ロット全体を調べるコストや時間を削減しつつ、統計的な根拠に基づいてロットの合否を判断します。"},{"m":3,"q":"抜き取り検査が全数検査よりも有利になるケースとして、不適切なものはどれですか？","o":["検査コストが不良コストに比べて非常に高い場合","検査をすると製品が壊れてしまう「破壊検査」の場合","全数検査だと単調な作業になり、かえって見落とし（ミス）が出やすい場合","検査員が余っていて、いくらでも時間をかけられる場合"],"h":"「あえて全部調べない」ことのメリット（経済性や物理的制約）を考えてください。","c":3,"e":"リソース（時間・人手・費用）が限られている中、合理的に品質を保証するために抜き取り検査が採用されます。"},{"m":3,"q":"AQL（Acceptable Quality Level：合格品質水準）の基本的な考え方はどれですか？","o":["不良率がゼロでなければならないという基準","生産者側が「これ以下の不良率なら合格させてほしい」と考える、許容できる限界の不良率","消費者が「一つでも不良があったら返品する」と決める基準","検査員がわざと不良を見逃す割合"],"h":"ヒントはありません","c":0,"e":"AQLは、良質なロットが誤って不合格になるリスク（生産者リスク）を抑えるために設定される目標水準です。"},{"m":3,"q":"抜き取り検査において、良品率が高いロットなのに確率的に誤って不合格となってしまうリスクを何と呼びますか？","o":["消費者リスク","生産者リスク（α）","検査員リスク","市場リスク"],"h":"「せっかく作った良いものがハネられてしまう」側のリスクです。","c":1,"e":"サンプリングの性質上、運悪く不良品がサンプルに集中して不合格になる可能性があり、これを生産者リスクと呼びます。"},{"m":3,"q":"自動車産業（TS規格など）において、計数データのサンプリングで強く求められることがある厳しい基準は何ですか？","o":["合格判定基準数（Ac）をゼロとする（一つでも不良があれば不合格）","不良品が半分あっても合格とする","検査を全くしない","抜き取り数を常に1個にする"],"h":"高い安全性が求められる分野では、AQL指向であっても「欠点を一つも許さない」運用がなされます。","c":0,"e":"「Ac=0」は、サンプル内に1つでも不適合品があればロット全体を不採用とする非常に厳しい管理基準です。"},{"m":3,"q":"受入検査で不合格となったロットに対し、最初に行うべき適切な管理アクションは何ですか？","o":["黙って良品の山に混ぜる","誤使用を防ぐために「識別」し、「隔離」して管理する","すぐにゴミ箱に捨てる","検査結果を書き換える"],"h":"不適合品が間違って製造ラインに流れないようにするための「物理的・組織的」な処置です。","c":1,"e":"不適合品は良品と明確に区別（識別）し、置き場所を分ける（隔離）ことで、誤使用のリスクを排除します。"},{"m":3,"q":"受入検査の結果（不合格率など）を、供給者（外注先）の評価にどう活かすべきですか？","o":["評価には関係ないので無視する","供給者の品質パフォーマンスを監視する客観的なデータ（KPI）として蓄積する","担当者の飲み会のネタにする","毎年決まった点数をつける"],"h":"「事実に基づく管理」として、次の改善へのインプットにします。","c":1,"e":"受入検査の結果は、供給者のQMSが有効に機能しているかを測る重要な指標となります。"},{"m":3,"q":"もし供給者からのロットに不良が頻発した場合、どのような改善要求を検討すべきですか？","o":["検査員を増やすよう命令する","供給者の品質マネジメントシステム（QMS）の有効性を検証し、再発防止策を求める","文句だけ言って何もしない","規格を勝手にゆるめる"],"h":"「検査」で直すのではなく、「仕組み（プロセス）」を直すよう働きかけます。","c":1,"e":"不良の根本原因は製造工程（QMS）にあるため、そこへの是正を求めることが継続的改善に繋がります。"},{"m":3,"q":"解説のまとめにおいて、抜き取り検査を「船」に例えた場合、AQLはどのような役割として表現されていましたか？","o":["船のエンジンの出力","船全体の合否を判断するための「統計的な安全マージン」","船の名前","船が積んでいる荷物の量"],"h":"万が一の不良が混ざっても「許容できる範囲」を決めるための尺度です。","c":1,"e":"AQLを設定することは、どこまでのリスクなら許容できるかという統計的な安全境界線を引く行為に似ています。"},{"m":3,"q":"抜き取り検査を行うことが、供給者に対してどのようなメッセージ（副次的効果）になりますか？","o":["どんな不良品を送っても大丈夫だと思わせる","「きちんと完成品検査をしてから納入しなければ不合格になる」という緊張感を与える","検査をサボっていると思わせる","仲が良いことをアピールする"],"h":"「関所」があることで、送り出す側の品質意識はどう変わるかを考えてください。","c":1,"e":"受入検査で不適合が見つかることは、供給者の工程管理や最終検査の不備を指摘することと同義であり、供給者側の品質向上を促す心理的効果もあります。"},{"m":4,"q":"FMEA（故障モード影響解析）の最大の狙いは何ですか？","o":["不良品を検査で効率よく見つけること","潜在的な故障を事前に予測・認識し、不適合を「予防」すること","故障が起きた後に責任の所在を明確にすること","書類の枚数を増やして監査に備えること"],"h":"「起きてから直す」のではなく「起きる前に防ぐ」という考え方です。","c":1,"e":"FMEAは、設計や工程に潜むリスクをあらかじめ特定し、発生の可能性や影響を低減させるための予防的ツールです。"},{"m":4,"q":"FMEAを作成する際、特定の担当者一人ではなく、様々な部門から成るチームで行うアプローチを何と呼びますか？","o":["単独作業","部門横断的チーム（CFT）","外部委託","秘密会議"],"h":"設計、製造、品質、購買など、多様な知識と経験を出し合うことが不可欠です。","c":1,"e":"主観的な判断を避け、漏れのない解析を行うために、関連部門が連携して実施することが規格でも要求されています。"},{"m":4,"q":"製品設計の弱点に焦点を当て、APQP（先行製品品質計画）の初期段階で開始されるFMEAの種類は何ですか？","o":["工程FMEA（PFMEA）","設計FMEA（DFMEA）","設備FMEA","サービスFMEA"],"h":"「製品そのものの構成」や「材料の選定」などにリスクがないかを確認します。","c":1,"e":"DFMEAは、製品設計上の問題を製造工程の管理で補うのではなく、設計そのもので解決することを目指します。"},{"m":4,"q":"製造工程のフロー図をインプットとし、加工や組立のプロセスに潜むリスクを分析するFMEAは何ですか？","o":["DFMEA","PFMEA","市場FMEA","営業FMEA"],"h":"「不適切な熱処理」や「作業ミス」といった、つくり方の弱点を追求します。","c":1,"e":"PFMEAは、製品設計の責任がない組織であっても、製造を行う以上は必ず実施しなければならない重要な解析です。"},{"m":4,"q":"FMEAの評価要素である「S（Severity：影響度）」が「10」または「9」と評価されるのは、どのような場合ですか？","o":["誰にも気づかれない程度の些細な不具合","安全や法規制に関わる致命的な欠陥、または負傷の可能性がある場合","毎日発生するが簡単に直せる故障","検査で見つけにくいだけのミス"],"h":"「もし起きてしまったら、取り返しがつかないほど深刻か」という視点です。","c":1,"e":"影響度が極めて高い故障モードは、発生頻度に関わらず最優先で対策を講じる必要があります。"},{"m":4,"q":"FMEAで算出される「RPN（危険度）」の計算式として正しいものはどれですか？","o":["影響度（S）＋ 発生度（O）＋ 検出度（D）","影響度（S）× 発生度（O）× 検出度（D）","（影響度 ＋ 発生度）÷ 検出度","影響度 × 100"],"h":"3つの要素の「積（掛け算）」で算出します。","c":1,"e":"RPNはリスクの優先順位を数値化するものですが、自動車業界ではこの数値だけでなく、個別の項目の高さも重視します。"},{"m":4,"q":"実務において、RPN（危険度）の数値の大小にかかわらず、最優先で是正処置を検討すべき項目はどれですか？","o":["検出度（D）が高いもの","発生度（O）が高いもの","影響度（S）が極めて高いもの","過去に一度も起きていないもの"],"h":"「万が一でも起きたら大惨事になる」リスクをまず潰すのが鉄則です。","c":2,"e":"自動車業界の思想では、S（影響度）が高い故障モードは、発生可能性や検出性に関わらず徹底的に予防・排除します。"},{"m":4,"q":"FMEAで特定された重大なリスクや対策方法は、製造現場のどの主要文書に反映されなければなりませんか？","o":["社内報","コントロールプラン（CP）","会社案内","決算報告書"],"h":"「どの特性を、どう監視するか」を定めた、製造管理の要となる計画書です。","c":1,"e":"FMEAでの解析結果がコントロールプランに反映されることで、初めて現場での具体的な「予防の仕組み」が完成します。"},{"m":4,"q":"PFMEAで「発生度（O）」が高いと判断された際、作業者のミスを物理的に防ぐために導入が検討される仕組みを何と呼びますか？","o":["管理図","ポカヨケ（エラー防止）","標語の掲示","検査員の増員"],"h":"「人の注意」に頼らず、仕組みで不良を作らせない、あるいは流さない工夫です。","c":1,"e":"ポカヨケを導入することで、ミスの発生そのものを防いだり、ミスがあった瞬間に機械を止めたりすることが可能になります。"},{"m":4,"q":"本研修のまとめとして、FMEAを「建物の建設」に例えた場合、DFMEAは何に相当しますか？","o":["コンクリートの混ぜ方の確認","設計段階での「耐震シミュレーション」","完成後の内覧会","登記手続き"],"h":"「建物の構造そのもの」が壊れないかを事前に予測する段階です。","c":1,"e":"設計そのものの弱点をあらかじめ予測し、構造を見直しておくことが、最も上流でのリスク予防になります。"},{"m":5,"q":"設計審査（DR）の本来の目的は何ですか？","o":["設計者の作業進捗を管理職が監視するため","設計アウトプットが顧客要求事項を満たしているか、多角的にレビューして設計品質を保証するため","綺麗な図面が描けているか、見た目をチェックするため","開発コストを削るための口実を作るため"],"h":"「後工程や市場で問題が出ないように、事前に芽を摘む」という役割を考えてください。","c":1,"e":"DRは設計・開発プロセスにおける重要な「関所」であり、意図した通りの品質が確保されているかを客観的に評価する活動です。"},{"m":5,"q":"DRを効果的に実施するために、参加メンバーとして特に推奨されるのはどのような人々ですか？","o":["設計担当者本人とその上司だけ","設計熟練者や、製造、品質、購買などの関連部門の経験者（部門横断的チーム）","外部のコンサルタントのみ","新入社員だけ"],"h":"「製造しやすさ」「過去の失敗事例」「材料の調達性」など、多様な視点が必要です。","c":1,"e":"関連部門や経験者が参加することで、過去のノウハウを設計にフィードバックし、潜在的なリスクを早期に発見できます。"},{"m":5,"q":"製品設計から量産移行、日常生産へと至るプロセスにおいて、DRはどのように実施すべきとされていますか？","o":["開発の最後に1回だけ行えばよい","設計・開発の各段階（フェーズ）の適切なタイミングで、段階的に実施する","問題が起きた時だけ不定期に行う","忙しい時は省略してよい"],"h":"「製品企画」「試作」「量産移行」など、重要ポイントごとに「関所」を設けます。","c":1,"e":"段階的にレビューを行うことで、手戻りを最小限に抑え、各ステップの妥当性を確認しながら進めることができます。"},{"m":5,"q":"DR1（製品企画審査）において、チェックリストに含まれるべき重要な視点はどれですか？","o":["社員の昼食メニュー","企画品質目標の設定根拠や、技術的なリスク（設計ネック）への対応策","事務所の備品の在庫数","昨日のプロ野球の結果"],"h":"「その製品が技術的に実現可能か」「市場で勝てるか」という根源的な問いです。","c":1,"e":"初期段階で技術的なハードルやリスクを明確に認識し、対策を講じているかを確認することが、その後のスムーズな開発の鍵となります。"},{"m":5,"q":"DRと並んで、設計・開発のレベルアップに有効なリスク予防ツールとして、連動が推奨されている手法は何ですか？","o":["5S活動","FMEA（故障モード影響解析）","財務諸表分析","広告宣伝計画"],"h":"「どこが壊れそうか」を事前に予測する、自動車業界のコアツールの一つです。","c":1,"e":"FMEAで抽出されたリスクとその対策をDRで審査することで、より確実なリスク予防が可能になります。"},{"m":5,"q":"DR2（試作設計審査）において、新しい技術の信頼性データが不十分だと判明した場合、審査会（DR会議）が取るべき適切なアクションはどれですか？","o":["「たぶん大丈夫」と判断して、そのまま量産移行（DR3）に進める","重大なリスクと判断し、追加の検証試験を指示して、次の段階への移行を保留または条件付きとする","検査員に「頑張って見つけてくれ」と頼む","その技術を諦めて、製品開発自体を中止する"],"h":"「関所」としての役割を全うするための厳しい判断が求められます。","c":1,"e":"曖昧なまま次のステップに進むのは、量産後の重大な品質事故を招く恐れがあるため、確実なエビデンス（証拠）を求めます。"},{"m":5,"q":"DRの結果、不適合や改善点が見つかった際、QMS（品質マネジメントシステム）として必須となる活動は何ですか？","o":["誰にも言わずに図面を直す","指摘事項に対する具体的な是正処置を行い、その結果を記録・フォローアップする","監査員に嘘をつく","担当者を叱責する"],"h":"「やりっぱなし」ではなく、改善が完了したことを確認するプロセスです。","c":1,"e":"DRで見つかった課題を確実に解決し、そのプロセスを追跡することが設計品質の向上に繋がります。"},{"m":5,"q":"DRにおいて、過去の不具合事例（ノウハウ）を活用することのメリットは何ですか？","o":["会議の時間を短くできる","過去と同じ失敗を繰り返す「再発」を未然に防ぐことができる","過去の担当者を批判できる","図面を描く手間が省ける"],"h":"「歴史から学ぶ」ことは、設計品質を高める最も効率的な方法の一つです。","c":1,"e":"過去のトラブル情報をDRのチェック項目に反映させることで、組織としての学習効果を高めることができます。"},{"m":5,"q":"デザインレビューの仕組み自体を「継続的に改善」していくことの最終的な成果は何ですか？","o":["審査資料が豪華になる","設計品質問題の低減（市場不良や手戻りの削減）","会議室が綺麗になる","判子の数が増える"],"h":"仕組みが良くなれば、そこから生まれる製品の質はどう変わるでしょうか。","c":1,"e":"DRの質を高めることは、設計のミスや漏れを減らし、最終的な製品の信頼性と顧客満足度の向上に直結します。"},{"m":5,"q":"本研修のまとめとして、DRを「専門家会議」に例えた場合、どのような場であると表現されていますか？","o":["設計者が自分の成果を自慢する場","多角的な視点から設計の「鎧」をさらに強固なものにするための検証の場","お茶を飲みながら雑談する場","責任をなすりつけ合う場"],"h":"一人では気づかない盲点を、チームの力でカバーするイメージです。","c":1,"e":"多様な専門家の厳しい目を通すことで、設計の信頼性を極限まで高め、市場の現実に耐えうる製品へと磨き上げます。"},{"m":6,"q":"製造現場において、品質不具合を発生させる主要な変動要素を整理した「4M」に含まれないものはどれですか？","o":["Man（人）","Machine（機械・設備）","Money（予算・コスト）","Material（材料・部品）"],"h":"「人、機械、材料」に加えて、作業のやり方（Method）の4つが基本です。","c":2,"e":"予算管理も経営には重要ですが、製造工程の品質に直接的なばらつきを与える要因としては、人・機械・材料・方法の4Mが管理対象となります。"},{"m":6,"q":"作業者の入れ替えや、教育・訓練不足、力量の変更などは、4Mのどの要素に該当しますか？","o":["Man","Machine","Material","Method"],"h":"「誰が作業するか」に関わる変動要素です。","c":0,"e":"Man（人）の変化は、ヒューマンエラーのリスクを増大させるため、力量の確認や教育訓練の記録による妥当性確認が不可欠です。"},{"m":6,"q":"設計変更を量産工場に正式に通知し、管理するためのプロセスや通知書の略称は何ですか？","o":["KPI","ECN（またはPCN）","5S","PDCA"],"h":"Engineering Change Notice（設計変更通知）などの略称です。","c":1,"e":"設計や工程の変更は、思いつきで行うのではなく、正式な通知と承認プロセスを経て計画的に実施されなければなりません。"},{"m":6,"q":"変更管理プロセスにおいて、新しい設備や材料を導入する「前」に行うべき最も重要な活動は何ですか？","o":["打ち上げパーティーの計画","変更に伴うリスクの評価と妥当性確認","以前の在庫をすべて捨てること","担当者の名前を伏せること"],"h":"「変えてから考える」のではなく「変える前に影響を予測する」のがQMSの鉄則です。","c":1,"e":"変更が品質に与える潜在的な影響を事前に評価し、試作やテストで妥当性を確認してから量産に導入します。"},{"m":6,"q":"製品や製造工程に変更があった際、FMEA（故障モード影響解析）はどのように扱うべきですか？","o":["一度作ったものは変えない","変更の影響を評価するためにレビューし、最新の内容に更新する","監査の時だけ作り直す","変更が終わった1年後に見直す"],"h":"FMEAは常に最新の状態を保つ「生きた文書（リビングドキュメント）」です。","c":1,"e":"変更によって新しい故障モードが発生しないか、既存のリスクが変化しないかをFMEAで再評価する必要があります。"},{"m":6,"q":"変更に伴いFMEAが更新された場合、連鎖的にレビュー・更新が必要となる製造管理文書は何ですか？","o":["社内報","コントロールプラン（CP）","会社案内","労働契約書"],"h":"「どの特性を、どう監視するか」を定めた、現場の具体的な管理計画書です。","c":1,"e":"FMEAで特定された新しいリスクや管理方法は、コントロールプランに反映されなければ現場の管理に繋がりません。"},{"m":6,"q":"自動車産業において、顧客の承認を得たプロセスや仕様を変更する場合、組織が守るべき絶対的なルールは何ですか？","o":["黙って変更して、バレなければ良い","顧客へ通知し、合意（承認）を得る","変更した後に事後報告する","協力会社にだけ伝えておく"],"h":"勝手な変更（サイレントチェンジ）は、重大なリコール問題に直結する恐れがあります。","c":1,"e":"顧客が承認した条件を変更する場合は、エビデンス（検証結果）を添えて顧客の合意を得ることが要求事項となっています。"},{"m":6,"q":"変更管理において、変更実施後の製品に不具合が見つかった際、原因調査のために不可欠な仕組みは何ですか？","o":["掃除の記録","変更反映日などの記録に基づくトレーサビリティ（追跡可能性）","担当者の記憶","経理ソフトのデータ"],"h":"「どのロットから新しい材料に切り替わったか」を遡れるようにしておくことです。","c":1,"e":"変更点と製品ロットを紐付けて記録しておくことで、万が一の際に影響範囲を即座に特定し、被害を最小限に抑えられます。"},{"m":6,"q":"解説の「治工具の変更事例」において、新しい治具を導入する前に行った「妥当性確認」の具体例はどれですか？","o":["治具に名前を書く","新しい治具で製造した初期ロット（初品）が要求事項を満たすか確認する","治具を磨く","治具の重さを測る"],"h":"「その変更で本当に良い製品が作れるか」を実際に試して証明することです。","c":1,"e":"量産前にテストを行い、図面通りの寸法や強度が出ているかを確認することが、変更の妥当性を証明する証拠となります。"},{"m":6,"q":"本研修のまとめとして、変更管理プロセスを「身体の機能」に例えた場合、どのような表現が使われていましたか？","o":["筋肉（パワー）","免疫システム（防衛機能）","消化器（エネルギー吸収）","骨格（支え）"],"h":"外部からの異物（変化）に対して、アレルギー（不具合）が起きないかチェックする役割です。","c":1,"e":"変化という刺激に対して、事前にリスクを排除し、安全を確認してから受け入れる仕組みが、組織の健康（品質）を守ります。"},{"m":7,"q":"ISO 9001:2015において、QMSの変更を計画する際に最も重視される「考え方」は何ですか？","o":["利益優先の考え方","リスクに基づく考え方","過去の慣習を守る考え方","担当者の直感による考え方"],"h":"「不確実性が目標に与える影響」を事前に検討する姿勢です。","c":1,"e":"変更がもたらす「リスク（悪い影響）」と「機会（良い影響）」を分析し、問題が起きないように計画することが規格の核心です。"},{"m":7,"q":"潜在的な不適合の原因をあらかじめ除去し、問題の発生を未然に防ぐ活動を何と呼びますか？","o":["修正処置","是正処置","予防処置","特別採用"],"h":"「起きてから直す」のではなく「起きる前に原因を絶つ」活動です。","c":2,"e":"問題が起こる前にその芽を摘むのが予防処置であり、変更管理における最重要プロセスです。"},{"m":7,"q":"QMSの変更（工場移管や組織変更など）において、リスクを増大させる要因として「不適切」なものはどれですか？","o":["派遣・アルバイト社員への依存度の増加","組織的な知識の蓄積と活用","設備の移設による精度の不安定化","納期・コスト要求の激化"],"h":"組織を強くする要素（プラスの要素）を探してください。","c":1,"e":"知識の蓄積と活用はリスクを下げる要因です。人、設備、環境の変化はリスクを高める要因となります。"},{"m":7,"q":"変更管理における「検証（Verification）」と「妥当性確認（Validation）」の違いについて、正しい説明はどれですか？","o":["検証は「書類の確認」、妥当性確認は「挨拶」である","検証は「規定通りのスペックか」の確認、妥当性確認は「意図した結果を安定して出せるか」の確認である","両者に違いはない","妥当性確認は全数検査のことである"],"h":"一方は仕様との照合、もう一方は「目的を果たせるか」の科学的証明です。","c":1,"e":"特に変更時は、新しいプロセスが安定して良品を生み出せることを証明する「妥当性確認」が不可欠です。"},{"m":7,"q":"変更の影響を評価する際、特に注目すべき「3つの要素（3F）」は何ですか？","o":["形状（Form）・合い（Fit）・機能（Function）","速度（Fast）・力（Force）・摩擦（Friction）","費用（Fee）・事実（Fact）・顔（Face）","過去（Former）・未来（Future）・今（Final）"],"h":"部品の形、他との繋がり、そして本来の役目です。","c":0,"e":"これら3つの視点で変更前後の差を確認することで、予期せぬ不具合を網羅的にチェックできます。"},{"m":7,"q":"変更管理において、FMEA（故障モード影響解析）を更新し続けるべき理由は何ですか？","o":["ページ数を増やして立派に見せるため","変更によって生じる「新たなリスク」を可視化し、管理するため","担当者の暇つぶしのため","顧客に最新のフォントを見せるため"],"h":"FMEAはプロセスの「今」を映す「生きた文書」です。","c":1,"e":"変更が加わると故障モードや発生頻度が変わるため、常に最新の状態にメンテナンスして予防に役立てます。"},{"m":7,"q":"工場移管などの設備設置後、その設備が設計通りに正しく据え付けられたかを確認するステップを何と呼びますか？","o":["IQ（据付時適格性確認）","OQ（運転時適格性確認）","PQ（性能時適格性確認）","5Sチェック"],"h":"Installation（据付）の頭文字をとった用語です。","c":0,"e":"IQで正しさを確認し、その後のOQ、PQへと段階的に信頼性を積み上げていきます。"},{"m":7,"q":"変更によってヒューマンエラーが発生しやすくなる根本的な原因として、解説で挙げられているものは何ですか？","o":["運が悪かったから","組織的な知識・技能が適切に獲得・活用されていないから","道具が新しすぎるから","給料が安いから"],"h":"「知っているはずのこと」が現場で機能していない状態です。","c":1,"e":"個人の注意に頼るのではなく、組織として持つべき「知識」を標準化し、確実に伝達することが未然防止の鍵です。"},{"m":7,"q":"顧客要求事項に影響する変更を行う際、絶対に省略してはいけないプロセスは何ですか？","o":["顧客への通知と合意（承認）","事務所の模様替え","担当者の昇進","ライバル会社の調査"],"h":"サプライチェーン全体の信頼を守るための、非常に厳格な手続きです。","c":0,"e":"無断変更（サイレントチェンジ）は、重大なリコールや契約違反に繋がる最も危険な行為です。"},{"m":7,"q":"本研修のまとめとして、QMS変更時の未然防止策を「身体」に例えた場合、どのような表現が使われていましたか？","o":["筋肉を鍛えること","喉が渇く前に水を飲むこと","システム全体の「健康診断（FMEA）」と「ワクチン接種（V&V）」","ぐっすり眠ること"],"h":"弱点を見つけ出し、耐性（妥当性）をつけてから変化を受け入れるイメージです。","c":2,"e":"FMEAでリスクを予見し、検証・妥当性確 ":["たまたま起きた不運","作業者の個別の不注意","システムや仕組み（ルール、教育、体制）の欠陥","測定器のわずかな誤差"],"h":"個人のミスを許してしまった「背景」に何があるかを考えます。","c":2,"e":"ヒューマンエラーは「結果」であり、その背後にある手順の不備や管理体制の弱さが真の原因であることがほとんどです。"},{"m":11,"q":"なぜなぜ分析を行う際、憶測や感情論を排除するために不可欠な基本姿勢は何ですか？","o":["多数決","現場・現物・現実の「三現主義」","過去の成功体験","誰かの予測"],"h":"自分の目で事実を確かめることが、分析のスタート地点です。","c":1,"e":"事実に基づかない分析は的外れな対策を生みます。現場で起きている「現実」を直視することが不可欠です。"},{"m":11,"q":"要因を解析する際、データを「人・設備・材料・方法」の観点で分類することを何と呼びますか？","o":["4Mによる層別","5Sによる整理","3Cによる分析","PDCAによる管理"],"h":"Man, Machine, Material, Method の頭文字をとった分類法です。","c":0,"e":"4Mで層別することで、問題が「人に依存しているのか」「設備に起因するのか」といった所在を明確にできます。"},{"m":11,"q":"原因分析の最終的な目的の一つである、ヒューマンエラーが起きても不良を作らない仕組みを何と呼びますか？","o":["抜き取り検査","ポカヨケ（エラー防止）","精神論","厳重注意"],"h":"「人は間違えるもの」という前提に立った、物理的・システム的なガードです。","c":1,"e":"ポカヨケを導入することで、個人の注意力に頼らずに品質を保証する強靭なプロセスを構築できます。"},{"m":11,"q":"解説の「校正漏れ」の事例において、2回目のなぜ（チェック漏れの原因）で止めてしまった場合、どのような対策になりがちですか？","o":["自動通知システムの導入","「担当者を指導し、注意を促す」という精神論的な対策","測定器の買い替え","検査の廃止"],"h":"「人が間違えた」ところで止まると、対策も「人に頼る」ものになります。","c":1,"e":"ここで止まると「人」への依存が解消されず、担当者が変わればまた同じミスが繰り返されます。"},{"m":11,"q":"なぜなぜ分析を深掘りした結果、最終的に「企業文化」や「経営資源の配分」が原因となる場合、どのようなアクションが必要ですか？","o":["現場の作業員だけで解決する","経営層のコミットメントや組織的な方針の見直し","報告書を短くまとめる","何もせず諦める"],"h":"真因が深い場所にある場合、対策も組織の上層部を巻き込む必要があります。","c":1,"e":"真の原因が「リスク認識の不足」などにある場合、トップが姿勢を変え、資源を投じなければ根本解決は望めません。"},{"m":11,"q":"本研修のまとめとして、なぜなぜ分析のプロセスを何に例えていますか？","o":["枯れた花に水をやること","地中に埋まった水道管の「元栓（破裂箇所）」を探す作業","綺麗な壁紙を貼ること","遠くの景色を眺めること"],"h":"水たまり（現象）を拭くだけでなく、漏れている大元を止めるイメージです。","c":1,"e":"地面を何回掘るか（回数）よりも、水が止まる「元栓（根本原因）」を見つけるまでやり抜くことが、是正処置の責務です。"},{"m":12,"q":"QMS（品質マネジメントシステム）において、KPIが果たす最も重要な役割は何ですか？","o":["従業員の作業スピードを競わせるため","PDCAサイクルの「C（評価）」と「A（改善）」を機能させるための評価尺度とするため","報告書のページ数を増やすため","過去の成功を自慢するため"],"h":"「目標に対してどうだったか」を測り、次のアクションに繋げるための道具です。","c":1,"e":"KPIはプロセスの有効性を客観的に示し、目標未達の場合にマネジメントレビュー等を通じて継続的改善を促すための燃料となります。"},{"m":12,"q":"プロセスの要素（インプット、アウトプット、リソース、方法など）を分析する「タートル図」において、プロセスの有効性を示す要素は何ですか？","o":["設備の名前","原材料の単価","主要プロセス評価指標（KPI）","担当者の住所"],"h":"「そのプロセスが意図した成果を出せているか」を測る指標です。","c":2,"e":" 去の失敗を隠すための活動","外部のコンサルタントにすべてを任せる活動"],"h":"「大きなPDCAサイクル」として、組織の進むべき方向を定める経営ツールです。","c":1,"e":"トップが掲げた高い目標を、各階層で具体的な計画（P）に落とし込み、全社一丸となってPDCAを回す仕組みです。"},{"m":13,"q":"日常管理において、現在の「標準」を維持し、決められた通りに作業を行うためのサイクルを何と呼びますか？","o":["PDCAサイクル","SDCAサイクル","OODAループ","3C分析"],"h":"P（計画）の代わりに S（Standard：標準）から始まるサイクルです。","c":1,"e":"SDCA（Standard-Do-Check-Action）は、現場の「当たり前」を維持するための基盤であり、これがおろそかでは改善の効果も定着しません。"},{"m":13,"q":"全社的な高い品質目標（例：納期遵守率98%）を現場で実行可能なレベルに分解することを何と呼びますか？","o":["統合","KPIの階層的な展開（層別）","目標の隠蔽","予算の削減"],"h":"「大きな塊」を、現場が管理できる「小さな指標」に小分けにする作業です。","c":1,"e":"全社目標を「工程の停滞時間」や「設備の停止時間」などの具体的なKPIに分解することで、現場は自分たちが何をすべきか理解できます。"},{"m":13,"q":"日常管理ボードなどでKPIを「見える化」する最大の目的は何ですか？","o":["壁をカラフルにするため","目標と実績の差異を即座に把握し、異常やリスクに対して迅速にアクション（改善）を取るため","検査員を監視するため","外部の来客に自慢するため"],"h":"「今、順調なのか異常なのか」を誰でもひと目で判断できるようにします。","c":1,"e":"差異（ギャップ）が見えることで、初めて「なぜ遅れているのか？」という原因分析と改善のアクションが生まれます。"},{"m":13,"q":"現場レベルでの改善活動（小さなPDCA）において、不具合の原因を深掘りするために用いる手法は何ですか？","o":["多数決","「なぜなぜ問答」","責任転嫁","勘と経験のみ"],"h":"表面的なミスではなく、その奥にある「仕組みの欠陥」を探る手法です。","c":1,"e":"日常管理で見つかった課題に対して「なぜ」を繰り返すことで、標準（S）の不備を見つけ、改善に繋げます。"},{"m":13,"q":"目標未達の原因を徹底的に振り返ることから始め、改善されたプロセスで再計画するサイクルを何と呼びますか？","o":["CAPDoサイクル","スタートダッシュ","逆走サイクル","繰り返し練習"],"h":"C（チェック）とA（アクション）から始まる、改善を重視した流れです。","c":0,"e":"現状の「振り返り」を起点にすることで、より現実的で効果の高い改善計画（P）を立てることが可能になります。"},{"m":13,"q":"現場での「小さなPDCA」による改善成果（例：ある工程の停滞解消）は、最終的にどこに報告・反映されるべきですか？","o":["休憩室の雑談","マネジメントレビュー（大きなPDCAの振り返り）","秘密のノート","競合他社"],"h":"経営層がシステム全体の有効性を判断するための重要なインプットになります。","c":1,"e":"現場の改善実績がトップに伝わることで、次年度の方針策定や経営資源の配分に活かされます。"},{"m":13,"q":"日常管理において、作業手順（標準）が守られていないことが判明した際、まず立ち返るべきものは何ですか？","o":["罰則規定","SDCAの「S（標準）」の内容と、その妥当性","給与体系","過去の売上"],"h":"「ルールそのものが守りづらいのではないか？」という視点も重要です。","c":1,"e":"単なる注意ではなく、標準が正しく理解されているか、あるいは標準そのものが現状に合っているかを再確認します。"},{"m":13,"q":"方針管理と日常管理を「車の両輪」に例えた場合、方針管理が担う役割はどれですか？","o":["タイヤのパンクを直すこと","行き先（目標）を決め、ハンドルを切ること","ガソリンを入れること","洗車すること"],"h":"組織全体がどの方向に進むべきかを示す役割です。","c":1,"e":"方針管理が進むべき道（戦略）を示し、日常管理がエンジンの回転（日々のオペレーション）を維持することで、組織は前進します。"},{"m":13,"q":"本研修のまとめとして、方針管理と日常管理のつながりを何に例えていましたか？","o":["太陽と月","「国家戦略と日々の地域行政」","先生と生徒","料理人と客"],"h":"「大きな目標」と「末端の具体的なサービス・フィードバック」の連携の例えです。","c":1,"e":"トップの戦略（方針）は、現場の地道な維持・改善（日常管理）に支えられて初めて実現し、現場の知恵が戦略をより良くしていきます。"},{"m":14,"q":"eQMS（電子品質マネジメントシステム）の本来の定義として、最も適切なものはどれですか？","o":["紙の書類をスキャンしてPDFにするだけの保管庫","QMSのプロセス全体をデータに基づいて迅速・正確に運用するためのデジタル経営基盤","担当者の作業を監視するための監視カメラシステム","外部のコンサルタントに見せるための宣伝用ツール"],"h":"単なる「電子化」ではなく、PDCAサイクルを回すための「基盤」であるという点に注目してください。","c":1,"e":"eQMSは、リスク分析、変更管理、是正処置などのデータを一元化し、意思決定のスピードと精度を高めるためのエンジンです。"},{"m":14,"q":"ISO 9001:2015以降に強化された、eQMSで管理すべき中心的な「考え方」は何ですか？","o":["利益最大化の考え方","リスクに基づく考え方","精神論に基づく考え方","年功序列の考え方"],"h":"「何が起きそうか」を予測し、望ましくない影響を防ぐための姿勢です。","c":1,"e":"不適合が発生した際、「なぜ事前にリスクを明らかにできなかったか」を分析できるデータが蓄積されていることが、eQMSには求められます。"},{"m":14,"q":"組織が持つべき「固有技術」や「過去の成功・失敗事例」をデジタル化して蓄積・活用することを何と呼びますか？","o":["組織的な知識の維持","秘密保持の徹底","データの消去","外部への技術流出"],"h":"「人」に付いた知識を「組織」の財産として残す活動です。","c":0,"e":"eQMSを活用することで、ベテランのノウハウや過去のトラブル教訓をデジタル化し、誰でも活用できる状態（標準化）に保ちます。"},{"m":14,"q":"現場で集まる大量のデータを、改善のヒントを得るために「4M（人・機械・材料・方法）」などの切り口で分けることを何と呼びますか？","o":["データの削除","層別（そうべつ）","データの隠蔽","データの統合"],"h":"大きな数字の塊を、原因が見えるサイズまで「小分け」にする手法です。","c":1,"e":"層別を行うことで、特定の設備や特定の時間帯に発生している異常（要因）を即座に特定できるようになります。"},{"m":14,"q":"eQMS上の膨大なデータをクロス集計し、必要な要素だけをすっきり表示して傾向を掴むのに便利なExcel等の機能は何ですか？","o":["セルの色付け","ピボットテーブル","文字のフォント変更","印刷プレビュー"],"h":"「ひと目でわかるように見せる（可視化）」ための強力な分析ツールです。","c":1,"e":"ピボットテーブルを活用すれば、4Mごとの不良率推移などを瞬時にグラフ化でき、事実に基づいた判断を助けます。"},{"m":14,"q":"eQMSにおいて「変更管理（MOC）」をデジタル化する最大のメリットは何ですか？","o":["ハンコをたくさん押せる","変更に必要なリソースの確保や、関連文書（FMEA等）の更新漏れを自動的にチェック・支援できる","変更を内緒にできる","過去の記録をすぐに消せる"],"h":"変更の影響範囲が広くても、システムが「ここも直して！」と教えてくれるイメージです。","c":1,"e":"変更によって影響を受けるFMEAやコントロールプランの更新をシステムが促すことで、QMSの完全性（インテグリティ）を維持できます。"},{"m":14,"q":"新しい製造プロセスや設備を導入した際、意図した品質が安定して出せることを科学的に証明する活動を何と呼びますか？","o":["試し運転","妥当性確認（Validation）","整理整頓","経理処理"],"h":"医薬品や医療機器、自動車業界などで特に厳格に求められる「証拠立て」の活動です。","c":1,"e":"eQMS上で適格性評価（IQ/OQ/PQ）のデータを管理することで、変更の妥当性を客観的に保証し続けることができます。"},{"m":14,"q":"具体的な活用事例において、eQMSがクレーム対応のスピードを上げるために行っている「他システムとの連携」は何ですか？","o":["SNSとの連携","ERP（企業資源計画）やMES（製造実行システム）とのトレーサビリティ連携","ゲーム機との連携","翻訳ソフトとの連携"],"h":"「どのロットの材料が、どの機械で作られたか」を瞬時に特定するための連携です。","c":1,"e":"品質データと製造・在庫データが繋がっていることで、不適合の影響範囲を数秒で特定し、迅速な封じ込めが可能になります。"},{"m":14,"q":"eQMSに登録された是正処置の結果を、FMEAやコントロールプランに反映させる理由は何ですか？","o":["書類の枚数を増やすため","対策を「標準化」し、二度と同じ問題を起こさない「生きた文書」にするため","誰が対策したか自慢するため","監査員を混乱させるため"],"h":"「やりっぱなし」にせず、組織のルールとして定着させるための手続きです。","c":1,"e":"是正処置の教訓を管理文書に自動・半自動で反映させることで、再発防止の確実性が飛躍的に向上します。"},{"m":14,"q":"本研修のまとめとして、eQMSと現場データ活用を何に例えていましたか？","o":["豪華な客船","「現代の製造現場におけるデジタル管制塔」","昔ながらのそろばん","閉ざされた金庫"],"h":"リアルタイムの情報を分析し、的確な指示を出す司令塔のイメージです。","c":1,"e":"紙や口頭では見えなかったリスクを「レーダー（データ）」で捉え、安全（品質）な航行を支える仕組みこそがeQMSの本質です。"},{"m":15,"q":"新製品や新規プロセスを量産に移行する際、品質・納期・コストを体系的に保証する活動（APQPなど）を何と呼びますか？","o":["在庫管理","初期流動管理","経理精算","採用管理"],"h":"「最初（初期）」の製品の「流れ（流動）」を特別に手厚く管理する期間のことです。","c":1,"e":"量産開始直後は予期せぬトラブルが起きやすいため、通常の管理よりも厳しい基準で監視し、プロセスの妥当性を確認します。"},{"m":15,"q":"初期流動管理やリスク分析を、特定の担当者だけでなく関連部門が集まって推進する体制を何と呼びますか？","o":["少数精鋭部隊","部門横断的チーム（CFT）","外部委託","秘密結社"],"h":"Cross Functional Teamの略称です。設計、製造、品質などの知恵を結集します。","c":1,"e":"多様な視点でDFMEAやPFMEAをレビューすることで、一部署では気づけない潜在的リスクを洗い出します。"},{"m":15,"q":"製品が特定の意図された用途に関する要求事項を満たしていることを、客観的な証拠（テスト結果等）で確認する活動を何と呼びますか？","o":["想像","妥当性確認（Validation）","整理","伝言"],"h":"「机上の空論」ではなく、実車テストなどの「実証」によって証明することです。","c":1,"e":"妥当性確認が不十分なまま量産へ移行することは、市場での大規模なリコールを招く最大の要因の一つです。"},{"m":15,"q":"顧客に対し、自社のプロセスが安定して要求事項を満たせることを証明し、承認を得るための手続きを何と呼びますか？","o":["PPAP（生産部品承認プロセス）","SNSでの告知","年賀状の送付","領収書の提出"],"h":"自動車産業などで必須となる、非常に厳格な「お墨付き」を得るためのプロセスです。","c":0,"e":"PPAPファイルには、FMEAやテスト結果、コントロールプランなどが含まれ、顧客との契約の根拠となります。"},{"m":15,"q":"量産開始後に発生する4M（人・機械・材料・方法）の変化を体系的に管理することを何と呼びますか？","o":["放置","変更管理（MOC / 変化点管理）","趣味の変更","席替え"],"h":"「変化」を「管理（マネジメント）」することを意味する用語です。","c":1,"e":"変化は不具合の引き金です。事前にレビューし、影響を評価してから実施するのがQMSの鉄則です。"},{"m":15,"q":"製品設計や製造工程に変更があった際、FMEA（故障モード影響解析）はどのように扱うべきですか？","o":["一度作ったら金庫にしまう","変更の影響を評価するためにレビューし、最新の状態に更新する","捨てる","担当者の机の中に隠す"],"h":"FMEAは常に最新の情報を反映し続ける「生きた文書」です。","c":1,"e":"変更によって新たなリスクが生じていないか、FMEAを読み解き、必要なら対策を追加します。"},{"m":15,"q":"製品、製造工程、測定、供給元などに変更があった際、必ずレビュー・更新しなければならない「現場の管理計画書」は何ですか？","o":["社内報","コントロールプラン（CP）","労働協約","決算書"],"h":"「何を、どう測り、どう管理するか」が書かれた、品質の司令塔となる文書です。","c":1,"e":"変更に合わせて管理手段（チェック項目や頻度）を更新しなければ、せっかくの変更管理も現場で機能しません。"},{"m":15,"q":"品質不具合が発生した際、どのロットから変更が適用されたかを追跡するために、記録として維持すべき項目は何ですか？","o":["変更反映日（実施日）","当日の天気","担当者の昼食","事務所の室温"],"h":"「いつから変わったか」が、トレーサビリティ（追跡可能性）の鍵となります。","c":0,"e":"変更実施日が明確であれば、万が一の際に「どの製品までが安全で、どこからが調査対象か」を即座に判断できます。"},{"m":15,"q":"具体的な活用事例において、新しい治工具（Machine）を導入する際、最初に行うべきことは何ですか？","o":["試しに一個作ってみる","変更申請を出し、CFTを招集してPFMEAをレビューする","以前の治具を破壊する","顧客に黙って導入する"],"h":"「やってみてから考える」のではなく「やる前にリスクを分析する」のが先です。","c":1,"e":"新しい道具が未知の不良を生まないか、多角的にリスクを評価することが予防の第一歩です。"},{"m":15,"q":"本研修のまとめとして、初期流動管理と変化点管理の実務を何に例えていましたか？","o":["車の運転","「料理のレシピ（CP）と調理器具（4M）の管理」","庭のガーデニング","読書"],"h":"「念入りな準備と試食」そして「道具を変えるときの影響確認」の例えです。","c":1,"e":"新しい料理（新製品）への挑戦と、日々の調理（日常生産）における微差の管理。この両立が安定した美味しさ（品質）を支えます。"},{"m":16,"q":"ポカヨケ（Poka-Yoke）の根本的な思想として、最も適切なものはどれですか？","o":["作業者が絶対にミスをしないように精神を鍛えさせること","「人は必ず間違える」という前提に立ち、ミスが起きない・流れない仕組みを作ること","検査員の人数を増やして、力ずくで不良を見つけること","不良が出たら、その都度担当者を厳しく指導すること"],"h":"「人」の注意力ではなく、「システム（仕組み）」の強さに注目してください。","c":1,"e":"ヒューマンエラーは個人の責任ではなく、エラーを許容してしまう「システムの欠陥」と捉え、物理的・システム的にガードを固めるのがポカヨケの思想です。"},{"m":16,"q":"リスクマネジメントにおいて、ポカヨケが目指すべきシステムの特性を何と呼びますか？","o":["脆弱性","頑健性（耐性・レジリエンス）","複雑性","依存性"],"h":"「誰が、どのような状態で作業しても、同じ結果が出る」強さのことです。","c":1,"e":"作業者が疲れていたり、新人であったりしても、システム側がエラーを拒絶する「耐性」を持っていることが重要です。"},{"m":16,"q":"ポカヨケを導入し、不良品の発生そのものを防ぐことで排除できる「ムダ」の例として、不適切なものはどれですか？","o":["不良品の加工にかかるムダ","不良品の検査や廃棄処理にかかるムダ","良い製品を設計するための思考の時間","不良品の運搬にかかるムダ"],"h":"「付加価値を生まない活動」がムダにあたります。","c":2,"e":"設計や改善のために考える時間は、品質をつくり込むための投資であり、排除すべき「ムダ」には該当しません。"},{"m":16,"q":"不適合が発生した際、再発防止策として「作業者への教育」よりも「ポカヨケの実施」が優先されるべき理由は何ですか？","o":["教育はコストがかからないから","人の注意力は長続きせず、担当者が変わればリスクが再発するから","ポカヨケの方が書類作成が楽だから","機械の方が人間より偉いから"],"h":"「恒久的な対策」になるのはどちらかを考えてください。","c":1,"e":"教育は重要ですが、忘却や不注意を完全にゼロにすることは不可能です。仕組み化することで、属人的なリスクを排除できます。"},{"m":16,"q":"ポカヨケを導入した際、その新しい管理手段やリスク低減効果を反映させるべき「リスク分析文書」は何ですか？","o":["財務諸表","FMEA（故障モード影響解析）","会社案内","労働協約"],"h":"「どのような故障が起き、どう対策しているか」を記録するリビングドキュメントです。","c":1,"e":"ポカヨケによって「検出度（D）」が向上したり「発生度（O）」が低下したりした結果をFMEAに反映し、最新化します。"},{"m":16,"q":"ポカヨケによる新しい管理方法や監視基準を現場の標準として定着させるために更新すべき文書は何ですか？","o":["経営計画書","コントロールプラン（CP）","履歴書","ニュースレター"],"h":"「何を、どう測り、どう管理するか」を定めた製造管理の要となる計画書です。","c":1,"e":"コントロールプランにポカヨケの点検方法などを盛り込むことで、その仕組みが日常的に正しく機能しているかを保証します。"},{"m":16,"q":"計測機器の校正漏れ対策として、「期限が近づくと自動でメール通知が来るシステム」を導入することは、どの種類のポカヨケに該当しますか？","o":["物理的な制限","電子的な警告・通知によるポカヨケ","精神的な訓示","抜き打ち検査"],"h":"「人の記憶」に頼らず、システムが能動的に知らせてくれる仕組みです。","c":1,"e":"管理台帳を電子化し、自動通知機能を設けることで、チェック漏れというヒューマンエラーをシステム的に防ぎます。"},{"m":16,"q":"「良品は青色の箱、不良品は赤色の箱」というように、色を活用して判断のバラツキを抑える手法を何と呼びますか？","o":["隠蔽管理","色による識別管理（見える化）","自由裁量","匿名管理"],"h":"「考えて判断する」時間を減らし、直感的に正誤がわかるようにします。","c":1,"e":"視覚情報を活用することで、多忙な現場でも一目で異常を察知でき、取り間違いなどのミスを物理的に防ぐポカヨケとなります。"},{"m":16,"q":"「部品Aを取り付けないと、次の部品Bが物理的にはまらない」という治具の設計は、どのようなポカヨケの例ですか？","o":["組み付け忘れ防止の手順強制","後の工程で検査する仕組み","作業スピードを上げる仕組み","道具をきれいに保つ仕組み"],"h":"「順番を飛ばそうとしても、物理的にできない」状態を作っています。","c":0,"e":"物理的な干渉や形状の工夫を利用して、正しい手順でしか作業が完了しないように設計することを指します。"},{"m":16,"q":"本研修のまとめとして、ポカヨケの思想を「建物の設計」に例えた場合、どのような表現が適切ですか？","o":["豪華なシャンデリアを飾ること","「バリアフリー設計（スロープ、自動ドアなど）」","鍵をたくさんかけること","窓を大きくすること"],"h":"「誰でも、どんな状態でも、安全に利用できる仕組み」というイメージです。","c":1,"e":"個人の能力や状態に関わらず、システム自体が安全（品質）をエスコートし、エラーを未然に防ぐ。それがポカヨケの究極の姿です。"},{"m":17,"q":"品質管理において、標準作業を策定・遵守する最大の目的は何ですか？","o":["作業者を監視しやすくするため","「ばらつき」を最小化し、常に同じ品質・同じ時間で製品を作れるようにするため","マニュアルのページ数を増やすため","誰がやっても同じ給料にするため"],"h":"「作る人や日によってデキが違う」という状態をなくすための活動です。","c":1,"e":"標準作業はSDCAサイクルの「S（標準）」であり、品質の敵である「ばらつき」を抑え、良い仕事のやり方を組織に定着させるための基盤です。"},{"m":17,"q":"作成されたマニュアルや標準書において、読み手が内容を正確に実行できることを何と呼びますか？","o":["娯楽性","再現性（および法則性）","匿名性","意外性"],"h":"「誰が読んでも同じ結果になる」という、手順書としての質の高さのことです。","c":1,"e":"再現性のないマニュアルは事故や不良の原因となります。正しい業務フローが示されていることが不可欠です。"},{"m":17,"q":"顧客が製品を求めているペース（需要リズム）に合わせて、1個の製品を作るのにかけるべき時間を何と呼びますか？","o":["残業時間","タクトタイム","休憩時間","納期"],"h":"オーケストラの指揮者が振る「タクト」のように、工場の演奏リズムを決める指標です。","c":1,"e":"タクトタイムに生産リズムを同期させることで、作りすぎ（過剰在庫）や欠品を防ぐムダのない生産が可能になります。"},{"m":17,"q":"「必要なものを、必要な時に、必要なだけ」作るという、トヨタ生産方式の基本思想を何と呼びますか？","o":["アフターサービス","ジャスト・イン・タイム（JIT）","大量生産方式","どんぶり勘定"],"h":"需要と供給のタイミングをピタリと合わせる考え方です。","c":1,"e":"JITは平準化生産を通じて供給リードタイムを短縮し、ムダを徹底的に排除することを目指します。"},{"m":17,"q":"解説の中で、在庫（仕掛品）が多いことの最大の弊害として挙げられているのはどれですか？","o":["倉庫が賑やかになる","工程に潜む問題点（ムダや異常）の発見を遅らせ、顕在化を妨げる","会社の資産が増えて見える","作業者が安心する"],"h":"在庫という「水面」が下がると、隠れていた「岩（問題）」が見えてきます。","c":1,"e":"「在庫は悪」という認識を持ち、あえて在庫を減らすことで、チョコ停や手順の不備などの改善すべき課題を浮き彫りにします。"},{"m":17,"q":"レイアウト改善において排除すべき「3ム」とは、ムリ、ムダと、あと一つは何ですか？","o":["ムチャ","ムラ（ばらつき）","ムリョク","ムチュウ"],"h":"作業のペースや品質が一定でない状態を指します。","c":1,"e":"ムリ・ムダ・ムラを排除し、モノがよどみなく流れるフロー（動線）を設計することがレイアウト改善の核心です。"},{"m":17,"q":"工場内の動線設計において、生産性だけでなく「衛生面」で特に避けるべきことは何ですか？","o":["排水溝の掃除","衛生レベルの異なるエリアの排水溝を連結させること","窓を開けること","床を塗装すること"],"h":"悪臭や害虫、交差汚染を防ぐためのゾーニング（区分け）の視点です。","c":1,"e":"汚染度の高いエリアと清潔なエリアを物理的・流体的に遮断することは、品質と衛生を両立させるレイアウトの鉄則です。"},{"m":17,"q":"「U字ライン型」などのセル生産方式を導入し、仕掛品置き場を最小化することで得られる改善のメリットは何ですか？","o":["椅子に座って作業できる","問題点（ムダ）が顕在化し、改善の機会が創出される","部屋が広く使えるだけ","会話が禁止される"],"h":"在庫に隠されていた「真の課題」が見えるようになる効果です。","c":1,"e":"物理的に在庫を置けなくすることで、工程の不備を隠せなくし、強制的にPDCAを回す環境を作ります。"},{"m":17,"q":"解説の事例において、チョコ停の根本原因（標準作業の欠陥）を解消するために導入された「仕組み」は何ですか？","o":["精神論","ポカヨケ（清掃完了を確認しないと次工程へ進めない仕組みなど）","監視カメラの設置","給与の減額"],"h":"「人の注意」に頼らず、システム側でミスを拒絶する設計です。","c":1,"e":"誰がやっても同じ清掃品質が保証される仕組み（ポカヨケ）を組み込むことで、標準作業の実効性を高めます。"},{"m":17,"q":"本研修のまとめとして、これら三つの活動を「オーケストラ」に例えた場合、標準作業は何に相当しますか？","o":["指揮者の指示","楽譜（演奏の質の再現性を保証するもの）","舞台の照明","観客の拍手"],"h":"「全員が同じように、正しく演奏するための基準」となるものです。","c":1,"e":"タクトタイム（指揮）に合わせ、標準作業（楽譜）通りに演奏し、レイアウト改善（舞台設計）でムダをなくす。この連携が最高のパフォーマンスを生みます。"},{"m":18,"q":"ISO 9001:2015において、文書化された情報の扱いに関する考え方として正しいものはどれですか？","o":["文書は一切不要になった","組織の規模や活動の複雑さに応じて、QMSの有効性のために「必要な情報」を組織自身が判断する","すべての作業をビデオで記録しなければならない","昔の規格通りに「品質マニュアル」を分厚く作ることが義務である"],"h":"「形式」よりも「その文書が本当に役に立っているか」という実質が重視されるようになりました。","c":1,"e":"画一的な文書作成ではなく、リスクに基づき、組織の運営に不可欠な情報を特定し、管理することが求められています。"},{"m":18,"q":"QMSの適用範囲や品質方針、プロセスの相互関係などを記述した、文書体系の最上位に位置する文書は何ですか？","o":["作業指示書","品質マニュアル（QM）","外注先の名簿","領収書"],"h":"組織の品質に対する「憲法」のような役割を果たす文書です。","c":1,"e":"品質マニュアルは、組織がどのようなQMSを構築し、どのように継続的改善を行うかの枠組みを示す全体図となります。"},{"m":18,"q":"マニュアルや手順書を作成する際、読み手がその業務を正確に再現できることを何と呼びますか？","o":["娯楽性","再現性","匿名性","意外性"],"h":"「誰がいつやっても、同じ正しい結果が出せる」という性質のことです。","c":1,"e":"再現性のない文書は「標準」として機能せず、品質のばらつきや事故の原因となります。"},{"m":18,"q":"QMSの文書やプロセスに変更を加える際、システム全体の整合性や有効性が損なわれないように配慮することを何と呼びますか？","o":["完全性（インテグリティ）の維持","部分最適化","データの削除","責任転嫁"],"h":"「一箇所を変えたら、別の場所が矛盾してしまった」という事態を防ぐ考え方です。","c":0,"e":"一部の変更がQMS全体にどのような影響を及ぼすかを事前にレビューし、組織の「健康状態」を保つことが不可欠です。"},{"m":18,"q":"製造工程における「4M変更」のうち、Material（材料）やMachine（設備）以外に含まれる2つの要素は何ですか？","o":["Money（金）とManager（管理者）","Man（人）とMethod（方法・手順）","Map（地図）とMemory（記憶）","Media（媒体）とMessage（伝言）"],"h":"「誰が」「どのように」作るか、という現場の核心部分です。","c":1,"e":"人（力量）や方法（手順）の変更は、品質不具合の主要因となるため、厳格な変更管理が求められます。"},{"m":18,"q":"製品設計や製造工程に変更があった際、それに関連して必ずレビュー・更新すべき「生きた文書」の代表例は何ですか？","o":["会社案内","FMEA（故障モード影響解析）やコントロールプラン（CP）","社内報","辞書"],"h":"リスクを予測し、管理方法を定めた「品質の設計図」です。","c":1,"e":"変更によって新たなリスクが生じていないか、FMEAを更新し、それに基づきCPの管理手段を見直すことが再発防止の鍵です。"},{"m":18,"q":"版管理（最新版管理）において、変更前後の状態を明確に識別するために更新すべき番号や記号を何と呼びますか？","o":["電話番号","版数（リビジョン）","郵便番号","社員番号"],"h":"Rev. 1.0 や 第2版 といった表記のことです。","c":1,"e":"版数を管理することで、現場の作業者が「今使っている手順書が本当に最新のものか」を確実に判断できるようにします。"},{"m":18,"q":"不具合が発生した際、どの版の手順書に基づいて製造されたかを追跡するために、記録として維持すべき項目は何ですか？","o":["変更反映日（適用開始日）","その日の天気","担当者の血液型","事務所の室温"],"h":"「いつからその新しいルールが始まったか」という日付の情報です。","c":0,"e":"変更反映日の記録は、万が一の際のトレーサビリティ（追跡可能性）を確保するために極めて重要です。"},{"m":18,"q":"是正処置の結果として作業手順書（S：標準）が更新された後、現場で最初に行うべき活動は何ですか？","o":["パーティーを開く","変更された手順に基づく教育・訓練を実施し、その有効性を評価する","古い手順書をシュレッダーにかけるだけで終わる","誰にも教えない"],"h":"「ルールが変わったこと」を、実行する人に正しく伝え、できるようにさせます。","c":1,"e":"文書を書き換えるだけでなく、人（Man）の力量を新しい手順（Method）に適合させることが品質保証の実務です。"},{"m":18,"q":"本研修のまとめとして、品質文書体系と版管理を「高層ビル」に例えた場合、文書体系は何に相当しますか？","o":["ビルの窓ガラス","ビルの設計図（構造と仕様）","ビルの入り口のマット","ビルの屋上の看板"],"h":"「ビル全体がどう作られ、どう機能するか」を示す根本的な図面です。","c":1,"e":"設計図（文書体系）が正確で、変更のたびに適切に更新（版管理）されてこそ、ビル（組織）の信頼性と安全が保たれます。"},{"m":19,"q":"トレーサビリティ（追跡可能性）を設計する最大の目的は何ですか？","o":["倉庫の棚卸しを楽にするため","問題発生時に影響範囲を迅速に特定し、被害を最小限に抑え、法規制順守を証明するため","作業者の居眠りを監視するため","過去の売上目標を確認するため"],"h":"「万が一の事故」が起きた時に、会社と顧客を守るための「命綱」としての役割を考えてください。","c":1,"e":"不具合発生時に「どの範囲まで回収すべきか」を即座に判断できる体制を整えることが、トレーサビリティの核心です。"},{"m":19,"q":"同じ原材料、同じ製造日など、同一の条件下で生産された製品の管理単位を何と呼びますか？","o":["ユニット","ロット（管理単位）","パック","セット"],"h":"「同じ条件の範囲」でくくられたグループのことです。","c":1,"e":"適切なロット形成が行われていれば、不具合が発生した際に「そのロットだけ」を対象に処置することが可能になります。"},{"m":19,"q":"ロットサイズを小さく設定することのメリットとして、正しいものはどれですか？","o":["分別管理の費用が安くなる","事故発生時の回収範囲を絞り込むことができ、原因究明も容易になる","倉庫のスペースが広くなる","事務手続きが簡略化される"],"h":"「細かく分ける」ことで、不具合の影響範囲をどれだけ限定できるかを考えてください。","c":1,"e":"ロットを細分化するほどリスクは低減しますが、管理コスト（手間やスペース）とのトレードオフになるため、バランスの取れた設計が求められます。"},{"m":19,"q":"製品に問題が発生した際、原材料や製造工程までさかのぼって原因を調査することを何と呼びますか？","o":["遡及（そきゅう）","予測","放置","宣伝"],"h":"「過去の結果から原因へ」と時間を戻るように追いかけることです。","c":0,"e":"計測機器の狂いなどが後から判明した際、その機器を使って測定した過去の製品すべてを再検証することを「遡及処置」と言います。"},{"m":19,"q":"トレーサビリティシステムを設計する際、必要な記録（情報項目）を漏れなく特定するために有効な手法は何ですか？","o":["勘に頼る","実際にトレーサビリティの「シミュレーション（演習）」を行ってみる","他社のマニュアルを丸写しする","過去の記録をすべて捨てる"],"h":"「いざという時に、この情報がなくて困った！」とならないための予行演習です。","c":1,"e":"シミュレーションを行うことで、「設備コードはあるが、使用した治具の記録がない」といったシステムの欠陥を事前に発見できます。"},{"m":19,"q":"不具合の原因が「特定の設備やツール」にあるかを確認するために、記録しておくべきデジタルキー（コード）は何ですか？","o":["従業員コード","設備コードや治工具/ゲージの識別番号","顧客コード","郵便番号"],"h":"「何（どの機械）」で作ったかを特定するための情報です。","c":1,"e":"設備や治具のコードがロットと紐付いていれば、特定の機械の故障がどの製品に影響したかを即座に抽出できます。"},{"m":19,"q":"食品安全（FSMS）において、原材料のトレーサビリティ情報として重要視される項目はどれですか？","o":["サプライヤーの資本金","原材料のロット番号や農薬の使用履歴","配送トラックの色","担当者の年齢"],"h":"「口に入るもの」の安全を証明するための直接的な証拠となる情報です。","c":1,"e":"農薬や添加物の使用基準が守られているかを、産地までさかのぼって証明できることが食品の信頼の基盤となります。"},{"m":19,"q":"製品の出荷後に問題が発覚し、速やかに回収を行うために必要な情報はどれですか？","o":["顧客コード、販売先、配送経路","従業員の訓練記録のみ","会社の創業記念日","原材料の仕入れ価格"],"h":"「その製品が今、世界のどこにあるか」を突き止めるための情報です。","c":0,"e":"販売先や配送経路が明確であれば、特定のロットを購入した顧客に対してのみ、迅速に連絡と回収の手配が可能です。"},{"m":19,"q":"QMSや製造工程に変更があった際、その「変更反映日」を記録しておくべき理由は何ですか？","o":["記念にするため","変更後に不具合が起きた際、変更の影響範囲を即座に特定し、トレーサビリティを確保するため","変更の回数を数えるため","カレンダーを埋めるため"],"h":"「新しいやり方」に変えてから不良が出た場合、どこからが対象かを判断する境界線になります。","c":1,"e":"変更反映日は、品質の「変化点」を追跡するための極めて重要なマイルストーンです。"},{"m":19,"q":"本研修のまとめとして、トレーサビリティシステムを何に例えていましたか？","o":["豪華な客船","「製品の系図」","秘密の地図","終わりなき旅"],"h":"「親（材料）」から「子（製品）」、そして「嫁ぎ先（顧客）」までの繋がりを示すものです。","c":1,"e":"家系図のように、製品のルーツと行き先が完全に繋がっている状態こそが、信頼できるトレーサビリティの姿です。"},{"m":20,"q":"PL法（製造物責任法）において、被害者が損害賠償を請求するために証明しなくてよいものはどれですか？","o":["損害が発生したこと","製品に欠陥があったこと","製造業者に「過失（不注意）」があったこと","欠陥と損害の間に因果関係があること"],"h":"PL法は、製造者の不注意を問わない「無過失責任（厳格責任）」主義を採用しています。","c":2,"e":"従来の民法と異なり、製造側に「うっかりミス（過失）」があったかどうかを証明しなくても、製品に「欠陥」があれば責任を問われるのがPL法の特徴です。"},{"m":20,"q":"PL法における「欠陥」の3分類のうち、取扱説明書の不備や警告ラベルの不足によって生じるものはどれですか？","o":["設計上の欠陥","製造上の欠陥","表示・警告上の欠陥","販売上の欠陥"],"h":"製品を安全に使うための「指示」や「注意書き」が足りないケースです。","c":2,"e":"製品自体の作りが良くても、使い方の注意が不適切で事故が起きれば、それは「表示・警告上の欠陥」とみなされます。"},{"m":20,"q":"EU（欧州連合）において、電気・電子機器に含まれる特定の有害物質の使用を制限する指令は何ですか？","o":["PL法","ISO 9001","RoHS指令","エコマーク"],"h":"有害物質（Hazardous Substances）の制限（Restriction）に関する規則です。","c":2,"e":"RoHS指令は、カドミウムや鉛、水銀などの指定物質が、基準値を超えて製品に含まれることを禁じています。"},{"m":20,"q":"RoHS指令とREACH規則の主な違いについて、正しい説明はどれですか？","o":["RoHSは電気電子業界、REACHはほぼ全産業が対象となる","RoHSは含有量（重さ）、REACHは含有の有無だけを問う","RoHSは日本の法律、REACHは欧州の法律である","両者に違いはない"],"h":"RoHSは「特定業界の特定物質」、REACHは「全産業の化学物質リスク管理」という広がりを持っています。","c":0,"e":"RoHSは対象製品が決まっていますが、REACHは化学物質そのものを網羅的に管理する、より広範な規則です。"},{"m":20,"q":"自動車業界特有の環境規制で、使用済み自動車の再資源化や有害物質制限を定めた指令を何と呼びますか？","o":["RoHS","REACH","ELV指令","ISO 14001"],"h":"End-of-Life Vehicles（使用済み車両）の略称です。","c":2,"e":"ELV指令は、自動車の設計段階からリサイクルしやすさや、鉛・水銀などの不使用を求めています。"},{"m":20,"q":"QMS（品質マネジメントシステム）において、法規制対応として管理すべき対象は製品そのもの以外に何が含まれますか？","o":["社員の昼食","製造工程で使用する油脂類や洗浄剤などの「副資材」","事務所の観葉植物","近隣の看板の色"],"h":"製品に直接組み込まれなくても、製造過程で触れるものすべてが対象となり得ます。","c":1,"e":"洗浄剤などの副資材に規制物質が含まれていれば、それが製品に付着して残留するリスクがあるため、QMSでの管理が不可欠です。"},{"m":20,"q":"サプライヤーから届いた部品にRoHS違反が見つかった際、影響範囲を特定するために最も重要なQMSの仕組みは何ですか？","o":["整理整頓","トレーサビリティ（追跡可能性）","5S活動","接客マナー"],"h":"「その部品が、どのロットの製品に使われたか」を遡れる仕組みです。","c":1,"e":"トレーサビリティがあれば、違反部品が混入した製品だけをピンポイントで特定し、迅速に回収（封じ込め）できます。"},{"m":20,"q":"法規制への適合を確実にするため、購買部門がサプライヤーから入手・維持すべき書類の代表例（化学物質の安全データシート）は何ですか？","o":["見積書","SDS（旧MSDS）","領収書","会社案内"],"h":"その材料に何が含まれているかを証明する技術資料です。","c":1,"e":"SDSなどを通じて成分を把握し、法規制に適合している証拠（エビデンス）をQMSの記録として保持することが求められます。"},{"m":20,"q":"自社が直接EUに輸出していなくても、納入先のメーカーがEUに輸出している場合、どのような対応が求められますか？","o":["何もしなくてよい","含有物質情報の調査回答や、法規制順守の保証","英語の勉強だけすればよい","輸出を差し止める"],"h":"サプライチェーンの一環として、川下のメーカーから情報の提供を要求されます。","c":1,"e":"グローバルな取引では、川上の部品メーカーであっても、最終製品が販売される地域の法規制に従うことが契約上の条件となります。"},{"m":20,"q":"本研修のまとめとして、法規遵守を「高層ビル」に例えた場合、どのような表現が使われていましたか？","o":["ビルの外壁の美しさ","ビルの耐震基準や防火基準（安全・環境基準）","ビルのエレベーターの速度","ビルの屋上の看板"],"h":"「見栄え」ではなく、社会的に存在が許されるための「根本的な基準」のイメージです。","c":1,"e":"いくら使いやすい製品でも、法的な安全・環境基準を満たしていなければ社会に受け入れられません。QMSはこの「見えない基準」を保証する仕組みです。"},{"m":21,"q":"ISO 9001における「リスク」の定義として、最も適切なものはどれですか？","o":["避けるべき絶対的な災い","不確実性の影響","担当者のミス","過去に起きた失敗"],"h":"良い影響（機会）も悪い影響（脅威）も含む、将来の「決まっていないこと」の影響です。","c":1,"e":"リスクとは目標に対する「不確実性の影響」を指し、これを事前に管理することで目標達成の確実性を高めます。"},{"m":21,"q":"リスクアセスメントを実施する最大の目的は何ですか？","o":["誰が責任を取るか決めるため","QMSが意図したアウトプットを出し、顧客満足を確実にするため","書類の枚数を増やして監査をパスするため","予算を削減するため"],"h":"「後で困らないように、先に手を打つ」という品質保証の本質を考えてください。","c":1,"e":"不適合が発生してから慌てるのではなく、事前にリスクを特定し対策を講じることで、製品の適合性を保証します。"},{"m":21,"q":"設計や工程の潜在的な故障を予測・評価するために用いられる、自動車産業などで必須のツールは何ですか？","o":["損益計算書","FMEA（故障モード影響解析）","組織図","議事録"],"h":"「故障モード（Failure Mode）」を分析する手法の略称です。","c":1,"e":"FMEAは、製品やプロセスに潜む弱点を「故障モード」として洗い出し、そのリスクを定量的に評価する強力なツールです。"},{"m":21,"q":"FMEAを実施する適切なタイミングはいつですか？","o":["不良品が出てから","設計・開発の初期段階（量産開始前）","1年ごとの定期点検時","暇なとき"],"h":"「予防」のためのツールなので、実物が作られる前に行う必要があります。","c":1,"e":"FMEAは「潜在的」な故障を対象とするため、必ず事前に行い、量産前にリスクを低減させておくことが原則です。"},{"m":21,"q":"FMEAにおいて、リスクの優先順位を決める指標である「RPN（リスク優先数）」の計算式は何ですか？","o":["影響度（S） ＋ 発生度（O） ＋ 検出度（D）","影響度（S） × 発生度（O） × 検出度（D）","発生度（O） ÷ 検出度（D）","影響度（S） × 100"],"h":"「厳しさ」「頻度」「見つけやすさ」の3要素を掛け合わせます。","c":1,"e":"3つの要素の積でリスクを数値化しますが、自動車業界では特に「S（厳しさ）」が高いものを最優先します。"},{"m":21,"q":"RPNの値が低かったとしても、最優先で対策を検討すべきなのはどのような故障モードですか？","o":["検出度（D）が低いもの","影響度（S：厳しさ）が極めて高いもの（安全や法規制に関わるもの）","発生度（O）が中くらいのもの","過去に一度も起きたことがないもの"],"h":"「めったに起きないが、起きたら大惨事になる」リスクをどう扱うべきか考えてください。","c":1,"e":"安全や法規制に直結する重大な影響（S=9, 10など）は、他の数値に関わらず徹底的に予防策を講じます。"},{"m":21,"q":"リスク分析の結果に基づき、製造工程で「ミスが発生しても不良を作らない、あるいは流さない仕組み」を導入することを何と呼びますか？","o":["抜き取り検査","ポカヨケ（エラー防止）","精神論","厳重注意"],"h":"人の注意力に頼らず、システム側でエラーを拒絶する設計です。","c":1,"e":"ポカヨケを導入することで、ヒューマンエラーに起因する品質リスクを物理的・システム的に低減できます。"},{"m":21,"q":"設計変更や工程変更（4M変更）があった際、FMEAはどのように扱うべきですか？","o":["一度作ったら変えない","変更の影響を再評価し、最新の内容に更新する","捨てる","変更が終わった後に新しく作る"],"h":"FMEAはプロセスの「今」を映す「生きた文書（リビングドキュメント）」です。","c":1,"e":"変更によって新たな故障モードが生じていないか、リスクの度合いが変わっていないかを常に最新化する必要があります。"},{"m":21,"q":"FMEAで特定されたリスク対策（監視方法など）を、現場の具体的な管理手順として反映させるべき文書は何ですか？","o":["会社案内","コントロールプラン（CP）","労働契約書","決算報告書"],"h":"「何を、いつ、どうやってチェックするか」をまとめた計画書です。","c":1,"e":"FMEAでのリスク評価がコントロールプランに反映されることで、初めて現場での「予防の仕組み」が実効性を持ちます。"},{"m":21,"q":"本研修のまとめとして、品質リスクアセスメントを何に例えていましたか？","o":["宝探し","「隠された時限爆弾を見つけ出し、無力化する活動」","庭の草むしり","終わりなき旅"],"h":"「見えない危険（故障モード）」を透視して、爆発（不適合）の前に導火線を切るイメージです。","c":1,"e":"潜在的な問題を事前に可視化（FMEA）し、原因を断つ（ポカヨケ・恒久対策）ことで、システムの安全を保証します。"},{"m":22,"q":"品質マネジメントシステム（QMS）において、品質コストを管理する最大の目的は何ですか？","o":["従業員の給料を減らすため","品質不良による損失（失敗コスト）を低減し、組織の利益向上に繋げるため","経理部門の仕事を増やすため","検査機器をすべて最新にするため"],"h":"「ムダな出費」を減らし、その分を「予防」に回して全体を最適化する考え方です。","c":1,"e":"品質コストの可視化は、どこに問題が潜んでいるかを金額で示し、経営層が適切な改善指示（Action）を出すための材料となります。"},{"m":22,"q":"不適合（不良）を未然に防ぐために、設計や計画の段階で先行投資する費用を何と呼びますか？","o":["失敗コスト","評価コスト","予防コスト (P)","交際費"],"h":"FMEAの実施や品質教育など、「悪くなる前に手を打つ」ためのコストです。","c":2,"e":"予防コストを適切にかけることで、後の工程で発生する莫大な失敗コストを抑えることができます。"},{"m":22,"q":"製品が要求事項に適合しているかを確認するための、検査や測定、校正にかかる費用は何に分類されますか？","o":["予防コスト","評価コスト (A)","失敗コスト","宣伝広告費"],"h":"PDCAの「C（チェック）」に相当する、健康診断のようなコストです。","c":1,"e":"受入検査や最終検査、内部監査などの「確かめる活動」にかかる費用が評価コストです。"},{"m":22,"q":"製品が顧客に届く「前」に社内で発見された、手直しや廃棄にかかる費用を何と呼びますか？","o":["内部失敗コスト","外部失敗コスト","予防コスト","評価コスト"],"h":"社外に出る前に食い止めたものの、発生してしまった「ムダ」な費用です。","c":0,"e":"スクラップ（廃棄）や再加工の労務費などがこれに該当し、現場の「直行率」と密接に関係します。"},{"m":22,"q":"市場に出た後に発覚したクレーム対応、修理、リコールなどにかかる費用を何と呼びますか？","o":["内部失敗コスト","外部失敗コスト","評価コスト","設備投資"],"h":"企業の信頼を揺るがし、最も高額になりやすい「最悪のコスト」です。","c":1,"e":"外部失敗コストは、金銭的な損失だけでなくブランドイメージの低下という目に見えない損失も伴います。"},{"m":22,"q":"マネジメントレビューにおいて、定期的な報告と評価が厳格に要求されているコスト指標はどれですか？","o":["予防コストの総額","評価コストの内訳","品質失敗コスト（不良品質コスト）","文房具の購入費用"],"h":"「どれだけ損をしたか」は、経営判断において最も重要な情報の一つです。","c":2,"e":"失敗コストのトレンドを把握することで、経営層は是正処置の優先順位やリソース配分を決定します。"},{"m":22,"q":"失敗コストを分析する際、特定の製品や特定の設備に原因を絞り込むために行う活動を何と呼びますか？","o":["統合","データの層別（そうべつ）","データの削除","隠蔽"],"h":"「4M（人・設備・材料・方法）」などの切り口で細かく分けて見る手法です。","c":1,"e":"層別を行うことで、「Aラインの夜勤帯に失敗コストが集中している」といった具体的な改善の糸口が見つかります。"},{"m":22,"q":"大量の品質コストデータをクロス集計し、要因との関係を迅速に可視化するのに便利なデジタルツールは何ですか？","o":["電卓","ピボットテーブル","メモ帳","検索エンジン"],"h":"Excelなどで、行や列を入れ替えて多角的に分析できる機能です。","c":1,"e":"ピボットテーブルを使えば、「製品×不良原因×コスト」といった複雑な関係を瞬時に集計・可視化できます。"},{"m":22,"q":"具体的な改善アクションとして、作業者のミスを物理的に防ぐ「ポカヨケ」を導入した場合、その費用はどのコストに分類されますか？","o":["失敗コスト","評価コスト","予防コスト","営業外費用"],"h":"「二度と同じ失敗を起こさないための投資」と捉えてください。","c":2,"e":"是正処置として導入されるポカヨケやプロセスの改善費用は、将来の失敗を防ぐための「予防コスト」に積み上げられます。"},{"m":22,"q":"本研修のまとめとして、品質コスト管理を「健康」に例えた場合、失敗コスト（病気による損失）を避けるために最も重要とされているのはどれですか？","o":["病気になってから高い薬を買うこと","日々の運動や食事管理（予防コストへの投資）","毎日体重を測るだけ（評価コストのみ）","何もしないこと"],"h":"「源流」で対策を打つことが、最も安上がりで効果的であるという例えです。","c":1,"e":"予防に適切にリソースを割くことが、結果として全体の品質コストを最小化し、健全なQMSを維持する唯一の道です。"},{"m":23,"q":"「フールプルーフ」の設計思想として、最も適切な説明はどれですか？","o":["故障しても動き続けるようにすること","間違った操作をしようとしても、物理的・システム的に「できない」ようにすること","作業員に気合を入れさせること","壊れた後に修理しやすくすること"],"h":"「Fool（不慣れな人）」でも「Proof（防ぐ）」、つまり間違えようがない仕組みのことです。","c":1,"e":"「そもそもエラーを発生させない」のがフールプルーフの基本です。形状を工夫して逆差しできないコネクタなどが代表例です。"},{"m":23,"q":"「フェールセーフ」の設計思想として、最も適切な説明はどれですか？","o":["絶対に故障しない機械を作ること","万が一故障や異常が起きた際、必ず「安全な状態」で止まるようにすること","2人体制でチェックすること","故障を隠すこと"],"h":"ヒントはありません","c":0,"e":"信号機が故障した際に全方向を「赤」にする、ストーブが転倒したら自動で消火するといった、被害を最小限にする設計です。"},{"m":23,"q":"フールプルーフの代表的な手法である「ポカヨケ」の目的は何ですか？","o":["検査を自動化すること","人の注意力や力量に頼らず、仕組みで不良の発生や流出を防ぐこと","作業スピードを2倍にすること","報告書を減らすこと"],"h":"「うっかり（ポカ）」を「避ける（ヨケ）」ための仕組みです。","c":1,"e":"ポカヨケは源流管理の視点に立ち、ヒューマンエラーが製品の欠陥に繋がるルートを物理的に遮断します。"},{"m":23,"q":"「良品は青、不良品は赤」のように、色で直感的に判断させる管理手法を何と呼びますか？","o":["隠蔽管理","色による識別管理（見える化）","感情管理","匿名管理"],"h":"「読んで考える」ステップを飛ばし、視覚で即座に判断できるようにします。","c":1,"e":"色による識別は、判断のバラツキを抑え、誤品送致などのミスを劇的に減らすフールプルーフの一種です。"},{"m":23,"q":"高圧機器において、圧力が一定以上になると作動して爆発を防ぐ「安全弁」は、どちらの設計思想に近いですか？","o":["フールプルーフ","フェールセーフ","5S","ジャストインタイム"],"h":"「異常（高圧）」が起きた後に、破滅的な事態（爆発）を避ける仕組みです。","c":1,"e":"異常事態においてシステムを安全側に逃がす設計であるため、フェールセーフに該当します。"},{"m":23,"q":"異常が発生しても、バックアップシステムに切り替えて運転を継続できる設計を何と呼びますか？","o":["フォールトトレラント（耐故障性）","シングルポイントフェイラ","早期退職","返品受付"],"h":"「Fault（故障）」を「Tolerant（許容・耐久）」する、多重化（冗長性）の考え方です。","c":0,"e":"飛行機のエンジンが複数あるように、一部が壊れても機能を維持し続ける高度な安全設計です。"},{"m":23,"q":"「部品Aを入れないと部品Bがはまらない」という治具の設計は、フールプルーフのどの原則に基づいていますか？","o":["手順の強制（物理的制限）","精神的な警告","抜き取り検査","運任せ"],"h":"「正しい手順でしか作業が進まない」ように拘束しています。","c":0,"e":"物理的な形状の不一致を利用して、組み付け忘れや順序ミスを不可能にします。"},{"m":23,"q":"ポカヨケなどの新しい管理手段を導入した際、リスク低減効果を反映させるために更新すべきQMS文書は何ですか？","o":["会社案内","FMEA（故障モード影響解析）やコントロールプラン（CP）","社内報","昨日の日報"],"h":"リスクを予測し、管理方法を定めた「品質の設計図」です。","c":1,"e":"対策を講じた結果、検出度（D）がどう改善されたかをFMEAに記録し、標準として定着させます。"},{"m":23,"q":"PL法（製造物責任法）対策として、特に「表示・警告上の欠陥」を防ぐために重要なのはどれですか？","o":["掃除をすること","取扱説明書や警告ラベルで正しい情報を提供し、フェールセーフ設計を盛り込むこと","利益を上げること","広告を増やすこと"],"h":"ユーザーが誤った使い方をしても安全を守る、あるいは警告する仕組みです。","c":1,"e":"「うっかりミス」で怪我をさせない設計（フールプルーフ）と、壊れたら安全に止まる設計（フェールセーフ）の両方がPL防衛には不可欠です。"},{"m":23,"q":"本研修のまとめとして、これらの設計を「安全運転支援システム」に例えた場合、フールプルーフは何に相当しますか？","o":["エアバッグの作動","キーを差し込まないとギアが入らない仕組み（誤操作防止）","事故後のレッカー移動","ガソリンスタンドの検索"],"h":"「そもそも間違った操作をさせない」入り口の部分の対策です。","c":1,"e":"入り口でミスを止めるのがフールプルーフ、起きてしまった後に最悪を避けるのがフェールセーフです。"},{"m":24,"q":"親企業（顧客）がサプライヤーに対して行う「外部提供者の管理（監査など）」の本来の目的は何ですか？","o":["下請けいじめをするため","最終製品に組み込まれる部品やプロセスのリスクを管理し、顧客満足と安全を保証するため","責任をすべて下請けに押し付けるため","契約金額を下げる口実にするため"],"h":"サプライチェーンの一箇所で起きた不具合が、ブランド全体を揺るがすリスクを考えてください。","c":1,"e":"部品一つの不備がリコールに直結するため、顧客はサプライヤーのQMSが有効に機能しているかを「外部提供者の管理」として検証します。"},{"m":24,"q":"下請け側が自社のサプライヤー（Tier 2以下）を管理する際、どのような視点が必要ですか？","o":["安ければ管理しなくてよい","自分の顧客（Tier 1）が求める品質要求を、さらにその先の供給元へも波及させ、連鎖的にリスクを管理する","相手の自主性に任せる","契約書さえあれば中身は見なくてよい"],"h":"「預かっている図面や要求事項」を、材料メーカーなどに正しく伝えているかが鍵です。","c":1,"e":"品質保証はリレーのようなものです。自社が受けた厳しい要求事項を、自社の外注先にも適切に管理・要求する責任があります。"},{"m":24,"q":"自動車産業などで、設計や製造プロセスの「潜在的な故障」を事前に予測し、予防するために使われるツールは何ですか？","o":["決算書","FMEA（故障モード影響解析）","組織図","議事録"],"h":"「不良が出てから直す」のではなく「出る前に予測する」ための設計図です。","c":1,"e":"FMEA（DFMEA/PFMEA）を徹底することで、不具合の発生を源流で食い止める「予防コスト」重視の経営が可能になります。"},{"m":24,"q":"顧客から指定される、安全や法規制に関わる特に重要な管理項目を何と呼びますか？","o":["努力目標","特殊特性（SC: Special Characteristics）","自由課題","参考記録"],"h":"万が一ここを外すと「リコール」に直結するような、最重要の特性です。","c":1,"e":"特殊特性は、図面に専用の記号で示されることが多く、FMEAやコントロールプラン（CP）で重点的に管理されなければなりません。"},{"m":24,"q":"自社内で製造工程（4M：人、設備、材料、方法）を変更する際、下請け側が守るべき鉄則は何ですか？","o":["黙って変更し、バレなければ良い","あらゆる変更を事前にレビューし、必要に応じて顧客の承認を得る","忙しい時は事後報告にする","担当者の判断だけで進める"],"h":"勝手な変更（サイレントチェンジ）は、品質保証の信頼を根本から破壊します。","c":1,"e":"変更は不具合の最大の原因です。FMEAやCPを更新し、顧客との合意（PPAP等）を経て実施するのがルールです。"},{"m":24,"q":"変更管理において、不具合発生時の調査のために必ず記録として維持すべき項目は何ですか？","o":["その日の昼食","変更反映日（実施日）","事務所の室温","担当者の趣味"],"h":"「どの製品から新しい材料や方法に切り替わったか」を特定するための日付です。","c":1,"e":"変更反映日が明確であれば、万が一の際に影響範囲を最小限に絞り込む（封じ込める）ことができます。"},{"m":24,"q":"顧客に対し、自社のプロセスが安定して要求事項を満たせることを証明し、承認を得るための手続きを何と呼びますか？","o":["PPAP（生産部品承認プロセス）","会社案内","年賀状","領収書"],"h":"自動車業界などで標準的な、非常に厳格な承認手続きの略称です。","c":0,"e":"PPAPでは、テスト結果やFMEAなどのエビデンス（証拠）を提出し、顧客から「量産して良い」というお墨付きをもらいます。"},{"m":24,"q":"不具合が発生した際、「なぜなぜ問答」を繰り返して突き止めるべき真の原因は何ですか？","o":["運が悪かったこと","作業員のうっかりミスを許した「システムや仕組み（ルール、教育、設備など）の欠陥」","相手の要求が厳しすぎたこと","誰が一番悪いかという犯人"],"h":"「人」を責めるのではなく「仕組み」を直すのがQMSの改善です。","c":1,"e":"表面的なミスではなく、そのミスを物理的に防げなかった「ポカヨケの欠如」や「教育の不備」を直すことが再発防止になります。"},{"m":24,"q":"大量の現場データを分析し、問題の所在（どの設備、どの時期など）を迅速に特定するのに便利なデジタルツールは何ですか？","o":["ピボットテーブル","電卓","メモ帳","検索エンジン"],"h":"Excelなどで、データを多角的にクロス集計できる機能です。","c":0,"e":"ピボットテーブルを活用して「層別」を行うことで、漠然としたデータから「真の要因」を浮き彫りにできます。"},{"m":24,"q":"本研修のまとめとして、下請け側の品質経営を何に例えていましたか？","o":["豪華なディナー","「顧客の信頼という城を守る要塞の継続的な強化」","終わりなきマラソン","秘密の地図"],"h":"「外壁（適合性）」を厚くし、「設計図（記録）」を更新し続けるイメージです。","c":1,"e":"顧客要求への対応を通じて自社の要塞（QMS）を強化し続けることが、結果として企業の生存と競争力を守ることに繋がります。"},{"m":25,"q":"品質管理の教育において、最も優先して排除すべき対象は何ですか？","o":["作業スピードの向上","作業の結果や手順の「ばらつき」","休憩時間","既存の古い設備"],"h":"「人によって、日によってデキが違う」という状態が品質事故の元になります。","c":1,"e":"誰がやっても同じ時間で、同じ良い品質の製品を作れるように「標準」を徹底することが教育の根幹です。"},{"m":25,"q":"良いマニュアルの三要素として、「体系的な理解」と「正確な再現」ができることを何と呼びますか？","o":["娯楽性","再現性","匿名性","意外性"],"h":"「マニュアルを読めば、その通りに仕事ができる」という性質のことです。","c":1,"e":"再現性のないマニュアルは標準として機能しません。誰が読んでも同じ結果が出せる手順を示す必要があります。"},{"m":25,"q":"初心者が上司や先輩の築いた「型（標準）」を読み込み、忠実に実行する段階を、芸道の言葉で何と呼びますか？","o":["守（しゅ）","破（は）","離（り）","技（ぎ）"],"h":"「守・破・離」の最初のステップで、型を守る段階です。","c":0,"e":"まずは標準を愚直に守る「守」から入り、その後に改善（破）や独自の工夫（離）へと進むのが人材育成の王道です。"},{"m":25,"q":"新人に対して専門用語を多用せず、レベルに合わせて教育内容を整理することを何と呼びますか？","o":["複雑化","階段化","隠蔽","放置"],"h":"一歩ずつ、無理なく理解の階段を登らせるイメージです。","c":1,"e":"相手の力量（スキル）に合わせた「階段化」を行うことで、教育の脱落や誤解を防ぎます。"},{"m":25,"q":"内部監査員を任命する際、QMSの有効性を正しく検証するために不可欠な条件は何ですか？","o":["最も若い社員であること","客観性と公平性が確保され、だれにでも遠慮なく監査ができる立場であること","毎日残業していること","監査の時間を10分以内にすること"],"h":"上司に対しても、ダメなものはダメと言える環境が必要です。","c":1,"e":"内部監査には独立性が求められます。忖度（そんたく）なしに事実を指摘できる体制がQMSの自浄作用を守ります。"},{"m":25,"q":"標準作業の伝達において、ビデオや写真（視覚情報）を活用する最大のメリットは何ですか？","o":["文字を読む手間が省けるから","業務の実態がイメージしやすくなり、イラストよりも有用だから","映画のように楽しめるから","報告書の枚数を減らせるから"],"h":"「百聞は一見に如かず」の通り、実際の動きをそのまま見せることができます。","c":1,"e":"特に複雑な動きや現場の状況を伝えるには、文字よりも写真や動画の方が圧倒的に情報量が多く、誤解が少なくなります。"},{"m":25,"q":"ビデオ標準を作成する際、動作の再現だけでなく、新人が「応用」を利かせられるようにするために補足すべき情報は何ですか？","o":["撮影者の名前","作業の「意図」や「判断の根拠（なぜそうするのか）」","その日の天気","使用したカメラの機種名"],"h":"「形」だけを真似るのではなく、「意味」を理解させることが重要です。","c":1,"e":"「なぜこの角度で持つのか」といった意図が伝わらなければ、状況が変わった際に対応できない「マニュアル人間」になってしまいます。"},{"m":25,"q":"熟練者の「勘と経験」など、言葉で説明しづらい知識を何と呼びますか？","o":["形式知","暗黙知","公知","既知"],"h":"本人の頭の中にあり、外からは見えにくい知識のことです。","c":1,"e":"この「暗黙知」をビデオや言語化によって「形式知」に変えることが、技能承継の核心です。"},{"m":25,"q":"大量の不良データなどをクロス集計し、特定の要因（4M）との関係を迅速に可視化するために有効なツールは何ですか？","o":["電卓","ピボットテーブル","習字","検索エンジン"],"h":"Excelなどで、データを多角的に分析できる機能です。","c":1,"e":"ピボットテーブルを使いこなすことで、「どの設備の、どの作業者の時に不良が出るか」という真の原因を素早く特定できます。"},{"m":25,"q":"本研修のまとめとして、品質人材育成を「川の流れ」に例えた場合、ビデオ標準は何に相当しますか？","o":["川を流れる水そのもの","流れを分かりやすく見せる「透明な水路」","川岸に咲く花","川の深さ"],"h":"情報を正確に、かつ視覚的に分かりやすく伝えるための構造物のイメージです。","c":1,"e":"ビデオ標準という「透明な水路」は非常に分かりやすいですが、それを維持管理する人（品質人材）の「知恵（意図の理解）」があって初めて機能します。"},{"m":26,"q":"A3報告書の最大の目的は何ですか？","o":["大量の文字を書いて上司を圧倒するため","問題解決のPDCAサイクルを可視化し、組織で共有・標準化するため","報告書の枚数を競うため","過去の失敗をきれいに隠すため"],"h":"「一枚を見れば、問題の背景から再発防止策までが論理的にわかる」状態を目指します。","c":1,"e":"A3という限られたスペースに情報を凝縮することで、論理の矛盾をなくし、誰でも改善のプロセスを追体験できるようにします。"},{"m":26,"q":"問題解決の最初のステップで、データを「人・設備・材料・方法」などの切り口で分けて、異常の所在を絞り込む手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","放置"],"h":"「4M」ごとにデータを切り分けることで、真の原因が見えてきます。","c":1,"e":"「全体で不良が多い」ではなく「A機械の夜勤帯に集中している」と層別することで、攻めるべきポイントが明確になります。"},{"m":26,"q":"原因解析のセクションで、結果（特性）に対してどのような要因が関係しているかを魚の骨のような図で整理する手法は何ですか？","o":["パレート図","特性要因図（石川ダイヤグラム）","ヒストグラム","散布図"],"h":"漏れなくダブりなく要因を洗い出すための代表的なQCツールです。","c":1,"e":"頭の中にある要因を書き出すことで、チーム全員で「真犯人はどこか」を議論する土台が整います。"},{"m":26,"q":"真因追究において、「砂糖の溶け残り」という仮説が浮上した際、A3報告書に記載すべき最も重要な活動は何ですか？","o":["担当者の勘を信じる","実験や調査による「検証（データの裏付け）」","全員で合唱する","対策を後回しにする"],"h":"「だろう」ではなく「事実」で語るのがQCストーリーの鉄則です。","c":1,"e":"仮説を立てるだけでなく、実際に実験して「確かにこれが原因だ」と証明して初めて、対策に進むことができます。"},{"m":26,"q":"不適合が発見された直後に、被害の拡大を防ぐために行う一時的な処置を何と呼びますか？","o":["恒久対策","応急処置（暫定処置・封じ込め）","予防処置","根本解決"],"h":"「今ある火を消す」ための初動対応のことです。","c":1,"e":"応急処置は火消しですが、A3報告書の本質はその後の「火の元を断つ」恒久対策にあります。"},{"m":26,"q":"A3報告書における「是正処置（恒久対策）」の定義として正しいものはどれですか？","o":["壊れたものを直すこと","原因を除去し、二度と同じ問題が発生しないようにすること","担当者に厳重注意すること","予備の在庫を増やすこと"],"h":"「再発防止」こそが是正処置の魂です。","c":1,"e":"個人の注意に頼るのではなく、仕組みを直すことで、誰がやっても再発しない状態を作ります。"},{"m":26,"q":"恒久対策として、人の不注意があっても不良を作らせない、あるいは流さない仕組みを導入することを何と呼びますか？","o":["抜き取り検査","ポカヨケ（エラー防止）","精神論","秘密保持"],"h":"「うっかり（ポカ）」を「避ける（ヨケ）」ための物理的・システム的なガードです。","c":1,"e":"ポカヨケを導入し、それをA3報告書で示すことは、対策の信頼性を最も高く証明する手段の一つです。"},{"m":26,"q":"是正処置によって設備や作業方法が変わった場合、必ず更新しなければならない「生きた文書」の代表例は何ですか？","o":["会社案内","FMEA（故障モード影響解析）やコントロールプラン（CP）","社内報","昨日の日報"],"h":"リスクを予測し、管理基準を定めた「品質の設計図」です。","c":1,"e":"改善の結果をこれらの重要文書に反映させることで、新しい「標準」として組織に定着します。"},{"m":26,"q":"大量の品質データから「特定の要因」の影響を素早く見つけ出すために有効なExcel等のデジタルツールは何ですか？","o":["文字のフォント変更","ピボットテーブル","印刷プレビュー","セルの色付け"],"h":"行と列を自由に入れ替えて、多角的に集計できる機能です。","c":1,"e":"ピボットテーブルを使えば、膨大なデータから「真犯人が潜んでいる場所」を数秒で特定できます。"},{"m":26,"q":"本研修のまとめとして、A3報告書を何に例えていましたか？","o":["豪華なディナーのメニュー","「探偵がまとめる事件解決報告書」","終わりなき旅の地図","秘密の暗号"],"h":"証拠（データ）を集め、真犯人（真因）を特定し、セキュリティ（標準）を強化するイメージです。","c":1,"e":"データという証拠に基づき、論理的に問題を解決し、組織をより安全な状態へ導く。これがA3報告書の真髄です。"},{"m":27,"q":"品質管理（QC）における「事実に基づく意思決定」のために、最も不可欠なものは何ですか？","o":["担当者の勘","過去の慣習","客観的なデータ","声の大きさ"],"h":"「起きたこと」を数字や記録として捉え、客観的に判断する姿勢です。","c":2,"e":"現場で起きている「ばらつき」を正しく把握するためには、主観を排したデータによる分析がスタート地点となります。"},{"m":27,"q":"データの全体像（分布やばらつき）をひと目で把握するために、発生頻度を棒グラフ状に表した図を何と呼びますか？","o":["管理図","ヒストグラム","組織図","散布図"],"h":"データの「散らばり具合」を見るためのQC七つ道具の一つです。","c":1,"e":"ヒストグラムを作成することで、平均値だけでなく、規格外れ（不良）がどの程度発生しそうかの分布を視覚的に理解できます。"},{"m":27,"q":"大量のデータを「AさんとBさん」「機械Xと機械Y」のように、特定のグループに分けて比較する手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","隠蔽"],"h":"「4M」などの切り口でデータを切り分けることで、真の原因が見えてきます。","c":1,"e":"層別は問題解決の鉄則です。ピボットテーブルはこの層別を瞬時に、かつ多角的に行うための最適なツールです。"},{"m":27,"q":"品質分析において、層別の切り口として一般的に使われる「4M」とは何を指しますか？","o":["金・時間・場所・道具","人・設備・材料・方法","営業・企画・製造・検査","速度・感度・鮮度・精度"],"h":"Man, Machine, Material, Method の頭文字です。","c":1,"e":"不適合の原因は、この4つの要素のいずれか（または組み合わせ）に潜んでいることがほとんどです。"},{"m":27,"q":"ピボットテーブルを作成する際、最も注意すべき「元データ（生データ）」の条件は何ですか？","o":["文字の色がきれいであること","1行1データ（リスト形式）であり、空白行や不要な結合セルがないこと","印刷範囲が設定されていること","グラフが既に作成されていること"],"h":"「ゴミを入れればゴミが出てくる（GIGO）」の原則です。データの「質」が重要です。","c":1,"e":"ピボットテーブルは元データの構造に依存します。正しく集計するためには、整理されたデータベース形式の表が必要です。"},{"m":27,"q":"ピボットテーブルの「行」フィールドにある「＋」ボタンをクリックして、より詳細な項目を表示させる操作を何と呼びますか？","o":["シャットダウン","ドリルダウン（深掘り）","アップロード","バックアップ"],"h":"「全体」から「詳細」へと、地層を掘り進むようなイメージの用語です。","c":1,"e":"例えば「ライン名」の階層を展開して「設備コード」を表示させることで、問題の所在を具体的に特定できます。"},{"m":27,"q":"具体的な事例において、不良コストの主要因を特定するために「製品名」や「不良事象」を並べて分析する際、参考にすべき法則は何ですか？","o":["ニュートンの法則","パレートの法則（80:20の法則）","ムーアの法則","黄金比"],"h":"「全体の問題の8割は、わずか2割の要因から生じている」という考え方です。","c":1,"e":"パレート分析を行うことで、数ある不良の中から「まずどれを叩くべきか」という優先順位が明確になります。"},{"m":27,"q":"ピボットテーブル分析で「特定の旧式治工具（Method）」が不良の原因だと分かった場合、次にとるべきQMS上のアクションは何ですか？","o":["担当者を叱る","治工具の改善（ポカヨケ化）を行い、FMEAやコントロールプラン（CP）を更新する","データを消去する","検査回数を増やすだけで済ませる"],"h":"「人」の不注意を責めるのではなく、「仕組み」を変えて標準化します。","c":1,"e":"特定された真因を排除し、その対策をQMSの公式文書（生きた文書）に反映させることで、再発防止を確実にします。"},{"m":27,"q":"大量の現場データをピボットテーブルで分析する際、「従業員コード」や「設備コード」をフィールドに配置するメリットは何ですか？","o":["個人のプライバシーを調べるため","トレーサビリティ（追跡可能性）を活用して、特定の4M要素との相関を客観的に特定するため","画面を複雑にするため","計算を遅くするため"],"h":"「誰が、どの機械で」という事実をデジタルキーで紐付けます。","c":1,"e":"デジタル化されたコードをキーにすることで、膨大な記録の中から瞬時に「異常の偏り」を抽出できるようになります。"},{"m":27,"q":"本研修のまとめとして、ピボットテーブルによる分析を何に例えていましたか？","o":["豪華なディナーの準備","「現場を俯瞰する高性能なレーダーシステム」","終わりなき旅の地図","秘密の暗号解読"],"h":"ノイズの中から重要なターゲットを特定し、迅速に判断を下すための仕組みです。","c":1,"e":"バラバラのデータ（ノイズ）を整理し、真に解決すべき問題（ターゲット）を可視化する。それがピボットテーブルの真髄です。"},{"m":28,"q":"QMSにおいて、計測機器の校正を行う根本的な目的は何ですか？","o":["検査員の作業時間を記録するため","測定値が標準（国家標準等）に対して正しく、製品の規格適合性を科学的に実証できる状態を維持するため","機器をきれいに掃除するため","予算を使い切るため"],"h":"「その物差しは本当に1mmを1mmと測れているか？」を保証する活動です。","c":1,"e":"校正によって測定の信頼性を確保しなければ、その機器で出した「合格」という判定そのものの根拠が失われてしまいます。"},{"m":28,"q":"測定機器が校正要求事項に適合していない（校正外れ等）と判明した際、規格が要求している「最も重要な処置」は何ですか？","o":["機器をこっそり直す","その機器で「それまでに測定した結果」の妥当性を評価し、記録すること","担当者を配置転換すること","判定をすべて「不合格」に書き換えること"],"h":"「今まで測ってきたデータは本当に大丈夫だったのか？」を検証する必要があります。","c":1,"e":"不適合がいつから発生していたかを特定し、その期間の製品品質に影響がないかを遡って確認（遡及評価）することが不可欠です。"},{"m":28,"q":"校正不適合の影響を受けた製品を特定し、隔離や回収を行うために必要な仕組みを何と呼びますか？","o":["整理整頓","トレーサビリティ（追跡可能性）","5S活動","接客マナー"],"h":"「どの機器で、どのロットを測ったか」を紐付けて追いかける仕組みです。","c":1,"e":"トレーサビリティが機能していれば、特定の「校正外れ機器」を使用した製品ロットだけをピンポイントで特定し、被害を最小限に抑えられます。"},{"m":28,"q":"トレーサビリティにおいて、事故が生じた際の影響範囲を左右する「管理単位」のことを何と呼びますか？","o":["ユニット","ロット","パック","セット"],"h":"「同じ条件で作られた一団」のことです。","c":1,"e":"ロット形成が適切（例えば1日単位、あるいは材料投入ごと）であれば、回収や再検査の範囲をその単位に限定できます。"},{"m":28,"q":"不適合な計測機器が見つかった際、まず最初に行うべき「応急処置」は何ですか？","o":["機器の即時使用停止と識別・隔離","報告書の清書","新しい機器の購入","顧客への謝罪電話（状況確認前）"],"h":"これ以上、間違った測定値による判定を増やさないための処置です。","c":0,"e":"まずは被害を止めるために、疑わしい機器を現場から取り除き、誤って使用されないように隔離することが先決です。"},{"m":28,"q":"校正外れが判明した際、外部校正機関から「どれくらい数値がズレていたか」のデータ（校正結果）を得る必要があるのはなぜですか？","o":["報告書の厚みを増すため","ズレの量に基づき、過去の合格判定が覆るリスク（妥当性）を客観的に評価するため","修理代を安くするため","次回の校正の参考にするため"],"h":"「0.01mmのズレ」ならセーフでも、「1mmのズレ」ならアウトかもしれません。","c":1,"e":"「ズレの量」と「製品の許容誤差」を比較することで、過去の製品が実質的に合格範囲内であったかを科学的に判断します。"},{"m":28,"q":"トレーサビリティのロットサイズを「小さく」することのメリットは何ですか？","o":["管理コストが下がる","不具合発覚時の回収・廃棄範囲を狭めることができ、損害を最小化できる","事務作業が減る","倉庫が広くなる"],"h":"細かく分ければ分けるほど、捨てる範囲は少なくなります。","c":1,"e":"リスク管理の観点からは小ロットの方が有利ですが、手間やコストとのバランスを考えて設計する必要があります。"},{"m":28,"q":"自動車部品の「特殊特性（SC）」に関わる測定で校正不適合が起きた場合、どのような対応が求められますか？","o":["影響度が高い（安全に関わる）ため、特に厳格な遡及調査と、影響製品すべてに対する適切な処置を行う","記録だけ残して放置する","担当者の記憶を頼りに判断する","特殊特性の指定を解除する"],"h":"SCはリコールに直結する重要項目です。妥協は許されません。","c":0,"e":"安全や法規制に関わる特性については、リスクが極めて高いため、徹底的な封じ込めと再検査等の処置が必須となります。"},{"m":28,"q":"校正期限超過という「人によるチェック漏れ」を再発防止（是正処置）するための、ポカヨケ的な対策はどれですか？","o":["「次から注意しろ」と叱る","期限が近づくと自動でメール通知が来る電子システムの導入","標語を壁に貼る","担当者の人数を増やす"],"h":"「人の注意力」に頼らず、システムが勝手に教えてくれる仕組みです。","c":1,"e":"是正処置は「仕組み」を直すことです。自動通知などのIT活用は、人的ミスを物理的に排除する有効な手段です。"},{"m":28,"q":"本研修のまとめとして、校正とトレーサビリティを「医療」に例えた場合、トレーサビリティは何に相当しますか？","o":["診察代","患者の「カルテの記録（誰に、いつ、何を処置したか）」","病院の看板","医師の白衣"],"h":"「どの患者（製品）に、どの体温計（機器）を使ったか」を特定するための証拠です。","c":1,"e":"校正（体温計の正確さ）が疑わしくなった時、正確なカルテ（トレーサビリティ）があれば、どの患者を再検査すべきか即座に判明します。"},{"m":29,"q":"品質管理の究極の目標として、適切な考え方はどれですか？","o":["抜き取り検査の回数を増やすこと","検査員の視力を上げること","工程で品質をつくり込み、最終的に検査を不要にすること","不良品を隠す技術を磨くこと"],"h":"「検査」は付加価値を生まないコストである、という視点を持ってください。","c":2,"e":"品質は工程で作り込まれるべきものであり、プロセスが完璧であれば、後からチェックする「検査」という工程は本来不要になります。"},{"m":29,"q":"抜き取り検査が抱える「本質的な限界」とは何ですか？","o":["検査に時間がかかりすぎること","検査機器が非常に高価であること","部分的なデータに基づいて母集団（全体）を推定するため、見逃しのリスクがゼロにならないこと","担当者が飽きてしまうこと"],"h":"「全部を見ていない」ことから生じるリスクを考えてください。","c":2,"e":"抜き取り検査は統計的な推定に頼るため、合格したロットの中に不良品が混入している可能性（消費者危険）を完全には排除できません。"},{"m":29,"q":"製品が出来上がった後に不良がないか調べる「抜き取り検査」は、どのような監視に分類されますか？","o":["予防的品質監視","製造中の品質監視","事後的品質監視","予測的品質監視"],"h":"「事が起きた（作られた）後」にチェックする活動です。","c":2,"e":"事後的な監視に依存すると、不具合の発見が遅れ、手直しや廃棄といった「失敗コスト」を増大させる原因となります。"},{"m":29,"q":"協力会社（サプライヤー）からの納入品に対して「受入検査」を厳重に行い続けることの弊害は何ですか？","o":["協力会社との仲が良くなりすぎる","協力会社が「納入先で直してくれる」と甘え、自社の品質保証レベル向上を阻害する可能性がある","検査員の給料が上がりすぎる","部品が重くなる"],"h":"「誰が品質を保証すべきか」という責任の所在を考えてください。","c":1,"e":"本来、品質保証は供給側の責任です。受入検査を「最後の砦」にし続けるのではなく、供給側のプロセスを改善させることが本質的な解決です。"},{"m":29,"q":"QMS導入や改善活動において推奨される「小さく始めて、核をつかんで広げる」アプローチの利点は何ですか？","o":["予算を使い切らなくて済む","失敗のリスクを抑えつつ、成功体験を積み重ねて効果的な領域から着実に改善できる","誰にも気づかれずに作業できる","報告書を書かなくてよい"],"h":"最初から全工程を完璧にしようとすると、リソースが分散して共倒れになるリスクがあります。","c":1,"e":"リスクの高い特定の製品やサプライヤーにリソースを集中（フォーカス）させることで、短期間で目に見える成果を出しやすくなります。"},{"m":29,"q":"改善の「核（フォーカスすべき対象）」を特定するために不可欠な、データを特定の切り口で分ける手法を何と呼びますか？","o":["統合","層別（そうべつ）","削除","圧縮"],"h":"「4M（人・設備・材料・方法）」などの観点でデータを切り分ける手法です。","c":1,"e":"層別を行うことで、「全体的に悪い」のではなく「サプライヤーXの、部品Bだけが悪い」といった真のターゲットが浮き彫りになります。"},{"m":29,"q":"大量の品質データから特定の傾向（例：どのサプライヤーの不合格率が高いか）を迅速に抽出するのに最適なツールは何ですか？","o":["算盤（そろばん）","ピボットテーブル","検索エンジン","ワープロ"],"h":"Excelなどで、行や列を自由に入れ替えて集計できる強力な機能です。","c":1,"e":"ピボットテーブルを使えば、数千行のデータから「サプライヤー別・部品別」の不適合率を数秒で可視化できます。"},{"m":29,"q":"特定のサプライヤーXの部品Bに問題が集中していると判明した際、中級実務者がとるべき「予防的」なアクションは何ですか？","o":["検査員の人数を3倍にする","サプライヤーXの製造工程FMEAやコントロールプラン（CP）を共同でレビューし、プロセスの弱点を強化させる","即座に取引を停止する","黙って不良品を廃棄し続ける"],"h":"「検査」で防ぐのではなく、「作り方（プロセス）」を直させます。","c":1,"e":"不適合の原因となるプロセスを修正させ、ポカヨケ等の導入を促すことが、再発防止と検査コスト削減の近道です。"},{"m":29,"q":"品質データ分析において、ピボットテーブルの階層を展開して詳細な要因に深く掘り下げる操作を何と呼びますか？","o":["ドリルダウン","アップロード","シャットダウン","バックアップ"],"h":"ドリルで穴を掘るように、データの奥深くまで探索するイメージです。","c":0,"e":"ドリルダウンにより、大きな不良件数の内訳（どの設備か、どの作業者か等）を段階的に特定していくことができます。"},{"m":29,"q":"本研修のまとめとして、「小さく始める」改善を何に例えていましたか？","o":["豪華なディナーの準備","「問題の優先順位付けと、最も弱い鎖の徹底的な強化」","終わりなき旅","秘密の暗号解読"],"h":"サプライチェーン全体を一気に強くするのではなく、弱点をピンポイントで叩くイメージです。","c":1,"e":"データで特定した「最も弱い部分（核）」を一つずつ潰していくことで、組織全体の品質という鎖の強度は着実に向上します。"},{"m":30,"q":"測定機器が校正要求事項に適合していない（精度が狂っている、期限が切れている等）と判明した際、ISO規格が組織に求めている「最も重要な義務」は何ですか？","o":["機器を新品に買い替えること","その機器で「それまでに測定した結果」の妥当性を評価し、記録すること","担当者に始末書を書かせること","次回の校正費用を予算に組み込むこと"],"h":"「過去の判定が信じられるかどうか」を確かめる必要があります。","c":1,"e":"機器自体の修理よりも、その機器が過去に出した「合格」という判定の信頼性を再検証（妥当性評価）することが品質保証上の最優先事項です。"},{"m":30,"q":"校正外れが見つかった際、単に「不適合」とするだけでなく、具体的に「どれくらい数値がズレていたか」を特定することを何と呼びますか？","o":["誤差の隠蔽","悪さ加減の特定","機器の清掃","予算の確認"],"h":"「0.01mmのズレ」か「1mmのズレ」かによって、製品への影響（リスク）は劇的に変わります。","c":1,"e":"この「悪さ加減」がわからなければ、過去の製品が実質的に規格内であったのか、あるいは致命的な欠陥になっていたのかを論理的に判断できません。"},{"m":30,"q":"校正不適合の影響を受けた製品ロットを特定し、隔離や回収を行うために不可欠なQMSの仕組みは何ですか？","o":["5S活動","トレーサビリティ（追跡可能性）","提案制度","慶弔規定"],"h":"「どの機器で、どの製品を測ったか」を記録からたどる能力です。","c":1,"e":"トレーサビリティが機能していなければ、影響範囲を特定できず、最悪の場合は全製品を回収（リコール）対象にせざるを得なくなります。"},{"m":30,"q":"トレーサビリティにおいて、同じ材料、同じ日、同じ設備など「同一条件」でまとめられた製品の管理単位を何と呼びますか？","o":["ユニット","ロット","パック","ピース"],"h":"「この範囲までは同じ品質であるはずだ」と見なす塊のことです。","c":1,"e":"適切なロット形成が行われていれば、不具合が見つかった際の影響範囲をそのロット内に限定し、被害を最小限に抑えることができます。"},{"m":30,"q":"校正期限オーバーの機器が見つかった際の「ステップ1：応急処置」として、まず行うべきことは何ですか？","o":["誰にも言わずに使い続ける","直ちに使用を停止し、識別・隔離した上で、精度（悪さ加減）を検証する","顧客に全数回収を連絡する","機器を捨てる"],"h":"これ以上、不確かなデータによる判定を増やさないことが先決です。","c":1,"e":"まずは被害の拡大を止め、その機器が「どれだけ狂っていたか」という事実を確認するための調査（外部校正等）に回します。"},{"m":30,"q":"妥当性の評価において、校正外れの状態で測定された数値が「規格の許容限界付近（ギリギリ合格）」だった場合、どのような判断をすべきですか？","o":["合格だったので問題なしとする","機器の狂いを含めると不適合の可能性があるため、リスクありと判断し、適切な処置をとる","担当者の運が良かったと判断する","記録を書き換える"],"h":"「物差しが狂っていた」以上、ギリギリの数値は信頼できません。","c":1,"e":"計測の不確かさを考慮し、疑わしい製品については再検査や保留といった「安全側」の処置をとるのがQMSの基本です。"},{"m":30,"q":"測定機器の管理記録において、ロット番号や設備コード、測定者などを連携させておくべき最大の理由は何ですか？","o":["事務作業を増やすため","異常発覚時に、影響を受けた製品すべてを迅速に特定（ドリルダウン分析等）するため","会社のIT化をアピールするため","社員の名前を覚えるため"],"h":"膨大な生産記録の中から、「問題の機器を使った製品」を瞬時に見つけ出すためです。","c":1,"e":"デジタルキー（コード）で情報が繋がっていれば、ピボットテーブル等を用いて影響範囲を数秒で抽出でき、迅速な是正処置が可能になります。"},{"m":30,"q":"不適合な機器で測定された製品に対してとるべき「適切な処置」に含まれないものはどれですか？","o":["全数再検査","在庫の保留・隔離","顧客への通知（必要な場合）","記録の破棄"],"h":"「事実を隠すこと」はQMSにおいて最大の禁忌です。","c":3,"e":"不適合の記録、評価のプロセス、とった処置のすべてを「文書化された情報」として維持することが規格で求められています。"},{"m":30,"q":"再発防止策（恒久対策）を検討する際、「担当者が期限を忘れていた」という原因に対し、中級者が提案すべき対策はどれですか？","o":["「次は忘れるな」と厳重注意する","期限が近づくと自動通知される電子管理システム（ポカヨケ）を導入する","担当者の人数を増やす","カレンダーに大きく丸をつける"],"h":"「人の注意力」に頼るのではなく、「仕組み（システム）」で解決します。","c":1,"e":"ヒューマンエラーを前提とし、ミスが起き得ない、あるいはミスを自動検知する仕組みを導入することが、真の継続的改善です。"},{"m":30,"q":"本研修のまとめとして、計測機器の管理を「羅針盤」に例えた場合、遡及処置における「航海日誌」の役割を果たすものは何ですか？","o":["船の燃料","トレーサビリティ記録（いつ、どこを、どう通ったかの記録）","船の名前","目的地の地図"],"h":"「過去の足跡」を正確にたどるための記録です。","c":1,"e":"羅針盤（計測器）が狂っていたとわかった時、正確な航海日誌（トレーサビリティ）があれば、どの航路（製品）が危険だったかを特定し、救助（是正）に向かうことができます。"},{"m":31,"q":"管理図における「管理限界線（UCL/LCL）」の主な目的は何ですか？","o":["製品が合格か不合格かを判定するため","工程が統計的に安定した状態にあるかどうかを判断するため","顧客に提出する検査成績書を作るため","作業者の給料を決めるため"],"h":"製品の「仕様」ではなく、プロセスの「実力」の範囲を示す線です。","c":1,"e":"管理図は、工程が「いつも通りのバラツキの範囲内」で動いているか、あるいは「何か異常な原因が入り込んだか」を検知するためのツールです。"},{"m":31,"q":"計量値管理図の中で、最も一般的で、平均値の変化と範囲（最大値と最小値の差）の変化を同時に監視するものはどれですか？","o":["$p$管理図","$\\bar{X}-R$ 管理図","$c$管理図","円グラフ"],"h":"平均（$\\bar{X}$）と範囲（$R$）を組み合わせた、QCの王道ツールです。","c":1,"e":"平均値で「狙い値のズレ」を、範囲で「バラツキの広がり」を同時に監視することで、工程の異常を多角的に捉えます。"},{"m":31,"q":"$\\bar{X}-R$ 管理図において、サブグループ（群）内のサンプル数（$n$）は通常いくつ以下が推奨されますか？","o":["8以下","50以上","100以上","決まっていない"],"h":"$n$が大きくなりすぎると「範囲（$R$）」ではバラツキを正確に表せなくなります。","c":0,"e":"サンプル数が多くなると範囲（$R$）の有効性が下がるため、通常は$n=2$〜$8$程度で運用されます。"},{"m":31,"q":"サンプルの大きさ（$n$）が9以上の場合に、範囲（$R$）の代わりに「標準偏差（$s$）」を用いて、より感度高く管理する図は何ですか？","o":["$\\bar{X}-R$ 管理図","$\\bar{X}-s$ 管理図","$u$管理図","レーダーチャート"],"h":"$s$は「Standard Deviation（標準偏差）」の頭文字です。","c":1,"e":"計算は少し複雑になりますが、Excel等を使えば容易に算出でき、サンプル数が多い場合に高い感度でバラツキを捉えられます。"},{"m":31,"q":"破壊検査のようにデータが1つしか取れない場合や、メッキ液の濃度のように群分けができない場合に用いる管理図は何ですか？","o":["個別値管理図（$X-Rs$ または $X-MR$ 管理図）","$\\bar{X}-R$ 管理図","散布図","組織図"],"h":"「個別の値（$X$）」と「隣り合うデータの差（移動範囲 $Rs$）」を使います。","c":0,"e":"群を作れない連続プロセスや、高コストな破壊検査のデータを監視するのに適しています。"},{"m":31,"q":"個別値管理図（$X-MR$）において、$\\bar{X}-R$ 管理図と比較した際の欠点は何ですか？","o":["計算が複雑すぎる","異常を検知する「感度」が劣る（鈍い）","グラフが横に長くなる","誰にも理解されない"],"h":"データが1つずつなので、平均をとる管理図よりも「偶然のブレ」に左右されやすくなります。","c":1,"e":"個別値管理図は感度が鈍いため、異常判定を下す際には他の管理図以上に注意深い観察が必要です。"},{"m":31,"q":"管理図で「異常」と判断すべき傾向として、不適切なものはどれですか？","o":["点が管理限界線の外側に出た","中心線の片側に連続して7点並んだ（連）","点が中心線付近でランダムに上下している","点の並びが周期的に上下している"],"h":"「統計的に見て、偶然では起こりにくい並び」が異常です。","c":2,"e":"中心線付近でランダムにバラついている状態こそが、工程が「統計的に管理された安定した状態」です。"},{"m":31,"q":"自動車部品の重要寸法を1時間ごとに5個ずつ抜き取って測定する場合、最適な管理図はどれですか？","o":["$X-MR$ 管理図","$\\bar{X}-R$ 管理図","$np$管理図","フローチャート"],"h":"$n=5$ なので、一般的な計量値管理図の適用範囲です。","c":1,"e":"小集団（$n=5$）のデータを定期的に取得できるため、感度と手間のバランスが良い$\\bar{X}-R$管理図が最適です。"},{"m":31,"q":"管理図に異常が現れた際、工程管理者が最初に行うべきことは何ですか？","o":["限界線を書き直す","原因を分析し、調査・処置の内容を記録する","グラフを捨てる","次の点が戻るまで待つ"],"h":"「異常」は工程からのSOSサインです。","c":1,"e":"異常の原因（特別原因）を特定して取り除き、再発防止策を講じることが管理図運用の真の目的です。"},{"m":31,"q":"本研修のまとめとして、管理図を医療機器に例えた場合、どのような表現が使われていましたか？","o":["「手術用のメス」","「工程の心電図」","「処方箋」","「リハビリ用具」"],"h":"常に動いているプロセスのリズムや波形を監視するイメージです。","c":1,"e":"目に見えない工程の「鼓動」を可視化し、不整脈（異常）がないかを継続的に監視する。それが管理図の役割です。"},{"m":32,"q":"計数値管理図において、製品を「合格・不合格」の2つに分類して管理する対象は何ですか？","o":["不適合数（欠点数）","不適合品（不良品）","平均値","標準偏差"],"h":"製品そのものが「使い物になるかならないか」を判断する指標です。","c":1,"e":"製品1個を単位として、それが良品か不良品かを数えるのが不適合品管理（p・np）です。"},{"m":32,"q":"サブグループ内のサンプルサイズ（n）が「変動」する場合に、不良率を管理するのに適した管理図はどれですか？","o":["np管理図","p管理図","c管理図","u管理図"],"h":"pは probability（率）や proportion（割合）の略です。","c":1,"e":"分母がバラバラな時は、「個数」ではなく「率（％）」に換算して比較できるp管理図を使用します。"},{"m":32,"q":"サンプルサイズ（n）が常に「一定」であるとき、不良品の個数をそのままプロットできる便利な管理図はどれですか？","o":["p管理図","np管理図","u管理図","散布図"],"h":"「n × p（数 × 率）」で、計算の手間が省けるのが特徴です。","c":1,"e":"分母が同じであれば、わざわざ割り算をして「率」を出さなくても、「個数」でそのまま管理限界線を引くことができます。"},{"m":32,"q":"製品1個あたりの「キズの数」や「汚れの箇所」など、1単位の中に複数存在しうる欠点を管理する図は何ですか？","o":["p・np管理図","c・u管理図","Xバー-R管理図","ヒストグラム"],"h":"「不良品か否か」ではなく、1個の中にある「不適合の数」を数えます。","c":1,"e":"鋳物の巣、溶接のピンホール、布地の織りキズなど、「個所数」を数える際に使用します。"},{"m":32,"q":"面積や長さが「一定」である単位（例：ドア1枚、布100mなど）の中に現れる欠点数を管理する図はどれですか？","o":["u管理図","c管理図","p管理図","np管理図"],"h":"cは count（数）の略。分母が固定されている場合です。","c":1,"e":"比較する「場」の大きさが同じであれば、欠点数の合計をそのままプロットするc管理図が適しています。"},{"m":32,"q":"鋼板の面積がロットごとに異なるなど、分母となる単位の大きさが「変動」する場合に、単位あたりの欠点数を管理する図はどれですか？","o":["c管理図","u管理図","np管理図","管理限界線"],"h":"uは unit（単位あたり）の略。密度を比較するイメージです。","c":1,"e":"面積や長さがバラバラでも、「1平方メートルあたり何個か」のように単位化して比較できるのがu管理図です。"},{"m":32,"q":"p管理図を使用する際、統計的な安定性を保つために望ましいとされる条件（npの値）はいくつ以上ですか？","o":["0.1以上","1以上","5以上","100以上"],"h":"ある程度の「不良の数」がサンプルに含まれていないと、限界線が不安定になります。","c":2,"e":"np（期待される不良個数）が5未満だと、統計的な分布が歪み、管理図の判定精度が落ちるとされています。"},{"m":32,"q":"自動車のフロントガラスの「気泡の数」を、ガラス1枚を単位として毎日一定枚数検査する場合、最適な管理図はどれですか？","o":["p管理図","np管理図","c管理図","u管理図"],"h":"「気泡の数」を数え、分母（ガラス1枚）は一定です。","c":2,"e":"欠点数を数えるケースで、かつ対象（単位）の大きさが一定なのでc管理図が最適です。"},{"m":32,"q":"管理図において、点が管理限界線の外側に出るなどの「異常」が示された際、管理者が最初にとるべき行動は何ですか？","o":["限界線を広げる","原因（特別原因）を調査し、再発防止の是正処置をとる","データを消去する","次のデータが出るまで待つ"],"h":"管理図は「異常を知らせる目覚まし時計」です。鳴ったら起きなければなりません。","c":1,"e":"異常は工程に「いつもと違う何か」が起きた証拠です。その原因を特定し、取り除くことが改善の第一歩です。"},{"m":32,"q":"本研修のまとめとして、計数値管理図を「健康診断」に例えた場合、c・u管理図は何に相当しますか？","o":["全体の病気発生率","個々の患者が持つ「病変（欠点）の数」","病院の待ち時間","薬の価格"],"h":"一人の患者（1個の製品）の中に、いくつの症状があるかを見るイメージです。","c":1,"e":"製品が「不良」かどうかだけでなく、その中にどれだけ多くの「欠点」があるかを詳しく追跡するのがc・u管理図の役割です。"},{"m":33,"q":"バリデーション（妥当性確認）の定義として、最も適切なものはどれですか？","o":["製品が図面通りに作られているか定規で測ること","客観的証拠を提示し、特定の意図された用途に関する要求事項が満たされていることを確認すること","担当者の印鑑を書類に押すこと","過去の失敗を帳消しにすること"],"h":"単なる「数値のチェック」を超えて、「狙い通りに使えるか」を科学的に証明する活動です。","c":1,"e":"バリデーションは、そのプロセスが「意図した結果（安全性や耐久性など）」を確実に出せることを、データ（客観的証拠）をもって証明するプロセスです。"},{"m":33,"q":"バリデーションが特に必要とされる「クリティカルなプロセス（特殊工程）」の特徴は何ですか？","o":["誰でも簡単にできる作業","後の検査や測定では不適合を完全に検証できず、使用後にしか問題が表面化しないプロセス","毎日同じことの繰り返しのプロセス","非常に低コストなプロセス"],"h":"溶接、熱処理、滅菌など、「切ってみないと分からない」「壊してみないと分からない」ような工程です。","c":1,"e":"後から全数検査ができない工程こそ、あらかじめ「この条件でやれば絶対に大丈夫」という妥当性を確認しておく必要があります。"},{"m":33,"q":"「仕様通りに作ったか（Verification/検証）」と「狙い通りに機能するか（Validation/妥当性確認）」の違いについて、正しい説明はどれですか？","o":["両者は全く同じ意味である","検証は「図面との照合」、妥当性確認は「目的（ニーズ）への適合」を問う","妥当性確認の方が簡単である","検証は事後に行い、妥当性確認は行わない"],"h":"「正しい製品を作ったか（検証）」と「正しい製品（役に立つもの）を作ったか（妥当性確認）」の違いです。","c":1,"e":"QMSにおいて、特にクリティカルな工程では、図面数値だけでなく「本来の目的（耐久性など）」を満たすことを証明する妥当性確認が重視されます。"},{"m":33,"q":"製造現場において品質リスクの主要因となる「4M変更」の「4M」に含まれないものはどれですか？","o":["Man（人）","Machine（設備）","Money（金）","Method（方法）"],"h":"製造の4要素「人・設備・材料・方法」を思い出してください。","c":2,"e":"4MはMan, Machine, Material, Methodです。「金（Money）」は経営資源ですが、直接的な製造プロセス構成要素としての4Mには含まれません。"},{"m":33,"q":"熟練作業者が退職し、未経験の新人が作業を担当することになった場合、これは4Mのどの変更に該当しますか？","o":["Machine（設備）","Material（材料）","Method（方法）","Man（人）"],"h":"「誰が」作るか、という要素の変化です。","c":3,"e":"作業者の力量（スキル）が変わることは重大な変更であり、新しい作業者でも品質が維持できるかの検証や訓練が必要になります。"
