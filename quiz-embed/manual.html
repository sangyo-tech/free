<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>確認テスト | 産業技術アカデミー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:transparent}
#R{font-family:'Noto Sans JP',system-ui,sans-serif;color:#f1f5f9;line-height:1.7;max-width:800px;margin:0 auto;padding:24px 16px}
#R *{box-sizing:border-box;margin:0;padding:0}
#R button{font-family:inherit;cursor:pointer}

/* Tabs */
.tt{display:flex;gap:0;margin-bottom:32px;background:#0f172a;border-radius:14px;padding:5px;border:1px solid #1e293b}
.tb{flex:1;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:700;border:none;background:transparent;color:#64748b;transition:all .3s;letter-spacing:.02em;text-align:center}
.tb:hover:not(.on){color:#94a3b8;background:rgba(255,255,255,.03)}
.tb.on{color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.tb.t-video.on{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;box-shadow:0 4px 16px rgba(34,197,94,.3)}
.tb.t-course.on{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 4px 16px rgba(245,158,11,.3)}

/* Start */
.S{border-radius:14px;padding:32px 24px;text-align:center}
.S.s-video{background:linear-gradient(135deg,rgba(34,197,94,.05),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.S.s-course{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(245,158,11,.08));border:1px solid rgba(245,158,11,.2)}
.S h3{font-size:18px;font-weight:700;margin-bottom:8px;color:#f1f5f9}
.S p{color:#94a3b8;font-size:14px;margin-bottom:20px;line-height:1.8}
.sp{display:flex;justify-content:center;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.sv{font-size:22px;font-weight:700}
.s-video .sv{color:#22c55e}
.s-course .sv{color:#f59e0b}
.sl{font-size:11px;color:#64748b}

/* Buttons */
.B{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:12px;font-size:16px;font-weight:700;border:none;transition:all .3s;position:relative;overflow:hidden}
.B::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);opacity:0;transition:opacity .3s}
.B:hover{transform:translateY(-3px)}.B:hover::after{opacity:1}
.B:active{transform:translateY(-1px)}
.B.bg{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000;box-shadow:0 6px 24px rgba(34,197,94,.3)}
.B.bo{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;box-shadow:0 6px 24px rgba(245,158,11,.3)}

/* Quiz */
.Q{display:none}
.pg{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.pgb{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.pgf{height:100%;border-radius:3px;transition:width .3s}
.pgf.c-video{background:#22c55e}.pgf.c-course{background:#f59e0b}
.pgc{font-size:13px;color:#64748b;white-space:nowrap}
.qm{font-size:12px;color:#06b6d4;margin-bottom:8px;font-weight:500}
.qt{font-size:16px;font-weight:600;margin-bottom:18px;line-height:1.6;color:#f1f5f9}
.hb{font-size:12px;color:#d4a017;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);border-radius:6px;padding:4px 12px;margin-bottom:14px;display:inline-block}
.hi{display:none;font-size:13px;color:#94a3b8;background:rgba(212,160,23,.05);border-left:3px solid #d4a017;padding:10px 14px;border-radius:6px;margin-bottom:14px}
.os{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.o{background:#111827;border:2px solid #1e293b;border-radius:10px;padding:13px 16px;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;text-align:left;color:#f1f5f9}
.o:hover:not(.lk){border-color:#334155;background:#1a2332}
.ol{width:26px;height:26px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#94a3b8}
.o.ok{border-color:#22c55e;background:rgba(34,197,94,.08)}.o.ok .ol{background:#22c55e;color:#fff}
.o.ng{border-color:#ef4444;background:rgba(239,68,68,.08)}.o.ng .ol{background:#ef4444;color:#fff}
.ex{display:none;background:rgba(59,130,246,.06);border-left:3px solid #3b82f6;border-radius:6px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#94a3b8;line-height:1.7}
.nx{display:none;border:none;border-radius:8px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.nx:hover{transform:translateY(-2px)}
.nx.c-video{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000}
.nx.c-course{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}

/* Result */
.Rs{display:none}
.rc{border-radius:14px;padding:32px 24px;text-align:center;margin-bottom:24px}
.rc.ps{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.rc.fl{background:linear-gradient(135deg,rgba(239,68,68,.04),rgba(239,68,68,.08));border:1px solid rgba(239,68,68,.2)}
.rk{font-size:52px;font-weight:700;margin-bottom:6px}
.rs{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.rd{font-size:14px;color:#94a3b8;margin-bottom:14px}
.rpm{font-size:15px;font-weight:600;color:#22c55e;margin-bottom:14px}
.rfm{font-size:15px;font-weight:600;color:#ef4444;margin-bottom:14px}
.rvt{font-size:16px;font-weight:700;margin-bottom:14px;color:#f59e0b}
.rvi{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:16px 18px;margin-bottom:10px;text-align:left}
.rvq{font-size:13px;font-weight:600;margin-bottom:6px;color:#f1f5f9}
.rvy{font-size:12px;color:#ef4444;margin-bottom:3px}
.rvc{font-size:12px;color:#22c55e;margin-bottom:6px}
.rve{font-size:12px;color:#94a3b8;line-height:1.6}

/* Module selector (all mode) */
.ms{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.mc{background:linear-gradient(135deg,#111827 0%,#0f172a 100%);border:1px solid #1e293b;border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:16px;text-align:left;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(34,197,94,.06) 0%,rgba(34,197,94,.02) 100%);opacity:0;transition:opacity .3s}
.mc:hover{border-color:#22c55e;transform:translateX(6px);box-shadow:0 4px 20px rgba(34,197,94,.12)}
.mc:hover::before{opacity:1}
.mc:active{transform:translateX(3px) scale(.99)}
.mn{width:36px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#22c55e;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;background:none;border:none;box-shadow:none;margin-right:4px;text-shadow:0 0 12px rgba(34,197,94,.25)}
.mc:hover .mn{color:#4ade80;text-shadow:0 0 20px rgba(34,197,94,.5);transform:scale(1.12)}
.mdiv{width:1px;height:32px;background:linear-gradient(180deg,transparent,#334155 30%,#334155 70%,transparent);flex-shrink:0;margin:0 4px;transition:background .3s}
.mc:hover .mdiv{background:linear-gradient(180deg,transparent,#22c55e 30%,#22c55e 70%,transparent)}
.mt{font-size:14px;color:#e2e8f0;font-weight:600;line-height:1.5;position:relative;z-index:1}
.mt2{font-size:11px;color:#64748b;font-weight:400;margin-top:2px}
.mc:hover .mt{color:#fff}
.mc:hover .mt2{color:#94a3b8}
.marr{margin-left:auto;color:#334155;font-size:16px;transition:all .3s;position:relative;z-index:1}
.mc:hover .marr{color:#22c55e;transform:translateX(3px)}
.mhd{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mhd::before{content:'';display:inline-block;width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,#22c55e,#4ade80)}
.msd{font-size:13px;color:#94a3b8;margin-bottom:20px;padding-left:12px}
.mbk{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #1e293b;background:#111827;color:#94a3b8;cursor:pointer;margin-bottom:16px;transition:all .25s}
.mbk:hover{background:#1e293b;color:#f1f5f9;border-color:#334155;transform:translateX(-3px)}
.mcnt{display:inline-flex;align-items:center;justify-content:center;background:rgba(34,197,94,.1);color:#22c55e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px}

@media(max-width:600px){.qt{font-size:14px}.o{padding:11px 13px;font-size:13px}.S{padding:24px 16px}}
</style>
</head>
<body>
<div id="R">
  <div class="tt" id="tabs"></div>
  <div id="panelSelect" style="display:none">
    <div class="mhd">動画別 確認テスト<span class="mcnt">全15回</span></div>
    <div class="msd">テストしたいモジュールを選んでください</div>
    <div class="ms" id="modList"></div>
  </div>
  <div id="panelVideo" style="display:none">
    <div class="S s-video" id="startVideo">
      <h3 id="svTitle"></h3>
      <p>この動画の内容から出題されます。</p>
      <div class="sp">
        <div><div class="sv" id="svCount">10</div><div class="sl">問題数</div></div>
        <div><div class="sv">解説付き</div><div class="sl">正誤判定</div></div>
      </div>
      <button class="B bg" onclick="go('video')">テストを始める →</button>
    </div>
    <div class="Q" id="qVideo"></div>
    <div class="Rs" id="rVideo"></div>
  </div>
  <div id="panelCourse" style="display:none">
    <div class="S s-course" id="startCourse">
      <h3>マニュアル作成コース 確認テスト</h3>
      <p>15モジュールの内容からランダムに20問出題されます。</p>
      <div class="sp">
        <div><div class="sv">20</div><div class="sl">問題数</div></div>
        <div><div class="sv">80%</div><div class="sl">合格ライン</div></div>
      </div>
      <button class="B bo" onclick="go('course')">コーステストを始める →</button>
    </div>
    <div class="Q" id="qCourse"></div>
    <div class="Rs" id="rCourse"></div>
  </div>
</div>
<script>
const QUIZ_DATA = {"titles":["マニュアル導入の意義とメリット理解研修","「よいマニュアル」の3大原則と「目的×結果×行動」","マニュアル作成体制とスケジューリング","業務の洗い出しと「マニュアル準備シート」活用法","読み手のレベルに合わせた「階段化」と基本の業務フローの確立","マニュアルの文章3原則と執筆テクニック","マニュアルの構成要素①：マインドセット作成研修","マニュアルの構成要素②：ワークフロー作成研修","マニュアルの構成要素③：オペレーション詳細化研修","検索性を高めるフォーマットと目次・用語集の作成","マニュアル運用を定着させるための「仕組化」戦略","社員の認識を統一する「導入説明会と読み合わせ会」","マニュアル作成における「守破離」の概念適用研修","人事評価・リモートワークでのマニュアル応用事例研究","伝わりやすいマニュアルのための禁止語と接続詞の排除テクニック"],"questions":[{"m":0,"q":"マニュアル導入の本来の目的は何ですか？","o":["社員の自由を奪い、ロボットのように働かせること","業務を可視化・標準化し、社員と会社の成長を促す基盤を作ること","難しい専門用語を並べて権威を示すこと","分厚い書類を作って満足すること"],"h":"マニュアルは「縛るもの」ではなく、効率化を通じて「育てるもの」です。","c":1,"e":"マニュアルは業務を「見える化」し、誰でも高い水準で仕事ができるようにすることで、組織全体の生産性を底上げするためのツールです。"},{"m":0,"q":"仕事の生産性を落とす「3つの要因」として、マニュアルで解消すべきものは何ですか？","o":["食べる・寝る・遊ぶ","悩む・迷う・やり直す","歌う・踊る・笑う","怒る・泣く・叫ぶ"],"h":"「どうすればいいんだっけ？」と考えている時間は、利益を生み出さないコストです。","c":1,"e":"手順が明確であれば「迷い」がなくなり、判断基準がわかれば「悩み」が消え、正しい方法が示されていれば「やり直し」を防げます。"},{"m":0,"q":"個人のスキルやノウハウ（暗黙知）をマニュアル化して共有可能な状態（形式知）にすることを、組織にとって何と呼びますか？","o":["個人の秘密の漏洩","組織の知的財産化","記憶の消去","業務の丸投げ"],"h":"一人の知恵を「会社の宝」に変える作業です。","c":1,"e":"個人の頭の中にしかなかったノウハウを言語化し、マニュアルに残すことで、その人がいなくても組織が回る「財産」になります。"},{"m":0,"q":"マニュアルの作成・導入を始めるタイミングとして、最も「チャンス」なのはいつですか？","o":["従業員が数百人になってから","会社規模がまだ小さいうち","倒産しそうになってから","100年後"],"h":"人数が増えるほど、個々人の「自分勝手なルール」を修正するのが大変になります。","c":1,"e":"規模が小さいうちに足並みを揃えておくことで、会社が拡大しても「仕事の質」を落とさずに成長を続けることができます。"},{"m":0,"q":"マニュアルがあることで、部下が上司に細かく質問せずに動けるようになる効果を何と呼びますか？","o":["放置","自主的な行動の促進","上司のサボり","孤立化"],"h":"「教科書」があれば、自分で調べて進めることができます。","c":1,"e":"基本手順がマニュアル化されていれば、部下はいちいち確認の手を止めずに済み、上司も本来のマネジメント業務に集中できます。"},{"m":0,"q":"マニュアル導入によって時間に余裕ができた社員が、次に注力すべき「付加価値の高い行動」はどれですか？","o":["休憩時間を増やす","創意工夫や新発想を生み出すクリエイティブな活動","同じマニュアルを何度も書き写す","何もしない"],"h":"定型業務を効率化するのは、非定型な「考える仕事」をするためです。","c":1,"e":"マニュアルは「マニュアル人間」を作るものではありません。基本を自動化し、余った脳の容量を「より良くするための工夫」に使うためのものです。"},{"m":0,"q":"採用活動において、マニュアルが整備されていることが求職者に与えるポジティブな影響は何ですか？","o":["「厳しそうな会社だ」と思われる","「教育体制が整っており、安心して働けそうだ」という魅力になる","「覚えることが多そうだ」と敬遠される","特に影響はない"],"h":"新しい環境での不安を解消してくれる「安心材料」になります。","c":1,"e":"「教え方が人によって違う」「見て覚えろと言われる」という不安を払拭できるため、優秀な人材の確保に有利に働きます。"},{"m":0,"q":"人事考課において、マニュアルを導入するメリットは何ですか？","o":["全員を最低評価にするため","評価基準を明確にし、評価のバラツキや不満を抑えるため","評価を自動的に決めるため","面談を省略するため"],"h":"「なぜこの評価なのか」という根拠が明確になります。","c":1,"e":"評価基準をマニュアル化（可視化）することで、上司の主観による偏りを防ぎ、社員の納得感を高めることができます。"},{"m":0,"q":"本テーマで語られている、マニュアルが実現する「守破離」の「守」とはどのような段階ですか？","o":["既存の型を破る段階","業務のスタンダード（基本の型）を全員が忠実に守り実行する段階","独自の流派を作る段階","すべてを忘れる段階"],"h":"成長の第一歩は、正しい基本を身につけることです。","c":1,"e":"まずは全員がマニュアル通りの「基本」を完璧にこなすこと。そこができて初めて、応用（破・離）が可能になります。"},{"m":0,"q":"マニュアルを「生きたドキュメント」にするために、作成した後に最も大切なことは何ですか？","o":["金庫に厳重に保管する","社員と会社が運用を続け、現状に合わせて更新し、共に成長し続けること","二度と内容を変えないこと","誰にも見せないこと"],"h":"「作って終わり」ではなく、使い続けることが大切です。","c":1,"e":"マニュアルは完成した瞬間から古くなり始めます。日々の気づきを反映し、改善し続けることで、組織の力を高める「生きた財産」となります。"},{"m":1,"q":"「よいマニュアル」の3大原則のうち、誰がやっても同じ結果を正確に再現できることを何と呼びますか？","o":["再現性","検索性","法則性","継続性"],"h":"「人によるバラつき」をなくし、品質を一定にするための最も重要な概念です。","c":0,"e":"再現性があるマニュアルは、新人でもベテランと同じゴールにたどり着ける手順が示されています。これが「守破離」の「守」を支えます。"},{"m":1,"q":"「探したい情報がすぐに見つかる」という利便性を高めるために、マニュアルに必ず作成すべきものは何ですか？","o":["著者のプロフィール","目次","会社の歴史","応援メッセージ"],"h":"厚いマニュアルになればなるほど、これがないと誰も開かなくなります。","c":1,"e":"「検索性」を確保するための第一歩は目次です。必要な時に必要なページへ即座にアクセスできることが、現場での活用率を左右します。"},{"m":1,"q":"マニュアルの「型」である3要素（目的・結果・行動）のうち、最初に示すべき「なぜその作業が必要なのか」を定義するものはどれですか？","o":["目的（Purpose）","結果（Result）","行動（Action）","反省（Review）"],"h":"これがないと、作業者は「言われたからやるだけ」の受動的な状態になってしまいます。","c":0,"e":"目的を明確にすることで、作業の意味を理解し、自律的に動けるようになります。自社の利益（利己）とお客様の利益（利他）の両面を書くのがコツです。"},{"m":1,"q":"マニュアルの「結果（Result）」を示す際に、状態（ゴールの姿）と合わせてもう一つ含めるべき要素は何ですか？","o":["担当者の名前","期限や所要時間","昨日の実績","予算"],"h":"「いつまでに、どれくらいの速さで」という基準が生産性の指標になります。","c":1,"e":"「綺麗にする」だけでなく「20分で終わらせる」という時間軸を入れることで、習熟度の判定が可能になり、生産性の向上に繋がります。"},{"m":1,"q":"具体的で詳細な作業手順を示す「行動（Action）」において、読み手が確実に実行できるように作業を細かく分ける工夫を何と呼びますか？","o":["巨大化","階段化（スモールステップ）","隠蔽","複雑化"],"h":"一歩一歩が低い階段であれば、誰でも登りきることができます。","c":1,"e":"業務を細かく分解し、一つひとつの難易度を下げることで、読み手の「迷い」をなくし、確実な実行を促します。"},{"m":1,"q":"フロア清掃の例で、バケツに入れる水の量を「線のところまで」と具体的に指定する目的は何ですか？","o":["水道代を節約するため","読み手が「どのくらい入れればいいか」と迷うのを防ぎ、再現性を高めるため","バケツを重くするため","運を呼ぶため"],"h":"「適量」という言葉は人によって解釈が分かれます。","c":1,"e":"「適量」「しっかり」といった曖昧な表現を排除し、誰が見ても同じ判断ができる具体的な表現（定量化・視覚化）をすることが重要です。"},{"m":1,"q":"マニュアルの「行動（Action）」を補強し、より分かりやすくするために効果的なものはどれですか？","o":["難しい専門用語の羅列","写真、イラスト、書類のサンプル","過去の失敗談の長文","白黒の文字のみ"],"h":"「百聞は一見にしかず」をマニュアルに落とし込みます。","c":1,"e":"ビジュアル情報は文字情報の数倍の伝達力があります。特に判断基準が難しい箇所には写真やイラストが不可欠です。"},{"m":1,"q":"「目的×結果×行動」の型でマニュアルを作ることにより、解消される「3つのムダ」は何ですか？","o":["食べる・寝る・遊ぶ","悩む・迷う・やり直す","歌う・踊る・笑う","怒る・泣く・叫ぶ"],"h":"「どうすればいいんだっけ？」という思考の停止時間をゼロにします。","c":1,"e":"型が決まっていれば、判断に「悩まず」、手順に「迷わず」、ミスによる「やり直し」がなくなるため、圧倒的に生産性が上がります。"},{"m":1,"q":"マニュアル化によって「個人のスキル」を「会社の財産」に変えることを、知識の何化と呼びますか？","o":["暗黙知化","形式知化","忘却化","秘密化"],"h":"頭の中にある見えない知識を、見える形（ドキュメント）にすることです。","c":1,"e":"特定の個人に依存する「属人化」を防ぎ、組織全体で知恵を共有できる「知的財産」に変えるプロセスです。"},{"m":1,"q":"完成したマニュアルを「生きたドキュメント」として運用し続けるために最も大切な姿勢はどれですか？","o":["一度作ったら絶対に変えない","知識と経験を共有し、状況の変化に合わせて共に更新・成長させていく","誰にも見せないように保管する","担当者一人に任せきりにする"],"h":"「作って終わり」は形骸化の始まりです。","c":1,"e":"現場のフィードバックを受けて更新し続けることで、マニュアルは組織と共に成長する「生きた資産」となります。"},{"m":2,"q":"マニュアル作成を効率的に進めるために、作成担当者の人数はどう設定するのが理想的ですか？","o":["全社員で話し合いながら進める","原則として1人に絞って進める","部署ごとに5名ずつ選出する","外部のコンサルタントだけに任せる"],"h":"船頭多くして船山に上る（意見が割れて進まなくなる）事態を防ぎます。","c":1,"e":"複数人で作成すると、言葉の定義や手順の細かさがバラバラになり、統一感が失われます。1人が責任を持って書き進めることで、一貫性のあるマニュアルが短期間で完成します。"},{"m":2,"q":"新人教育用のマニュアルを作成する場合、担当者として最も適任なのはどのような人ですか？","o":["その業務の雲の上のようなトッププロ","最近まで新人だった若手社員や、現在教育を担当している人","業務を全く知らない他部署の人","社長"],"h":"「初心者がどこでつまづくか」を知っている視点が重要です。","c":1,"e":"トッププロが書くと内容が高度になりすぎ、初心者が置いてけぼりになることがあります。新人に近い目線で「何が分からないか」を理解している人を起用するのが成功のコツです。"},{"m":2,"q":"マニュアル作成担当者が得られる、副次的なメリットは何ですか？","o":["自分の仕事がなくなる","業務を整理する過程で、仕事の「ムリ・ムダ・ムラ」に気づき、自身のスキルアップに繋がる","毎日残業が増えるだけ","他人の仕事に詳しくなれる"],"h":"「教えることは、二度学ぶこと」と言われます。","c":1,"e":"手順を書き出す作業は、自分自身の業務の再点検になります。作成を通じて業務効率が上がり、社内での評価向上にも繋がります。"},{"m":2,"q":"マニュアル作成のスケジュールを立てる際、最初に行うべきことは何ですか？","o":["文房具を買いに行く","完成期日（デッドライン）を設定し、そこから逆算して計画を立てる","とりあえず書き始める","全員の意見を聞いて回る"],"h":"ゴールが決まっていないマラソンは完走できません。","c":1,"e":"まず「いつまでにリリースするか」を決め、そこから各工程（洗い出し、執筆、レビュー）に期間を割り振る「逆算思考」が、プロジェクト成功の鉄則です。"},{"m":2,"q":"マニュアル作成にかける期間として、理想的とされるのはどのくらいですか？","o":["1週間から遅くとも1ヶ月以内","半年から1年じっくりかける","3年かけて完璧なものを作る","1日ですべて終わらせる"],"h":"時間がかかりすぎると、途中でルールが変わってしまい、内容が「陳腐化」します。","c":0,"e":"現場は常に動いています。1ヶ月以上かけると完成時に内容が古くなるリスクがあるため、ボリュームよりも「鮮度とスピード」を重視してリリースします。"},{"m":2,"q":"マニュアルを「完璧」にしてからリリースするのではなく、早期に現場投入する意義は何ですか？","o":["楽をしたいから","早く運用（仕組化）と更新（習慣化）のサイクルを回し、現場のフィードバックを得るため","途中で諦めるため","責任を現場に押し付けるため"],"h":"マニュアルは「作ってから育てるもの」です。","c":1,"e":"60点の出来でも早くリリースし、実際に使ってみて不備を直す方が、結果として早く100点に近いマニュアルに育ちます。"},{"m":2,"q":"マニュアルが「今の一番よいやり方」を示している状態を保つために、避けるべき事態は何ですか？","o":["定期的な見直し","長期間の作成による内容の陳腐化","写真の多用","現場からの意見収集"],"h":"完成した時にはもう古い……という悲劇を避けます。","c":1,"e":"作成期間が長引くと、その間に改善された新しい手順が反映されず、役に立たないマニュアルになってしまいます。"},{"m":2,"q":"スケジュールを立てる際、作成時間以外に忘れずに組み込むべき期間はどれですか？","o":["昼寝の時間","業務の洗い出しと、完成後の「見直し（レビュー）」の期間","打ち上げの期間","印刷を待つ期間"],"h":"いきなり書き始めるのではなく「準備」と「仕上げ」が必要です。","c":1,"e":"全体の作業時間の配分において、構成を練る準備時間と、第3者がチェックして修正する見直し時間を確保することが、品質担保の鍵です。"},{"m":2,"q":"本研修の例え話において、マニュアル作成の体制とスケジュールを何に例えていましたか？","o":["巨大な建築プロジェクト","「料理の準備（シェフの選定とコース完成までの時間）」","終わりなき旅","秘密の暗号解読"],"h":"誰が作り、いつまでに提供するかを決めないと、味がブレたり食材が古くなったりします。","c":1,"e":"適切な担当者（シェフ）が、鮮度が落ちないうちに（短期間で）最高の一皿（マニュアル）を完成させ、提供（運用）を始める。このスピード感が成功の秘訣です。"},{"m":2,"q":"明日からマニュアル作成プロジェクトを始動させる際、リーダーとして最初に宣言すべきことは何ですか？","o":["「1年かけて完璧なものを作ろう」","「担当者は君だ。1ヶ月以内に、今のベストな手順を現場に届けよう」","「みんなで集まって、一文字ずつ検討しよう」","「とりあえず手が空いた時にやっておいて」"],"h":"「担当者の明確化」と「期限の設定」をセットで行います。","c":1,"e":"「誰が」「いつまでに」を明確に提示することで、担当者は責任感を持って動き出すことができます。"},{"m":3,"q":"マニュアル作成の第一段階である「可視化」において、中核を担う作業は何ですか？","o":["表紙のデザインを決める","業務の洗い出し","打ち上げの計画","パソコンの買い替え"],"h":"いきなり書き始める前に、何を作るべきか「棚卸し」をする作業です。","c":1,"e":"洗い出しを飛ばして書き始めると、途中で構成がブレたり、重要な手順が抜け落ちたりして、使いにくいマニュアルになってしまいます。"},{"m":3,"q":"すべての業務を一度にマニュアル化しようとせず、「優先順位」をつける際の最も重要な基準は何ですか？","o":["経営層が好きな業務","現場の「困っている度合い」が高い業務","一番簡単な業務","誰もやっていない業務"],"h":"新人に教えにくい、ミスが許されない、属人化している……といった課題がある場所から着手します。","c":1,"e":"リソースは有限です。「新人がいつもつまづく」「担当者が休むと仕事が止まる」といった、リスクや負担が大きい業務から着手するのが鉄則です。"},{"m":3,"q":"マニュアル準備シートを埋める際、どの分類から書き始めるのが「体系化」への近道ですか？","o":["大分類","中分類","小分類（詳細な作業）","分類しない"],"h":"具体的な「動作」のレベルから積み上げていくと、全体像が見えやすくなります。","c":2,"e":"まず具体的な「小分類（作業の粒）」を出し尽くし、それらをグループ化して「中分類」「大分類」とまとめていくことで、漏れのない体系的な構成が作れます。"},{"m":3,"q":"準備シートに記載する「実働時間」とは、どのような時間のことを指しますか？","o":["業務の締め切りまでの期間","その作業に実際にかかる正味の時間","1日の就業時間","休憩時間"],"h":"「1週間かかる仕事」ではなく「合計で3時間かかる作業」といった捉え方です。","c":1,"e":"実働時間を把握することで、その業務の難易度やコスト（工数）が可視化され、マニュアル化による削減効果を予測しやすくなります。"},{"m":3,"q":"洗い出しを始める前に、「問題点や不安点」をあらかじめ書き出す目的は何ですか？","o":["愚痴を言うため","作業の途中で手が止まる（頓挫する）のを防ぎ、事前に対処法を考えておくため","誰かを責めるため","書類を厚くするため"],"h":"「ここが分かりにくいと言われそうだな」と先に予想しておく「転ばぬ先の杖」です。","c":1,"e":"あらかじめボトルネックを予想しておくことで、調査や確認を先に行うことができ、執筆をスムーズに進められます。"},{"m":3,"q":"「小分類」に書き出した内容は、最終的なマニュアルのどの部分に該当しますか？","o":["挨拶文","オペレーション（具体的な手順）の項目名","表紙のタイトル","付録"],"h":"マニュアルの「型」である「目的・結果・行動」の「行動」にあたります。","c":1,"e":"小分類は、読み手が実際に行う「アクション」そのものです。ここが細かく正確に書き出されているほど、マニュアルの再現性が高まります。"},{"m":3,"q":"準備シートの項目「新人難度」が高い業務に対して、教育担当者がとるべき戦略はどれですか？","o":["経験者に任せて放置する","マニュアルの必要性と緊急性が高いと判断し、重点的に可視化する","新人には絶対に見せない","難度を下げるまで何もしない"],"h":"「難しいからこそ、マニュアルが必要」という発想です。","c":1,"e":"難度が高い業務は属人化しやすく、教育コストもかかります。ここをマニュアル化（形式知化）することが、組織の大きな知的財産になります。"},{"m":3,"q":"洗い出しを通じて、個人に隠されていたスキルや経験を組織全体で共有することを、知識の何化と呼びますか？","o":["秘密化","形式知化","忘却化","複雑化"],"h":"頭の中にある「暗黙知」を、誰でも見える「形」にすることです。","c":1,"e":"ベテランのコツやノウハウをシートに書き出すことは、個人の能力を「組織の資産」に変換する極めて価値の高い作業です。"},{"m":3,"q":"本研修の例え話において、業務の洗い出しを何に例えていましたか？","o":["豪華なフルコースの準備","「建物を建てる前の地盤調査」","終わりなき旅","秘密の暗号"],"h":"目に見えない土台（業務実態）をしっかり調べることで、頑丈な建物（マニュアル）が建ちます。","c":1,"e":"地盤（実態）が不安定なままマニュアルを建てても、すぐに使われなくなります。洗い出しという調査が、マニュアルの信頼性を支えます。"},{"m":3,"q":"明日から業務の洗い出しを始める際、まず手に取るべき「ツール」は何ですか？","o":["分厚いバインダー","マニュアル準備シート","高価なカメラ","ストップウォッチのみ"],"h":"このシートが、マニュアル完成までの「地図」になります。","c":1,"e":"まずはシートを広げ、目の前の業務を「小分類」に分解してみること。その一歩が、組織の知的財産を築くスタートラインです。"},{"m":4,"q":"マニュアル作成における「階段化」の概念とは、どのような意味ですか？","o":["マニュアルを階段に置いておくこと","読み手のレベル（新人など）に合わせて、内容の難度を適切に設定すること","ページ数を階段状に増やすこと","難しい用語を一段ずつ解説すること"],"h":"小学生に大学の教科書を渡しても理解できないのと同様、相手のレベルに合わせることが重要です。","c":1,"e":"読み手が誰かを明確にし、その人が一歩ずつ登れる高さの「階段」として手順を示すことで、業務の理解と再現が飛躍的にスムーズになります。"},{"m":4,"q":"マニュアルが実現しやすくする、武道や芸事の修行段階「守破離」の「守」とは何を指しますか？","o":["型を破る段階","独自の流派を作る段階","基本の「型」を忠実に守り、確実に再現できる段階","相手を守る段階"],"h":"成長の第一歩は、成功者の「型」を完コピすることから始まります。","c":2,"e":"マニュアルは、会社が積み上げてきた「最も成功率の高い型」を示すものです。これを守ることで、新人は最短距離で戦力化できます。"},{"m":4,"q":"「基本の業務フロー」を作成する際の鉄則として、正しいものはどれですか？","o":["多くの分岐や例外パターンを網羅する","迷いのない「一本道」の成功ストーリーを示す","誰も成功したことがない理想論を書く","担当者ごとに違う手順をすべて載せる"],"h":"情報が多すぎると現場は「迷い」ます。まずは「標準的な正解」を一つ示します。","c":1,"e":"マニュアルは「迷いをなくすツール」です。例外は後回しにし、まずは「これ通りにやれば必ず成功する」という一本道のフローを確立します。"},{"m":4,"q":"マニュアルに「理想論（誰も実践したことがないやり方）」を書いてはいけない理由は何ですか？","o":["書くのが大変だから","再現性が低く、マニュアルとしての信頼性（法則性）が失われるため","社長に怒られるから","ページ数が減るから"],"h":"マニュアルは「現実に成功が実証されているやり方」の記録であるべきです。","c":1,"e":"実証されていない理想論は、現場で実行不可能な「絵に描いた餅」になり、結果としてマニュアルが読まれなくなる原因になります。"},{"m":4,"q":"複雑な業務でどうしても複数のパターンが存在する場合、どのように対処すべきですか？","o":["無理やり1枚に詰め込む","業務をさらに細かく分け、別のワークフロー（マニュアル）として作成する","勘に任せると書く","分岐を10箇所以上作る"],"h":"「階段」が複雑になりすぎたら、別の階段（マニュアル）に分けるのが賢明です。","c":1,"e":"一つの業務フローが複雑化しすぎると検索性が落ちます。パターンごとにマニュアルを分けることで、一つひとつの「一本道」を維持できます。"},{"m":4,"q":"「基本の業務フロー」を構成する際に用いる、マニュアルの必須の「型」は何ですか？","o":["起承転結","目的・結果・行動","過去・現在・未来","導入・展開・結末"],"h":"「なぜやるか」「どうなれば合格か」「どう動くか」の3点セットです。","c":1,"e":"この型に沿ってフローを作ることで、「何をすべきか（行動）」だけでなく「なぜ（目的）」や「ゴール（結果）」が明確になり、自律的な判断が可能になります。"},{"m":4,"q":"マニュアル作成において、「階段化」を意識すべきフェーズはどこですか？","o":["最後の見直しの時だけ","優先順位決め、洗い出し、執筆まで、すべての段階","表紙のデザイン時","印刷する時"],"h":"常に「これは新人が理解できるか？」という問いを持ち続けます。","c":1,"e":"すべての工程で「階段化（難度設定）」を意識することで、一貫性のある、現場に即したマニュアルが完成します。"},{"m":4,"q":"マニュアル作成後の「運用」において、鉄則とされるスピード感はどのようなものですか？","o":["1ヶ月かけてテストしてから配布する","完成したら、特にテストをせず現場に即投入する","完璧になるまで公開しない","誰もいない時にこっそり置く"],"h":"マニュアルは現場で使われて初めて「気づき」が生まれます。","c":1,"e":"「60点の出来」でも即投入し、現場のフィードバックを受けて更新する。このスピード感が、マニュアルを「生きたドキュメント」に変えます。"},{"m":4,"q":"本研修の例え話において、マニュアルの「基本の業務フロー」を何に例えていましたか？","o":["豪華なフルコースのメニュー","「工場の生産ラインの設計図」","終わりなき旅","秘密の暗号"],"h":"誰が担当しても同じ品質の製品（結果）が完成するように設計された図面です。","c":1,"e":"設計図通りに進めれば必ず合格品ができる。この安心感こそが、組織全体の生産性と品質を支える土台と 葉を繋いでしまうと、一つの指示の中に複数の作業が混ざり、曖昧になります。","c":1,"e":"接続詞を使い長文になると、どこまでが一つの作業か分からなくなります。一文一意、接続詞なしの箇条書きが鉄則です。"},{"m":8,"q":"再現性を高めるために、文末の表現として最も適切なものはどれですか？","o":["「○○の確認」と名詞で切る","「○○を確認する」と動詞で言い切る","「○○が良いと思う」と感想を述べる","「○○かもしれない」と推測する"],"h":"読み手が「自分のやるべきアクション」として受け取れる能動的な表現を選びます。","c":1,"e":"動詞で言い切る（能動態）ことで、読み手は迷わず「動作」に移ることができます。名詞止めは解釈の余地を与えてしまうため避けましょう。"},{"m":8,"q":"オペレーションにおいて「禁止事項（〜してはいけない）」ばかりを並べてはいけない理由は何ですか？","o":["文字数が増えるから","読み手が方向性を見失い、ツールに嫌悪感を抱く可能性があるため","禁止事項は重要ではないから","ページが足りなくなるから"],"h":"「ダメ」と言われるより「こうする」と言われる方が、人は動きやすいものです。","c":1,"e":"基本は「これをする」というポジティブな行動指示をベースにし、どうしても危険なことや致命的なミスに繋がることだけを厳選して禁止事項として示します。"},{"m":8,"q":"複雑な作業や判断基準を伝える際、文章よりも有用で、実態が伝わりやすい視覚情報はどれですか？","o":["イラスト","写真","似顔絵","グラフのみ"],"h":"「現場のリアル」をそのまま伝えるには、カメラで撮ったものが一番です。","c":1,"e":"写真は情報の密度が高く、一目で状況を理解させます。重要な箇所に丸や矢印を書き加えることで、さらに判読性が高まります。"},{"m":8,"q":"「受付に用件を伝える」という手順に対し、実際のセリフ（「お世話になっております…」）を記載したものを何と呼びますか？","o":["脚本","トークスクリプト","独り言","連絡帳"],"h":"「何を言うか」まで決めておくことで、新人の不安を解消し再現性を高めます。","c":1,"e":"トークスクリプトは、コミュニケーションが発生する業務において最強の再現ツールです。具体的な「言葉」まで示すのがオペレーションの詳細化です。"},{"m":8,"q":"契約書の捺印箇所や記入方法を示すために、オペレーションに挿入すべきものは何ですか？","o":["契約書の全文","書類のサンプル（見本）","担当者の印鑑","法律の条文"],"h":"「完成形」を見せるのが一番の近道です。","c":1,"e":"書類の見本（サンプル）に「ここに印」「ここを記入」と書き込むことで、ミスが許されない事務作業の質を劇的に安定させることができます。"},{"m":8,"q":"オペレーションを詳細に記述し、「設計図」として共有することで得られる組織的なメリットは何ですか？","o":["社員の個性がなくなる","「悩む・迷う・やり直す」というムダが解消され、クリエイティブな活動に注力できる","監視がしやすくなる","仕事のスピードが落ちる"],"h":"基本作業を「自動化（ルーチン化）」することで、脳の余裕を生み出します。","c":1,"e":"詳細なオペレーションは、特定の個人に依存するノウハウを「組織の財産」に変えます。誰でもプロの成果を出せるようになれば、チーム全体の生産性は最大化されます。"},{"m":9,"q":"マニュアルの基本構成要素（マインドセット、ワークフロー、オペレーション）のうち、「行動の詳細」を担い、具体的な手順を分解して示すのはどれですか？","o":["マインドセット","ワークフロー","オペレーション","索引"],"h":"ワークフローが「全体の地図」なら、これは「一歩ずつの足の運び方」です。","c":2,"e":"オペレーションは、業務を最小単位まで分解し、誰がやっても同じ結果が出るように具体的な行動を記述するセクションです。"},{"m":9,"q":"オペレーションの作業指示において、可読性を高めるために最も推奨される記述形式は何ですか？","o":["物語のような長文","箇条書き","詩的な表現","4コマ漫画のみ"],"h":"一つひとつの作業を明確に区別し、パッと見て内容を理解しやすくします。","c":1,"e":"箇条書きにすることで、読み手は「今やるべきこと」を瞬時に特定でき、作業の抜け漏れを防ぐことができます。"},{"m":9,"q":"再現性を高めるための文末表現として、最も適切なものはどれですか？","o":["「○○の準備」と名詞で切る","「○○を準備する」と動詞で言い切る","「○○が良いと思う」と感想を述べる","「○○かもしれない」と推測する"],"h":"読み手がその文章を「自分の行動」として主体的に受け取れる表現を選びます。","c":1,"e":"動詞で言い切る（能動態）ことで、読み手の頭の中で「動作」が具体化され、迷いなく実行に移すことができます。"},{"m":9,"q":"作業指示の中で「そして」「また」「なお」といった接続詞を「絶対に用いない」理由は何ですか？","o":["文字数が増えて印刷代がかかるから","複数の指示や分岐が含まれてしまい、手順が曖昧になるから","接続詞は古臭いから","ページが足りなくなるから"],"h":"接続詞は一つの指示に複数の意味を持たせてしまい、混乱を招きます。","c":1,"e":"接続詞を使わずに文を分けることで、「一文一意（一つの文に一つの指示）」が徹底され、誤解の余地がなくなります。"},{"m":9,"q":"読み手のレベルに合わせて内容の難度を設定する考え方を何と呼びますか？","o":["階層化","階段化","差別化","複雑化"],"h":"特に新人向けなら、中学生でもわかるレベルまで「段差」を低くします。","c":1,"e":"ターゲットが確実に次の一歩を踏み出せるように、作業の粒度や言葉選びを調整することが「階段化」の極意です。"},{"m":9,"q":"文章だけでは伝えづらい複雑な内容や、現場の臨場感を伝えるために有効な補足ツールは何ですか？","o":["難しい専門用語","写真や動画","著者の似顔絵","過去の失敗談の長文"],"h":"「百聞は一見にしかず」をマニュアルに組み込みます。","c":1,"e":"ビジュアル情報は文字の数倍の伝達力があります。特に「どのボタンを押すか」「どのような状態が正解か」を伝えるには画像が不可欠です。"},{"m":9,"q":"具体例の「内定通知書の作成」で、「提出期限は入社日の2週間前」と明記する目的は何ですか？","o":["相手を急かすため","読み手の「悩む・迷う」をなくし、誰でも同じ基準で作成できるようにするため","会社が暇だから","特に意味はない"],"h":"具体的な数値やルールを示すことで、判断のバラつきをゼロにします。","c":1,"e":"「お早めに」といった曖昧な表現ではなく、具体的な数値を出すことで、新人でもミスなく業務を完遂できます。"},{"m":9,"q":"マニュアル作成において、「完成度を求めすぎてリリースを遅らせてはいけない」理由は何ですか？","o":["楽をしたいから","内容が陳腐化（古くなる）するのを防ぎ、現場で使って更新するサイクルを早く回すため","飽きてしまうから","誰も読んでくれないから"],"h":"マニュアルは「作ってから育てるもの」です。","c":1,"e":"現場は日々進化しています。早くリリースして現場の「気づき」を取り入れる方が、結果として「生きたドキュメント」への進化が早まります。"},{"m":9,"q":"本研修の例え話において、オペレーションの詳細化を何に例えていましたか？","o":["豪華なフルコース","「化学のレシピ（正確な計量と手順）」","終わりなき旅","秘密の暗号"],"h":"誰が作業しても同じ組成（結果）になるよう設計するイメージです。","c":1,"e":"正確な指示（分量）と箇条書き（手順）があれば、誰が作っても同じ品質の結果が得られる。これが標準化の本質です。"},{"m":9,"q":"明日からオペレーションを書く際、最も意識すべき「生産性を落とす3つの要因」は何ですか？","o":["食べる・寝る・遊ぶ","悩む・迷う・やり直す","怒る・泣く・叫ぶ","歌う・踊る・笑う"],"h":"マニュアルはこの3つをゼロにするための「武器」です。","c":1,"e":"この3大コストを排除することで、社員は脳の余裕を「創意工夫」や「お客様への付加価値」に使えるようになります。"},{"m":10,"q":"マニュアル導入を完了させるために、「作成（可視化）」の次に行うべき最難関のステップは何ですか？","o":["打ち上げの実施","仕組化（運用）","マニュアルの増刷","パソコンの更新"],"h":"「マニュアルを常に使っている状態」にすることを目指します。","c":1,"e":"「仕組化」とは、作成したマニュアルを飾り物にせず、日々の業務の中で当たり前に活用される仕組みを整えることを指します。"},{"m":10,"q":"「可視化」「仕組化」「習慣化」の3つの段階を順番に回していく活動を何と呼びますか？","o":["ライフサイクル","マニュアルサイクル","リサイクル","バイオリズム"],"h":"作って、使って、直す。このループが組織を強くします。","c":1,"e":"マニュアルは一度作って終わりではありません。このサイクルを回し続けることで、業務の標準化が半永久的に維持されます。"},{"m":10,"q":"マニュアル管理の属人化を防ぐために設置する、2名以上（作業者とマネジメント担当）で構成される組織は何ですか？","o":["親睦会","マニュアル管理会","秘密結社","実行委員会"],"h":"「管理担当者が辞めたら運用が止まる」という事態を防ぐための母体です。","c":1,"e":"マネジメント担当者が加わることで、現場が正しくマニュアルに従っているかを客観的に判断し、組織的な運用を担保できます。"},{"m":10,"q":"社員にマニュアル導入の意義を伝え、認識を統一するために実施する施策は何ですか？","o":["個別メールの送信","導入説明会","ポスターの掲示","抜き打ちテスト"],"h":"「なぜやるのか」という目的を全員で共有する場です。","c":1,"e":"導入説明会で、会社と社員双方のメリットを熱量を持って伝えることが、現場の「協力」を得るための鍵となります。"},{"m":10,"q":"導入説明会において、社員のモチベーションを上げるために特に強調すべきメリットはどれですか？","o":["会社の利益が上がること","「新人に教えやすくなり、自分の仕事に集中できる」など、社員自身の働き方の改善","印刷コストの削減","社長の満足度"],"h":"「自分にとってどんないいことがあるか」が最も人を動かします。","c":1,"e":"マニュアルが「縛る道具」ではなく、自分の「負担を減らす武器」であると認識してもらうことが、積極的な活用の第一歩です。"},{"m":10,"q":"社員の頭の中にマニュアルの内容を「画像」として残し、活用を促すために効果的な手法は何ですか？","o":["全文暗記","読み合わせ会（試読時間の確保）","自宅への持ち帰り","朗読テープの配布"],"h":"「どこに何が書いてあったか」を短時間でも目に焼き付ける機会を作ります。","c":1,"e":"一度でも目を通していれば、業務で迷った際に「あそこに書いてあったはずだ」と思い出し、マニュアルを開くハードルが下がります。"},{"m":10,"q":"マニュアルを「自己解決のツール」として定着させるために有効な、質問に関するルールは何ですか？","o":["質問は一切禁止","「マニュアルを確認すればわかることの質問は禁止」とする","質問1回につき課金する","何でもすぐに聞いてよいとする"],"h":"「聞く前にまず見る」という風土を強制的に、かつ前向きに作ります。","c":1,"e":"このルールにより、社員にマニュアルを頼る習慣がつき、上司や先輩の教育工数も劇的に削減されます。"},{"m":10,"q":"上司や先輩が「自己流のやり方」を持っていても、指導の際に徹底すべきルールは何ですか？","o":["自分のやり方を優先して教える","マニュアルにそった指導や教育を徹底する","マニュアルの不備を指摘して使わせない","指導を放棄する"],"h":"「教える人によって言うことが違う」という混乱をゼロにします。","c":1,"e":"指導者がマニュアルを尊重する姿勢を見せることで、マニュアルが「公式な正解」として現場に重みを持ちます。"},{"m":10,"q":"本研修の例え話において、マニュアルの仕組化を何に例えていましたか？","o":["豪華なフルコース","工場の「品質管理システム」の構築","終わりなき旅","秘密の暗号"],"h":"誰が作業しても、求められた品質（結果）を安定して再現できる環境を作る作業です。","c":1,"e":"マニュアルは単なる「紙」ではなく、組織の品質を一定に保つための「動くシステム」そのものです。"},{"m":10,"q":"明日から「仕組化」を成功させるために、リーダーとして最も意識すべきことはどれですか？","o":["完璧なマニュアルを一人で作り続ける","経営層や上司の協力を取り付け、全員で「マニュアルを使う文化」を創り出す","違反者を厳しく罰する","マニュアルの存在を秘密にする"],"h":"仕組化は「一人の努力」ではなく「組織の合意」で決まります。","c":1,"e":"上の立場の人たちが率先してマニュアルを使い、推奨すること。この文化づくりこそが、仕組化における最大の成功要因です。"},{"m":11,"q":"マニュアルを現場で常時使用される状態にする「仕組化」において、最初に行うべき周知のステップは何ですか？","o":["全社員へのメール送信","導入説明会の実施","抜き打ちテスト","掲示板への貼り出し"],"h":"対面、あるいは動画などで「なぜやるのか」を直接伝える場を設けます。","c":1,"e":"導入説明会は、マニュアルに対する全社員の認識を統一し、「これからこれが我々の標準になる」という意思表示をする極めて重要な場です。"},{"m":11,"q":"導入説明会において、社員の納得感を引き出すために「誰」が説明を行うのが最も効果的ですか？","o":["外部のコンサルタント","経営層や直属の上司","新入社員","事務局の一人"],"h":"「上の立場の人」が本気であることを示すことで、説得力が格段に上がります。","c":1,"e":"経営者や上司が直接その意義を語ることで、マニュアルが「会社として重要視している公式なもの」であるというメッセージが現場に強く伝わります。"},{"m":11,"q":"説明会で強調すべき「社員側のメリット」として、適切なものはどれですか？","o":["会社の利益が2倍になる","「教える手間が減り、自分の仕事に集中できる」「迷った時に答えがある」など","社長の機嫌が良くなる","備品の消費が減る"],"h":"「自分の働き方がどう楽になるか」が、現場の社員にとって最大の関心事です。","c":1,"e":"会社側の論理だけでなく、社員個人の負担が減り、クリエイティブな時間に注力できることを伝えることで、前向きな協力姿勢を引き出せます。"},{"m":11,"q":"「マニュアルを読んでおいて」と指示するだけでは不十分なため、全員で集まって内容を確認する施策を何と呼びますか？","o":["黙読会","読み合わせ会","暗唱大会","読書感想文提出"],"h":"一人で読むのではなく、グループで声を出し、内容を共有する場です。","c":1,"e":"読み合わせ会を行うことで、「見たことがない」という言い訳をなくし、全員が最低一度は内容に触れたという「共通体験」を作ることができます。"},{"m":11,"q":"読み合わせ会を実施することで、社員の頭の中にどのような効果が残るとされていますか？","o":["すべての文章の暗記","「どこに何が書いてあったか」という画像としての記憶","疲労感","著者の名前の記憶"],"h":"「迷った時にあそこを見ればいい」と思い出せる「インデックス」を作ります。","c":1,"e":"一度でも「見た」経験があれば、業務中に困った際、「あのマニュアルの右上に図があったな」と思い出し、自発的に活用するきっかけになります。"},{"m":11,"q":"読み合わせ会において、参加者はどのように構成するのが理想的ですか？","o":["新人のみ","ベテランのみ","新人・若手だけでなく、上司や先輩も参加する","暇な人のみ"],"h":"教える側と教わる側が同じ基準を共有することが大切です。","c":2,"e":"上司が参加し、マニュアルを尊重する姿勢を見せることで、現場に「マニュアルに従うのが正解」という文化が醸成されます。"},{"m":11,"q":"読み合わせ会の最中に、質問や疑問が出た場合の正しい対応はどれですか？","o":["「後で聞いて」と遮る","その場で意見交換し、必要であればメモをして後の「更新」に繋げる","質問した人を叱る","無視して読み進める"],"h":"現場のリアルな意見は、マニュアルをより良くするための「お宝」です。","c":1,"e":"その場での意見交換は、次のステップである「習慣化（更新）」の布石となります。現場の声を反映させる姿勢が、マニュアルへの信頼を生みます。"},{"m":11,"q":"読み合わせ会の進め方として、推奨される「交代制」のルールは何ですか？","o":["ずっと同じ人が読み続ける","数人ずつのグループで、1項目ごとに読み手を交代する","最も声が大きい人が読む","ジャンケンで決める"],"h":"全員が「参加している」という意識を持てるように工夫します。","c":1,"e":"交代で読むことで、集中力を維持し、全員が内容を「自分のこと」として捉えやすくなります。"},{"m":11,"q":"導入説明会や読み合わせ会を通じて構築を目指すべき「マニュアル文化」とはどのようなものですか？","o":["マニュアルを絶対視し、一切の工夫を禁じる文化","「わからないことがあればまずマニュアルに頼る」という自己解決の風土","マニュアルを無視して個性を出す文化","書類を綺麗に保管するだけの文化"],"h":"マニュアルを「縛る道具」ではなく「助けてくれる相棒」に変えることです。","c":1,"e":"「上司に聞く前にまず見る」という風土が定着すれば、教育コストが下がり、組織全体のスピードが飛躍的に向上します。"},{"m":11,"q":"明日から導入説明会を計画する際、リーダーとして最も大切にすべき「最初の一歩」はどれですか？","o":["完璧な台本を作ること","経営層の協力（コミットメント）を取り付け、社員への「思い」を言葉にすること","豪華な会場を予約すること","反対派を排除すること"],"h":"「本気度」を伝えることが、最大の仕組化戦略です。","c":1,"e":"上の立場の人たちが「これは我々の成長に不可欠だ」と宣言すること。その熱量が、形骸化を防ぐ最強の防波堤となります。"},{"m":12,"q":"日本の武道や芸事における修行過程「守破離」のうち、マニュアルが主に担うのはどの段階ですか？","o":["守（しゅ）","破（は）","離（り）","終（しゅう）"],"h":"師匠や会社の教えを忠実に守り、基本の型を身につける最初のステップです。","c":0,"e":"マニュアルは、会社が試行錯誤の末にたどり着いた「最も成功率の高い型」を記したものです。まずはこれを忠実に再現することが成長の土台となります。"},{"m":12,"q":"「守」の段階において、社員がマニュアルに対して取るべき正しい態度はどれですか？","o":["最初から自分なりのアレンジを加える","業務フローを忠実に守り、確実に再現することを目指す","読まずに自分の勘で進める","欠点ばかりを探す"],"h":"自己流に走る前に、まずは「正解の型」を完コピすることが近道です。","c":1,"e":"基本の型をマスターせずに応用しようとすると、自己流の悪い癖がつき、結果として成長が遅れたりミスを誘発したりします。"},{"m":12,"q":"基本を守りつつ、他の教えや技法を取り入れて自分に合ったやり方を見出す「破」の段階では、何とマニュアルを照らし合わせますか？","o":["昨日の晩ごはん","他の社員のコツや、より効率的な方法","占いの結果","全く関係のない趣味の知識"],"h":"基本の軸を持ちながら、周囲の良いエッセンスを吸収していく段階です。","c":1,"e":"マニュアルという基準（物差し）があるからこそ、他のやり方と比較した際の「良し悪し」を客観的に判断できるようになります。"},{"m":12,"q":"独自の流儀を確立し、培った経験をマニュアルの「更新」に反映させていく段階を何と呼びますか？","o":["守","破","離","転"],"h":"型から離れ、自らが新たな型を創り出し、組織に還元していく最終段階です。","c":2,"e":"「離」は単なる勝手な行動ではなく、組織全体の「守（基本）」をより高いレベルへ引き上げるための創造的なフェーズです。"},{"m":12,"q":"マニュアルが「守」を実現しやすくするために、必ず含まれていなければならない3つの要素（型）は何ですか？","o":["過去・現在・未来","目的・結果・行動","予算・人員・納期","挨拶・本題・結び"],"h":"「なぜやるか」「どうなれば合格か」「どう動くか」の3点セットです。","c":1,"e":"この3要素が揃っていることで、新人は迷うことなく「守」を実践でき、再現性の高い成果を出すことができます。"},{"m":12,"q":"マニュアル通りに業務を進めることで解消される、生産性を落とす「3つの要因」は何ですか？","o":["食べる・寝る・遊ぶ","悩む・迷う・やり直す","怒る・泣く・叫ぶ","探す・待つ・忘れる"],"h":"「どうすればいいんだっけ？」と立ち止まる時間をゼロにします。","c":1,"e":"迷いや悩みといった「思考のムダ」をマニュアルが肩代わりすることで、実作業のスピードと精度が向上します。"},{"m":12,"q":"「守」の段階にとどまり続けず、「破・離」へと進むべき理由は何ですか？","o":["飽きてしまうから","それ以上の成長が見込めず、時代の変化に取り残されるから","給料が上がらないから","マニュアルがボロボロになるから"],"h":"マニュアルは「完成品」ではなく、常に進化し続ける「生きた書類」であるべきです。","c":1,"e":"社員が成長し、現場の「気づき」をマニュアルに反映し続けることで、組織全体の「守」のレベルが常にアップデートされます。"},{"m":12,"q":"業務に慣れた社員が、ミスや不振に陥った際にマニュアルを読み返すことを何に例えていますか？","o":["敗北","初心に立ち戻る「立ち返る場所」","時間のムダ","責任転嫁"],"h":"調子が悪い時ほど、基本（型）が崩れていることが多いものです。","c":1,"e":"マニュアルは教育ツールであると同時に、ベテランにとっても「基本を確認し、軌道修正するためのアンカー（錨）」となります。"},{"m":12,"q":"本研修の例え話において、組織全体の成長を何に例えていましたか？","o":["豪華なフルコースの調理","「成長の階段を設計すること」","終わりなき砂漠の旅","秘密の暗号解読"],"h":"「守」で一段目を踏みしめ、自分たちで新たな段（更新）を付け加えていくイメージです。","c":1,"e":"一人の「離（創造）」が次の新人の「守（基本）」になる。このサイクルが階段を一段ずつ高くし、組織をより高みへと導きます。"},{"m":12,"q":"明日からマニュアルを使って「守」を実践する際、最も意識すべき「クリエイティブな目的」はどれですか？","o":["誰よりも早くマニュアルを暗記する","「守」を固めることで脳に余裕を作り、その余力を「探求・創意工夫」に注力させる","マニュアルの不備を見つけて文句を言う","マニュアルを隠す"],"h":"基本を自動化するのは、より高度な判断や改善を行うためです。","c":1,"e":"マニュアル通りにやることは目的ではなく、手段です。基本を効率化し、浮いたエネルギーを「もっと良くするため」に使うことこそが真の目的です。"},{"m":13,"q":"人事評価において、評価基準が曖昧な場合に発生しやすい問題は何ですか？","o":["評価のスピードが上がる","評価のバラツキが生じ、社員に不安や不満が募る","社員が全員100点になる","評価会議が不要になる"],"h":"「人によって基準が違う」と感じることは、モチベーション低下の最大の原因です。","c":1,"e":"「人事考課マニュアル」によって評価基準を可視化・標準化することで、主観を排除した公平な評価が可能になります。"},{"m":13,"q":"マニュアルの型（目的・結果・行動）のうち、特にリモートワーク下での評価において最も重要となる要素はどれですか？","o":["目的","結果（求める結果）","行動（手順）","挨拶"],"h":"働きぶりが見えない環境では、「何をもって達成とするか」の基準が命です。","c":1,"e":"「完了時の状態」や「期限」が明確に定義されていれば、上司は部下の姿が見えなくても、アウトプットの達成度で客観的に評価できます。"},{"m":13,"q":"マニュアルを共通認識のツールとして活用し、上司と部下が手順や目的について話し合うことで得られる副次的なメリットは何ですか？","o":["業務の秘密化","コミュニケーションの促進","責任の押し付け合い","作業の複雑化"],"h":"マニュアルを「叩き台」にして対話することで、お互いの認識のズレが解消されます。","c":1,"e":"「この手順はもっと改善できるのでは？」といった建設的な議論を通じて、マニュアルは組織を繋ぐコミュニケーションツールへと進化します。"},{"m":13,"q":"リモートワーク中の社員が、物理的な保管場所を気にせず、いつでもどこでもマニュアルを確認できるようにするための最適な共有形式は何ですか？","o":["分厚いバインダー","電子ファイル（クラウド上や共有ソフト）","口頭での伝承","社内の掲示板のみ"],"h":"PCやスマートフォンから即座にアクセスできる利便性が重要です。","c":1,"e":"デジタル化されたマニュアルは、検索性に優れ、物理的距離に関わらず最新の情報をチーム全員に届けることができます。"},{"m":13,"q":"マニュアルがない評価において、評価者が陥りがちな「主観的な評価」の例はどれですか？","o":["設定された数値目標の達成度で判断する","「残業が多いから頑張っているはず」といった印象で判断する","業務フローの再現性で判断する","写真見本との合致度で判断する"],"h":"業務の本質とは関係のない「雰囲気」や「姿勢」だけで判断してしまうことです。","c":1,"e":"「働きぶり（プロセス）」が見えにくい環境ほど、印象操作に惑わされない「具体的な成果基準（マニュアル）」が必要になります。"},{"m":13,"q":"リモート営業において、上司が部下の進捗を適切に判断するために活用できるマニュアル内の項目は何ですか？","o":["著者の経歴","各ステップごとの「実働時間」や「期限」","会社の創業記念日","専門用語の索引"],"h":"「その作業にどれくらい時間がかかるか」という基準があれば、遅れに気づけます。","c":1,"e":"標準的な所要時間が設定されていれば、離れていても「今の進捗は順調か、それとも支援が必要か」を客観的に判断できます。"},{"m":13,"q":"文章だけでは伝わりにくい商談の「臨場感」や「コツ」を、リモート下でも共有するために効果的な補足要素は何ですか？","o":["難しい数式","写真や動画","長い反省文","厳しい叱責"],"h":"「百聞は一見にしかず」をデジタルデータとして組み込みます。","c":1,"e":"動画でのロールプレイングや写真付きの成功事例は、リモート環境でも「具体的な正解のイメージ」を強力に共有します。"},{"m":13,"q":"マニュアルが定めた業務フローを「共通の言語」として活用することで実現する組織運営の姿はどれですか？","o":["独裁的な運営","公平で透明性の高い運営","放任主義な運営","秘密主義な運営"],"h":"誰が評価しても、誰が評価されても、納得感がある状態です。","c":1,"e":"評価の根拠がマニュアルという「公開された標準」に基づいているため、評価への納得感が高まり、組織の信頼関係が深まります。"},{"m":13,"q":"本研修のまとめにおいて、マニュアルを人事評価に応用することを何と表現していましたか？","o":["監視を強める行為","組織の知的財産（ノウハウ）を「評価の共通言語」として活用する行為","社員の自由を奪う行為","過去の記録を保存するだけの行為"],"h":"会社の「強み（ノウハウ）」を「評価（目標）」に直結させるイメージです。","c":1,"e":"「何ができるようになれば評価されるか」がマニュアルと連動することで、個人の成長が組織の利益に直結する仕組みが整います。"},{"m":13,"q":"明日からリモートワークや評価制度にマニュアルを活かす際、リーダーとして最初に明確にすべきことはどれですか？","o":["細かい監視ルールの作成","業務ごとの「目的・結果・行動」を、誰が見てもわかる言葉で定義し共有すること","評価を非公開にすること","自分の勘を磨くこと"],"h":"「何をもって成功（合格）とするか」の合意がすべての出発点です。","c":1,"e":"ゴール（結果）が共有されていれば、信頼して仕事を任せることができ、自律的な組織へと一歩近づくことができます。"},{"m":14,"q":"マニュアルの「作業指示（オペレーション）」において、接続詞（そして、また、なお等）を「絶対に使用してはならない」主な理由は何ですか？","o":["文字数が増えて読みづらくなるから","複数の指示や分岐が混ざり、どこまでが一つの作業か曖昧になるから","接続詞は子供っぽい印象を与えるから","ページ数が足りなくなるから"],"h":"一つの文章に二つ以上の「動き」が入ると、人はどちらを優先すべきか、どこで区切るべきか迷います。","c":1,"e":"接続詞を排除し、一文に一つの作業だけを記すことで、読み手は「今、何をすべきか」を瞬時に、かつ正確に理解できます。"},{"m":14,"q":"作業指示の文章を、読み手がパッと見て理解しやすい形式にするための基本ルールは何ですか？","o":["物語のような長文にする","箇条書きで簡潔に伝える","詩的な表現を用いる","4コマ漫画だけで構成する"],"h":"ステップ・バイ・ステップで、上から順に追っていける形が理想的です。","c":1,"e":"箇条書きは「視認性」と「可読性」を同時に高めます。一つ一つの作業が独立して見えるため、実行漏れも防げます。"},{"m":14,"q":"読み手に「他人事」ではなく「自分事」として主体的に行動してもらうための文末表現はどれですか？","o":["「○○を確認」のように名詞で切る","「○○を確認する」と動詞で言い切る","「○○が良いとされる」と受動的に書く","「○○かも」と曖昧にする"],"h":"「動き」を言葉として完結させることで、読み手の脳に実行指令を送ります。","c":1,"e":"動詞で言い切る（能動態）ことで、読み手はその動作の主体が自分であることを認識し、スムーズに行動へ移ることができます。"},{"m":14,"q":"「あれはしないように」といった禁止事項（禁止語）ばかりを並べてはいけない理由は何ですか？","o":["ページが暗い印象になるから","読み手が正しい方向性（何をすべきか）を見失い、嫌悪感を抱く可能性があるから","禁止事項は守らなくてよいから","書くのが大変だから"],"h":"「ダメ」と言われるだけでは、「じゃあどうすればいいの？」という迷いが生じます。","c":1,"e":"基本は「これをする」という能動的な指示をベースにします。どうしても危険な場合などに限り、禁止事項を厳選して記載するのがコツです。"},{"m":14,"q":"「悪い例：事前連絡なしに訪問してはいけない」という禁止表現を、能動的な良い表現に書き換えるとどうなりますか？","o":["訪問してはいけない","訪問前には必ず事前連絡を入れる","事前連絡は大切である","連絡なしの訪問は避けるべきだ"],"h":"「〜してはいけない」を「〜する」という肯定的な指示に変えます。","c":1,"e":"「するべきこと」をズバリ書くことで、読み手は迷うことなく正しい行動を選択できます。"},{"m":14,"q":"マニュアルの文章が目指すべき「わかりやすさ」のレベルは、一般的にどのくらいとされていますか？","o":["大学の教授が理解できるレベル","小学生や中学生でも理解できるシンプルで平易なレベル","専門家同士にしか通じないレベル","流行語を多用したレベル"],"h":"マニュアルは「頭を使うための本」ではなく「迷わず動くための道具」です。","c":1,"e":"専門用語を極力排除し、誰が読んでも一意に（一つの意味に）解釈できる平易な言葉を使うことが、再現性を支えます。"},{"m":14,"q":"「悪い例：率先して動く」という曖昧な表現を、再現性を高めるために具体化するとどうなりますか？","o":["もっと頑張る","お客様に声をかける","自ら考える","素早く動く"],"h":"「何をすれば『率先して動いた』ことになるのか」という具体的なアクションを示します。","c":1,"e":"「率先して」のような形容詞や副詞は人によって解釈が異なります。具体的な動作（声をかける、等）に置き換えるのが標準化の鉄則です。"},{"m":14,"q":"作業指示において「必要最低限の情報」でシンプルに構成すべき理由は何ですか？","o":["紙代を節約するため","読み手が「考える」手間を省き、辿っていくだけで仕事が終わるようにするため","内容を秘密にするため","執筆者が楽をするため"],"h":"「悩む・迷う」をゼロにするには、余計な情報を削ぎ落とす必要があります。","c":1,"e":"情報が多すぎると、どれが重要か判断するのに脳のエネルギーを消費してしまいます。最短ルートだけを示すのが「良いマニュアル」です。"},{"m":14,"q":"本研修の例え話において、文章表現の統一とルール化を何に例えていましたか？","o":["豪華なフルコースの調理","「複雑な街の交通整理（信号や進行方向の明確化）」","終わりなき砂漠の旅","秘密の暗号解読"],"h":"一つ一つの進行方向を明確にし、迷わず目的地へ導くイメージです。","c":1,"e":"曖昧な信号（接続詞）をなくし、明確な進路（能動的な指示）を示す。これが組織のスピードを最大化する「執筆の交通整理」です。"},{"m":14,"q":"明日からオペレーションの文章を書く際、最も意識すべき「排除すべきもの」は何ですか？","o":["句読点","接続詞（そして、また、なお等）と禁止語、および名詞止め","自分の名前","正しい手順"],"h":"この3つを排除するだけで、文章は驚くほど「指示」として強くなります。","c":1,"e":"これらを意識的に削ぎ落とすことで、迷いのない、極めて再現性の高い「生きたマニュアル」が完成します。"}]};
var QD=QUIZ_DATA,L=['A','B','C','D'];
var P=new URLSearchParams(location.search);
var modIdx=P.has('m')?parseInt(P.get('m')):null;
var allMode=P.has('all');
var showVideo=allMode||modIdx!==null;
var showCourse=P.get('course')==='1'||modIdx===null||allMode;
var mode=null;

// Build tabs
var tabs=document.getElementById('tabs');
if(allMode){
  tabs.innerHTML='<button class="tb t-video on" onclick="switchTab(\'select\')">\ud83d\udcfa 動画別テスト</button><button class="tb t-course" onclick="switchTab(\'course\')">\ud83d\udccb コース全体テスト</button>';
  // Build module list
  var ml=document.getElementById('modList');
  var qc=[10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10];
  QD.titles.forEach(function(t,i){
    var d=document.createElement('div');d.className='mc';
    d.innerHTML='<span class="mn">'+(i+1)+'</span><span class="mdiv"></span><div><span class="mt">'+t+'</span><div class="mt2">'+qc[i]+'問</div></div><span class="marr">→</span>';
    d.onclick=function(){pickMod(i)};

  });
  document.getElementById('panelSelect').style.display='block';

}else if(showVideo&&showCourse){
  tabs.innerHTML='<button class="tb t-video on" onclick="switchTab(\'video\')">\ud83d\udcfa この動画の確認テスト</button><button class="tb t-course" onclick="switchTab(\'course\')">\ud83d\udccb コース全体テスト</button>';
}else{tabs.style.display='none'}

// Init (non-all mode)
if(!allMode&&showVideo){
  document.getElementById('svTitle').textContent=QD.titles[modIdx]+' 確認テスト';
  var mc=QD.questions.filter(function(q){return q.m===modIdx}).length;
  document.getElementById('svCount').textContent=mc;
  document.getElementById('panelVideo').style.display='block';
}
if(!allMode&&showCourse){
  document.getElementById('panelCourse').style.display=showVideo?'none':'block';
}
if(!allMode&&!showVideo&&showCourse)document.getElementById('panelCourse').style.display='block';

// All-mode: pick a module
window.pickMod=function(idx){
  modIdx=idx;
  document.getElementById('panelSelect').style.display='none';
  document.getElementById('svTitle').textContent=QD.titles[idx]+' 確認テスト';
  var mc=QD.questions.filter(function(q){return q.m===idx}).length;
  document.getElementById('svCount').textContent=mc;
  document.getElementById('panelVideo').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

function switchTab(t){
  document.querySelectorAll('.tb').forEach(function(b){
    var isMatch=(t==='select'&&b.classList.contains('t-video'))||b.classList.contains('t-'+t);
    b.classList.toggle('on',isMatch);
  });
  var ps=document.getElementById('panelSelect');
  if(t==='select'){
    if(ps)ps.style.display='block';
    document.getElementById('panelVideo').style.display='none';
  }else if(t==='video'){
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='block';
  }else{
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='none';
  }
  document.getElementById('panelCourse').style.display=t==='course'?'block':'none';
}

// Quiz engine
var quizzes={video:{qs:[],ci:0,sc:0,ans:[]},course:{qs:[],ci:0,sc:0,ans:[]}};

window.go=function(m){
  mode=m;var qz=quizzes[m];qz.ci=0;qz.sc=0;qz.ans=[];
  if(m==='video'){
    qz.qs=QD.questions.filter(function(q){return q.m===modIdx});
    for(var i=qz.qs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=qz.qs[i];qz.qs[i]=qz.qs[j];qz.qs[j]=t}
  }else{
    var pool=[].concat(QD.questions),sel=[];
    var totalPool=pool.length,targetQ=Math.min(20,totalPool);
    for(var mm=0;mm<15;mm++){var mq=pool.filter(function(q){return q.m===mm});if(mq.length>0)sel.push(mq[Math.floor(Math.random()*mq.length)])}
    var rem=pool.filter(function(q){return sel.indexOf(q)<0});
    var extrasNeeded=targetQ-sel.length;
    for(var i=0;i<extrasNeeded;i++){var p=rem.splice(Math.floor(Math.random()*rem.length),1)[0];if(p)sel.push(p)}
    for(var i=sel.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sel[i];sel[i]=sel[j];sel[j]=t}
    qz.qs=sel;
  }
  g('start'+(m==='video'?'Video':'Course')).style.display='none';
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.style.display='block';
  showQ(m);qEl.scrollIntoView({behavior:'smooth'});
};

function g(id){return document.getElementById(id)}

function showQ(m){
  var qz=quizzes[m],q=qz.qs[qz.ci],total=qz.qs.length;
  var cls=m==='video'?'c-video':'c-course';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.innerHTML='<div class="pg"><div class="pgb"><div class="pgf '+cls+'" style="width:'+((qz.ci/total)*100)+'%"></div></div><div class="pgc">'+(qz.ci+1)+' / '+total+'</div></div>'
    +'<div class="qm">\ud83d\udcd8 '+QD.titles[q.m]+'</div>'
    +'<div class="qt">'+q.q+'</div>'
    +(q.h?'<button class="hb" onclick="tH(\''+m+'\')">\ud83d\udca1 ヒントを見る</button><div class="hi" id="hi_'+m+'">'+q.h+'</div>':'')
    +'<div class="os" id="os_'+m+'"></div>'
    +'<div class="ex" id="ex_'+m+'"></div>'
    +'<button class="nx '+cls+'" id="nx_'+m+'" onclick="nxt(\''+m+'\')">'+(qz.ci<total-1?'次の問題へ →':'結果を見る →')+'</button>';
  var os=g('os_'+m);
  q.o.forEach(function(opt,i){
    var d=document.createElement('div');d.className='o';
    d.innerHTML='<span class="ol">'+L[i]+'</span><span>'+opt+'</span>';
    d.onclick=function(){sel(m,i)};os.appendChild(d);
  });
}

window.sel=function(m,idx){
  var qz=quizzes[m],q=qz.qs[qz.ci];
  var opts=g('os_'+m).querySelectorAll('.o');
  if(opts[0].classList.contains('lk'))return;
  opts.forEach(function(o){o.classList.add('lk')});
  var ok=idx===q.c;if(ok)qz.sc++;
  qz.ans.push({q:q,sel:idx,ok:ok});
  opts[q.c].classList.add('ok');
  if(!ok)opts[idx].classList.add('ng');
  var e=g('ex_'+m);e.textContent=(ok?'\u2705 正解！ ':'\u274c 不正解… ')+q.e;e.style.display='block';
  g('nx_'+m).style.display='inline-block';
};

window.tH=function(m){var h=g('hi_'+m);h.style.display=h.style.display==='none'?'block':'none'};

window.nxt=function(m){
  var qz=quizzes[m];qz.ci++;
  if(qz.ci<qz.qs.length){showQ(m);g('q'+(m==='video'?'Video':'Course')).scrollIntoView({behavior:'smooth'})}
  else showResult(m);
};

function showResult(m){
  var qz=quizzes[m];
  g('q'+(m==='video'?'Video':'Course')).style.display='none';
  var rEl=g('r'+(m==='video'?'Video':'Course'));rEl.style.display='block';
  var pct=Math.round(qz.sc/qz.qs.length*100),pass=m==='video'?pct>=70:pct>=80;
  var rank,rc;
  if(pct>=95){rank='S';rc='#d4a017'}else if(pct>=85){rank='A';rc='#22c55e'}else if(pct>=75){rank='B';rc='#3b82f6'}else if(pct>=60){rank='C';rc='#f59e0b'}else{rank='D';rc='#ef4444'}
  var wrongs=qz.ans.filter(function(a){return!a.ok});
  var h='<div class="rc '+(pass?'ps':'fl')+'">'
    +'<div class="rk" style="color:'+rc+'">'+rank+'</div>'
    +'<div class="rs">'+pct+'%</div>'
    +'<div class="rd">'+qz.qs.length+'問中 '+qz.sc+'問正解</div>'
    +(pass?'<div class="rpm">\ud83c\udf89 '+(m==='video'?'よくできました！':'合格おめでとうございます！')+'</div>':'<div class="rfm">'+(m==='video'?'もう一度動画を見て再挑戦してみましょう。':'合格基準（80%）に届きませんでした。動画を復習して再挑戦してみましょう。')+'</div>')
    +'<button class="B '+(m==='video'?'bg':'bo')+'" onclick="retry(\''+m+'\')" style="margin-top:10px">もう一度受ける</button></div>';
  if(wrongs.length>0){
    h+='<div class="rvt">間違えた問題の復習</div>';
    wrongs.forEach(function(w){
      h+='<div class="rvi"><div class="qm" style="margin-bottom:4px">\ud83d\udcd8 '+QD.titles[w.q.m]+'</div>'
        +'<div class="rvq">'+w.q.q+'</div>'
        +'<div class="rvy">\u2717 あなたの回答：'+L[w.sel]+'. '+w.q.o[w.sel]+'</div>'
        +'<div class="rvc">\u25cb 正解：'+L[w.q.c]+'. '+w.q.o[w.q.c]+'</div>'
        +'<div class="rve">\ud83d\udca1 '+w.q.e+'</div></div>';
    });
  }else{h+='<div style="text-align:center;color:#22c55e;font-weight:700;font-size:16px;padding:16px">\ud83c\udf8a 全問正解です！</div>'}
  rEl.innerHTML=h;
  rEl.scrollIntoView({behavior:'smooth'});
}

window.retry=function(m){
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  g('start'+(m==='video'?'Video':'Course')).style.display='block';
};

window.backToList=function(){
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

// In all mode, add back button to video start panel
if(allMode){
  var sv=document.getElementById('startVideo');
  var bk=document.createElement('button');
  bk.className='mbk';bk.innerHTML='\u2190 モジュール一覧に戻る';
  bk.onclick=backToList;
  sv.insertBefore(bk,sv.firstChild);
}

// Auto-height: tell parent iframe to resize (no scrollbar)
function reportHeight(){
  var h=document.getElementById('R').scrollHeight+48;
  window.parent.postMessage({qh:h},'*');
}
var ro=new ResizeObserver(reportHeight);
ro.observe(document.getElementById('R'));
setTimeout(reportHeight,300);
</script>
