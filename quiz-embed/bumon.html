<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>確認テスト | 産業技術アカデミー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:transparent}
#R{font-family:'Noto Sans JP',system-ui,sans-serif;color:#f1f5f9;line-height:1.7;max-width:800px;margin:0 auto;padding:24px 16px}
#R *{box-sizing:border-box;margin:0;padding:0}
#R button{font-family:inherit;cursor:pointer}

/* Tabs */
.tt{display:flex;gap:0;margin-bottom:32px;background:#0f172a;border-radius:14px;padding:5px;border:1px solid #1e293b}
.tb{flex:1;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:700;border:none;background:transparent;color:#64748b;transition:all .3s;letter-spacing:.02em;text-align:center}
.tb:hover:not(.on){color:#94a3b8;background:rgba(255,255,255,.03)}
.tb.on{color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.tb.t-video.on{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;box-shadow:0 4px 16px rgba(34,197,94,.3)}
.tb.t-course.on{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 4px 16px rgba(245,158,11,.3)}

/* Start */
.S{border-radius:14px;padding:32px 24px;text-align:center}
.S.s-video{background:linear-gradient(135deg,rgba(34,197,94,.05),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.S.s-course{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(245,158,11,.08));border:1px solid rgba(245,158,11,.2)}
.S h3{font-size:18px;font-weight:700;margin-bottom:8px;color:#f1f5f9}
.S p{color:#94a3b8;font-size:14px;margin-bottom:20px;line-height:1.8}
.sp{display:flex;justify-content:center;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.sv{font-size:22px;font-weight:700}
.s-video .sv{color:#22c55e}
.s-course .sv{color:#f59e0b}
.sl{font-size:11px;color:#64748b}

/* Buttons */
.B{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:12px;font-size:16px;font-weight:700;border:none;transition:all .3s;position:relative;overflow:hidden}
.B::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);opacity:0;transition:opacity .3s}
.B:hover{transform:translateY(-3px)}.B:hover::after{opacity:1}
.B:active{transform:translateY(-1px)}
.B.bg{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000;box-shadow:0 6px 24px rgba(34,197,94,.3)}
.B.bo{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;box-shadow:0 6px 24px rgba(245,158,11,.3)}

/* Quiz */
.Q{display:none}
.pg{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.pgb{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.pgf{height:100%;border-radius:3px;transition:width .3s}
.pgf.c-video{background:#22c55e}.pgf.c-course{background:#f59e0b}
.pgc{font-size:13px;color:#64748b;white-space:nowrap}
.qm{font-size:12px;color:#06b6d4;margin-bottom:8px;font-weight:500}
.qt{font-size:16px;font-weight:600;margin-bottom:18px;line-height:1.6;color:#f1f5f9}
.hb{font-size:12px;color:#d4a017;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);border-radius:6px;padding:4px 12px;margin-bottom:14px;display:inline-block}
.hi{display:none;font-size:13px;color:#94a3b8;background:rgba(212,160,23,.05);border-left:3px solid #d4a017;padding:10px 14px;border-radius:6px;margin-bottom:14px}
.os{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.o{background:#111827;border:2px solid #1e293b;border-radius:10px;padding:13px 16px;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;text-align:left;color:#f1f5f9}
.o:hover:not(.lk){border-color:#334155;background:#1a2332}
.ol{width:26px;height:26px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#94a3b8}
.o.ok{border-color:#22c55e;background:rgba(34,197,94,.08)}.o.ok .ol{background:#22c55e;color:#fff}
.o.ng{border-color:#ef4444;background:rgba(239,68,68,.08)}.o.ng .ol{background:#ef4444;color:#fff}
.ex{display:none;background:rgba(59,130,246,.06);border-left:3px solid #3b82f6;border-radius:6px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#94a3b8;line-height:1.7}
.nx{display:none;border:none;border-radius:8px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.nx:hover{transform:translateY(-2px)}
.nx.c-video{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000}
.nx.c-course{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}

/* Result */
.Rs{display:none}
.rc{border-radius:14px;padding:32px 24px;text-align:center;margin-bottom:24px}
.rc.ps{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.rc.fl{background:linear-gradient(135deg,rgba(239,68,68,.04),rgba(239,68,68,.08));border:1px solid rgba(239,68,68,.2)}
.rk{font-size:52px;font-weight:700;margin-bottom:6px}
.rs{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.rd{font-size:14px;color:#94a3b8;margin-bottom:14px}
.rpm{font-size:15px;font-weight:600;color:#22c55e;margin-bottom:14px}
.rfm{font-size:15px;font-weight:600;color:#ef4444;margin-bottom:14px}
.rvt{font-size:16px;font-weight:700;margin-bottom:14px;color:#f59e0b}
.rvi{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:16px 18px;margin-bottom:10px;text-align:left}
.rvq{font-size:13px;font-weight:600;margin-bottom:6px;color:#f1f5f9}
.rvy{font-size:12px;color:#ef4444;margin-bottom:3px}
.rvc{font-size:12px;color:#22c55e;margin-bottom:6px}
.rve{font-size:12px;color:#94a3b8;line-height:1.6}

/* Module selector (all mode) */
.ms{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.mc{background:linear-gradient(135deg,#111827 0%,#0f172a 100%);border:1px solid #1e293b;border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:16px;text-align:left;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(34,197,94,.06) 0%,rgba(34,197,94,.02) 100%);opacity:0;transition:opacity .3s}
.mc:hover{border-color:#22c55e;transform:translateX(6px);box-shadow:0 4px 20px rgba(34,197,94,.12)}
.mc:hover::before{opacity:1}
.mc:active{transform:translateX(3px) scale(.99)}
.mn{width:36px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#22c55e;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;background:none;border:none;box-shadow:none;margin-right:4px;text-shadow:0 0 12px rgba(34,197,94,.25)}
.mc:hover .mn{color:#4ade80;text-shadow:0 0 20px rgba(34,197,94,.5);transform:scale(1.12)}
.mdiv{width:1px;height:32px;background:linear-gradient(180deg,transparent,#334155 30%,#334155 70%,transparent);flex-shrink:0;margin:0 4px;transition:background .3s}
.mc:hover .mdiv{background:linear-gradient(180deg,transparent,#22c55e 30%,#22c55e 70%,transparent)}
.mt{font-size:14px;color:#e2e8f0;font-weight:600;line-height:1.5;position:relative;z-index:1}
.mt2{font-size:11px;color:#64748b;font-weight:400;margin-top:2px}
.mc:hover .mt{color:#fff}
.mc:hover .mt2{color:#94a3b8}
.marr{margin-left:auto;color:#334155;font-size:16px;transition:all .3s;position:relative;z-index:1}
.mc:hover .marr{color:#22c55e;transform:translateX(3px)}
.mhd{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mhd::before{content:'';display:inline-block;width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,#22c55e,#4ade80)}
.msd{font-size:13px;color:#94a3b8;margin-bottom:20px;padding-left:12px}
.mbk{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #1e293b;background:#111827;color:#94a3b8;cursor:pointer;margin-bottom:16px;transition:all .25s}
.mbk:hover{background:#1e293b;color:#f1f5f9;border-color:#334155;transform:translateX(-3px)}
.mcnt{display:inline-flex;align-items:center;justify-content:center;background:rgba(34,197,94,.1);color:#22c55e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px}

@media(max-width:600px){.qt{font-size:14px}.o{padding:11px 13px;font-size:13px}.S{padding:24px 16px}}
</style>
</head>
<body>
<div id="R">
  <div class="tt" id="tabs"></div>
  <div id="panelSelect" style="display:none">
    <div class="mhd">動画別 確認テスト<span class="mcnt">全22回</span></div>
    <div class="msd">テストしたいモジュールを選んでください</div>
    <div class="ms" id="modList"></div>
  </div>
  <div id="panelVideo" style="display:none">
    <div class="S s-video" id="startVideo">
      <h3 id="svTitle"></h3>
      <p>この動画の内容から出題されます。</p>
      <div class="sp">
        <div><div class="sv" id="svCount">10</div><div class="sl">問題数</div></div>
        <div><div class="sv">解説付き</div><div class="sl">正誤判定</div></div>
      </div>
      <button class="B bg" onclick="go('video')">テストを始める →</button>
    </div>
    <div class="Q" id="qVideo"></div>
    <div class="Rs" id="rVideo"></div>
  </div>
  <div id="panelCourse" style="display:none">
    <div class="S s-course" id="startCourse">
      <h3>中小企業向け 部門立ち上げコース 確認テスト</h3>
      <p>22モジュールの内容からランダムに22問出題されます。</p>
      <div class="sp">
        <div><div class="sv">22</div><div class="sl">問題数</div></div>
        <div><div class="sv">80%</div><div class="sl">合格ライン</div></div>
      </div>
      <button class="B bo" onclick="go('course')">コーステストを始める →</button>
    </div>
    <div class="Q" id="qCourse"></div>
    <div class="Rs" id="rCourse"></div>
  </div>
</div>
<script>
const QUIZ_DATA = {"titles":["中小企業における品質部門の役割とメリット","少人数・兼務で回す品質組織の考え方","「品質は部門ではなく会社全体の仕事」","品質方針と品質目標のつくり方（中小企業版）","必要最低限の標準類と品質ルールの決め方","不良・クレーム・手戻りの記録の取り方","現場ボードと朝会で回す品質日常管理","「簡易QMS」の全体像を描く（ISO未取得前提）","標準書・帳票のテンプレート設計","中小企業向け4M変更管理の仕組みづくり","外注・仕入先の品質要求と合意の取り方","中小工場でのバリデーション入門：やりすぎない特殊工程管理","予防保全のツボ：中小企業でも続けられる設備保全","中小企業のための工程能力指数（Cp・Cpk）の使いどころ","品質部門立ち上げロードマップ（1〜5ヶ月）","品質部門立ち上げロードマップ（6〜12ヶ月）","品質責任者・担当者の役割と1日の仕事","取引先監査・顧客要求への現実的な対応","Excel＋クラウドで始める品質データ管理","中小企業における「品質マネジメント」とは何か","検査項目と検査規格の策定","品質部門の運用と継続"],"questions":[{"m":0,"q":"リソースが限られた中小企業において、品質部門が担うべき「司令塔」としての本来の役割は何ですか？","o":["現場のミスを厳しく叱ること","単なる製品検査だけでなく、QMS（品質マネジメントシステム）の有効性と効率性を継続的に改善する仕組みを設計・維持すること","不良品の数を数えるだけ","社長の機嫌を伺うこと"],"h":"「検査」は手段であり、目的は「会社が良くなる仕組み」を作ることです。","c":1,"e":"品質部門は、データに基づきムダ・ムラ・ムリを排除し、組織全体が効率よく高品質な製品を生み出せるようナビゲートする役割を担います。"},{"m":0,"q":"品質問題によって発生する「ムダ（検査・手直し・廃棄・クレーム対応費など）」を定量的に示した指標を何と呼びますか？","o":["売上高","COPQ（品質失敗コスト）","広告宣伝費","接待交際費"],"h":"「失敗しなければかからなかったはずのコスト」のことです。","c":1,"e":"COPQを可視化することで、品質改善が単なる「綺麗事」ではなく、直接的な「利益創出」に繋がることを経営層に納得させることができます。"},{"m":0,"q":"集まった不良データを「人ごと」「設備ごと」「時間帯」などに分けて分析し、ばらつきの原因を特定する手法を何と呼びますか？","o":["層別","放置","勘","全数検査"],"h":"データを「層」に分けて比較することで、真犯人（重点原因）が見えてきます。","c":0,"e":"層別分析を行うことで、限られたリソースを「どこに集中投下すべきか」という重点指向の判断が可能になります。"},{"m":0,"q":"中小企業において、熟練社員の知識を「人」から「仕組み」へ移行させるために品質部門が推進すべき活動は何ですか？","o":["飲み会での伝承","業務マニュアルの作成と標準化","記憶力のトレーニング","放置"],"h":"その人が辞めても、新入社員が同じ品質で作れるようにするための「教科書」作りです。","c":1,"e":"マニュアル化は、技術の属人化を防ぎ、組織としての再現性と安定性を確保するための経営資産づくりです。"},{"m":0,"q":"外注先（協力会社）との関係において、自社での受入検査を減らし、相手の品質を向上させるための高度な戦略は何ですか？","o":["もっと厳しく検査する","外注先を「品質保証のパートナー」と捉え、不適合時の損害賠償契約等を含めたリスク転嫁と自律的な品質管理を促す","検査をすべてやめる（何もしない）","値下げだけを要求する"],"h":"「不適合を見つける」のではなく、「不適合を出させない契約と信頼」を築きます。","c":1,"e":"外注先に「自分たちが品質の責任者だ」という当事者意識を持たせることが、結果的に自社の管理コスト低減と品質向上に直結します。"},{"m":0,"q":"具体的事例において、特定の旧型設備Xで不良が急増した際、品質部門が経営層に行った報告として「より高度なもの」はどれですか？","o":["「みんな注意が足りません」","「設備Xの〇〇手順において、誰が、どのダブルチェックを行わなかったか」という具体的な事実と、そのリスク予測","「機械が古いのでダメです」","「頑張ります」"],"h":"経営者が「投資」や「教育」の判断を下せるだけ 厚さ・重さ・見た目","精神論・根性・努力"],"h":"「誰でもできる」「すぐに見つけられる」「原理原則がわかる」ことが大切です。","c":1,"e":"この3要素を盛り込むことで、マニュアルは単なる置物ではなく、技術伝承や新人教育の強力なツール（教科書）に進化します。"},{"m":1,"q":"少人数での内部監査において、限られたリソースを有効活用するための「重点指向」の考え方はどれですか？","o":["すべての工程を均等に調べる","プロセスの重要性や過去の不適合実績に基づき、頻度や範囲を戦略的に策定する","監査を中止する","仲の良い部署だけ監査する"],"h":"「どこを重点的に見るか」というリスクベースの考え方が必要です。","c":1,"e":"リスクの高い領域に監査を集中させることで、少ない人数でもシステムの有効性を効率的に検証することができます。"},{"m":1,"q":"不適合が発生した際、品質責任者に与えられているべき最も重要な権限は何ですか？","o":["始末書を書かせる権限","生産停止権限（およびそれが周知されていること）","飲み会の幹事をする権限","給料を上げる権限"],"h":"不良品を「作らない・出さない」ための最後の砦となる権限です。","c":1,"e":"異常時にラインを止める権限が担保されていなければ、品質保証は機能しません。各シフトの責任者がこの権限を認識している証拠も審査で求められます。"},{"m":1,"q":"少人数で効率的にデータを分析し、問題の「真犯人（重点原因）」を特定するために有効な手法は何ですか？","o":["多数決","層別分析（人・設備・ロット等で分ける）","全員で話し合うだけ","データを捨てる"],"h":"データを分けて比べることで、ばらつきの違いを浮き彫りにします。","c":1,"e":"層別を行うことで、漠然とした「不良」が「特定の設備」や「特定の時間帯」に集中していることが見え、対策をピンポイントで打てるようになります。"},{"m":1,"q":"大量のデータを階層的に配置し、素早く集計・分析できるエクセルの機能を何と呼びますか？","o":["セル結合","ピボットテーブル","フォント変更","印刷プレビュー"],"h":"クロス集計や重点指向による意思決定を強力に支援するツールです。","c":1,"e":"ピボットテーブルを使いこなすことで、分析にかかる時間を大幅に短縮し、本来の「改善アクション」に時間を割くことができます。"},{"m":1,"q":"具体的事例において、設計責任者が「品質責任者」を兼務することで得られる最大のメリットは何ですか？","o":["給料が2人分もらえる","設計の専門知識を活かし、リスクを製品実現の「源流（設計・開発段階）」でコントロールできる","自分のミスを隠せる","忙しさをアピールできる"],"h":"「後工程」で不適合を見つけるより、「前工程」で防ぐ方が効率的です。","c":1,"e":"設計部門が品質を兼ねることで、FMEA（故障モード影響解析）やコントロールプランを実効性のあるものにし、源流から品質を作り込むことが可能になります。"},{"m":1,"q":"本研修の例え話として、少人数・兼務体制の品質組織を何に例えていましたか？","o":["豪華なフルコースのキッチン","「多機能なツールナイフ（機能の切り替えと正確な活用）」","終わりなき旅の荷物","秘密の暗号"],"h":"一つの道具に複数の機能を持ち、最小限の動きで最大の結果を出すイメージです。","c":1,"e":"兼務者は「多機能」であるからこそ、状況に応じてデータ分析やリスク評価といった機能を使い分け、一点を射抜くような効率的な管理が求められます。"},{"m":2,"q":"「品質」という言葉を広義に捉えた場合、製品の仕様への適合性以外に何が含まれますか？","o":["接待の質","仕事の質（安全、整理整頓、納期遵守など）","従業員の趣味の質","事務所の豪華さ"],"h":"「品質に無関係な人などいない」という考え方の根拠となるものです。","c":1,"e":"品質マネジメントとは、製品そのものだけでなく、それらを生み出す「プロセス（仕事）」の質を管理することです。ムダ・ムラ・ムリのない仕事が、最終的な製品品質を支えます。"},{"m":2,"q":"QMS（品質マネジメントシステム）を構築・運用する最終的な経営上の目的は何ですか？","o":["審査員に褒められること","収益や市場占有率の向上、コストやサイクルタイムの改善などの経営成果","書類の山を作ること","担当者を忙しくさせること"],"h":"QMSは「経営ツール」そのものであるべきです。","c":1,"e":"ISO 9001などの規格は、顧客満足の向上を通じて、組織が持続的に成長し、ビジネス上の成果を出すための仕組みとして設計されています。"},{"m":2,"q":"不適合が発生した際、その場しのぎの対策ではなく、原因をプロセスの上流まで遡って特定し改善することを何と呼びますか？","o":["現状維持","源流管理","事後処理","責任転嫁"],"h":"「後工程」で苦労しないよう、「前工程」で問題を摘み取ることです。","c":1,"e":"設計や企画といった「源流」でリスクを排除することで、製造現場でのトラブルや市場クレームを劇的に減らすことができます。"},{"m":2,"q":"品質の源流において、「営業・企画部門」が果たすべき最も重要な役割は何ですか？","o":["とにかく安く売る","顧客のニーズや期待を的確に把握し、設計部門に正しく伝える","納品だけを行う","製造現場に指示を出す"],"h":"「顧客が何を求めているか」という情報の精度が、品質の出発点です。","c":1,"e":"顧客の要求事項が曖昧なまま設計が始まると、どんなに立派な製品を作っても「顧客満足」には繋がりません。"},{"m":2,"q":"設計・開発部門が後工程の製造に迷惑をかけないために、アウトプットに含めるべき工夫は何ですか？","o":["難しい数式","製品のエラー防止（ポカヨケ）の組み込み","予算の増額要求","責任回避の文言"],"h":"「誰が作っても間違えようがない設計」を目指します。","c":1,"e":"設計段階でポカヨケ（誤り防止）を考慮することで、製造現場での「人為的な誤り」を物理的に防ぐことが可能になります。"},{"m":2,"q":"購買部門が協力会社の品質レベルを向上させるための、論理的かつ高度な手法は何ですか？","o":["届いたものを自社で全数検査する","協力会社を品質保証の依頼先として扱い、不適合時の損害賠償契約等で自律的な保証を促す","担当者を叱咤激励する","取引をすぐに打ち切る"],"h":"「受入検査をするのは、相手を信用していない（または相手が保証していない）証拠」という考え方です。","c":1,"e":"協力会社に「自ら品質を保証して納品する」仕組みを持たせることが、自社の検査コスト削減と全体の品質向上に繋がります。"},{"m":2,"q":"組織内の次の工程を担当する部署や人を、どのように捉えるべきだという考え方が品質保証の大前提ですか？","o":["ライバル","後工程はお客様","監視役","部下"],"h":"自分の仕事の結果を受け取る相手を、最高の満足を提供すべき対象と考えます。","c":1,"e":"「次の工程が困らないように仕事をする」という意識が全社員に浸透すれば、部門間の壁（セクショナリズム）は消え、組織全体の品質が高まります。"},{"m":2,"q":"具体的事例において、設計ミスによるクレームを防ぐために導入された、製造側が「その設計で本当に作れるか」を評価する仕組みを何と呼びますか？","o":["性能テスト","フィージビリティレビュー（実行可能性評価）","コスト計算","最終検査"],"h":"設計と製造が部門横断的（CFT）に連携して行う評価です。","c":1,"e":"設計段階で製造現場の意見を取り入れることで、製造限界を超えた無理な仕様設定による不良の発生を未然に防ぐことができます。"},{"m":2,"q":"少人数・兼務体制の中小企業において、固有技術を「組織の資産」として蓄積するために必要なことは何ですか？","o":["熟練者の頭の中に置いておく","業務マニュアル等による標準化（形式知化）","秘密にする","外部に丸投げする"],"h":"「人」に依存せず、誰でも同じ水準で仕事ができるようにします。","c":1,"e":"業務フローや要求水準をマニュアル化することで、特定の人への依存を減らし、教育・訓練の効率も飛躍的に向上します。"},{"m":2,"q":"本研修のまとめとして、全社的な品質マネジメントを何に例えていましたか？","o":["豪華なフルコース","「オーケストラの全奏者による協奏」","終わりなき旅","秘密の暗号"],"h":"指揮者（経営層）のもと、各パート（部門）が調和し、一つの楽曲（製品）を作り上げるイメージです。","c":1,"e":"特定の部署だけが頑張るのではなく、全奏者が「顧客満足」という一つのゴールに向かって自律的に、かつ連携して動くこと。これこそが品質保証の理想の姿です。"},{"m":3,"q":"中小企業における「品質方針」の本来の役割として、最も適切なものはどれですか？","o":["壁に貼って来客にアピールするための掲示物","QMS活動の原点であり、組織がどこに向かうべきかの指針（羅針盤）","審査員に質問された時に答えるための暗記項目","従業員の給料を決めるための基準"],"h":"経営者の想い（ビジョン）を全社に浸透させるための「宣言」です。","c":1,"e":"品質方針は、経営理念に基づき、組織がどのような価値を顧客に提供し、どのような姿勢で品質（仕事の質）に向き合うかを示す最上位の指針です。"},{"m":3,"q":"品質方針を策定する際、盛り込むべき「中小企業ならでは」の視点は何ですか？","o":["難しい専門用語を並べる","「仕事の質」を向上させ、ムダ・ムラ・ムリ（3ム）を排除してコスト改善に繋げるという枠組み","他社のスローガンをそのままコピーする","精神論だけで具体性を排除する"],"h":"リソースが限られているからこそ、効率（儲け）に直結する視点が不可欠です。","c":1,"e":"「品質向上＝コスト削減・収益改善」という図式を方針に示すことで、QMS活動がボランティアではなく「本業そのもの」であると全社員に認識させます。"},{"m":3,"q":"品質目標（QO）を設定する際の黄金律「SMART原則」の「M」が指す意味は何ですか？","o":["精神的に頑張る（Mental）","測定可能である（Measurable）","魔法のように達成する（Magic）","ミスを隠す（Mask）"],"h":"達成できたかどうか、客観的に判定できなければなりません。","c":1,"e":"「顧客満足の向上」という抽象的な表現ではなく、「クレーム件数10%削減」のように数値化することで、活動の成果が明確になります。"},{"m":3,"q":"中小企業が限られた資源を効果的に使うために、品質目標の対象を絞り込む考え方を何と呼びますか？","o":["放任主義","重点指向","全方位外交","運任せ"],"h":"「あれもこれも」ではなく、「ここを叩けば一番効く」という場所を狙います。","c":1,"e":"すべての問題を同時に解決するのは不可能です。COPQ（不良コスト）の高い項目など、効果の大きいテーマにリソースを集中させます。"},{"m":3,"q":"「品質失敗コスト（COPQ）」を目標に設定する最大のメリットは何ですか？","o":["事務作業が楽しくなる","付加価値を生まず、原価だけを高める「ムダ」を可視化し、利益改善に直結させられる","責任者を叱る材料になる","銀行の融資が必ず通る"],"h":"「失敗しなければ利益だったはずのお金」を浮き彫りにします。","c":1,"e":"COPQの低減は、売上を上げることと同じ、あるいはそれ以上に効率的な利益創出の手法となります。"},{"m":3,"q":"製造工程において、製品の安全性や機能に重大な影響を与える特性（特殊特性：SC）を管理する指標を何と呼びますか？","o":["視力検査","工程能力指数（Cp・Cpk）","欠勤率","整理整頓指数"],"h":"「ばらつき」が許容範囲内に収まっているかを統計的に測る指標です。","c":1,"e":"工程能力を監視し向上させることで、不良品が出る「予兆」を掴み、未然に防ぐ高度な管理が可能になります。"},{"m":3,"q":"もし年度末に品質目標が「未達」に終わった場合、QMSの考え方として正しい捉え方はどれですか？","o":["担当者を厳しく罰して終わる","目標の設定が厳しすぎたとして来年は下げる","QMSやプロセスに改善の余地がある証拠（お宝）と捉え、継続的改善の糧にする","記録を書き換えて達成したことにする"],"h":"「なぜ未達だったか」という分析こそが、次なる成長のヒントになります。","c":2,"e":"未達は失敗ではなく「伸び代」です。原因を分析し、仕組みを修正することこそがPDCAサイクルの本質です。"},{"m":3,"q":"膨大な不良データを「時間帯」「作業者」「設備」などで分類し、真の原因を浮き彫りにする分析手法を何と呼びますか？","o":["層別（そうべつ）","多数決","噂話","放置"],"h":"具体例の中條食品が、不良が特定の「夜間シフト」に集中していることを見抜いた手法です。","c":0,"e":"データを分けて比較することで、「どこに問題があるか」が一目瞭然になり、的確な是正処置が可能になります。"},{"m":3,"q":"大量のデータを階層的に集計し、素早く全体の傾向を可視化できるExcelの便利な機能を何と呼びますか？","o":["文字の拡大","ピボットテーブル","枠線の色変更","上書き保存"],"h":"データの発生頻度やばらつきを「ひと目でわかる」ようにまとめる工夫に役立ちます。","c":1,"e":"ピボットテーブルを使いこなすことで、分析にかかる時間を劇的に短縮し、迅速な経営判断を支援できます。"},{"m":3,"q":"本研修の例え話として、品質方針と品質目標を何に例えていましたか？","o":["豪華なフルコース","「山頂を目指すための、地図と高度計」","終わりなき旅","秘密の暗号"],"h":"「どこへ行くか（地図）」と「今どこまで来たか（高度計）」を確認する道具です。","c":1,"e":"地図（方針）がなければ迷い、高度計（目標の監視）がなければ進捗がわかりません。この両輪が揃って初めて、組織は目標とする成果（山頂）に到達できます。"},{"m":4,"q":"ISO 9001:2015において、文書化に関する個別の要求（品質マニュアルの必須化など）が削減された主な意図は何ですか？","o":["文書を一切作らなくて良いため","組織自らが「何が必要か」を判断し、形骸化を防いで実効性を高めるため","審査費用を下げるため","事務員の仕事を減らすため"],"h":"「形式」よりも「実質的な品質保証」に重きを置いています。","c":1,"e":"規格が「あれこれ作れ」と指示するのではなく、組織が自分のリスクに合わせて「この文書がないと現場が困る」というものを自律的に判断することが求められています。"},{"m":4,"q":"中小企業がマニュアルや手順書を作成する最大の戦略的な目的は何ですか？","o":["審査員に見せるため","業務の最低水準を明確にし、属人化していた「固有技術」を組織の知識として蓄積・再現するため","責任転嫁をするため","机を綺麗にするため"],"h":"「あの人がいないとできない」を「誰でもできる」に変える活動です。","c":1,"e":"文書化は、個人の頭の中にある「コツ」を組織の「資産（形式知）」に変えるプロセスであり、技術伝承と品質の安定に直結します。"},{"m":4,"q":"リソースが限られている場合、最優先で文書化（標準化）すべき「高リスク領域」はどこですか？","o":["事務用品の購入手順","安全性や機能に直結する「特殊特性（SC）」や「4M変更管理」のプロセス","社内イベントの企画書","挨拶の仕方"],"h":"「ここを間違えると重大な不適合や事故に繋がる」という場所を狙います。","c":1,"e":"すべてを文書化するのは不可能です。SC（特殊特性）の管理や、トラブルの火種になりやすい4M（人・設備・材料・方法）の変更ルールに資源を集中させるのが知的な戦略です。"},{"m":4,"q":"実効性の高いマニュアルを設計する際の「3つの基本要素」として正しい組み合わせはどれですか？","o":["序論・本論・結論","目的（Why）・結果（Goal）・行動（How）","過去・現在・未来","精神・技術・体力"],"h":"「なぜやるか」「どうなれば成功か」「どう動くか」を明確にします。","c":1,"e":"この3要素が揃うことで、作業者は「作業の意味」と「合格の基準」を理解した上で、迷いなく「正しい行動」を取れるようになります。"},{"m":4,"q":"帳票（記録）の設計において、判断のばらつきを減らし、迅速な初動対応を可能にする工夫は何ですか？","o":["文字を細かく書く","色彩基準（良品は青、不良品は赤など）を活用した視覚的な識別","鉛筆で書く","記録を1ヶ月分まとめて書く"],"h":"「考えさせない」「直感で体が動く」工夫です。","c":1,"e":"色による識別は、言語や経験の差を超えて瞬時に状況を判断させる「ポカヨケ」の一種であり、ヒューマンエラー防止に極めて有効です。"},{"m":4,"q":"不適合が発生した際の記録において、「原因分析」に役立つ記述の仕方はどれですか？","o":["「作業者が注意不足だった」","「3名中1名が、規定のダブルチェック手順を飛ばしていた」などの具体的な事実","「機械の調子が悪かった」","「以後気をつけます」"],"h":"「なぜ起きたか」を分析し、仕組みを直せるだけの具体的な情報を残します。","c":1,"e":"具体的な事実が記載されて初めて、手順書の改訂や治具の改善といった「仕組みの是正」が可能になります。"},{"m":4,"q":"「目視検査」など、言葉では伝えにくい判断基準をマニュアル化するのに最も有効な手段は何ですか？","o":["長い文章で説明する","写真見本（限度見本）や図解を用いる","熟練者の背中を見せるだけにする","想像に任せる"],"h":"「百聞は一見にしかず」をマニュアルに落とし込みます。","c":1,"e":"視覚情報は判読性が高く、人による判断のブレを最小限に抑えます。2025年版GMPでも「図解や写真」の活用は強く推奨されています。"},{"m":4,"q":"文書を作成・運用・管理・更新し、常に現場の実態に合わせ続けるサイクルを何と呼びますか？","o":["リサイクル","マニュアルサイクル","ライフサイクル","自転車操業"],"h":"「作って終わり」にしないための継続的な改善活動です。","c":1,"e":"現場が変わればルールも変わります。定期的な見直しと更新（マニュアルサイクル）が回っていない文書は、すぐに死んだ文書（足かせ）になります。"},{"m":4,"q":"本研修の例え話として、必要最低限の品質ルールを何に例えていましたか？","o":["豪華なフルコース","「少人数の職人集団のための、シンプルで高性能な工具箱」","終わりなき旅","秘密の暗号"],"h":"本当に必要な道具だけが、いつでも使える状態で入っているイメージです。","c":1,"e":"無駄な書類（使わない工具）を捨て、これさえあれば現場が守れるという「研ぎ澄まされたルール」だけを持つことが、中小企業の強みになります。"},{"m":4,"q":"明日から自社の「標準類（手順書など）」を見直す際、最初に行うべきことは何ですか？","o":["ページ数を増やす","現場の「高リスクな作業（SC等）」が、写真や5W1Hで誰でも再現できる状態かを確認する","すべてを動画にする","難しい言葉に書き換える"],"h":"「実効性」と「再現性」がキーワードです。","c":1,"e":"現場を歩き、現在のマニュアルが本当に「現場の守り神」になっているか、それとも「ただの紙」になっているかを自分の目で確かめることが、改善の第一歩です。"},{"m":5,"q":"不適合製品（不良品やクレーム品）が発生した際、記録を取る前にまず実施すべき「封じ込め」の目的は何ですか？","o":["犯人を見つけること","不適合品が誤って使用、加工、出荷、納入されないように識別・管理すること","すぐに修理すること","記録を隠すこと"],"h":"被害をこれ以上広げないための「応急処置」です。","c":1,"e":"問題が発生した直後は、まずその製品を隔離・識別し、次工程や顧客へ流出させないことが最優先です。その処置内容も記録に残す必要があります。"},{"m":5,"q":"計測機器が要求事項に適合していない（校正外れなど）ことが判明した場合、記録に残すべき最も重要な「評価」は何ですか？","o":["機器の購入価格","その機器でそれまでに測定した結果の妥当性の評価（遡及処置の要否）","機器の色","担当者の名前"],"h":"「その狂った物差しで測った過去の製品は大丈夫か？」という確認です。","c":1,"e":"計測機器の不備は、過去に「良品」と判断した製品すべてが「不良」である可能性を示唆します。この遡及（そきゅう）調査の結果は、法的・品質的な客観的証拠として不可欠です。"},{"m":5,"q":"是正処置（再発防止）に繋げるための「良い記録」の書き方はどれですか？","o":["「作業者が注意不足だった」","「3名中1名が、規定のダブルチェック手順を飛ばしていた」などの具体的な事実","「機械が古かった」","「以後気をつけます」"],"h":"具体例にある通り、リスクを予測し、原因を深掘りできる情報を含めます。","c":1,"e":"具体的な事実が記載されて初めて、「手順が難しいのか？」「なぜ忘れたのか？」という「なぜなぜ分析」が可能になります。"},{"m":5,"q":"不適合の記録に対して「作業者を教育した」という回答だけで終わらせる「修正処置」の問題点は何ですか？","o":["教育は意味がないから","根本原因（仕組みの欠陥）に手を打っておらず、再発を防げないから","時間がかかるから","お金がかかるから"],"h":"人は忘れる生き物です。「人に頼る対策」は限界があります。","c":1,"e":"教育は重要ですが、それだけでは「うっかりミス」を根絶できません。手順の変更やポカヨケの導入など、仕組みの改善（是正処置）まで踏み込む必要があります。"},{"m":5,"q":"データの発生頻度や「ばらつき」の状態をひと目で読み取るために作成する統計的な図を何と呼びますか？","o":["似顔絵","ヒストグラム","世界地図","カレンダー"],"h":"品質管理は「ばらつきとの闘い」です。","c":1,"e":"ヒストグラムを用いることで、平均値からのズレや分布の広がりを可視化でき、プロセスの安定性を客観的に判断できます。"},{"m":5,"q":"問題解決の近道として、データを「人」「設備」「材料」「方法」などで分けて比較する手法を何と呼びますか？","o":["多数決","層別（ストラティフィケーション）","噂話","放置"],"h":"「AさんとBさんで差があるか？」などを検証する手法です。","c":1,"e":"層別を行うことで、漠然とした不良が「特定の機械」や「特定の原材料ロット」に集中していることが見え、真の原因を迅速に特定できます。"},{"m":5,"q":"複数の項目を階層的に配置し、集計内容を切り替えて全体の状況を素早く把握できるExcelの機能を何と呼びますか？","o":["フォント変更","ピボットテーブル","上書き保存","セル結合"],"h":"「重点指向」で取り組むべき問題を明確にするための強力なツールです。","c":1,"e":"ピボットテーブルを使えば、膨大な不良記録から「どのエリアのどの設備が一番の問題か」を瞬時に抽出でき、効率的な意思決定を支援します。"},{"m":5,"q":"具体例の計測機器の校正外れにおいて、ピボットテーブル分析を行った結果、どのような「仕組みの是正」が検討されましたか？","o":["担当者を叱る","計測機器管理の手順や保全システムそのものの改善","機器をすべて捨てる","検査を中止する"],"h":"個人のミスに帰結させず、組織的なリソース投入を判断しました。","c":1,"e":"特定のエリアで頻発しているなら、それは人の問題ではなく「管理ルール」や「保管環境」に問題がある可能性が高いため、仕組みを直します。"},{"m":5,"q":"本研修の例え話として、不良・クレームの記録を何に例えていましたか？","o":["豪華なフルコースの献立","「病気の原因を探る精密検査記録」","終わりなき旅の荷物","秘密の暗号"],"h":"真因を科学的に突き止め、再発しない体質（仕組み）に変えるための羅針盤です。","c":1,"e":"記録は単なる報告書ではなく、組織の「健康状態」を診断し、治療（改善）するための不可欠なデータです。"},{"m":5,"q":"明日から現場で不適合の記録を書く際、最も意識すべきことは何ですか？","o":["なるべく短く済ませる","「なぜなぜ分析」ができるような具体的な事実を書き、リスクの想定に役立てる","自分のミスは書かない","綺麗な字で書くことだけを考える"],"h":"「記録は戦略情報」という言葉を思い出してください。","c":1,"e":"あなたの書く具体的な一文が、将来の大きな損失を防ぎ、会社の仕組みをより強くする「知恵」に変わります。"},{"m":6,"q":"品質マネジメントにおける「日常管理（SDCA）」の「S」は何を指しますか？","o":["スピード（Speed）","標準（Standard）","精神（Spirit）","笑顔（Smile）"],"h":"決められたルールや手順を守り、現状を維持することです。","c":1,"e":"SDCAは、標準（Standard）を確立し、実行（Do）、確認（Check）、処置（Act）を行うサイクルです。これによって品質を一定の水準に「維持」します。"},{"m":6,"q":"現場ボードの役割として、最も適切なものはどれですか？","o":["綺麗な写真を飾る","誰が見ても「今、何が起きているか」「標準から逸脱していないか」がひと目でわかるようにすること","難しい数式を並べる","社長の格言を毎日貼り替える"],"h":"「見える化」によって、異常にいち早く気づけるようにします。","c":1,"e":"現場ボードは「情報の交差点」です。正常か異常かが瞬時に判別できる状態にすることで、問題の早期発見と対策が可能になります。"},{"m":6,"q":"現場において、物が自分たちの居場所や状態（良品・不良品など）を自ら主張しているような状態を何と呼びますか？","o":["独り言","物申す（ものもうす）","紛失","沈黙"],"h":"探すムダを排除し、誰が見ても状態がわかる工夫です。","c":1,"e":"「物申す」環境とは、定品・定位置・定量を徹底し、色彩基準などを用いて「自分は良品です」「私は今検査待ちです」と物が語りかけてくるような状態を指します。"},{"m":6,"q":"判断のばらつきを減らすために、良品は「青」、不良品は「赤」のように決めるルールを何と呼びますか？","o":["ラッキーカラー","色彩基準","信号機ルール","虹色管理"],"h":"「読んで考える」のではなく「感覚で体が動く」ようにする工夫です。","c":1,"e":"色彩基準を導入することで、言語や経験の差に関わらず、誰でも瞬時に正しい識別ができるようになり、誤使用や誤出荷を物理的に防ぎます。"},{"m":6,"q":"朝会（ミーティング）をQMSの機能として活用する場合、特にどのステップ（アルファベット）の役割を担いますか？","o":["P（計画）","D（実施）","C（チェック・検証）","なし"],"h":"前日の結果を見て、計画通りか、異常はないかを確認する場です。","c":2,"e":"朝会は、現場ボードに示された事実（KPIや不良率）を確認する「C（チェック）」の場です。ここで異常を見つけるからこそ、次の「A（アクション）」に繋がります。"},{"m":6,"q":"QMSの有効性を高めるために、PDCAをさらに進化させたサイクルを何と呼びますか？","o":["ABCD","CAPDo（キャップドゥ）","DECO","STOP"],"h":"まず結果を確認（C）し、そこから改善（A・P）を始める流れです。","c":1,"e":"現状を把握（Check）し、改善（Act）し、計画（Plan）を立て直して実施（Do）するCAPDoサイクルは、現場の事実に即した迅速な改善に有効です。"},{"m":6,"q":"現場で「ちょっとおかしい」と感じた時、誰もが上司に意見を言える文化を醸成することを何と呼びますか？","o":["反抗期","ひと言、口を出す文化","沈黙の規律","報告禁止"],"h":"マニュアルで書ききれない細かい変化（毛細管活動）を拾い上げるために不可欠です。","c":1,"e":"現場の違和感は重大な不適合の予兆です。誰もが声を上げられる心理的安全性が、結果として組織の品質保証能力を支えます。"},{"m":6,"q":"具体例の「Cpkダッシュボード」において、工程能力が目標を下回った際、どのような「恒久対策」が取られましたか？","o":["作業員を厳しく注意した","刃具の交換サイクル（標準手順）を見直し、ルールをQMSに反映させた","グラフを書き換えた","検査をやめた"],"h":"「人」のせいにするのではなく、「仕組み（ルール）」を直しました。","c":1,"e":"単なる「修正（刃具を変える）」で終わらせず、交換サイクルという「仕組み」そのものを改善（是正処置）することが、再発防止の鍵です。"},{"m":6,"q":"この研修の例え話において、現場ボードと朝会を何に例えていましたか？","o":["豪華なフルコース","「小さな漁船の航海計器と毎朝のミーティング」","終わりなき旅","秘密の暗号"],"h":"目的地（目標）に向かって、計器（数値）を確認し、進路（アクション）を決定するイメージです。","c":1,"e":"現場ボードという計器を見て、朝会というミーティングで進路を決める。この繰り返しが、荒波（品質変動）の中でも安全な航海（経営）を可能にします。"},{"m":6,"q":"明日から現場ボードや朝会に参加する際、最も意識すべき「仕事の質」向上への姿勢はどれですか？","o":["数字を黙って見ているだけにする","事実（データ）に基づき、異常や違和感があれば積極的に「ひと言」発信し、仕組みの改善に繋げる","早く終わることだけを考える","前日と同じことだけを報告する"],"h":"「情報の水をきれいに流す」という言葉を思い出してください。","c":1,"e":"あなたが発する「ひと言」の事実が、重大な事故を防ぎ、会社を強くする改善の種になります。"},{"m":7,"q":"ISO 9001:2015の改訂において、「品質マニュアル」の要求が削除されるなど、文書化の要求が少なくなった真の狙いは何ですか？","o":["記録を一切残さなくて良いため","組織が自律的に「何が必要か」を判断し、形骸化（形だけの運用）を防ぐため","審査を短時間で終わらせるため","紙代を節約するため"],"h":"「決められたから作る」のではなく、「自分たちのために作る」姿勢を求めています。","c":1,"e":"規格に縛られるのではなく、自社のリスクや規模に合わせて「本当に必要なルール」を自分たちで設計し、生きた仕組みにすることを意図しています。"},{"m":7,"q":"「簡易QMS」を運用する最終的な経営上のメリットとして、最も適切なものはどれですか？","o":["事務所が綺麗になる","収益・市場占有率の向上、コスト・サイクルタイムの改善などのパフォーマンス向上","従業員の残業を増やす","難しい用語を覚えること"],"h":"QMSは「事業マネジメントの根幹」であり、利益を生むためのツールです。","c":1,"e":"PDCAサイクルが正しく回れば、ムダ（コスト）が減り、顧客満足（収益）が上がり、結果として経営指標が改善されます。"},{"m":7,"q":"2015年版から導入された「リスクに基づく考え方」において、不適合が発生した際に行うべき「根本的な見直し」とは何ですか？","o":["担当者を配置換えする","「なぜリスクを見逃したのか」を分析し、リスク検討の範囲や深さ（システム）そのものを見直す","記録を書き換える","運が悪かったと諦める"],"h":"単なる「ミスの修正」ではなく、「網の目の粗さ（仕組み）」を修正します。","c":1,"e":"失敗を「システムの欠陥を教えてくれる貴重なデータ」と捉え、リスク分析のやり方そのものをアップデートし続けることが、真の予防処置になります。"},{"m":7,"q":"中小企業にとって「固有技術（コア技術）」を形式知化（文書化など）することの戦略的な意義は何ですか？","o":["熟練者の秘密を盗むため","特定の個人への依存（属人化）を解消し、組織の資産として技術伝承を確実にするため","外部に技術を売るため","マニュアルのページ数を稼ぐため"],"h":"「あの人がいないと作れない」というリスクを回避する手段です。","c":1,"e":"熟練者の経験値を「仕組み」へ移行させることで、新入社員の早期戦力化や、品質の安定した再現が可能になります。"},{"m":7,"q":"「簡易QMS」における品質目標の設定において、重視すべき「測定可能な指標」の例はどれですか？","o":["みんなで頑張る","COPQ（品質失敗コスト）やSC特性の工程能力指数（Cpk）","笑顔で挨拶する","整理整頓を心がける"],"h":"達成できたかどうかをデータで客観的に判定できるものである必要があります。","c":1,"e":"「頑張る」という精神論ではなく、不良による損失額（COPQ）や、工程のバラつき（Cpk）を数値で追うことで、改善の効果が明確になります。"},{"m":7,"q":"意思決定や対策の有効性を判断する際、最も重視すべき根拠は何ですか？","o":["声の大きい人の意見","データ及び情報の分析（事実に基づく判断）","過去の慣習","占い"],"h":"客観的な事実（ファクト）が、間違った判断を防ぎます。","c":1,"e":"層別分析やヒストグラムなどのQCツールを用いてデータを可視化し、事実に基づいて次のアクションを決めることがQMSの本質です。"},{"m":7,"q":"具体例の中小メーカーにおいて、作業者の「意図しないエラー（うっかりミス）」を防ぐために導入された手法は何ですか？","o":["厳重注意","エラー・プルーフ（ポカヨケ）の製造プロセスへの組み込み","反省文の提出","全員での唱和"],"h":"「人」の注意力を信じるのではなく、ミスが起きない「構造」を作ります。","c":1,"e":"物理的に間違った向きでは入らない治具や、異物があれば止まるセンサーなどのポカヨケは、ヒューマンエラーを根絶する最強の武器です。"},{"m":7,"q":"新しく採用した契約社員などに対しても、必要な力量を備えさせるために実施し、記録を残すべき教育訓練は何ですか？","o":["読書感想文","OJT（業務を通じた教育・訓練）","精神修養","自由研究"],"h":"実際の業務を通じて、具体的な手順と「合格の基準」を伝えます。","c":1,"e":"すべての要員が、標準化された手順（形式知化された知識）を正しく実行できることを確認・記録することが、品質保証の最低条件です。"},{"m":7,"q":"本研修の例え話において、簡易QMSを何に例えていましたか？","o":["豪華なフルコース","「高性能な車のエンジン設計図」","終わりなき旅の重荷","秘密の暗号"],"h":"「認証（車の色）」よりも「性能（品質）と燃費（効率）」を磨くイメージです。","c":1,"e":"見栄えを整えることに資源を使うのではなく、事業の動力源である「品質と効率」という中身を磨き続けるプロセスを指しています。"},{"m":7,"q":"明日から「簡易QMS」を自社で意識する際、まず取り組むべき最も重要なアクションは何ですか？","o":["ISOの規格票を丸暗記する","自社の「一番のムダ（COPQ）」や「熟練者しか知らないコツ」を可視化することから始める","難しい書類をたくさん作る","改善活動を後回しにする"],"h":"「戦略的な統合」と「知識の形式知化」がキーワードです。","c":1,"e":"まずは自社の「弱み（リスク）」と「強み（固有技術）」を事実（データ）として捉えることが、生きたQMSを始動させる第一歩です。"},{"m":8,"q":"標準書（マニュアル）を設計する際のゴールである「再現性」とは、どのような状態を指しますか？","o":["毎日同じ時間に読むこと","誰が作業を行っても、定められた手順で同じ結果（品質）を出せること","何度もコピーを取ること","昔のやり方をそのまま続けること"],"h":"「属人化」を排除し、組織として安定した品質を保つためのキーワードです。","c":1,"e":"再現性とは、特定の「人」のスキルに依存せず、「仕組み（手順）」に従えば誰でも合格品を作れる状態を指します。"},{"m":8,"q":"マニュアルの利便性を高める「3つのコンセプト」のうち、必要な情報がすぐに見つかる構造であることを何と呼びますか？","o":["再現性","検索性","法則性","継続性"],"h":"目次や用語集、明確なタイトル設定などがこれに該当します。","c":1,"e":"現場でトラブルが起きた際、すぐに該当するルールを確認できる「検索性」は、形骸化を防ぐために不可欠な要素です。"},{"m":8,"q":"標準書に必ず記述すべき「設計の3要素」とは、「目的」「結果」ともう一つは何ですか？","o":["反省","行動（具体的な手順）","予算","担当者の感想"],"h":"「なぜやるか（Why）」「どうなれば成功か（Goal）」の次に必要な、「どう動くか（How）」です。","c":1,"e":"「行動」だけが書かれた手順書は、作業を「作業化（単純作業）」させますが、「目的」と「結果（基準）」が揃うことで、作業者は自律的に品質を判断できるようになります。"},{"m":8,"q":"現場での判断のばらつきを減らすために、良品は「青」、不良品は「赤」などの「モノと色の相関関係」を用いる工夫を何と呼びますか？","o":["色彩基準","ラッキーカラー","信号機ルール","虹色管理"],"h":"「読んで考える」のではなく「感覚で体が動く」ようにする工夫です。","c":0,"e":"色彩基準を導入することで、言語や習熟度の壁を超えて瞬時に正しい識別が可能になり、誤使用などのミスを物理的に防ぎます。"},{"m":8,"q":"帳票（記録）の設計において、現場の作業負担を減らしつつ正確性を高めるための工夫はどれですか？","o":["すべて記述式にする","選択方式（チェックボックス）や図解・写真の多用","記録欄を極限まで小さくする","サインを10箇所書かせる"],"h":"「書くこと」に集中させるのではなく、「確認すること」に集中させる設計です。","c":1,"e":"チェックボックスや写真見本は、記録時間を短縮するだけでなく、判定基準のブレを抑える効果があります。"},{"m":8,"q":"不適合が発生した際の記録において、原因分析に役立つ記述の仕方はどれですか？","o":["「作業者がミスをした」","「3名中1名が、規定のダブルチェック手順を飛ばしていた」などの具体的な事実","「以後気をつけます」","「機械の調子が悪い」"],"h":"「誰が、何を、どのように逸脱したか」という事実が是正処置の鍵です。","c":1,"e":"具体的な事実が記載されて初めて、手順書の不備や設備の欠陥といった「仕組みの真因」を突く改善が可能になります。"},{"m":8,"q":"問題解決の近道として、データを人・設備・材料・方法などの項目で分けて分析することを何と呼びますか？","o":["多数決","層別（ストラティフィケーション）","噂話","隠蔽"],"h":"帳票の記入項目に、これらの「キー項目」を含めて設計しておくことが重要です。","c":1,"e":"層別を行うことで、不良が「特定の機械」や「特定の時間帯」に集中していることが明確になり、重点的な対策が可能になります。"},{"m":8,"q":"大量のデータを効率的に集計・分析し、発生頻度やばらつきを可視化するのに便利なExcelの機能は何ですか？","o":["セル結合","ピボットテーブル","文字の拡大","上書き保存"],"h":"集計表の内容を上位階層に切り替えて表示できる強力なツールです。","c":1,"e":"ピボットテーブルを前提とした帳票設計を行うことで、日々の記録がそのまま経営判断に使える「戦略データ」へと変わります。"},{"m":8,"q":"食品製造（SSOP）の事例において、「普通石鹸」と「逆性石鹸」の混用チェック欄を設ける理由はなぜですか？","o":["石鹸がもったいないから","両者を混ぜると殺菌効果が失われるという科学的事実（固有技術）を確実に順守させるため","泡立ちを良くするため","どちらか一方で良いから"],"h":"「知っている人だけがやる」のではなく「帳票が強制的にチェックさせる」仕組みです。","c":1,"e":"高度な固有技術を帳票のチェック項目に落とし込むことで、新入社員でも専門家と同じ「安全な作業」を再現できるようになります。"},{"m":8,"q":"本研修の例え話として、優れた標準書と帳票のテンプレートを何に例えていましたか？","o":["豪華なフルコース","「企業のDNAを保存し、正しく機能させるための設計図」","終わりなき旅の荷物","秘密の暗号"],"h":"最小限の記述で真の原因を素早く突き止められる構造を持つものです。","c":1,"e":"優れた設計図（文書）は、組織の技術を次世代に繋ぎ、トラブル時には「なぜ」を即座に教えてくれる、企業の生命線となります。"},{"m":9,"q":"製造現場における「4M」の正しい組み合わせはどれですか？","o":["お金 (Money)・場所 (Main)・月 (Month)・分 (Minute)","人 (Man)・機械 (Machine)・材料 (Material)・方法 (Method)","管理 (Management)・市場 (Market)・使命 (Mission)・動機 (Motive)","音楽 (Music)・魔法 (Magic)・記憶 (Memory)・鏡 (Mirror)"],"h":"モノづくりを支える4つの基本要素です。","c":1,"e":"この4つの要素（人・設備・物・やり方）のいずれかが変化したときに、品質のバラつきが発生します。"},{"m":9,"q":"ISO 9001:2015が変更管理において最も重要視している「未然防止」の考え方はどれですか？","o":["失敗してから考える","変更が望ましくない影響を引き起こさないよう、事前にレビュー（検討）し、計画を立てること","変更を一切しないこと","担当者一人に任せること"],"h":"「後で後悔しない」ための準備運動のようなものです。","c":1,"e":"変更を実施する「前」に、どのようなリスクがあるかを多角的に検討し、必要な対策を講じておくことがQMSの核心です。"},{"m":9,"q":"リソースの限られた中小企業において、変更管理の対象を絞り込む際の高度な判断基準は何ですか？","o":["変更にかかる費用","製品の品質や安全性（特殊特性：SC）に与える影響の大きさ（リスク）","社長の気分","作業の楽しさ"],"h":"「ここが変わるとヤバい」というポイントに資源を集中します。","c":1,"e":"すべての些細な変化を管理するのは不可能です。品質に直結する重要な変更に焦点を絞る「重点指向」が中小企業の戦略です。"},{"m":9,"q":"変更による影響を多角的に評価するために、設計・製造・品質など異なる部門の担当者が集まって検討する手法を何と呼びますか？","o":["多数決","部門横断的アプローチ（CFT：多機能チーム）","秘密会議","世間話"],"h":"一人の視点では気づかないリスクを、チームの知恵で洗い出します。","c":1,"e":"異なる専門性を持つメンバーがレビューすることで、「製造は楽になるが、品質検査が難しくなる」といった潜在的なリスクを事前に発見できます。"},{"m":9,"q":"変更を実施する前に行う、「期待される性能が実際に出ることを確認するプロセス」を何と呼びますか？","o":["運試し","妥当性確認（バリデーション）","挨拶回り","整理整頓"],"h":"「理屈通りにいくか」を証拠を持って確認することです。","c":1,"e":"変更後にいきなり本番生産をするのではなく、試作やテストを通じて「これなら大丈夫」という確証を得るプロセスが不可欠です。"},{"m":9,"q":"設備変更などの際、品質の変化を確実にキャッチするための有効な検証方法はどれですか？","o":["遠くから眺める","段取り替え（変更）前の製品と、変更後の製品を直接比較する","勘で判断する","以前の記録をコピーする"],"h":"「Before（前）」と「After（後）」を並べて比べるのが一番確実です。","c":1,"e":"初物（はつもの）検査において前後の製品を比較することで、意図しない微細な変化（キズ、寸法、光沢など）を見逃さずに済みます。"},{"m":9,"q":"「人 (Man)」の変更（担当者の交代や派遣社員の採用など）があった際、必ず実施し記録を残すべき教育は何ですか？","o":["読書","OJT（業務を通じた教育・訓練）","掃除の練習","自由時間"],"h":"実際の作業を通じて、正しい手順と「守るべきルール」を伝えます。","c":1,"e":"「人」は4Mの中で最も変動しやすい要素です。教育訓練を通じて、その作業に必要な力量（スキル）を備えさせることは品質保証の基本です。"},{"m":9,"q":"新しい作業手順に変更する際、人の注意力が切れてもミスが起きないようにする仕組みを何と呼びますか？","o":["精神注入","ポカヨケ（エラー・プルーフ）","長時間労働","指差し呼称のみ"],"h":"物理的に「間違えられない」構造にすることです。","c":1,"e":"手順変更時はミスが起きやすいため、治具の形状工夫やセンサー設置などのポカヨケを組み込むことが、意図しないエラーを防ぐ最強の対策です。"},{"m":9,"q":"具体例の材料（Material）変更において、新しい供給者の材料が「ばらつきが大きい」と判明した際にとるべき「継続的改善」のアクションはどれですか？","o":["我慢して使う","購買プロセスにおける供給者への管理手順（仕組み）を強化し、QMSに反映させる","担当者を叱る","検査を諦める"],"h":"「人」を責めるのではなく、「仕組み（ルール）」をアップデートします。","c":1,"e":"問題が起きたことをチャンスと捉え、二度と同じトラブルが起きないように受入基準や供給者評価のルール（QMS）を改善することが真の改善です。"},{"m":9,"q":"本研修の例え話において、4M変更管理の仕組みを何に例えていましたか？","o":["豪華なフルコース","「製造プロセスを流れる血液の健康診断と免疫機能」","終わりなき旅","秘密の暗号"],"h":"変化（異物）を素早く見つけ、体質（仕組み）を強化するイメージです。","c":1,"e":"変化を敏感に察知する診断（レビュー）と、再発を防ぐ免疫（標準化）を組織に持たせることで、会社はより健康で強い体質（高品質）へと進化します。"},{"m":10,"q":"自社の業務の一部を外部に委託（アウトソーシング）した場合、そのプロセスで不適合が発生した際の最終的な責任は誰にありますか？","o":["委託された外部提供者のみ","委託した組織（自社）","運送会社","誰の責任でもない"],"h":"「外に任せたから知らない」はQMSでは通用しません。","c":1,"e":"ISO規格では、プロセスを外部に委託しても、顧客に対する品質責任は免除されません。そのため、外部提供者を適切に管理する「管理責任」が自社に生じます。"},{"m":10,"q":"「協力会社に品質保証を依頼している」という立場をとった場合、論理的に矛盾する行動はどれですか？","o":["協力会社の工程監査に行く","納入された品物を自社で全数受入検査し、不適合を見つける","品質目標を共有する","改善提案を求める"],"h":"「相手が保証している」はずのものを「こちらで疑って調べる」ことの矛盾です。","c":1,"e":"相手に品質保証を依頼している以上、納入後に自社で不適合が見つかるということは、相手の保証体制が機能していない証拠です。理想は「受入検査不要」の信頼関係を築くことです。"},{"m":10,"q":"自動車業界などで用いられる、新規部品の採用時に「図面通りに安定して作れること」を証明・承認するプロセスを何と呼びますか？","o":["忘年会","PPAP（生産部品承認プロセス）","整理整頓","試食会"],"h":"顧客の固有要求事項として、エビデンス（証拠）の提出が求められる厳しいプロセスです。","c":1,"e":"PPAPなどの承認プロセスを仕入先にも適用することで、量産開始前に「品質の出どころ」を科学的に確認し、リスクを封じ込めます。"},{"m":10,"q":"仕入先で「4M（人・設備・材料・方法）」の変更が発生した際、合意しておくべき最も重要なルールは何ですか？","o":["黙って変更して良い","事前に組織（自社）へ連絡し、検証や妥当性確認の結果を報告させる","値下げをする","記録を捨てさせる"],"h":"サイレントチェンジ（勝手な変更）は重大な不具合の最大の原因です。","c":1,"e":"仕入先の変更は自社の品質に直結します。変更管理プロセスを共有し、事前にリスクレビューを行うことを契約や合意書で義務付ける必要があります。"},{"m":10,"q":"食品安全（FSMS）において、野菜の洗浄などに使用する「水」について供給者に確認・記録すべき事項は何ですか？","o":["水の味","水道水に適合する水質が確保されているか","水の温度","水の量"],"h":"可食部に触れるものは、法的な安全基準を満たしている証拠が必要です。","c":1,"e":"水質汚染は広範囲な食中毒リスクに繋がります。供給者に対し、定期的な水質検査結果の提示を求めるなどの合意が不可欠です。"},{"m":10,"q":"肥料や農薬を使用する原材料の供給者に対し、可能であれば入手すべき文書は何ですか？","o":["供給者の社長のサイン","出所、処理方法、分析結果などが記載された妥当性確認の文書","綺麗なカタログ","領収書"],"h":"「安全です」という言葉ではなく、その根拠となるデータ（分析結果）を求めます。","c":1,"e":"農薬の残存や化学的汚染を防ぐためには、供給者のプロセスが妥当であることをデータで確認し、記録（証拠）として維持しなければなりません。"},{"m":10,"q":"中小企業が協力会社の品質レベルを飛躍的に向上させるための「戦略的な合意」は何ですか？","o":["毎日電話する","受入検査を中止し、不適合発生時の「損害賠償契約」を取り交わす","接待を増やす","厳しい言葉で叱る"],"h":"「甘え」を捨てさせ、相手に「プロとしての責任」を経済的なリスクと共に自覚させます。","c":1,"e":"損害賠償という実益に直結する契約を結ぶことで、協力会社は「自社で保証しなければ大損をする」という強力な動機付けが得られ、自律的な改善が始まります。"},{"m":10,"q":"損害賠償契約を結ぶ際、対象となる「損害」にはどのようなものが含まれますか？","o":["従業員の昼食代","製造工程での手直し費用や、顧客へのクレーム対応費用など","事務所の光熱費","社長の趣味の費用"],"h":"その不適合が原因で発生した、あらゆる直接的・間接的な損失です。","c":1,"e":"責任の所在を明確にし、不適合によるCOPQ（品質失敗コスト）を相手に負担させることで、真の意味での品質保証の依頼が成立します。"},{"m":10,"q":"本研修の例え話において、外注・仕入先との合意を何に例えていましたか？","o":["豪華なフルコースの注文","「信用に基づいて共同で巨大な橋を架けるプロジェクト」","終わりなき旅","秘密の暗号"],"h":"互いの専門性を信頼し、最終的な目標（品質）を共有する共同作業のイメージです。","c":1,"e":"契約という土台の上で、相手に最高レベルの仕事を任せる。これにより、自社は「チェック」という付加価値のない作業から解放され、全体のスピードが上がります。"},{"m":10,"q":"明日から仕入先とのコミュニケーションにおいて、最も意識すべき「品質保証の依頼者」としての姿勢はどれですか？","o":["「安ければ何でも良い」と伝える","「私たちの顧客を守るために、あなたの工程でどう品質を保証しているか教えてほしい」と問い、必要な合意を結ぶ","面倒なことはすべて相手に押し付ける","契約書を読まずに判を押す"],"h":"相手を「パートナー」として尊重しつつ、責任の境界線を明確にします。","c":1,"e":"相手の工程を理解し、重要なリスク（SC特性など）に対する管理と報告のルールを握ること。それが、サプライチェーン全体の品質を支えるリーダーの仕事です。"},{"m":11,"q":"「バリデーション（妥当性確認）」の定義として、最も適切なものはどれですか？","o":["毎日、全数検査を行うこと","決められた品質の製品が「恒常的に」製造されることを高度に保証し、それを文書化すること","壊れた機械を修理すること","従業員のやる気を調査すること"],"h":"「たまたまうまくいった」のではなく「いつでもうまくいく」ことを証明します。","c":1,"e":"バリデーションは、製造プロセスが「狙い通りの結果を常に出し続けられる能力があること」を科学的根拠に基づいて確認する活動です。"},{"m":11,"q":"ISO規格が、特に「特殊工程」に対してバリデーションを要求する最大の理由は何ですか？","o":["検査が簡単だから","出荷後の監視や測定では不具合が判明せず、使用されてからしか問題が顕在化しないため","書類を増やすため","熟練者の勘を試すため"],"h":"「後からチェックしても手遅れ」な工程だからです。","c":1,"e":"溶接、熱処理、滅菌、化学反応などの特殊工程は、製品を壊さない限り内部の品質が確認できないことが多いため、プロセスの条件管理で品質を保証する必要があります。"},{"m":11,"q":"リソースの限られた中小工場でバリデーションを「やりすぎない」ための戦略的な焦点はどこに絞るべきですか？","o":["すべての製造工程","安全や機能に直結する「特殊特性（SC）」に影響を与える管理項目（パラメータ）","事務所の事務作業","休憩時間の長さ"],"h":"「ここを外すと重大なクレームになる」という急所に集中します。","c":1,"e":"すべての項目を検証するのは不可能です。品質不具合の影響が大きいSC（特殊特性）に関わる温度、時間、圧力などの「許容限界（CL）」に絞って検証を行います。"},{"m":11,"q":"バリデーションを実施する際、あらかじめ「期待される性能（結果）」を予測して決めておく基準を何と呼びますか？","o":["判定基準（合否の基準）","努力目標","予算案","昨日の結果"],"h":"「やってみてから考える」のではなく、事前に「これなら合格」という線を引きます。","c":0,"e":"事前に判定基準を定義しておくことで、客観的かつ科学的にプロセスの妥当性を評価できるようになります。"},{"m":11,"q":"特殊工程の管理において、設定した温度や時間が範囲外になった際、自動でアラームが鳴るような仕組みを何と呼びますか？","o":["目覚まし時計","ポカヨケ（エラー・プルーフ）","騒音公害","放置"],"h":"「人」の注意力が切れても、システムが異常を教えてくれる仕組みです。","c":1,"e":"バリデーションされた条件を維持するために、ポカヨケなどの物理的なガードを設けることは、意図しないエラーを防ぐ非常に有効な手段です。"},{"m":11,"q":"バリデーションの結果（合格条件など）を現場で確実に運用するために、反映させるべき文書は何ですか？","o":["社内報","コントロールプラン（管理計画書）や作業指示書","領収書","履歴書"],"h":"現場のオペレーターが毎日目にする「仕事のルール」です。","c":1,"e":"バリデーションで見出した「黄金の条件」は、作業指示書等に明記され、誰でもその通りに作業できるように標準化されなければなりません。"},{"m":11,"q":"バリデーション済みの設備において、センサーの交換（Machineの4M変更）を行った場合に必要な対応はどれですか？","o":["何もしない","変更の影響をレビューし、必要に応じて再バリデーション（再妥当性確認）を実施する","すぐに生産を開始する","センサーを隠す"],"h":"部品が変われば、以前の「妥当性」が維持されているか確認が必要です。","c":1,"e":"変更（変化）は不具合の主要因です。設備や材料が変わった際は、バリデーションが有効なままであることを再確認（再実証）しなければなりません。"},{"m":11,"q":"計測機器（温度計など）が不適合（故障や校正外れ）だったことが判明した際、バリデーションの観点で行うべき記録は何ですか？","o":["機器の廃棄処分記録","その機器でそれまでに測定した結果の妥当性評価（遡及処置の記録）","機器の購入価格","担当者の反省文"],"h":"「狂った計器で測っていた過去の製品は本当に大丈夫か？」を評価します。","c":1,"e":"プロセスの妥当性を支えるデータが「誤り」だった可能性がある場合、過去の製造分にまで遡って品質を再評価する責任があります。"},{"m":11,"q":"本研修の例え話において、バリデーションを何に例えていましたか？","o":["豪華なフルコースのレシピ","「製造プロセスのブラックボックスを開け、技術を証明する設計保証書」","終わりなき旅の重荷","秘密の暗号"],"h":"熟練者でなくても高品質を生み出せることを保証する「根拠」のイメージです。","c":1,"e":"バリデーションという「保証書」があるからこそ、経験の浅い人でも安心して「黄金の条件」で作業ができ、会社は安定した品質を提供できるのです。"},{"m":11,"q":"明日から自社の「特殊工程（溶接・接着・熱処理など）」を見直す際、最初に行うべきアクションは何ですか？","o":["難しい数式を覚える","その工程の「SC（特殊特性）」に直結するパラメータ（温度・時間等）が、科学的根拠に基づいて決まっているかを確認する","すべての書類を新しく作り直す","検査員を増やす"],"h":"「やりすぎない」ために、まずは急所の特定から始めます。","c":1,"e":"まずは現場の「鍵となる管理項目」が、誰かの勘ではなく、データに裏打ちされたものであるかを確認することが、バリデーションの第一歩です。"},{"m":12,"q":"「予防保全（PM）」の本来の目的として、最も適切なものはどれですか？","o":["壊れた後に安く直すこと","設備の故障や予定外の生産停止を未然に防ぎ、品質のばらつきを抑えること","機械を新品のようにピカピカに磨くこと","予備の部品を大量に在庫すること"],"h":"ヒントはありません","c":0,"e":"予防保全は、計画的な点検や部品交換によって、生産活動の「ほころび（異常）」を未然に防ぎ、安定した品質と納期を守るための戦略的ツールです。"},{"m":12,"q":"QMS（品質マネジメントシステム）において、設備保全が「品質の安定」に寄与する理由はなぜですか？","o":["作業者の休憩時間が増えるから","設備や治工具に蓄積された「情報ストック（精度や性能）」を維持・安定させるため","書類の数が増えるから","検査員が楽をできるから"],"h":"「4M」の一つである「Machine（機械）」の状態が、製品の「ばらつき」に直結します。","c":1,"e":"どんなに熟練した作業者がいても、使う機械の精度がガタガタでは良品は作れません。設備の性能を一定に保つことは、源流管理の基本です。"},{"m":12,"q":"限られたリソースで効率的に設備を管理するために、まず各設備に付与すべきものは何ですか？","o":["ニックネーム","設備コード","担当者の写真","購入価格のラベル"],"h":"情報を整理・検索するための「背番号」のようなものです。","c":1,"e":"設備コードをキーにすることで、生産能力、点検周期、故障履歴などのバラバラな情報を一元管理（見える化）できるようになります。"},{"m":12,"q":"保全が必要な箇所や周期を決定する際、品質への影響度（リスク）を事前に評価する考え方を何と呼びますか？","o":["多数決","FMEA（故障モード影響解析）","運任せ","予算の残高確認"],"h":"「もしここが壊れたら、製品にどんな致命的な影響が出るか？」を考えます。","c":1,"e":"FMEAの視点を取り入れることで、すべての部品を闇雲に点検するムダを省き、重大な品質特性（SC）に関わる箇所に保全資源を集中投下できます。"},{"m":12,"q":"設備のオーバーホールや主要部品の交換など、保全計画を変更する際に適用すべきQMSのルールは何ですか？","o":["変更管理","秘密保持","経費精算","整理整頓"],"h":"「Machine（機械）」が変わることは、4M変更の大きな要素です。","c":0,"e":"保全による変更が、予期せぬ品質の変化（ほころび）を招かないよう、事前にレビューし、実施後に製品の妥当性を確認（検証）する必要があります。"},{"m":12,"q":"突発的な不良が発生した際、原因が「設備」にあるかどうかを切り分けるための分析手法は何ですか？","o":["精神論","層別（設備コードごとに分ける）","多数決","放置"],"h":"「A機では出るが、B機では出ない」という違いを明確にします。","c":1,"e":"データを設備ごとに層別することで、特定の機械に固有の「ばらつき」があるかどうかを科学的に特定でき、対策のスピードが上がります。"},{"m":12,"q":"短時間の停止が繰り返される「チョコ停」が、品質に与える悪影響は何ですか？","o":["機械が休める","停止・再開の繰り返しにより、特殊特性（SC）などの品質のばらつきが増加する","電気代が安くなる","掃除の時間ができる"],"h":"「止まること」そのものより、その前後の「不安定な状態」が危険です。","c":1,"e":"チョコ停はリズムを乱し、熱的な安定性や圧力の変動を招きます。これが製品の寸法や強度のばらつき（不適合）の主要因となります。"},{"m":12,"q":"具体例の加工機M-003において、チョコ停の真因が「特定の作業者によるオイル交換不足」だった場合、取るべき是正処置はどれですか？","o":["その作業者を叱る","計画保全の標準（S）を実態に合わせて見直し、QMSのルールとして再徹底する","機械を買い替える","オイルを抜く"],"h":"「人」のせいにするのではなく、「仕組み（標準）」を直します。","c":1,"e":"誰がやっても、どんな負荷状況でも品質が維持されるよう、保全の「標準（S）」をアップデートし、組織的な知識として定着させることが重要です。"},{"m":12,"q":"本研修の例え話において、予防保全を何に例えていましたか？","o":["豪華なフルコース","「定期的な健康診断と生活習慣の改善」","終わりなき旅の荷物","秘密の暗号"],"h":"弱い部分を見つけ、データに基づき、病気（故障）を未然に防ぐイメージです。","c":1,"e":"過去の履歴（診断結果）に基づき、リスクの高い箇所へ重点的に手当てを行う。この「未然防止」の姿勢こそが、設備の健康（長寿命・高精度）を守ります。"},{"m":12,"q":"明日から現場で「設備保全」を継続するために、まず意識すべき最も大切なことは何ですか？","o":["壊れるまで何もしない","「保全は品質を守るための投資」と考え、点検結果や修理履歴を設備コードごとに正しく記録する","難しい修理を一人で覚える","記録を適当に書く"],"h":"「記録は改善のインプット（宝）」という言葉を思い出してください。","c":1,"e":"あなたの書く一行の保全記録が、将来の突発故障を防ぎ、会社の利益とお客様の信頼を守る「防波堤」になります。"},{"m":13,"q":"工程能力指数（$Cp \\cdot Cpk$）が表している、製造工程の「実力」とは何のことですか？","o":["1日に何個作れるかという生産量","規格の範囲内に対して、どれだけ余裕をもって良品を作り続けられるかという能力","従業員の計算能力","機械の購入価格"],"h":"「たくさん作る」ことではなく「正しく作る」余裕のことです。","c":1,"e":"工程能力指数は、製品のバラつきが規格の幅に対してどの程度収まっているかを数値化したものです。この値が高いほど、不良品が出るリスクが低いことを意味します。"},{"m":13,"q":"「$Cp$」と「$Cpk$」の決定的な違いは何ですか？","o":["$Cp$は計算が難しく、$Cpk$は簡単である","$Cp$は「バラつき（広がり）」だけを見るが、$Cpk$は「中心値の偏り（ズレ）」も考慮する","$Cp$は社長用で、$Cpk$は現場用である","違いはない"],"h":"狙った中心からズレていても、$Cp$の値は変わりませんが、$Cpk$の値は下がります。","c":1,"e":"$Cp$は工程の潜在的な実力を示し、$Cpk$は平均値の偏りを含めた現在の「実現能力」を示します。実務では、偏りを考慮した$Cpk$を重視するのが一般的です。"},{"m":13,"q":"新製品の立ち上げ時など、工程がまだ統計的に安定しているか不明な時期に、暫定的に実力を評価する指標を何と呼びますか？","o":["$Ppk$（工程性能指数）","$GDP$","$BMI$","$pH$値"],"h":"本格的な$Cpk$を測る前の「予備調査」として使われます。","c":0,"e":"$Cpk$は工程が安定していることが前提ですが、立ち上げ初期などの不安定な時期には$Ppk$を用いて、まずは現状のパフォーマンスを評価します。"},{"m":13,"q":"リソースの限られた中小企業が$Cp/Cpk$を活用する際、優先的に対象とすべき項目は何ですか？","o":["すべての寸法項目","安全や機能に直結する「特殊特性（SC）」","梱包箱の大きさ","事務書類の余白"],"h":"「ここが狂うと重大な不適合になる」という急所に絞ります（重点指向）。","c":1,"e":"すべての項目を計算するのは非効率です。SC（特殊特性）に絞って監視することで、最小の労力で最大の品質リスク管理が可能になります。"},{"m":13,"q":"一般に、$Cp$（または$Cpk$）の値がいくつ以上であれば、工程能力が十分に高く、検査の簡略化を検討できるとされていますか？","o":["0.5以上","1.0以上","1.33以上（できれば","67以上）"],"h":"1.33は「十分」、1.67は「非常に高い」という目安があります。","c":2,"e":"$Cpk \\ge 1.33$が一般的な合格ラインです。$1.67$を超えると不良発生確率は極めて低くなるため、抜取り検査の回数を減らすなどのコストダウンが検討できます。"},{"m":13,"q":"コントロールプラン（CP）において、$Cpk$が目標値（例：1.33）を下回った場合に発動させるべきものは何ですか？","o":["忘年会","あらかじめ定められた対応計画（全数検査や是正処置など）","休暇の申請","記録の破棄"],"h":"「能力不足」がわかった瞬間に、不良を流さないためのガードを固めます。","c":1,"e":"実力不足が判明したら、即座に全数検査などで顧客を守り、同時に「なぜバラついているか」の真因追求（建立処置）を開始します。"},{"m":13,"q":"$Cpk$を改善するために、現場で行うべき「4M」の視点での分析手法は何ですか？","o":["多数決","層別（人・機械・材料・方法でデータを分ける）","精神論での指導","祈祷"],"h":"「A機はいいが、B機はダメ」といった違いを見つける手法です。","c":1,"e":"データを層別することで、平均値の偏りやバラつきの原因が、特定の機械なのか、特定の材料ロットなのかを特定しやすくなります。"},{"m":13,"q":"具体例の新規金型の導入において、最初に$Ppk$を算出する目的（フィージビリティレビュー）は何ですか？","o":["金型の色を決めるため","その金型で要求される品質を「安定して作れる実行可能性」があるかを確認するため","経理に報告するため","掃除をしやすくするため"],"h":"量産に入ってから「作れませんでした」となるのを防ぐための事前確認です。","c":1,"e":"量産移行前に$Ppk$で実力を測り、目標に達していなければ金型の修正など「源流」での対策を講じます。"},{"m":13,"q":"本研修の例え話において、工程能力指数を何に例えていましたか？","o":["豪華なフルコース","「製造プロセスの健康診断書（体力と目標達成度）」","終わりなき旅の重荷","秘密の暗号"],"h":"体力が低い所に薬（改善）を、健康な所は放任して効率化するイメージです。","c":1,"e":"$Cpk$はプロセスの「健康診断」です。数値が悪い「不健康」な工程を優先的に治療（改善）することで、工場全体の品質水準を底上げします。"},{"m":13,"q":"明日から現場で$Cpk$の数値を活用する際、最も意識すべき「経営的なメリット」はどれですか？","o":["難しい計算を覚えること","数値に基づいて「検査のムダを省く」か「工程を改善する」かの判断を行い、利益に繋げること","グラフを綺麗に書くこと","データを隠すこと"],"h":"$Cpk$は「管理のための管理」ではなく、「儲けるためのツール」です。","c":1,"e":"$Cpk$が高い工程の検査を減らし、浮いた時間を$Cpk$が低い工程の改善に充てる。このリソース配分こそが、中小企業の品質戦略の要です。"},{"m":14,"q":"品質部門立ち上げの1ヶ月目（フェーズ1）において、最も優先すべきことは何ですか？","o":["大量の手順書を書く","経営リスクを特定し、守るべき「特殊特性（SC）」を洗い出してトップと共有する","検査機器をすべて新品に買い替える","従業員の制服を新しくする"],"h":"「何が致命的なリスクか」を定義しないと、資源が分散してしまいます。","c":1,"e":"最初の1ヶ月は、戦略的な基盤作りです。安全や法規制に関わるSC（特殊特性）を特定し、そこにリソースを集中させる「重点管理」の合意をトップと得ることが成功の鍵です。"},{"m":14,"q":"不良記録の帳票を設計する際、将来の原因分析（なぜなぜ分析）をスムーズにするための工夫は何ですか？","o":["自由記述欄を大きくする","4M（人・設備・材料・方法）やロットなどの「層別キー」を記入できるようにする","担当者の印鑑を5箇所にする","鉛筆で書くようにする"],"h":"データを「分ける」ことができなければ、真犯人（原因）は見つかりません。","c":1,"e":"記録を単なる「報告」で終わらせず「データ」に変えるためには、後で集計・分析できる項目（層別キー）をあらかじめ組み込んでおく必要があります。"},{"m":14,"q":"2ヶ月目（フェーズ2）で作成する標準作業書（マニュアル）において、再現性を高めるための「3つのコンセプト」は何ですか？","o":["精神・技術・体力","再現性・検索性・法則性","過去・現在・未来","速度・精度・鮮度"],"h":"「誰でもできる」「すぐ見つかる」「原理がわかる」の3点です。","c":1,"e":"優れたマニュアルは、誰がやっても同じ結果が出る（再現性）、必要な時にすぐ引ける（検索性）、なぜそうなるかの理屈がわかる（法則性）を備えています。"},{"m":14,"q":"標準書の中で、文字だけでは伝わりにくい判断基準（キズの許容範囲など）を明確にする最も有効な手段は何ですか？","o":["長い文章で説明する","図解や写真（限度見本など）を活用する","熟練者の勘に任せる","想像させる"],"h":"「百聞は一見にしかず」をマニュアルに落とし込みます。","c":1,"e":"視覚情報は、言語や経験の差を埋める強力なツールです。重要な箇所を丸で囲むなどの工夫により、判断のバラつき（ヒューマンエラー）を激減させます。"},{"m":14,"q":"3〜4ヶ月目（フェーズ3）において、複雑な不適合データを効率的に分析し、改善の優先順位を決めるために有効なツールは何ですか？","o":["多数決","Excelのピボットテーブル","噂話","電卓での手集計"],"h":"大量のデータを階層的に集計し、多角的に分析できる機能です。","c":1,"e":"ピボットテーブルを使いこなすことで、「どの工程の、どの不具合が、一番コストを食っているか」を瞬時に可視化でき、効率的な意思決定が可能になります。"},{"m":14,"q":"不適合が発生した際、「作業者を指導した」という対応（修正処置）だけで終わらせてはいけない理由は何ですか？","o":["指導は時間の無駄だから","根本的な原因（仕組みの欠陥）が放置され、再発する可能性が高いから","記録が短すぎるから","作業者がかわいそうだから"],"h":"「うっかり」を防ぐには、人の注意力を超えた「仕組み」が必要です。","c":1,"e":"人はミスをします。再発を防ぐには「なぜミスが起きたのか」を深掘りし、ポカヨケの設置や手順の変更といった「仕組みの是正（是正処置）」まで踏み込む必要があります。"},{"m":14,"q":"予防保全（PM）を導入する際、最初に行うべき「土台作り」は何ですか？","o":["全設備を分解掃除する","設備マスター（台帳）を作成し、設備コードを付与して管理すること","高価なセンサーを買う","保全を外部に丸投げする"],"h":"情報を整理・検索するための「背番号」が必要です。","c":1,"e":"設備コードを軸に情報を一元化することで、いつ、どの機械に、どんなメンテナンスが必要かを計画的に管理できるようになります。"},{"m":14,"q":"5ヶ月目（フェーズ4）で行う「内部監査」において、最も重視すべき姿勢（三現主義）は何ですか？","o":["事務所で書類だけをチェックする","現場に行き、現物を確認し、現実の作業を検証する","過去の監査結果を写す","担当者の言い訳を信じる"],"h":"書類上の「綺麗ごと」ではなく「実態」を自分の目で見ます。","c":1,"e":"現場・現物・現実（三現主義）での監査こそが、生きたQMSの有効性を評価する唯一の方法です。"},{"m":14,"q":"マネジメントレビュー（MR）において、トップマネジメントが行うべき「最も重要な仕事」は何ですか？","o":["現場を叱る","QMSの有効性を評価し、継続的改善のために必要な資源（ヒト・カネ・時間）の投入を決定する","お茶を飲む","ハンコを押すだけ"],"h":"QMSを動かし続けるための「ガソリン（資源）」を供給する役割です。","c":1,"e":"MRは「報告を聞く場」ではなく、データに基づき「次の一手」を決断する場です。トップの決断が、改善のサイクルを力強く回します。"},{"m":14,"q":"このロードマップの例え話において、QMSを何に例えていましたか？","o":["豪華なフルコース","「企業の免疫システム」","終わりなき旅","秘密の暗号"],"h":"リスクを特定し、習慣を作り、検査で異常を見つけて体質を強化するイメージです。","c":1,"e":"QMSは、一度作って終わりの壁紙ではなく、日々変化するリスクに適応し、組織を強くし続ける「生命維持システム」そのものです。"},{"m":15,"q":"6ヶ月目以降の「内部監査」において、形骸化を防ぐために最も重要な考え方はどれですか？","o":["毎年、同じチェックリストを使い続ける","その時期のクレーム状況や新規製品などの「重点事項」を反映して内容を変える","監査時間を短縮することだけを考える","仲の良い部署は監査を免除する"],"h":"「どこにリスクがあるか」は常に変化しています（重点指向）。","c":1,"e":"内部監査は「アラ探し」ではなく「健康診断」です。今、会社が直面している課題（例：外注トラブルが多いなら購買プロセス）に焦点を絞ることで、経営に役立つ監査になります。"},{"m":15,"q":"是正処置（再発防止）において、「作業者を指導した」という報告で終わらせてはいけない理由は何ですか？","o":["指導は効果がないから","「なぜ手順が守れなかったか」という真の原因（仕組みの欠陥）を放置しているから","報告書が短すぎるから","作業者が反省しないから"],"h":"「うっかり」が起きる背景には、必ず「そうなりやすい仕組み」があります。","c":1,"e":"「なぜなぜ分析」を繰り返し、手順の複雑さや設備の不備といった根本原因を突き止め、ポカヨケなどの「仕組み」で解決することがQMSの目的です。"},{"m":15,"q":"特殊特性（SC）の工程能力（Cpk）が安定して高水準（例：1.67以上）を維持できている場合、検討すべき「攻めの品質管理」は何ですか？","o":["さらに厳しく検査する","検査工数の削減や管理の簡略化を行い、リソースを他のリスクが高い工程へ回す","検査を完全にやめる","何もしない"],"h":"「実力がある」とわかったら、そこにかける手間（コスト）を減らすチャンスです。","c":1,"e":"Cpkが高いということは、不良が出る確率が極めて低いということです。その「余裕」を活かして効率化を図ることが、中小企業の賢い戦略です。"},{"m":15,"q":"4M変更（人・設備・材料・方法）が発生した際、リスクを事前に評価するために設計・製造・品質などの担当者が集まる活動を何と呼びますか？","o":["多数決","部門横断的アプローチ（CFT：多機能チーム）","秘密会議","世間話"],"h":"一人の視点では気づかない「死角」をチームの知恵で埋めます。","c":1,"e":"異なる部署の視点でレビューすることで、変更がもたらす予期せぬ品質の「ほころび」を未然に防ぐことができます。"},{"m":15,"q":"教育・訓練（OJT）を実施した後に、必ず行わなければならないステップは何ですか？","o":["打ち上げ","教育の「有効性評価」（本当に理解し、品質向上に繋がったかの確認）","参加者の感想を聞くだけ","忘れる"],"h":"「教えた」ことと「できるようになった」ことは別です。","c":1,"e":"テストや現場での作業観察、不良率の変化などを通じて「教育の効果」を確認し、不十分なら教育方法自体を改善（PDCA）する必要があります。"},{"m":15,"q":"従業員が自発的に改善提案を行ったり、品質向上に貢献したりする環境を作ることを何と呼びますか？","o":["エンパワーメント（動機付け）","強制労働","放置","監視"],"h":"現場の「やる気」と「知恵」を引き出す活動です。","c":0,"e":"品質は「仕組み」だけでなく「人の意識」に左右されます。改善を評価する仕組みを設けることで、現場の自律的な品質向上が促進されます。"},{"m":15,"q":"11〜12ヶ月目（フェーズ8）で行うマネジメントレビュー（MR）において、インプットすべき「高度な指標」は何ですか？","o":["昨日の昼食メニュー","品質不良コスト（COPQ）や市場不具合のトレンド予測","出勤率","事務所の備品リスト"],"h":"経営者が「お金」や「リスク」の観点で判断を下せる材料です。","c":1,"e":"単なる不良数だけでなく、それがいくらの損失（COPQ）になっているかを報告することで、トップは設備投資や教育予算の必要性を正しく判断できます。"},{"m":15,"q":"マネジメントレビューの結果、過去に検討した「リスクの範囲」に漏れがあったことが判明した場合、次期計画（Plan）で何をすべきですか？","o":["見なかったことにする","検討するリスクの範囲や深さを見直し、システムを根本的に改善する","担当者を配置換えする","以前の計画をそのまま使う"],"h":"失敗を「システムの進化の糧」にします。","c":1,"e":"不適合は「リスク分析の網の目が粗かった」ことを教えてくれるデータです。これを受けて計画を立て直すことが、CAPDoサイクルの本質です。"},{"m":15,"q":"外注先での不具合を「損害賠償契約」や「変更時の追加検証の要求」で解決するアプローチの目的は何ですか？","o":["相手を困らせるため","仕入先を「品質保証のパートナー」とし、相手の自律的な品質管理を引き出すため","自社の責任をすべてなすりつけるため","値下げをさせるため"],"h":"相手に「プロとしての責任」を持たせる仕組みです。","c":1,"e":"契約で責任の境界線を明確にすることで、仕入先は自社内で品質保証を徹底せざるを得なくなり、結果としてサプライチェーン全体の品質が上がります。"},{"m":15,"q":"本研修の例え話において、6ヶ月目以降の活動を何に例えていましたか？","o":["豪華なフルコースの食事","「健康診断結果に基づき、体質改善を行う専門ドクターチームの活動」","終わりなき旅の重荷","秘密の暗号"],"h":"データを見て治療（是正）し、基礎体力（力量）を上げ、健康目標（品質目標）を更新するイメージです。","c":1,"e":"QMSは生きています。データという血流を追い、滞っているプロセスを治療し続けることで、組織は「不適合という病気」にかかりにくい強い体質へと進化します。"},{"m":16,"q":"品質責任者が推進すべき「車の両輪」とは、標準を守る維持活動（SDCA）と、もう一つは何ですか？","o":["現場の掃除（5S）","継続的な改善活動（PDCA/CAPDo）","欠勤者の補充","飲み会の企画"],"h":"「守る」ことと「進化させる」ことの両方が必要です。","c":1,"e":"現状を維持するSDCAだけでは衰退します。常にデータを見て、より良い仕組みへとアップデートするPDCAを回し続けることが、品質責任者の核心的な仕事です。"},{"m":16,"q":"不適合（不良）が発生した際、品質責任者が「修正処置（例：作業者を叱る）」だけで終わらせてはいけない理由は何ですか？","o":["作業者がかわいそうだから","真の原因（仕組みの欠陥）が放置され、再発するリスクが高いから","報告書が埋まらないから","社長に怒られるから"],"h":"「人」ではなく「仕組み」を直さなければ、必ずまた同じミスが起きます。","c":1,"e":"再発防止（建立処置）こそが品質管理の本質です。「なぜミスが起きたのか」を深掘りし、手順や設備を改善することで、二度と同じ不協和音を出さないようにします。"},{"m":16,"q":"午前中の仕事として重要な「情報のダムを防ぐ」とは、具体的にどのような状態を指しますか？","o":["現場に水をまかない","現場の異常や違和感が滞ることなく、管理者に正しく流れていることを確認する","書類をすべてシュレッダーにかける","誰ともしゃべらない"],"h":"情報の「詰まり」は、重大な品質リスクを見逃す原因になります。","c":1,"e":"現場の「ちょっとおかしい」という声が、品質責任者の耳に届く「情報の水がきれいに流れる状態」を作ることが、リスクの早期発見に繋がります。"},{"m":16,"q":"複雑な不良データを分析し、改善の優先順位（重点指向）をつけるために有効なExcelの機能は何ですか？","o":["フォント変更","ピボットテーブル","上書き保存","セル結合"],"h":"複数の項目（4Mや工程など）を組み合わせて、多角的に可視化できるツールです。","c":1,"e":"ピボットテーブルを活用し、データを「層別」して分析することで、「どの製品の、どの工程に、どの原因が集中しているか」がひと目で判別できるようになります。"},{"m":16,"q":"不適合（例：計測機器の校正外れ）が判明した際、過去に遡って影響を評価し、必要な処置をとることを何と呼びますか？","o":["タイムトラベル","遡及（そきゅう）処置","責任転嫁","隠蔽工作"],"h":"「過去の判定は本当に正しかったか？」を再確認する活動です。","c":1,"e":"不備のある状態で検査されていた過去の製品すべてに対し、妥当性を再評価し、必要であれば回収や再検査を行う「遡及処置」は、信頼を守るための重要義務です。"},{"m":16,"q":"午後の仕事である「現場監査」において、最も重視すべき「三現主義」の3つの要素とは何ですか？","o":["現金・現物・現在","現場・現物・現実","現像・現代・現場","現金・現実・現物"],"h":"書類上の「綺麗ごと」ではなく、実態を自分の目で見ます。","c":1,"e":"現場に行き、現物を手に取り、現実の作業を確認する。この「三現主義」こそが、嘘偽りのないQMSの有効性を評価する唯一の方法です。"},{"m":16,"q":"現場監査の際、品質責任者がとるべき正しい態度はどれですか？","o":["威張って間違いを指摘する","「よく分からないから教えてほしい」という謙虚な姿勢で監査証拠を確認する","黙って立ち去る","作業の邪魔をする"],"h":"現場の協力を得て、共に改善するパートナーであるべきです。","c":1,"e":"現場を尊重し、実態を「教えてもらう」姿勢で接することで、現場の隠れた問題点（本音）を引き出し、実効性のある改善に繋げることができます。"},{"m":16,"q":"具体例の「刃具交換サイクルの短縮」のように、改善された手順をどこに反映させる必要がありますか？","o":["社内報のコラム","標準書（SSOP等）やコントロールプラン（CP）","休憩室の壁","誰にも言わない"],"h":"「仕組み」として定着させるための、公式なルールブックです。","c":1,"e":"是正処置で決まった新しいルールは、標準書やコントロールプランに確実に反映し、4M変更管理と連携させることで、組織の「形式知（知恵）」として定着させます。"},{"m":16,"q":"品質責任者が、現場リーダー（監督者）に対して行うべき意識改革の内容として正しいものはどれですか？","o":["「不良は作業者の注意不足だ」と教える","「不良責任は仕組みを作った監督者にある」という考え方を定着させる","「とにかく早く作れ」と指示させる","検査員にすべて任せろと言う"],"h":"作業者を責めるのではなく、ミスが起きない「仕組み」をリードさせます。","c":1,"e":"不良の責任を作業者個人の資質に押し付けず、監督者が責任を持って「ミスが起きない仕組み（標準）」を構築・指導する文化を作ることが、品質責任者の重要な責務です。"},{"m":16,"q":"本研修の例え話において、品質責任者の仕事を何に例えていましたか？","o":["豪華なフルコースのシェフ","「オーケストラの指揮者」","終わりなき旅の旅人","秘密の暗号を解くスパイ"],"h":"全体を調和させ、二度と同じ不協和音（不適合）を出さないように調整するイメージです。","c":1,"e":"各部署（楽器）がそれぞれの役割を完璧にこなし、全体として最高の品質（音楽）を奏でる。そのための「タクト（QMS）」を振るのが、あなたの仕事です。"},{"m":17,"q":"自社の業務を外部に委託（アウトソーシング）した場合、そのプロセスで不適合が起きた際の最終的な責任はどこにありますか？","o":["委託された外注先のみ","委託した組織（自社）","どちらの責任でもない","運送会社"],"h":"「外に任せたから知らない」は、QMS（品質マネジメントシステム）では通用しません。","c":1,"e":"アウトソーシングしても、顧客に対する品質責任は自社にあります。そのため、外部提供者が正しく仕事をしているかを管理する「管理責任」が生じます。"},{"m":17,"q":"顧客から新しい技術仕様書や図面が届いた際、内容を確認し、現場へ展開・実施を完了させるまでの「タイムリーな期間」の目安（TS規格等）はどれくらいですか？","o":["1ヶ月以内","2営業週（10営業日）以内","半年以内","次の注文が来るまで"],"h":"古い図面で作り続けるリスクを最小限に抑えるためのスピード感です。","c":1,"e":"顧客要求の変更は最優先事項です。一般的に2週間以内には最新の要求が現場の作業に反映されている状態を保証する必要があります。"},{"m":17,"q":"品質不具合が発生する主要因のほとんどを占める、管理上の重要なきっかけは何ですか？","o":["4M（人・設備・材料・方法）などの「変更（変化）」","掃除の回数","事務所の照明の明るさ","カレンダーの更新"],"h":"「いつもと違うこと」が起きた時に、魔（不良）が差します。","c":0,"e":"自社だけでなく、仕入先での4M変更も品質に直結します。この「変化点」を事前にキャッチし、レビューすることが未然防止の核心です。"},{"m":17,"q":"新製品や工程変更の際、量産開始前に「この工程で安定して良品が作れること」を顧客に証明・承認してもらうプロセスを何と呼びますか？","o":["忘年会","PPAP（生産部品承認プロセス）","整理整頓","会社見学"],"h":"自動車業界などで必須とされる、科学的なエビデンスに基づく承認手順です。","c":1,"e":"PPAPなどの承認プロセスを仕入先にも適用することで、量産に入ってから「実は作れませんでした」というリスクを防ぎます。"},{"m":17,"q":"仕入先における「製品承認（PPAPなど）」は、どのようなタイミングで実施されるべきですか？","o":["試作の1個目ができた時","量産用の製造工程が検証（妥当性確認）された後","納品が終わった後","いつでも良い"],"h":"「本番と同じ環境」で検証しなければ意味がありません。","c":1,"e":"暫定的な工程での承認は危険です。実際の量産ラインで、狙い通りの品質が恒常的に出せることを確認した上で承認を行います。"},{"m":17,"q":"中小企業が協力会社の品質レベルを飛躍的に向上させるための、受入検査に代わる「戦略的な合意」は何ですか？","o":["毎日電話で励ます","受入検査を中止し、不適合 var QD=QUIZ_DATA,L=['A','B','C','D'];
var P=new URLSearchParams(location.search);
var modIdx=P.has('m')?parseInt(P.get('m')):null;
var allMode=P.has('all');
var showVideo=allMode||modIdx!==null;
var showCourse=P.get('course')==='1'||modIdx===null||allMode;
var mode=null;

// Build tabs
var tabs=document.getElementById('tabs');
if(allMode){
  tabs.innerHTML='<button class="tb t-video on" onclick="switchTab(\'select\')">\ud83d\udcfa 動画別テスト</button><button class="tb t-course" onclick="switchTab(\'course\')">\ud83d\udccb コース全体テスト</button>';
  // Build module list
  var ml=document.getElementById('modList');
  var qc=[10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10];
  QD.titles.forEach(function(t,i){
    var d=document.createElement('div');d.className='mc';
    d.innerHTML='<span class="mn">'+(i+1)+'</span><span class="mdiv"></span><div><span class="mt">'+t+'</span><div class="mt2">'+qc[i]+'問</div></div><span class="marr">→</span>';
    d.onclick=function(){pickMod(i)};
    ml.appendChild(d);
  });
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelCourse').style.display='none';
}else if(showVideo&&showCourse){
  tabs.innerHTML='<button class="tb t-video on" onclick="switchTab(\'video\')">\ud83d\udcfa この動画の確認テスト</button><button class="tb t-course" onclick="switchTab(\'course\')">\ud83d\udccb コース全体テスト</button>';
}else{tabs.style.display='none'}

// Init (non-all mode)
if(!allMode&&showVideo){
  document.getElementById('svTitle').textContent=QD.titles[modIdx]+' 確認テスト';
  var mc=QD.questions.filter(function(q){return q.m===modIdx}).length;
  document.getElementById('svCount').textContent=mc;
  document.getElementById('panelVideo').style.display='block';
}
if(!allMode&&showCourse){
  document.getElementById('panelCourse').style.display=showVideo?'none':'block';
}
if(!allMode&&!showVideo&&showCourse)document.getElementById('panelCourse').style.display='block';

window.pickMod=function(idx){
  modIdx=idx;
  document.getElementById('panelSelect').style.display='none';
  document.getElementById('svTitle').textContent=QD.titles[idx]+' 確認テスト';
  var mc=QD.questions.filter(function(q){return q.m===idx}).length;
  document.getElementById('svCount').textContent=mc;
  document.getElementById('panelVideo').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

function switchTab(t){
  document.querySelectorAll('.tb').forEach(function(b){
    var isMatch=(t==='select'&&b.classList.contains('t-video'))||b.classList.contains('t-'+t);
    b.classList.toggle('on',isMatch);
  });
  var ps=document.getElementById('panelSelect');
  if(t==='select'){
    if(ps)ps.style.display='block';
    document.getElementById('panelVideo').style.display='none';
  }else if(t==='video'){
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='block';
  }else{
    if(ps)ps.style.display='none';
    document.getElementById('panelVideo').style.display='none';
  }
  document.getElementById('panelCourse').style.display=t==='course'?'block':'none';
}

// Quiz engine
var quizzes={video:{qs:[],ci:0,sc:0,ans:[]},course:{qs:[],ci:0,sc:0,ans:[]}};

window.go=function(m){
  mode=m;var qz=quizzes[m];qz.ci=0;qz.sc=0;qz.ans=[];
  if(m==='video'){
    qz.qs=QD.questions.filter(function(q){return q.m===modIdx});
    for(var i=qz.qs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=qz.qs[i];qz.qs[i]=qz.qs[j];qz.qs[j]=t}
  }else{
    var pool=[].concat(QD.questions),sel=[];
    var totalPool=pool.length,targetQ=Math.min(22,totalPool);
    for(var mm=0;mm<22;mm++){var mq=pool.filter(function(q){return q.m===mm});if(mq.length>0)sel.push(mq[Math.floor(Math.random()*mq.length)])}
    var rem=pool.filter(function(q){return sel.indexOf(q)<0});
    var extrasNeeded=targetQ-sel.length;
    for(var i=0;i<extrasNeeded;i++){var p=rem.splice(Math.floor(Math.random()*rem.length),1)[0];if(p)sel.push(p)}
    for(var i=sel.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sel[i];sel[i]=sel[j];sel[j]=t}
    qz.qs=sel;
  }
  g('start'+(m==='video'?'Video':'Course')).style.display='none';
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.style.display='block';
  showQ(m);qEl.scrollIntoView({behavior:'smooth'});
};

function g(id){return document.getElementById(id)}

function showQ(m){
  var qz=quizzes[m],q=qz.qs[qz.ci],total=qz.qs.length;
  var cls=m==='video'?'c-video':'c-course';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.innerHTML='<div class="pg"><div class="pgb"><div class="pgf '+cls+'" style="width:'+((qz.ci/total)*100)+'%"></div></div><div class="pgc">'+(qz.ci+1)+' / '+total+'</div></div>'
    +'<div class="qm">\ud83d\udcd8 '+QD.titles[q.m]+'</div>'
    +'<div class="qt">'+q.q+'</div>'
    +(q.h?'<button class="hb" onclick="tH(\''+m+'\')">\ud83d\udca1 ヒントを見る</button><div class="hi" id="hi_'+m+'">'+q.h+'</div>':'')
    +'<div class="os" id="os_'+m+'"></div>'
    +'<div class="ex" id="ex_'+m+'"></div>'
    +'<button class="nx '+cls+'" id="nx_'+m+'" onclick="nxt(\''+m+'\')">'+(qz.ci<total-1?'次の問題へ →':'結果を見る →')+'</button>';
  var os=g('os_'+m);
  q.o.forEach(function(opt,i){
    var d=document.createElement('div');d.className='o';
    d.innerHTML='<span class="ol">'+L[i]+'</span><span>'+opt+'</span>';
    d.onclick=function(){sel(m,i)};os.appendChild(d);
  });
}

window.sel=function(m,idx){
  var qz=quizzes[m],q=qz.qs[qz.ci];
  var opts=g('os_'+m).querySelectorAll('.o');
  if(opts[0].classList.contains('lk'))return;
  opts.forEach(function(o){o.classList.add('lk')});
  var ok=idx===q.c;if(ok)qz.sc++;
  qz.ans.push({q:q,sel:idx,ok:ok});
  opts[q.c].classList.add('ok');
  if(!ok)opts[idx].classList.add('ng');
  var e=g('ex_'+m);e.textContent=(ok?'\u2705 正解！ ':'\u274c 不正解… ')+q.e;e.style.display='block';
  g('nx_'+m).style.display='inline-block';
};

window.tH=function(m){var h=g('hi_'+m);h.style.display=h.style.display==='none'?'block':'none'};

window.nxt=function(m){
  var qz=quizzes[m];qz.ci++;
  if(qz.ci<qz.qs.length){showQ(m);g('q'+(m==='video'?'Video':'Course')).scrollIntoView({behavior:'smooth'})}
  else showResult(m);
};

function showResult(m){
  var qz=quizzes[m];
  g('q'+(m==='video'?'Video':'Course')).style.display='none';
  var rEl=g('r'+(m==='video'?'Video':'Course'));rEl.style.display='block';
  var pct=Math.round(qz.sc/qz.qs.length*100),pass=m==='video'?pct>=70:pct>=80;
  var rank,rc;
  if(pct>=95){rank='S';rc='#d4a017'}else if(pct>=85){rank='A';rc='#22c55e'}else if(pct>=75){rank='B';rc='#3b82f6'}else if(pct>=60){rank='C';rc='#f59e0b'}else{rank='D';rc='#ef4444'}
  var wrongs=qz.ans.filter(function(a){return!a.ok});
  var h='<div class="rc '+(pass?'ps':'fl')+'">'
    +'<div class="rk" style="color:'+rc+'">'+rank+'</div>'
    +'<div class="rs">'+pct+'%</div>'
    +'<div class="rd">'+qz.qs.length+'問中 '+qz.sc+'問正解</div>'
    +(pass?'<div class="rpm">\ud83c\udf89 '+(m==='video'?'よくできました！':'合格おめでとうございます！')+'</div>':'<div class="rfm">'+(m==='video'?'もう一度動画を見て再挑戦してみましょう。':'合格基準（80%）に届きませんでした。動画を復習して再挑戦してみましょう。')+'</div>')
    +'<button class="B '+(m==='video'?'bg':'bo')+'" onclick="retry(\''+m+'\')" style="margin-top:10px">もう一度受ける</button></div>';
  if(wrongs.length>0){
    h+='<div class="rvt">間違えた問題の復習</div>';
    wrongs.forEach(function(w){
      h+='<div class="rvi"><div class="qm" style="margin-bottom:4px">\ud83d\udcd8 '+QD.titles[w.q.m]+'</div>'
        +'<div class="rvq">'+w.q.q+'</div>'
        +'<div class="rvy">\u2717 あなたの回答：'+L[w.sel]+'. '+w.q.o[w.sel]+'</div>'
        +'<div class="rvc">\u25cb 正解：'+L[w.q.c]+'. '+w.q.o[w.q.c]+'</div>'
        +'<div class="rve">\ud83d\udca1 '+w.q.e+'</div></div>';
    });
  }else{h+='<div style="text-align:center;color:#22c55e;font-weight:700;font-size:16px;padding:16px">\ud83c\udf8a 全問正解です！</div>'}
  rEl.innerHTML=h;
  rEl.scrollIntoView({behavior:'smooth'});
}

window.retry=function(m){
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  g('start'+(m==='video'?'Video':'Course')).style.display='block';
};

window.backToList=function(){
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

// In all mode, add back button to video start panel
if(allMode){
  var sv=document.getElementById('startVideo');
  var bk=document.createElement('button');
  bk.className='mbk';bk.innerHTML='\u2190 モジュール一覧に戻る';
  bk.onclick=backToList;
  sv.insertBefore(bk,sv.firstChild);
}

// Auto-height: tell parent iframe to resize (no scrollbar)
function reportHeight(){
  var h=document.getElementById('R').scrollHeight+48;
  window.parent.postMessage({qh:h},'*');
}
var ro=new ResizeObserver(reportHeight);
ro.observe(document.getElementById('R'));
setTimeout(reportHeight,300);
</script>
</body>
</html>
