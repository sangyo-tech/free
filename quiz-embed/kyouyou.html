    document.getElementById('panelVideo').style.display='none';
  }
  document.getElementById('panelCourse').style.display=t==='course'?'block':'none';
}

// Quiz engine
var quizzes={video:{qs:[],ci:0,sc:0,ans:[]},course:{qs:[],ci:0,sc:0,ans:[]}};

window.go=function(m){
  mode=m;var qz=quizzes[m];qz.ci=0;qz.sc=0;qz.ans=[];
  if(m==='video'){
    qz.qs=QD.questions.filter(function(q){return q.m===modIdx});
    for(var i=qz.qs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=qz.qs[i];qz.qs[i]=qz.qs[j];qz.qs[j]=t}
  }else{
    var pool=[].concat(QD.questions),sel=[];
    var totalPool=pool.length,targetQ=Math.min(34,totalPool);
    for(var mm=0;mm<34;mm++){var mq=pool.filter(function(q){return q.m===mm});if(mq.length>0)sel.push(mq[Math.floor(Math.random()*mq.length)])}
    var rem=pool.filter(function(q){return sel.indexOf(q)<0});
    var extrasNeeded=targetQ-sel.length;
    for(var i=0;i<extrasNeeded;i++){var p=rem.splice(Math.floor(Math.random()*rem.length),1)[0];if(p)sel.push(p)}
    for(var i=sel.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sel[i];sel[i]=sel[j];sel[j]=t}
    qz.qs=sel;
  }
  g('start'+(m==='video'?'Video':'Course')).style.display='none';
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.style.display='block';
  showQ(m);qEl.scrollIntoView({behavior:'smooth'});
};

function g(id){return document.getElementById(id)}

function showQ(m){
  var qz=quizzes[m],q=qz.qs[qz.ci],total=qz.qs.length;
  var cls=m==='video'?'c-video':'c-course';
  var qEl=g('q'+(m==='video'?'Video':'Course'));
  qEl.innerHTML='<div class="pg"><div class="pgb"><div class="pgf '+cls+'" style="width:'+((qz.ci/total)*100)+'%"></div></div><div class="pgc">'+(qz.ci+1)+' / '+total+'</div></div>'
    +'<div class="qm">\ud83d\udcd8 '+QD.titles[q.m]+'</div>'
    +'<div class="qt">'+q.q+'</div>'
    +(q.h?'<button class="hb" onclick="tH(\''+m+'\')">\ud83d\udca1 ヒントを見る</button><div class="hi" id="hi_'+m+'">'+q.h+'</div>':'')
    +'<div class="os" id="os_'+m+'"></div>'
    +'<div class="ex" id="ex_'+m+'"></div>'
    +'<button class="nx '+cls+'" id="nx_'+m+'" onclick="nxt(\''+m+'\')">'+(qz.ci<total-1?'次の問題へ →':'結果を見る →')+'</button>';
  var os=g('os_'+m);
  q.o.forEach(function(opt,i){
    var d=document.createElement('div');d.className='o';
    d.innerHTML='<span class="ol">'+L[i]+'</span><span>'+opt+'</span>';
    d.onclick=function(){sel(m,i)};os.appendChild(d);
  });
}

window.sel=function(m,idx){
  var qz=quizzes[m],q=qz.qs[qz.ci];
  var opts=g('os_'+m).querySelectorAll('.o');
  if(opts[0].classList.contains('lk'))return;
  opts.forEach(function(o){o.classList.add('lk')});
  var ok=idx===q.c;if(ok)qz.sc++;
  qz.ans.push({q:q,sel:idx,ok:ok});
  opts[q.c].classList.add('ok');
  if(!ok)opts[idx].classList.add('ng');
  var e=g('ex_'+m);e.textContent=(ok?'\u2705 正解！ ':'\u274c 不正解… ')+q.e;e.style.display='block';
  g('nx_'+m).style.display='inline-block';
};

window.tH=function(m){var h=g('hi_'+m);h.style.display=h.style.display==='none'?'block':'none'};

window.nxt=function(m){
  var qz=quizzes[m];qz.ci++;
  if(qz.ci<qz.qs.length){showQ(m);g('q'+(m==='video'?'Video':'Course')).scrollIntoView({behavior:'smooth'})}
  else showResult(m);
};

function showResult(m){
  var qz=quizzes[m];
  g('q'+(m==='video'?'Video':'Course')).style.display='none';
  var rEl=g('r'+(m==='video'?'Video':'Course'));rEl.style.display='block';
  var pct=Math.round(qz.sc/qz.qs.length*100),pass=m==='video'?pct>=70:pct>=80;
  var rank,rc;
  if(pct>=95){rank='S';rc='#d4a017'}else if(pct>=85){rank='A';rc='#22c55e'}else if(pct>=75){rank='B';rc='#3b82f6'}else if(pct>=60){rank='C';rc='#f59e0b'}else{rank='D';rc='#ef4444'}
  var wrongs=qz.ans.filter(function(a){return!a.ok});
  var h='<div class="rc '+(pass?'ps':'fl')+'">'
    +'<div class="rk" style="color:'+rc+'">'+rank+'</div>'
    +'<div class="rs">'+pct+'%</div>'
    +'<div class="rd">'+qz.qs.length+'問中 '+qz.sc+'問正解</div>'
    +(pass?'<div class="rpm">\ud83c\udf89 '+(m==='video'?'よくできました！':'合格おめでとうございます！')+'</div>':'<div class="rfm">'+(m==='video'?'もう一度動画を見て再挑戦してみましょう。':'合格基準（80%）に届きませんでした。動画を復習して再挑戦してみましょう。')+'</div>')
    +'<button class="B '+(m==='video'?'bg':'bo')+'" onclick="retry(\''+m+'\')" style="margin-top:10px">もう一度受ける</button></div>';
  if(wrongs.length>0){
    h+='<div class="rvt">間違えた問題の復習</div>';
    wrongs.forEach(function(w){
      h+='<div class="rvi"><div class="qm" style="margin-bottom:4px">\ud83d\udcd8 '+QD.titles[w.q.m]+'</div>'
        +'<div class="rvq">'+w.q.q+'</div>'
        +'<div class="rvy">\u2717 あなたの回答：'+L[w.sel]+'. '+w.q.o[w.sel]+'</div>'
        +'<div class="rvc">\u25cb 正解：'+L[w.q.c]+'. '+w.q.o[w.q.c]+'</div>'
        +'<div class="rve">\ud83d\udca1 '+w.q.e+'</div></div>';
    });
  }else{h+='<div style="text-align:center;color:#22c55e;font-weight:700;font-size:16px;padding:16px">\ud83c\udf8a 全問正解です！</div>'}
  rEl.innerHTML=h;
  rEl.scrollIntoView({behavior:'smooth'});
}

window.retry=function(m){
  g('r'+(m==='video'?'Video':'Course')).style.display='none';
  g('start'+(m==='video'?'Video':'Course')).style.display='block';
};

window.backToList=function(){
  document.getElementById('panelVideo').style.display='none';
  document.getElementById('panelSelect').style.display='block';
  document.getElementById('startVideo').style.display='block';
  document.getElementById('qVideo').style.display='none';
  document.getElementById('rVideo').style.display='none';
};

// In all mode, add back button to video start panel
if(allMode){
  var sv=document.getElementById('startVideo');
  var bk=document.createElement('button');
  bk.className='mbk';bk.innerHTML='\u2190 モジュール一覧に戻る';
  bk.onclick=backToList;
  sv.insertBefore(bk,sv.firstChild);
}

// Auto-height: tell parent iframe to resize (no scrollbar)
function reportHeight(){
  var h=document.getElementById('R').scrollHeight+48;
  window.parent.postMessage({qh:h},'*');
}
var ro=new ResizeObserver(reportHeight);
ro.observe(document.getElementById('R'));
setTimeout(reportHeight,300);
</script>
</body>
