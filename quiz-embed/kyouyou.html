<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>確認テスト | 産業技術アカデミー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:transparent}
#R{font-family:'Noto Sans JP',system-ui,sans-serif;color:#f1f5f9;line-height:1.7;max-width:800px;margin:0 auto;padding:24px 16px}
#R *{box-sizing:border-box;margin:0;padding:0}
#R button{font-family:inherit;cursor:pointer}

/* Tabs */
.tt{display:flex;gap:0;margin-bottom:32px;background:#0f172a;border-radius:14px;padding:5px;border:1px solid #1e293b}
.tb{flex:1;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:700;border:none;background:transparent;color:#64748b;transition:all .3s;letter-spacing:.02em;text-align:center}
.tb:hover:not(.on){color:#94a3b8;background:rgba(255,255,255,.03)}
.tb.on{color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.tb.t-video.on{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;box-shadow:0 4px 16px rgba(34,197,94,.3)}
.tb.t-course.on{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;box-shadow:0 4px 16px rgba(245,158,11,.3)}

/* Start */
.S{border-radius:14px;padding:32px 24px;text-align:center}
.S.s-video{background:linear-gradient(135deg,rgba(34,197,94,.05),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.S.s-course{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(245,158,11,.08));border:1px solid rgba(245,158,11,.2)}
.S h3{font-size:18px;font-weight:700;margin-bottom:8px;color:#f1f5f9}
.S p{color:#94a3b8;font-size:14px;margin-bottom:20px;line-height:1.8}
.sp{display:flex;justify-content:center;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.sv{font-size:22px;font-weight:700}
.s-video .sv{color:#22c55e}
.s-course .sv{color:#f59e0b}
.sl{font-size:11px;color:#64748b}

/* Buttons */
.B{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:12px;font-size:16px;font-weight:700;border:none;transition:all .3s;position:relative;overflow:hidden}
.B::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);opacity:0;transition:opacity .3s}
.B:hover{transform:translateY(-3px)}.B:hover::after{opacity:1}
.B:active{transform:translateY(-1px)}
.B.bg{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000;box-shadow:0 6px 24px rgba(34,197,94,.3)}
.B.bo{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;box-shadow:0 6px 24px rgba(245,158,11,.3)}

/* Quiz */
.Q{display:none}
.pg{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.pgb{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.pgf{height:100%;border-radius:3px;transition:width .3s}
.pgf.c-video{background:#22c55e}.pgf.c-course{background:#f59e0b}
.pgc{font-size:13px;color:#64748b;white-space:nowrap}
.qm{font-size:12px;color:#06b6d4;margin-bottom:8px;font-weight:500}
.qt{font-size:16px;font-weight:600;margin-bottom:18px;line-height:1.6;color:#f1f5f9}
.hb{font-size:12px;color:#d4a017;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);border-radius:6px;padding:4px 12px;margin-bottom:14px;display:inline-block}
.hi{display:none;font-size:13px;color:#94a3b8;background:rgba(212,160,23,.05);border-left:3px solid #d4a017;padding:10px 14px;border-radius:6px;margin-bottom:14px}
.os{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.o{background:#111827;border:2px solid #1e293b;border-radius:10px;padding:13px 16px;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;text-align:left;color:#f1f5f9}
.o:hover:not(.lk){border-color:#334155;background:#1a2332}
.ol{width:26px;height:26px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#94a3b8}
.o.ok{border-color:#22c55e;background:rgba(34,197,94,.08)}.o.ok .ol{background:#22c55e;color:#fff}
.o.ng{border-color:#ef4444;background:rgba(239,68,68,.08)}.o.ng .ol{background:#ef4444;color:#fff}
.ex{display:none;background:rgba(59,130,246,.06);border-left:3px solid #3b82f6;border-radius:6px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#94a3b8;line-height:1.7}
.nx{display:none;border:none;border-radius:8px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.nx:hover{transform:translateY(-2px)}
.nx.c-video{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000}
.nx.c-course{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}

/* Result */
.Rs{display:none}
.rc{border-radius:14px;padding:32px 24px;text-align:center;margin-bottom:24px}
.rc.ps{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.2)}
.rc.fl{background:linear-gradient(135deg,rgba(239,68,68,.04),rgba(239,68,68,.08));border:1px solid rgba(239,68,68,.2)}
.rk{font-size:52px;font-weight:700;margin-bottom:6px}
.rs{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.rd{font-size:14px;color:#94a3b8;margin-bottom:14px}
.rpm{font-size:15px;font-weight:600;color:#22c55e;margin-bottom:14px}
.rfm{font-size:15px;font-weight:600;color:#ef4444;margin-bottom:14px}
.rvt{font-size:16px;font-weight:700;margin-bottom:14px;color:#f59e0b}
.rvi{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:16px 18px;margin-bottom:10px;text-align:left}
.rvq{font-size:13px;font-weight:600;margin-bottom:6px;color:#f1f5f9}
.rvy{font-size:12px;color:#ef4444;margin-bottom:3px}
.rvc{font-size:12px;color:#22c55e;margin-bottom:6px}
.rve{font-size:12px;color:#94a3b8;line-height:1.6}

/* Module selector (all mode) */
.ms{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.mc{background:linear-gradient(135deg,#111827 0%,#0f172a 100%);border:1px solid #1e293b;border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:16px;text-align:left;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(34,197,94,.06) 0%,rgba(34,197,94,.02) 100%);opacity:0;transition:opacity .3s}
.mc:hover{border-color:#22c55e;transform:translateX(6px);box-shadow:0 4px 20px rgba(34,197,94,.12)}
.mc:hover::before{opacity:1}
.mc:active{transform:translateX(3px) scale(.99)}
.mn{width:36px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#22c55e;flex-shrink:0;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;background:none;border:none;box-shadow:none;margin-right:4px;text-shadow:0 0 12px rgba(34,197,94,.25)}
.mc:hover .mn{color:#4ade80;text-shadow:0 0 20px rgba(34,197,94,.5);transform:scale(1.12)}
.mdiv{width:1px;height:32px;background:linear-gradient(180deg,transparent,#334155 30%,#334155 70%,transparent);flex-shrink:0;margin:0 4px;transition:background .3s}
.mc:hover .mdiv{background:linear-gradient(180deg,transparent,#22c55e 30%,#22c55e 70%,transparent)}
.mt{font-size:14px;color:#e2e8f0;font-weight:600;line-height:1.5;position:relative;z-index:1}
.mt2{font-size:11px;color:#64748b;font-weight:400;margin-top:2px}
.mc:hover .mt{color:#fff}
.mc:hover .mt2{color:#94a3b8}
.marr{margin-left:auto;color:#334155;font-size:16px;transition:all .3s;position:relative;z-index:1}
.mc:hover .marr{color:#22c55e;transform:translateX(3px)}
.mhd{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mhd::before{content:'';display:inline-block;width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,#22c55e,#4ade80)}
.msd{font-size:13px;color:#94a3b8;margin-bottom:20px;padding-left:12px}
.mbk{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #1e293b;background:#111827;color:#94a3b8;cursor:pointer;margin-bottom:16px;transition:all .25s}
.mbk:hover{background:#1e293b;color:#f1f5f9;border-color:#334155;transform:translateX(-3px)}
.mcnt{display:inline-flex;align-items:center;justify-content:center;background:rgba(34,197,94,.1);color:#22c55e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px}

@media(max-width:600px){.qt{font-size:14px}.o{padding:11px 13px;font-size:13px}.S{padding:24px 16px}}
</style>
</head>
<body>
<div id="R">
  <div class="tt" id="tabs"></div>
  <div id="panelSelect" style="display:none">
    <div class="mhd">動画別 確認テスト<span class="mcnt">全34回</span></div>
    <div class="msd">テストしたいモジュールを選んでください</div>
    <div class="ms" id="modList"></div>
  </div>
  <div id="panelVideo" style="display:none">
    <div class="S s-video" id="startVideo">
      <h3 id="svTitle"></h3>
      <p>この動画の内容から出題されます。</p>
      <div class="sp">
        <div><div class="sv" id="svCount">10</div><div class="sl">問題数</div></div>
        <div><div class="sv">解説付き</div><div class="sl">正誤判定</div></div>
      </div>
      <button class="B bg" onclick="go('video')">テストを始める →</button>
    </div>
    <div class="Q" id="qVideo"></div>
    <div class="Rs" id="rVideo"></div>
  </div>
  <div id="panelCourse" style="display:none">
    <div class="S s-course" id="startCourse">
      <h3>品質管理 教養コース 確認テスト</h3>
      <p>34モジュールの内容からランダムに34問出題されます。</p>
      <div class="sp">
        <div><div class="sv">34</div><div class="sl">問題数</div></div>
        <div><div class="sv">80%</div><div class="sl">合格ライン</div></div>
      </div>
      <button class="B bo" onclick="go('course')">コーステストを始める →</button>
    </div>
    <div class="Q" id="qCourse"></div>
    <div class="Rs" id="rCourse"></div>
  </div>
</div>
<script>
const QUIZ_DATA = {"titles":["品質とは何か：お客様が決める「良い製品」","製造業の責任：製品とサービスにおける「品質」の定義と役割","品質管理の構造「設計」「製造」「安心」の3つの品質","品質構造と競争力：設計品質、製造品質、安心の品質：競争力を高める品質の要素","QCD入門：品質・コスト・納期のバランス","全社員で取り組む品質：「狭義の品質」から「広義の品質」へ","トレーサビリティとロット管理の重要性","品質不良が会社に与える影響","品質管理の真の目的：「ばらつき」を抑えて品質を安定させる","異常のメカニズム：バスタブ曲線から学ぶ：初期故障と「ばらつき」の深い関係","5Sの基本：整理・整頓・清掃・清潔・しつけ","「後工程はお客様」の考え方","ヒューマンエラー入門","4Mと変化点：品質に影響する要因を知る","問題と課題の定義「あるべき姿」と「ありたい姿」：「問題」と「課題」を正しく区別する","PDCAサイクル入門","SDCA：標準を守るサイクル","データで見る品質：なぜ数字が必要か","定量的データ分析の初歩：データの傾向を掴む：平均、範囲、分散、標準偏差の計算基礎","グラフの読み方と落とし穴","ヒストグラムで見るばらつき","報連相と5W1Hの基本","三現主義：現場・現物・現実","安全と品質は表裏一体","製造物責任法（PL法）入門","環境とサステナビリティ品質入門","サプライチェーンと品質のつながり","品質トラブル事例から学ぶ","品質に関わる仕事とキャリアパス","設計品質と製造品質の違い（超入門）","過剰品質ってなんだろう？","品質部門だけの仕事ではない品質","ヒヤリハット共有と未然防止のしかけづくり","品質マネジメントとは何か：ISO・TQM・現場改善のつながり"],"questions":[{"m":0,"q":"研修の冒頭で述べられた、製品の「良し悪し」を最終的に判断する存在として最も適切なものはどれですか？","o":["製造現場の熟練作業者","品質管理部門の責任者","市場とお客様","設計図面を作成した設計者"],"h":"私たちは「誰のために」モノづくりをしているかを考えてみてください。","c":2,"e":"台本にある通り、企業が内部で決めた規格を満たしていても、顧客が満足しなければ「良い品質」とは呼べません。最終的な審判を下すのは常に市場とお客様です。"},{"m":0,"q":"「設計品質（ねらいの品質）」の説明として、正しいものはどれですか？","o":["製品が図面通りにバラツキなく作られているかの尺度","顧客の声をもとに、どのような機能や性能を持たせるか決めた青写真","製造工程での不良率を低減させるための改善活動","コストを最小限に抑えるための材料選定基準"],"h":"「どのような製品を目指すか」という、モノづくりの出発点に関する用語です。","c":1,"e":"設計品質は、顧客のニーズを製品のスペックや機能に落とし込んだ「ねらい」を指します。1の選択肢は「製造品質（適合品質）」の説明です。"},{"m":0,"q":"台本において、企業間の競争力を生む「説得力」の正体として表現されている言葉はどれですか？","o":["最新鋭の生産設備","製品に仕込まれた「情報の束」","競合他社よりも低い販売価格","業界内での高い市場占有率"],"h":"製品が持つ仕様や性能、背景にある思想などをまとめた表現を探してください。","c":1,"e":"顧客を説得し、納得させる力の強さは、製品に込められた技術、品質、使い勝手などの「情報の束」によって決まると解説されています。"},{"m":0,"q":"品質マネジメントシステム（ISO 9001等）の本来の役割として、最も適切な説明はどれですか？","o":["認証マークを取得して企業の信頼をアピールするための宣伝材料","現場の作業手順を厳格に監視し、違反者を特定するための仕組み","企業の総合的なパフォーマンスを達成・維持・改善するための経営ツール","大量の記録書類を作成し、監査を無事に通過するための事務作業"],"h":"単なる品質保証の枠を超えた、より広い視点での役割を考えてみましょう。","c":2,"e":"QMSは単なるルールの遵守ではなく、収益、コスト、市場占有率などを含めた「経営のパフォーマンス」を向上させるための重要なツールです。"},{"m":0,"q":"食品工場の事例で挙げられた「過剰品質」がムダとされる最大の理由は何ですか？","o":["掃除の手間が増えて現場が混乱するから","最新の設備は故障した時の修理費が高いから", か？","o":["品質管理部門（検査部門）だけで孤立して活動すること","組織の全ての部門が連携し、それぞれの役割を明確にして活動すること","24時間体制で全数検査を実施し続けること","過去の不具合データを社外に一切漏らさないこと"],"h":"一部署の努力だけで「顧客の要求を満たし続けること」ができるかを考えてください。","c":1,"e":"品質保証は、設計、購買、製造、営業など、組織全体が連携する体系的な活動によって初めて達成されます。"},{"m":1,"q":"1995年に施行された「PL法（製造物責任法）」の主な目的は何ですか？","o":["製造業者の利益を不当な訴訟から守ること","製造物の欠陥により被害を受けた消費者を保護すること","リサイクルを促進し、環境負荷を低減すること","外国製品の輸入を制限し、国内産業を保護すること"],"h":"この法律は「誰の保護」を図るためのものかを思い出してください。","c":1,"e":"PL法は、製品の欠陥によって生命や財産に損害を受けた被害者を迅速かつ公平に救済することを目的としています。"},{"m":1,"q":"PL法が採用している「無過失責任（厳格責任主義）」という原則の説明として正しいものはどれですか？","o":["製造業者に「わざと（故意）」や「不注意（過失）」がなければ賠償責任は問われない","製品の欠陥と損害の因果関係が証明されれば、業者に過失がなくても賠償責任を負う","損害が発生しても、修理さえすれば賠償金を支払う必要はない","欠陥があっても、警告ラベルさえ貼っておけば責任は一切免除される"],"h":"「非常に厳しい原則」として紹介されている点に注目してください。","c":1,"e":"従来の民法とは異なり、メーカー側に過失（落ち度）が証明されなくても、製品そのものに「欠陥」があれば責任を問われる非常に重い責任原則です。"},{"m":1,"q":"PL法における「欠陥」の3つの分類に含まれないものはどれですか？","o":["設計上の欠陥","製造上の欠陥","表示・警告上の欠陥","販売価格の設定上の欠陥"],"h":"安全性に関わる「設計・作り方・伝え方」の不備が欠陥となります。","c":3,"e":"価格設定は経営判断であり、PL法上の「欠陥」には含まれません。設計・製造・表示（マニュアル等）の3つが対象です。"},{"m":1,"q":"製造やサービスの一部を外部に委託（アウトソース）した場合、顧客に対する最終的な責任は誰が負うことになりますか？","o":["実際に作業を行った外部の委託先（サプライヤー）","委託を決定した組織（自社）自身","外部委託を許可した国の監督官庁","製品を購入した顧客本人（自己責任）"],"h":"ISO 9001:2015で強化された管理責任の考え方を思い出してください。","c":1,"e":"たとえ一部を外部に任せたとしても、顧客に対する約束（要求事項）を果たす責任は、常に自社（組織）にあります。"},{"m":1,"q":"製品の欠陥によって生じる「間接的損失」に該当するものはどれですか？","o":["被害者への賠償金の支払い","欠陥品の回収（リコール）にかかる直接費用","消費者や従業員からの信頼低下、ブランドイメージの損失","訴訟のための弁護士費用"],"h":"お金で直接計算しにくい、目に見えにくい損失のことです。","c":2,"e":"賠償金などは「直接的損失」ですが、一度失った「信頼」は回復が難しく、将来の収益を大きく損なう間接的な大打撃となります。"},{"m":1,"q":"問題が発生した際、現象だけを対策する「もぐら叩き」を脱し、再発防止を徹底するための考え方を何と呼びますか？","o":["現状維持管理","暫定処置優先","源流管理と是正処置","現場丸投げ方式"],"h":"「設計・開発などの上流工程にさかのぼる」という言葉がキーワードです。","c":2,"e":"表面的な直しではなく、問題の「真の原因」を突き止め、設計やプロセスの根本（源流）を修正することを源流管理（是正処置）と言います。"},{"m":1,"q":"QMSを有効に機能させるために、不確実性がもたらす影響を計画段階で考慮する考え方を何と呼びますか？","o":["運任せの経営","リスクに基づく考え方","過去データ重視の考え方","利益第一主義"],"h":"「不確実性（リスク）」を計画段階でどう扱うか、という点に注目してください。","c":1,"e":"問題が起きてから対処するのではなく、あらかじめリスクを想定して予防的な対策を講じることが現代の品質管理には不可欠です。"},{"m":1,"q":"本研修のまとめとして、製造業が果たすべき真の責任とは何だと述べられていますか？","o":["最低限の法律さえ守り、罰則を受けないようにすること","どんな手段を使っても、競合他社より早く製品を出すこと","全社一丸となって、顧客に信頼と安心を伴う製品・サービスを保証し続けること","複雑なQMSの書類を完璧に整え、監査をパスすること"],"h":"最後のまとめのセクションにある「信頼と安心」という言葉を思い出してください。","c":2,"e":"単なる法遵守を超えて、顧客に対して「常に信頼できる価値」を提供し続けることこそが、製造業の存在意義であり責任です。"},{"m":2,"q":"本研修において、品質管理（QMS）の最終的な目的として定義されているものはどれですか？","o":["工場の稼働率を限界まで上げること","製品の適合を保証し、顧客満足を向上させること","競合他社の製品を市場から排除すること","検査員の人数を増やして、不良品を完璧に見つけること"],"h":"品質保証活動は「誰の要求」を満たすためのものかを考えてください。","c":1,"e":"QMSの真の目的は、単なる規格遵守ではなく、顧客が求める品質を保証することで満足度を高め、企業の収益や競争優位性を維持することにあります。"},{"m":2,"q":"「設計品質（ねらいの品質）」を一言で表すと、どのような活動の成果と言えますか？","o":["現場の作業ミスをゼロにする活動","不良品を検査で仕分ける活動","顧客の声を具体的な製品仕様に「翻訳」する活動","原価を極限まで引き下げるための活動"],"h":"「あいまいな市場ニーズ」を「図面」に変えるプロセスを思い出してください。","c":2,"e":"設計品質は、お客様の期待を正しく製品のスペックに反映させる「翻訳」の精度を指します。ここが間違っていると、どんなに丁寧に作っても良い製品にはなりません。"},{"m":2,"q":"「製造品質（適合品質）」において、製造業が最も注力して闘うべき対象は何ですか？","o":["「ばらつき（ムラ）」","「検査の時間」","「設計図面の書き直し」","「他社の特許」"],"h":"4M（人・設備・材料・方法）のわずかな違いが何を生むかを考えてください。","c":0,"e":"設計通りに作るためには、4Mの変化によって生じる「ばらつき」を抑え込むことが製造品質向上の核心です。"},{"m":2,"q":"製造品質に関する原則として、最も適切な考え方はどれですか？","o":["品質は検査によって後から付加されるものである","品質は検査で選別するのではなく、工程でつくり込まれるものである","検査を厳しくすればするほど、製造プロセスの実力は向上する","不良が出ても、検査で見つければ製造上の責任はない"],"h":"検査はあくまで「最終手段」であると述べられていました。","c":1,"e":"検査は不適合品を取り除くだけで、製品自体の良さを向上させるわけではありません。「工程（つくり方）」そのものを安定させることが重要です。"},{"m":2,"q":"「安心の品質」において、企業の社会的信頼を直接的に破壊する要因として挙げられているものはどれですか？","o":["内部での小さな作業ミス（すぐ修正されたもの）","市場に出てから問題となる「外部不良（クレーム）」","社内会議での意見の対立","カタログのデザイン変更"],"h":"お客様の手に渡った後のリスクを考えてください。","c":1,"e":"外部不良は、顧客の信頼を損なうだけでなく、重大な事故やリコールに繋がり、企業の存続を揺るがす大きなリスクとなります。"},{"m":2,"q":"製造物責任（PL法）において、製造業者が負う賠償責任の性質を何と呼びますか？","o":["努力義務","有過失責任","過失の有無にかかわらない損害賠償責任（無過失責任）","契約書に記載がある場合のみの限定責任"],"h":"被害者保護を目的とした「厳しい原則」のことです。","c":2,"e":"PL法では、製品に欠陥があり損害が生じた場合、メーカーに過失（落ち度）がなくても賠償責任を負う必要があります。"},{"m":2,"q":"事例1の「設計の欠陥」の背景にあった、組織的な問題点は何ですか？","o":["予算が足りなかったこと","最新の設備が導入されていなかったこと","責任追及を恐れて不備を報告できないコミュニケーションの欠如","顧客からの要望が多すぎたこと"],"h":"担当者が上司に報告できなかった「心理的な壁」に注目してください。","c":2,"e":"技術的なミス以上に、問題を隠蔽したり報告できなかったりする「企業倫理とコミュニケーションの不全」が、致命的な事故を招く要因となります。"},{"m":2,"q":"クレームを恐れるあまり、良品まで不良品と判断して廃棄してしまうムダを何と呼びますか？","o":["第二種の誤り","第一種の誤り","検査の合理化","ゼロリスク投資"],"h":"「ほんとうは不良ではないのに、不良としてしまう」誤りです。","c":1,"e":"この「第一種の誤り」が増えると、廃棄コストが増大し、経営を圧迫します。品質保証にはコスト意識とのバランス（境界線）も求められます。"},{"m":2,"q":"問題が起きた際、目先の現象だけを対策する「もぐら叩き」を脱するために必要な活動は何ですか？","o":["検査員の増員","不良品を隠すための対策","源流にさかのぼって真の原因を特定する「源流管理」","現場作業員への罰則強化"],"h":"「もぐら」が出てくる「穴（原因）」の根本を塞ぐ考え方です。","c":2,"e":"不良の再発を防ぐには、設計や製造プロセスの「源流」までさかのぼって、恒久的な是正処置（根本対策）を施すことが不可欠です。"},{"m":2,"q":"本研修のまとめとして、QMSを活用しPDCAサイクルを回すことで、最終的に達成すべきことは何ですか？","o":["顧客満足の向上と製造業としての責任を果たすこと","審査員に褒められるような書類を作ること","競合他社の欠点を見つけること","現場の作業をできるだけ複雑にすること"],"h":"台本の最後にある「製造業の責任」という言葉に注目してください。","c":0,"e":"継続的改善を通じて、信頼と安心を伴う製品を世に送り出し、顧客を満足させ続けることこそが、製造業が全社一丸となって取り組むべきゴールです。"},{"m":3,"q":"本研修において、品質マネジメントシステム（QMS）の真の目的として定義されているものはどれですか？","o":["外部機関からの認証（ISOなど）を維持すること","品質保証を通した「顧客満足の向上」","検査員のスキルを向上させ、不良品を100%発見すること","競合他社の製品仕様を詳細に分析すること"],"h":"規格への適合は手段であり、その先にある「誰のための活動か」を考えてください。","c":1,"e":"QMSの目的は、単なる形式的な認証取得ではなく、品質保証を通じて顧客の期待に応え、満足度を高めることで企業の競争力を維持・向上させることにあります。"},{"m":3,"q":"お客様が消費する製品の本質を、台本ではどのような言葉で表現していますか？","o":["物理的な材料の塊","低価格な消耗品","製品に仕込まれた「情報の束」","広告宣伝によるイメージ"],"h":"顧客を説得し、納得させる力の源泉を指す言葉です。","c":2,"e":"顧客は単なる物体を買うのではなく、そこに込められた機能、安全性、信頼性といった「情報の束」を評価し、納得して対価を支払います。"},{"m":3,"q":"「設計品質（ねらいの品質）」において、特に自動車産業などで安全欠陥や法規制抵触に直結するものとして管理が求められる項目は何ですか？","o":["表面の光沢度","特殊特性（SC）","梱包材の材質","組み立てラインの長さ"],"h":"設計のインプット段階で明確に指定し、特別に管理すべき重要な特性のことです。","c":1,"e":"特殊特性（SC）は、製品の安全性や法規制に関わる極めて重要な項目であり、設計段階でこれらを特定し、源流から管理することがリスク回避の鍵となります。"},{"m":3,"q":"「製造品質（適合品質）」の向上において、製造現場が向き合うべき本質的な課題は何ですか？","o":["検査記録のデジタル化","「ばらつき」（ムラ）との闘い","休憩時間の短縮","営業担当者との価格交渉"],"h":"4M（人、設備、材料、方法）が変化することで生じる現象を抑え込むことが重要です。","c":1,"e":"製造品質とは、設計図面通りに「つくり込む」度合いを指します。4Mを適切に管理し、製品ごとのばらつきを最小限にすることが生産効率と品質を両立させます。"},{"m":3,"q":"製造品質に関する考え方として、最も適切なものはどれですか？","o":["品質は、厳しい最終検査によって付加されるものである","品質は、検査で選別するのではなく工程でつくり込むものである","不良品が出ても、検査ですべて取り除けばコストへの影響はない","製造現場の役割は、スピードのみを追求することである"],"h":"検査はあくまで「選別」であり、品質そのものを良くする活動ではないという原則です。","c":1,"e":"品質は工程の中で作り出されるものであり、検査はあくまで不適合品を市場に出さないための防波堤です。要因系（4M）を管理し、不良を作らない工程を築くことが本質です。"},{"m":3,"q":"製造物責任法（PL法）において採用されている「無過失責任」とはどのような原則ですか？","o":["製造業者に過失（落ち度）がない限り、賠償責任は負わない","被害者がメーカーの過失を証明しなければ、賠償は受けられない","メーカー側に過失がなくても、製品に欠陥があれば賠償責任を負う","製品に警告ラベルを貼っていれば、いかなる事故でも責任は免除される"],"h":"被害者保護を目的とした、非常に厳しい「厳格責任主義」のことです。","c":2,"e":"PL法では、製造者の過失の有無を問わず、製品に「欠陥」があり、それによって損害が生じた場合には賠償責任が発生します。"},{"m":3,"q":"事例1のリコール問題において、根本原因として指摘されている組織的な課題は何ですか？","o":["技術者の知識不足","部門長が経営層に「悪いニュース」を報告できない企業体質","製造ラインの自動化の遅れ","市場調査のサンプル数が少なかったこと"],"h":"経営者が適切な判断を下すための「情報の流れ」に注目してください。","c":1,"e":"重大な品質問題は、技術的なミス以上に、情報の隠蔽や報告の遅れといった「企業体質・倫理」に起因することが多く、経営層の認識と体制構築が不可欠です。"},{"m":3,"q":"製造現場において、工程の不安定さや不良、故障といった問題を隠してしまう「城壁」に例えられているものは何ですか？","o":["高い工場の壁","複雑な作業マニュアル","過剰な在庫","厳しい入退室管理"],"h":"在庫が多いと、異常が発生しても生産が止まらないため、問題が表面化しにくくなります。","c":2,"e":"過剰在庫は、潜在的なムダや異常（機械故障、不良など）を顕在化させず、改善の機会を奪う「城壁」となります。適切な在庫削減は、品質改善の第一歩です。"},{"m":3,"q":"顧客の信頼を回復・向上させるために、不適合（不良）が発生した際に行うべき「是正処置」のポイントは何ですか？","o":["不良品をすぐに新品と交換するだけで終わらせる","担当者を厳しく罰して、緊張感を持たせる","「なぜ、なぜ」分析を繰り返し、真の原因まで掘り下げて再発防止を図る","次回から検査の回数を増やすことだけを決定する"],"h":"同じ問題を「二度と発生させない」ための、恒久的な対策に注目してください。","c":2,"e":"表面的な処置（もぐら叩き）ではなく、真の原因（根本原因）を特定し、プロセスを修正する是正処置こそが、顧客からの信頼を強固にします。"},{"m":3,"q":"品質活動において、部門の壁を越えて問題の源流（設計・開発など）にさかのぼって対策することを何と呼びますか？","o":["現場管理","源流管理","事後管理","検査管理"],"h":"不良が発生する「大もと」を正すという考え方です。","c":1,"e":"製造段階で起きた問題であっても、その原因が設計にあるならそこまでさかのぼって改善する「源流管理」が、最も効率的かつ効果的な品質向上・コスト削減の手法です。"},{"m":4,"q":"製造業の経営管理の根幹である「QCD」の定義として、最も適切な説明はどれですか？","o":["利益を最大化するために、品質を二の次にしてコストを下げること","所定の製品を、所定の品質・原価・数量・納期どおりに生産できるよう管理すること","納期さえ守れば、多少の品質のばらつきや予算オーバーは許容すること","競合他社よりも早く新製品を出すことだけを目的にすること"],"h":"QCDの各要素は独立しているのではなく、同時に達成すべき「所定の」目標です。","c":1,"e":"QCD管理とは、顧客と約束した「品質（Q）」「原価（C）」「納期・数量（D）」をすべて計画通りに遂行するための生産管理活動そのものを指します。"},{"m":4,"q":"近年の品質管理（QC）における考え方の変化として、正しいものはどれですか？","o":["「出荷検査」を強化して、不良品を外に出さないようにするだけで十分である","品質は「検査」で選別するものではなく、設計と製造の段階で「つくり込む」ものである","現場の作業者の「勘」に頼って、柔軟に品質基準を変えるべきである","品質を高めると必ずコストが無限に上がるため、ほどほどで良い"],"h":"問題が起きてから対処するのではなく、起きないように「源流」で対策する考え方です。","c":1,"e":"検査は不良を取り除くだけですが、設計や製造工程で品質を「つくり込む」ことで、不良そのものを発生させない強い体質を目指すのが現代のQCです。"},{"m":4,"q":"コスト（C）を構成する主な三要素（製造原価）に含まれないものはどれですか？","o":["材料費","労務費","経費","宣伝広告費"],"h":"「製品をつくるのに直接かかる費用」を指します。","c":3,"e":"製品原価は一般に「材料費」「労務費」「経費」の3つで構成されます。宣伝広告費は販売管理費などに含まれ、製造原価の直接的な構成要素とは区別されます。"},{"m":4,"q":"納期管理（D）において、「納期を守る」こと以外に含まれる重要な要素は何ですか？","o":["製品のパッケージデザイン","指示された「数量」を充足すること","担当者の接客マナー","次回作の試作品の提示"],"h":"期限に間に合っても、数が足りなければお客様の信頼を失います。","c":1,"e":"納期管理には、約束した「期日」を守ることに加え、必要な「数量」を確実に納めることが含まれます。"},{"m":4,"q":"「Q（品質）」と「C（コスト）」のトレードオフにおいて、避けるべき「ムダ」として挙げられているものはどれですか？","o":["顧客が対価を払わない水準まで資源を投入する「過剰品質」","法律で定められた安全基準を遵守するための投資","故障を未然に防ぐための定期的な設備メンテナンス","従業員の教育訓練費"],"h":"「良かれと思って」行うことが、実はコストだけを押し上げているケースです。","c":0,"e":"顧客が求めていない過剰なスペックや不必要な厳格検査は、付加価値を生まない「過剰品質」というムダになり、価格競争力を損なわせます。"},{"m":4,"q":"納期（D）の遅れを未然に防ぐために、製造工程において重要となる考え方はどれですか？","o":["出荷直前に全員で残業して帳尻を合わせる","早期段階で進捗を確認し、遅れに気付いたら即座に対策を講じる「源流管理」","納期が遅れそうなときは、検査を省略して時間を短縮する","顧客に連絡せず、黙って納入日を遅らせる"],"h":"問題を後工程に回さず、早い段階で見つけることが重要です。","c":1,"e":"最終段階で納期遅れが発覚しても手遅れです。工程の早い段階で進捗を可視化し、異常を検知して手を打つことが納期管理の鉄則です。"},{"m":4,"q":"開発・設計段階で生産準備などを同時並行的に進め、QCDを最適化する手法を何と呼びますか？","o":["フロントローディング","コンカレントエンジニアリング","もぐら叩き管理","経験と勘（KKD）"],"h":"「同時並行的（Concurrent）」に業務を処理する手法です。","c":1,"e":"コンカレントエンジニアリングは、各部門が並行して動くことで開発期間の短縮や品質の早期安定を図る手法です。"},{"m":4,"q":"上流（開発・設計段階）で最善の活動を行うことが、中流の生産活動において大きな効果をもたらすという考え方はどれですか？","o":["フロントローディング","アフターサービス","在庫の城壁","個別最適化"],"h":"負荷（Loading）を前（Front）に持ってくる、という言葉の意味を考えてください。","c":0,"e":"フロントローディングとは、開発の初期段階にリソースを集中させ、後工程で起きるトラブルを未然に防ぐことで、結果的に全体のQCDを飛躍的に向上させる考え方です。"},{"m":4,"q":"問題解決において、経験や勘（KKD）に頼るのではなく、客観的な「数値」に基づいて判断することを何と呼びますか？","o":["精神論による管理","忖度（そんたく）管理","事実に基づく管理","多数決による管理"],"h":"現場、現物、そして「データ」を重視する姿勢です。","c":2,"e":"経験や勘は大切ですが、誤った判断を避けるためには、パレート図などのQC七つ道具を用いた「事実（データ）に基づく管理」が不可欠です。"},{"m":4,"q":"本研修のまとめとして、QCD達成のために回し続けるべき基本的なサイクルは何ですか？","o":["3Mサイクル","PDCAサイクル","SNSサイクル","収益第一サイクル"],"h":"計画（Plan）、実行（Do）、点検（Check）、処置（Act）の繰り返しです。","c":1,"e":"継続的改善の基盤はPDCAサイクルです。目標に対する実績を監視・分析し、次の改善に繋げることで、QCDのバランスを高い次元で維持・向上させることができます。"},{"m":5,"q":"本研修において解説された「狭義の品質」が主に焦点を当てている側面はどれですか？","o":["顧客の潜在的なニーズの掘り起こし","製品が設計図面や仕様通りに作られているか（適合品質）","アフターサービスにおける接客の質","企業の社会的責任（CSR）の遂行"],"h":"品質管理の初期段階で専門家が中心に行っていた活動内容を思い出してください。","c":1,"e":"狭義の品質は、主に製造現場において「図面通りにできているか」という製造品質（適合品質）を指します。"},{"m":5,"q":"「広義の品質（TQM/TQM）」における品質の定義として、最も適切なものはどれですか？","o":["不良品率を0.1%以下に抑えること","製品そのものだけでなく、サービスや「仕事の質」まで含むもの","検査部門の担当者が認めた製品の状態","豪華なパッケージや過剰な装飾を施すこと"],"h":"TQM（総合的品質管理）では、管理対象がどこまで広がったかを考えてみましょう。","c":1,"e":"広義の品質では、目に見える製品だけでなく、それを提供するプロセス（仕事）やサービス全体の質を向上させることで、顧客満足を目指します。"},{"m":5,"q":"「狭義の品質」と「広義の品質」の違いを説明する文脈で、広義の品質が目指す究極の姿は何ですか？","o":["検査記録の書類を完璧に整えること","競合他社よりも1円でも安く作ること","お客様の期待を超え、企業が長期的に成功し、社会に貢献すること","現場の作業員を厳しく管理してミスをゼロにすること"],"h":"単なる「モノの出来栄え」を超えた、経営そのものとしてのゴールです。","c":2,"e":"広義の品質は経営戦略そのものであり、顧客満足を通じて企業の持続的な成長と社会貢献を実現することを目的としています。"},{"m":5,"q":"現場の第一線で働く人々が小グループで継続的に改善を行う活動を何と呼びますか？","o":["経営会議","QCサークル活動","外部監査","プロジェクトマネジメント"],"h":"日本の製造業を世界一の品質に押し上げたボトムアップの原動力です。","c":1,"e":"QCサークル活動は、現場の社員自らが「仕事の質」を管理・改善する活動であり、全員参加の品質管理の象徴的な手法です。"},{"m":5,"q":"部門を越えた連携において、「自分の仕事の次は誰か」を意識する際の重要な考え方はどれですか？","o":["前工程は先生である","後工程はお客様である","隣の部署はライバルである","検査員は敵である"],"h":"自分の出したアウトプットを受け取る相手をどう捉えるべきか、という視点です。","c":1,"e":"「後工程はお客様」という意識を持つことで、不備を次へ流さないという責任感が生まれ、部門間のスムーズな連携と源流管理が可能になります。"},{"m":5,"q":"品質管理において排除すべき「3ム」に含まれないものはどれですか？","o":["ムダ（付加価値を生まないもの）","ムラ（ばらつきがあるもの）","ムリ（負荷が大きすぎること）","ムチュウ（仕事に没頭すること）"],"h":"効率と品質を阻害する3つの「ム」から始まる言葉です。","c":3,"e":"改善の対象となるのは「ムダ・ムラ・ムリ」の3つです。これらを排除することが品質向上と生産性向上に直結します。"},{"m":5,"q":"組織が製造やサービスの一部を外部に委託（アウトソース）した場合、顧客に対する最終的な品質責任は誰が負いますか？","o":["実際に作業を行った外部委託先（サプライヤー）","製品を購入した顧客（自己責任）","委託を決定した自社（組織）","業界団体"],"h":"ISO 9001等の国際規格における責任の所在を思い出してください。","c":2,"e":"外注したとしても、顧客に対して「品質を保証する」という約束をしたのは自社であるため、外部提供者の管理を含めた全責任は自社が負います。"},{"m":5,"q":"「全社員で取り組む品質」を実現するために、行動の基本となるサイクルは何ですか？","o":["OODAループ","3現主義","PDCAサイクル","5S活動"],"h":"計画、実行、点検、処置を繰り返し、継続的に改善を回す仕組みです。","c":2,"e":"経営層から現場までがPDCAサイクルを回し、事実（データ）に基づいて改善し続けることが、全社的品質管理の核となります。"},{"m":5,"q":"全社的な品質管理において、判断の基準にすべき最も重要なものは何ですか？","o":["ベテラン社員の長年の勘","声の大きい人の意見","客観的な事実（データ）","昨年の慣例"],"h":"「KKD（経験・勘・度胸）」に頼らない管理のあり方です。","c":2,"e":"「事実に基づく管理」が鉄則です。QC七つ道具などを用いてデータを分析し、客観的な根拠を持って改善を進める必要があります。"},{"m":5,"q":"本研修のまとめとして、全社員が持つべき共通の視点はどれですか？","o":["「自分の担当範囲だけ終われば良い」という視点","「顧客（後工程含む）の視点に立ち、常に改善し続ける」という視点","「上司に怒られないように書類を整える」という視点","「今のやり方が最高なので変えない」という視点"],"h":"顧客指向と継続的改善こそが、強靭な企業体質を作る鍵です。","c":1,"e":"全社員が「顧客（次工程）が何を求めているか」を考え、現状に満足せずPDCAを回し続ける姿勢こそが、広義の品質を実現する唯一の道です。"},{"m":6,"q":"トレーサビリティ（追跡可能性）の定義として、最も適切な説明はどれですか？","o":["不良品が出ないように、製造スピードを極限まで遅くすること","原材料の由来まで遡ることと、製品の出荷先を特定できることの両方の流れを再現できること","全ての作業者の名前を製品のパッケージに印字すること","競合他社の製品がどこで作られたかを調査すること"],"h":"「遡る（トレースバック）」と「追いかける（トレースフォワード）」の両方が必要です。","c":1,"e":"トレーサビリティとは、原材料から製造、流通にいたるまでの「履歴」を双方向に追跡できる仕組みを指します。"},{"m":6,"q":"ロット管理における「ロット」の本来の意味は何ですか？","o":["その日に製造された全ての製品の総称","異なる原材料や条件でバラバラに作られた製品の集まり","同じ製造条件、原材料、製造日など「均一な情報」で表される製品の集合","工場内の倉庫に保管できる最大数量のこと"],"h":"「同じ条件で作られた仲間」という視点で考えてみてください。","c":2,"e":"ロットは、品質が均一であると見なせる単位で区切ることで、識別管理を可能にします。"},{"m":6,"q":"ロットを「小さく」形成することの最大の利点は何ですか？","o":["事務的な記録作業が減り、管理コストが安くなる","事故が発生した際、回収（リコール）する製品の範囲を絞り込める","倉庫のスペースを広く使えるようになる","一度に大量の製品を出荷できるようになる"],"h":"「リスク管理の経済性」という言葉を思い出してください。","c":1,"e":"ロットを細かく分けると、不具合があった際に「そのロットだけ」を特定して隔離できるため、損害を最小限に抑えられます。"},{"m":6,"q":"食品安全マネジメントシステム（FSMS）において、管理基準（CCP等）から逸脱した際に行う「修正（応急処置）」として正しい行動はどれですか？","o":["逸脱に気づかなかったことにして、そのまま出荷する","影響を受けた可能性のある製品を直ちに特定し、不適合品として識別表示・隔離する","翌日の会議で報告するまで、製品はそのままラインに流しておく","機械を止めるのはもったいないので、設定だけ直して製造を続ける"],"h":"まずは「怪しいもの」を市場に出さないための隔離が必要です。","c":1,"e":"基準を外れた製品は「安全でない可能性がある」ため、トレーサビリティ情報を活用して即座に隔離・ホールドする必要があります。"},{"m":6,"q":"不適合が発生した際、一時的な処置だけでなく「なぜ発生したか」を突き止め、再発を防ぐ活動を何と呼びますか？","o":["暫定処置","是正処置","特別採用","現状復帰"],"h":"原因を根絶するための「恒久的な対策」を指す言葉です。","c":1,"e":"是正処置は、問題の真因を除去し、二度と同じ不適合を起こさないための改善プロセスです。"},{"m":6,"q":"パン製造の具体例において、小麦粉の「Aロット」に問題があるとわかった時、最初に参照すべき記録は何ですか？","o":["従業員の出勤簿","原材料のロットと製品ロットの対応が書かれた「トレーサビリティ記録」","昨年の売上報告書","工場の清掃チェックリスト"],"h":"「どの材料が、どの製品に使われたか」を知るための記録です。","c":1,"e":"材料ロットと製品ロットの紐付け（対応）が記録されていれば、影響範囲を即座に特定できます。"},{"m":6,"q":"トレーサビリティシステムが正常に機能している場合、リコール時の対応はどうなりますか？","o":["安全性が確認されている製品も含め、全製品を回収しなければならない","問題のある原材料を使用した「特定の製品ロット」のみを迅速に回収できる","回収先がわからないため、新聞広告を出して待つしかない","原因究明に数ヶ月かかるため、回収は後回しにする"],"h":"ロット管理が「防御壁」として機能した際の結果を考えてください。","c":1,"e":"正確なロット管理により、安全な製品は市場に残し、危険な製品だけをピンポイントで回収できるため、信頼と利益を守れます。"},{"m":6,"q":"トレーサビリティを確保するための記録について、正しい管理方法はどれですか？","o":["出荷が終わったらすぐに破棄して良い","「記録一覧表」などで定められた期間、適切に維持・保管しなければならない","メモ書き程度で十分であり、正式な文書にする必要はない","現場の担当者が個人で持っていれば良い"],"h":"監査や緊急時にいつでも参照できる必要があります。","c":1,"e":"記録はQMSの要求事項であり、定められた期間、証拠として維持することが義務付けられています。"},{"m":6,"q":"研修のまとめで、トレーサビリティは何に例えられていましたか？","o":["豪華なシャンデリア（見た目を良くするもの）","飛行機のブラックボックス（万が一の際、原因究明を可能にするもの）","迷路の地図（従業員を混乱させるもの）","魔法の杖（何もしなくても品質が良くなるもの）"],"h":"普段は意識しないが、トラブル時に「事実」を教えてくれる重要な記録装置です。","c":1,"e":"ブラックボックスのように「いつ、誰が、何を、どうしたか」という詳細なデータが残っているからこそ、再発防止の教訓が得られるのです。"},{"m":6,"q":"トレーサビリティとロット管理を徹底することは、企業にとってどのような意味を持ちますか？","o":["作業者の手間を増やし、生産性を下げるだけの無駄な作業","お客様への健康被害を防止し、企業の社会的責任を果たすこと","法律を逃れるための隠れみの","検査員を減らすための口実"],"h":"研修の冒頭で述べられた「企業の信頼を守る」という視点です。","c":1,"e":"法令順守はもちろん、万が一の際の迅速な対応を可能にすることは、顧客の安全を守り、企業の信頼を維持するための不可欠な責務です。"},{"m":7,"q":"品質不良の影響を「内部不良」と「外部不良」に分けたとき、外部不良の説明として最も適切なものはどれですか？","o":["製品が出荷される前に工場内で発見され、手直しされる不良","製品が出荷された後に、顧客からの苦情やクレームとして発覚する不良","原材料の仕入れ段階で見つかった、仕入先の不良","事務作業のミスで、伝票の数字を書き間違えた不良"],"h":"「市場に流出してしまったもの」を指す言葉です。","c":1,"e":"外部不良は顧客の手に渡った後に発覚するため、信頼失墜やリコール費用など、内部不良よりもはるかに甚大な損害をもたらします。"},{"m":7,"q":"検査において「本当は不良ではないのに不良と判断してしまう誤り（第一種の誤り）」が会社に与える主な悪影響は何ですか？","o":["顧客に不良品が届いてしまい、クレームになる","良品を不当に廃棄・手直しすることになり、ムダなコストが発生する","検査員の作業スピードが上がりすぎて、見落としが増える","製品の販売価格を上げなければならなくなる"],"h":"「もったいない廃棄」が発生している状態を想像してください。","c":1,"e":"第一種の誤りは、本来売れるはずの良品を捨てたり直したりするため、生産性を下げ、製造原価を押し上げる直接的な「ムダ」となります。"},{"m":7,"q":"顧客の信頼を一気に失う原因となる「本当は不良なのに良品と判断してしまう誤り（第二種の誤り）」の結果、発生するものはどれですか？","o":["内部不良コストの増大","外部不良（クレーム）の発生","現場のモチベーションアップ","設備稼働率の向上"],"h":"「見逃し」によって不良品が市場に出てしまった場合、何が起きるでしょうか。","c":1,"e":"第二種の誤りは「流出」を意味します。これが市場でのクレームに直結し、企業のブランドイメージを破壊する最も恐ろしい誤りです。"},{"m":7,"q":"台本で述べられている「致命傷回避戦略」が必要になるのは、どのような状況ですか？","o":["新製品の売れ行きが好調で、増産が必要なとき","些細な事務ミスが1件発生したとき","深刻な品質問題により、企業の存続（倒産や破綻）が危ぶまれるとき","競合他社が値下げキャンペーンを始めたとき"],"h":"「致命傷」を避けるための、極めて厳しい経営判断が求められる状況です。","c":2,"e":"大規模なリコールや食中毒事故などは、一瞬で企業を倒産に追い込みます。その際、顧客の選別やコストの抜本的見直しなど、生き残るための「致命傷回避戦略」が必要となります。"},{"m":7,"q":"食品製造において、害虫や異物混入が特に深刻な問題となる理由は何ですか？","o":["異物が入っている方が、味が良くなるから","「安全であること」という、顧客にとっての「当たり前品質」を破壊するから","異物を取り除くための専用の機械が非常に高価だから","異物混入は、法律で一切禁止されていないから"],"h":"顧客が「これだけは満たされていて当然だ」と信じている前提条件を考えてください。","c":1,"e":"食品における安全は、あって当然の「当たり前品質」です。これが崩れると、顧客は強い怒りと不信感を抱き、二度とその製品を買わなくなります。"},{"m":7,"q":"製品に健康被害の恐れがある不適合が見つかった際、被害拡大を防ぐための迅速なアクションは何ですか？","o":["営業担当者が個別に謝罪して回る","トレーサビリティ情報を活用し、関連ロットを特定して速やかに回収（リコール）する","次の製造分から品質を良くすることを約束する","問題が公になるまで、しばらく様子を見る"],"h":"市場にある「危ないもの」をいち早く特定し、集める仕組みのことです。","c":1,"e":"トレーサビリティ（追跡可能性）が確立されていれば、被害を最小限の範囲で食い止め、迅速に回収することが可能になります。"},{"m":7,"q":"台本において、作業者が手順通りに作業せず不良が発生した場合、最終的な「不良責任」は誰にあるとされていますか？","o":["ミスをした作業者本人","原材料を納入した仕入先","正しい手順を教え込み、管理すべきだった監督者（ラインリーダー）","製品を購入した消費者"],"h":"管理・指導の立場にある人の責任について述べられた箇所を思い出してください。","c":2,"e":"作業者が正しい方法を知らなかったり、守れない環境だったりする場合、その責任は教育・監督を怠ったリーダーにあると考えるのが品質管理の厳しい原則です。"},{"m":7,"q":"問題が発生した際、その場しのぎの「修正（応急処置）」だけで終わらせてはいけない理由は何ですか？","o":["修正にはお金がかからないから","修正だけでは真の原因が残っており、必ず「再発」するから","修正を繰り返すと、作業者の腕が上がるから","修正は法律で禁止されているから"],"h":"「もぐら叩き」にならないためには、何が必要でしょうか。","c":1,"e":"現象だけを直す「修正」に対し、原因を絶つ「是正処置」を行わない限り、同じ不良は形を変えて何度も発生し続け、会社を蝕みます。"},{"m":7,"q":"品質不良の影響を例えた表現として、最も適切なものはどれですか？","o":["打ち上げ花火（一瞬で消えてなくなるもの）","ダムの小さな亀裂（放置すると全体が決壊し、壊滅的な被害を及ぼすもの）","恵みの雨（企業の成長を促すもの）","宝探し（改善のヒントがたくさん隠されている楽しいもの）"],"h":"最後の「まとめ」で述べられた比喩表現です。","c":1,"e":"最初は小さな「内部不良」という水漏れでも、根本原因を放置すれば企業という巨大なダムを崩壊（倒産）させるエネルギーを持っていることを忘れてはなりません。"},{"m":7,"q":"本研修の結論として、最高の品質を保証するために最も徹底すべき活動は何ですか？","o":["検査員を10倍に増やして、流出を力ずくで止める","不良を発生させない「工程でつくり込む」活動を徹底する","クレームが来たら、すぐに返金して口封じをする","難しい品質用語をたくさん覚える"],"h":"「検査」よりも「作り方」に注目してください。","c":1,"e":"不良を「見つける」のではなく「作らない」工程を築くことが、コスト・納期・信頼のすべてを守る唯一の道です。"},{"m":8,"q":"品質管理（QC）において、お客様に常に同じ満足を提供するために「闘うべき対象」として挙げられているものはどれですか？","o":["競合他社の販売価格","製品ごとの「ばらつき」（ムラ）","休憩時間の長さ","工場の建屋の老朽化"],"h":"作る日や人によって結果が変わってしまう現象を何と呼ぶか思い出してください。","c":1,"e":"品質管理の核心は、インプットや工程の変動によって生じる「ばらつき」を抑え、常に一定の品質（安定性）を保つことにあります。"},{"m":8,"q":"ばらつきを発生させる主な要因系として挙げられる「4M」に含まれないものはどれですか？","o":["人（Man）","設備（Machine）","資金（Money）","方法（Method）"],"h":"製造現場で直接「つくり込む」ために関わる4つの要素です。材料（Material）もその一つです。","c":2,"e":"4Mとは「人・設備・材料・方法」を指します。これらに「環境（Environment）」を加えた変化が、品質のばらつきの原因となります。"},{"m":8,"q":"収集したデータ全体の分布や、ばらつきの姿をひと目で読み取るために適したQC手法はどれですか？","o":["パレート図","特性要因図","ヒストグラム","チェックシート"],"h":"データの散らばり具合を「山」の形で表すグラフです。","c":2,"e":"ヒストグラムは、データの分布状況を視覚化し、ばらつきの大きさや中心値、異常なデータの有無を確認するのに非常に有効です。"},{"m":8,"q":"工程が安定した状態にあるかどうかを調べ、時系列による変化や「異常の有無」を判断するために用いる手法は何ですか？","o":["管理図","散布図","層別","棒グラフ"],"h":"管理限界線を記入し、点が線を外れたり並び方に癖があったりする場合に「異常」とみなす手法です。","c":0,"e":"管理図は、工程が「安定状態」にあるか、あるいは「特別原因（異常）」が発生しているかをリアルタイムで判断するためのツールです。"},{"m":8,"q":"不安定な工程において、排除すべき「特別原因（異常な変動要因）」とはどのようなものですか？","o":["どんなに注意しても発生する、工程そのものに備わったわずかな変動","材料の不備や設備の故障など、特定可能な明らかな異常原因","季節による気温のわずかな変化","測定誤差の範囲内の数値"],"h":"「共通原因（固有の変動）」とは異なり、手を打つことで取り除ける異常のことです。","c":1,"e":"特別原因（異常原因）を特定して取り除くことが、工程を安定させる第一歩です。残る共通原因を減らすには、プロセス自体の根本的な改善が必要になります。"},{"m":8,"q":"「たまご焼き」の事例において、焦げ付き不良の真犯人（原因）として特定されたのは何でしたか？","o":["卵の賞味期限が切れていたこと","調理器具が古すぎたこと","生産量増加に伴う、作業方法（撹拌条件）のムラ","作業者の体調不良"],"h":"「仕込み量が多いときに砂糖が溶けきっていない」という事実に注目してください。","c":2,"e":"生産量が変わったのに、従来と同じ「方法（Method）」を続けていたことがばらつきを生んでいました。状況変化に合わせた標準化の重要性を示す例です。"},{"m":8,"q":"製造品質のばらつきや工程の悪さを隠してしまう「城壁」に例えられているものは何ですか？","o":["過剰な在庫（仕掛品）","厳しい社内ルール","高性能な検査機","完璧なマニュアル"],"h":"これが多いと、異常が発生してもラインが止まらないため、問題の解決が先送りされます。","c":0,"e":"在庫が多いと、不良や故障などの「ムダ」が表面化せず、改善活動を妨げる原因となります。"},{"m":8,"q":"測定機器の校正期限が過ぎていた場合、どのようなリスクが生じますか？","o":["測定が早くなる","測定結果の妥当性が保証されず、誤った判断（ばらつき）を招く","電気代が安くなる","測定機器が壊れやすくなる"],"h":"「ものさし」自体が狂っていたら、品質が安定しているか正しく判断できるでしょうか。","c":1,"e":"測定のばらつきも大きな問題です。校正されていない機器での測定は信頼性がなく、過去に遡って製品への影響を調査（トレーサビリティ）する必要があります。"},{"m":8,"q":"「なぜなぜ問答」を繰り返し、問題の根本を断つために、設計や製造プロセスの「大もと」に遡って対策することを何と呼びますか？","o":["応急処置","暫定対策","源流管理","現場丸投げ"],"h":"川の流れの「源」を正すイメージです。","c":2,"e":"目先の現象（焦げた、壊れた）を直すだけでなく、その原因を作っている上流工程を改善することが、安定した品質への近道です。"},{"m":8,"q":"本研修のまとめとして、品質管理における意思決定の基盤とすべきものはどれですか？","o":["ベテラン社員の長年の「勘」","管理職の「推測」","データに基づく「客観的な事実」","昨年の資料の書き換え"],"h":"経験や主観ではなく、QCツールで「見える化」されたものを信じる姿勢です。","c":2,"e":"「事実に基づく管理」こそがQCの鉄則です。データからばらつきの正体を突き止め、PDCAを回し続けることが、お客様の信頼を勝ち取る唯一の方法です。"},{"m":9,"q":"製品の故障率の時間的変化をグラフ化した「バスタブ曲線」において、使用開始直後に故障率が高い期間を何と呼びますか？","o":["偶発故障期","摩耗故障期","初期故障期","安定稼働期"],"h":"浴槽の左側の淵にあたる、導入初期の段階です。","c":2,"e":"製品の使い始めに、設計や製造上の潜在的な欠陥が露呈して発生する故障期間を「初期故障期」と呼びます。"},{"m":9,"q":"バスタブ曲線の「初期故障」が発生する主な原因として、台本で指摘されているものはどれですか？","o":["長期間の使用による部品のすり減り","製造工程における「ばらつき（特別原因）」による不適合品の混入","予測不可能な天変地異","メンテナンスのやりすぎ"],"h":"突発的で異常な変動要因が市場への流出を招くケースに注目してください。","c":1,"e":"初期故障の多くは、本来あるべき範囲を超えた「特別原因」によって生じた不良品が、検査をすり抜けて流出した結果として起こります。"},{"m":9,"q":"バスタブ曲線の中央部分で、故障率が低く安定している「偶発故障期」の故障原因は何とされていますか？","o":["設計ミス","部品の寿命","共通原因（固有の変動）に基づく予測困難な事象","意図的な破壊工作"],"h":"工程が統計的に安定していても発生しうる、避けがたい微細な変動です。","c":2,"e":"偶発故障期は、特定の異常（特別原因）がない安定した状態ですが、それでも確率的に発生してしまう「共通原因」による故障が支配的です。"},{"m":9,"q":"バスタブ曲線の右側で、寿命により故障率が再び上昇する期間を何と呼びますか？","o":["青年期","摩耗故障期","導入期","偶発故障期"],"h":"物理的な限界や劣化が原因となる期間です。","c":1,"e":"長年の使用により、部品の疲労や劣化が進み、製品としての寿命を迎える段階を「摩耗故障期」と呼びます。"},{"m":9,"q":"食品製造の事例において、スープへの「金属片混入」を引き起こしたフィルターの破損は、どのような要因に分類されますか？","o":["共通原因（避けられない微細な変動）","特別原因（突発的・異常な変動要因）","経年劣化（摩耗故障）","自然現象"],"h":"メンテナンス不足や設備の異常な摩耗は、本来防げたはずの「異常」です。","c":1,"e":"決められたルール（PRP）が守られなかったり、突発的な破損が起きたりすることは「特別原因」であり、これが初期故障の引き金となります。"},{"m":9,"q":"不適合の発生を物理的に防ぐ仕組みとして紹介されている用語はどれですか？","o":["モグラ叩き","ポカヨケ（エラー防止法）","フル稼働","現状維持"],"h":"ミスをしようとしてもできないようにする、製造現場の工夫のことです。","c":1,"e":"マグネットフィルターの設置のように、人の注意に頼らずシステムとして不良を防ぐ仕組みを「ポカヨケ」と呼び、是正処置として非常に有効です。"},{"m":9,"q":"ある工程で実施した有効な再発防止策を、他の類似のプロセスや製品にも適用することを何と呼びますか？","o":["垂直統合","水平展開","現場放棄","個別対応"],"h":"良い対策を「横に広げる」イメージです。","c":1,"e":"1つの失敗から得た教訓を、似たようなリスクがある他の場所にも適用（水平展開）することで、組織全体の信頼性を高めます。"},{"m":9,"q":"設計・開発の段階で、潜在的な故障モードを予測・評価し、初期故障を未然に防ぐためのリスク予防ツールは何ですか？","o":["損益計算書","FMEA（故障モード影響解析）","組織図","タイムカード"],"h":"「故障（Failure）のモード」を解析する手法です。","c":1,"e":"FMEAを活用することで、製造が始まる前に「どこが壊れやすいか」を予測し、設計段階で対策を打つ（源流管理）ことが可能になります。"},{"m":9,"q":"品質の安定化を達成するために、製造工程を何に例えて説明していましたか？","o":["荒れ果てた砂漠","健全に保つべき「土壌」","流れの速い川","壊れやすいガラス細工"],"h":"ヒントはありません","c":0,"e":"工程（プロセス）を健全な「土壌」として常に監視・整備することで、不良品という悪い種を排除し、安定した品質を実現します。"},{"m":9,"q":"初期故障を抑え、お客様に「安心」を提供し続けるために最も重要な姿勢はどれですか？","o":["不良が出たら、その場しのぎの修正だけを行う","検査員を増やして、ひたすら不良品を「選別」する","特別原因を排除し、工程を安定させた上で「源流管理」を徹底する","故障は仕方がないと諦める"],"h":"不良を「出す・出さない」ではなく、根本から「作らない」ための活動です。","c":2,"e":"特別原因による「ばらつき」を抑え、工程を安定させることが製造品質の基本です。さらに源流（設計）に遡って対策することで、初期故障を最小限に抑えられます。"},{"m":10,"q":"5S活動の「真の目的」として、台本で最も強調されているものはどれですか？","o":["来客時に褒められるよう、見た目をきれいにすること","作業の「効率」を高め、ムダ・ムラ・ムリを排除すること","余った時間をすべて休憩に充てること","高価な清掃用具を揃えて、最新の設備に見せること"],"h":"必要なものがすぐ取れて、すぐ戻せる状態が何を生むかを考えてください。","c":1,"e":"5Sの究極の目的は、職場からムダを省き、作業をスピードアップさせ、企業の総合的なパフォーマンス（QCDなど）を向上させることにあります。"},{"m":10,"q":"「整理（Seiri）」の具体的な内容として、正しい説明はどれですか？","o":["全てのものを使いやすいように並べること","要るものと要らないものを選り分け、要らないものを処分すること","毎日少しずつ、1年かけてゆっくり片付けること","汚れたものを洗剤できれいに磨くこと"],"h":"「捨てる」勇気が試されるステップです。","c":1,"e":"整理とは、まず「要らないものを捨てる」ことです。これができていないと、次のステップである整頓に進むことができません。"},{"m":10,"q":"「整頓（Seiton）」において、誰でもすぐに取り出せる状態を作るための管理手法を何と呼びますか？","o":["秘密保持管理","定位置管理（指定席化）","抜き打ち管理","担当者限定管理"],"h":"モノの「住所」を決めるという考え方です。","c":1,"e":"整頓は、置く場所（定位置）、置くモノ（定品）、置く量（定量）を明確にし、誰でも迷わず作業できる状態にすることです。"},{"m":10,"q":"5S活動の成否を分けるほど重要とされる、「5Sはこの〇〇で決まる」と言われる項目はどれですか？","o":["整理","整頓","清掃","清潔"],"h":"必要なものを「必要なときに、必要なだけ」取り出せる仕組みの部分です。","c":1,"e":"台本では、整頓こそが5Sの要であり、ここを徹底することで作業効率が劇的に変わると述べられています。"},{"m":10,"q":"「清掃（Seisou）」を活性化させるための理想的なアプローチとして、正しいものはどれですか？","o":["年に一度、大掃除として全員で一日中行う","汚れの発生源そのものを対策し、「清掃しないですむ仕組み」を作る","特定の清掃担当者だけに任せて、他の人は作業に集中する","ゴミが見えなくなるまで、機械の裏に押し込む"],"h":"汚れを「取る」だけでなく、「出さない」工夫が重要です。","c":1,"e":"清掃は点検でもあります。汚れの元を断つ「発生源対策」まで踏み込むことで、清掃の負荷を減らし、設備の異常にも気づきやすくなります。"},{"m":10,"q":"「清潔（Seiketsu）」の定義として、工業において重視される視点はどれですか？","o":["毎日、新品の作業服に着替えること","整理・整頓・清掃のPDCAを回し、汚れない状態を維持・継続すること","消毒液ですべての工具を殺菌すること","職場に花を飾り、香りを良くすること"],"h":"3S（整理・整頓・清掃）を「維持する」という継続性の段階です。","c":1,"e":"清潔とは、一時的にきれいにするのではなく、3Sの状態を標準化し、常に保たれている「仕組み」が機能している状態を指します。"},{"m":10,"q":"「しつけ（Shitsuke）」において、最も重要とされる要素は何ですか？","o":["厳しい罰則を設けて、無理やり守らせること","決められたことを正しく守る「習慣づけ」をすること","5Sの標語を100回唱えさせること","個人の判断でルールを自由に変えて良いと教えること"],"h":"教育を通じて「納得による行動」を伴うことが鍵です。","c":1,"e":"しつけは、ルールを守ることが当たり前の文化にすることです。これが定着することで、品質意識が向上し、企業の信頼感に繋がります。"},{"m":10,"q":"具体例として挙げられた「工具ボード」に、工具の形をアウトラインで表示する目的（見える化）は何ですか？","o":["ボードのデザインを華やかにするため","工具が一つでも欠けているときに、一目で分かるようにするため","工具の名前を覚える手間を省くため","絵が得意な社員の才能を活かすため"],"h":"異常（モノがない状態）を誰でも即座に発見できるようにするための工夫です。","c":1,"e":"「見える化」を徹底することで、紛失や戻し忘れを即座に検知でき、探すムダや異物混入のリスクを減らすことができます。"},{"m":10,"q":"5Sを維持・発展させるために欠かせない組織的な姿勢はどれですか？","o":["管理職だけが頑張る「トップダウン方式」","興味のある人だけがやる「自由参加方式」","全員参加による「標準化」と「教育」","忙しいときは5Sを一切やらない「後回し方式」"],"h":"5Sは個人のセンスではなく、組織全体の「基準」として取り組む必要があります。","c":2,"e":"5Sは全員が同じ基準で動くことが不可欠です。社内基準を明確にし、教育を通じて全員が参加することで初めて、強固な基盤となります。"},{"m":10,"q":"本研修のまとめとして、5Sを何に例えて説明していましたか？","o":["華やかな「屋根」（企業の看板）","企業の競争力を支える「インフラ（地下の土台）」","持ち運び可能な「道具箱」（一時的なツール）","読み終わったら捨てる「雑誌」（流行りもの）"],"h":"5Sが整っていないと、その上に何を建てても安定しないという比喩です。","c":1,"e":"5Sは水道や電気のような「インフラ」です。目立たないかもしれませんが、これが整備されているからこそ、高い品質（Q）やコスト（C）の競争力が実現できるのです。"},{"m":11,"q":"本研修における「アト工程」という言葉の定義として、最も適切なものはどれですか？","o":["製品を最終的に購入してくれる一般消費者","自分の仕事を受け取って、その続きの作業を行う人や部門","すでに作業が終わって、自分に仕事を渡してくれた人","会社の外にいる協力会社や外注先"],"h":"バトンリレーで次に走るランナーをイメージしてください。","c":1,"e":"「アト工程」とは、自分のアウトプット（成果物）を受け取って次の処理を行うすべての同僚や部署を指します。"},{"m":11,"q":"研修の目的として挙げられている「利他的な品質保証」とは、どのような意識を持つことですか？","o":["自分のノルマさえ達成すれば、後のことは気にしない","次の人が使いやすいか、困らないかという視点で仕事を仕上げる","他人のミスを肩代わりして、自分の仕事を後回しにする","お客様に無料でサービスを提供し続ける"],"h":"「自分さえ良ければいい」という考えの反対にある姿勢です。","c":1,"e":"次の人がスムーズに作業に取り掛かれるように配慮することが、組織全体のムダを省き、最終的な顧客満足（CS）に繋がります。"},{"m":11,"q":"品質管理（QC）の鉄則である「三つの原則」に含まれないものはどれですか？","o":["不良を作らない","不良を流さない","不良を受け取らない","不良を隠さない"],"h":"台本で解説された、工程間での「不良品」に対する3つの構えを思い出してください。","c":3,"e":"「作らない・流さない・受け取らない」がQCの三原則です。「隠さない」も重要ですが、この文脈での鉄則はこの3つを指します。"},{"m":11,"q":"三つの原則の中で、アト工程に迷惑をかけないために「最も重要」とされているのはどれですか？","o":["不良を作らない","不良を流さない","不良を受け取らない","不良を分析しない"],"h":"もしミスをしても、ここで食い止めればアト工程の手直しは発生しません。","c":1,"e":"万が一ミスが発生しても、自工程で発見して「流さない」ことが、アト工程のムダ（手直し）や最終的なクレームを防ぐ防波堤となります。"},{"m":11,"q":"不完全な仕事をアト工程に流してしまった結果生じる、負の連鎖として適切なものはどれですか？","o":["アト工程の人が暇になる","アト工程の人がミスを修正する「手直し」というムダが発生する","組織全体のスピードが劇的に向上する","製品の販売価格が安くなる"],"h":"後の人があなたのミスをカバーするために何を使うかを考えてください。","c":1,"e":"不完全な仕事はアト工程の時間を奪い、気づかれなければ雪だるま式に大きな問題となって最終顧客に届いてしまいます。"},{"m":11,"q":"オフィスワークの事例において、「アト工程はお客様」を実践している良い例はどれですか？","o":["収集した生データを、加工せずにそのままメールで送る","相手が判断しやすいように、重要ポイントを要約して送る","ファイル名を「新しいフォルダ」のままにして提出する","結論を書かずに、長い経緯だけを詳しく報告する"],"h":"「読み手（アト工程）」の時間を奪わないための工夫はどれでしょうか。","c":1,"e":"相手がすぐに次のアクションを起こせる状態で渡すことこそが、プロの品質保証です。"},{"m":11,"q":"サービス業や製造現場において、次に来る人が「トップスピードで働ける状態」にするための行動はどれですか？","o":["使った道具を出しっぱなしにして帰る","減った資材を補充し、道具を定位置に戻しておく","申し送り事項をメモに残さず、口頭のみ（または言わず）に頼る","自分のシフトが終わる5分前にすべての作業をやめる"],"h":"次の人が「片付け」から始めなくて済むようにするにはどうすればよいでしょうか。","c":1,"e":"道具の定位置管理や資材の補充は、アト工程に対する「おもてなし」であり、生産性を維持するための基本です。"},{"m":11,"q":"「アト工程はお客様」というマインドセットを別の言葉で表現すると、何と言い換えられますか？","o":["徹底した自己中心主義","思いやりの想像力","責任転嫁のスキル","完璧な個人プレー"],"h":"自分が渡したものを相手がどう思うか、先を考える力のことです。","c":1,"e":"自分の仕事の先にいる誰かの顔を思い浮かべ、その人の立場に立って仕上げることがこの考え方の本質です。"},{"m":11,"q":"「アト工程はお客様」を実践し、「あの人の仕事はやりやすい」と信頼されることで得られるメリットは何ですか？","o":["仕事がどんどん増えて、自分の時間がなくなる","社内における「信頼残高」が増え、結果として自分自身も助かる","自分の給料がその場ですぐに倍になる","誰からも話しかけられなくなる"],"h":"良好な人間関係と円滑な業務遂行は、最終的に誰の利益になるでしょうか。","c":1,"e":"信頼を築くことは、手戻りを減らすだけでなく、チーム全体の協力を得やすくし、自分自身の働きやすさにも繋がります。"},{"m":11,"q":"本研修のまとめとして、仕事において常に問いかけるべき「問い」はどれですか？","o":["「この仕事で、いくら儲かるだろうか」","「このバトンの渡し方で、次の人はすぐに走り出せるだろうか」","「どうすれば、自分だけ早く帰れるだろうか」","「ミスが見つかったとき、誰のせいにしようか」"],"h":"リレーのバトンを渡す瞬間の責任感を思い出してください。","c":1,"e":"次の走者（アト工程）が最高のパフォーマンスを出せるようにバトンを繋ぐこと。この積み重ねが企業のブランドを支えます。"},{"m":12,"q":"品質管理の観点から見た「ヒューマンエラー」の捉え方として、最も適切なものはどれですか？","o":["特定の個人の性格ややる気のなさが引き起こす問題","仕事の結果が少しずつ変わってしまう「ばらつき」から発生する異常事態","どんなに注意しても防げないため、対策のしようがない現象","現場の作業員だけが気をつければ解決する問題"],"h":"エラーを「個人の問題」ではなく「工程の変動（特別原因）」として考えてみてください。","c":1,"e":"ヒューマンエラーは、工程の安定状態を乱す「特別原因（異常な変動要因）」の一種です。個人の資質に帰結させるのではなく、ばらつきを生む背景を分析する必要があります。"},{"m":12,"q":"作業者が不良品を出してしまった際、台本で述べられている「管理者の責任」としての考え方はどれですか？","o":["不良を出した作業者を厳しく叱責し、反省文を書かせる","作業者が不良を出してしまうのは、監督者の指導や仕組みが悪いと考える","作業ミスは本人の自己責任なので、管理者は関与しない","不良が出たラインの全員の給料を一律でカットする"],"h":"指導・フォローを行う側の役割について述べられた箇所を思い出してください。","c":1,"e":"製造現場の問題はすべて人に起因するため、作業者がミスをしやすい環境や手順を放置していた監督者の責任として捉え、改善に取り組む姿勢が求められます。"},{"m":12,"q":"不適合品が見つかった際、その場しのぎで手直しや廃棄をすることを何と呼びますか？","o":["是正処置","修正（応急処置）","予防処置","水平展開"],"h":"目の前の「影（結果）」だけを消す、一時的な対応のことです。","c":1,"e":"「修正」はその場の不適合を取り除くだけです。これに対し、再発を防ぐために根本原因を絶つ活動を「是正処置」と呼び、明確に区別されます。"},{"m":12,"q":"是正処置において、真の原因を突き止めるために繰り返すべき問いかけを何と呼びますか？","o":["誰がやったのか問答","いつ終わるのか問答","なぜなぜ問答","どこで起きたのか問答"],"h":"表面的な理由で終わらせず、深く掘り下げるための手法です。","c":2,"e":"「手順が守られなかった」→「なぜ？」→「手順が複雑すぎた」というように、なぜを繰り返すことで、仕組みの不備という真の原因に到達できます。"},{"m":12,"q":"検査において、「本当は不良なのに良品と判断して市場に流してしまう誤り」を何と呼びますか？","o":["第一種の誤り","第二種の誤り","ケアレスミス","適合品質"],"h":"顧客の信頼を失い、クレームに直結する最も恐ろしい誤りのことです。","c":1,"e":"良品を不良と間違うのが第一種の誤り（ムダ）、不良を見逃すのが第二種の誤り（流出）です。後者は企業の信頼を致命的に損なわせます。"},{"m":12,"q":"問題調査において重視すべき「三現主義」とは、何の3つを指しますか？","o":["現場（ゲンバ）、現物（ゲンブツ）、現実（ゲンジツ）","現在（ゲンザイ）、現金（ゲンキン）、現行（ゲンコウ）","現象（ゲンショウ）、原理（ゲンリ）、原則（ゲンソク）","言動（ゲンドウ）、限界（ゲンカイ）、厳格（ゲンカク）"],"h":"実際に起きている場所に行き、実物を見て、事実を確かめることです。","c":0,"e":"デスクの上で推測するのではなく、実際の現場で現物を手に取り、現実を客観的に観察することが、ヒューマンエラーの真因特定には不可欠です。"},{"m":12,"q":"ミスをしようとしてもできない、あるいはミスが起きても即座に発見できる物理的な仕組みを何と呼びますか？","o":["精神論","スピードアップ","ポカヨケ（エラー防止法）","全数検査"],"h":"人の注意力を超えて、システム的に不良を防ぐ工夫のことです。","c":2,"e":"是正処置には、教育というソフト面だけでなく、ポカヨケというハード面での対策を組み込むことが再発防止に極めて有効です。"},{"m":12,"q":"不良という「影（結果）」を分析するより、影を作らない「光線の当て方」を工夫することを、品質管理の用語で何と言いますか？","o":["事後管理","源流管理（デザインの工夫）","抜き打ち検査","個別対応"],"h":"問題が発生する「大もと」である設計や開発、プロセスの手順を改善することです。","c":1,"e":"出来上がったものを直すより、作る仕組みそのものを「ミスが起きないデザイン」に変える（源流管理）方が、改善のスピードも効果も高くなります。"},{"m":12,"q":"自部署で成功した是正処置を、類似の部品や他の工程にも適用して再発を防止することを何と呼びますか？","o":["垂直統合","水平展開","自由競争","情報隠蔽"],"h":"1つの学びを横に広げて、組織全体の体質を強化する活動です。","c":1,"e":"水平展開を行うことで、まだ問題が起きていない箇所のリスクも事前に摘み取ることができ、企業全体の信頼性が向上します。"},{"m":12,"q":"研修の最後にあった「道と通行人」の例えにおいて、真の責任の果たし方はどれだと述べられていましたか？","o":["足を踏み外した通行人をその都度厳しく注意する","道そのものに「柵（ポカヨケ）」を設置し、安全な流れを作る","通行人全員に、歩き方の特別訓練を強制する","事故が起きても、道の整備担当者のせいではないと主張する"],"h":"人間は間違えるものという前提で、何を変えるべきかを考えてください。","c":1,"e":"通行人（作業者）を責めるのではなく、仕組み（道）を改善して誰でも安全に歩けるようにすることこそが、管理者の果たすべき役割です。"},{"m":13,"q":"製造工程において「ばらつき」を発生させる4つの主要な要因（4M）の組み合わせとして、正しいものはどれですか？","o":["人、設備、材料、方法","人、予算、材料、広告","機械、面積、月日、マニュアル","測定、清掃、材料、目標"],"h":"Man、Machine、Material、Methodの頭文字を取ったものです。","c":0,"e":"4M（人・設備・材料・方法）は、製品の品質を左右する「要因系」の基本要素であり、これらを管理することが品質安定の第一歩です。"},{"m":13,"q":"4Mに「測定（Measurement）」を加えた考え方を何と呼びますか？","o":["4M1E","5M","6シグマ","QC7つ道具"],"h":"4つに1つプラスされた呼び方です。","c":1,"e":"数値で正しく品質を評価するために「測定」の正確性も重要視されるため、5Mとして管理する企業も多くあります。"},{"m":13,"q":"品質不具合が発生する「主要な原因」として、台本で最も明確に指摘されているのはどのような時ですか？","o":["毎日同じ作業を繰り返している時","何らかの「変更（変化）」があった時","休憩時間を長く取った時","整理整頓を徹底した時"],"h":"「いつもと違うこと」が起きた時にリスクが潜んでいます。","c":1,"e":"品質不具合の多くは、4Mの変更や設計変更など、何らかの変化点に起因します。この「変化点」をいかに管理するかが重要です。"},{"m":13,"q":"「目に見えないところで実施されている変更」による問題を防止するために、重要だとされている活動は何ですか？","o":["変更をすべて禁止すること","変化点の「見える化」を図り管理すること","変更したことを誰にも言わないこと","勘に頼って作業を微調整すること"],"h":"変化が起きていることを、関係者が共通認識として持てるようにすることです。","c":1,"e":"正式な手続きを経ない小さな変化が大きな事故に繋がります。変化を隠さず「見える化」し、組織として把握することが事故防止の鍵です。"},{"m":13,"q":"材料（Material）の変更事例において、B社の同等品に切り替える「前」に行うべきだった活動は何ですか？","o":["値段の交渉だけを行う","影響の検証と「妥当性確認（テスト生産など）」を行う","届いた材料をすぐに全量ラインに投入する","以前の材料が戻ってくるまで生産を止める"],"h":"新しい材料が品質にどんな影響を与えるか、事前に確かめる必要があります。","c":1,"e":"同等品であっても微細な違いが品質を変えることがあります。変更実施前に「妥当性確認」を行い、品質が維持できるか検証するのが変更管理の鉄則です。"},{"m":13,"q":"「たまご焼き」の生産量増加による焦げ付き事例において、根本的な原因（変化点）は何でしたか？","o":["卵が腐っていた","生産量増大に伴い、1回当たりの仕込み量（方法）が変わってしまった","作業者がわざと砂糖を減らした","フライパンが突然壊れた"],"h":"忙しくなったことで「いつも通りのやり方」が通用しなくなった点に注目してください。","c":1,"e":"生産量という外部要因の変化が、結果として「撹拌不足」という製造方法の不備（変化）を生んでいました。"},{"m":13,"q":"変更管理において、変更内容や影響評価の結果をどうすることが「強く要求」されていますか？","o":["担当者の記憶に留めておく","文書化し、記録として維持する","現場の掲示板にだけ貼っておく","問題が起きてから記録を作成する"],"h":"証拠を残し、後から追跡（トレーサビリティ）できるようにするためです。","c":1,"e":"変更管理の仕組みを明確にし、そのプロセスを「文書化・記録」することは、QMS（品質マネジメントシステム）における必須事項です。"},{"m":13,"q":"4Mの変化に対して、決められた作業手順を確実に実行するために必要なものはどれですか？","o":["作業者の独自の工夫","標準作業書（マニュアル）の遵守と維持","監督者のその日の気分による指示","過去の失敗事例の隠蔽"],"h":"「誰がやっても同じ品質」にするための基準となる書類です。","c":1,"e":"4Mのばらつきを抑えるためには、最新の状態にメンテナンスされた「標準作業書」を全員が守ることが基本です。"},{"m":13,"q":"変化点管理を適切に行うことは、品質管理上のどのような活動とみなされますか？","o":["不適合品が出た後の「修正」","不適合品に至る前の「予防処置」","コストを上げるための「余計な作業」","責任をなすりつけ合うための「準備」"],"h":"問題が起きる「前」に手を打つという視点です。","c":1,"e":"変更によって起きるリスクを事前に予測し、対策を講じる変化点管理は、究極の「予防処置」と言えます。"},{"m":13,"q":"まとめにおいて、変更管理は車の運転における何に例えられていましたか？","o":["どんどん加速する「アクセル」","事故を防ぐための「予測的なブレーキ」","進行方向を決める「ハンドル」","燃料を補給する「ガソリン」"],"h":"変化（アクセル）に対して、安全（品質）を保つための役割です。","c":1,"e":"攻めの生産活動（アクセル）に対し、変更管理という「ブレーキ」を適切に使うことで、初めて安定した品質という目的地に安全に到達できます。"},{"m":14,"q":"本研修における「問題（Problem）」の定義として、最も適切なものはどれですか？","o":["将来こうなりたいと願う夢や希望のこと","「あるべき姿（標準・基準）」と「現実の姿」の間に生じたギャップのこと","誰のせいかを特定して、責任を追及すること","予算が足りなくて何もできない状態のこと"],"h":"決められたルール（ものさし）と、今の実態を比較したときに出てくる「差」に注目してください。","c":1,"e":"問題とは、本来守るべき標準（あるべき姿）に対して、現実が追いついていない「不適合」な状態を指します。"},{"m":14,"q":"品質管理の文脈における「あるべき姿」とは、具体的にどのようなものを指しますか？","o":["現場の作業者がその日の気分で決める手順","規格要求事項、マニュアル、作業標準書などで規定された状態","競合他社が公表している非公式な情報","過去に一度も達成したことがない架空の目標"],"h":"組織が達成すべき「公式な基準」のことです。","c":1,"e":"標準や基準（あるべき姿）が明確であって初めて、現在の実態が「問題」かどうかが客観的に判断できます。"},{"m":14,"q":"問題解決（原因追求型）のアプローチにおいて、最も避けるべき行動はどれですか？","o":["「なぜなぜ問答」で根本原因を突き止める","ミスをした個人を責めて、精神論で解決しようとする","事実やデータに基づいて客観的に分析する","再発防止のために是正処置を講じる"],"h":"「人」を責めるのではなく、「仕組み」を直すのがQCの基本です。","c":1,"e":"個人を責めても再発防止には繋がりません。なぜそのミスが起きたのかという「仕組みの欠陥」を追求することが重要です。"},{"m":14,"q":"本研修における「課題（Theme/Challenge）」の定義として、正しいものはどれですか？","o":["壊れた機械を修理して元通りにすること","「ありたい姿（ビジョン）」を達成するために自ら設定した取り組むべきテーマ","上司から押し付けられた、やりたくない作業のこと","期限が過ぎた書類を急いで提出すること"],"h":"過去の失敗を直すのではなく、未来の理想に近づくための「攻め」の姿勢です。","c":1,"e":"課題は、経営理念やビジョン（ありたい姿）を実現するための戦略的なステップとして自ら設定するものです。"},{"m":14,"q":"「問題」と「課題」の視点の違いについて、正しい組み合わせはどれですか？","o":["問題：未来志向 ／ 課題：過去の反省","問題：原因追求型（守り） ／ 課題：目標達成型（攻め）","問題：戦略の実行 ／ 課題：不適合の修正","問題：ありたい姿とのギャップ ／ 課題：あるべき姿とのギャップ"],"h":"どちらが「基準に戻す活動」で、どちらが「新しい価値を創る活動」かを考えてください。","c":1,"e":"問題解決はマイナスをゼロにする「守り」、課題達成はゼロからプラスを目指す「攻め」の活動です。"},{"m":14,"q":"事例1の「校正期限切れの測定機器」が見つかった際、組織が最初に行うべき「妥当性の評価」とは何ですか？","o":["その機器で測定した過去の製品に、品質上の影響がないか確認すること","機器を新しいものに買い替える予算があるか確認すること","誰が期限を忘れたのか、犯人探しをすること","ラベルを貼り替えて、期限を偽装すること"],"h":"狂っているかもしれない「ものさし」で測った製品は、本当に安全でしょうか。","c":0,"e":"校正切れの機器を使用していた場合、それまでに検査した製品すべての品質が保証されないため、遡って評価を行う責任があります。"},{"m":14,"q":"事例2の「海外市場でのシェア拡大」というビジョンに対し、「見本市への参加」などを設定することは何に該当しますか？","o":["顕在化した問題の解決","不適合の是正処置","戦略を実行するための「課題」","現状維持のためのルーチンワーク"],"h":"標準からの逸脱を直すのではなく、未来の機会（チャンス）を掴むための行動です。","c":2,"e":"将来の成長（ありたい姿）に向けた具体的なアクションプランが「課題」となります。"},{"m":14,"q":"課題を設定する際、自社の状況を分析する視点として重要な組み合わせはどれですか？","o":["「弱み」と「脅威」だけを見て、何もしない","「強み」を活かし、外部の「機会」を捉える","競合他社の「失敗」を喜ぶ","過去の「栄光」にすがる"],"h":"戦略を立てる際に、自分の武器とチャンスをどう活かすかを考えてください。","c":1,"e":"外部環境の「機会」に対し、自社の「強み」をぶつけることで、差別化された戦略的課題が明確になります。"},{"m":14,"q":"本研修のまとめにおいて、「問題解決」は何に例えられていましたか？","o":["地図を見てルートを選ぶこと","車線からはみ出さないようにブレーキやハンドルを調整すること","ガソリンを満タンにすること","車のボディをピカピカに磨くこと"],"h":"安全運転のために「決められたルール」を守り続けるイメージです。","c":1,"e":"車線（標準）を守るのが問題解決、目的地（ビジョン）へのルート（戦略）を決めるのが課題達成です。"},{"m":14,"q":"企業の継続的な成長のために、最も重要なマインドセットはどれですか？","o":["問題解決（守り）だけを完璧に行う","課題達成（攻め）だけを考え、足元のミスは無視する","問題解決と課題達成の二つの思考を区別し、両輪で回す","問題も課題も発生しないように、一切の新しい活動をやめる"],"h":"「守り」と「攻め」のどちらが欠けても、企業は長続きしません。","c":2,"e":"足元の標準を守る「問題解決」と、未来を切り拓く「課題達成」の両方を回し続けることが、強靭な企業体質を作ります。"},{"m":15,"q":"PDCAサイクルの4つのステップ「P・D・C・A」の正しい組み合わせはどれですか？","o":["Prepare（準備）、Drive（推進）、Catch（捕捉）、Advice（助言）","Plan（計画）、Do（実施）、Check（評価）、Action（処置）","Power（権限）、Direct（指示）、Control（統制）、Analyze（分析）","Product（製品）、Delivery（納期）、Cost（原価）、Audit（監査）"],"h":"計画を立て、実行し、確認し、改善する、という流れの英語の頭文字です。","c":1,"e":"PDCAは、計画(Plan)・実施(Do)・評価(Check)・処置(Action)の4段階を繰り返すことで、業務を継続的に改善する手法です。"},{"m":15,"q":"「Plan（計画）」の段階において、具体的な目標（目標値や達成期日）を決めると同時に設定しなければならないものは何ですか？","o":["目標を達成するための「方法（手順・標準）」","失敗した時の「言い訳」","お祝いのための「予算」","競合他社の「弱点」"],"h":"計画には、どうやって実行するかという「標準化」の視点が欠かせません。","c":0,"e":"良い計画には、何を達成するかだけでなく、それを「どのような手順（方法）で」実現するかという具体的な道筋が必要です。"},{"m":15,"q":"「Do（実施）」のステップにおいて、実際に業務を実行する前に必ず行わなければならないことは何ですか？","o":["失敗を恐れて何もしないこと","定められた方法を十分に習得するための「教育・訓練」","計画を大幅に変更すること","外部のコンサルタントにすべて任せること"],"h":"計画通りの成果を出すためには、まず「やり方」を身につける必要があります。","c":1,"e":"正しい手順が決まっていても、実行者がそれを習熟していなければ計画は達成できません。教育・訓練はDoの重要な一部です。"},{"m":15,"q":"「Check（評価）」の段階で、システムが計画どおりの結果を得ているかを確認する大きな役割を担うものは何ですか？","o":["抜き打ちの罰則","内部監査","顧客へのアンケート（のみ）","昨年のデータの書き換え"],"h":"組織が自ら、決めた通りに動いているかをチェックする仕組みです。","c":1,"e":"内部監査は、方針や目標に照らしてプロセスが正しく機能しているかを客観的に評価するための重要な機能です。"},{"m":15,"q":"「Action（処置）」において、問題が発生していた場合に最も重要となる行動はどれですか？","o":["その場限りの「応急処置」だけで済ませる","二度と同じ問題を起こさないための「再発防止（恒久対策）」","問題を隠して、次の計画に進む","担当者を厳しく罰して終わる"],"h":"根本的な原因を絶ち、次に活かすことがActionの鍵です。","c":1,"e":"Actionの本質は、不具合の原因を究明し、二度と起きない仕組みを作ること（是正処置）にあります。"},{"m":15,"q":"PDCAサイクルを継続的に回し続けることで、管理レベルが段階的に向上していくことを何と呼びますか？","o":["スピンオフ","スパイラルアップ（継続的改善）","ロールバック","ダウンサイジング"],"h":"らせん状に、より高い位置へと昇っていくイメージです。","c":1,"e":"PDCAを一回転させて終わりにするのではなく、次のサイクルへ改善を繋ぐことで、組織のパフォーマンスは向上し続けます。"},{"m":15,"q":"現状を打破し、質をさらに向上させる「PDCA」に対し、標準を守って現状を維持する活動を何と呼びますか？","o":["NDCAサイクル","SDCAサイクル（S：Standard）","WDCAサイクル","ZDCAサイクル"],"h":"「標準（Standard）」をベースにした日常管理のサイクルです。","c":1,"e":"標準を守るSDCA（日常管理）と、現状を打破して改善するPDCAは、車の両輪のように使い分ける必要があります。"},{"m":15,"q":"研修の例えにおいて、PDCAサイクルの「Check（評価）」は何に例えられていましたか？","o":["船の目的地を決めること","実際に船を操縦すること","羅針盤で現在地をチェックし、航路からずれていないか確認すること","船の汚れを掃除すること"],"h":"計画（航路）に対して、今どこにいるかを確かめる作業です。","c":2,"e":"計画(P)通りに進んでいるかを確かめるCheckは、航海における現在地確認と同じ役割を果たします。"},{"m":15,"q":"改善策が有効であると確認できた場合、次に行うべき「Action」の重要な要素は何ですか？","o":["改善した方法を「標準化」し、マニュアル等を改訂する","改善に成功したので、管理をやめる","改善した内容を秘密にしておく","別の全く新しいやり方をすぐに試す"],"h":"良い結果を「定着」させ、次のP（計画）の土台にすることです。","c":0,"e":"成果を上げた方法は「標準」として確立することで、組織の共有財産となり、次回の計画(P)のスタート地点が高まります。"},{"m":15,"q":"本研修のまとめとして、PDCAを回す姿勢が最終的に何に繋がると述べられていますか？","o":["組織の強靭性と顧客の信頼を築くこと","作業者の休憩時間を増やすこと","競合他社のミスを見つけること","難しい用語をたくさん覚えること"],"h":"継続的な改善を積み重ねた結果、得られる大きな成果です。","c":0,"e":"一人ひとりが着実にPDCAを回すことが、組織全体の力を高め、結果としてお客様からの揺るぎない信頼を勝ち取ることになります。"},{"m":16,"q":"品質管理における「管理」には、二つの側面があります。PDCAが「改善」を担うのに対し、SDCAが担う役割は何ですか？","o":["破壊","維持（現状維持・日常管理）","拡張","放置"],"h":"決められた基準を「守り続ける」活動のことです。","c":1,"e":"せっかくPDCAで改善しても、それを維持する仕組みがなければ品質はすぐに低下します。SDCAは、今の良い状態をキープするためのサイクルです。"},{"m":16,"q":"SDCAサイクルの「S」は何の略ですか？","o":["Speed（速度）","Smile（笑顔）","Standard（標準）","Safety（安全）"],"h":"仕事のやり方の「取り決め」や「基準」を意味する言葉です。","c":2,"e":"SDCAは、まず「標準（Standard）」があることが前提です。標準がない状態では、何を守ればよいのか判断できません。"},{"m":16,"q":"SDCAにおける「標準化（S）」の目的として、最も適切なものはどれですか？","o":["作業者をロボットのように縛り付けること","与えられた状況において、誰でも繰り返せる「最適な秩序」を得ること","マニュアルのページ数を増やして、仕事をしているフリをすること","過去の古いやり方を、絶対に変えないようにすること"],"h":"誰がやっても、いつやっても「同じ結果」が出るようにするための工夫です。","c":1,"e":"標準化とは、現時点での「最も効率的で安全なやり方」を共通のルールとして確立し、ばらつきを抑える活動です。"},{"m":16,"q":"SDCAの「D（実施）」において、最も重視される行動は何ですか？","o":["自分の経験に基づき、標準をアレンジして作業する","標準化された手順（S）どおりに作業を実行する","忙しいときは手順を飛ばしてスピードを優先する","標準を知らなくても、勘で動く"],"h":"「守るサイクル」において、勝手な変更は禁物です。","c":1,"e":"標準どおりに実施して初めて、その標準が正しいかどうかの評価（Check）が可能になります。"},{"m":16,"q":"「C（確認・分析）」のステップで行うべき活動はどれですか？","o":["標準どおりに作業が行われたか、結果がねらいどおりかを評価する","失敗を隠すために、データを書き換える","評価をせずに、次の作業へ進む","誰がミスをしたか、犯人探しだけを行う"],"h":"「基準」と「現実」を照らし合わせる作業です。","c":0,"e":"確認(Check)は、標準からの逸脱がないか、またその標準で目標が達成できているかを客観的に判断するステップです。"},{"m":16,"q":"「A（処置）」において、結果が望ましくなかった（標準から逸脱していた）場合にとるべき行動は何ですか？","o":["今回は運が悪かったと諦める","原因を調べ、望ましい状態に戻すための適切な処置をとる","標準そのものを廃止して、自由にする","処置をせずに、しばらく様子を見る"],"h":"再発防止（是正処置）の視点を持って対応することが重要です。","c":1,"e":"異常が見つかったら、なぜ標準が守られなかったのか（あるいは標準に不備があったのか）を突き止め、修正・是正を行うのがActの役割です。"},{"m":16,"q":"清掃・清潔の事例において、「いつ、どこで、誰が、何を、どのように」すべきかを取り決めた文書を何と呼びますか？","o":["秘密のメモ","衛生標準作業手順書（SSOP）","改善提案書","始末書"],"h":"衛生管理における「標準（S）」となる手順書のことです。","c":1,"e":"SSOPなどの標準書があることで、誰が清掃しても同じ清潔レベルを維持できるようになります。"},{"m":16,"q":"SDCAサイクルを回し続けることが、5S活動のどの項目に繋がると述べられていますか？","o":["整理","整頓","しつけ（習慣づけ）","清掃"],"h":"決められたことを、いつでも正しく守る「習慣」のことです。","c":2,"e":"SDCAを繰り返すことで、標準を守ることが当たり前になり、組織に「しつけ」が定着し、企業の信頼が高まります。"},{"m":16,"q":"PDCAとSDCAの関係性を表す言葉として、最も適切なものはどれですか？","o":["どちらか一方だけあれば良い","車の両輪のように、相補いながら向上していく","PDCAは現場用、SDCAは事務用である","互いに邪魔をし合う関係である"],"h":"改善(PDCA)と維持(SDCA)はどちらも欠かせません。","c":1,"e":"SDCAで土台を固め、PDCAでさらに高い目標へ挑む。この繰り返しによって、組織は着実にスパイラルアップしていきます。"},{"m":16,"q":"本研修のまとめにおいて、SDCAサイクルは何に例え き）が大きく、品質が安定していないことを意味します。"},{"m":20,"q":"ヒストグラムの形状が異常（例：山が二つある）な場合、どのような要因が疑われますか？","o":["自然な変動（共通原因）","設備の故障などの異常な変動要因（特別原因）","標準を完璧に守っている状態","材料が非常に安定している状態"],"h":"「分布の形」が持つ意味についての解説を確認してください。","c":1,"e":"異常な形状は、工程に突発的なトラブルや異なる条件の混在など、特定の異常（特別原因）が作用しているサインです。"},{"m":20,"q":"ネジ部品の事例で、平均値のみで「問題なし」と報告した担当者の誤りは何でしたか？","o":["個数が少なすぎた","平均値の裏に隠れた「ばらつきの幅」を無視した","計算を間違えた","測定機器が古かった"],"h":"ヒストグラムを作成した結果、どのような「事実」が暴かれたかを思い出してください。","c":1,"e":"平均値という「表面的な数字」だけで判断し、規格をはみ出しているという工程の実態を見逃したことが問題でした。"},{"m":20,"q":"ヒストグラムを作成・分析することによって得られる、実務上の大きなメリットは何ですか？","o":["全数検査に切り替えられる","工程が不安定になる予兆を捉え、予防的な処置を判断できる","リサイクル方法が分かる","ベテランの経験を保存できる"],"h":"問題が大きくなる前に「分布の変化」から読み取れることに注目してください。","c":1,"e":"不適合品が出る前に、分布の偏りや広がりから異常を察知し、未然に防ぐ「是正処置」の判断材料になります。"},{"m":20,"q":"「不適合（不良品）」が発生するメカニズムとして、ヒストグラムで説明できるものはどれですか？","o":["平均値が外れている時だけ起きる","分布の端（裾野）が、規格の許容範囲をはみ出すことで起きる","個数が偶数の時に起きる","釣鐘型なら絶対に起きない"],"h":"規格（あるべき姿）とヒストグラムを重ねて見た時の状態をイメージしてください。","c":1,"e":"分布（ばらつき）の広がりが規格の枠を飛び出してしまうことが、不良品発生の物理的な理由です。"},{"m":20,"q":"研修のまとめにおいて、ヒストグラムは何に例えられていましたか？","o":["スピードメーター","工程の「健康診断書（レントゲンなど）」","工場の入感証","製品の家計簿"],"h":"体重（平均）測定だけでなく、内部の安定性を診るという比喩です。","c":1,"e":"表面的な数字だけでなく、工程そのものが健全（安定）に動いているか、将来の病気（不良）のリスクがないかを診るツールという意味です。"},{"m":20,"q":"データは断片に過ぎないため、ヒストグラム分析と併せて重視すべき行動原則は何ですか？","o":["三現主義（現場、現物、現実）","机上の空論","他社の成功事例の模倣","データの書き換え"],"h":"数字の背後にある「実際の状況」を自分の目で確かめることです。","c":0,"e":"データが示す事実と、実際の現場での観察を組み合わせることで、初めて真の原因特定と改善が可能になります。"},{"m":21,"q":"品質管理（QC）の原則である「事実に基づく判断」を実行するために、不可欠な前提条件は何ですか？","o":["個人の高い記憶力","情報が正確に流れ、全員が同じ事実を共有していること","声の大きい人の意見に従うこと","過去の成功体験を信じ続けること"],"h":"情報の「スムーズな流れ」と「正確さ」に注目してください。","c":1,"e":"データ（事実）に基づいて正しく判断するためには、報連相と5W1Hによって、組織全体で正確な情報が共有されている必要があります。"},{"m":21,"q":"情報を過不足なく正確に伝えるためのフレームワーク「5W1H」に含まれないものはどれですか？","o":["When（いつ）","Where（どこで）","Which（どちらが）","Who（誰が）"],"h":"「いつ・どこで・誰が・何を・なぜ・どのように」の6要素です。","c":2,"e":"5W1Hは、When, Where, Who, What, Why, Howの頭文字を取ったものです。Which（どちら）は含まれません。"},{"m":21,"q":"ビジネス文書や企画書において、5W1Hに加えて明確にすべき「数量や金額」に関する項目は何ですか？","o":["How many / How much","Yes / No","Good / Bad","Up / Down"],"h":"収益や予算に影響する具体的な「数字」を指す項目です。","c":0,"e":"具体的な計画には、数量（How many）や金額（How much）、期間（How long）といった「数値」を盛り込むことが、管理の精度を高める鍵となります。"},{"m":21,"q":"報告や連絡を行う際、文書の信頼性を高めるために避けるべき「表現」はどれですか？","o":["客観的な測定データ","具体的な実例","「だいたい大丈夫」「まあまあかな」といった主観的な判断","事実と意見の書き分け"],"h":"予測や想像に基づく曖昧な言葉は、正しい意思決定を妨げます。","c":2,"e":"主観的な判断は人によって解釈が異なります。事実に基づいた具体的な数字や状態で報告することが、プロの報連相です。"},{"m":21,"q":"「相談」の本来の目的として、台本で述べられている重要な視点はどれですか？","o":["自分のミスを誰かに押し付けること","再発を防止するための「是正処置」を共同で導き出すこと","上司に判断を丸投げして、自分は責任を取らないこと","会議の時間を長くすること"],"h":"単なる応急処置（修正）で終わらせないための、前向きな協力体制のことです。","c":1,"e":"相談は、個人を責める場ではなく、組織の知恵を集めて「真の原因」を突き止め、二度と同じ問題を起こさない仕組みを作るための活動です。"},{"m":21,"q":"事例の「校正期限切れの測定機器」が見つかった報告において、5W1Hを使う最大のメリットは何ですか？","o":["報告書の枚数を増やして、仕事をした実感を出すため","不適合の影響範囲を特定し、リスク予測を可能にするため","誰が忘れたのか、犯人を探しやすくするため","最新の英語を使って、知的に見せるため"],"h":"「3個」「XX工程で」といった具体的な情報が、その後の処置にどう役立つか考えましょう。","c":1,"e":"5W1Hで具体化することで、「どの製品の妥当性を評価すべきか」というリスク封じ込めの範囲が明確になり、迅速なアクションに繋がります。"},{"m":21,"q":"不適合が報告された後、管理者と関係部門が「なぜなぜ」問答を通じて行うべき活動は何ですか？","o":["担当者を厳しく注意して、二度と忘れないよう誓わせる","真の原因を特定し、恒久的な再発防止策（是正処置）を講じる","とりあえず新しい機器を1台購入する","問題が公にならないよう、内密に処理する"],"h":"教育不足や手順の不備など、根本的な「原因系」を取り除く活動です。","c":1,"e":"表面的な注意（修正）ではなく、仕組みの不備という真因を絶つことが、品質管理における是正処置の鉄則です。"},{"m":21,"q":"自部署で実施した有効な再発防止策を、他の類似の工程にも広めることを何と呼びますか？","o":["垂直統合","水平展開","内部監査","現場放棄"],"h":"1つの学びを横に広げて、組織全体の体質を強化することです。","c":1,"e":"水平展開を行うことで、まだ顕在化していない他の場所の潜在的なリスクも事前に摘み取ることができます。"},{"m":21,"q":"困ったときや迷ったときに立ち返るべき、現場・現物・現実を5W1Hで確認する考え方は何ですか？","o":["三現主義","三楽主義","完全主義","成果主義"],"h":"机上の空論ではなく、客観的な事実に回帰する姿勢です。","c":0,"e":"三現主義に基づき、事実を5W1Hで正確に捉えることが、最良の意思決定（報連相）の土台となります。"},{"m":21,"q":"本研修のまとめにおいて、5W1Hは何に例えられていましたか？","o":["船の「羅針盤」（現在地と目標を正確に示すもの）","船の「豪華な内装」","船の「重たい錨」","船の「行き先不明なチケット」"],"h":"情報の骨格を定義し、誰でも同じように理解できるようにするツールの比喩です。","c":0,"e":"羅針盤（5W1H）が正確な方向を示し、航海計器（報連相）がリアルタイムに情報を共有することで、組織という船は安全に目的地（品質目標）へ到達できます。"},{"m":22,"q":"「三現主義」を構成する3つの要素の正しい組み合わせはどれですか？","o":["現行・現金・現役","現場・現物・現実","現状・現代・現示","現象・原理・原則"],"h":"実際に起きた「場所」「物」「事実」を指す言葉です。","c":1,"e":"三現主義とは、問題解決において「現場」に行き、「現物」を手に取り、「現実」を直視することを最優先する考え方です。"},{"m":22,"q":"データ分析や報告書などの情報だけでは不十分である理由として、適切なものはどれですか？","o":["データは捏造されている可能性が高いから","データは実際に起きたことの「ほんの一部の断片」にすぎないから","データはデジタルなので信頼できないから","データを見るよりも勘を信じたほうが早いから"],"h":"数字の裏に隠れた「微妙なニュアンス」や「全体像」を想像してください。","c":1,"e":"データは過去の集計結果であり、現在の現場で起きている生の情報や背景までは語り尽くせません。そのため、直接観察することが不可欠です。"},{"m":22,"q":"三現主義における「現場（Genba）」で確認すべきこととして、特に重要なのはどれですか？","o":["事務所の冷房の温度","マニュアルや手順書どおりのプロセスが実際に実施されているか","休憩室のテレビのチャンネル","食堂のメニューの豊富さ"],"h":"「決められたこと」と「実際の動き」にギャップがないかを確かめる場所です。","c":1,"e":"現場に赴き、定められた標準作業が正しく行われているか、あるいは守れない理由があるのかを直接確認することが管理の基本です。"},{"m":22,"q":"三現主義における「現物（Genbutsu）」を手に取って確認する目的は何ですか？","o":["重さを量って筋トレをするため","不良品の物理的な状態を確認し、データでは見えない原因を探るため","壊れた機械を分解して、部品を再利用するため","現物を触ることで、作業時間を稼ぐため"],"h":"不具合を起こした機械や不良品そのものが、無言で語る情報を捉えましょう。","c":1,"e":"不良品そのものを観察することで、摩耗の跡や付着物など、数値データには現れない決定的な原因（ヒント）が見つかることが多々あります。"},{"m":22,"q":"三現主義における「現実（Genjitsu）」を伝える報告において、避けるべき態度はどれですか？","o":["データに基づいた客観的な記述","実例に即した具体的な報告","予測や想像、主観による曖昧な表現","三現主義に基づいた事実の提示"],"h":"「だいたい大丈夫」「おそらくこうだ」といった言葉の信頼性を考えてください。","c":2,"e":"事実は客観的でなければなりません。自分の思い込みや予測を事実と混同せず、ありのままの状態を伝えることが求められます。"},{"m":22,"q":"問題の根本原因を追究する「なぜなぜ問答」を成功させるための鍵は何ですか？","o":["声の大きい人の意見に従うこと","現場・現物に基づいて深く掘り下げること","犯人を見つけて厳しく罰すること","難しい専門用語を並べること"],"h":"机上の議論だけで「なぜ」を繰り返すと、的外れな結論になりがちです。","c":1,"e":"現場で現物を見ながら「なぜ」を問うことで、真の原因（仕組みの欠陥など）が浮き彫りになり、有効な是正処置に繋がります。"},{"m":22,"q":"校正期限切れマイクロメーターの事例において、現場・現物を確認して判明した具体的な「現実」はどれですか？","o":["「測定機器に不備があった」","「XX工程で使用されている10個のうち3個が3ヶ月期限を過ぎていた」","「新しい機器を買う必要がある」","「担当者のやる気が欠けていた」"],"h":"「個数」や「期間」など、誰が見ても疑いようのない具体的な数字が含まれるものです。","c":1,"e":"具体的な「現実」を特定することで、その機器で測った製品の妥当性をどこまで遡って確認すべきかという、次のアクションが明確になります。"},{"m":22,"q":"研修の中で、問題解決のための「アイデアや改善のヒント」が生まれる源泉はどこだとされていますか？","o":["静かな会議室での長時間にわたる議論","自ら現場に足を運び、現物に触れて観察する行動","インターネット上の成功事例の検索","過去の古い報告書の読み込み"],"h":"脳を活性化させ、新たな気づきを得るための「行動」について考えてください。","c":1,"e":"三現主義に基づいた行動こそが、机上では思いつかないような斬新な改善案や、隠れたリスクの発見に繋がります。"},{"m":22,"q":"現場で議論がまとまらない場合、三現主義の考え方に基づけばどうすべきですか？","o":["多数決で決める","その場（現場）で現物を前にして議論する","翌週まで持ち越す","上司の判断を仰ぐ"],"h":"「三現主義の真髄」として紹介されていた内容を思い出してください。","c":1,"e":"事実（現場・現物・現実）を目の前にして議論することで、感情論や推測が排除され、建設的な結論に早く到達できます。"},{"m":22,"q":"本研修のまとめにおいて、三現主義は何に例えられていましたか？","o":["船の「羅針盤」（事実を尊ぶ姿勢）","船の「エンジン」","船の「豪華な内装」","船の「積み荷」"],"h":"遠くの雲（データ）だけでなく、足元の岩（現物）を踏みしめ、潮の流れ（現実）を感じるための比喩です。","c":0,"e":"データに溺れることなく、自ら現場（甲板）に出て事実を掴む三現主義の姿勢こそが、企業を正しい方向へ導く羅針盤となります。"},{"m":23,"q":"品質管理（QC）における「品質」の考え方として、最も適切なものはどれですか？","o":["製品の見た目が良ければ、作業手順は問わない","製品の出来栄えだけでなく、安全作業や納期遵守などの「仕事の質」すべてを含む","検査部門だけが責任を持つべき指標である","コストを下げるために、安全よりも優先されるべきものである"],"h":"企業方針（社是）に通じる「品質」の広がりを考えてください。","c":1,"e":"現代の品質管理では、製品そのものだけでなく、それを作り出すプロセス（安全・整理整頓・納期など）の質すべてを「品質」と捉えます。"},{"m":23,"q":"品質を不安定にする最大の原因であり、安全も脅かす要因として挙げられているものは何ですか？","o":["最新設備の導入","「ばらつき（ムラ）」","休憩時間の確保","マニュアルの電子化"],"h":"「行為の結果がいつも同じではない」という不均一さのことです。","c":1,"e":"作る日や人によって結果が変わる「ばらつき」は、品質不良の原因になるだけでなく、予測不可能な事態を招き、事故のリスクを高めます。"},{"m":23,"q":"トヨタ生産方式などで重視される、排除すべき「3ム」の正しい組み合わせはどれですか？","o":["ムダ・ムラ・ムリ","ムカデ・ムシ・ムラ","ムリ・ムチャ・ムテッポウ","ムダ・ムラ・ムジン"],"h":"付加価値を生まない、または負荷が大きすぎる3つの要素です。","c":0,"e":"「ムダ（無益な動き）」「ムラ（ばらつき）」「ムリ（過負荷）」を排除することが、安全と品質を同時に向上させる基本です。"},{"m":23,"q":"「品質を良くすると必ずコストアップする」という考えに対し、台本ではどのように指摘していますか？","o":["その通りであり、仕方のないことである","モノづくりの本質を理解していない「錯覚」である","高品質な製品は高く売れるので問題ない","コストよりも品質を優先すべきである"],"h":"「正しい手順・方法」で行った場合の結果を考えてください。","c":1,"e":"正しい手順（標準）を守れば、手直しや廃棄という「ムダ」が減るため、品質向上と低コスト化は同時に実現可能です。"},{"m":23,"q":"安全管理に対する現代の正しいパラダイム（考え方）はどれですか？","o":["安全管理は利益を削る「コスト」である","安全管理は企業の体質を強くする「積極的な投資」である","事故が起きてから考えれば良い「後回し事項」である","法律を守るためだけの「義務」である"],"h":"エラーに耐えるシステムを構築することが、将来的に何をもたらすか考えましょう。","c":1,"e":"安全への取り組みは、トラブルによる損失を防ぐだけでなく、業務プロセスの洗練（標準化）に繋がり、組織の競争力を高める投資となります。"},{"m":23,"q":"リスクマネジメントにおいて、システムを構築する際の「前提」とすべきことは何ですか？","o":["人間は訓練すれば絶対に間違えない","人は間違いを犯すものである","ベテランがいればシステムは不要である","機械は絶対に故障しない"],"h":"「ポカよけ」が必要とされる理由を考えてください。","c":1,"e":"「人は間違える」という前提に立ち、ミスが起きても事故や不良にならない仕組み（ポカよけ等）を設けることが重要です。"},{"m":23,"q":"品質問題や事故が発生した際、再発防止のために行う「是正処置」の本来の目的は何ですか？","o":["壊れたものを元通りに直す（修正）","不適合や事故の「真の原因」を特定し、取り除く","誰が悪いのかを特定して罰を与える","報告書をきれいに書き直す"],"h":"二度と同じ問題を起こさせないための「恒久的な対策」のことです。","c":1,"e":"表面的な手直し（修正）ではなく、なぜ起きたのかという根本原因を絶つこと（是正処置）が、安全と品質を守る鍵です。"},{"m":23,"q":"組織内で「失敗」が発生した際、取るべき正しい態度はどれですか？","o":["信頼を失わないよう、外部には隠匿する","失敗を公にして、教訓を全員で共有化する","担当者の個人責任として処理する","二度と失敗の話をしないようにする"],"h":"失敗を「学び」に変えるためのプロセスを思い出してください。","c":1,"e":"失敗を隠さず教訓として共有することで、組織全体のリスク感度が高まり、他の場所での類似事故を防ぐことができます。"},{"m":23,"q":"研修の例え話において、「品質（性能）」と「安全（ブレーキ等）」を支える土台は何だとされていますか？","o":["ドライバーの運転テクニック","適切なメンテナンス（正しい作業手順）","ガソリンの質","道路の舗装状態"],"h":"ムリな姿勢やムラのある手順で整備したらどうなるか、を考えてください。","c":1,"e":"正しい手順でメンテナンスを行うことは、高いパフォーマンス（品質）と、事故のない走行（安全）の両方を実現する唯一の道です。"},{"m":23,"q":"本研修の結論として、従業員が持つべき最も重要な認識はどれですか？","o":["「安全は二の次で、まずは納期を守る」","「安全で正しい作業こそが、最も高品質で低コストな仕事である」","「品質さえ良ければ、多少のムリな作業は仕方ない」","「5S（整理整頓）は清掃担当者に任せれば良い」"],"h":"安全と品質が「表裏一体」であるという意味を込めた一文です。","c":1,"e":"安全な「正しい手順」を徹底することが、結果としてばらつきを抑え、ムダなコストを省き、最高の品質を生み出す近道となります。"},{"m":24,"q":"PL法（製造物責任法）において、製品の欠陥により損害を受けた被害者が、メーカーの「過失（落ち度）」を証明しなくても賠償を請求できる原則を何と呼びますか？","o":["自己責任原則","無過失責任（厳格責任）","過失責任主義","連帯責任"],"h":"従来の民法よりも被害者の立証負担を軽くし、保護を優先する厳しい原則です。","c":1,"e":"PL法では、メーカーに「わざと」や「不注意」がなくても、製品に「欠陥」があり損害が生じていれば賠償責任を負うという非常に重い原則を採用しています。"},{"m":24,"q":"PL法に基づき、被害者が賠償を求めるために立証（証明）しなければならない「3つの要素」に含まれないものはどれですか？","o":["損害の発生","当該製品の欠陥","製造業者の故意または過失","欠陥と損害の因果関係"],"h":"PL法によって「証明しなくてよくなったもの」を消去法で考えてください。","c":2,"e":"被害者は「損害」「欠陥」「その因果関係」の3点を証明すればよく、メーカーの「過失（ミス）」まで証明する必要はありません。"},{"m":24,"q":"PL法における「欠陥」の3つの分類のうち、設計段階で本来確保すべき安全性が欠けていた場合を何と呼びますか？","o":["製造上の欠陥","表示・警告上の欠陥","設計上の欠陥","販売上の欠陥"],"h":"製品の「青写真（プラン）」そのものに問題があったケースです。","c":2,"e":"設計そのものに不備がある場合、その設計で作られたすべての製品が潜在的な危険を持つことになります。"},{"m":24,"q":"製品自体は設計通りに作られていても、危険性についての適切な指示や警告が不足していたために生じる欠陥は何ですか？","o":["製造上の欠陥","表示・警告上の欠陥","設計上の欠陥","流通上の欠陥"],"h":"取扱説明書や警告ラベルの不備がこれに該当します。","c":1,"e":"「やってはいけないこと」をユーザーに正しく伝えていないことも、法律上は重大な「欠陥」とみなされます。"},{"m":24,"q":"PL法において「製造業者等（責任主体）」とみなされ、賠償責任を負う可能性があるのは誰ですか？","o":["製品を実際に製造・加工した者","製品を海外から輸入した業者（第一次輸入業者）","自社ブランド名を表示して販売した者","上記すべて"],"h":"メーカーだけでなく、輸入業者やブランド表示者も「メーカーと同じ責任」を負います。","c":3,"e":"輸入業者や自社ブランドを冠した販売元も、消費者から見れば供給者としての責任を負う立場にあるため、責任主体に含まれます。"},{"m":24,"q":"製品に欠陥があったとしても、メーカーが責任を免れることができる「免責事由」の一つである「開発危険の抗弁」とはどのような内容ですか？","o":["予算が足りなくて安全対策ができなかった場合","引き渡し時点の世界の科学技術水準では、欠陥を発見することが不可能だった場合","下請け業者が勝手に材料を変えていた場合","社長が欠陥を知らなかった場合"],"h":"当時の技術では「神様でも予見不可能だった」と言えるレベルの状態を指します。","c":1,"e":"当時の最高水準の技術をもってしても認識不能であったことを証明できれば、責任を免れる場合があります。"},{"m":24,"q":"PL事故によって企業が被る「間接的損失」に該当するものはどれですか？","o":["被害者への賠償金","弁護士報酬","消費者や従業員の信頼低下、企業イメージの損失","裁判の訴訟費用"],"h":"直接的な支払い（お金）以外で、じわじわと経営を苦しめるものです。","c":2,"e":"金銭的な賠償（直接的損失）も痛手ですが、ブランドへの信頼失墜（間接的損失）は倒産に直結するほど深刻な影響を与えます。"},{"m":24,"q":"事故を未然に防ぐための「PLP（予防対策）」の具体的な行動として、適切なものはどれですか？","o":["設計段階で安全性を確保し、取り除けない危険には警告ラベルを貼る","事故が起きてから、裁判に勝つための証拠を集める","製品の販売価格を上げて、賠償金の積み立てを行う","欠陥が見つかっても、公表せずに修理する"],"h":"「事故を起こさないための事前対策」に注目してください。","c":0,"e":"設計での安全確保と、適切な警告表示（表示・警告上の欠陥防止）が、予防対策の基本です。"},{"m":24,"q":"万が一訴訟に巻き込まれた際に備え、設計図や検査記録を保存しておくなどの防御策を何と呼びますか？","o":["PLP（予防対策）","PLD（防御策）","リコール隠し","全数検査"],"h":"裁判で自社の正当性を証明するための「守り」の対策です。","c":1,"e":"PLD（Product Liability Defense）は、記録を証拠として残し、不当な訴訟から会社を守るための活動です。"},{"m":24,"q":"本研修のまとめにおいて、PL法の遵守と対策は何に例えられていましたか？","o":["製品を市場に出すための「パスポート」","会社の利益を削る「重石」","従業員を縛る「手錠」","使い終わったら捨てる「切符」"],"h":"企業の「誠実な姿勢」を示し、社会からの評価を決定づけるものという比喩です。","c":0,"e":"PL対策は、製品が安全であることを社会に証明し、信頼される企業として市場に参加するための「パスポート」のような不可欠なものです。"},{"m":25,"q":"PL法において、メーカーに過失（落ち度）がなくても、製品の欠陥によって損害が生じれば賠償責任を負う原則を何と呼びますか？","o":["自己責任原則","無過失責任（厳格責任）","過失責任主義","共同責任"],"h":"被害者の立証負担を軽減するために導入された、メーカーにとって非常に重い責任原則です。","c":1,"e":"PL法では、製造者の「過失」を証明しなくても、「製品の欠陥」と「損害」の因果関係があれば責任を問われる無過失責任が採用されています。"},{"m":25,"q":"PL法に基づき、被害者が賠償を求めるために証明しなければならない「3つの要素」に含まれないものはどれですか？","o":["損害の発生","製品の欠陥","製造業者の故意または過失","欠陥と損害の因果関係"],"h":"民法による請求とは異なり、PL法で「立証不要」となった項目はどれでしょうか。","c":2,"e":"被害者は「損害」「欠陥」「その因果関係」を証明すればよく、メーカー側の具体的なミス（過失）まで証明する必要はありません。"},{"m":25,"q":"製品の設計段階で、本来確保すべき安全性が欠けていたために生じる欠陥を何と呼びますか？","o":["製造上の欠陥","設計上の欠陥","表示・警告上の欠陥","流通上の欠陥"],"h":"個別の個体のミスではなく、その仕様で作られた製品すべてに共通する不備のことです。","c":1,"e":"設計そのものが安全性を欠いている場合、図面通りに作っても製品は危険な状態となり、「設計上の欠陥」とみなされます。"},{"m":25,"q":"製造や加工の過程で、設計図通りに作られなかったために一部の個体に生じる欠陥は何ですか？","o":["設計上の欠陥","製造上の欠陥","表示・警告上の欠陥","保守上の欠陥"],"h":"「つくり込み」のミスによって、特定の製品が基準から外れてしまったケースです。","c":1,"e":"設計は正しいものの、工場のミスや異物混入などで安全性を欠いた製品が生まれることを「製造上の欠陥」と呼びます。"},{"m":25,"q":"製品に潜む危険性について、適切な指示や警告が不足していたために生じる欠陥を何と呼びますか？","o":["設計上の欠陥","製造上の欠陥","表示・警告上の欠陥","販売上の欠陥"],"h":"取扱説明書や警告ラベルの不備がこれに該当します。","c":2,"e":"製品自体に不備がなくても、誤使用を防ぐための情報提供が不十分で事故が起きた場合は「表示・警告上の欠陥」となります。"},{"m":25,"q":"PL法において、実際に製造したメーカー以外で「製造業者等」として責任を負う可能性があるのは誰ですか？","o":["海外から製品を輸入した業者","自社ブランド名を表示して販売した者","製造業者と誤認させる表示をした販売元","上記すべて"],"h":"消費者から見て「製品を供給した責任者」と見える者は広く対象に含まれます。","c":3,"e":"製造者だけでなく、輸入業者やプライベートブランド（PB）販売者などもPL法上の責任主体となります。"},{"m":25,"q":"製品の欠陥による損害が「その製品自体」だけに留まった場合、PL法の対象となりますか？","o":["対象となる","対象とならない","金額が大きければ対象となる","中古品なら対象となる"],"h":"PL法は「拡大損害（他人の身体や他の財産への損害）」を救済する法律です。","c":1,"e":"損害がその製品のみに止まる（例：テレビが壊れたが火災には至らなかった）場合はPL責任は生じず、民法の瑕疵担保責任などの問題となります。"},{"m":25,"q":"製品を引き渡した時点の科学技術水準では、欠陥を予見することが不可能だった場合に免責される規定を何と呼びますか？","o":["自己防衛の抗弁","不可抗力の抗弁","開発危険の抗弁","技術限界の抗弁"],"h":"当時の最高水準の技術をもってしても発見できなかった場合の救済措置です。","c":2,"e":"「開発危険の抗弁」として認められれば免責されますが、メーカーは当時の技術水準で最善を尽くしたことを証明する必要があります。"},{"m":25,"q":"事故を未然に防ぐため、設計段階から安全性を高めたり警告表示を工夫したりする活動を何と呼びますか？","o":["PLP（予防対策）","PLD（防御策）","PLM（製品管理）","PLA（法的監査）"],"h":"「Prevention（予防）」の頭文字が含まれる用語です。","c":0,"e":"PLP（Product Liability Prevention）は、欠陥のある製品を世に出さないための事前対策全般を指します。"},{"m":25,"q":"万が一の裁判に備え、設計図面や検査記録、出荷時の記録を適切に保存しておく対策を何と呼びますか？","o":["PLP（予防対策）","PLD（防御策）","リコール隠し","全数検査"],"h":"「Defense（防御）」の頭文字が含まれる、裁判で自社の正当性を証明するための守りの対策です。","c":1,"e":"PLD（Product Liability Defense）は、記録を証拠として残し、不当な訴訟や過大な賠償から会社を守るための活動です。"},{"m":26,"q":"現代の品質管理（QC）において、製品の品質を保証するために管理すべき範囲はどこまでですか？","o":["自社の工場内のみ","自社の工場と直系の販売店のみ","原材料の調達から外部委託プロセスを含むサプライチェーン全体","設計部門のみ"],"h":"「外から入ってくるもの」が最終製品にどう影響するかを考えてください。","c":2,"e":"少品種多量生産の時代とは異なり、現在はプロセスが複雑化しているため、外部提供者（サプライヤー）を含めた連鎖全体の管理が不可欠です。"},{"m":26,"q":"ISO 9001:2015において、管理の対象として強化された「外部から提供されるもの」に含まれないものはどれですか？","o":["自社の製品に組み込まれる部品や原材料","外部委託（アウトソース）されたプロセス","外部提供者から直接顧客に提供されるサービス","自社ビルの清掃など、製品品質に直接影響しない一般管理業務"],"h":"「顧客要求事項を満たす能力」に影響を与えるものが対象です。","c":3,"e":"製品やサービスそのもの、あるいはそれらの一部となるプロセスを外部に頼る場合、それらはすべてQMS（品質マネジメントシステム）の管理対象となります。"},{"m":26,"q":"特定のプロセスを外部に委託（アウトソース）した場合、その結果として顧客要求事項が満たされなかった時の責任は誰にありますか？","o":["作業を請け負った外部委託先のみにある","外部委託を決定し、製品を供給する自組織にある","不具合を見抜けなかった顧客にある","誰の責任でもない（不可抗力）"],"h":"「外部委託したからといって、組織の責任は免除されない」という原則を思い出してください。","c":1,"e":"たとえ外注した工程であっても、最終的な製品・サービスの品質責任は、それを提供する組織（元請け）が負い続けます。"},{"m":26,"q":"外部提供者に対する管理のレベル（厳しさ）を決定する際、適用すべき考え方はどれですか？","o":["一律ですべての業者を同じ基準で管理する","「リスクに基づく考え方」を適用し、影響度に応じて決める","価格が安い業者ほど厳しく管理する","創業年数が長い業者ほど管理を簡略化する"],"h":"その供給品が「顧客満足や法令遵守に与える潜在的な影響」を考慮します。","c":1,"e":"製品品質への影響が大きいものや、失敗のリスクが高いプロセスに対しては、より厳格な管理（監査や検証）を行う必要があります。"},{"m":26,"q":"外部提供者の管理において、評価すべき重要なポイントは何ですか？","o":["外部提供者が行っている管理の有効性（正しく管理されているか）","外部提供者の社長の趣味","外部提供者の工場の外観の美しさ","外部提供者の過去の最高益"],"h":"「組織の能力に悪影響を及ぼさないこと」を確認する必要があります。","c":0,"e":"外部提供者が自ら適切な管理を行い、要求事項を満たす製品を出し続ける能力があるかを評価することが求められます。"},{"m":26,"q":"サプライヤーが「校正期限切れの測定機器」を使用していた場合に生じる、最も重大なリスクは何ですか？","o":["測定機器の電池が切れる","不適合品（寸法外れなど）が良品として供給され、最終製品の適合性を欠く","サプライヤーの利益が増える","工場の電灯が暗くなる"],"h":"「狂ったものさし」で測られた部品が自社に届いたらどうなるでしょうか。","c":1,"e":"サプライヤーの計測管理の不備は、そのまま自社の品質不良や、最悪の場合は市場でのPL事故（製造物責任）に直結します。"},{"m":26,"q":"サプライチェーンにおける「源流管理」の考え方として、正しいものはどれですか？","o":["不良が出てから、サプライヤーを厳しく叱責する","サプライヤーの段階（源流）で品質を作り込めるよう、管理を徹底する","自社の検査員を増やして、届いたものをすべて選別する","不適合品はすべて廃棄し、原因調査は行わない"],"h":"ヒントはありません","c":0,"e":"サプライヤーは品質の「源流」です。ここで不適合を阻止することが、最も効率的で確実な品質保証に繋がります。"},{"m":26,"q":"外部委託されたプロセスを「QMSの範囲外」として扱うことは認められますか？","o":["外部の会社がやることなので、範囲外で良い","組織の責任が問われるため、QMSの範囲内として管理を見直す必要がある","契約書に「免責」と書けば範囲外にできる","小規模な会社であれば認められる"],"h":"アウトソースしても、それは「自組織のプロセスの一部」とみなされます。","c":1,"e":"外部委託をQMSの範囲外とすることはできません。組織は、外部提供プロセスに対しても適切な管理を及ぼす義務があります。"},{"m":26,"q":"本研修のまとめにおいて、サプライチェーンの品質は何に例えられていましたか？","o":["高く積み上げた「レンガ」","一本の「鎖（チェーン）」の強度","燃え盛る「たいまつ」","広大な「海」"],"h":"鎖全体の強さは「最も弱いリンク」で決まるという比喩です。","c":1,"e":"自社が強くても、一社のサプライヤー（リンク）が弱ければ、サプライチェーン全体の品質保証は崩れてしまいます。"},{"m":26,"q":"サプライチェーン全体の品質を確保するために、組織が取るべき最終的な姿勢はどれですか？","o":["「外部のせい」にせず、自組織が最終責任を持つという自覚を持つ","できるだけ管理の手間を省き、サプライヤーを信じる","不具合が起きたら、すぐにサプライヤーとの取引を停止する","自社の利益だけを追求し、サプライヤーの品質には干渉しない"],"h":"顧客要求事項を満たすための「最終責任」はどこにあるでしょうか。","c":0,"e":"外部リソースを活用しても、顧客に対する品質責任は常に組織自身にあります。そのため、サプライヤーと共に品質を高める姿勢が不可欠です。"},{"m":27,"q":"品質トラブルが発生した際、その場しのぎで手直しや廃棄をすることを何と呼びますか？","o":["是正処置","修正（応急処置）","予防処置","水平展開"],"h":"「火が出たから水をかける」といった、目に見える現象への一時的な対応のことです。","c":1,"e":"「修正」は問題の封じ込めには必要ですが、これだけでは原因が残っているため、必ず再発します。"},{"m":27,"q":"不適合の再発を防止するために、根本原因を特定して取り除く恒久的な対策を何と呼びますか？","o":["応急処置","暫定処置","是正処置","ラインストップ"],"h":"「なぜ起きたか」を解決し、二度と起こさないようにする処置です。","c":2,"e":"トラブルを「学び」に変える最も重要なステップが、この「是正処置」です。"},{"m":27,"q":"問題解決のために、客観的な事実を正確に把握する手法として適切な組み合わせはどれですか？","o":["予測と想像","データ分析（層別）と三現主義","会議室での議論のみ","担当者の記憶への依存"],"h":"現場に行き、現物を見て、現実を直視する姿勢が大切です。","c":1,"e":"「だいたい大丈夫」という主観を排除し、事実に基づいたデータと現場観察を組み合わせることが不可欠です。"},{"m":27,"q":"トラブル報告において、情報を具体化するために活用すべきフレームワークは何ですか？","o":["3C分析","4P戦略","5W1H","SWOT分析"],"h":"「いつ、どこで、誰が、何を、なぜ、どのように」を明確にする手法です。","c":2,"e":"「作業者がミスした」ではなく、5W1Hを用いて「どの工程で、誰が、何をどう間違えたか」を具体的に記すことで、原因究明が可能になります。"},{"m":27,"q":"真の原因を追究するために、原因を「人・設備・材料・方法」などの観点で整理するフレームワークは何ですか？","o":["3M","4M","5S","QCD"],"h":"Man（人）、Machine（設備）、Material（材料）、Method（方法）の頭文字です。","c":1,"e":"4Mの視点で事象を分解することで、漏れなく原因の切り分けを行うことができます。"},{"m":27,"q":"「なぜなぜ問答」を行う際、最も避けるべき結論はどれですか？","o":["仕組みの不備を特定する","手順書の曖昧さを改善する","「作業者の不注意」として精神論で片付ける","治具の摩耗を発見する"],"h":"個人の意識の問題に帰結させると、別の人が同じミスを繰り返すことになります。","c":2,"e":"真の原因は「個人の不注意」ではなく、「不注意があってもミスが起きない仕組み（ポカよけ等）がなかったこと」にあると考えるべきです。"},{"m":27,"q":"決定した再発防止策を、類似のプロセスや他の製品にも適用して予防効果を高めることを何と呼びますか？","o":["垂直統合","水平展開","一元管理","集中購買"],"h":"「あっちでも同じことが起きるかも」と横に広げて考える活動です。","c":1,"e":"一つの失敗を組織全体の教訓として横展開することで、まだ起きていないトラブルを未然に防ぐことができます。"},{"m":27,"q":"事例の「校正期限切れ計測機器」が見つかった際、ISO規格で求められる重要な対応は何ですか？","o":["すぐに新しい機器を買い直す","それまでに測定した結果の妥当性を評価し、記録する","期限切れのラベルを貼り替える","監査員に言い訳をする"],"h":"「その機器で測った過去の製品は本当に合格だったのか？」を確認する必要があります。","c":1,"e":"計測機器が不適合だった場合、その機器を使った過去のロットすべてに波及するため、遡って品質を確認する義務があります。"},{"m":27,"q":"トラブルからの学びを、本研修のまとめでは何のプロセスに例えていましたか？","o":["料理人が新メニューを作る","医師が病気を診断し、治療する","スポーツ選手が記録を更新する","旅行者が地図を確認する"],"h":"症状（修正）を抑えるだけでなく、根源（真の原因）を治療するという比喩です。","c":1,"e":"対症療法（修正）で終わらせず、根本治療（是正処置）を行うことで、組織を「健康で強靭な体質」へと進化させます。"},{"m":27,"q":"品質管理（QC）活動の究極の目的として、最も適切なものはどれですか？","o":["検査員を増やして不良品をすべて見つける","不適合が発生したときに、いかに隠すかを考える","「不良品を作り出さないプロセス」を構築し、維持する","報告書の枚数を増やす"],"h":"「品質は工程で作り込む」という言葉を思い出してください。","c":2,"e":"トラブル事例から学び、プロセス（工程）を改善し続けることこそが、最も信頼性の高い品質保証に繋がります。"},{"m":28,"q":"品質管理（QC）の本来の定義として、最も適切なものはどれですか？","o":["不良品を市場に出さないために、ひたすら検査すること","お客様の満足する製品を、経済的かつタイミングよく提供するための活動","製造現場のミスを監視し、作業者を指導すること","マニュアルのページ数を増やして、管理体制をアピールすること"],"h":"「誰のために」「何のために」行う活動かを考えてください。","c":1,"e":"QCは単なるチェックではなく、顧客満足を最小のコストと最適な納期で実現するための体系的な経営活動です。"},{"m":28,"q":"品質に関わる仕事の範囲について、正しい説明はどれですか？","o":["品質保証部門と検査部門の人間だけに関係がある","製造現場の作業者だけが気をつければ良い","営業、開発、製造、サービスなど、企業内のすべての人が関わる","経営層だけが知っていれば良い理論である"],"h":"「仕事の質」を高めることに無関係な部署があるか考えてみましょう。","c":2,"e":"「品質に無関係な人はいない」という原則通り、全部門が連携して品質を作り込む「総合的品質管理（TQM）」が重要です。"},{"m":28,"q":"良い品質を源流段階から作り込むために、製造工程だけでなく開発や材料選定まで遡って管理することを何と呼びますか？","o":["事後管理","源流管理","在庫管理","販売管理"],"h":"川の流れの「源」を正すイメージの言葉です。","c":1,"e":"不具合が起きてから直すのではなく、設計や材料選定の段階で問題を摘み取ることが、最も効率的な品質保証に繋がります。"},{"m":28,"q":"品質の仕事に求められる「QC的なセンス」のうち、意思決定の基盤とすべきものはどれですか？","o":["ベテランの勘と度胸","過去の慣例","データ（事実）","声の大きい人の意見"],"h":"「大丈夫だと思います」という主観を排するために必要なものです。","c":2,"e":"客観的なデータに基づいて判断・行動することが、科学的で合理的な品質管理の鉄則です。"},{"m":28,"q":"問題解決のために、4M分析や「なぜなぜ問答」を行い、再発防止策を講じる一連の手順を何と呼びますか？","o":["QCストーリー","QCサスペンス","QCレポート","QCマニュアル"],"h":"現状把握から標準化までを論理的に進める「型」のことです。","c":0,"e":"QCストーリーという手順に従って問題を解決する能力は、あらゆる職種で通用する普遍的なスキルです。"},{"m":28,"q":"職場の第一線で働く人々が、継続的に仕事の質を改善していく小グループ活動を何と呼びますか？","o":["QCパトロール","QCサークル活動","QC会議","QCセミナー"],"h":"自主的・計画的に行われる、自己研鑽と職場改善の場です。","c":1,"e":"QCサークル活動は、現場の活性化だけでなく、メンバーの能力向上や自己実現を目的としています。"},{"m":28,"q":"QCサークル活動において、リーダーに求められる役割として適切なものはどれですか？","o":["一人ですべての改善案を考える","メンバーの協力体制を作り出し、計画的に活動を推進する","ミスをしたメンバーを厳しく叱責する","活動時間を削って、生産量だけを追い求める"],"h":"「チームの力を引き出す」ための役割に注目してください。","c":1,"e":"リーダーシップを発揮し、関係者との調整やメンバーの意欲向上を図る経験は、将来の管理職としての大きな糧になります。"},{"m":28,"q":"QCサークル活動の成果のうち、意欲、自信、人間関係、活動の喜びといった目に見えにくい効果を何と呼びますか？","o":["有形効果","無形効果","負の効果","直接効果"],"h":"「数字（不良削減数など）」には表れない、個人の成長に関わる効果です。","c":1,"e":"無形効果は、働く人の「生きがい」や「職場の活力」に直結し、組織を強くする隠れた資産となります。"},{"m":28,"q":"品質保証（QA）と品質管理（QC）の関係性を表す言葉として、正しい組み合わせはどれですか？","o":["QAは「手段」、QCは「目的」","QAは「目的」、QCは「手段」","QAは「国内用」、QCは「海外用」","両者は全く逆の意味である"],"h":"「安心を提供すること」と「そのために仕組みを回すこと」の違いです。","c":1,"e":"お客様に満足を提供すること（QA：目的）のために、体系的な仕事の進め方（QC：手段）を実践します。"},{"m":28,"q":"本研修のまとめにおいて、品質のキャリアを積む活動は何に例えられていましたか？","o":["最高の食材を厳選し、科学的な手順で調理する「料理人」","ひたすら壁を塗り続ける「左官職人」","獲物を追い続ける「ハンター」","風に吹かれるままに進む「旅人」"],"h":"データ（食材）を使い、手法（手順）を駆使して、満足（味）を保証する比喩です。","c":0,"e":"事実を捉え、科学的な手法で改善を繰り返すスキルは、どんな環境でも最高の価値（満足）を提供できる専門性へと繋がります。"},{"m":29,"q":"顧客のニーズを満たすために、企画・設計段階で決定される「目標の品質」を何と呼びますか？","o":["製造品質","設計品質（ねらいの品質）","適合品質","保守品質"],"h":"図面や仕様書に書き込まれた「情報の束」であり、理想の姿を指します。","c":1,"e":"設計品質は、製品が「本来あるべき姿」として定められた目標値であり、企業の競争力の源泉となります。"},{"m":29,"q":"設計図や仕様書どおりに、実際の製品がどれだけ正確に作られたかを示す「結果の品質」を何と呼びますか？","o":["設計品質","製造品質（適合品質）","ねらいの品質","企画品質"],"h":"「できばえ」の品質とも呼ばれ、図面への適合度合いを指します。","c":1,"e":"製造品質は、工程でのつくり込みによって決まり、設計という「理想」をどれだけ現実の「製品」に転写できたかを示します。"},{"m":29,"q":"品質管理の原則である「品質は工程でつくり込むもの」という言葉は、主にどちらの品質を指していますか？","o":["設計品質","製造品質","サービス品質","経営品質"],"h":"製造・加工工程での作業の正確さが問われる品質です。","c":1,"e":"設計された通りに「ばらつき」なく作り上げる活動は、製造品質（適合品質）の領域です。"},{"m":29,"q":"「設計品質」を決定する力（製品企画や設計能力）は、企業にとって何に直結すると述べられていますか？","o":["工場の光熱費","企業の競争力","従業員の福利厚生","梱包材の強度"],"h":"顧客が製品から受け取る「価値」の根源となる部分です。","c":1,"e":"顧客が求める価値を正しく設計に盛り込む能力こそが、市場での勝ち残りを決定づけます。"},{"m":29,"q":"製造物責任法（PL法）において、設計段階で本来確保すべき安全性が欠けていたために生じる不具合を何と呼びますか？","o":["製造上の欠陥","表示・警告上の欠陥","設計上の欠陥","販売上の欠陥"],"h":"個別の製品のミスではなく、その「仕様」そのものに問題があるケースです。","c":2,"e":"図面通りに作っても危険が生じる場合は「設計上の欠陥」となり、その設計で作られた全製品が対象となります。"},{"m":29,"q":"図面は正しかったが、製造工程の「ばらつき（ムラ）」によって、図面とは異なる寸法で出来上がってしまった不具合は何に該当しますか？","o":["設計上の欠陥","製造上の欠陥","指示上の欠陥","不可抗力"],"h":"「できばえ」が設計図という理想から外れてしまった状態です。","c":1,"e":"設計の意図通りに作れなかった不備は「製造上の欠陥」であり、適合品質が欠如している状態です。"},{"m":29,"q":"後工程（下流）で品質を良くすることはできないため、企画・設計の段階から品質を作り込む考え方を何と呼びますか？","o":["事後管理","源流管理","在庫管理","販売管理"],"h":"川の流れの「源（みなもと）」を管理するイメージです。","c":1,"e":"問題が発生してから直すのではなく、上流工程で品質を保証する体制を整えることが最も効率的です。"},{"m":29,"q":"自動車のボディーパネルの例で、0.8ミリの設計に対して「0.7ミリ」で出来上がってしまった場合、何が欠如していると言えますか？","o":["設計品質","適合品質（製造品質）","企画の独創性","材料の希少性"],"h":"「設計図通りに作れていない」という事実に注目してください。","c":1,"e":"設計の指示値（0.8ミリ）に適合していないため、適合品質が損なわれている状態です。"},{"m":29,"q":"本研修のまとめにおいて、設計品質と製造品質は何に例えられていましたか？","o":["車の「アクセル」と「ブレーキ」","車の「両輪」","「太陽」と「月」","「海」と「山」"],"h":"どちらか一方が優れていても、一方が欠ければ製品として成り立たない関係です。","c":1,"e":"理想の「ねらい」と現実の「できばえ」が揃って初めて、顧客満足という目的地に到達できます。"},{"m":29,"q":"研修の最後に登場した例え話で、「設計品質」に相当するものはどれですか？","o":["熟練した職人の包丁さばき","シェフが考案した最高の「レシピ」","出来上がった料理の盛り付け","お客様が払う代金"],"h":"「こう作るべきだ」という理想の情報に注目してください。","c":1,"e":"最高のレシピ（設計品質）があっても、その通りに調理（製造品質）されなければ、お客様を満足させることはできません。"},{"m":30,"q":"お客様が真に求めていないにもかかわらず、企業が自己満足で高めてしまった不必要な品質や性能を何と呼びますか？","o":["設計品質","製造品質","過剰品質（オーバースペック）","適合品質"],"h":"「良すぎる」ことが、実は経営上の「ムダ」になっている状態です。","c":2,"e":"顧客のニーズを超えた過度な性能や機能は、付加価値を生まないコスト増を招き、企業の利益を損なう「ムダ」となります。"},{"m":30,"q":"「品質第一」の哲学を持ちつつ、企業が存続するために同時に考慮しなければならない要素は何ですか？","o":["社長の趣味","競合他社の欠点","コスト（費用）と利益","工場の外観"],"h":"「費用に無頓着では儲けを出すことができない」という一節を思い出してください。","c":2,"e":"品質を維持・向上させることは大前提ですが、それを経済的に（適切なコストで）実現しなければ、企業は持続できません。"},{"m":30,"q":"過剰品質が発生する可能性がある二つの段階の正しい組み合わせはどれですか？","o":["採用段階と教育段階","設計品質の段階と製造品質の段階","広告段階と販売段階","輸送段階と保管段階"],"h":"「何を狙うか」を決める時と、「どう作るか」を実行する時です。","c":1,"e":"企画・設計時の盛り込みすぎ（設計品質）と、製造・検査時のやりすぎ（製造品質）の両面で過剰品質は発生します。"},{"m":30,"q":"設計段階における過剰品質（オーバースペック）を防ぐために、徹底すべき考え方はどれですか？","o":["プロダクト・アウト（作りたいものを作る）","マーケット・イン（顧客や市場の声をもとに作る）","コスト度外視","機能の最大化"],"h":"「お客様が本当に求めている価値」を起点にする考え方です。","c":1,"e":"お客様が求めている機能や安全性を正確に把握し、それに合致した「ねらいの品質」を定めることが重要です。"},{"m":30,"q":"製造・検査段階において、「本当は良品（合格）なのに、不良と判断してしまう誤り」を何と呼びますか？","o":["第一種の誤り","第二種の誤り","ヒューマンエラー","測定誤差"],"h":"厳しすぎる判定基準によって、使えるものを捨ててしまうムダのことです。","c":0,"e":"第一種の誤りは、本来必要のない手直しや廃棄を生み、原価を不当に高めてしまう過剰品質（ムダ）の典型例です。"},{"m":30,"q":"たまご焼きの事例で、材料費高騰に直面した際に取るべき正しい「品質第一」の行動はどれですか？","o":["品質を落として価格を維持する","知恵と改善で、品質を維持しつつコストを抑える手段を見つける","赤字になっても高級材料を使い続ける","お客様に黙って量を減らす"],"h":"「品質を悪くしたらお客様は離れるが、儲けも出さねばならない」という課題への対応です。","c":1,"e":"単に高い材料を使うのが品質管理ではなく、工夫によって「目標の品質」を安く安定して提供し続けることがプロの仕事です。"},{"m":30,"q":"計測機器の校正において、リスクを考慮せず必要以上に頻繁な間隔（例：毎月）で実施することは、何に該当しますか？","o":["理想的な品質保証","コストアップにつながる過剰な検査（ムダ）","法令の完全遵守","測定精度の向上"],"h":"妥当なレベルを超えた頻度は、費用と手間だけを増大させます。","c":1,"e":"リスクベースのアプローチに基づき、適切な頻度を設定すべきです。過剰な校正は、機器の使用不可期間や委託費を増やすムダとなります。"},{"m":30,"q":"企業が目指すべき、最高の品質を最小のコストで提供する状態を何と呼びますか？","o":["部分最適","個別最適","全体最適","短期最適"],"h":"品質、コスト、納期のバランスが最も取れた、組織全体の理想的な状態です。","c":2,"e":"顧客が認める価値を、最も経済的なプロセスで生み出す「全体最適」こそが、品質管理の目指すゴールです。"},{"m":30,"q":"過剰品質を避けるために、市場調査などを通じて正確に把握すべきものは何ですか？","o":["最新のテクノロジー","競合他社の役員名簿","お客様が本当に求めている「価値」","工場の最大生産能力"],"h":"お客様の「期待値」を正しく知ることがスタート地点です。","c":2,"e":"期待されている価値を正確に「ねらいの品質」として定義することで、不要な機能への投資を抑えられます。"},{"m":30,"q":"本研修のまとめにおいて、真の品質目標は何に例えられていましたか？","o":["高級食材を使い切るフルコース","予算に合わせて最高の価値を感じさせる「プロの料理」","とにかく早く安く提供する「ファストフード」","見た目だけを重視した「飾り料理」"],"h":"予算（コスト）の範囲内で、客の期待を超える満足を生む技術の比喩です。","c":1,"e":"限られた資源の中で、顧客の期待に応え、かつ経済的に成立するポイントを見極めることこそが、真の品質管理です。"},{"m":31,"q":"組織の全部門・全階層の要員が参加し、品質を中核に据えて経営を管理する手法を何と呼びますか？","o":["個別品質管理","総合的品質管理（TQM）","検査主体管理","外注任せの管理"],"h":"「Total Quality Management」の略称で、全員参加が基本です。","c":1,"e":"TQMは、製品の質だけでなく「経営の質」や「仕事の質」を全社一丸となって高めていく活動です。"},{"m":31,"q":"品質管理（QC）における「品質」の対象として、正しい説明はどれですか？","o":["完成した製品の見た目だけを指す","製品の質だけでなく、安全、納期、サービスなどの「仕事の質」すべてを含む","不合格品を廃棄するコストのこと","設計図面に書かれた数字のこと"],"h":"「良い仕事」をすることが、結果的に何に繋がるかを考えてください。","c":1,"e":"安全作業、整理整頓、納期遵守、営業活動など、すべての「良い仕事」が最終的な品質を形作ります。"},{"m":31,"q":"「自分が行った仕事のアウトプットを受け取る次の工程の人」を、どのような意識で捉えるべきですか？","o":["ただの同僚","ライバル","後工程はお客様","監視役"],"h":"自分の仕事が最終的に誰の役に立つのか、その連鎖を想像しましょう。","c":2,"e":"「後工程はお客様」という意識を持つことで、不備のある仕事を次へ流さないという品質保証の基本が徹底されます。"},{"m":31,"q":"問題の根本解決のために、製造現場だけでなく材料選定や商品開発などの「上流」にさかのぼって改善することを何と呼びますか？","o":["下流管理","源流管理","事後処理","対症療法"],"h":"川の流れの「源（みなもと）」を綺麗にするイメージです。","c":1,"e":"不良が出てから直すのではなく、原因が発生する根本（源流）で対策を打つことが最も効果的です。"},{"m":31,"q":"外部委託（アウトソース）したプロセスにおいて、顧客の要求事項が満たされなかった場合、その責任は誰にありますか？","o":["作業を請け負った外部委託先のみ","委託した側の組織（自社）","不具合を見抜けなかった顧客","誰の責任でもない"],"h":"「外注したからといって、組織の責任は免除されない」という原則があります。","c":1,"e":"外部リソースを活用しても、お客様に対する最終的な品質責任は常に自組織にあります。"},{"m":31,"q":"新製品開発において、設計、製造、品質、営業など複数の部門から要員を集めて活動することを何と呼びますか？","o":["単独部門アプローチ","部門横断アプローチ（多機能チーム）","縦割り組織活動","外注依存チーム"],"h":"「部門の壁」を越えて、多角的な視点でリスクを分析する活動です。","c":1,"e":"多機能チームで活動することで、量産前に潜在的なリスク（FMEA）を特定し、品質を安定させることができます。"},{"m":31,"q":"マクドナルドの事例において、Quality（品質）、Service（サービス）と並んで不可欠とされる要素は何ですか？","o":["広告宣伝","Cleanliness（清潔・安心）","低価格","店舗数"],"h":"「食品衛生」や「行くところすべて清潔にせよ」という行動規範に関わるものです。","c":1,"e":"清潔（クレンリネス）は単なる掃除ではなく、感染や異物混入のリスクを排除する「仕事の質」そのものです。"},{"m":31,"q":"品質管理の考え方や進め方は、時代の変化とともにどうなると述べられていますか？","o":["古くなって役に立たなくなる","時代が変わっても必要性は変わらない「仕事の基本」である","AIが普及すれば不要になる","製造業以外では使えない"],"h":"経営における「重要なツール」としての普遍性に注目してください。","c":1,"e":"事実に基づき、プロセスを改善するQCの考え方は、あらゆる時代・業種において共通の基本スキルです。"},{"m":31,"q":"品質に関わる活動（QCサークルなど）が個人にもたらす「無形の効果」は何ですか？","o":["給料の自動的な引き上げ","能力向上、自己実現、達成感や自信","残業時間の増加","複雑な数式の暗記"],"h":"「人間的な成長」や「職場の活力」に繋がる目に見えない成果です。","c":1,"e":"自ら考え改善する経験は、個人の実力を高め、生きがいのある職場づくりに寄与します。"},{"m":31,"q":"本研修のまとめにおいて、全員参加の品質管理は何に例えられていましたか？","o":["一人で戦う「ボクシング」","オーケストラの「演奏」","静かに待つ「釣り」","運任せの「ギャンブル」"],"h":"指揮者（経営）と演奏者（全従業員）が連携してハーモニーを作る比喩です。","c":1,"e":"一人ひとりが自分のパート（仕事）を完璧にこなし、連携することで初めて「最大の顧客満足」というハーモニーが生まれます。"},{"m":32,"q":"ヒヤリハットとはどのような出来事を指しますか？","o":["重大な怪我を負った事故","幸い事故には至らなかったが、危ないと感じた出来事","機械が完全に故障した状態","誰にも知られずに終わったミス"],"h":"重大な事故の「予行演習」と捉えられる事象です。","c":1,"e":"実害はなかったものの、「一歩間違えれば事故になっていた」という小さな予兆をヒヤリハットと呼びます。"},{"m":32,"q":"リスクマネジメントにおいて、是正処置（再発防止）よりも基本とすべき、思考の転換（パラダイムシフト）は何ですか？","o":["事後処理の迅速化","未然防止（予防処置）の徹底","責任の所在の明確化","マニュアルの増量"],"h":"「最高の緊急時対策は、平常時に行われる」という一節を思い出してください。","c":1,"e":"事故が起きてから対策するのではなく、起きる前に芽を摘む「未然防止」へ意識を切り替えることが重要です。"},{"m":32,"q":"ヒヤリハット活動を推進する上での最大の障壁（心理的抵抗）は何ですか？","o":["報告書の用紙が足りないこと","自分の失敗をオープンにすることへの抵抗感","ペンで文字を書くのが面倒なこと","現場が静かすぎること"],"h":"失敗談を共有することに対する「恥ずかしさ」や「不安」に注目してください。","c":1,"e":"自分のミスをさらけ出すのは勇気がいります。これを乗り越えるための風土づくりがリーダーの役割です。"},{"m":32,"q":"安全活動を定着させるために、リーダー（長の付く人）が取るべき正しい姿
